<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NASA TERMINAL | DEEP SPACE</title>
    <style>
        :root {
            --nasa-blue: #00ffff;
            --bg-dark: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
        }

        /* Efecto de marco de terminal */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            box-shadow: inset 0 0 100px rgba(0, 255, 255, 0.2);
            pointer-events: none;
            z-index: 5;
        }

        /* Cabecera Técnica */
        #terminal-header {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            border-bottom: 1px solid var(--nasa-blue);
            padding: 10px 20px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .sys-info {
            color: var(--nasa-blue);
            font-size: 12px;
            text-transform: uppercase;
        }

        /* Botón de salida estilo Quantum */
        #exit-btn {
            text-decoration: none;
            color: #000;
            background: var(--nasa-blue);
            padding: 8px 15px;
            font-weight: bold;
            font-size: 13px;
            border-radius: 3px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        #exit-btn:hover {
            box-shadow: 0 0 15px var(--nasa-blue);
            transform: scale(1.05);
        }

        /* El simulador */
        #nasa-iframe {
            position: absolute;
            top: 45px; /* Espacio para el header */
            left: 0;
            width: 100%;
            height: calc(100% - 75px); /* Espacio para header y footer */
            border: none;
        }

        /* Pie de página con atribución */
        #terminal-footer {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .credit {
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Scanlines para toque retro */
        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 6;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <header id="terminal-header">
        <div class="sys-info">
            <span style="color: #fff;">●</span> SECTOR: SOLAR_SYS_V4 <br>
            <span style="color: #fff;">●</span> MODE: INTERACTIVE_DATA
        </div>
        
        <a href="experimentos.html" id="exit-btn">← TERMINAR SESIÓN</a>
    </header>

    <iframe 
        id="nasa-iframe" 
        src="https://eyes.nasa.gov/apps/solar-system/#/home?embed=true" 
        allow="fullscreen">
    </iframe>

    <footer id="terminal-footer">
        <div class="credit">Créditos: NASA Eyes on the Solar System | Deep Space Visualizer</div>
    </footer>

</body>
</html>
