<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA SOLAR INTERACTIVO | NASA</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenedor del simulador de la NASA */
        #nasa-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        /* Panel de control superior */
        #header {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 20px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none; /* Deja pasar los clics al simulador */
        }

        .title {
            color: #fff;
            margin-left: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00ffff;
        }

        /* Botón de salida - Este SI tiene eventos de clic */
        #exit-btn {
            pointer-events: auto;
            margin-right: 40px;
        }

        #exit-btn a {
            text-decoration: none;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            padding: 12px 25px;
            border: 2px solid #00ffff;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        #exit-btn a:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff;
        }

        /* Instrucciones flotantes */
        #hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="header">
        <h2 class="title">Exploración Solar Externa</h2>
        <div id="exit-btn">
            <a href="experimentos.html">← Volver a Experimentos</a>
        </div>
    </div>

    <iframe 
        id="nasa-container" 
        src="https://eyes.nasa.gov/apps/solar-system/#/home?embed=true" 
        allow="fullscreen">
    </iframe>

    <div id="hint">
        Interactúa con el mouse para rotar, zoom y seleccionar planetas.
    </div>

</body>
</html>
