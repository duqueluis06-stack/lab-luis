<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NEURO WORLD: SPACE DRIFT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body { margin:0; overflow:hidden; background:#000; font-family: 'Segoe UI', sans-serif; }
    
    #ui {
        position:absolute;
        top:20px; left:20px;
        color:#00ffff;
        z-index:10;
        background:rgba(0,0,0,0.7);
        padding:15px;
        border:1px solid #00ffff;
        border-radius:5px;
        text-transform: uppercase;
        letter-spacing: 1px;
        pointer-events: none;
        font-size: 12px;
    }

    #start {
        position:absolute;
        top:50%; left:50%;
        transform:translate(-50%,-50%);
        color:#00ffff;
        background:black;
        padding:30px 60px;
        border:3px solid #00ffff;
        font-size: 24px;
        font-weight: bold;
        cursor:pointer;
        z-index:20;
        transition: 0.3s;
    }
    #start:hover { background: #00ffff; color: black; box-shadow: 0 0 30px #00ffff; }

    #crosshair {
        position: absolute;
        top: 50%; left: 50%;
        width: 10px; height: 10px;
        border: 2px solid rgba(0, 255, 255, 0.5);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
    }

    #portal {
        position: absolute;
        bottom: 20px; 
        right: 20px;
        z-index: 15;
    }

    #portal a {
        text-decoration: none;
        color: #00ffff;
        background: rgba(0, 0, 0, 0.8);
        padding: 12px 20px;
        border: 1px solid #00ffff;
        border-radius: 5px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        display: inline-block;
    }

    #portal a:hover {
        background: #00ffff;
        color: #000;
        box-shadow: 0 0 15px #00ffff;
    }
</style>
</head>

<body>

<div id="ui">
    🚀 NEURO SPACE EXPLORER<br><br>
    W / S - PROPULSIÓN (Hacia donde miras)<br>
    A / D - TRASLACIÓN LATERAL<br>
    MOUSE - ORIENTACIÓN TOTAL<br>
    SPACE - FRENO DE EMERGENCIA<br>
    ESC - LIBERAR RATÓN
</div>

<div id="start">INICIAR MISIÓN</div>
<div id="crosshair"></div>

<div id="portal">
    <a href="experimentos.html">🔬 Regresar al Laboratorio</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/PointerLockControls.js"></script>

<script>
// --- CONFIGURACIÓN DE ESCENA ---
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// --- CONTROLES DE VUELO ---
let controls = new THREE.PointerLockControls(camera, document.body);
scene.add(controls.getObject());

// --- ILUMINACIÓN ---
let sunLight = new THREE.PointLight(0xffffff, 5, 5000);
sunLight.position.set(0, 0, 0); // El sol está en el centro
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x222244, 0.5));

// --- FONDO DE ESTRELLAS ---
function createStars() {
    const geo = new THREE.BufferGeometry();
    const pos = [];
    for(let i=0; i<10000; i++) {
        pos.push((Math.random()-0.5)*5000, (Math.random()-0.5)*5000, (Math.random()-0.5)*5000);
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({color: 0xffffff, size: 1.5});
    scene.add(new THREE.Points(geo, mat));
}
createStars();

// --- PLANETAS ---
const planets = [];
const planetData = [
    { name: "Sol", color: 0xffaa00, size: 50, dist: 0, glow: 0xff4400 },
    { name: "Mercurio", color: 0x888888, size: 4, dist: 120 },
    { name: "Venus", color: 0xffcc88, size: 9, dist: 180 },
    { name: "Tierra", color: 0x2255ff, size: 10, dist: 260 },
    { name: "Marte", color: 0xff4400, size: 6, dist: 350 },
    { name: "Júpiter", color: 0xccaa88, size: 25, dist: 550 },
    { name: "Saturno", color: 0xeedd99, size: 20, dist: 800, ring: true }
];

planetData.forEach((data, index) => {
    let group = new THREE.Group();
    let mat = new THREE.MeshStandardMaterial({
        color: data.color,
        emissive: data.name === "Sol" ? data.color : 0x000000,
        emissiveIntensity: 2
    });
    
    let mesh = new THREE.Mesh(new THREE.SphereGeometry(data.size, 32, 32), mat);
    group.add(mesh);

    if(data.ring) {
        let ringGeo = new THREE.RingGeometry(data.size + 5, data.size + 20, 64);
        let ringMat = new THREE.MeshBasicMaterial({color: 0xaaaaaa, side: THREE.DoubleSide, transparent: true, opacity: 0.4});
        let ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI/2.5;
        group.add(ring);
    }

    group.position.x = data.dist;
    scene.add(group);
    planets.push({
        mesh: group, 
        orbitDist: data.dist, 
        speed: 0.005 / (index + 1),
        offset: Math.random() * Math.PI * 2
    });
});

// --- LÓGICA DE MOVIMIENTO ---
let velocity = new THREE.Vector3();
let keys = {};
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

let startBtn = document.getElementById("start");
startBtn.onclick = () => controls.lock();
controls.addEventListener("lock", () => startBtn.style.display = "none");
controls.addEventListener("unlock", () => startBtn.style.display = "block");

// Posición inicial (Cerca de la Tierra)
camera.position.set(200, 100, 400);
camera.lookAt(0,0,0);

let clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    let delta = clock.getDelta();

    if (controls.isLocked) {
        let accel = 150 * delta;
        let dir = new THREE.Vector3();
        camera.getWorldDirection(dir);

        // Propulsión dirección cámara
        if (keys["KeyW"]) velocity.addScaledVector(dir, accel);
        if (keys["KeyS"]) velocity.addScaledVector(dir, -accel);
        
        // Strafe
        let sideDir = new THREE.Vector3();
        sideDir.crossVectors(camera.up, dir).normalize();
        if (keys["KeyA"]) velocity.addScaledVector(sideDir, accel);
        if (keys["KeyD"]) velocity.addScaledVector(sideDir, -accel);

        // Freno Space
        if (keys["Space"]) velocity.multiplyScalar(0.92);

        // Inercia (Fricción mínima)
        velocity.multiplyScalar(0.985);
        controls.getObject().position.add(velocity);
    }

    // Órbitas
    let time = Date.now() * 0.0001;
    planets.forEach((p) => {
        p.mesh.position.x = Math.cos(time + p.offset) * p.orbitDist;
        p.mesh.position.z = Math.sin(time + p.offset) * p.orbitDist;
        p.mesh.rotation.y += 0.005;
    });

    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
