<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NASA TERMINAL | DEEP SPACE</title>
    <style>
        :root {
            --nasa-blue: #00ffff;
            --bg-dark: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            box-shadow: inset 0 0 100px rgba(0, 255, 255, 0.2);
            pointer-events: none;
            z-index: 5;
        }

        /* Cabecera Adaptable */
        #terminal-header {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid var(--nasa-blue);
            padding: 10px 15px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            height: 60px; /* Altura fija para control */
        }

        .sys-info {
            color: var(--nasa-blue);
            font-size: 11px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        /* Botón de salida optimizado para dedos */
        #exit-btn {
            text-decoration: none;
            color: #000;
            background: var(--nasa-blue);
            padding: 12px 18px; /* Más grande para móviles */
            font-weight: bold;
            font-size: 14px;
            border-radius: 4px;
            transition: 0.3s;
            text-transform: uppercase;
            white-space: nowrap;
        }

        #nasa-iframe {
            position: absolute;
            top: 60px; 
            left: 0;
            width: 100%;
            height: calc(100% - 90px); 
            border: none;
        }

        #terminal-footer {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .credit {
            color: rgba(255, 255, 255, 0.5);
            font-size: 9px;
            text-transform: uppercase;
            text-align: center;
            padding: 0 10px;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 6;
            pointer-events: none;
        }

        /* --- AJUSTES ESPECÍFICOS PARA MÓVIL --- */
        @media (max-width: 600px) {
            .sys-info {
                font-size: 9px;
            }
            #exit-btn {
                padding: 10px 12px;
                font-size: 12px;
            }
            #terminal-header {
                padding: 5px 10px;
            }
            /* Ocultar parte del texto en móvil para no saturar */
            .sys-info br { display: none; }
            .sys-info span::after { content: " | "; }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <header id="terminal-header">
        <div class="sys-info">
            <span style="color: #fff;">●</span> SECTOR: SOLAR_V4 <br>
            <span style="color: #fff;">●</span> MODE: DATA_INT
        </div>
        
        <a href="experimentos.html" id="exit-btn">← SALIR</a>
    </header>

    <iframe 
        id="nasa-iframe" 
        src="https://eyes.nasa.gov/apps/solar-system/#/home?embed=true" 
        allow="fullscreen">
    </iframe>

    <footer id="terminal-footer">
        <div class="credit">NASA Eyes | Solar System Visualizer</div>
    </footer>

</body>
</html>
