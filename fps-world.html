<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NASA TERMINAL | HIGH PERFORMANCE</title>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --bg-dark: #050505;
        }

        /* ACELERACIÓN POR HARDWARE: El truco para PC */
        * {
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
        }

        /* Scanlines optimizadas: quitamos degradados pesados */
        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(18, 16, 16, 0.05);
            background-image: linear-gradient(rgba(0,0,0,0.1) 50%, transparent 50%);
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
        }

        header {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 60px;
            background: #000;
            border-bottom: 2px solid var(--neon-cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 30;
        }

        .sys-title {
            color: var(--neon-cyan);
            font-size: 14px;
            text-transform: uppercase;
        }

        .nav-controls { display: flex; gap: 10px; }

        .btn-neon {
            text-decoration: none;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 12px;
            border-radius: 4px;
            text-transform: uppercase;
            transition: 0.2s linear;
        }

        .btn-home { color: #fff; border: 1px solid #fff; }
        .btn-exit { color: var(--neon-magenta); border: 1px solid var(--neon-magenta); }
        .btn-exit:hover { background: var(--neon-magenta); color: #fff; }

        /* IFRAME: Le quitamos filtros innecesarios para PC */
        #nasa-frame {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100% - 95px);
            border: none;
            background: #000;
        }

        footer {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 35px;
            background: #000;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
        }

        .legal-notice {
            color: rgba(255, 255, 255, 0.5);
            font-size: 9px;
            text-align: center;
            text-transform: uppercase;
        }

        /* Ajustes para móviles */
        @media (max-width: 600px) {
            header { height: 70px; }
            #nasa-frame { top: 70px; height: calc(100% - 105px); }
            .sys-title { font-size: 11px; }
            .btn-neon { padding: 10px 12px; }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <header>
        <div class="sys-title">🛰️ NASA_STREAM | LIVE_DATA</div>
        <div class="nav-controls">
            <a href="index.html" class="btn-neon btn-home">🏠 INICIO</a>
            <a href="experimentos.html" class="btn-neon btn-exit">🌀 QUANTUM</a>
        </div>
    </header>

    <iframe 
        id="nasa-frame" 
        src="https://eyes.nasa.gov/apps/solar-system/#/home?embed=true" 
        allow="fullscreen"
        loading="lazy">
    </iframe>

    <footer>
        <div class="legal-notice">
            Aviso: Este sitio utiliza tecnología de dominio público proporcionada por <strong>NASA Eyes on the Solar System</strong>. Visualizador educativo.
        </div>
    </footer>

</body>
</html>
