<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NASA TERMINAL | DEEP SPACE EXPLORER</title>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --bg-dark: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            -webkit-tap-highlight-color: transparent;
        }

        /* Scanlines y efecto de monitor antiguo */
        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
        }

        /* Cabecera Neón RGB */
        header {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 30;
        }

        .sys-title {
            color: var(--neon-cyan);
            font-size: 14px;
            text-transform: uppercase;
            animation: flicker 2s infinite;
        }

        /* Contenedor de Botones de Salida */
        .nav-controls {
            display: flex;
            gap: 10px;
        }

        .btn-neon {
            text-decoration: none;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 12px;
            border-radius: 4px;
            text-transform: uppercase;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Botón Inicio (Index) */
        .btn-home {
            color: #fff;
            border: 1px solid #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Botón Salida (Experimentos) */
        .btn-exit {
            color: var(--neon-magenta);
            border: 1px solid var(--neon-magenta);
            background: rgba(255, 0, 255, 0.1);
            box-shadow: inset 0 0 5px var(--neon-magenta);
        }

        .btn-exit:hover {
            background: var(--neon-magenta);
            color: #fff;
            box-shadow: 0 0 20px var(--neon-magenta);
        }

        /* Simulador NASA */
        #nasa-frame {
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100% - 110px);
            border: none;
            background: #000;
        }

        /* Footer con Aviso Legal */
        footer {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            height: 40px;
            background: #000;
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .legal-notice {
            color: rgba(255, 255, 255, 0.6);
            font-size: 9px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Animaciones */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 22%, 24%, 55% { opacity: 0.5; }
        }

        /* Adaptación para Móvil */
        @media (max-width: 600px) {
            header { height: 80px; padding: 0 10px; }
            .sys-title { font-size: 10px; max-width: 80px; }
            .btn-neon { padding: 12px 10px; font-size: 10px; }
            #nasa-frame { top: 80px; height: calc(100% - 120px); }
            .legal-notice { font-size: 7px; }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <header>
        <div class="sys-title">
            🛰️ NASA_DATA_STREAM<br>
            <span style="font-size: 9px; color: #fff;">LIVE_ORBIT_V.4.2</span>
        </div>
        
        <div class="nav-controls">
            <a href="index.html" class="btn-neon btn-home">🏠 INICIO</a>
            <a href="experimentos.html" class="btn-neon btn-exit">🌀 QUANTUM</a>
        </div>
    </header>

    <iframe 
        id="nasa-frame" 
        src="https://eyes.nasa.gov/apps/solar-system/#/home?embed=true" 
        allow="fullscreen"
        loading="lazy">
    </iframe>

    <footer id="terminal-footer">
        <div class="legal-notice">
            Aviso: Este sitio utiliza tecnología de dominio público proporcionada por <strong>NASA Eyes on the Solar System</strong>. Visualizador educativo.
        </div>
    </footer>

</body>
</html>
