<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis Teorías - Laboratorio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 BASE */
body{
  margin:0;
  font-family:Arial;
  background:#05070a;
  overflow:hidden;
  color:#ccc;
}

/* 🌌 CANVAS */
#labCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-3;
}

/* 🧠 HEADER */
header{
  text-align:center;
  padding:12px;
  background:#111;
  color:#fff;
  border-bottom:1px solid #222;
}

/* 🧬 LAYOUT */
.wrapper{
  display:flex;
  height:100vh;
}

/* 📡 SIDEBAR */
.sidebar{
  width:240px;
  background:#0f141b;
  border-right:1px solid #222;
  padding:10px;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#151b24;
  border:1px solid #2a2a2a;
  color:#ccc;
  cursor:pointer;
  transition:0.3s;
}

.sidebar button:hover{
  color:#00ffe5;
  border-color:#00ffe5;
  box-shadow:0 0 10px rgba(0,255,229,0.2);
}

/* 🧬 CONTENT */
.content{
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* 📦 PANEL */
.panel{display:none;}
.panel.active{display:block;}

/* ⚙️ BOTÓN SALIR */
.back-gear{
  position:fixed;
  top:15px;
  right:15px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#05070a;
  border:2px solid #00ffe5;
  box-shadow:0 0 15px #00ffe5;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#00ffe5;
  text-decoration:none;
  z-index:9999;
  animation:pulse 2s infinite;
}

.back-gear .gear{
  font-size:22px;
  animation:spin 3s linear infinite;
}

.back-gear span{
  font-size:10px;
}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{
  0%,100%{box-shadow:0 0 10px #00ffe5;}
  50%{box-shadow:0 0 25px #00ffe5;}
}

/* 🙂 CARITA */
#face{
  position:fixed;
  left:50%;
  top:50%;
  width:30px;
  height:30px;
  border-radius:50%;
  background:#00ffe5;
  box-shadow:0 0 15px #00ffe5;
  transform:translate(-50%,-50%);
  z-index:9998;
  pointer-events:none;
}

</style>
</head>

<body>

<!-- 🌌 CANVAS -->
<canvas id="labCanvas"></canvas>

<!-- ⚙️ SALIR -->
<a class="back-gear" href="laboratorio.html">
  <div class="gear">⚙️</div>
  <span>VOLVER</span>
</a>

<!-- 🙂 CARITA -->
<div id="face"></div>

<header>
<h2>🧪 Laboratorio de Mis Teorías</h2>
</header>

<div class="wrapper">

<div class="sidebar">
  <button onclick="show('t1')">🦖 Dinámica Rotacional</button>
  <button onclick="show('t2')">🌌 Energía Universal</button>
</div>

<div class="content">

  <div id="t1" class="panel active">
    <h3>Teoría 1</h3>
    <p>Modelo de rotación y estabilidad dinámica...</p>
  </div>

  <div id="t2" class="panel">
    <h3>Teoría 2</h3>
    <p>Interacción entre campos de energía expansiva...</p>
  </div>

</div>

</div>

<script>

/* 📦 PANELES */
function show(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* 🌌 PARTÍCULAS */
const canvas=document.getElementById("labCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.6,
    vy:(Math.random()-0.5)*0.6,
    r:Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let p of particles){
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(0,255,229,0.6)";
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();

/* 🙂 CARITA SIGUE RATÓN */
const face=document.getElementById("face");

document.addEventListener("mousemove",(e)=>{
  face.style.left=e.clientX+"px";
  face.style.top=e.clientY+"px";
});

/* 🔄 RESIZE */
window.addEventListener("resize",()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});

</script>

</body>
</html>
