<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Modelo de Dinámica Universal de Sistemas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌍 BASE */
body{
  margin:0;
  font-family:Arial;
  background: url("vintagefondo.jpg") no-repeat center center fixed;
  background-size: cover;
  font-size:16px;
  color:#ccc;
}

/* 🌌 FONDO DINÁMICO */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: radial-gradient(circle, rgba(0,255,200,0.05), transparent 60%);
  pointer-events:none;
  animation: drift 12s infinite linear;
}

@keyframes drift{
  0% { transform: translateY(0px); }
  50% { transform: translateY(10px); }
  100% { transform: translateY(0px); }
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  background:#111;
  border-bottom:1px solid #333;
}

header h1{
  font-size:20px;
  margin:0;
  color:#fff;
}

/* CONTENEDOR */
.container{
  padding:20px;
}

/* 🧪 TARJETAS */
.card{
  background:#151515;
  border:1px solid #333;
  border-radius:10px;
  padding:22px;
  margin-bottom:18px;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
  opacity:0;
  transform: translateY(20px);
  transition: all 0.6s ease-out;
}

.card.visible{
  opacity:1;
  transform: translateY(0);
}

.card:hover{
  border-color:#00ffcc;
  box-shadow: 0 0 15px rgba(0,255,200,0.2);
}

.card h2{
  font-size:18px;
  color:#ffd36a;
  margin-bottom:15px;
  line-height:1.4;
}

/* TEXTO */
.card p{
  font-size:15px;
  line-height:1.75;
  margin-bottom:14px;
  white-space:pre-line;
}

/* BOTÓN VOLVER */
.back{
  position:fixed;
  top:10px;
  right:10px;
  background:#8b0000;
  color:white;
  padding:8px 12px;
  text-decoration:none;
  border-radius:8px;
  font-size:13px;
  z-index:999;
}

.back:hover{
  background:#a00000;
}

/* 🦦 NUTRIA IA */
.otter-face{
  position:fixed;
  top:18px;
  left:18px;
  width:78px;
  height:78px;
  border-radius:50%;
  background: radial-gradient(circle at 30% 30%, #3b2a1a, #000);
  border:2px solid #00ffcc;
  box-shadow:0 0 18px rgba(0,255,200,0.4);
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ojos */
.eye{
  width:10px;
  height:10px;
  background:#00ffcc;
  border-radius:50%;
  position:absolute;
  top:26px;
  box-shadow:0 0 8px #00ffcc;
  transition:0.05s;
}

.eye.left{ left:18px; }
.eye.right{ right:18px; }

/* nariz */
.nose{
  position:absolute;
  top:38px;
  width:8px;
  height:6px;
  background:#111;
  border-radius:50%;
  box-shadow:0 0 6px rgba(0,255,200,0.3);
}

/* boca nutria */
.mouth{
  position:absolute;
  bottom:18px;
  width:22px;
  height:6px;
  border-bottom:2px solid #00ffcc;
  border-radius:0 0 10px 10px;
  transition:0.2s;
}

/* orejitas */
.ear{
  position:absolute;
  width:10px;
  height:10px;
  background:#2b1d12;
  border-radius:50%;
  top:6px;
  box-shadow:0 0 6px rgba(0,255,200,0.2);
}

.ear.left{ left:10px; }
.ear.right{ right:10px; }

</style>

</head>

<body>

<a class="back" href="laboratorio.html">⬅ Volver</a>

<!-- 🦦 NUTRIA -->
<div class="otter-face" id="otter">
  <div class="ear left"></div>
  <div class="ear right"></div>

  <div class="eye left" id="eyeL"></div>
  <div class="eye right" id="eyeR"></div>

  <div class="nose"></div>
  <div class="mouth" id="mouth"></div>
</div>

<header>
<h1>⚙️ Modelo de Dinámica Universal de Sistemas</h1>
</header>

<div class="container">

<!-- 🦖 TEORÍA 1 -->
<div class="card">
<h2>🦖 Extinción de los Dinosaurios – Hipótesis de Dinámica Rotacional</h2>
<p>... (contenido igual que el tuyo) ...</p>
</div>

<!-- 🌌 TEORÍA 2 -->
<div class="card">
<h2>🌌 Teoría del Equilibrio Universal de Sistemas</h2>
<p>... (contenido igual que el tuyo) ...</p>
</div>

</div>

<script>

/* scroll reveal */
const cards = document.querySelectorAll('.card');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
},{threshold:0.15});

cards.forEach(c => observer.observe(c));

/* 🦦 seguimiento de ojos nutria */
const eyeL = document.getElementById("eyeL");
const eyeR = document.getElementById("eyeR");
const mouth = document.getElementById("mouth");

document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth) * 12;
  const y = (e.clientY / window.innerHeight) * 12;

  eyeL.style.transform = `translate(${x}px, ${y}px)`;
  eyeR.style.transform = `translate(${x}px, ${y}px`;
});

/* vida orgánica */
setInterval(() => {
  const mood = Math.random();

  if(mood > 0.6){
    mouth.style.height = "10px";
  } else {
    mouth.style.height = "4px";
  }
}, 900);

</script>

</body>
</html>
