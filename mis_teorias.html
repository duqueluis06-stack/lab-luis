<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Laboratorio de Mis Teorías</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 BASE */
body{
  margin:0;
  font-family:Arial;
  background:#05070a;
  color:#ccc;
  overflow:hidden;
}

/* 🌌 CANVAS VIVO */
#labCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
}

/* 🧪 HEADER */
header{
  text-align:center;
  padding:15px;
  background:#111;
  border-bottom:1px solid #222;
  color:white;
  position:relative;
  z-index:2;
}

/* 🧠 WRAPPER */
.wrapper{
  display:flex;
  height:100vh;
  position:relative;
  z-index:2;
}

/* 📡 SIDEBAR */
.sidebar{
  width:240px;
  background:#0f141b;
  border-right:1px solid #222;
  padding:10px;
  overflow-y:auto;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:6px 0;
  background:#151b24;
  border:1px solid #2a2a2a;
  color:#ccc;
  cursor:pointer;
  transition:0.3s;
  text-align:left;
}

.sidebar button:hover{
  border-color:#00ffe5;
  box-shadow:0 0 10px rgba(0,255,229,0.2);
  color:#00ffe5;
}

/* 🧬 CONTENT */
.content{
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* 🧪 PANELS */
.panel{
  display:none;
  animation:fade 0.4s ease;
}

.panel.active{
  display:block;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* ⚙️ BOTÓN SALIR */
.back-gear{
  position:fixed;
  top:15px;
  right:15px;
  width:75px;
  height:75px;
  border-radius:50%;
  background:#05070a;
  border:2px solid #00ffe5;
  box-shadow:0 0 15px #00ffe5, 0 0 35px rgba(0,255,229,0.3);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#00ffe5;
  text-decoration:none;
  z-index:9999;
  animation:pulse 2.5s infinite;
}

.back-gear .gear{
  font-size:22px;
  animation:spin 3s linear infinite;
}

.back-gear span{
  font-size:10px;
  letter-spacing:1px;
}

.back-gear:hover{
  transform:scale(1.1);
  box-shadow:0 0 25px #00ffe5, 0 0 60px rgba(0,255,229,0.5);
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

@keyframes pulse{
  0%,100%{box-shadow:0 0 10px #00ffe5;}
  50%{box-shadow:0 0 25px #00ffe5;}
}

</style>
</head>

<body>

<!-- 🌌 CANVAS -->
<canvas id="labCanvas"></canvas>

<!-- ⚙️ SALIR -->
<a class="back-gear" href="laboratorio.html">
  <div class="gear">⚙️</div>
  <span>SALIR</span>
</a>

<header>
<h1>🧪 Laboratorio de Mis Teorías</h1>
</header>

<div class="wrapper">

<!-- 📡 SIDEBAR -->
<div class="sidebar">
  <button onclick="showPanel('t1')">🦖 Dinámica Rotacional</button>
  <button onclick="showPanel('t2')">🌌 Equilibrio Universal</button>
</div>

<!-- 🧬 CONTENT -->
<div class="content">

  <div id="t1" class="panel active">
    <h2>🦖 Extinción de los Dinosaurios</h2>
    <p>Modelo de dinámica rotacional aplicado a sistemas planetarios...</p>
  </div>

  <div id="t2" class="panel">
    <h2>🌌 Equilibrio Universal</h2>
    <p>Sistema dinámico entre fuerzas de compresión y expansión...</p>
  </div>

</div>

</div>

<script>

/* 🧠 CAMBIO DE PANELES */
function showPanel(id){
  document.querySelectorAll('.panel')
    .forEach(p => p.classList.remove('active'));

  document.getElementById(id).classList.add('active');
}

/* 🌌 PARTÍCULAS VIVAS */
const canvas = document.getElementById("labCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<90;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.7,
    vy:(Math.random()-0.5)*0.7,
    r:Math.random()*2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let p of particles){
    p.x += p.vx;
    p.y += p.vy;

    if(p.x<0 || p.x>canvas.width) p.vx*=-1;
    if(p.y<0 || p.y>canvas.height) p.vy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(0,255,229,0.6)";
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

animate();

/* 🔄 RESIZE */
window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

</script>

</body>
</html>
