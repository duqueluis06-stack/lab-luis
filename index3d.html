<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DEBUG 3D LUIS</title>

<style>
body { margin:0; overflow:hidden; background:#000; }
#log {
  position:absolute;
  top:10px;
  left:10px;
  color:#0f0;
  font-family:monospace;
  font-size:12px;
  z-index:10;
}
</style>
</head>

<body>

<div id="log">Cargando...</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

const log = (t) => document.getElementById("log").innerText += "\n" + t;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2, 10);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 luz fuerte
scene.add(new THREE.AmbientLight(0xffffff, 2));
const dir = new THREE.DirectionalLight(0xffffff, 2);
dir.position.set(5,5,5);
scene.add(dir);

const loader = new GLTFLoader();

function loadGLB(path, x, y, z, name) {

  loader.load(path, (gltf) => {

    const obj = gltf.scene;

    obj.position.set(x,y,z);

    obj.scale.set(1,1,1);

    scene.add(obj);

    log("✔ cargado: " + name);

  }, undefined, (err) => {
    log("❌ error: " + name);
  });
}

// 🧠 separación espacial CLAVE
loadGLB("avatar.glb", 0,0,0, "avatar");
loadGLB("habitacion.glb", 0,-2,0, "habitacion");
loadGLB("puerta.glb", 3,0,0, "puerta");
loadGLB("espacio.glb", 0,0,-10, "espacio");

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
