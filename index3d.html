<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escena 3D - Lab Luis</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

#back {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
  padding: 10px 14px;
  background: #00ffcc;
  color: black;
  font-weight: bold;
  text-decoration: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<a id="back" href="experimentos.html">⬅ Volver</a>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// 🔦 cámara más abierta
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  5000
);

camera.position.set(0, 2, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// 💡 luz fuerte (clave para evitar negro)
const light = new THREE.AmbientLight(0xffffff, 3);
scene.add(light);

const directional = new THREE.DirectionalLight(0xffffff, 2);
directional.position.set(5, 10, 5);
scene.add(directional);

const loader = new GLTFLoader();

function loadModel(file, x, y, z, scale = 1) {
  loader.load(file, (gltf) => {

    const model = gltf.scene;

    model.position.set(x, y, z);
    model.scale.set(scale, scale, scale);

    scene.add(model);

    console.log("✔ cargado:", file);
  },
  undefined,
  (err) => console.error("❌ error:", file, err)
  );
}

// 📌 SEPARADOS EN EL ESPACIO (CLAVE)
loadModel("habitacion.glb", 0, 0, 0, 1);
loadModel("avatar.glb", 0, 0, 2, 1);
loadModel("puerta.glb", 3, 0, 0, 1);
loadModel("espacio.glb", -5, 0, -10, 1);

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
