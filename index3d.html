<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SIMULACIÓN 3D ESTABLE</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* =========================
   ESCENA
========================= */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,2,6);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* =========================
   LUZ
========================= */

scene.add(new THREE.AmbientLight(0xffffff, 1.5));

/* =========================
   HABITACIÓN (GEOMETRÍA)
========================= */

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(10,10),
  new THREE.MeshBasicMaterial({ color:0x222222, side:THREE.DoubleSide })
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* paredes */
function wall(x,z,rot){
  const w = new THREE.Mesh(
    new THREE.PlaneGeometry(10,4),
    new THREE.MeshBasicMaterial({ color:0x111111, side:THREE.DoubleSide })
  );
  w.position.set(x,2,z);
  w.rotation.y = rot;
  scene.add(w);
}

wall(0,-5,0);
wall(0,5,0);
wall(-5,0,Math.PI/2);
wall(5,0,Math.PI/2);

/* =========================
   AVATAR (SIN GLB)
========================= */

const avatar = new THREE.Mesh(
  new THREE.BoxGeometry(0.5,1,0.5),
  new THREE.MeshNormalMaterial()
);

avatar.position.set(0,0.5,0);
scene.add(avatar);

/* =========================
   PUERTA
========================= */

const door = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,0.2),
  new THREE.MeshBasicMaterial({ color:0x0033ff })
);

door.position.set(3,1,0);
scene.add(door);

/* =========================
   ESPACIO (PLANO DISTANTE)
========================= */

const space = new THREE.Mesh(
  new THREE.SphereGeometry(20,32,32),
  new THREE.MeshBasicMaterial({ color:0x000011, wireframe:true })
);

space.position.set(0,0,-20);
scene.add(space);

/* =========================
   MOVIMIENTO AVATAR
========================= */

let t = 0;

function animate(){

  requestAnimationFrame(animate);

  t += 0.01;

  avatar.position.x = Math.sin(t)*2;
  avatar.position.z = Math.cos(t)*2;

  door.rotation.y = Math.sin(t*0.5)*0.5;

  renderer.render(scene,camera);
}

animate();

/* resize */
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
