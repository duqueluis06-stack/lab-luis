<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Simulación 3D Agujero Negro | Lab Luis</title>
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://duquemartini.com/index3d.html">
<meta name="description" content="Simulación 3D de un agujero negro interactivo. Visualización del espacio-tiempo y dinámica gravitacional en tiempo real.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-LE6LX7FC2Q"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-LE6LX7FC2Q');
</script>

<style>
  body {
    margin:0;
    background:black;
    overflow:hidden;
    color:white;
    font-family:Arial;
  }

  iframe{
    width:100vw;
    height:100vh;
    border:none;
  }

  #back{
    position:fixed;
    top:10px;
    left:10px;
    z-index:9999;
    padding:10px 14px;
    border:1px solid #0ff;
    color:#0ff;
    background:rgba(0,0,0,0.7);
    font-family:monospace;
    cursor: pointer;
  }

  #info{
    position:fixed;
    bottom:10px;
    left:10px;
    right:10px;
    background:rgba(0,0,0,0.6);
    padding:15px;
    font-size:13px;
    line-height:1.4;
    z-index: 10;
    transition: opacity 1s ease; /* Para que desaparezca suave */
    pointer-events: none; /* No interfiere con los clics al modelo */
  }

  #info h1 { font-size: 16px; margin: 0 0 5px 0; color: #0ff; }
  #info p { margin: 0; }
</style>
</head>

<body>

<button id="back">⬅ BACK</button>

<div id="info">
  <h1>Simulación de Agujero Negro 3D</h1>
  <p>Visualización interactiva del horizonte de sucesos y la deformación del espacio-tiempo. Use el ratón para rotar y explorar la dinámica gravitacional en tiempo real.</p>
</div>

<iframe
id="sketch"
title="Simulación agujero negro 3D"
src="https://sketchfab.com/models/74cbeaeae2174a218fe9455d77902b5c/embed?autostart=1&autospin=1&ui_controls=0&ui_infos=0&ui_watermark=0&ui_stop=0"
allow="autoplay; fullscreen; xr-spatial-tracking"
xr-spatial-tracking
execution-while-out-of-viewport
execution-while-not-rendered
web-share>
</iframe>

<script>
// Manejo del botón volver
document.getElementById("back").onclick = () => {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = "index.html";
  }
};

// Auto-ocultar la descripción después de 10 segundos
setTimeout(() => {
  const infoBox = document.getElementById('info');
  infoBox.style.opacity = '0';
  // Opcional: eliminarlo del DOM después de que termine la transición
  setTimeout(() => { infoBox.style.display = 'none'; }, 1000);
}, 10000); 
</script>

</body>
</html>
