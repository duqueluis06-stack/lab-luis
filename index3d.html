<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DEBUG GLB FINAL</title>

<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:monospace; }
canvas { display:block; }
#log { position:absolute; top:10px; left:10px; z-index:10; }
</style>
</head>

<body>

<div id="log">BOOT...</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

const log = (t)=> document.getElementById("log").innerText = t;

// escena
const scene = new THREE.Scene();

// cámara
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 3;

// renderer
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// luz
scene.add(new THREE.AmbientLight(0xffffff, 2));

// cubo TEST (SIEMPRE DEBE VERSE)
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshBasicMaterial({ color:0x00ffcc })
);
scene.add(cube);

log("CUBE OK");

/* GLB TEST */
const loader = new GLTFLoader();

loader.load(
  "./espacio.glb",

  function(gltf){

    log("GLB CARGADO ✔");

    const obj = gltf.scene;
    scene.add(obj);

  },

  function(xhr){
    log("CARGANDO " + (xhr.loaded / xhr.total * 100).toFixed(2) + "%");
  },

  function(error){
    log("ERROR GLB ❌ " + error.message);
    console.log(error);
  }
);

// loop
function animate(){
  requestAnimationFrame(animate);
  cube.rotation.y += 0.02;
  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
