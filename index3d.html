<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Escena 3D</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

/* ================= SCENE ================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

/* ================= CAMERA ================= */
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 1.5, 5);

/* ================= RENDERER ================= */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

/* ================= LIGHT ================= */
const light = new THREE.AmbientLight(0xffffff, 1.5);
scene.add(light);

/* ================= LOADER ================= */
const loader = new GLTFLoader();

/* ================= MODELS ================= */

function loadModel(file, x, y, z, scale = 1) {
  loader.load(file, (gltf) => {
    const obj = gltf.scene;
    obj.position.set(x, y, z);
    obj.scale.set(scale, scale, scale);
    scene.add(obj);
  });
}

/* 🔽 TUS ARCHIVOS (MISMA CARPETA) */
loadModel("habitacion.glb", 0, 0, 0, 1);
loadModel("avatar.glb", 0, 0, 0, 1);
loadModel("puerta.glb", 2, 0, 0, 1);
loadModel("espacio.glb", 0, 0, -5, 1);

/* ================= LOOP ================= */
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();

/* ================= RESIZE ================= */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
