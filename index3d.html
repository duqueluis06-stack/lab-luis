<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>3D LAB LUIS FIX</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#back {
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
  padding:10px;
  background:#00ffcc;
  color:black;
  font-weight:bold;
  text-decoration:none;
}
</style>
</head>

<body>

<a id="back" href="experimentos.html">⬅ Volver</a>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// 📷 cámara correcta
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

// 🔥 MUY IMPORTANTE: cámara lejos
camera.position.set(0, 2, 8);

// 🔲 renderer
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 luz potente
const light = new THREE.AmbientLight(0xffffff, 2);
scene.add(light);

// 🔦 luz direccional (clave)
const dir = new THREE.DirectionalLight(0xffffff, 2);
dir.position.set(5,5,5);
scene.add(dir);

// 🧊 CUBO DE PRUEBA (NO FALLA NUNCA)
const geo = new THREE.BoxGeometry();
const mat = new THREE.MeshStandardMaterial({ color: 0x00ffcc });
const cube = new THREE.Mesh(geo, mat);

scene.add(cube);

// 🎯 mover cubo
cube.position.set(0,0,0);

// 🔁 animación
function animate() {
  requestAnimationFrame(animate);

  cube.rotation.x += 0.01;
  cube.rotation.y += 0.01;

  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
