<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Avatar Clean</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  canvas { display:block; }
  #back {
    position:absolute; top:10px; left:10px; z-index:10;
    padding:8px 12px; border:1px solid #0ff; color:#0ff;
    background:rgba(0,0,0,0.6); cursor:pointer; border-radius:6px;
  }
</style>
</head>
<body>

<button id="back">⬅ BACK</button>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* base */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 1.8, 4);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* luz (mejor que antes) */
scene.add(new THREE.HemisphereLight(0xffffff, 0x222222, 1.5));
const dir = new THREE.DirectionalLight(0xffffff, 1.2);
dir.position.set(3,5,2);
scene.add(dir);

/* suelo */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(30,30),
  new THREE.MeshStandardMaterial({ color:0x0f0f0f })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* ====== AVATAR (proporciones humanas simples) ====== */
const avatar = new THREE.Group();

/* material suave */
const matBody = new THREE.MeshStandardMaterial({ color:0x4fd1c5, roughness:0.6, metalness:0.1 });
const matHead = new THREE.MeshStandardMaterial({ color:0xf1d0b5, roughness:0.7 });

/* tronco */
const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.8, 8, 16), matBody);
torso.position.y = 1.2;
avatar.add(torso);

/* cabeza */
const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 24, 24), matHead);
head.position.y = 1.9;
avatar.add(head);

/* brazos */
const armL = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.6, 8, 12), matBody);
armL.position.set(-0.45, 1.25, 0);
avatar.add(armL);

const armR = armL.clone();
armR.position.x = 0.45;
avatar.add(armR);

/* piernas */
const legL = new THREE.Mesh(new THREE.CapsuleGeometry(0.1, 0.8, 8, 12), matBody);
legL.position.set(-0.18, 0.5, 0);
avatar.add(legL);

const legR = legL.clone();
legR.position.x = 0.18;
avatar.add(legR);

scene.add(avatar);

/* ====== IA simple (explora) ====== */
let target = new THREE.Vector3(2, 0, 2);
function newTarget(){
  target.set((Math.random()-0.5)*10, 0, (Math.random()-0.5)*10);
}

/* ====== animación de caminar (ciclo suave) ====== */
let t = 0;

function animate(){
  requestAnimationFrame(animate);

  const pos = avatar.position;
  const dirV = new THREE.Vector3().subVectors(target, pos);
  const dist = dirV.length();

  if(dist < 0.4) newTarget();
  else {
    dirV.normalize();
    pos.addScaledVector(dirV, 0.025);
    avatar.lookAt(target);
  }

  /* ciclo */
  t += 0.12;
  const swing = Math.sin(t) * 0.7;

  legL.rotation.x = swing;
  legR.rotation.x = -swing;

  armL.rotation.x = -swing * 0.8;
  armR.rotation.x = swing * 0.8;

  renderer.render(scene, camera);
}

animate();

/* back */
document.getElementById("back").onclick = () => history.back();

/* resize */
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
