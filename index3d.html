<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LAB LUIS 3D ENGINE</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#000;
}

#log {
  position:absolute;
  top:10px;
  left:10px;
  color:#00ff00;
  font-family:monospace;
  font-size:12px;
  z-index:10;
  white-space:pre;
}
</style>

<!-- Three.js CLÁSICO (NO MODULE) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

</head>

<body>

<div id="log">BOOT</div>

<script>

const log = (t)=>document.getElementById("log").innerText += "\n"+t;

log("✔ INIT");

// 🧠 escena
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

// cámara
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  2000
);

camera.position.set(0,2,6);

// renderer
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

log("✔ RENDER OK");

// luz fuerte (clave GLB móvil)
const light = new THREE.AmbientLight(0xffffff, 2);
scene.add(light);

const dir = new THREE.DirectionalLight(0xffffff, 2);
dir.position.set(5,10,5);
scene.add(dir);

// 🧊 cubo control (siempre visible)
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(),
  new THREE.MeshNormalMaterial()
);
scene.add(cube);

log("✔ CUBE OK");

// loader GLB
const loader = new THREE.GLTFLoader();

// 🔥 función segura GLB
function loadGLB(name, file, x,y,z, color){

  loader.load(file, function(gltf){

    const obj = gltf.scene;

    obj.position.set(x,y,z);

    obj.scale.set(1,1,1);

    scene.add(obj);

    log("✔ "+name);

    // 🧪 marcador visual (IMPORTANTE DEBUG)
    const marker = new THREE.Mesh(
      new THREE.BoxGeometry(0.4,0.4,0.4),
      new THREE.MeshBasicMaterial({ color: color })
    );

    marker.position.set(x,y+1,z);
    scene.add(marker);

  }, undefined, function(err){

    log("❌ "+name);

  });

}

// 📦 TU ESCENA
loadGLB("avatar","avatar.glb",0,0,0,0xff0000);
loadGLB("habitacion","habitacion.glb",0,-2,0,0x00ff00);
loadGLB("puerta","puerta.glb",3,0,0,0x0000ff);
loadGLB("espacio","espacio.glb",0,0,-8,0xffff00);

// 🔁 loop
function animate(){
  requestAnimationFrame(animate);

  cube.rotation.y += 0.02;
  cube.rotation.x += 0.01;

  renderer.render(scene,camera);
}

animate();

// resize fix
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
