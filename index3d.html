<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DEBUG GLB REAL</title>
  <style>
    body { margin:0; background:black; color:lime; font-family:monospace; }
    #log { position:fixed; top:10px; left:10px; }
  </style>
</head>

<body>

<div id="log">INIT...</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

const log = (t) => document.getElementById("log").innerText = t;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const loader = new GLTFLoader();

log("LOADING GLB...");

loader.load(
  "./avatar.glb",

  (gltf) => {
    log("GLB LOADED ✔");

    const obj = gltf.scene;
    scene.add(obj);

    console.log(obj);
  },

  (xhr) => {
    log("LOADING " + (xhr.loaded / xhr.total * 100).toFixed(1) + "%");
  },

  (err) => {
    log("ERROR ❌ GLB NOT LOADED");
    console.error(err);
  }
);

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
