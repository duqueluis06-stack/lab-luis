<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escena 3D - Lab Luis</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* botón volver */
#back {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
  padding: 10px 14px;
  background: #00ffcc;
  color: black;
  font-weight: bold;
  text-decoration: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<a id="back" href="experimentos.html">⬅ Volver</a>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  2000
);

camera.position.set(0, 1.5, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const light = new THREE.AmbientLight(0xffffff, 2);
scene.add(light);

const loader = new GLTFLoader();

function loadModel(file, x, y, z) {
  loader.load(file, (gltf) => {
    gltf.scene.position.set(x, y, z);
    scene.add(gltf.scene);
  });
}

loadModel("avatar.glb", 0, 0, 0);
loadModel("habitacion.glb", 0, 0, 0);
loadModel("puerta.glb", 2, 0, 0);
loadModel("espacio.glb", 0, 0, -8);

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
