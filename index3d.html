<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GLB FORCE TEST</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
#log { position:absolute; top:10px; left:10px; color:white; font-family:monospace; }
</style>
</head>

<body>

<div id="log">BOOT</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

const log = (t)=> document.getElementById("log").innerText = t;

/* SCENE */
const scene = new THREE.Scene();

/* CAMERA */
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,1,3);

/* RENDER */
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHTS (IMPORTANTE PARA GLB NEGRO) */
scene.add(new THREE.AmbientLight(0xffffff, 2));

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

/* CUBE TEST */
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshBasicMaterial({ color:0x00ffcc })
);
scene.add(cube);

log("CUBE OK");

/* GLB */
const loader = new THREE.GLTFLoader();

loader.load(
  "./espacio.glb",

  function(gltf){

    const model = gltf.scene;

    /* 🔥 FORZAR VISIBILIDAD */
    model.position.set(0,0,0);
    model.scale.set(5,5,5);

    scene.add(model);

    log("GLB ADDED ✔");

    console.log(model);

  },

  function(xhr){
    log("LOADING " + (xhr.loaded / xhr.total * 100).toFixed(2) + "%");
  },

  function(error){
    log("GLB ERROR ❌");
    console.log(error);
  }
);

/* LOOP */
function animate(){
  requestAnimationFrame(animate);

  cube.rotation.y += 0.02;

  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
