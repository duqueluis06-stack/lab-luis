<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Avatar IA</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

/* 🌌 escena */
const scene = new THREE.Scene();

/* 🎥 cámara */
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

/* 🖥 renderer */
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* 💡 luz */
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

/* 🏠 suelo (habitación base) */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* 🚪 puerta (referencia IA) */
const door = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,0.2),
  new THREE.MeshStandardMaterial({ color:0x4444ff })
);
door.position.set(3,1,0);
scene.add(door);

/* 🧍 avatar */
const loader = new GLTFLoader();

let avatar, mixer, action;

/* 🧠 estado IA */
let target = new THREE.Vector3(3,0,0); // puerta
let state = "goToDoor";

loader.load(
  "https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb",
  (gltf) => {

    avatar = gltf.scene;
    avatar.scale.set(0.5,0.5,0.5);
    scene.add(avatar);

    mixer = new THREE.AnimationMixer(avatar);

    const clip = THREE.AnimationClip.findByName(gltf.animations, "Walking");
    action = mixer.clipAction(clip);
    action.play();
  }
);

/* 🤖 IA simple */
function updateAI() {
  if(!avatar) return;

  const pos = avatar.position;

  /* distancia a objetivo */
  const dist = pos.distanceTo(target);

  if(state === "goToDoor") {

    /* moverse hacia la puerta */
    const dir = new THREE.Vector3().subVectors(target, pos).normalize();
    avatar.position.add(dir.multiplyScalar(0.02));

    avatar.lookAt(target);

    if(dist < 0.5) {
      state = "wander";
      setRandomTarget();
    }
  }

  if(state === "wander") {

    const dir = new THREE.Vector3().subVectors(target, pos).normalize();
    avatar.position.add(dir.multiplyScalar(0.015));

    avatar.lookAt(target);

    if(dist < 0.5) {
      setRandomTarget();
    }
  }
}

/* 🎯 nuevo destino aleatorio */
function setRandomTarget() {
  target.set(
    (Math.random()-0.5)*6,
    0,
    (Math.random()-0.5)*6
  );
}

/* 🔁 loop */
function animate() {
  requestAnimationFrame(animate);

  updateAI();

  if(mixer) mixer.update(0.016);

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
