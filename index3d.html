<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Black Hole Space</title>

<style>
  body {
    margin:0;
    background:black;
    overflow:hidden;
  }

  iframe{
    width:100vw;
    height:100vh;
    border:none;
  }

  #back{
    position:fixed;
    top:10px;
    left:10px;
    z-index:9999;
    padding:10px 14px;
    border:1px solid #0ff;
    color:#0ff;
    background:rgba(0,0,0,0.7);
    font-family:monospace;
  }
</style>
</head>

<body>

<button id="back">⬅ BACK</button>

<!-- 🌌 BLACK HOLE CLEAN -->
<iframe
id="sketch"
title="Blackhole"
src="https://sketchfab.com/models/74cbeaeae2174a218fe9455d77902b5c/embed?autostart=1&autospin=1&ui_controls=0&ui_infos=0&ui_watermark=0&ui_stop=0"
allow="autoplay; fullscreen; xr-spatial-tracking"
xr-spatial-tracking
execution-while-out-of-viewport
execution-while-not-rendered
web-share>
</iframe>

<script>

/* 🔙 BACK FIABLE */
document.getElementById("back").onclick = () => {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = "index.html"; // fallback seguro
  }
};

</script>

</body>
</html>
