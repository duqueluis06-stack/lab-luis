<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TEST ESPACIO GLB</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

console.log("BOOT SPACE TEST");

// escena
const scene = new THREE.Scene();

// cámara
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 1, 3);

// renderer
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// luz (IMPORTANTE para GLB no emisivo)
const light = new THREE.AmbientLight(0xffffff, 2);
scene.add(light);

// loader
const loader = new GLTFLoader();

/* 🔥 SOLO ESPACIO */
loader.load(
  "./espacio.glb",

  function(gltf){

    const model = gltf.scene;

    model.position.set(0,0,0);
    model.scale.set(1,1,1);

    scene.add(model);

    console.log("✔ ESPACIO CARGADO");

  },

  function(xhr){
    console.log("CARGANDO:", (xhr.loaded / xhr.total * 100).toFixed(2) + "%");
  },

  function(error){
    console.log("❌ ERROR ESPACIO:", error);
  }
);

// loop
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
