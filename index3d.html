<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Black Hole Space</title>

<style>
  body {
    margin:0;
    background:black;
    overflow:hidden;
  }

  iframe {
    width:100vw;
    height:100vh;
    border:none;
  }

  #back{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    padding:10px 14px;
    border:1px solid #0ff;
    color:#0ff;
    background:rgba(0,0,0,0.6);
    cursor:pointer;
    font-family:monospace;
  }

  #tap {
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    padding:10px 16px;
    border:1px solid #fff;
    color:#fff;
    background:rgba(0,0,0,0.5);
    font-family:monospace;
  }
</style>
</head>

<body>

<button id="back">⬅ BACK</button>
<div id="tap">TAP TO ACTIVATE</div>

<!-- 🌌 BLACK HOLE -->
<iframe
id="sketch"
title="Blackhole"
src="https://sketchfab.com/models/74cbeaeae2174a218fe9455d77902b5c/embed?autostart=1&autospin=1&transparent=1&ui_controls=0"
allow="autoplay; fullscreen; xr-spatial-tracking"
xr-spatial-tracking
execution-while-out-of-viewport
execution-while-not-rendered
web-share>
</iframe>

<script>
/* back */
document.getElementById("back").onclick = () => history.back();

/* 🎯 desbloqueo móvil (SOLUCIÓN REAL PARA PAUSE) */
const tap = document.getElementById("tap");
const iframe = document.getElementById("sketch");

function activate(){
  tap.style.display = "none";

  /* recarga iframe con autostart forzado */
  iframe.src = iframe.src + "&autostart=1&autospin=1";
}

tap.addEventListener("click", activate);
document.body.addEventListener("touchstart", activate, { once:true });
</script>

</body>
</html>
