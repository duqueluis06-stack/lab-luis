<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,4,10);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* luz estable */
scene.add(new THREE.AmbientLight(0xffffff, 1.8));

/* suelo */
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(12,12),
  new THREE.MeshBasicMaterial({ color:0x111111 })
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* avatar */
const avatar = new THREE.Mesh(
  new THREE.BoxGeometry(0.6,1.2,0.6),
  new THREE.MeshBasicMaterial({ color:0x00ffcc })
);
avatar.position.y = 0.6;
scene.add(avatar);

/* puerta */
const door = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,0.2),
  new THREE.MeshBasicMaterial({ color:0x0044ff })
);
door.position.set(5,1,0);
scene.add(door);

/* movimiento suave */
let t = 0;

function animate(){

  requestAnimationFrame(animate);

  t += 0.01;

  /* movimiento más suave */
  avatar.position.x = Math.sin(t) * 2;
  avatar.position.z = Math.cos(t) * 2;

  /* cámara SUAVE (sin “golpes”) */
  camera.position.x += (avatar.position.x - camera.position.x) * 0.05;
  camera.position.z += (avatar.position.z + 6 - camera.position.z) * 0.05;
  camera.lookAt(avatar.position);

  /* puerta ligera animación */
  door.rotation.y = Math.sin(t*0.5) * 0.2;

  renderer.render(scene,camera);
}

animate();

</script>
