<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>IA Stable</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  canvas { display:block; }
  #back {
    position:absolute; top:10px; left:10px; z-index:10;
    padding:8px 12px; border:1px solid #0ff; color:#0ff;
    background:rgba(0,0,0,0.6); cursor:pointer;
  }
</style>
</head>

<body>

<button id="back">⬅ BACK</button>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* base */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,3,6);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* luz */
scene.add(new THREE.HemisphereLight(0xffffff, 0x333333, 2));

/* suelo */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* 🤖 avatar */
const avatar = new THREE.Group();

/* cuerpo */
const body = new THREE.Mesh(
  new THREE.BoxGeometry(0.6,1.2,0.4),
  new THREE.MeshStandardMaterial({ color:0x00ffff })
);
avatar.add(body);

/* cabeza */
const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.3),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);
head.position.y = 1;
avatar.add(head);

/* piernas simuladas */
const legL = new THREE.Mesh(
  new THREE.BoxGeometry(0.2,0.6,0.2),
  new THREE.MeshStandardMaterial({ color:0x00aaaa })
);
legL.position.set(-0.15,-0.9,0);
avatar.add(legL);

const legR = legL.clone();
legR.position.x = 0.15;
avatar.add(legR);

scene.add(avatar);

/* 🧠 IA */
let target = new THREE.Vector3(2,0,2);

function newTarget(){
  target.set(
    (Math.random()-0.5)*8,
    0,
    (Math.random()-0.5)*8
  );
}

/* animación */
let step = 0;

function animate(){
  requestAnimationFrame(animate);

  const dir = new THREE.Vector3().subVectors(target, avatar.position);
  const dist = dir.length();

  if(dist < 0.3){
    newTarget();
  } else {
    dir.normalize();
    avatar.position.add(dir.multiplyScalar(0.03));
    avatar.lookAt(target);

    /* caminar (piernas) */
    step += 0.1;
    legL.rotation.x = Math.sin(step)*0.5;
    legR.rotation.x = -Math.sin(step)*0.5;
  }

  renderer.render(scene, camera);
}

animate();

/* back */
document.getElementById("back").onclick = () => window.history.back();

/* resize */
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
