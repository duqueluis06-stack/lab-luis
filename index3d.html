<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Avatar IA Stable</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* escena */
const scene = new THREE.Scene();

/* cámara */
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

/* renderer */
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* luz */
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));

/* suelo */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshStandardMaterial({ color:0x111111 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* 🤖 avatar (cuerpo simple) */
const avatar = new THREE.Group();

/* cuerpo */
const body = new THREE.Mesh(
  new THREE.BoxGeometry(0.5,1,0.3),
  new THREE.MeshStandardMaterial({ color:0x00ffff })
);
avatar.add(body);

/* cabeza */
const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.25),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);
head.position.y = 0.8;
avatar.add(head);

scene.add(avatar);

/* 🧠 IA */
let target = new THREE.Vector3(2,0,2);

function newTarget(){
  target.set(
    (Math.random()-0.5)*6,
    0,
    (Math.random()-0.5)*6
  );
}

/* animación */
function animate(){
  requestAnimationFrame(animate);

  const dir = new THREE.Vector3().subVectors(target, avatar.position);
  const dist = dir.length();

  if(dist < 0.2){
    newTarget();
  } else {
    dir.normalize();
    avatar.position.add(dir.multiplyScalar(0.02));
    avatar.lookAt(target);
  }

  renderer.render(scene, camera);
}

animate();

/* resize */
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
