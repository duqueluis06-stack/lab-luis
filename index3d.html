<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GLB Viewer Stable</title>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

/* ================= ESCENA ================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

/* ================= CÁMARA ================= */
const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth / window.innerHeight,
  0.1,
  10000
);
camera.position.set(0, 2, 5);

/* ================= RENDER ================= */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ================= LUCES ================= */
const lightA = new THREE.AmbientLight(0xffffff, 1.2);
scene.add(lightA);

const lightB = new THREE.DirectionalLight(0xffffff, 2);
lightB.position.set(5, 10, 5);
scene.add(lightB);

/* ================= LOADER ================= */
const loader = new GLTFLoader();

/* ================= MODELO ================= */
loader.load(
  "./avatar.glb",

  function (gltf) {

    const model = gltf.scene;

    /* 📦 bounding box real */
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    /* 🎯 centrar */
    model.position.sub(center);

    /* 📏 escala automática */
    const maxSize = Math.max(size.x, size.y, size.z);
    const scale = 2 / maxSize;
    model.scale.setScalar(scale);

    scene.add(model);

    /* 🎯 cámara al centro */
    camera.lookAt(0, 0, 0);

    console.log("✔ GLB cargado correctamente");
  },

  function (progress) {
    console.log("Loading...", (progress.loaded / progress.total * 100).toFixed(1) + "%");
  },

  function (error) {
    console.error("❌ ERROR GLB:", error);
  }
);

/* ================= LOOP ================= */
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();

/* ================= RESIZE ================= */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
