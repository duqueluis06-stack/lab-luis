<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>3D SAFE DEBUG</title>

<style>
body { margin:0; overflow:hidden; background:#000; color:#0f0; font-family:monospace; }
#msg { position:absolute; top:10px; left:10px; z-index:10; }
</style>
</head>

<body>

<div id="msg">INIT...</div>

<script type="module">

const msg = (t) => document.getElementById("msg").innerText = t;

try {

import("https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js").then((THREE) => {

  msg("THREE OK");

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.z = 5;

  const renderer = new THREE.WebGLRenderer();
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // 🔥 CUBO OBLIGATORIO (prueba visual)
  const geo = new THREE.BoxGeometry();
  const mat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
  const cube = new THREE.Mesh(geo, mat);
  scene.add(cube);

  function animate(){
    requestAnimationFrame(animate);
    cube.rotation.y += 0.02;
    renderer.render(scene, camera);
  }

  animate();

});

} catch (e) {
  msg("ERROR JS: " + e);
}

</script>

</body>
</html>
