<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>3D LUIS FIX REAL</title>

<style>
body { margin:0; overflow:hidden; background:black; }
#log {
  position:absolute;
  top:10px;
  left:10px;
  color:#0f0;
  font-family:monospace;
}
</style>

<!-- 🔥 VERSION CLÁSICA (NO MODULE) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

</head>

<body>

<div id="log">BOOT</div>

<script>

const log = (t)=>document.getElementById("log").innerText += "\n"+t;

if(typeof THREE === "undefined"){
  log("❌ THREE NO CARGA");
}else{
  log("✔ THREE OK");
}

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,2,6);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 luz fuerte
const light = new THREE.AmbientLight(0xffffff, 3);
scene.add(light);

// 🧊 cubo seguro (siempre visible)
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(),
  new THREE.MeshBasicMaterial({color:0x00ff00})
);
scene.add(cube);

// loader
const loader = new THREE.GLTFLoader();

function load(name, file, x,y,z){

  loader.load(file, function(gltf){

    gltf.scene.position.set(x,y,z);

    scene.add(gltf.scene);

    log("✔ "+name);

  }, undefined, function(e){

    log("❌ "+name);

  });

}

load("avatar","avatar.glb",0,0,0);
load("habitacion","habitacion.glb",0,-2,0);
load("puerta","puerta.glb",3,0,0);
load("espacio","espacio.glb",0,0,-10);

// loop
function animate(){
  requestAnimationFrame(animate);

  cube.rotation.y += 0.02;

  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
