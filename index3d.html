<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ENGINE FINAL LUIS</title>

<style>
body { margin:0; overflow:hidden; background:black; }
#log {
  position:absolute;
  top:10px;
  left:10px;
  color:#0f0;
  font-family:monospace;
  z-index:10;
}
</style>

<!-- 🔥 IMPORT FIJO (CRÍTICO) -->
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

window.THREE = THREE;
window.GLTFLoader = GLTFLoader;
</script>

</head>

<body>

<div id="log">BOOT</div>

<script type="module">

const log = (t)=>document.getElementById("log").innerText += "\n"+t;

const THREE = window.THREE;
const GLTFLoader = window.GLTFLoader;

if(!THREE || !GLTFLoader){
  log("❌ FAIL IMPORT MODULES");
  throw new Error("modules not loaded");
}

log("✔ modules OK");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 5000);
camera.position.set(0,2,6);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 luz extrema (anti invisibilidad)
scene.add(new THREE.AmbientLight(0xffffff, 3));
const dir = new THREE.DirectionalLight(0xffffff, 3);
dir.position.set(10,10,10);
scene.add(dir);

// 🧊 fallback obligatorio
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(),
  new THREE.MeshBasicMaterial({color:0x00ff00})
);
scene.add(cube);

// loader seguro
const loader = new GLTFLoader();

function load(name,file,pos){

  loader.load(file,(gltf)=>{

    const obj = gltf.scene;

    obj.position.set(pos.x,pos.y,pos.z);

    scene.add(obj);

    log("✔ "+name);

  },undefined,(err)=>{

    log("❌ "+name);

  });

}

// 🧩 carga escena
load("avatar","avatar.glb",{x:0,y:0,z:0});
load("room","habitacion.glb",{x:0,y:-2,z:0});
load("door","puerta.glb",{x:3,y:0,z:0});
load("space","espacio.glb",{x:0,y:0,z:-10});

// 🔁 loop
function animate(){
  requestAnimationFrame(animate);

  cube.rotation.y += 0.02;

  renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
