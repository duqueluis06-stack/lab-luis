<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>proyectos.html</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  overflow:hidden;
  font-family:Arial;
}

/* BACKGROUND */
#bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("fondo.jpg") center/cover no-repeat;
  filter:brightness(0.6);
  z-index:-2;
}

/* BUTTON START */
#startBtn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:14px 28px;
  font-size:18px;
  background:cyan;
  border:none;
  cursor:pointer;
  z-index:10;
  border-radius:10px;
}

/* EXIT */
#exit{
  position:absolute;
  bottom:20px;
  right:20px;
  padding:10px 18px;
  background:#00ffff;
  border:none;
  cursor:pointer;
  z-index:20;
}

/* SCENES */
.scene{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  align-items:center;
  justify-content:center;
}

/* PORTAL */
iframe{
  width:80%;
  height:80%;
  border:0;
}

/* ALIEN CIRCLE FIX BIG + FULL VERTICAL */
#alienWrap{
  width:420px;
  height:420px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 0 70px cyan;
}

#alien{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
.textScroll{
  width:70%;
  font-size:20px;
  animation:scroll 10s linear;
  text-align:center;
}

@keyframes scroll{
  from{transform:translateY(100%);}
  to{transform:translateY(-120%);}
}

/* LUIS IMAGE FIX */
#luisImg{
  width:320px;
  border-radius:15px;
  box-shadow:0 0 40px #00ffcc;
}

/* YOUTUBE */
.yt{
  width:420px;
  height:240px;
  margin:10px;
}
</style>
</head>

<body>

<div id="bg"></div>

<button id="startBtn">INICIO</button>
<button id="exit">SALIR</button>

<!-- PORTAL -->
<div id="s0" class="scene">
  <iframe src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed"></iframe>
</div>

<!-- ALIEN -->
<div id="s1" class="scene">
  <div id="alienWrap">
    <video id="alien" muted playsinline>
      <source src="alien2-tele.mp4" type="video/mp4">
    </video>
  </div>
</div>

<!-- DESC -->
<div id="s2" class="scene">
  <div class="textScroll">
    TELETRANSPORTACIÓN ACTIVA<br>
    VIAJE TEMPORAL EN PROCESO<br>
    ESTABILIZACIÓN DE PORTAL CUÁNTICO<br>
    ANOMALÍA BIOLÓGICA DETECTADA
  </div>
</div>

<!-- LUIS -->
<div id="s3" class="scene">
  <img id="luisImg" src="luis.jpg">
</div>

<!-- YT -->
<div id="s4" class="scene">
  <div>
    <iframe class="yt" src="https://www.youtube.com/embed/BPltDt8rhsQ"></iframe>
    <iframe class="yt" src="https://www.youtube.com/embed/yizhsJJO3-s"></iframe>
  </div>
</div>

<script>

// AUDIO SIMPLE ESPACIAL
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type="sine";
  osc.frequency.value=110;
  gain.gain.value=0.06;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime+0.15);
}

// ALIEN FIX
const alien = document.getElementById("alien");

function playAlien(){
  alien.currentTime = 0;
  alien.play().catch(()=>{});
}

// SCENES
const scenes=["s0","s1","s2","s3","s4"];
let i=0;

function show(n){
  document.querySelectorAll(".scene").forEach(s=>s.style.display="none");
  document.getElementById(scenes[n]).style.display="flex";
}

// FLOW START ONLY ON BUTTON
document.getElementById("startBtn").onclick=async()=>{
  document.getElementById("startBtn").style.display="none";
  await audioCtx.resume();
  next();
};

function next(){
  show(i);

  if(i===0) beep();
  if(i===1) playAlien();

  i++;

  if(i<scenes.length){
    setTimeout(next,7000);
  }
}

// EXIT FIX REAL
document.getElementById("exit").onclick=()=>{
  location.reload();
};

</script>

</body>
</html>
