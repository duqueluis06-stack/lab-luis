<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>proyectos.html</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#000;
  color:white;
}

/* 🌌 STAR FIELD REAL */
#stars{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 10% 20%, #00ffff22 0 2px, transparent 3px),
    radial-gradient(circle at 30% 80%, #ffffff18 0 1px, transparent 2px),
    radial-gradient(circle at 70% 40%, #00ffff33 0 2px, transparent 3px),
    radial-gradient(circle at 90% 10%, #ff00ff22 0 1px, transparent 2px),
    #000;
  animation:moveStars 18s linear infinite;
  z-index:-3;
}

@keyframes moveStars{
  0%{transform:translateY(0);}
  100%{transform:translateY(-120px);}
}

/* 🌫 GLOBAL BACKDROP */
#vignette{
  position:fixed;
  inset:0;
  background:radial-gradient(circle, transparent 40%, black 85%);
  z-index:-2;
}

/* 🧿 NEON START BUTTON (CIRCLE) */
#startBtn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid #00ffff;
  background:transparent;
  color:#00ffff;
  cursor:pointer;
  box-shadow:0 0 25px #00ffff, inset 0 0 15px #00ffff;
  font-weight:bold;
  letter-spacing:1px;
  z-index:10;
}

/* 🚪 EXIT */
#exit{
  position:absolute;
  bottom:18px;
  right:18px;
  padding:10px 16px;
  border-radius:10px;
  border:none;
  background:#00ffff;
  cursor:pointer;
  box-shadow:0 0 20px #00ffff;
  z-index:20;
}

/* 🎬 SCENES */
.scene{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
}

/* 🌐 SKETCHFAB FIX (NO DUPLICATION, NO AUTO UI CLUTTER) */
iframe{
  width:82%;
  height:82%;
  border:0;
  border-radius:14px;
  box-shadow:0 0 50px #00ffff33;
}

/* 👽 ALIEN FIX FULL HEAD PRESERVATION */
#alienWrap{
  width:500px;
  height:500px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 0 90px cyan;
  background:black;
}

#alien{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.22); /* 🔥 FIX HEAD LOSS */
}

/* 📡 TEXT CINEMATIC */
.textScroll{
  width:70%;
  font-size:22px;
  text-align:center;
  line-height:1.7;
  animation:scroll 9s linear forwards;
}

@keyframes scroll{
  0%{transform:translateY(120%);}
  100%{transform:translateY(-130%);}
}

/* 🧑 LUIS FIX */
#luisImg{
  width:360px;
  border-radius:16px;
  box-shadow:0 0 60px #00ffcc;
}

/* 📺 YOUTUBE FINAL */
.yt{
  width:420px;
  height:240px;
  margin:10px;
  border-radius:12px;
}

/* layout */
.flex{
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<div id="stars"></div>
<div id="vignette"></div>

<button id="startBtn">INICIO</button>
<button id="exit">SALIR</button>

<!-- 0 PORTAL -->
<div id="s0" class="scene">
  <iframe
    src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed?autostart=1&ui_infos=0&ui_controls=0">
  </iframe>
</div>

<!-- 1 ALIEN -->
<div id="s1" class="scene">
  <div id="alienWrap">
    <video id="alien" muted playsinline preload="auto">
      <source src="alien2-tele.mp4" type="video/mp4">
    </video>
  </div>
</div>

<!-- 2 DESC -->
<div id="s2" class="scene">
  <div class="textScroll">
    TELETRANSPORTACIÓN ACTIVA<br>
    PORTAL CUÁNTICO ESTABLE<br>
    INTERFAZ DIMENSIONAL SINCRONIZADA<br>
    DESPLAZAMIENTO TEMPORAL EN PROGRESO
  </div>
</div>

<!-- 3 LUIS -->
<div id="s3" class="scene">
  <img id="luisImg" src="Luis.jpg">
</div>

<!-- 4 YOUTUBE -->
<div id="s4" class="scene flex">
  <iframe class="yt" src="https://www.youtube.com/embed/BPltDt8rhsQ?autoplay=0"></iframe>
  <iframe class="yt" src="https://www.youtube.com/embed/yizhsJJO3-s?autoplay=0"></iframe>
</div>

<script>

const scenes=["s0","s1","s2","s3","s4"];
let i=0;

/* 🎧 AUDIO MINIMAL ESPACIAL */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function pulse(){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.type="sine";
  o.frequency.value=90;
  g.gain.value=0.04;

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start();
  o.stop(audioCtx.currentTime+0.18);
}

/* 👽 ALIEN FIX */
const alien = document.getElementById("alien");

function playAlien(){
  alien.currentTime=0;
  alien.play().catch(()=>{});
}

/* 🎬 SCENE CONTROL */
function show(n){
  document.querySelectorAll(".scene").forEach(s=>s.style.display="none");
  document.getElementById(scenes[n]).style.display="flex";
}

/* 🚀 START */
document.getElementById("startBtn").onclick=async()=>{
  document.getElementById("startBtn").style.display="none";
  await audioCtx.resume();
  next();
};

function next(){
  show(i);

  if(i===0) pulse();
  if(i===1) playAlien();

  i++;

  if(i<scenes.length){
    setTimeout(next,7500);
  }
}

/* 🚪 EXIT FIX REAL */
document.getElementById("exit").onclick=()=>{
  window.location.href="index.html";
};

</script>

</body>
</html>
