<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Teleport System</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-2;
}

#start{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:220px;
  height:220px;
  border-radius:50%;
  border:2px solid #00ffff;
  color:#00ffff;
  background:transparent;
  box-shadow:0 0 50px #00ffff;
  cursor:pointer;
  z-index:10;
}

#loader{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2;
}

.spinner{
  width:80px;
  height:80px;
  border:4px solid #222;
  border-top:4px solid #00ffff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

#sketchfabLayer{
  position:absolute;
  inset:0;
  display:none;
  z-index:1;
}

#skfb{
  width:100%;
  height:100%;
  border:0;
}

#alienLayer{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
  z-index:3;
}

#alien{
  height:90%;
}

#finalLayer{
  position:absolute;
  inset:0;
  display:none;
  z-index:4;
}

#infoPanel{
  position:absolute;
  top:20%;
  width:70%;
  left:15%;
  max-height:50%;
  overflow-y:auto;
  background:rgba(0,0,0,0.75);
  border:1px solid #00ffff;
  padding:20px;
  border-radius:10px;
  backdrop-filter:blur(6px);
  box-shadow:0 0 20px #00ffff;
}

#yt{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
}

#credits{
  position:absolute;
  bottom:70px;
  width:100%;
  text-align:center;
  font-size:12px;
  color:#00ff88;
}

#exit{
  position:absolute;
  bottom:20px;
  right:20px;
  z-index:9999;
  background:#00ffff;
  border:none;
  padding:10px 14px;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<button id="start">TELETRANSPORTACIÓN</button>
<button id="exit">SALIR</button>

<!-- AUDIO -->
<audio id="ambientSound" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_space.mp3">
</audio>

<audio id="portalSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/sci-fi.mp3">
</audio>

<audio id="alienSound">
<source src="https://cdn.pixabay.com/audio/2022/03/22/alien.mp3">
</audio>

<div id="loader">
<div class="spinner"></div>
</div>

<div id="sketchfabLayer">
<iframe id="skfb"
data-src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed?autostart=1&ui_controls=0&ui_infos=0&ui_watermark=0&ui_annotations=0&ui_hint=0"
allow="autoplay; fullscreen"></iframe>
</div>

<div id="alienLayer">
<video id="alien" playsinline preload="metadata">
<source src="alien2-tele.mp4">
</video>
</div>

<div id="finalLayer">

<div id="infoPanel">
<h2>PROTOCOLO DE TELETRANSPORTACIÓN</h2>
<p>Transferencia avanzada de estado físico e informacional.</p>
</div>

<div id="yt">
<iframe width="320" height="180"
src="https://www.youtube.com/embed/BPltDt8rhsQ"
allowfullscreen></iframe>

<iframe width="320" height="180"
src="https://www.youtube.com/embed/yizhsJJO3-s"
allowfullscreen></iframe>
</div>

<div id="credits">
Sketchfab experience system
</div>

</div>

<script>

/* STARFIELD */
const c=document.getElementById("stars");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let stars=[];
for(let i=0;i<150;i++){
stars.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
ctx.fillStyle="black";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#00ffff";
stars.forEach(s=>{
s.y+=0.3;
if(s.y>c.height)s.y=0;
ctx.fillRect(s.x,s.y,1,1);
});

requestAnimationFrame(draw);
}
draw();

/* ELEMENTOS */
const start=document.getElementById("start");
const loader=document.getElementById("loader");
const skLayer=document.getElementById("sketchfabLayer");
const skfb=document.getElementById("skfb");
const alienLayer=document.getElementById("alienLayer");
const alien=document.getElementById("alien");
const finalLayer=document.getElementById("finalLayer");

const ambient=document.getElementById("ambientSound");
const portal=document.getElementById("portalSound");
const alienSound=document.getElementById("alienSound");

/* AUDIO SAFE SYSTEM */
function play(audio,vol){
if(!audio)return;
try{
audio.volume=vol;
audio.currentTime=0;
audio.play().catch(()=>{});
}catch(e){}
}

/* PRELOAD SKETCHFAB */
if(!skfb.src){
skfb.src=skfb.dataset.src;
}

/* START FLOW */
start.onclick=()=>{

start.remove();

play(ambient,0.3);
setTimeout(()=>play(portal,0.5),300);

loader.style.display="flex";

setTimeout(()=>{

loader.style.display="none";
skLayer.style.display="block";

setTimeout(()=>{

alienLayer.style.display="flex";

alien.play().catch(()=>{});
play(alienSound,0.6);

setTimeout(()=>{

alienLayer.style.display="none";
finalLayer.style.display="block";

},12000);

},5000);

},1200);

};

/* EXIT */
document.getElementById("exit").onclick=()=>{
ambient.pause();
portal.pause();
alienSound.pause();
location.reload();
};

</script>

</body>
</html>
