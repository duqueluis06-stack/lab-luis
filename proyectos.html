<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema Cuántico</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* 🌌 STARFIELD */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-2;
}

/* 🧿 START BUTTON */
#startBtn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:140px;
  height:140px;
  border-radius:50%;
  border:2px solid #00ffff;
  background:transparent;
  color:#00ffff;
  font-size:18px;
  box-shadow:0 0 40px #00ffff;
  cursor:pointer;
}

/* SCENES */
.scene{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
}

/* 🌐 SKETCHFAB */
iframe{
  width:85%;
  height:85%;
  border:0;
  border-radius:12px;
}

/* 👽 VIDEO */
.videoWrap{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  background:black;
}

#alienVideo{
  width:auto;
  height:100vh;
  max-width:100%;
  object-fit:contain;
}

/* 📡 TEXT */
#luisImg{
  width:220px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 0 30px #00ffff;
}

.credits{
  width:70%;
  text-align:center;
  line-height:1.7;
  animation:scroll 12s linear forwards;
}

@keyframes scroll{
  0%{transform:translateY(120%);}
  100%{transform:translateY(-130%);}
}

/* 🎥 CINEMA */
.cinema{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  width:90%;
}

.cinema iframe{
  width:100%;
  height:300px;
  border-radius:10px;
  box-shadow:0 0 20px #00ffff;
}

/* 🚪 EXIT */
#exitBtn{
  position:absolute;
  bottom:20px;
  right:20px;
  padding:10px 15px;
  background:#00ffff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<button id="startBtn">INICIO</button>

<!-- 🌐 PORTAL -->
<div id="s0" class="scene">
  <iframe src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed?autostart=1&autospin=1&ui_infos=0&ui_controls=0"></iframe>
</div>

<!-- 👽 ALIEN -->
<div id="s1" class="scene">
  <div class="videoWrap">
    <video id="alienVideo" muted playsinline preload="auto">
      <source src="alien2-tele.mp4" type="video/mp4">
    </video>
  </div>
</div>

<!-- 📡 CREDITS -->
<div id="s2" class="scene">
  <div>
    <img src="luis.JPG" id="luisImg">
    <div class="credits">
      TEORÍA CUÁNTICA Y MULTIDIMENSIONALIDAD<br><br>

      Superposición de estados<br>
      Transferencia de información cuántica<br>
      Universos paralelos acoplados<br>
      Distorsión espacio-tiempo<br>
      Observador como variable activa<br><br>

      SISTEMA EN FLUJO CONTINUO
    </div>
  </div>
</div>

<!-- 🎥 CINEMA -->
<div id="s3" class="scene">
  <div class="cinema">
    <iframe src="https://www.youtube.com/embed/BPltDt8rhsQ"></iframe>
    <iframe src="https://www.youtube.com/embed/yizhsJJO3-s"></iframe>
  </div>

  <button id="exitBtn">SALIR</button>
</div>

<script>

/* 🌌 STARFIELD */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let stars = Array.from({length:120}, () => ({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height,
  r: Math.random()*1.5
}));

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

draw();

/* 🎬 CONTROL */
let step = 0;
const alienVideo = document.getElementById("alienVideo");

function show(id){
  document.querySelectorAll(".scene").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="flex";
}

function next(){

  if(step === 0){
    show("s0");
    setTimeout(next, 7000);
  }

  else if(step === 1){
    show("s1");
    alienVideo.currentTime = 0;
    alienVideo.play();
    setTimeout(next, 5200);
  }

  else if(step === 2){
    show("s2");
    setTimeout(next, 12000);
  }

  else if(step === 3){
    show("s3");
  }

  step++;
}

/* 🚀 START */
document.getElementById("startBtn").onclick = () => {
  document.getElementById("startBtn").style.display="none";
  next();
};

/* 🚪 EXIT */
document.getElementById("exitBtn").onclick = () => {
  window.location.href = "index.html";
};

</script>

</body>
</html>
