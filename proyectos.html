<!-- 👽 ALIEN -->
<div id="alien">
<video id="alienVideo" muted playsinline>
    <source src="alien-kdp.mp4" type="video/mp4">
</video>
</div>

<audio id="alienVoice" src="alien-kdp.mp3"></audio>

<script>
(() => {

    const KEY = "alienPlayed";
    const alien = document.getElementById("alien");
    const video = document.getElementById("alienVideo");
    const audio = document.getElementById("alienVoice");

    function playAlien() {

        if (sessionStorage.getItem(KEY)) return;

        sessionStorage.setItem(KEY, "true");

        alien.style.opacity = "1";

        video.currentTime = 0;
        video.play().catch(()=>{});
        audio.play().catch(()=>{});

        setTimeout(() => {
            alien.style.opacity = "0";
            video.pause();
        }, 5000);
    }

    window.addEventListener("load", playAlien);

    document.addEventListener("click", () => {
        playAlien();
    }, { once: true });

})();
</script>
