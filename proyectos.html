<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Teleport System</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* 🌌 STARS */
canvas{
  position:fixed;
  inset:0;
  z-index:-2;
}

/* 🔘 START */
#start{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:220px;
  height:220px;
  border-radius:50%;
  border:2px solid #00ffff;
  color:#00ffff;
  background:transparent;
  box-shadow:0 0 50px #00ffff;
  cursor:pointer;
  z-index:10;
}

/* 🔄 LOADING SPINNER SKETCHFAB */
#loader{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2;
}

.spinner{
  width:80px;
  height:80px;
  border:4px solid #222;
  border-top:4px solid #00ffff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* 🔮 SKETCHFAB */
#sketchfabLayer{
  position:absolute;
  inset:0;
  display:none;
  z-index:1;
}

#skfb{
  width:100%;
  height:100%;
  border:0;
}

/* 👽 ALIEN */
#alienLayer{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
  z-index:3;
}

#alien{
  height:90%;
}

/* 🎬 FINAL */
#finalLayer{
  position:absolute;
  inset:0;
  display:none;
  z-index:4;
}

#luis{
  position:absolute;
  top:20px;
  right:20px;
  width:140px;
}

#text{
  position:absolute;
  bottom:-100%;
  width:60%;
  left:20%;
  animation:scroll 22s linear forwards;
  text-align:center;
}

@keyframes scroll{
  from{bottom:-100%;}
  to{bottom:120%;}
}

/* 📺 YOUTUBE */
#yt{
  position:absolute;
  bottom:90px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
}

/* 🚪 EXIT */
#exit{
  position:absolute;
  bottom:20px;
  right:20px;
  z-index:9999;
  background:#00ffff;
  border:none;
  padding:10px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<button id="start">TELETRANSPORTACIÓN</button>
<button id="exit">SALIR</button>

<!-- 🔄 LOADER -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- 🔮 SKETCHFAB -->
<div id="sketchfabLayer">
<iframe id="skfb"
data-src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed?autostart=1&ui_controls=0&ui_infos=0&ui_watermark=0"
loading="lazy"
allow="autoplay; fullscreen"></iframe>
</div>

<!-- 👽 ALIEN -->
<div id="alienLayer">
<video id="alien" muted playsinline preload="metadata">
<source src="alien2-tele.mp4">
</video>
</div>

<!-- 🎬 FINAL -->
<div id="finalLayer">

<img id="luis" src="luis.JPG">

<div id="text">
TRANSMISIÓN CUÁNTICA COMPLETADA<br><br>
El sistema opera mediante correlaciones no locales en espacio-tiempo.
</div>

<div id="yt">

<iframe width="320" height="180"
src="https://www.youtube.com/embed/BPltDt8rhsQ"
allowfullscreen></iframe>

<iframe width="320" height="180"
src="https://www.youtube.com/embed/yizhsJJO3-s"
allowfullscreen></iframe>

</div>

</div>

<script>

/* 🌌 STARS OPTIMIZADO */
const c=document.getElementById("stars");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let stars=[];
let maxStars = innerWidth < 768 ? 120 : 160;

for(let i=0;i<maxStars;i++){
  stars.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height
  });
}

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle="#00ffff";
  stars.forEach(s=>{
    s.y += 0.25;
    if(s.y>c.height) s.y=0;
    ctx.fillRect(s.x,s.y,1,1);
  });

  requestAnimationFrame(draw);
}
draw();

/* 🔊 AUDIO */
const audio = new Audio();
audio.src = "https://cdn.pixabay.com/audio/2022/03/15/audio_space.mp3";
audio.loop = true;
audio.volume = 0.35;

/* ELEMENTOS */
const start = document.getElementById("start");
const loader = document.getElementById("loader");
const skLayer = document.getElementById("sketchfabLayer");
const skfb = document.getElementById("skfb");
const alienLayer = document.getElementById("alienLayer");
const alien = document.getElementById("alien");
const finalLayer = document.getElementById("finalLayer");

/* 🚀 PRELOAD SKETCHFAB EN BACKGROUND */
function preloadSketchfab(){
  if(!skfb.src){
    skfb.src = skfb.dataset.src;
  }
}
preloadSketchfab();

/* 🚀 FLOW */
start.onclick = () => {

  start.remove();

  audio.play().catch(()=>{});

  loader.style.display = "flex";

  setTimeout(()=>{

    loader.style.display = "none";
    skLayer.style.display = "block";

    setTimeout(()=>{

      alienLayer.style.display = "flex";
      alien.play();

      alien.onended = () => {
        alienLayer.style.display = "none";
        finalLayer.style.display = "block";
      };

    }, 60000);

  }, 1500);

};

/* 🚪 EXIT */
document.getElementById("exit").onclick = () => {
  window.location.href = "index.html";
};

</script>

</body>
</html>
