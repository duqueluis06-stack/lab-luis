<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>proyectos.html</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial;
}

/* BOTÓN */
#start{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:200px;
  height:200px;
  border-radius:50%;
  border:2px solid cyan;
  background:transparent;
  color:cyan;
  font-size:16px;
  box-shadow:0 0 40px cyan;
  cursor:pointer;
  z-index:10;
}

/* SALIR */
#exit{
  position:absolute;
  bottom:20px;
  right:20px;
  padding:10px;
  background:cyan;
  border:none;
}

/* ESCENAS */
.scene{
  position:absolute;
  inset:0;
  display:none;
}

/* SKETCHFAB */
#skfb{
  width:100%;
  height:100%;
  border:0;
}

/* ALIEN */
#alien{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  height:90%;
}

/* FINAL */
#final{
  color:white;
  text-align:center;
  padding-top:40px;
}
</style>
</head>

<body>

<button id="start">TELETRANSPORTACIÓN</button>
<button id="exit">SALIR</button>

<!-- SKETCHFAB -->
<div id="s0" class="scene">
<iframe id="skfb"
src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed?autostart=1"
allow="autoplay; fullscreen">
</iframe>
</div>

<!-- ALIEN -->
<div id="s1" class="scene">
<video id="alien" muted playsinline>
<source src="alien2-tele.mp4">
</video>
</div>

<!-- FINAL -->
<div id="s2" class="scene">
<div id="final">

<img src="luis.JPG" width="150"><br><br>

TELETRANSPORTACIÓN COMPLETADA<br><br>

<iframe width="300" height="180"
src="https://www.youtube.com/embed/BPltDt8rhsQ"></iframe>

<iframe width="300" height="180"
src="https://www.youtube.com/embed/yizhsJJO3-s"></iframe>

</div>
</div>

<script>

const skfb=document.getElementById("skfb");
const alien=document.getElementById("alien");

function show(id){
  document.querySelectorAll(".scene").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

document.getElementById("start").onclick=()=>{

  document.getElementById("start").style.display="none";

  show("s0");

  /* 🔥 ESPERA REAL */
  setTimeout(()=>{

    show("s1");

    alien.play();

    alien.onended=()=>{

      show("s2");

    };

  },10000); // 🔴 IMPORTANTE: tiempo largo para Sketchfab

};

document.getElementById("exit").onclick=()=>{
  window.location.href="index.html";
};

</script>

</body>
</html>
