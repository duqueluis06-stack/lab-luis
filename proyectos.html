<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CINE VIVO 2.2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* 🌌 ESTRELLAS */
canvas{
position:fixed;
top:0;
left:0;
}

/* 🚀 BOTÓN INICIO */
#startBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:18px 35px;
border:2px solid cyan;
color:cyan;
background:transparent;
font-size:20px;
cursor:pointer;
box-shadow:0 0 18px cyan;
z-index:10;
}

/* 🚪 SALIR */
#exitBtn{
position:absolute;
top:20px;
right:20px;
padding:10px 20px;
border:1px solid red;
color:red;
background:transparent;
display:none;
z-index:20;
cursor:pointer;
}

/* 🌐 ESCENAS */
.scene{
position:absolute;
width:100%;
height:100%;
display:none;
}

/* 🌐 SKETCHFAB */
iframe{
width:100%;
height:100%;
border:none;
}

/* ⚫ BLACK */
#black{
position:absolute;
width:100%;
height:100%;
background:black;
display:none;
z-index:50;
}

/* 👽 VIDEO */
video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

/* 📡 CREDITS */
#credits{
position:absolute;
bottom:-100%;
width:100%;
color:white;
text-align:center;
animation:scroll 16s linear forwards;
font-size:14px;
}

@keyframes scroll{
from{bottom:-100%;}
to{bottom:120%;}
}

/* 🧑‍🚀 IMAGE */
#idCard{
width:110px;
margin:20px auto;
display:block;
opacity:0.85;
}

/* 📺 YOUTUBE */
.panel{
width:45%;
height:260px;
border:1px solid cyan;
box-shadow:0 0 15px cyan;
display:inline-block;
margin:10px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<button id="startBtn">INICIO</button>
<button id="exitBtn">SALIR</button>

<!-- 🌐 PORTAL -->
<div id="portal" class="scene">
<iframe id="sketchfab"
src="https://sketchfab.com/models/7w7pAfr9/embed?autostart=1"></iframe>
</div>

<!-- ⚫ BLACK -->
<div id="black"></div>

<!-- 👽 ALIEN -->
<div id="alien" class="scene">
<video id="alienVideo" src="alien2-tele.mp4"></video>
</div>

<!-- 📡 CREDITS -->
<div id="credits" class="scene">
<img id="idCard" src="luis.JPG">
<h3>TEORÍA CUÁNTICA · INTERDIMENSIÓN · TELETRANSPORTE</h3>
<p>
Vacío cuántico, coherencia de campos y geometría del espacio-tiempo.
</p>
</div>

<!-- 📺 YOUTUBE -->
<div id="yt" class="scene">
<iframe class="panel" src="https://www.youtube.com/embed/BPltDt8rhsQ"></iframe>
<iframe class="panel" src="https://www.youtube.com/embed/yizhsJJO3-s"></iframe>
</div>

<script>

/* 🌌 ESTRELLAS */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=Array.from({length:160},()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.3
}));

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y+=0.4;
if(s.y>canvas.height){
s.y=0;
s.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(draw);
}
draw();

/* 🔊 AUDIO */
let audioCtx;
function startAudio(){
audioCtx=new (window.AudioContext||window.webkitAudioContext)();

let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();

osc.frequency.value=40;
gain.gain.value=0.03;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
}

/* 🚀 INICIO */
document.getElementById("startBtn").onclick=()=>{

startAudio();

document.getElementById("startBtn").style.display="none";
document.getElementById("exitBtn").style.display="block";

/* 🌐 PORTAL */
document.getElementById("portal").style.display="block";

/* ⏳ SKETCHFAB → BLACK */
setTimeout(()=>{

document.getElementById("portal").style.display="none";
document.getElementById("black").style.display="block";

/* ⚫ TRANSITION */
setTimeout(()=>{

document.getElementById("black").style.display="none";

/* 👽 ALIEN */
document.getElementById("alien").style.display="block";
let vid=document.getElementById("alienVideo");
vid.play();

/* FIN VIDEO */
vid.onended=()=>{

document.getElementById("alien").style.display="none";

/* 📡 CREDITS */
document.getElementById("credits").style.display="block";

/* 📺 YOUTUBE */
setTimeout(()=>{
document.getElementById("credits").style.display="none";
document.getElementById("yt").style.display="block";
},7000);

};

},900);

},5000);
};

/* 🚪 SALIR → RESET TOTAL */
document.getElementById("exitBtn").onclick=()=>{

location.reload(); // vuelve al inicio del HTML limpio
};

</script>

</body>
</html>
