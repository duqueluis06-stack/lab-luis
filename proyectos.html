<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyectos - Lab Luis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 BASE */
body {
margin:0;
background:black;
color:#00ffcc;
font-family:Arial;
overflow:hidden;
}

/* 🎬 ESCENAS */
.scene {
position:absolute;
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:1.2s ease;
}

.scene.active {
opacity:1;
}

/* 🧠 HUD */
#hud {
position:fixed;
top:10px;
left:10px;
z-index:1000;
background:rgba(0,0,0,0.6);
padding:10px;
border:1px solid #00ffcc;
}

/* 🌌 SKETCHFAB */
iframe {
width:80%;
height:70vh;
border:0;
border-radius:12px;
}

/* 👽 ALIEN */
video {
width:320px;
border-radius:50%;
box-shadow:0 0 40px #00ffff;
}

/* 🖼 LUIS */
img {
width:280px;
border-radius:12px;
box-shadow:0 0 30px #00ffcc;
}

/* 🌌 PORTAL CANVAS */
#portal {
position:fixed;
width:100%;
height:100%;
z-index:0;
}

/* 🔗 YT */
iframe.yt {
width:70%;
height:60vh;
border-radius:12px;
}

</style>
</head>

<body>

<canvas id="portal"></canvas>

<div id="hud">
<div id="title">PORTAL</div>
<div id="subtitle">Inicializando IA narrativa...</div>
</div>

<!-- 🌌 PORTAL -->
<div class="scene active" id="s1">
<iframe id="sketchfab"
src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed"></iframe>
</div>

<!-- 👽 ALIEN -->
<div class="scene" id="s2">
<video id="alien" muted playsinline>
<source src="alien2.mp4">
</video>
</div>

<!-- 📜 TEXTO -->
<div class="scene" id="s3">
<h2>🧠 Análisis de señal</h2>
<p>Fluctuación interdimensional detectada...</p>
</div>

<!-- 🖼 LUIS -->
<div class="scene" id="s4">
<img src="Luis.jpg">
</div>

<!-- 🔗 YOUTUBE -->
<div class="scene" id="s5">
<iframe class="yt" src="https://www.youtube.com/embed/BPltDt8rhsQ"></iframe>
</div>

<script>

/* 🎬 ESTADO */
let i = 0;

const scenes = ["s1","s2","s3","s4","s5"];

const titles = [
["PORTAL","IA detectando estructura dimensional"],
["ENTIDAD","Objeto no identificado activo"],
["ANÁLISIS","Procesando señal cuántica"],
["IDENTIDAD","Referencia humana encontrada"],
["TRANSMISIÓN","Datos enviados"]
];

/* 🔊 AUDIO ESPACIAL */
const ctx = new (window.AudioContext || window.webkitAudioContext)();

const osc = ctx.createOscillator();
const pan = ctx.createStereoPanner();
const gain = ctx.createGain();

osc.type = "sine";
osc.frequency.value = 60;

gain.gain.value = 0.04;

osc.connect(pan);
pan.connect(gain);
gain.connect(ctx.destination);

osc.start();

/* 🌌 PORTAL SHADER SIMULADO */
const canvas = document.getElementById("portal");
const c = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

function portalFX(){
c.fillStyle="rgba(0,0,0,0.08)";
c.fillRect(0,0,canvas.width,canvas.height);

for(let i=0;i<80;i++){
let x = Math.random()*canvas.width;
let y = Math.random()*canvas.height;
let r = Math.random()*2;

c.beginPath();
c.arc(x,y,r,0,Math.PI*2);
c.fillStyle="#00ffff";
c.fill();
}

requestAnimationFrame(portalFX);
}
portalFX();

/* 🎧 AUDIO CONTROL */
function sound(i){
pan.pan.value = (i-2)/2;
gain.gain.value = 0.02 + i*0.01;
}

/* 🧠 VOZ IA (REAL) */
function speak(text){
let msg = new SpeechSynthesisUtterance(text);
msg.lang = "es-ES";
msg.rate = 1;
speechSynthesis.speak(msg);
}

/* 🎬 ESCENA */
function show(n){

scenes.forEach(s=>{
document.getElementById(s).classList.remove("active");
});

document.getElementById(scenes[n]).classList.add("active");

document.getElementById("title").innerText = titles[n][0];
document.getElementById("subtitle").innerText = titles[n][1];

sound(n);
speak(titles[n][1]);
}

/* ⏱ SECUENCIA */
function next(){
if(i < scenes.length-1){
i++;
show(i);
setTimeout(next,6000);
}
}

/* 👽 ALIEN */
const alien = document.getElementById("alien");

document.getElementById("sketchfab").onload = ()=>{
setTimeout(()=>{
i=1;
show(1);
setTimeout(next,6000);
},2000);
};

alien.oncanplay = ()=> alien.play();

alien.onended = ()=>{
i=2;
show(2);
setTimeout(next,6000);
};

</script>

</body>
</html>
