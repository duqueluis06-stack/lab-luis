<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Proyectos - Lab Luis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* FONDO */
body {
    background: url('fondo_experimentos.JPG') no-repeat center center fixed;
    background-size: cover;
    color:#00ffcc;
    font-family: Arial, sans-serif;
    text-align:center;
    margin:0;
}

/* HEADER */
header {
    padding:22px;
    font-size:32px;
    font-weight:900;
    color:#00ffcc;
    text-shadow:0 0 10px #00ffff;
    border-bottom:1px solid rgba(0,255,204,0.4);
    background: rgba(0,0,0,0.55);
}

/* NAV */
nav {
    margin:25px 0;
}

nav a {
    display:inline-block;
    margin:6px 8px;
    padding:10px 16px;
    text-decoration:none;
    font-weight:bold;
    font-size:14px;
    color:#00ffcc;
    background: rgba(0,0,0,0.45);
    border:1px solid rgba(0,255,204,0.35);
    border-radius:25px;
    transition:0.25s;
}

nav a:hover {
    transform:scale(1.06);
    background: rgba(0,255,204,0.15);
    border-color:#00ffff;
}

/* LOGO */
img.logo {
    width:200px;
    margin:20px 0;
    border-radius:10px;
    border:2px solid #00ffcc;
}

/* SECCIÓN */
.section {
    margin:40px auto;
    width:90%;
    background: rgba(0,0,0,0.65);
    padding:25px;
    border-radius:12px;
}

/* GRID */
.grid {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

/* CARD */
.card {
    width:280px;
    margin:20px;
    padding:20px;
    border:1px solid rgba(0,255,204,0.4);
    border-radius:15px;
    background: rgba(0,0,0,0.65);
    box-shadow:0 0 15px rgba(0,255,255,0.15);
    transition:0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.04);
}

/* BOTÓN */
.neon-btn {
    display:inline-block;
    margin:10px;
    padding:10px 18px;
    color:#00ffcc;
    text-decoration:none;
    border:1px solid #00ffcc;
    border-radius:30px;
}

.neon-btn:hover {
    background:#00ffcc;
    color:#000;
    box-shadow:0 0 20px #00ffff;
}

/* ============================= */
/* 🔥 MINI INDICADOR (ARRIBA IZQ) */
/* ============================= */
.market-mini {
    position:fixed;
    top:15px;
    left:15px;
    width:120px;
    height:60px;
    background:rgba(0,0,0,0.6);
    border:1px solid #00ffff;
    border-radius:10px;
    z-index:9999;
}

/* ============================= */
/* 🌍 PANEL GRANDE (ABAJO DER) */
/* ============================= */
.market-big {
    position:fixed;
    bottom:20px;
    right:20px;
    width:260px;
    height:140px;
    background:rgba(0,0,0,0.7);
    border:1px solid #ff00ff;
    border-radius:12px;
    z-index:9999;
    box-shadow:0 0 25px #ff00ff;
}

</style>
</head>

<body>

<!-- 🔥 MINI CHART -->
<div class="market-mini">
<canvas id="miniChart"></canvas>
</div>

<!-- 🌍 GRANDE -->
<div class="market-big">
<canvas id="bigChart"></canvas>
</div>

<header>⚡ LAB LUIS – Proyectos Experimentales</header>

<img src="logo.jpg" class="logo">

<nav>
<a href="index.html">Inicio</a>
<a href="imagenes.html">Imágenes</a>
<a href="experimentos.html">Experimentos</a>
<a href="libros.html">📚 KDP</a>
<a href="laboratorio.html">⚙️ Ciencia</a>
<a href="sobre-mi.html">👤 Sobre mí</a>
</nav>

<div class="section">
<h2>🧪 Proyectos Experimentales</h2>

<div class="grid">

<div class="card">
<h3>🔊 ESP32-C3</h3>
<a href="https://youtu.be/SkWGinOHxd0" target="_blank" class="neon-btn">▶ Ver</a>
</div>

<div class="card">
<h3>🛰️ Estación</h3>
<a href="https://youtube.com/shorts/HKgiG1NklDE" target="_blank" class="neon-btn">▶ Ver</a>
</div>

<div class="card">
<h3>👁️ TFT</h3>
<a href="https://youtu.be/efXB-uLy9z8" target="_blank" class="neon-btn">▶ Ver</a>
</div>

</div>
</div>

<script>

/* 🔥 DATOS SIMULADOS DINÁMICOS */
function generateData(){
    return Array.from({length:20}, () => Math.random()*100);
}

/* MINI CHART */
new Chart(document.getElementById("miniChart"), {
    type: 'line',
    data: {
        labels: Array(20).fill(""),
        datasets: [{
            data: generateData(),
            borderWidth:1,
            tension:0.4
        }]
    },
    options:{
        plugins:{legend:{display:false}},
        scales:{x:{display:false}, y:{display:false}}
    }
});

/* GRANDE */
new Chart(document.getElementById("bigChart"), {
    type: 'line',
    data: {
        labels: Array(30).fill(""),
        datasets: [{
            data: generateData(),
            fill:true,
            tension:0.4
        }]
    },
    options:{
        plugins:{legend:{display:false}},
        scales:{x:{display:false}, y:{display:false}}
    }
});

</script>

</body>
</html>
