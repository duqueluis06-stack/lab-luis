<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Teleport System</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* 🌌 STARS */
canvas{
  position:fixed;
  inset:0;
  z-index:-2;
}

/* 🔘 START */
#start{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:220px;
  height:220px;
  border-radius:50%;
  border:2px solid #00ffff;
  color:#00ffff;
  background:transparent;
  box-shadow:0 0 50px #00ffff;
  cursor:pointer;
  z-index:10;
}

/* 🔄 LOADER */
#loader{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2;
}

.spinner{
  width:80px;
  height:80px;
  border:4px solid #222;
  border-top:4px solid #00ffff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* 🔮 SKETCHFAB */
#sketchfabLayer{
  position:absolute;
  inset:0;
  display:none;
  z-index:1;
}

#skfb{
  width:100%;
  height:100%;
  border:0;
}

/* 👽 ALIEN */
#alienLayer{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at center, rgba(0,255,255,0.15), rgba(0,0,0,0.95));
  backdrop-filter: blur(6px);
  z-index:3;
}

#alien{
  height:90%;
  border-radius:14px;
  filter: drop-shadow(0 0 25px #00ffff)
          drop-shadow(0 0 80px #00ffff)
          contrast(1.2)
          saturate(1.4);
}

/* 🎬 FINAL */
#finalLayer{
  position:absolute;
  inset:0;
  display:none;
  z-index:4;
}

/* 🖼 FOTO */
#luis{
  position:absolute;
  top:20px;
  right:20px;
  width:120px;
  border-radius:50%;
  border:2px solid #00ffff;
  box-shadow:0 0 20px #00ffff;
  object-fit:cover;
  z-index:999;
}

@media(max-width:768px){
  #luis{
    width:85px;
    top:10px;
    right:10px;
  }
}

/* 📜 TEXTO */
#text{
  position:absolute;
  bottom:-100%;
  width:80%;
  left:10%;
  text-align:center;
  animation:scroll 25s linear forwards;
  font-size:16px;
  line-height:1.6;
}

@keyframes scroll{
  from{bottom:-100%;}
  to{bottom:120%;}
}

/* 📺 YOUTUBE */
#yt{
  position:absolute;
  bottom:90px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

/* 🚪 EXIT */
#exit{
  position:absolute;
  bottom:20px;
  right:20px;
  z-index:9999;
  background:#00ffff;
  border:none;
  padding:10px 14px;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<button id="start">TELETRANSPORTACIÓN</button>
<button id="exit">SALIR</button>

<!-- LOADER -->
<div id="loader"><div class="spinner"></div></div>

<!-- SKETCHFAB -->
<div id="sketchfabLayer">
<iframe id="skfb"
data-src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed?autostart=1&ui_controls=0&ui_infos=0&ui_watermark=0"
allow="autoplay; fullscreen"></iframe>
</div>

<!-- ALIEN -->
<div id="alienLayer">
<video id="alien" playsinline muted preload="auto">
<source src="alien2-tele.mp4">
</video>
</div>

<!-- FINAL -->
<div id="finalLayer">

<img id="luis" src="luis.JPG">

<div id="text">
TRANSMISIÓN CUÁNTICA COMPLETADA<br><br>
Sistema estabilizado en coherencia espacio-tiempo.<br><br>
Estructuras de observación avanzada tipo relatividad cuántica emergente.
</div>

<div id="yt">
<iframe width="320" height="180" src="https://www.youtube.com/embed/BPltDt8rhsQ" allowfullscreen></iframe>
<iframe width="320" height="180" src="https://www.youtube.com/embed/yizhsJJO3-s" allowfullscreen></iframe>
</div>

</div>

<script>

/* 🌌 STARS */
const c=document.getElementById("stars");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let stars=[];
for(let i=0;i<140;i++){
  stars.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle="#00ffff";
  stars.forEach(s=>{
    s.y+=0.3;
    if(s.y>c.height)s.y=0;
    ctx.fillRect(s.x,s.y,1,1);
  });

  requestAnimationFrame(draw);
}
draw();

/* 🔊 AUDIO FIX REAL */
const audio = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_space.mp3");
audio.loop=true;
audio.volume=0.3;

let unlocked=false;

function unlockAudio(){
  if(unlocked)return;
  audio.play().then(()=>{
    audio.pause();
    audio.currentTime=0;
    unlocked=true;
  }).catch(()=>{});
}

document.addEventListener("pointerdown",unlockAudio,{once:true});

/* ELEMENTS */
const start=document.getElementById("start");
const loader=document.getElementById("loader");
const skLayer=document.getElementById("sketchfabLayer");
const skfb=document.getElementById("skfb");
const alien=document.getElementById("alien");
const alienLayer=document.getElementById("alienLayer");
const finalLayer=document.getElementById("finalLayer");

/* PRELOAD FIX */
skfb.src=skfb.dataset.src;

/* 🚀 START */
start.onclick=async()=>{

  unlockAudio();
  try{ await audio.play(); }catch(e){}

  start.remove();
  loader.style.display="flex";

  setTimeout(()=>{

    loader.style.display="none";
    skLayer.style.display="block";

    setTimeout(()=>{

      alienLayer.style.display="flex";
      alien.muted=false;
      alien.play().catch(()=>{});

      setTimeout(()=>{

        alienLayer.style.display="none";
        finalLayer.style.display="block";

      },12000);

    },20000);

  },1200);

};

/* EXIT */
document.getElementById("exit").onclick=()=>{
  location.href="index.html";
};

</script>

</body>
</html>
