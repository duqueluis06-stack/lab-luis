<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cinematic Teleport</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* 🌌 STARS */
#stars{
  position:fixed;
  inset:0;
  z-index:-2;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:#00ffff;
  border-radius:50%;
  box-shadow:0 0 6px #00ffff;
}

/* 🔘 BUTTON */
#start{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:240px;
  height:240px;
  border-radius:50%;
  border:2px solid #00ffff;
  background:transparent;
  color:#00ffff;
  font-size:18px;
  box-shadow:0 0 50px #00ffff;
  z-index:10;
}

#exit{
  position:absolute;
  bottom:20px;
  right:20px;
  z-index:9999;
  background:#00ffff;
  border:none;
  padding:10px;
}

/* LAYERS */
.layer{
  position:absolute;
  inset:0;
  display:none;
}

/* SKETCHFAB */
#skfb{
  width:100%;
  height:100%;
  border:0;
}

/* ALIEN */
#alienLayer{
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle,#00ffff33,#000);
}

#alien{
  height:90%;
  border-radius:14px;
  filter:drop-shadow(0 0 30px #00ffff);
}

/* FINAL */
#finalLayer{
  z-index:5;
}

/* FOTO */
#luis{
  position:absolute;
  top:20px;
  right:20px;
  width:120px;
  border-radius:50%;
  border:2px solid #00ffff;
  box-shadow:0 0 20px #00ffff;
}

/* TEXTO */
#text{
  position:absolute;
  bottom:-100%;
  width:80%;
  left:10%;
  text-align:center;
  animation:scroll 25s linear forwards;
}

@keyframes scroll{
  to{bottom:120%;}
}

/* YT */
#yt{
  position:absolute;
  bottom:90px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<div id="stars"></div>

<button id="start">START</button>
<button id="exit">RESET</button>

<div id="sketchfabLayer" class="layer">
<iframe id="skfb"
data-src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed?autostart=1&ui_controls=0&ui_infos=0"
allow="autoplay; fullscreen"></iframe>
</div>

<div id="alienLayer" class="layer">
<video id="alien" playsinline muted>
<source src="alien2-tele.mp4">
</video>
</div>

<div id="finalLayer" class="layer">

<img id="luis" src="luis.JPG">

<div id="text">
TRANSMISIÓN COMPLETADA<br><br>
Sistema estable.<br><br>
Fluctuaciones cuánticas detectadas.<br><br>
Estado: coherente.
</div>

<div id="yt">
<iframe width="320" height="180" src="https://www.youtube.com/embed/BPltDt8rhsQ"></iframe>
<iframe width="320" height="180" src="https://www.youtube.com/embed/yizhsJJO3-s"></iframe>
</div>

</div>

<script>

let started=false;

/* 🌌 STARS (ANIMADAS REALMENTE) */
const stars=document.getElementById("stars");

for(let i=0;i<120;i++){
  const s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  s.dataset.y=Math.random()*100;
  stars.appendChild(s);
}

function animStars(){
  document.querySelectorAll(".star").forEach(s=>{
    let y=parseFloat(s.dataset.y);
    y+=0.2;
    if(y>100)y=0;
    s.dataset.y=y;
    s.style.top=y+"%";
  });
  requestAnimationFrame(animStars);
}
animStars();

/* 🔊 AUDIO FIX REAL */
const audio=new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_space.mp3");
audio.loop=true;
audio.volume=0.3;

document.addEventListener("pointerdown",()=>{
  audio.play().catch(()=>{});
},{once:true});

/* ELEMENTOS */
const start=document.getElementById("start");
const skLayer=document.getElementById("sketchfabLayer");
const skfb=document.getElementById("skfb");
const alienLayer=document.getElementById("alienLayer");
const alien=document.getElementById("alien");
const finalLayer=document.getElementById("finalLayer");

/* 🚀 FLOW */
start.onclick=()=>{

  if(started) return;
  started=true;

  start.remove();

  setTimeout(()=>{

    skLayer.style.display="block";
    skfb.src=skfb.dataset.src;

    setTimeout(()=>{

      skLayer.style.display="none";
      alienLayer.style.display="flex";

      alien.muted=true;
      alien.setAttribute("playsinline","");
      alien.play().catch(()=>{});

      setTimeout(()=>{

        alienLayer.style.display="none";
        finalLayer.style.display="block";

      },12000);

    },18000);

  },800);

};

document.getElementById("exit").onclick=()=>{
  location.reload();
};

</script>

</body>
</html>
