.section {

======================= */
.card {

    max-width: 90%;
    padding:20px;
    background: rgba(0,0,0,0.65);
    border:1px solid rgba(0,255,204,0.4);
    border-radius:15px;
    transition:0.3s;
}

.card:hover {
    transform: translateY(-6px);
}

/* =======================

======================= */
