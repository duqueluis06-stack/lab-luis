<style>

/* 🌌 BASE */
body {
    margin:0;
    font-family: Arial, sans-serif;
    color:#00ffcc;
    background:black;
    overflow-x:hidden;
}

/* 🎥 SECCIONES CINEMATOGRÁFICAS */
.scene {
    height:100vh;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    text-align:center;
}

/* 🌌 CANVAS PARTÍCULAS */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

/* 🌀 SKETCHFAB */
iframe {
    width:80%;
    height:70vh;
    border:0;
    border-radius:12px;
    z-index:2;
}

/* 👽 VIDEO ALIEN */
video {
    width:60%;
    border-radius:50%;
    box-shadow:0 0 40px #00ffff;
    z-index:2;
}

/* 📜 TEXTO */
.story {
    max-width:800px;
    font-size:18px;
    line-height:1.6;
    z-index:2;
}

/* 🖼 LUIS IMG */
#luis {
    width:300px;
    border-radius:20px;
    box-shadow:0 0 30px #00ffcc;
}

/* 🔗 YOUTUBE */
iframe.yt {
    width:80%;
    height:60vh;
    border-radius:12px;
}

/* 🎞 CRÉDITOS */
#credits {
    position:fixed;
    bottom:10px;
    right:10px;
    font-size:12px;
    opacity:0.6;
    z-index:10;
}

/* ✨ FADE */
.fade {
    opacity:0;
    transition:1.5s ease;
}

.fade.active {
    opacity:1;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- 🌌 PORTAL -->
<section class="scene" id="scene1">
<iframe 
id="sketchfab"
src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed">
</iframe>
</section>

<!-- 👽 ALIEN -->
<section class="scene fade" id="scene2">
<video id="alien" muted playsinline preload="auto">
<source src="alien2.mp4" type="video/mp4">
</video>
</section>

<!-- 📜 NARRATIVA -->
<section class="scene fade" id="scene3">
<div class="story">
<h2>🧠 Informe Cuántico</h2>
<p>Se detecta fluctuación interdimensional en el campo de energía...</p>
<p>El portal mantiene estabilidad parcial en fase alfa...</p>
<p>Materia no localizada observada en transición espacial...</p>
</div>
</section>

<!-- 🖼 IDENTIDAD -->
<section class="scene fade" id="scene4">
<img id="luis" src="Luis.jpg">
</section>

<!-- 🔗 YOUTUBE -->
<section class="scene fade" id="scene5">
<iframe class="yt"
src="https://www.youtube.com/embed/BPltDt8rhsQ">
</iframe>

<iframe class="yt"
src="https://www.youtube.com/embed/yizhsJJO3-s">
</iframe>
</section>

<!-- 🎞 CRÉDITOS -->
<div id="credits">
Lab Luis • Interdimensional Systems
</div>

<script>

/* 🌌 PARTÍCULAS */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        dx:(Math.random()-0.5),
        dy:(Math.random()-0.5)
    });
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x += p.dx;
p.y += p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00ffff";
ctx.fill();
});

requestAnimationFrame(animate);
}
animate();

/* 🎬 SCROLL CINEMÁTICO */
const scenes = document.querySelectorAll(".fade");

function revealOnScroll(){
let scroll = window.scrollY + window.innerHeight;

scenes.forEach(scene=>{
if(scene.offsetTop < scroll - 100){
scene.classList.add("active");
}
});
}

window.addEventListener("scroll", revealOnScroll);

/* 👽 VIDEO CONTROL */
const alien = document.getElementById("alien");

alien.oncanplay = () => {
alien.play();
};

alien.onended = () => {
document.getElementById("scene3").classList.add("active");
};

</script>

</body>
</html>
