<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CINE VIVO 3.2 - FLATBLACK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* 🌌 FLATBLACK BASE */
#flatblack{
position:fixed;
width:100%;
height:100%;
background:#000;
z-index:0;
}

/* 🌌 ESTRELLAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:1;
}

/* 🚀 BOTÓN */
#startBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:18px 34px;
border:2px solid cyan;
color:cyan;
background:transparent;
font-size:20px;
cursor:pointer;
z-index:10;
box-shadow:0 0 15px cyan;
}

/* 🚪 SALIR */
#exitBtn{
position:absolute;
top:20px;
right:20px;
padding:10px 18px;
border:1px solid red;
color:red;
background:transparent;
display:none;
z-index:20;
}

/* 🌐 ESCENAS */
.scene{
position:absolute;
width:100%;
height:100%;
display:none;
z-index:5;
}

/* 🌐 SKETCHFAB */
iframe{
width:100%;
height:100%;
border:none;
background:black;
}

/* ⚫ TRANSICIÓN FLATBLACK */
#black{
position:absolute;
width:100%;
height:100%;
background:black;
display:none;
z-index:50;
}

/* 👽 ALIEN NEÓN HOLOGRÁFICO */
#alienWrap{
position:absolute;
width:100%;
height:100%;
display:none;
background:black;
z-index:10;
}

#alienVideo{
width:100%;
height:100%;
object-fit:contain;

filter:contrast(1.2) brightness(0.9) saturate(1.4);

box-shadow:
0 0 20px cyan,
0 0 60px cyan,
0 0 120px blue;

border:1px solid rgba(0,255,255,0.3);
}

/* 📡 CREDITS */
#credits{
position:absolute;
bottom:-100%;
width:100%;
color:white;
text-align:center;
animation:scroll 16s linear forwards;
font-size:14px;
z-index:6;
}

@keyframes scroll{
from{bottom:-100%;}
to{bottom:120%;}
}

/* 🧑‍🚀 IMG */
#idCard{
width:110px;
margin:10px auto;
display:block;
opacity:0.85;
}

/* 📺 YOUTUBE */
.panel{
width:45%;
height:260px;
border:1px solid cyan;
box-shadow:0 0 15px cyan;
display:inline-block;
margin:10px;
}
</style>
</head>

<body>

<div id="flatblack"></div>

<canvas id="stars"></canvas>

<button id="startBtn">INICIO</button>
<button id="exitBtn">SALIR</button>

<!-- 🌐 SKETCHFAB -->
<div id="portal" class="scene">
<iframe id="skfb"
src="https://sketchfab.com/models/7w7pAfr9/embed?autostart=1&ui_controls=0"></iframe>
</div>

<!-- ⚫ BLACK -->
<div id="black"></div>

<!-- 👽 ALIEN -->
<div id="alienWrap">
<video id="alienVideo" src="alien2-tele.mp4"></video>
</div>

<!-- 📡 CREDITS -->
<div id="credits" class="scene">
<img id="idCard" src="luis.JPG">
<h3>TEORÍA CUÁNTICA · INTERDIMENSIÓN · TELETRANSPORTE</h3>
<p>Vacío cuántico · campos no locales · geometría espacio-tiempo</p>
</div>

<!-- 📺 YOUTUBE -->
<div id="yt" class="scene">
<iframe class="panel"
src="https://www.youtube.com/embed/BPltDt8rhsQ"
allowfullscreen></iframe>

<iframe class="panel"
src="https://www.youtube.com/embed/yizhsJJO3-s"
allowfullscreen></iframe>
</div>

<script>

/* 🌌 ESTRELLAS */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=Array.from({length:180},()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.3
}));

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

for(let s of stars){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
s.y+=0.35;
if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width;}
}

requestAnimationFrame(draw);
}
draw();

/* 🔊 AUDIO FIXED */
let audioCtx;

async function startAudio(){
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
await audioCtx.resume();

let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();

osc.type="sine";
osc.frequency.value=41;
gain.gain.value=0.04;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
}

/* 🚀 FLOW */
document.getElementById("startBtn").onclick=()=>{

startAudio();

document.getElementById("startBtn").style.display="none";
document.getElementById("exitBtn").style.display="block";

/* 🌐 PORTAL */
document.getElementById("portal").style.display="block";

/* ⚫ FLATBLACK TRANSITION */
setTimeout(()=>{

document.getElementById("portal").style.display="none";
document.getElementById("black").style.display="block";

setTimeout(()=>{

document.getElementById("black").style.display="none";

/* 👽 ALIEN */
document.getElementById("alienWrap").style.display="block";
let v=document.getElementById("alienVideo");
v.play();

v.onended=()=>{

document.getElementById("alienWrap").style.display="none";

/* 📡 CREDITS */
document.getElementById("credits").style.display="block";

/* 📺 YOUTUBE */
setTimeout(()=>{

document.getElementById("credits").style.display="none";
document.getElementById("yt").style.display="block";

},7000);

};

},900);

},4000);
};

/* 🚪 EXIT → INDEX.HTML */
document.getElementById("exitBtn").onclick=()=>{
window.location.href="index.html";
};

</script>

</body>
</html>
