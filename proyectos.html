<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lab Luis</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* 🌌 ESTRELLAS */
#stars{
  position:fixed;
  inset:0;
  background:black;
}

canvas{
  position:fixed;
  inset:0;
}

/* BOTÓN */
#start{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:160px;
  height:160px;
  border-radius:50%;
  border:2px solid cyan;
  background:transparent;
  color:cyan;
  box-shadow:0 0 30px cyan;
  cursor:pointer;
  z-index:10;
}

/* ESCENAS */
.scene{
  position:absolute;
  inset:0;
  display:none;
}

/* SKETCHFAB */
#skfb{
  width:100%;
  height:100%;
  border:0;
}

/* ALIEN */
#alienWrap{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100%;
}

#alien{
  width:auto;
  height:90%;
  object-fit:contain;
}

/* FINAL */
#final{
  color:white;
  text-align:center;
  padding:40px;
}

/* SALIR */
#exit{
  position:absolute;
  bottom:20px;
  right:20px;
  padding:10px;
  background:cyan;
  border:none;
}
</style>
</head>

<body>

<button id="start">INICIAR</button>
<button id="exit">SALIR</button>

<!-- 🌐 SKETCHFAB -->
<div id="s0" class="scene">
  <iframe id="skfb"
  src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed?autostart=1"
  allow="autoplay; fullscreen"></iframe>
</div>

<!-- 👽 ALIEN -->
<div id="s1" class="scene">
  <div id="alienWrap">
    <video id="alien" muted playsinline>
      <source src="alien2-tele.mp4">
    </video>
  </div>
</div>

<!-- 🎬 FINAL -->
<div id="s2" class="scene">
  <div id="final">
    <img src="luis.JPG" width="150"><br><br>

    TRANSMISIÓN CUÁNTICA ACTIVA<br><br>
    Portal interdimensional estabilizado<br>
    Transferencia de estado en progreso<br><br>

    <iframe width="300" height="180"
    src="https://www.youtube.com/embed/BPltDt8rhsQ"></iframe>

    <iframe width="300" height="180"
    src="https://www.youtube.com/embed/yizhsJJO3-s"></iframe>
  </div>
</div>

<script>

const scenes=["s0","s1","s2"];
let i=0;

const skfb = document.getElementById("skfb");
const alien = document.getElementById("alien");

/* MOSTRAR ESCENA */
function show(n){
  document.querySelectorAll(".scene").forEach(s=>s.style.display="none");
  document.getElementById(scenes[n]).style.display="block";
}

/* 🔥 FLUJO CORRECTO */
function start(){

  show(0); // Sketchfab

  /* 🧠 CLAVE: esperar carga REAL */
  skfb.onload = () => {

    /* darle tiempo a WebGL */
    setTimeout(()=>{

      show(1); // alien

      alien.play();

      alien.onended = () => {

        show(2); // final

      };

    },5000); // tiempo REAL para que se vea completo

  };

}

/* START */
document.getElementById("start").onclick = start;

/* EXIT */
document.getElementById("exit").onclick = ()=>{
  window.location.href="index.html";
};

</script>

</body>
</html>
