<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CINE VIVO 2.0 - NASA MODE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* 🌌 ESTRELLAS */
#stars {
position:fixed;
width:100%;
height:100%;
background: radial-gradient(white 1px, transparent 1px);
background-size:3px 3px;
animation:moveStars 60s linear infinite;
opacity:0.4;
}

@keyframes moveStars {
from {transform:translateY(0);}
to {transform:translateY(-1000px);}
}

/* 🚀 BOTÓN CENTRAL */
#startBtn {
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
border:2px solid cyan;
color:cyan;
background:transparent;
font-size:22px;
cursor:pointer;
box-shadow:0 0 20px cyan;
}

/* 🌌 ESCENAS */
.scene {
display:none;
position:absolute;
width:100%;
height:100%;
}

/* 👽 VIDEO */
video {
width:100%;
height:100%;
object-fit:cover;
}

/* ⚫ BLACK TRANSITION */
#black {
position:absolute;
width:100%;
height:100%;
background:black;
display:none;
z-index:999;
}

/* 📡 CREDITS NASA */
#credits {
position:absolute;
bottom:-100%;
width:100%;
color:white;
text-align:center;
animation:scroll 20s linear forwards;
}

@keyframes scroll {
from {bottom:-100%;}
to {bottom:120%;}
}

/* 🧑‍🚀 IMAGE */
#idCard {
width:120px;
margin:20px auto;
display:block;
opacity:0.9;
}

/* 📡 YOUTUBE PANELS */
.panel {
width:45%;
height:300px;
border:1px solid cyan;
box-shadow:0 0 20px cyan;
display:inline-block;
margin:10px;
}
</style>
</head>

<body>

<div id="stars"></div>

<!-- 🚀 INICIO -->
<button id="startBtn">INICIO</button>

<!-- 🌌 SKETCHFAB -->
<div id="portal" class="scene">
<iframe src="https://sketchfab.com/models/7w7pAfr9/embed"
width="100%" height="100%" frameborder="0"></iframe>
</div>

<!-- ⚫ BLACK TRANSITION -->
<div id="black"></div>

<!-- 👽 VIDEO -->
<div id="alien" class="scene">
<video id="alienVideo" src="alien2-tele.mp4"></video>
</div>

<!-- 📡 CREDITS -->
<div id="credits" class="scene">
<img id="idCard" src="luis.JPG">
<h2>TEORÍA CUÁNTICA · INTERDIMENSIÓN · TELETRANSPORTE</h2>
<p>
Exploración de campos no locales, estructuras de vacío cuántico,
interacción de partículas coherentes y geometría del espacio-tiempo.
</p>
</div>

<!-- 📡 YOUTUBE -->
<div id="yt" class="scene">
<iframe class="panel" src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
<iframe class="panel" src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div>

<script>

/* 🔊 AUDIO NASA BASE */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function hum(){
let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();
osc.frequency.value = 40;
gain.gain.value = 0.02;
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
}

/* 🚀 FLOW */
document.getElementById("startBtn").onclick = async () => {

hum();

document.getElementById("startBtn").style.display="none";

/* 🌌 PORTAL */
document.getElementById("portal").style.display="block";

/* ⏳ COLAPSO CONTROLADO */
setTimeout(()=>{
document.getElementById("portal").style.display="none";
document.getElementById("black").style.display="block";

setTimeout(()=>{

document.getElementById("black").style.display="none";

/* 👽 ALIEN */
document.getElementById("alien").style.display="block";
let vid = document.getElementById("alienVideo");
vid.play();

/* ⏳ FIN VIDEO */
vid.onended = ()=>{

document.getElementById("alien").style.display="none";

/* 📡 CREDITS */
document.getElementById("credits").style.display="block";

/* 📡 YOUTUBE FINAL */
setTimeout(()=>{
document.getElementById("credits").style.display="none";
document.getElementById("yt").style.display="block";
},8000);
};

},800);

},5000);
};
</script>

</body>
</html>
