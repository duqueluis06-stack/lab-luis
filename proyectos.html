<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>proyectos.html</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:black;
  color:white;
}

/* 🌌 STAR BACKGROUND */
#stars{
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, #0ff3, transparent 40%),
    radial-gradient(circle at 80% 30%, #f0f2, transparent 45%),
    radial-gradient(circle at 50% 80%, #00f3, transparent 50%),
    #000;
  animation: drift 12s infinite linear;
  z-index:-2;
}

@keyframes drift{
  0%{transform:scale(1) translate(0,0);}
  50%{transform:scale(1.1) translate(-10px,10px);}
  100%{transform:scale(1) translate(0,0);}
}

/* 🎛 UI BUTTONS */
#startBtn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:14px 26px;
  background:linear-gradient(90deg,#00ffff,#0066ff);
  border:none;
  border-radius:12px;
  color:white;
  cursor:pointer;
  box-shadow:0 0 20px #00ffff;
  z-index:10;
}

#exit{
  position:absolute;
  bottom:20px;
  right:20px;
  padding:10px 18px;
  background:#00ffff;
  border:none;
  border-radius:10px;
  cursor:pointer;
  z-index:20;
  box-shadow:0 0 20px #00ffff;
}

/* 🎬 SCENES */
.scene{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  align-items:center;
  justify-content:center;
}

/* 🌐 SKETCHFAB */
iframe{
  width:80%;
  height:80%;
  border:0;
  border-radius:12px;
  box-shadow:0 0 40px #00ffff55;
}

/* 👽 ALIEN FIX (FULL HEAD PRESERVATION) */
#alienWrap{
  width:460px;
  height:460px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 0 80px cyan;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
}

#alien{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.15); /* 🔥 evita recorte de cabeza */
}

/* 📡 TEXT SCENE */
.textScroll{
  width:70%;
  font-size:22px;
  text-align:center;
  animation:scroll 9s linear;
  line-height:1.6;
}

@keyframes scroll{
  0%{transform:translateY(120%);}
  100%{transform:translateY(-120%);}
}

/* 🧑 LUIS IMAGE FIX */
#luisImg{
  width:340px;
  border-radius:14px;
  box-shadow:0 0 50px #00ffcc;
}

/* 📺 YOUTUBE FINAL */
.yt{
  width:420px;
  height:240px;
  margin:10px;
  border-radius:10px;
}

/* 🧠 LAYOUT FIX */
.flex{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div id="stars"></div>

<button id="startBtn">INICIO</button>
<button id="exit">SALIR</button>

<!-- 0 PORTAL -->
<div id="s0" class="scene">
  <iframe src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed"></iframe>
</div>

<!-- 1 ALIEN -->
<div id="s1" class="scene">
  <div id="alienWrap">
    <video id="alien" muted playsinline>
      <source src="alien2-tele.mp4" type="video/mp4">
    </video>
  </div>
</div>

<!-- 2 DESC -->
<div id="s2" class="scene">
  <div class="textScroll">
    TELETRANSPORTACIÓN ACTIVA<br>
    PORTAL CUÁNTICO ESTABLE<br>
    DESPLAZAMIENTO DIMENSIONAL EN PROGRESO<br>
    CAMPO ENERGÉTICO INESTABLE DETECTADO
  </div>
</div>

<!-- 3 LUIS -->
<div id="s3" class="scene">
  <img id="luisImg" src="luis.jpg">
</div>

<!-- 4 YOUTUBE -->
<div id="s4" class="scene flex">
  <iframe class="yt" src="https://www.youtube.com/embed/BPltDt8rhsQ"></iframe>
  <iframe class="yt" src="https://www.youtube.com/embed/yizhsJJO3-s"></iframe>
</div>

<script>

const scenes=["s0","s1","s2","s3","s4"];
let i=0;

function show(n){
  document.querySelectorAll(".scene").forEach(s=>s.style.display="none");
  document.getElementById(scenes[n]).style.display="flex";
}

/* 🎧 AUDIO SIMPLE */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.type="sine";
  o.frequency.value=120;
  g.gain.value=0.05;

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start();
  o.stop(audioCtx.currentTime+0.2);
}

/* 👽 ALIEN FULL FIX */
const alien = document.getElementById("alien");

function playAlien(){
  alien.currentTime=0;
  alien.play().catch(()=>{});
}

/* 🚀 START FLOW */
document.getElementById("startBtn").onclick=async()=>{
  document.getElementById("startBtn").style.display="none";
  await audioCtx.resume();
  next();
};

function next(){
  show(i);

  if(i===0) beep();
  if(i===1) playAlien();

  i++;

  if(i<scenes.length){
    setTimeout(next,8000);
  }
}

/* 🚪 EXIT REAL FIX (NO LOOP BACK ERROR) */
document.getElementById("exit").onclick=()=>{
  window.location.href = "index.html";
};

</script>

</body>
</html>
