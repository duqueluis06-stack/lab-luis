<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CINE VIVO 3.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* 🌌 ESTRELLAS */
canvas{
position:fixed;
top:0;
left:0;
}

/* 🚀 BOTÓN */
#startBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:18px 34px;
border:2px solid cyan;
color:cyan;
background:transparent;
font-size:20px;
cursor:pointer;
z-index:10;
box-shadow:0 0 15px cyan;
}

/* 🚪 SALIR */
#exitBtn{
position:absolute;
top:20px;
right:20px;
padding:10px 18px;
border:1px solid red;
color:red;
background:transparent;
display:none;
z-index:20;
}

/* 🌐 ESCENAS */
.scene{
position:absolute;
width:100%;
height:100%;
display:none;
}

/* ⚠️ SKETCHFAB */
iframe{
width:100%;
height:100%;
border:none;
}

/* ⚫ BLACK */
#black{
position:absolute;
width:100%;
height:100%;
background:black;
display:none;
z-index:50;
}

/* 👽 ALIEN FX */
#alienWrap{
position:absolute;
width:100%;
height:100%;
display:none;
background:black;
}

#alienVideo{
width:100%;
height:100%;
object-fit:contain;
filter: contrast(1.2) brightness(0.9) saturate(1.3);
animation:glitch 2s infinite;
}

@keyframes glitch{
0%{filter:hue-rotate(0deg);}
50%{filter:hue-rotate(25deg) contrast(1.5);}
100%{filter:hue-rotate(0deg);}
}

/* 📺 YOUTUBE */
.panel{
width:45%;
height:260px;
border:1px solid cyan;
box-shadow:0 0 15px cyan;
display:inline-block;
margin:10px;
}

/* 📡 CREDITS */
#credits{
position:absolute;
bottom:-100%;
width:100%;
color:white;
text-align:center;
animation:scroll 16s linear forwards;
font-size:14px;
}

@keyframes scroll{
from{bottom:-100%;}
to{bottom:120%;}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<button id="startBtn">INICIO</button>
<button id="exitBtn">SALIR</button>

<!-- 🌐 SKETCHFAB -->
<div id="portal" class="scene">
<iframe id="sketchfab"
src="https://sketchfab.com/models/7w7pAfr9/embed"></iframe>
</div>

<!-- ⚫ BLACK -->
<div id="black"></div>

<!-- 👽 ALIEN -->
<div id="alienWrap">
<video id="alienVideo" src="alien2-tele.mp4"></video>
</div>

<!-- 📡 CREDITS -->
<div id="credits" class="scene">
<img src="luis.JPG" style="width:110px;display:block;margin:10px auto;opacity:0.85;">
<h3>TEORÍA CUÁNTICA · INTERDIMENSIÓN · TELETRANSPORTE</h3>
<p>Vacío cuántico · campos no locales · geometría espacio-tiempo</p>
</div>

<!-- 📺 YOUTUBE -->
<div id="yt" class="scene">
<iframe class="panel"
src="https://www.youtube.com/embed/BPltDt8rhsQ"
allowfullscreen></iframe>

<iframe class="panel"
src="https://www.youtube.com/embed/yizhsJJO3-s"
allowfullscreen></iframe>
</div>

<script>

/* 🌌 ESTRELLAS (FIABLE) */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=Array.from({length:180},()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.4
}));

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

for(let s of stars){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
s.y+=0.35;
if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width;}
}

requestAnimationFrame(draw);
}
draw();

/* 🔊 AUDIO REAL LOOP */
let audioCtx;
let osc,gain;

function startAudio(){
audioCtx=new (window.AudioContext||window.webkitAudioContext)();

osc=audioCtx.createOscillator();
gain=audioCtx.createGain();

osc.frequency.value=43;
gain.gain.value=0.03;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
}

/* 🧠 STATE ENGINE */
let state=0;

/* 🚀 START */
document.getElementById("startBtn").onclick=()=>{

startAudio();

document.getElementById("startBtn").style.display="none";
document.getElementById("exitBtn").style.display="block";

/* 🌐 PORTAL */
document.getElementById("portal").style.display="block";

state=1;

/* ⏳ SKETCHFAB SAFE SWITCH */
setTimeout(()=>{

document.getElementById("portal").style.display="none";
document.getElementById("black").style.display="block";

setTimeout(()=>{

document.getElementById("black").style.display="none";

/* 👽 ALIEN */
document.getElementById("alienWrap").style.display="block";
let v=document.getElementById("alienVideo");
v.play();

v.onended=()=>{

document.getElementById("alienWrap").style.display="none";

/* 📡 CREDITS */
document.getElementById("credits").style.display="block";

/* 📺 YOUTUBE */
setTimeout(()=>{

document.getElementById("credits").style.display="none";
document.getElementById("yt").style.display="block";

},7000);

};

},900);

},4000);
};

/* 🚪 EXIT */
document.getElementById("exitBtn").onclick=()=>{
location.reload();
};

</script>

</body>
</html>
