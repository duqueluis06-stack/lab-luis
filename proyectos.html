<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CINE VIVO 3.2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* 🌌 ESTRELLAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* 🟢 BOTÓN INICIO */
#startBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:120px;
height:120px;
border-radius:50%;
border:2px solid cyan;
background:rgba(0,0,0,0.4);
color:cyan;
font-size:16px;
cursor:pointer;
box-shadow:
0 0 10px cyan,
0 0 30px cyan,
0 0 60px blue;
z-index:10;
}

/* 🚪 SALIR */
#exitBtn{
position:absolute;
top:20px;
right:20px;
display:none;
padding:10px 18px;
border:1px solid red;
color:red;
background:transparent;
z-index:20;
cursor:pointer;
}

/* 🌐 SKETCHFAB */
#portal{
position:absolute;
width:100%;
height:100%;
display:none;
z-index:5;
}

iframe{
width:100%;
height:100%;
border:none;
background:black;
}

/* ⚫ BLACK */
#black{
position:absolute;
width:100%;
height:100%;
background:black;
display:none;
z-index:50;
}

/* 👽 ALIEN */
#alien{
position:absolute;
width:100%;
height:100%;
display:none;
z-index:10;
}

#alien video{
width:100%;
height:100%;
object-fit:contain;
}

/* 📡 CREDITS */
#credits{
position:absolute;
bottom:-100%;
width:100%;
color:white;
text-align:center;
font-size:13px;
animation:scroll 14s linear forwards;
z-index:6;
display:none;
}

@keyframes scroll{
from{bottom:-100%;}
to{bottom:120%;}
}

/* 📺 YOUTUBE */
#yt{
position:absolute;
width:100%;
height:100%;
display:none;
z-index:6;
}

.panel{
width:45%;
height:250px;
display:inline-block;
margin:10px;
border:1px solid cyan;
box-shadow:0 0 15px cyan;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<button id="startBtn">INICIO</button>
<button id="exitBtn">SALIR</button>

<div id="portal">
<iframe id="skfb"
src="https://sketchfab.com/models/7PussaZ3dJQ/embed?autostart=1&ui_controls=0"></iframe>
</div>

<div id="black"></div>

<div id="alien">
<video id="alienVideo" src="alien2.mp4" muted playsinline></video>
</div>

<div id="credits">
<h3>LABORATORIO CINE VIVO</h3>
<p style="opacity:0.5">Luis JPG · sistema experimental de visualización</p>
</div>

<div id="yt">
<iframe class="panel"
src="https://www.youtube.com/embed/BPltDt8rhsQ"
allowfullscreen></iframe>

<iframe class="panel"
src="https://www.youtube.com/embed/yizhsJJO3-s"
allowfullscreen></iframe>
</div>

<script>

/* 🌌 ESTRELLAS */
const c=document.getElementById("stars");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let stars=[];

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*1.5
});
}

function animate(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="white";

for(let s of stars){
s.y+=0.4;
if(s.y>c.height){s.y=0;s.x=Math.random()*c.width;}

ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
}

requestAnimationFrame(animate);
}
animate();

/* 🔊 AUDIO */
let audio;

function startAudio(){
audio=new (window.AudioContext||window.webkitAudioContext)();
audio.resume();

let osc=audio.createOscillator();
let gain=audio.createGain();

osc.type="sine";
osc.frequency.value=41;
gain.gain.value=0.03;

osc.connect(gain);
gain.connect(audio.destination);

osc.start();
}

/* 🚀 FLUJO */
const startBtn=document.getElementById("startBtn");
const exitBtn=document.getElementById("exitBtn");

startBtn.onclick=()=>{

startAudio();

startBtn.style.display="none";
exitBtn.style.display="block";

/* 🌐 PORTAL */
document.getElementById("portal").style.display="block";

/* ⚫ TRANSICIÓN */
setTimeout(()=>{

document.getElementById("portal").style.display="none";
document.getElementById("black").style.display="block";

setTimeout(()=>{

document.getElementById("black").style.display="none";

/* 👽 ALIEN */
let v=document.getElementById("alienVideo");

document.getElementById("alien").style.display="block";
v.play().catch(()=>{});

v.onended=()=>{

document.getElementById("alien").style.display="none";

/* 📡 CREDITS */
document.getElementById("credits").style.display="block";

setTimeout(()=>{

document.getElementById("credits").style.display="none";

/* 📺 YOUTUBE */
document.getElementById("yt").style.display="block";

},7000);

};

},900);

},3500);

};

/* 🚪 EXIT */
exitBtn.onclick=()=>{
window.location.href="index.html";
};

</script>

</body>
</html>
