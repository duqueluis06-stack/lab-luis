<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>proyectos.html</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  overflow:hidden;
  font-family:Arial;
}

.scene{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  align-items:center;
  justify-content:center;
}

/* PORTAL */
.portalWrap{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle, rgba(0,255,255,0.15), transparent 60%);
  animation: pulse 4s infinite;
}

@keyframes pulse{
  0%{transform:scale(1); filter:brightness(1);}
  50%{transform:scale(1.05); filter:brightness(1.4);}
  100%{transform:scale(1); filter:brightness(1);}
}

iframe{
  width:80%;
  height:80%;
  border:0;
}

/* ALIEN */
#alienWrap{
  width:340px;
  height:340px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 0 60px cyan;
}

#alien{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* DESC */
.textScroll{
  width:70%;
  font-size:20px;
  animation: scroll 10s linear;
}

@keyframes scroll{
  from{transform:translateY(100%);}
  to{transform:translateY(-120%);}
}

/* LUIS */
#luisImg{
  width:280px;
  border-radius:15px;
  box-shadow:0 0 40px #00ffcc;
}

/* YT */
iframe.yt{
  width:420px;
  height:240px;
  margin:10px;
}

/* BUTTON */
#exit{
  position:absolute;
  bottom:20px;
  right:20px;
  padding:10px 20px;
  background:cyan;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<button id="exit">Salir</button>

<!-- PORTAL -->
<div id="s0" class="scene" style="display:flex">
  <div class="portalWrap">
    <iframe src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed"></iframe>
  </div>
</div>

<!-- ALIEN -->
<div id="s1" class="scene">
  <div id="alienWrap">
    <video id="alien" muted playsinline>
      <source src="alien2-tele.mp4" type="video/mp4">
    </video>
  </div>
</div>

<!-- DESC -->
<div id="s2" class="scene">
  <div class="textScroll">
    EXPERIMENTO INTERDIMENSIONAL ACTIVO...<br>
    PORTAL ESTABLE...<br>
    ENTIDAD DETECTADA...
  </div>
</div>

<!-- LUIS -->
<div id="s3" class="scene">
  <img id="luisImg" src="Luis.jpg">
</div>

<!-- YT -->
<div id="s4" class="scene">
  <div>
    <iframe class="yt" src="https://www.youtube.com/embed/BPltDt8rhsQ"></iframe>
    <iframe class="yt" src="https://www.youtube.com/embed/yizhsJJO3-s"></iframe>
  </div>
</div>

<script>
// AUDIO ESPACIAL (WebAudio)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const panner = audioCtx.createPanner();
panner.panningModel = "HRTF";
panner.distanceModel = "inverse";
panner.positionX.value = 0;
panner.positionY.value = 0;
panner.positionZ.value = -1;
panner.connect(audioCtx.destination);

function beep(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = 120;

  gain.gain.value = 0.05;

  osc.connect(gain);
  gain.connect(panner);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

// ALIEN
const alien = document.getElementById("alien");
function playAlien(){
  alien.currentTime = 0;
  alien.play().catch(()=>{});
}

// FLOW
const scenes = ["s0","s1","s2","s3","s4"];
let i = 0;

function showScene(n){
  document.querySelectorAll(".scene").forEach(s=>s.style.display="none");
  document.getElementById(scenes[n]).style.display="flex";
}

function next(){
  showScene(i);

  if(i === 0) beep();
  if(i === 1) playAlien();

  i++;
  if(i < scenes.length){
    setTimeout(next, 6500);
  }
}

// START
window.onload = () => {
  audioCtx.resume();
  next();
};

// EXIT
document.getElementById("exit").onclick = () => location.reload();
</script>

</body>
</html>
