<!-- 👽 ALIEN -->
<div id="alien">
<video id="alienVideo" playsinline>
    <source src="alien-kdp.mp4" type="video/mp4">
</video>
</div>

<audio id="alienVoice" src="alien-kdp.mp3" preload="auto"></audio>

<script>
(() => {

    const alien = document.getElementById("alien");
    const video = document.getElementById("alienVideo");
    const audio = document.getElementById("alienVoice");

    let played = false;

    function playAlien() {

        if (played) return;
        played = true;

        alien.style.opacity = "1";

        video.currentTime = 0;
        audio.currentTime = 0;

        video.play().catch(() => {
            document.addEventListener("click", forcePlay, { once: true });
            document.addEventListener("touchstart", forcePlay, { once: true });
        });

        audio.play().catch(()=>{});

        function forcePlay() {
            video.play();
            audio.play();
        }

        // ⏱ duración real del video
        video.onloadedmetadata = () => {
            const duracion = video.duration * 1000;

            setTimeout(() => {
                alien.style.opacity = "0";
                video.pause();
            }, duracion);
        };
    }

    window.addEventListener("load", playAlien);

})();
</script>
