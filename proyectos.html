<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>proyectos.html</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* 🌌 ESTRELLAS */
canvas{
  position:fixed;
  inset:0;
  z-index:-2;
}

/* 🔮 SKETCHFAB BASE */
#sketchfabLayer{
  position:absolute;
  inset:0;
  z-index:1;
}

#skfb{
  width:100%;
  height:100%;
  border:0;
}

/* 🧿 BOTÓN */
#start{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:200px;
  height:200px;
  border-radius:50%;
  border:2px solid cyan;
  background:transparent;
  color:cyan;
  box-shadow:0 0 40px cyan;
  cursor:pointer;
  z-index:10;
}

/* 👽 ALIEN */
#alienLayer{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  z-index:5;
}

#alien{
  height:90%;
  object-fit:contain;
  box-shadow:0 0 60px cyan;
}

/* 🎬 FINAL */
#finalLayer{
  position:absolute;
  inset:0;
  display:none;
  background:black;
  color:white;
  z-index:6;
}

/* TEXTO */
#text{
  position:absolute;
  bottom:-100%;
  width:60%;
  left:20%;
  text-align:center;
  animation:scroll 18s linear forwards;
}

@keyframes scroll{
  from{bottom:-100%;}
  to{bottom:120%;}
}

/* 🖼 */
#luis{
  position:absolute;
  top:20px;
  right:20px;
  width:140px;
}

/* 📺 */
#yt{
  position:absolute;
  bottom:80px;
  width:100%;
  text-align:center;
}

/* 🧾 */
#credits{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:11px;
  color:#666;
}

/* 🚪 SALIR */
#exit{
  position:absolute;
  bottom:20px;
  right:20px;
  padding:10px;
  background:cyan;
  border:none;
  z-index:20;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<button id="start">TELETRANSPORTACIÓN</button>
<button id="exit">SALIR</button>

<!-- 🔮 SKETCHFAB LIMPIO -->
<div id="sketchfabLayer">
<iframe id="skfb"
src="https://sketchfab.com/models/d1e3da048b494800b7b7e83893c29740/embed?autostart=1&ui_controls=0&ui_infos=0&ui_watermark=0&ui_stop=0&ui_help=0"
allow="autoplay; fullscreen">
</iframe>
</div>

<!-- 👽 ALIEN -->
<div id="alienLayer">
<video id="alien" muted playsinline>
<source src="alien2-tele.mp4">
</video>
</div>

<!-- 🎬 FINAL -->
<div id="finalLayer">

<img id="luis" src="luis.JPG">

<div id="text">
TRANSMISIÓN CUÁNTICA ACTIVA<br><br>
Interacción entre partículas entrelazadas.<br><br>
Transferencia de estado en el espacio-tiempo.<br><br>
Modelos experimentales en desarrollo.
</div>

<div id="yt">
<iframe width="300" height="180"
src="https://www.youtube.com/embed/BPltDt8rhsQ"></iframe>

<iframe width="300" height="180"
src="https://www.youtube.com/embed/yizhsJJO3-s"></iframe>
</div>

<div id="credits">
Dr Strange Portal — MW 3D
</div>

</div>

<script>

/* 🌌 ESTRELLAS */
const c=document.getElementById("stars");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let stars=[];
for(let i=0;i<200;i++){
  stars.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="cyan";
  stars.forEach(s=>{
    s.y+=0.4;
    if(s.y>c.height)s.y=0;
    ctx.fillRect(s.x,s.y,1,1);
  });
  requestAnimationFrame(draw);
}
draw();

/* FLOW */
const start=document.getElementById("start");
const alienLayer=document.getElementById("alienLayer");
const alien=document.getElementById("alien");
const finalLayer=document.getElementById("finalLayer");

/* 🚀 START */
start.onclick=()=>{

  /* 🔥 ELIMINAR BOTÓN COMPLETAMENTE */
  start.remove();

  /* 🔮 DEJAR SKETCHFAB SOLO */
  setTimeout(()=>{

    /* 👽 ALIEN */
    alienLayer.style.display="flex";
    alien.play();

    alien.onended=()=>{

      alienLayer.style.display="none";
      finalLayer.style.display="block";

    };

  },30000);

};

/* 🚪 EXIT FUNCIONAL */
document.getElementById("exit").onclick=()=>{
  window.location.href="index.html";
};

</script>

</body>
</html>
