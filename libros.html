<script>

/* 🌌 STARS */
const c=document.getElementById("stars");
const x=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let s=[...Array(120)].map(()=>({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  r:Math.random()*2,
  v:Math.random()*0.5
}));

function d(){
  x.clearRect(0,0,c.width,c.height);
  s.forEach(st=>{
    x.beginPath();
    x.arc(st.x,st.y,st.r,0,Math.PI*2);
    x.fillStyle="white";
    x.fill();
    st.y+=st.v;
    if(st.y>c.height) st.y=0;
  });
  requestAnimationFrame(d);
}
d();

/* 👽 AUDIO PRO */
const audio=document.getElementById("alienVoice");
const video=document.getElementById("alienVideo");

const ctx=new (window.AudioContext||window.webkitAudioContext)();
const src=ctx.createMediaElementSource(audio);
const analyser=ctx.createAnalyser();

analyser.fftSize=256;
src.connect(analyser);
analyser.connect(ctx.destination);

const data=new Uint8Array(analyser.frequencyBinCount);
const canvas=document.getElementById("vumeter");
const ctx2=canvas.getContext("2d");

let on=false;

function toggleAlien(){
  if(ctx.state==="suspended") ctx.resume();

  if(!on){
    audio.play();
    video.play();
    loop();
    on=true;
  }else{
    audio.pause();
    video.pause();
    on=false;
  }
}

document.getElementById("volumeControl").oninput=e=>{
  audio.volume=e.target.value;
};

function loop(){
  if(!on) return;

  requestAnimationFrame(loop);

  analyser.getByteFrequencyData(data);

  ctx2.fillStyle="#000";
  ctx2.fillRect(0,0,canvas.width,canvas.height);

  let max=0, idx=0;

  for(let i=0;i<data.length;i++){
    let val=data[i];

    if(val>max){max=val; idx=i;}

    ctx2.fillStyle="cyan";
    ctx2.fillRect(i*3, canvas.height-val/2, 2, val/2);
  }

  let freq=(idx/data.length)*(ctx.sampleRate/2);
  document.getElementById("freqDisplay").innerText="Hz: "+Math.round(freq);
}

</script>
