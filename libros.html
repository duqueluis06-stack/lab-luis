<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lab Luis | Central de Inteligencia 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =========================
   🌌 BASE MATRIX & GRID
========================= */
body {
    margin:0;
    font-family: 'Courier New', Courier, monospace;
    color:#00ffcc;
    background: #010103;
    overflow-x: hidden;
}

header {
    padding:30px;
    font-size:clamp(20px, 5vw, 45px);
    font-weight:bold;
    text-transform: uppercase;
    letter-spacing: 5px;
    background: rgba(0,0,0,0.9);
    border-bottom: 2px solid #00ff66;
    text-shadow: 0 0 10px #00ff66;
    text-align: center;
}

/* 🚀 BOTÓN RGB VENTA */
.sales-banner {
    padding: 30px;
    background: rgba(0,255,102,0.05);
    text-align: center;
    border-bottom: 1px solid #111;
}

.rgb-btn {
    display: inline-block;
    padding: 15px 40px;
    font-weight: 900;
    font-size: 1.2rem;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
    background: linear-gradient(90deg, #ff0000, #ff7300, #48ff00, #002bff, #ff00c8);
    background-size: 400%;
    animation: rgbFlow 8s linear infinite;
    border: none;
    cursor: pointer;
}
@keyframes rgbFlow { 0% {background-position: 0%;} 100% {background-position: 400%;} }

/* =========================
   📦 ESTRUCTURA HORIZONTAL (GRID)
========================= */
.main-grid {
    max-width: 1400px;
    margin: 40px auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 0 20px;
}

.card {
    background: rgba(0,0,0,0.8);
    border: 1px solid #222;
    border-radius: 10px;
    padding: 20px;
    transition: 0.3s;
    text-align: center;
}
.card:hover { border-color: #00ffcc; transform: translateY(-5px); }
.card img { width: 100%; border-radius: 5px; margin-bottom: 15px; border: 1px solid #333; }

/* 👽 ALIEN COMMAND CENTER */
.alien-card {
    grid-column: span 1; 
    background: #000;
    border: 2px solid #bc13fe;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
}

#alienVideo { width: 100%; border-radius: 8px; filter: hue-rotate(280deg); }

.vu-meter {
    height: 50px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    margin: 15px 0;
    background: #0a0a0a;
    padding: 5px;
    border: 1px solid #1a1a1a;
}
.bar { flex: 1; background: #bc13fe; height: 5%; transition: 0.1s; }

.stats-line {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #bc13fe;
    margin-bottom: 15px;
}

.controls-row { display: flex; gap: 10px; }
.btn-alien {
    flex: 1; padding: 10px; background: none; border: 1px solid #bc13fe;
    color: #bc13fe; font-weight: bold; cursor: pointer; border-radius: 4px;
}
.btn-alien:hover { background: #bc13fe; color: #000; }

/* 🟢 WHATSAPP NEÓN */
.wa-float {
    position: fixed; bottom: 30px; right: 30px;
    width: 65px; height: 65px;
    background: #000; border: 2px solid #00ff66;
    border-radius: 50%; display: flex; justify-content: center; align-items: center;
    box-shadow: 0 0 15px #00ff66; z-index: 1000;
    text-decoration: none;
}

/* =========================
   📱 AJUSTE FILA INFERIOR
========================= */
.bottom-row {
    grid-column: 1 / -1;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

@media (max-width: 1000px) { .bottom-row { display: grid; grid-template-columns: 1fr 1fr; } }
</style>
</head>

<body>

<header>LUIS DUQUE • LAB 2026</header>

<div class="sales-banner">
    <p style="margin-bottom:15px;">Diseño Web de Alta Gama: Moderno, Responsivo e Interactivo.</p>
    <a href="https://duqueluis06-stack.github.io/interactive-web/" target="_blank" class="rgb-btn">🚀 VER DEMO DE INGENIERÍA</a>
</div>

<div class="main-grid">
    <div class="card">
        <img src="misterios.jpg">
        <p><strong>Sueños y Misterios</strong></p>
        <a href="https://amazon.com/author/luisduque" target="_blank" style="color:#00ffcc; font-size:12px;">ADQUIRIR EN KDP</a>
    </div>

    <div class="card">
        <img src="bestia.jpg">
        <p><strong>La Bestia</strong></p>
        <a href="https://amazon.com/author/luisduque" target="_blank" style="color:#00ffcc; font-size:12px;">ADQUIRIR EN KDP</a>
    </div>

    <div class="card">
        <img src="descifrando.jpg">
        <p><strong>El Enigma</strong></p>
        <a href="https://amazon.com/author/luisduque" target="_blank" style="color:#00ffcc; font-size:12px;">ADQUIRIR EN KDP</a>
    </div>

    <div class="alien-card">
        <video id="alienVideo" playsinline poster="alien-poster.jpg">
            <source src="alien-kdp.mp4" type="video/mp4">
        </video>
        <div class="vu-meter" id="vuMeter">
            </div>
        <div class="stats-line">
            <span>⏱️ <span id="timer">00:00</span></span>
            <span>📡 <span id="hz">0</span> HZ</span>
        </div>
        <div class="controls-row">
            <button class="btn-alien" id="playBtn">TRANSMITIR</button>
            <button class="btn-alien" id="pauseBtn">PAUSA</button>
        </div>
        <audio id="alienVoice" src="alien-kdp.mp3"></audio>
    </div>

    <div class="bottom-row">
        <div class="card" style="max-width:300px;">
            <img src="decrypter.jpg">
            <p><strong>Décrypter (FR)</strong></p>
            <a href="https://amazon.com/author/luisduque" target="_blank" style="color:#00ffcc; font-size:12px;">ADQUIRIR EN KDP</a>
        </div>
        <div class="card" style="max-width:300px;">
            <img src="innovaciones.jpg">
            <p><strong>Innovaciones 2026</strong></p>
            <a href="https://amazon.com/author/luisduque" target="_blank" style="color:#00ffcc; font-size:12px;">ADQUIRIR EN KDP</a>
        </div>
    </div>
</div>

<a href="https://wa.me/33610342894" class="wa-float" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
</a>

<script>
const audio = document.getElementById('alienVoice');
const video = document.getElementById('alienVideo');
const playBtn = document.getElementById('playBtn');
const pauseBtn = document.getElementById('pauseBtn');
const vuMeter = document.getElementById('vuMeter');
const timerDisp = document.getElementById('timer');
const hzDisp = document.getElementById('hz');

// Generar barras del vúmetro
for(let i=0; i<30; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    vuMeter.appendChild(bar);
}
const bars = document.querySelectorAll('.bar');

let isPlaying = false;

function motorVisual() {
    if (audio.paused || audio.ended) {
        isPlaying = false;
        bars.forEach(b => b.style.height = '5%');
        hzDisp.innerText = '0';
        return;
    }

    // Actualización de Tiempo Real ⏱️
    let m = Math.floor(audio.currentTime / 60);
    let s = Math.floor(audio.currentTime % 60);
    timerDisp.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

    // Actualización de Vúmetro 📶
    bars.forEach(b => {
        let h = Math.random() * 95 + 5;
        b.style.height = h + '%';
        b.style.background = h > 80 ? '#00ffcc' : '#bc13fe';
    });

    // Actualización de Hz 📡
    hzDisp.innerText = Math.floor(Math.random() * 1500 + 14000);

    requestAnimationFrame(motorVisual);
}

playBtn.addEventListener('click', () => {
    audio.play();
    video.play();
    if(!isPlaying) {
        isPlaying = true;
        motorVisual();
    }
});

pauseBtn.addEventListener('click', () => {
    audio.pause();
    video.pause();
});
</script>

</body>
</html>
