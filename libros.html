<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Biblioteca KDP - Lab Extreme</title>

<style>

/* 🌌 FONDO ANIMADO */
body {
    margin:0;
    font-family: Arial;
    text-align:center;
    color:#00ffcc;
    overflow-x:hidden;
    background:black;
}

/* partículas */
body::before {
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle, rgba(0,255,255,0.15) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,0,255,0.12) 1px, transparent 1px);
    background-size:50px 50px;
    animation:moveStars 30s linear infinite;
    z-index:-1;
}

@keyframes moveStars {
    from {transform:translate(0,0);}
    to {transform:translate(-500px, -500px);}
}

/* 🔵 HEADER NEÓN DINÁMICO */
header {
    padding:25px;
    font-size:36px;
    font-weight:bold;
    letter-spacing:2px;

    background:rgba(0,0,0,0.6);

    color:#00ccff;

    animation: glowTitle 2s infinite alternate;

    border-bottom:1px solid rgba(0,255,255,0.3);
}

@keyframes glowTitle {
    from {
        text-shadow:
        0 0 5px #00ccff,
        0 0 10px #00ccff,
        0 0 20px #ff00ff;
    }
    to {
        text-shadow:
        0 0 10px #00ffff,
        0 0 25px #00ccff,
        0 0 40px #ff00ff;
    }
}

/* NAV */
nav {
    margin:20px 0;
}

nav a {
    display:inline-block;
    margin:10px;
    padding:10px 15px;

    text-decoration:none;
    color:#00ffcc;

    border:1px solid rgba(0,255,255,0.4);
    border-radius:10px;

    background:rgba(0,0,0,0.5);

    transition:0.3s;
}

nav a:hover {
    transform:scale(1.1);
    box-shadow:0 0 20px #00ffff;
    background:#00ffcc;
    color:black;
}

/* SECTION */
.section {
    width:88%;
    margin:auto;
    padding:30px;

    background:rgba(0,0,0,0.7);
    border-radius:15px;

    border:1px solid rgba(0,255,255,0.2);
}

/* SUBTÍTULO */
h2 {
    color:#00ccff;
    text-shadow:0 0 15px #00ccff;
}

/* 📦 CARDS FLOTANTES */
.card {
    display:inline-block;
    width:220px;
    margin:18px;
    padding:15px;

    background:rgba(0,0,0,0.7);

    border-radius:15px;
    border:1px solid rgba(0,255,255,0.3);

    box-shadow:0 0 15px rgba(0,255,255,0.15);

    transition:0.4s;
}

.card:hover {
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 30px rgba(0,255,255,0.4);
}

.card img {
    width:100%;
    border-radius:10px;
}

/* 💠 BOTÓN PULSO NEÓN */
.neon-btn {
    display:inline-block;
    margin-top:10px;
    padding:8px 12px;

    color:#00ffcc;
    border:1px solid #00ffcc;
    border-radius:8px;

    text-decoration:none;

    animation:pulse 2s infinite;
    transition:0.3s;
}

@keyframes pulse {
    0% {box-shadow:0 0 5px #00ffcc;}
    50% {box-shadow:0 0 20px #00ffff;}
    100% {box-shadow:0 0 5px #00ffcc;}
}

.neon-btn:hover {
    background:#00ffcc;
    color:black;
}

</style>
</head>

<body>

</nav>
