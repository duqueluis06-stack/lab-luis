<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lab Luis | Interface 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --neon-green: #00ff66;
    --neon-cyan: #00ffcc;
    --neon-purple: #bc13fe;
    --dark-bg: #010103;
}

body {
    margin: 0;
    padding: 0;
    background: var(--dark-bg);
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
}

/* 🌌 ESTRELLAS EN MOVIMIENTO */
#star-canvas {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1;
}

/* 🏆 TÍTULO 3D */
.deep-title {
    text-align: center;
    font-size: clamp(30px, 6vw, 70px);
    letter-spacing: 10px;
    margin: 30px 0;
    text-transform: uppercase;
    text-shadow: 0 1px 0 #ccc, 0 3px 0 #999, 0 6px 0 #666, 0 0 20px var(--neon-cyan);
}

.main-container {
    width: 95%;
    max-width: 1600px;
    margin: 0 auto;
}

/* 📚 SISTEMA DE ESTANTES (GRID) */
.shelf-layout {
    display: flex;
    flex-direction: column;
    gap: 30px;
    align-items: center;
}

/* Fila Superior: 3 Libros + Alien */
.shelf-row-top {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    width: 100%;
    flex-wrap: nowrap;
}

/* Fila Inferior: 2 Libros */
.shelf-row-bottom {
    display: flex;
    justify-content: center;
    gap: 40px;
    width: 100%;
}

.book-card {
    width: 220px;
    background: rgba(255,255,255,0.05);
    border: 1px solid #333;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
}

.book-card:hover { border-color: var(--neon-cyan); transform: translateY(-10px); }
.book-card img { width: 100%; border-radius: 5px; margin-bottom: 10px; }

.amazon-link {
    display: inline-block;
    margin-top: 10px;
    color: var(--neon-cyan);
    text-decoration: none;
    font-size: 12px;
    font-weight: bold;
    border: 1px solid var(--neon-cyan);
    padding: 5px 10px;
    border-radius: 3px;
}

/* 👽 ALIEN MEDIA HUB */
.alien-hub {
    width: 400px;
    background: #000;
    border: 2px solid var(--neon-purple);
    border-radius: 20px;
    padding: 15px;
    box-shadow: 0 0 30px rgba(188, 19, 254, 0.3);
}

.video-box { width: 100%; border-radius: 10px; overflow: hidden; background: #000; }
video { width: 100%; display: block; opacity: 0.8; }

.vu-meter {
    height: 50px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    margin: 15px 0;
    background: rgba(255,255,255,0.03);
    padding: 5px;
}

.bar { flex: 1; background: var(--neon-purple); height: 5%; transition: 0.1s; }

.controls { display: flex; gap: 10px; }
.btn-ui {
    flex: 1; padding: 10px;
    background: transparent; border: 1px solid var(--neon-purple);
    color: var(--neon-purple); cursor: pointer; font-weight: bold;
}

/* 🟢 WHATSAPP NEÓN */
.wa-neon {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 70px;
    height: 70px;
    background: transparent;
    border: 3px solid var(--neon-green);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 15px var(--neon-green), inset 0 0 15px var(--neon-green);
    z-index: 1000;
    animation: pulse-neon 2s infinite;
}

@keyframes pulse-neon { 
    0% { transform: scale(1); box-shadow: 0 0 15px var(--neon-green); }
    50% { transform: scale(1.1); box-shadow: 0 0 30px var(--neon-green); }
    100% { transform: scale(1); box-shadow: 0 0 15px var(--neon-green); }
}

footer {
    text-align: center;
    padding: 40px;
    color: #555;
    font-size: 14px;
    border-top: 1px solid #222;
    margin-top: 50px;
}

@media (max-width: 1200px) {
    .shelf-row-top, .shelf-row-bottom { flex-wrap: wrap; }
}
</style>
</head>
<body>

<canvas id="star-canvas"></canvas>

<div class="main-container">
    <h1 class="deep-title">LAB LUIS 2026</h1>

    <div class="shelf-layout">
        <div class="shelf-row-top">
            <div class="book-card">
                <img src="misterios.jpg">
                <p>Sueños y Misterios</p>
                <a href="https://www.amazon.com/author/luisduque" class="amazon-link">AMAZON KDP</a>
            </div>

            <div class="alien-hub">
                <div class="video-box">
                    <video id="alienVideo" playsinline poster="alien-poster.jpg">
                        <source src="alien-kdp.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="vu-meter" id="vuMeter"></div>
                <div style="text-align:center; font-size:12px; color:var(--neon-purple); margin-bottom:10px;">
                    SIGNAL: <span id="hz-val">0</span> Hz
                </div>
                <div class="controls">
                    <button class="btn-ui" id="playBtn">PLAY</button>
                    <button class="btn-ui" id="pauseBtn">PAUSE</button>
                </div>
                <audio id="alienVoice" src="alien-kdp.mp3"></audio>
            </div>

            <div class="book-card">
                <img src="bestia.jpg">
                <p>La Bestia</p>
                <a href="https://www.amazon.com/author/luisduque" class="amazon-link">AMAZON KDP</a>
            </div>
            <div class="book-card">
                <img src="descifrando.jpg">
                <p>El Enigma</p>
                <a href="https://www.amazon.com/author/luisduque" class="amazon-link">AMAZON KDP</a>
            </div>
        </div>

        <div class="shelf-row-bottom">
            <div class="book-card">
                <img src="decrypter.jpg">
                <p>Décrypter</p>
                <a href="https://www.amazon.com/author/luisduque" class="amazon-link">AMAZON KDP</a>
            </div>
            <div class="book-card">
                <img src="innovaciones.jpg">
                <p>Innovaciones 2026</p>
                <a href="https://www.amazon.com/author/luisduque" class="amazon-link">AMAZON KDP</a>
            </div>
        </div>
    </div>

    <div style="margin-top: 50px; text-align: center;">
        <a href="https://duqueluis06-stack.github.io/interactive-web/" target="_blank" 
           style="display:inline-block; padding:25px 50px; background:linear-gradient(45deg, #f06, #48ff00); border-radius:10px; color:#fff; text-decoration:none; font-weight:900; font-size:20px;">
           VER DEMOSTRACIÓN: ADQUIERE TU SITIO WEB AQUÍ
        </a>
    </div>
</div>

<a href="https://wa.me/33610342894" class="wa-neon" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
</a>

<footer>
    Luis Duque | Lab Luis 2026
</footer>

<script>
// ESTRELLAS
const canvas = document.getElementById('star-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
function initStars() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    stars = [];
    for(let i=0; i<100; i++) {
        stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.5 + 0.1 });
    }
}
function animate() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = "#fff";
    stars.forEach(s => { s.y += s.speed; if(s.y > canvas.height) s.y = 0; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); });
    requestAnimationFrame(animate);
}
initStars(); animate();

// ALIEN AUDIO & VU-METER
const video = document.getElementById('alienVideo');
const audio = document.getElementById('alienVoice');
const playBtn = document.getElementById('playBtn');
const pauseBtn = document.getElementById('pauseBtn');
const vuMeter = document.getElementById('vuMeter');
const hzVal = document.getElementById('hz-val');

for(let i=0; i<30; i++) {
    let b = document.createElement('div'); b.className = 'bar'; vuMeter.appendChild(b);
}
const bars = document.querySelectorAll('.bar');

playBtn.onclick = () => { 
    audio.play(); video.play(); 
    animateBars(); 
};
pauseBtn.onclick = () => { audio.pause(); video.pause(); };

function animateBars() {
    if(audio.paused) return;
    bars.forEach(b => {
        let h = Math.random() * 95 + 5;
        b.style.height = h + "%";
        b.style.background = h > 70 ? "var(--neon-cyan)" : "var(--neon-purple)";
    });
    hzVal.innerText = Math.floor(Math.random() * 1000 + 15000);
    requestAnimationFrame(animateBars);
}
</script>

</body>
</html>
