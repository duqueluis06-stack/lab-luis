<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Frecuencia Latina - Luis Duque | Night Mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* 🌌 BACKGROUND & BASE */
:root {
    --neon-blue: #00ffff;
    --neon-pink: #ff00ff;
    --neon-green: #00ffcc;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #050505;
    color: white;
    overflow-x: hidden;
}

/* ⭐ ESTRELLAS ANIMADAS */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
    background: radial-gradient(circle at center, #111 0%, #000 100%);
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.5;
    animation: fall 10s linear infinite;
}

@keyframes fall {
    from { transform: translateY(-10vh); }
    to { transform: translateY(110vh); }
}

/* 🔘 NAVEGACIÓN SUPERIOR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 15px 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    z-index: 100;
    border-bottom: 1px solid var(--neon-blue);
}

.nav-btn {
    text-decoration: none;
    color: var(--neon-green);
    border: 1px solid var(--neon-green);
    padding: 8px 15px;
    border-radius: 5px;
    font-size: 12px;
    transition: 0.3s;
    text-transform: uppercase;
    font-weight: bold;
}

.nav-btn:hover {
    background: var(--neon-green);
    color: black;
    box-shadow: 0 0 15px var(--neon-green);
}

/* 🎬 VIDEOS (DISCO DANCERS) */
.video-container {
    display: flex;
    justify-content: space-between;
    padding: 80px 20px 20px;
    pointer-events: none;
}

.video {
    width: 140px;
    height: 140px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid var(--neon-pink);
    box-shadow: 0 0 20px var(--neon-pink);
}

/* 🖼️ PORTADA Y CONTENEDOR */
.main-content {
    position: relative;
    z-index: 2;
    max-width: 800px;
    margin: 0 auto;
    text-align: center;
    padding: 20px;
}

.cover {
    width: 180px;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
    margin-bottom: 20px;
    border: 2px solid white;
}

/* 📊 VISUALIZADOR */
.visualizer-card {
    background: rgba(20, 20, 20, 0.8);
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 25px;
    border: 1px solid #333;
}

canvas {
    width: 100%;
    height: 100px;
    border-radius: 10px;
}

#info {
    font-family: monospace;
    color: var(--neon-blue);
    margin-top: 10px;
}

/* 🎧 LISTA DE TRACKS */
.tracks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 15px;
    padding-bottom: 100px;
}

.track-card {
    background: rgba(255, 255, 255, 0.05);
    padding: 15px;
    border-radius: 12px;
    border-left: 4px solid var(--neon-blue);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

.track-card:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: scale(1.02);
}

.track-info { text-align: left; }

.controls button {
    background: none;
    border: 1px solid var(--neon-green);
    color: var(--neon-green);
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

.controls button:hover {
    background: var(--neon-green);
    color: black;
}

/* ☕ KO-FI PULSANTE */
.kofi {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 0 20px var(--neon-pink);
    z-index: 100;
    text-decoration: none;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 20px var(--neon-pink); }
    50% { transform: scale(1.1); box-shadow: 0 0 40px var(--neon-blue); }
    100% { transform: scale(1); box-shadow: 0 0 20px var(--neon-pink); }
}

/* MOBILE ADJUSTMENTS */
@media (max-width: 600px) {
    .video { width: 80px; height: 80px; }
    .video-container { padding-top: 100px; }
    .nav-btn { font-size: 10px; padding: 6px 10px; }
}
</style>
</head>

<body>

<div class="stars" id="star-container"></div>

<nav class="navbar">
    <a class="nav-btn" href="duqueluis-mp3.html">⬅ Regresar</a>
    <a class="nav-btn" href="music.html">🎧 Audio Lab</a>
    <a class="nav-btn" href="index.html">🏠 Inicio</a>
</nav>

<div class="video-container">
    <video class="video" id="v1" src="dancing.mp4" loop muted playsinline></video>
    <video class="video" id="v2" src="dancing.mp4" loop muted playsinline></video>
</div>

<div class="main-content">
    <img src="frecuencia-latina.PNG" class="cover" alt="Portada">
    
    <div class="visualizer-card">
        <canvas id="vu"></canvas>
        <div id="info">SISTEMA LISTO</div>
    </div>

    <div class="tracks-grid" id="tracks"></div>
</div>

<a class="kofi" href="https://ko-fi.com/luisduque" target="_blank">👽</a>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
/* ⭐ ESTRELLAS */
const starContainer = document.getElementById('star-container');
for(let i=0; i<80; i++){
    let s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.animationDelay = Math.random() * 10 + "s";
    starContainer.appendChild(s);
}

const tracks = [
    {file:"baila-conmigo.mp3", name:"💃 Baila Conmigo"},
    {file:"baila-mi-corazon.mp3", name:"❤️ Baila Mi Corazón"},
    {file:"baila-pegadito.mp3", name:"🔥 Baila Pegadito"},
    {file:"bajo-el-mismo-alambre.mp3", name:"⚡ Bajo el Mismo Alambre"},
    {file:"dime-si-vuelves.mp3", name:"🌙 Dime Si Vuelves"},
    {file:"la-silla-vacia.mp3", name:"🪑 La Silla Vacía"},
    {file:"luna.mp3", name:"🌕 Luna"},
    {file:"me-quede-solo.mp3", name:"🖤 Me Quedé Solo"},
    {file:"pegate-al-pulso.mp3", name:"🫀 Pégate al Pulso"},
    {file:"pegate-mas.mp3", name:"🔊 Pégate Más"},
    {file:"tu-recuerdo.mp3", name:"🌫️ Tu Recuerdo"},
    {file:"tus-ojos.mp3", name:"👁️ Tus Ojos"}
];

let audio = document.getElementById("audio");
let v1 = document.getElementById("v1");
let v2 = document.getElementById("v2");
let currentIdx = 0;
let audioCtx;
let analyser;
let data;

/* 🎧 FUNCIONES */
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaElementSource(audio);
        analyser = audioCtx.createAnalyser();
        src.connect(analyser);
        analyser.connect(audioCtx.destination);
        data = new Uint8Array(analyser.frequencyBinCount);
        draw();
    }
}

function playTrack(idx) {
    initAudio();
    currentIdx = idx;
    audio.src = tracks[idx].file;
    audio.play();
    v1.play(); v2.play();
}

audio.onended = () => {
    currentIdx++;
    if(currentIdx < tracks.length) playTrack(currentIdx);
};

/* UI GENERATION */
const grid = document.getElementById("tracks");
tracks.forEach((t, idx) => {
    grid.innerHTML += `
    <div class="track-card">
        <div class="track-info">
            <strong>${t.name}</strong>
        </div>
        <div class="controls">
            <button onclick="playTrack(${idx})">▶</button>
            <button onclick="audio.pause(); v1.pause(); v2.pause();">⏸</button>
        </div>
    </div>`;
});

/* 📊 VU DRAW */
function draw() {
    requestAnimationFrame(draw);
    let canvas = document.getElementById("vu");
    let c = canvas.getContext("2d");
    let w = canvas.width = canvas.offsetWidth;
    let h = canvas.height = canvas.offsetHeight;

    analyser.getByteFrequencyData(data);
    c.clearRect(0, 0, w, h);

    let barWidth = (w / data.length) * 2.5;
    let barHeight;
    let x = 0;

    for(let i = 0; i < data.length; i++) {
        barHeight = data[i] / 2;
        c.fillStyle = `rgb(0, ${data[i]+100}, 255)`;
        c.fillRect(x, h - barHeight, barWidth, barHeight);
        x += barWidth + 1;
    }
    
    let avg = data.reduce((a, b) => a + b) / data.length;
    document.getElementById("info").innerText = "FRECUENCIA: " + Math.round(avg) + " Hz";
}
</script>

</body>
</html>
