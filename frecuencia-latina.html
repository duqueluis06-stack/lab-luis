<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Frecuencia Latina - Lab Luis V5</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* 🌌 ESTILO DISCOTECA NEÓN */
:root {
    --neon-blue: #00ffff;
    --neon-pink: #ff00ff;
    --neon-green: #00ffcc;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* ⭐ ESTRELLAS */
.stars { position: fixed; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #111, #000); }
.star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; }

/* 🔘 NAVEGACIÓN CORREGIDA */
.navbar {
    position: fixed;
    top: 0; width: 100%;
    display: flex; justify-content: center; gap: 15px;
    padding: 15px 0; background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px); z-index: 1000;
    border-bottom: 1px solid var(--neon-blue);
}
.nav-btn {
    text-decoration: none; color: var(--neon-green);
    border: 1px solid var(--neon-green); padding: 8px 15px;
    border-radius: 5px; font-size: 12px; font-weight: bold;
    transition: 0.3s;
}
.nav-btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 15px var(--neon-green); }

/* 🎬 VIDEO ÚNICO */
.video-frame {
    display: flex; justify-content: center;
    padding-top: 100px; margin-bottom: 20px;
}
.video-main {
    width: 200px; height: 200px;
    object-fit: cover; border-radius: 50%;
    border: 4px solid var(--neon-pink);
    box-shadow: 0 0 30px var(--neon-pink);
}

/* 🖼️ DISCO QUE GIRA */
.main-content { text-align: center; position: relative; z-index: 2; padding: 20px; }
.cover {
    width: 150px; border-radius: 50%; border: 3px solid white;
    margin-bottom: 20px; transition: 0.5s;
    animation: rotate 12s linear infinite;
    animation-play-state: paused;
}
@keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* 📊 VISUALIZADOR Y TIEMPO */
.visualizer-card {
    background: rgba(20, 20, 20, 0.9);
    border-radius: 20px; padding: 20px;
    max-width: 600px; margin: 0 auto 30px;
    border: 1px solid #333;
}
#time-display { font-family: monospace; color: var(--neon-green); font-size: 1.5rem; margin-bottom: 10px; }
canvas { width: 100%; height: 100px; }

/* 🎧 TRACKS */
.tracks-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 15px; max-width: 1000px; margin: 0 auto 100px;
}
.track-card {
    background: rgba(255, 255, 255, 0.05); padding: 15px;
    border-radius: 12px; display: flex; justify-content: space-between;
    align-items: center; border-left: 4px solid var(--neon-blue);
}
.controls button {
    background: none; border: 1px solid var(--neon-green);
    color: var(--neon-green); padding: 8px 12px; border-radius: 5px; cursor: pointer;
}
.controls button:hover { background: var(--neon-green); color: black; }

/* ☕ KO-FI (EL ALIEN REGRESA) */
.kofi {
    position: fixed; bottom: 30px; right: 30px;
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; z-index: 1000; text-decoration: none;
    animation: pulse 2s infinite; box-shadow: 0 0 20px var(--neon-pink);
}
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

</style>
</head>
<body>

<div class="stars" id="star-container"></div>

<nav class="navbar">
    <a class="nav-btn" href="duqueluis-mp3.html">⬅ VOLVER</a>
    <a class="nav-btn" href="index.html">🏠 INICIO</a>
</nav>

<div class="video-frame">
    <video class="video-main" id="v1" loop muted playsinline>
        <source src="dancing.mp4" type="video/mp4">
    </video>
</div>

<div class="main-content">
    <img src="frecuencia-latina.PNG" id="disco" class="cover" alt="Disco">
    
    <div class="visualizer-card">
        <div id="time-display">00:00 / 00:00</div>
        <canvas id="vu"></canvas>
    </div>

    <div class="tracks-grid" id="tracks"></div>
</div>

<a class="kofi" href="https://ko-fi.com/luisduque" target="_blank">👽</a>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
/* ESTRELLAS */
const starContainer = document.getElementById('star-container');
for(let i=0; i<80; i++){
    let s = document.createElement("div");
    s.className = "star";
    s.style.width = s.style.height = "2px";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    starContainer.appendChild(s);
}

const tracks = [
    {file:"baila-conmigo.mp3", name:"💃 Baila Conmigo"},
    {file:"baila-mi-corazon.mp3", name:"❤️ Baila Mi Corazón"},
    {file:"baila-pegadito.mp3", name:"🔥 Baila Pegadito"},
    {file:"bajo-el-mismo-alambre.mp3", name:"⚡ Bajo el Mismo Alambre"},
    {file:"dime-si-vuelves.mp3", name:"🌙 Dime Si Vuelves"},
    {file:"la-silla-vacia.mp3", name:"🪑 La Silla Vacía"},
    {file:"luna.mp3", name:"🌕 Luna"},
    {file:"me-quede-solo.mp3", name:"🖤 Me Quedé Solo"},
    {file:"pegate-al-pulso.mp3", name:"🫀 Pégate al Pulso"},
    {file:"pegate-mas.mp3", name:"🔊 Pégate Más"},
    {file:"tu-recuerdo.mp3", name:"🌫️ Tu Recuerdo"},
    {file:"tus-ojos.mp3", name:"👁️ Tus Ojos"}
];

let audio = document.getElementById("audio");
let v1 = document.getElementById("v1");
let disco = document.getElementById("disco");
let currentFile = "";
let audioCtx, analyser, data;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaElementSource(audio);
        analyser = audioCtx.createAnalyser();
        src.connect(analyser);
        analyser.connect(audioCtx.destination);
        data = new Uint8Array(analyser.frequencyBinCount);
        draw();
    }
}

function playTrack(file) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    if (currentFile !== file) {
        audio.src = file;
        currentFile = file;
    }
    
    audio.play();
    v1.play();
    disco.style.animationPlayState = "running";
}

function pauseTrack() {
    audio.pause();
    v1.pause();
    disco.style.animationPlayState = "paused";
}

audio.ontimeupdate = () => {
    const cur = formatTime(audio.currentTime);
    const dur = formatTime(audio.duration || 0);
    document.getElementById("time-display").innerText = `${cur} / ${dur}`;
};

function formatTime(s) {
    let min = Math.floor(s / 60);
    let sec = Math.floor(s % 60);
    return (min < 10 ? "0" : "") + min + ":" + (sec < 10 ? "0" : "") + sec;
}

function draw() {
    requestAnimationFrame(draw);
    let canvas = document.getElementById("vu");
    let ctx = canvas.getContext("2d");
    let w = canvas.width = canvas.offsetWidth;
    let h = canvas.height = canvas.offsetHeight;
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0, 0, w, h);
    
    ctx.beginPath();
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#00ffff';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00ffff';
    
    let x = 0;
    let slice = w / data.length;
    for(let i=0; i<data.length; i++) {
        let v = data[i] / 128.0;
        let y = v * h / 2;
        if(i===0) ctx.moveTo(x, h-y); else ctx.lineTo(x, h-y);
        x += slice;
    }
    ctx.stroke();
}

const grid = document.getElementById("tracks");
tracks.forEach((t) => {
    grid.innerHTML += `
    <div class="track-card">
        <strong>${t.name}</strong>
        <div class="controls">
            <button onclick="playTrack('${t.file}')">▶</button>
            <button onclick="pauseTrack()">⏸</button>
        </div>
    </div>`;
});
</script>
</body>
</html>
