<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Frecuencia Latina - Lab Luis V6 Space Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --neon-blue: #00ffff;
    --neon-pink: #ff00ff;
    --neon-green: #00ffcc;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* 🌌 FONDO ESPACIAL CON PLANETA */
.space-background {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
    overflow: hidden;
}

.planet {
    position: absolute;
    top: 20%;
    right: -100px;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle at 30% 30%, var(--neon-pink), #200020);
    border-radius: 50%;
    box-shadow: -20px -20px 50px rgba(255, 0, 255, 0.2), 0 0 100px rgba(0, 255, 255, 0.1);
    animation: orbit 120s linear infinite;
    opacity: 0.6;
}

@keyframes orbit {
    from { transform: translateX(0) rotate(0deg); }
    to { transform: translateX(-120vw) rotate(360deg); }
}

.star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: twinkle 3s infinite; }
@keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

/* 🔘 NAVBAR */
.navbar {
    position: fixed; top: 0; width: 100%;
    display: flex; justify-content: center; gap: 15px;
    padding: 15px 0; background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px); z-index: 1000;
    border-bottom: 1px solid var(--neon-blue);
}
.nav-btn {
    text-decoration: none; color: var(--neon-green);
    border: 1px solid var(--neon-green); padding: 8px 15px;
    border-radius: 5px; font-size: 12px; font-weight: bold; transition: 0.3s;
}
.nav-btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 20px var(--neon-green); }

/* 🎬 VIDEO */
.video-frame { display: flex; justify-content: center; padding-top: 100px; }
.video-main {
    width: 180px; height: 180px; object-fit: cover; border-radius: 50%;
    border: 4px solid var(--neon-blue); box-shadow: 0 0 30px var(--neon-blue);
}

/* 📊 VISUALIZADOR Y EVOLUCIÓN */
.visualizer-card {
    background: rgba(0, 0, 0, 0.7);
    border-radius: 20px; padding: 25px;
    max-width: 650px; margin: 20px auto;
    border: 1px solid var(--neon-blue);
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.1);
}

#time-display { font-family: 'Courier New', monospace; color: var(--neon-green); font-size: 1.8rem; }

/* Línea de evolución (Progreso) */
.progress-container {
    width: 100%; height: 6px; background: #222;
    border-radius: 10px; margin: 15px 0; overflow: hidden;
}
#progress-bar {
    width: 0%; height: 100%; background: var(--neon-pink);
    box-shadow: 0 0 10px var(--neon-pink); transition: width 0.1s linear;
}

canvas { width: 100%; height: 100px; filter: drop-shadow(0 0 10px var(--neon-blue)); }

/* 🎧 TRACKS */
.tracks-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 15px; max-width: 1100px; margin: 0 auto 100px; padding: 0 20px;
}
.track-card {
    background: rgba(255, 255, 255, 0.05); padding: 15px;
    border-radius: 12px; border-left: 4px solid var(--neon-pink);
    display: flex; justify-content: space-between; align-items: center;
    transition: 0.3s;
}
.track-card.active { border-left-color: var(--neon-green); background: rgba(0, 255, 204, 0.1); }

.controls button {
    background: none; border: 1px solid var(--neon-green);
    color: var(--neon-green); padding: 8px 15px; border-radius: 5px; cursor: pointer;
}

/* ☕ KO-FI (MODO EXTERNO) */
.kofi {
    position: fixed; bottom: 30px; right: 30px;
    width: 65px; height: 65px; border-radius: 50%;
    background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; z-index: 1000; text-decoration: none;
    animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--neon-pink); } 50% { transform: scale(1.1); box-shadow: 0 0 40px var(--neon-blue); } }
</style>
</head>
<body>

<div class="space-background" id="space">
    <div class="planet"></div>
</div>

<nav class="navbar">
    <a class="nav-btn" href="duqueluis-mp3.html">⬅ VOLVER</a>
    <a class="nav-btn" href="index.html">🏠 INICIO</a>
</nav>

<div class="video-frame">
    <video class="video-main" id="v1" loop muted playsinline>
        <source src="dancing.mp4" type="video/mp4">
    </video>
</div>

<div class="main-content" style="text-align: center;">
    <div class="visualizer-card">
        <div id="track-name" style="color: var(--neon-blue); margin-bottom: 10px; font-weight: bold;">SELECCIONA UN TRACK</div>
        <div id="time-display">00:00 / 00:00</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <canvas id="vu"></canvas>
    </div>

    <div class="tracks-grid" id="tracks"></div>
</div>

<a class="kofi" href="https://ko-fi.com/luisduque" target="_blank" rel="noopener noreferrer">👽</a>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
/* GENERAR ESPACIO */
const space = document.getElementById('space');
for(let i=0; i<150; i++){
    let s = document.createElement("div");
    s.className = "star";
    let size = Math.random() * 3 + "px";
    s.style.width = s.style.height = size;
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.animationDelay = Math.random() * 5 + "s";
    space.appendChild(s);
}

const tracks = [
    {file:"baila-conmigo.mp3", name:"💃 Baila Conmigo"},
    {file:"baila-mi-corazon.mp3", name:"❤️ Baila Mi Corazón"},
    {file:"baila-pegadito.mp3", name:"🔥 Baila Pegadito"},
    {file:"bajo-el-mismo-alambre.mp3", name:"⚡ Bajo el Mismo Alambre"},
    {file:"dime-si-vuelves.mp3", name:"🌙 Dime Si Vuelves"},
    {file:"la-silla-vacia.mp3", name:"🪑 La Silla Vacía"},
    {file:"luna.mp3", name:"🌕 Luna"},
    {file:"me-quede-solo.mp3", name:"🖤 Me Quedé Solo"},
    {file:"pegate-al-pulso.mp3", name:"🫀 Pégate al Pulso"},
    {file:"pegate-mas.mp3", name:"🔊 Pégate Más"},
    {file:"tu-recuerdo.mp3", name:"🌫️ Tu Recuerdo"},
    {file:"tus-ojos.mp3", name:"👁️ Tus Ojos"}
];

let audio = document.getElementById("audio");
let v1 = document.getElementById("v1");
let progressBar = document.getElementById("progress-bar");
let currentIndex = -1;
let audioCtx, analyser, data;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaElementSource(audio);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        src.connect(analyser);
        analyser.connect(audioCtx.destination);
        data = new Uint8Array(analyser.frequencyBinCount);
        draw();
    }
}

function playTrack(idx) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    if (currentIndex !== idx) {
        currentIndex = idx;
        audio.src = tracks[idx].file;
        document.getElementById("track-name").innerText = tracks[idx].name;
        updateActiveCard();
    }
    
    audio.play();
    v1.play();
}

function pauseTrack() {
    audio.pause();
    v1.pause();
}

// AUTOPLAY: Al terminar una, sigue la siguiente
audio.onended = () => {
    let nextIndex = (currentIndex + 1) % tracks.length;
    playTrack(nextIndex);
};

audio.ontimeupdate = () => {
    const cur = audio.currentTime;
    const dur = audio.duration || 0;
    
    // Actualizar Reloj
    document.getElementById("time-display").innerText = `${formatTime(cur)} / ${formatTime(dur)}`;
    
    // Actualizar Línea de Evolución
    let percent = (cur / dur) * 100;
    progressBar.style.width = percent + "%";
};

function formatTime(s) {
    let min = Math.floor(s / 60);
    let sec = Math.floor(s % 60);
    return (min < 10 ? "0" : "") + min + ":" + (sec < 10 ? "0" : "") + sec;
}

function updateActiveCard() {
    const cards = document.querySelectorAll('.track-card');
    cards.forEach((c, i) => {
        c.classList.toggle('active', i === currentIndex);
    });
}

function draw() {
    requestAnimationFrame(draw);
    let canvas = document.getElementById("vu");
    let ctx = canvas.getContext("2d");
    let w = canvas.width = canvas.offsetWidth;
    let h = canvas.height = canvas.offsetHeight;
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0, 0, w, h);
    
    ctx.beginPath();
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#00ffff';
    let x = 0;
    let slice = w / data.length;
    for(let i=0; i<data.length; i++) {
        let v = data[i] / 128.0;
        let y = (v * h) / 2;
        if(i===0) ctx.moveTo(x, h-y); else ctx.lineTo(x, h-y);
        x += slice;
    }
    ctx.stroke();
}

const grid = document.getElementById("tracks");
tracks.forEach((t, idx) => {
    grid.innerHTML += `
    <div class="track-card">
        <strong>${t.name}</strong>
        <div class="controls">
            <button onclick="playTrack(${idx})">▶</button>
            <button onclick="pauseTrack()">⏸</button>
        </div>
    </div>`;
});
</script>
</body>
</html>
