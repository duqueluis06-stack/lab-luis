<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Frecuencia Latina – Música Experimental | Luis Duque</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --neon-blue: #00f2ff;
    --neon-pink: #ff007a;
    --neon-green: #00ffaa;
    --bg-dark: #050505;
    --card-bg: rgba(20, 20, 25, 0.8);
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-dark);
    color: #e0e0e0;
    overflow-x: hidden;
}

/* 🌌 FONDO ESPACIAL */
#space-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    opacity: 0.6;
}

/* 🔘 NAVBAR */
.navbar {
    position: fixed; top: 0; width: 100%;
    display: flex; justify-content: center; gap: 15px;
    padding: 15px 0; background: rgba(0,0,0,0.6);
    backdrop-filter: blur(15px); z-index: 1000;
    border-bottom: 1px solid rgba(0, 242, 255, 0.2);
}
.nav-btn {
    text-decoration: none; color: var(--neon-blue);
    border: 1px solid var(--neon-blue); padding: 8px 18px;
    border-radius: 50px; font-size: 11px; font-weight: bold;
    text-transform: uppercase; letter-spacing: 1px;
    transition: 0.3s;
}
.nav-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

/* 🎬 HEADER */
.header-container { text-align: center; padding: 120px 20px 20px; }
.header-container h1 { 
    font-size: 2.5rem; margin: 0; color: var(--neon-green); 
    text-shadow: 0 0 20px rgba(0, 255, 170, 0.3);
}

.media-header { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 30px; }
.video-main {
    width: 90%; max-width: 500px; border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.album-cover { width: 130px; height: 130px; border-radius: 50%; border: 3px solid #fff; }
.rotating { animation: spin 8s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* 📊 VISUALIZADOR */
.visualizer-box {
    width: 90%; max-width: 700px; margin: 0 auto 40px;
    background: var(--card-bg); border-radius: 15px; padding: 15px;
    border: 1px solid rgba(0, 242, 255, 0.1);
}
canvas#vu { width: 100%; height: 80px; filter: drop-shadow(0 0 8px var(--neon-blue)); }

/* 🎧 TRACKS */
.section-title { text-align: center; color: var(--neon-pink); letter-spacing: 3px; margin: 50px 0 20px; }
.tracks-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 15px; max-width: 1100px; margin: 0 auto 50px; padding: 0 20px;
}
.track-card {
    background: var(--card-bg); padding: 20px; border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s;
}
.track-card.active { border-color: var(--neon-green); box-shadow: 0 0 15px rgba(0, 255, 170, 0.2); }
.track-card:hover { transform: translateY(-3px); background: rgba(30, 30, 40, 0.9); }

.track-time { font-family: monospace; color: var(--neon-blue); font-size: 0.8rem; }
.evolution-bar { width: 100%; height: 5px; background: #111; border-radius: 10px; margin: 10px 0; overflow: hidden; }
.progress-fill { width: 0%; height: 100%; background: var(--neon-pink); }

.controls button {
    background: transparent; border: 1px solid var(--neon-green);
    color: var(--neon-green); padding: 6px 12px; border-radius: 4px;
    cursor: pointer; font-size: 10px; font-weight: bold; transition: 0.2s;
}
.controls button:hover { background: var(--neon-green); color: #000; }

/* 👽 KO-FI */
.kofi {
    position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px;
    background: var(--neon-pink); border-radius: 50%; display: flex;
    align-items: center; justify-content: center; text-decoration: none; font-size: 25px;
    box-shadow: 0 5px 15px rgba(255, 0, 122, 0.4); z-index: 2000;
}
</style>
</head>
<body>

<canvas id="space-canvas"></canvas>

<nav class="navbar">
    <a class="nav-btn" href="duqueluis-mp3.html">⬅ VOLVER</a>
    <a class="nav-btn" href="index.html">🏠 INICIO</a>
</nav>

<div class="header-container">
    <h1>Frecuencia Latina</h1>
    <p style="color: #888; font-size: 14px;">Luis Duque | Música Experimental</p>
</div>

<div class="media-header">
    <video class="video-main" id="v1" loop muted playsinline>
        <source src="dancing.mp4" type="video/mp4">
    </video>
    <img src="frecuencia-latina.PNG" id="album-img" class="album-cover">
</div>

<div class="visualizer-box">
    <canvas id="vu"></canvas>
</div>

<div class="tracks-grid" id="tracks"></div>

<h2 class="section-title">⚡ THUNDER LEGION</h2>

<div class="tracks-grid" id="tracks2"></div>

<a class="kofi" href="https://ko-fi.com/luisduque" target="_blank">👽</a>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
/* MOTOR DE ESPACIO */
const spaceCanvas = document.getElementById('space-canvas');
const sCtx = spaceCanvas.getContext('2d');
let stars = [];

function initStars() {
    spaceCanvas.width = window.innerWidth;
    spaceCanvas.height = window.innerHeight;
    stars = [];
    for (let i = 0; i < 200; i++) {
        stars.push({
            x: Math.random() * spaceCanvas.width - spaceCanvas.width / 2,
            y: Math.random() * spaceCanvas.height - spaceCanvas.height / 2,
            z: Math.random() * spaceCanvas.width,
        });
    }
}

function updateSpace() {
    sCtx.fillStyle = 'black';
    sCtx.fillRect(0, 0, spaceCanvas.width, spaceCanvas.height);
    sCtx.save();
    sCtx.translate(spaceCanvas.width / 2, spaceCanvas.height / 2);
    stars.forEach(s => {
        s.z -= 2;
        if (s.z <= 0) s.z = spaceCanvas.width;
        let sx = (s.x / s.z) * spaceCanvas.width;
        let sy = (s.y / s.z) * spaceCanvas.height;
        let size = (1 - s.z / spaceCanvas.width) * 3;
        sCtx.fillStyle = "white";
        sCtx.beginPath();
        sCtx.arc(sx, sy, size, 0, Math.PI * 2);
        sCtx.fill();
    });
    sCtx.restore();
    requestAnimationFrame(updateSpace);
}
window.addEventListener('resize', initStars);
initStars();
updateSpace();

/* LISTA DE TEMAS (LOS 29) */
const tracks = [
    {file:"baila-conmigo.mp3", name:"💃 Baila Conmigo"},
    {file:"baila-mi-corazon.mp3", name:"❤️ Baila Mi Corazón"},
    {file:"baila-pegadito.mp3", name:"🔥 Baila Pegadito"},
    {file:"bajo-el-mismo-alambre.mp3", name:"⚡ Bajo el Mismo Alambre"},
    {file:"dime-si-vuelves.mp3", name:"🌙 Dime Si Vuelves"},
    {file:"la-silla-vacia.mp3", name:"🪑 La Silla Vacía"},
    {file:"luna.mp3", name:"🌕 Luna"},
    {file:"me-quede-solo.mp3", name:"🖤 Me Quedé Solo"},
    {file:"pegate-al-pulso.mp3", name:"🫀 Pégate al Pulso"},
    {file:"pegate-mas.mp3", name:"🔊 Pégate Más"},
    {file:"tu-recuerdo.mp3", name:"🌫️ Tu Recuerdo"},
    {file:"tus-ojos.mp3", name:"👁️ Tus Ojos"}
];

const tracks2 = [
    {file:"cathedral.mp3", name:"⛪🏰 Cathedral", time:"3:03"},
    {file:"citadel.mp3", name:"🏰 Citadel", time:"3:13"},
    {file:"emf.mp3", name:"⚡ EMF", time:"3:07"},
    {file:"four.mp3", name:"🔢 Four", time:"2:44"},
    {file:"ip.mp3", name:"🌐 IP", time:"3:15"},
    {file:"march.mp3", name:"🥁⚔️ March", time:"2:49"},
    {file:"mecanic.mp3", name:"⚙️ Mecanic", time:"2:54"},
    {file:"phase.mp3", name:"🔄 Phase", time:"3:29"},
    {file:"pulsating.mp3", name:"💓 Pulsating", time:"3:18"},
    {file:"pulse.mp3", name:"💓 Pulse", time:"3:34"},
    {file:"resurgir.mp3", name:"🌅 Resurgir", time:"2:31"},
    {file:"siege.mp3", name:"🏰⚔️ Siege", time:"3:09"},
    {file:"skyforge.mp3", name:"🌌🔥 Skyforge", time:"3:04"},
    {file:"strings.mp3", name:"🎻 Strings", time:"3:04"},
    {file:"vanguard.mp3", name:"🛡️ Vanguard", time:"3:12"},
    {file:"viking.mp3", name:"🪓⚔️ Viking", time:"2:43"},
    {file:"war.mp3", name:"⚔️ War", time:"2:47"}
];

/* GENERACIÓN DINÁMICA DE TARJETAS */
const grid = document.getElementById("tracks");
const grid2 = document.getElementById("tracks2");

tracks.forEach((t, idx) => {
    grid.innerHTML += `
    <div class="track-card" id="card-${idx}">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <span style="font-weight:bold; font-size:14px;">${t.name}</span>
            <span class="track-time" id="time-${idx}">00:00 / 00:00</span>
        </div>
        <div class="evolution-bar"><div class="progress-fill" id="progress-${idx}"></div></div>
        <div class="controls">
            <button onclick="playTrack(${idx})">PLAY ▶</button>
            <button onclick="pauseTrack()">PAUSE ⏸</button>
        </div>
    </div>`;
});

tracks2.forEach((t, idx) => {
    grid2.innerHTML += `
    <div class="track-card" id="card2-${idx}">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <span style="font-weight:bold; font-size:14px;">${t.name}</span>
            <span class="track-time">${t.time}</span>
        </div>
        <div class="controls" style="margin-top:10px">
            <button onclick="playTrack2(${idx})">PLAY ▶</button>
        </div>
    </div>`;
});

/* LÓGICA DE AUDIO */
let audio = document.getElementById("audio");
let v1 = document.getElementById("v1");
let albumImg = document.getElementById("album-img");
let currentIndex = -1;
let audioCtx, analyser, data;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaElementSource(audio);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 128;
        src.connect(analyser);
        analyser.connect(audioCtx.destination);
        data = new Uint8Array(analyser.frequencyBinCount);
        draw();
    }
}

function playTrack(idx) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (currentIndex !== idx) {
        if (currentIndex !== -1 && document.getElementById(`progress-${currentIndex}`)) {
            document.getElementById(`progress-${currentIndex}`).style.width = "0%";
        }
        currentIndex = idx;
        audio.src = tracks[idx].file;
        document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`card-${idx}`).classList.add('active');
    }
    audio.play();
    v1.src = "dancing.mp4";
    v1.play();
    albumImg.classList.add('rotating');
}

function playTrack2(idx) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audio.src = tracks2[idx].file;
    currentIndex = -1;
    document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card2-${idx}`).classList.add('active');
    audio.play();
    v1.src = "tx.mp4";
    v1.play();
    albumImg.classList.add('rotating');
}

function pauseTrack() {
    audio.pause();
    v1.pause();
    albumImg.classList.remove('rotating');
}

audio.ontimeupdate = () => {
    if (currentIndex === -1) return;
    const cur = audio.currentTime, dur = audio.duration || 0;
    const percent = (cur / dur) * 100;
    const prog = document.getElementById(`progress-${currentIndex}`);
    const time = document.getElementById(`time-${currentIndex}`);
    if(prog) prog.style.width = percent + "%";
    if(time) time.innerText = `${formatTime(cur)} / ${formatTime(dur)}`;
};

function formatTime(s) {
    let m = Math.floor(s/60), sec = Math.floor(s%60);
    return (m<10?"0":"")+m+":"+(sec<10?"0":"")+sec;
}

function draw() {
    requestAnimationFrame(draw);
    let canvas = document.getElementById("vu"), ctx = canvas.getContext("2d");
    let w = canvas.width = canvas.offsetWidth, h = canvas.height = canvas.offsetHeight;
    if(!analyser) return;
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0,0,w,h);
    ctx.beginPath();
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#00ffff';
    let x = 0, slice = w / data.length;
    for(let i=0; i<data.length; i++) {
        let v = data[i]/128.0, y = (v*h)/2;
        if(i===0) ctx.moveTo(x,h-y); else ctx.lineTo(x,h-y);
        x+=slice;
    }
    ctx.stroke();
}
</script>
</body>
</html>
