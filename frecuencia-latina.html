<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Frecuencia Latina - Luis Fernando Duque Martini</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: normal;
      opacity: 0.8;
    }

    .cover {
      max-width: 400px;
      width: 90%;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(255, 0, 150, 0.5);
      margin: 20px auto;
    }

    .player {
      margin: 30px auto;
      max-width: 500px;
    }

    audio {
      width: 100%;
      margin: 10px 0;
    }

    .track {
      margin-bottom: 25px;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 0.9em;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <h1>Frecuencia Latina</h1>
  <h2>Luis Fernando Duque Martini</h2>
</header>

<!-- 🎨 PORTADA -->
<img src="portada.jpg" alt="Frecuencia Latina" class="cover">

<!-- 🎧 REPRODUCTOR -->
<div class="player">

  <div class="track">
    <p>01 - Tema Uno</p>
    <audio controls>
      <source src="audio/tema1.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="track">
    <p>02 - Tema Dos</p>
    <audio controls>
      <source src="audio/tema2.mp3" type="audio/mpeg">
    </audio>
  </div>

  <div class="track">
    <p>03 - Tema Tres</p>
    <audio controls>
      <source src="audio/tema3.mp3" type="audio/mpeg">
    </audio>
  </div>

</div>

<footer>
  © 2026 Luis Fernando Duque Martini
</footer>

</body>
</html>
