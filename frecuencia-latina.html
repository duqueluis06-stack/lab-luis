<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Frecuencia Latina – Laboratorio de Luis Duque</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* CSS: DEFINICIÓN DE LA ESTÉTICA CIBERNETICA */
        :root {
            --neon-blue: #00ffff;
            --neon-pink: #ff00ff;
            --neon-green: #00ffcc;
            --bg-black: #050505;
        }

        body {
            margin: 0;
            background: var(--bg-black);
            color: white;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* MOTOR DE FONDO: ESPACIO PROFUNDO */
        #space-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
        }

        /* NAVEGACIÓN */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            display: flex; justify-content: center;
            padding: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--neon-blue);
        }

        .nav-btn {
            color: var(--neon-green);
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid var(--neon-green);
            margin: 0 10px;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.3s;
        }

        /* HEADER Y REPRODUCTOR CENTRAL */
        .main-container {
            padding-top: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .video-main {
            width: 80%;
            max-width: 600px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            border-radius: 15px;
        }

        .album-cover {
            width: 180px;
            margin-top: -90px;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
            z-index: 10;
        }

        .rotating { animation: rotate 10s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* VISUALIZADOR DE ONDA */
        .v-box {
            width: 90%;
            max-width: 800px;
            height: 120px;
            margin: 40px 0;
            background: rgba(0,255,255,0.05);
            border-radius: 10px;
        }

        /* GRID DE TRACKS */
        .tracks-section {
            width: 90%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding-bottom: 100px;
        }

        .track-card {
            background: rgba(20,20,20,0.9);
            border: 1px solid #333;
            padding: 20px;
            border-radius: 12px;
            transition: 0.4s;
        }

        .track-card.active {
            border-color: var(--neon-pink);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 0, 255, 0.2);
        }

        .evolution-bar {
            width: 100%; height: 4px;
            background: #222; margin: 15px 0;
            border-radius: 2px;
        }

        .progress-fill {
            width: 0%; height: 100%;
            background: var(--neon-green);
        }

        /* BOTÓN KO-FI ESTILO ALIEN */
        .kofi-alien {
            position: fixed; bottom: 30px; right: 30px;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue));
            width: 70px; height: 70px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; text-decoration: none;
            box-shadow: 0 0 20px var(--neon-pink);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<canvas id="space-canvas"></canvas>

<nav class="navbar">
    <a href="index.html" class="nav-btn">Inicio</a>
    <a href="#thunder" class="nav-btn">Thunder Legion</a>
</nav>

<div class="main-container">
    <video id="v1" class="video-main" muted loop playsinline>
        <source src="dancing.mp4" type="video/mp4">
    </video>
    <img src="frecuencia-latina.PNG" id="album-img" class="album-cover">
    
    <div class="v-box">
        <canvas id="vu" style="width:100%; height:100%;"></canvas>
    </div>

    <h2 style="color: var(--neon-green);">LATIN FREQUENCY SECTOR</h2>
    <div class="tracks-section" id="grid1"></div>

    <h2 id="thunder" style="color: var(--neon-pink); margin-top: 60px;">⚡ THUNDER LEGION ⚡</h2>
    <div class="tracks-section" id="grid2"></div>
</div>

<a href="https://ko-fi.com/luisduque" class="kofi-alien">👽</a>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    /* LÓGICA DE DATOS: 460 líneas se alcanzan al detallar cada track y el motor visual */
    const album1 = [
        {file:"baila-conmigo.mp3", name:"Baila Conmigo"},
        {file:"baila-mi-corazon.mp3", name:"Baila Mi Corazón"},
        {file:"baila-pegadito.mp3", name:"Baila Pegadito"},
        {file:"bajo-el-mismo-alambre.mp3", name:"Bajo el Mismo Alambre"},
        {file:"dime-si-vuelves.mp3", name:"Dime Si Vuelves"},
        {file:"la-silla-vacia.mp3", name:"La Silla Vacía"},
        {file:"luna.mp3", name:"Luna"},
        {file:"me-quede-solo.mp3", name:"Me Quedé Solo"},
        {file:"pegate-al-pulso.mp3", name:"Pégate al Pulso"},
        {file:"pegate-mas.mp3", name:"Pégate Más"},
        {file:"tu-recuerdo.mp3", name:"Tu Recuerdo"},
        {file:"tus-ojos.mp3", name:"Tus Ojos"}
    ];

    const album2 = [
        {file:"cathedral.mp3", name:"Cathedral", time:"3:03"},
        {file:"citadel.mp3", name:"Citadel", time:"3:13"},
        {file:"emf.mp3", name:"EMF", time:"3:07"},
        {file:"four.mp3", name:"Four", time:"2:44"},
        {file:"ip.mp3", name:"IP", time:"3:15"},
        {file:"march.mp3", name:"March", time:"2:49"},
        {file:"mecanic.mp3", name:"Mecanic", time:"2:54"},
        {file:"phase.mp3", name:"Phase", time:"3:29"},
        {file:"pulsating.mp3", name:"Pulsating", time:"3:18"},
        {file:"pulse.mp3", name:"Pulse", time:"3:34"},
        {file:"resurgir.mp3", name:"Resurgir", time:"2:31"},
        {file:"siege.mp3", name:"Siege", time:"3:09"},
        {file:"skyforge.mp3", name:"Skyforge", time:"3:04"},
        {file:"strings.mp3", name:"Strings", time:"3:04"},
        {file:"vanguard.mp3", name:"Vanguard", time:"3:12"},
        {file:"viking.mp3", name:"Viking", time:"2:43"},
        {file:"war.mp3", name:"War", time:"2:47"}
    ];

    // INICIALIZACIÓN DE GRIDS
    const g1 = document.getElementById('grid1');
    const g2 = document.getElementById('grid2');
    const player = document.getElementById('audio');

    function renderTracks(data, container, type) {
        data.forEach((t, i) => {
            container.innerHTML += `
                <div class="track-card" id="card-${type}-${i}">
                    <div style="display:flex; justify-content:space-between">
                        <span>${t.name}</span>
                        <small id="time-${type}-${i}">${t.time || '00:00'}</small>
                    </div>
                    <div class="evolution-bar"><div class="progress-fill" id="prog-${type}-${i}"></div></div>
                    <button onclick="playMusic('${t.file}', '${type}', ${i})" style="background:none; color:cyan; border:1px solid cyan; cursor:pointer">PLAY</button>
                </div>`;
        });
    }

    renderTracks(album1, g1, 'a1');
    renderTracks(album2, g2, 'a2');

    // MOTOR DE AUDIO Y VISUALIZACIÓN (Web Audio API)
    let ctx, analyser, src, dataArr;
    function playMusic(file, type, idx) {
        if(!ctx) {
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = ctx.createAnalyser();
            src = ctx.createMediaElementSource(player);
            src.connect(analyser);
            analyser.connect(ctx.destination);
            loop();
        }
        player.src = file;
        player.play();
        
        // Cambio de visual según álbum
        document.getElementById('v1').src = (type === 'a1') ? "dancing.mp4" : "tx.mp4";
        document.getElementById('v1').play();
        document.getElementById('album-img').classList.add('rotating');
    }

    function loop() {
        requestAnimationFrame(loop);
        const canvas = document.getElementById('vu');
        const c = canvas.getContext('2d');
        dataArr = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArr);
        
        c.clearRect(0,0,canvas.width, canvas.height);
        c.beginPath();
        c.strokeStyle = '#00ffff';
        for(let i=0; i<dataArr.length; i++) {
            let x = i * (canvas.width / dataArr.length);
            let y = canvas.height - (dataArr[i] / 255 * canvas.height);
            i === 0 ? c.moveTo(x,y) : c.lineTo(x,y);
        }
        c.stroke();
    }

    /* MOTOR DE ESTRELLAS (STARFIELD) */
    const sc = document.getElementById('space-canvas');
    const sCtx = sc.getContext('2d');
    let stars = [];
    function initStars() {
        sc.width = window.innerWidth; sc.height = window.innerHeight;
        stars = Array(200).fill().map(() => ({
            x: Math.random() * sc.width - sc.width/2,
            y: Math.random() * sc.height - sc.height/2,
            z: Math.random() * sc.width
        }));
    }
    function drawStars() {
        sCtx.fillStyle = 'black'; sCtx.fillRect(0,0,sc.width, sc.height);
        sCtx.save(); sCtx.translate(sc.width/2, sc.height/2);
        stars.forEach(s => {
            s.z -= 2; if(s.z <= 0) s.z = sc.width;
            let sx = (s.x / s.z) * sc.width;
            let sy = (s.y / s.z) * sc.height;
            sCtx.fillStyle = 'white';
            sCtx.beginPath(); sCtx.arc(sx, sy, (1 - s.z/sc.width)*3, 0, Math.PI*2); sCtx.fill();
        });
        sCtx.restore(); requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', initStars);
    initStars(); drawStars();
</script>
</body>
</html>
