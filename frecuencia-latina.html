<section class="album-section">
    <div class="marquee-container">
        <div class="marquee-title" style="color: var(--neon-pink);">THUNDER LEGION - 17 TRACKS OF POWER - LUIS DUQUE</div>
    </div>

    <div class="media-header">
        <video class="video-main" id="v2" loop muted playsinline>
            <source src="tx.mp4" type="video/mp4">
        </video>
        <img src="legion.JPG" id="album-img-2" class="album-cover">
    </div>

    <div class="visualizer-box">
        <canvas id="vu2" class="vu-canvas"></canvas>
    </div>

    <div class="tracks-grid" id="grid-legion"></div>
</section>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
/* FONDO ESPACIAL */
const spaceCanvas = document.getElementById('space-canvas');
const sCtx = spaceCanvas.getContext('2d');
let stars = [];
function initStars() {
    spaceCanvas.width = window.innerWidth; spaceCanvas.height = window.innerHeight;
    stars = []; for (let i = 0; i < 200; i++) stars.push({ x: Math.random() * spaceCanvas.width - spaceCanvas.width / 2, y: Math.random() * spaceCanvas.height - spaceCanvas.height / 2, z: Math.random() * spaceCanvas.width });
}
function updateSpace() {
    sCtx.fillStyle = 'black'; sCtx.fillRect(0, 0, spaceCanvas.width, spaceCanvas.height);
    sCtx.save(); sCtx.translate(spaceCanvas.width / 2, spaceCanvas.height / 2);
    stars.forEach(s => { s.z -= 2; if (s.z <= 0) s.z = spaceCanvas.width; let sx = (s.x / s.z) * spaceCanvas.width, sy = (s.y / s.z) * spaceCanvas.height, size = (1 - s.z / spaceCanvas.width) * 3; sCtx.fillStyle = "white"; sCtx.beginPath(); sCtx.arc(sx, sy, size, 0, Math.PI * 2); sCtx.fill(); });
    sCtx.restore(); requestAnimationFrame(updateSpace);
}
window.addEventListener('resize', initStars); initStars(); updateSpace();

/* LISTAS DE TRACKS */
const tracksFrecuencia = [
    {file:"baila-conmigo.mp3", name:"💃 Baila Conmigo"}, {file:"baila-mi-corazon.mp3", name:"❤️ Baila Mi Corazón"}, {file:"baila-pegadito.mp3", name:"🔥 Baila Pegadito"}, {file:"bajo-el-mismo-alambre.mp3", name:"⚡ Bajo el Mismo Alambre"}, {file:"dime-si-vuelves.mp3", name:"🌙 Dime Si Vuelves"}, {file:"la-silla-vacia.mp3", name:"🪑 La Silla Vacía"}, {file:"luna.mp3", name:"🌕 Luna"}, {file:"me-quede-solo.mp3", name:"🖤 Me Quedé Solo"}, {file:"pegate-al-pulso.mp3", name:"🫀 Pégate al Pulso"}, {file:"pegate-mas.mp3", name:"🔊 Pégate Más"}, {file:"tu-recuerdo.mp3", name:"🌫️ Tu Recuerdo"}, {file:"tus-ojos.mp3", name:"👁️ Tus Ojos"}
];

const tracksLegion = [
    {file:"cathedral.mp3", name:"⛪ Cathedral", time:"3:03"}, {file:"citadel.mp3", name:"🏰 Citadel", time:"3:13"}, {file:"emf.mp3", name:"⚡ EMF", time:"3:07"}, {file:"four.mp3", name:"🔢 Four", time:"2:44"}, {file:"ip.mp3", name:"🌐 IP", time:"3:15"}, {file:"march.mp3", name:"🥁 March", time:"2:49"}, {file:"mecanic.mp3", name:"⚙️ Mecanic", time:"2:54"}, {file:"phase.mp3", name:"🔄 Phase", time:"3:29"}, {file:"pulsating.mp3", name:"💓 Pulsating", time:"3:18"}, {file:"pulse.mp3", name:"💓 Pulse", time:"3:34"}, {file:"resurgir.mp3", name:"🌅 Resurgir", time:"2:31"}, {file:"siege.mp3", name:"🏰 Siege", time:"3:09"}, {file:"skyforge.mp3", name:"🌌 Skyforge", time:"3:04"}, {file:"strings.mp3", name:"🎻 Strings", time:"3:04"}, {file:"vanguard.mp3", name:"🛡️ Vanguard", time:"3:12"}, {file:"viking.mp3", name:"🪓 Viking", time:"2:43"}, {file:"war.mp3", name:"⚔️ War", time:"2:47"}
];

const grid1 = document.getElementById("grid-frecuencia");
const grid2 = document.getElementById("grid-legion");

/* RENDERIZADO DE LOS 29 TEMAS */
tracksFrecuencia.forEach((t, i) => {
    grid1.innerHTML += `
    <div class="track-card" id="card-f-${i}">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <span style="font-weight:bold; font-size:14px;">${t.name}</span>
            <span class="track-time" id="time-f-${i}">00:00 / 00:00</span>
        </div>
        <div class="evolution-bar"><div class="progress-fill" id="progress-f-${i}"></div></div>
        <div class="controls">
            <button onclick="playMusic('f', ${i})">PLAY ▶</button>
            <button onclick="pauseMusic()">PAUSE ⏸</button>
        </div>
    </div>`;
});

tracksLegion.forEach((t, i) => {
    grid2.innerHTML += `
    <div class="track-card" id="card-l-${i}">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <span style="font-weight:bold; font-size:14px;">${t.name}</span>
            <span class="track-time" id="time-l-${i}">${t.time}</span>
        </div>
        <div class="evolution-bar"><div class="progress-fill" id="progress-l-${i}"></div></div>
        <div class="controls" style="margin-top:10px">
            <button onclick="playMusic('l', ${i})">PLAY ▶</button>
            <button onclick="pauseMusic()">PAUSE ⏸</button>
        </div>
    </div>`;
});

/* LÓGICA DE CONTROL */
let audio = document.getElementById("audio");
let currentAlbum = null, currentIndex = -1, audioCtx, analyser, data;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaElementSource(audio);
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 128;
        src.connect(analyser); analyser.connect(audioCtx.destination);
        data = new Uint8Array(analyser.frequencyBinCount);
        draw();
    }
}

function playMusic(album, idx) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const trackList = (album === 'f') ? tracksFrecuencia : tracksLegion;
    const trackFile = trackList[idx].file;

    // Solo cambia el src si es una canción distinta
    if (audio.src.indexOf(trackFile) === -1) {
        document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
        audio.src = trackFile;
        currentIndex = idx;
        currentAlbum = album;
    }

    document.getElementById(`card-${album}-${idx}`).classList.add('active');
    audio.play();

    // Sincronizar visuales
    const v1 = document.getElementById("v1"), v2 = document.getElementById("v2");
    const img1 = document.getElementById("album-img-1"), img2 = document.getElementById("album-img-2");

    v1.pause(); v2.pause();
    img1.classList.remove('rotating'); img2.classList.remove('rotating');

    if(album === 'f') { v1.play(); img1.classList.add('rotating'); }
    else { v2.play(); img2.classList.add('rotating'); }
}

function pauseMusic() {
    audio.pause();
    document.getElementById("v1").pause();
    document.getElementById("v2").pause();
    document.getElementById("album-img-1").classList.remove('rotating');
    document.getElementById("album-img-2").classList.remove('rotating');
}

audio.ontimeupdate = () => {
    if (currentIndex === -1) return;
    const cur = audio.currentTime, dur = audio.duration || 1;
    const prog = document.getElementById(`progress-${currentAlbum}-${currentIndex}`);
    const time = document.getElementById(`time-${currentAlbum}-${currentIndex}`);
    if(prog) prog.style.width = (cur / dur * 100) + "%";
    if(time) time.innerText = `${formatTime(cur)} / ${formatTime(dur)}`;
};

function formatTime(s) {
    let m = Math.floor(s/60), sec = Math.floor(s%60);
    return (m<10?"0":"")+m+":"+(sec<10?"0":"")+sec;
}

function draw() {
    requestAnimationFrame(draw);
    if(!analyser) return;
    analyser.getByteFrequencyData(data);
    
    // Dibujar en el canvas del álbum activo
    ["vu1", "vu2"].forEach(id => {
        let canvas = document.getElementById(id);
        let ctx = canvas.getContext("2d");
        let w = canvas.width = canvas.offsetWidth, h = canvas.height = canvas.offsetHeight;
        ctx.clearRect(0,0,w,h);
        
        const isActive = (id === "vu1" && currentAlbum === 'f') || (id === "vu2" && currentAlbum === 'l');

        if(isActive && !audio.paused) {
            ctx.beginPath(); ctx.lineWidth = 3; 
            ctx.strokeStyle = (id === "vu1") ? '#00ffaa' : '#ff007a';
            let x = 0, slice = w / data.length;
            for(let i=0; i<data.length; i++) {
                let v = data[i]/128.0, y = (v*h)/2;
                if(i===0) ctx.moveTo(x,h-y); else ctx.lineTo(x,h-y);
                x+=slice;
            }
            ctx.stroke();
        }
    });
}
</script>
</body>
