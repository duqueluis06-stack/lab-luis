<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Frecuencia Latina – Música Experimental | Luis Duque</title>

<meta name="google-site-verification" content="g8_UJk7VcB4hDIPs3LuMBxcG-uJ12jr4A7oTrH3dgzs">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.ico" type="image/x-icon">

<style>
:root {
    --neon-blue: #00ffff;
    --neon-pink: #ff00ff;
    --neon-green: #00ffcc;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* 🌌 FONDO ESPACIAL */
#space-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
}

/* 🔘 NAVBAR */
.navbar {
    position: fixed; top: 0; width: 100%;
    display: flex; justify-content: center; gap: 15px;
    padding: 15px 0; background: rgba(0,0,0,0.8);
    backdrop-filter: blur(15px); z-index: 1000;
    border-bottom: 2px solid var(--neon-blue);
}
.nav-btn {
    text-decoration: none; color: var(--neon-green);
    border: 1px solid var(--neon-green); padding: 8px 18px;
    border-radius: 5px; font-size: 13px; font-weight: bold;
    text-transform: uppercase;
}

/* ✈️ TÍTULO AEROPUERTO 3D */
.airport-container {
    margin-top: 90px;
    background: #111;
    border-top: 3px solid #333;
    border-bottom: 3px solid #333;
    overflow: hidden;
    padding: 10px 0;
    perspective: 1000px;
}
.marquee-3d {
    display: inline-block;
    white-space: nowrap;
    font-size: 2.2rem;
    font-weight: 900;
    color: #ffcc00;
    text-transform: uppercase;
    animation: scroll3d 20s linear infinite;
    text-shadow: 3px 3px 0px #886600, 5px 5px 15px rgba(0,0,0,0.5);
}
@keyframes scroll3d {
    from { transform: translateX(100%) rotateX(15deg); }
    to { transform: translateX(-100%) rotateX(15deg); }
}

/* 🎬 SECCIONES DE VIDEO */
.section-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 0;
}
.video-box {
    width: 90%; max-width: 450px;
    border: 3px solid var(--neon-blue);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
    margin-bottom: 20px;
}
.video-box video { width: 100%; display: block; object-fit: contain; }

.album-cover {
    width: 140px; height: 140px; border-radius: 50%;
    border: 4px solid white; box-shadow: 0 0 30px rgba(255,255,255,0.2);
    margin-bottom: 15px;
}
.rotating { animation: spin 8s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* 📊 VÚMETRO */
.visualizer-box {
    width: 95%; max-width: 700px; margin: 10px auto;
    background: rgba(0,0,0,0.7); border-radius: 15px;
    padding: 10px; border: 1px solid rgba(0, 255, 255, 0.2);
}
canvas#vu { width: 100%; height: 100px; }

/* 🎧 TRACKS GRID */
.tracks-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px; max-width: 1200px; margin: 0 auto; padding: 20px;
}
.track-card {
    background: rgba(25, 25, 25, 0.9); padding: 18px;
    border-radius: 12px; border: 1px solid #333;
    transition: 0.3s;
}
.track-card.active { border-color: var(--neon-green); transform: scale(1.02); }

.evolution-bar {
    width: 100%; height: 6px; background: #111;
    border-radius: 3px; margin: 12px 0; overflow: hidden;
}
.progress-fill { width: 0%; height: 100%; background: var(--neon-pink); }

/* 🔘 BOTONES SEPARADOS */
.controls { display: flex; gap: 10px; }
.btn-play {
    flex: 2; background: transparent; border: 1px solid var(--neon-green);
    color: var(--neon-green); padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold;
}
.btn-pause {
    flex: 1; background: transparent; border: 1px solid #ff4444;
    color: #ff4444; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold;
}
.btn-play:hover { background: var(--neon-green); color: #000; }
.btn-pause:hover { background: #ff4444; color: #000; }

/* ☕ KO-FI */
.kofi {
    position: fixed; bottom: 30px; right: 30px;
    width: 65px; height: 65px; border-radius: 50%;
    background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; z-index: 2000; text-decoration: none;
    box-shadow: 0 0 20px var(--neon-pink);
}
</style>
</head>

<body>

<canvas id="space-canvas"></canvas>

<nav class="navbar">
    <a class="nav-btn" href="duqueluis-mp3.html">⬅ VOLVER</a>
    <a class="nav-btn" href="index.html">🏠 INICIO</a>
</nav>

<div class="airport-container">
    <div class="marquee-3d">
        +++ FRECUENCIA LATINA +++ LABORATORIO EXPERIMENTAL LUIS DUQUE +++ THUNDER LEGION +++ ELECTRO-CUMBIA +++ SONIDO INTERACTIVO +++
    </div>
</div>

<div class="section-wrap">
    <div class="video-box">
        <video id="v-latina" loop muted playsinline>
            <source src="dancing.mp4" type="video/mp4">
        </video>
    </div>
    <img src="frecuencia-latina.PNG" id="img-latina" class="album-cover">
    <h2 style="color:var(--neon-blue)">💃 FRECUENCIA LATINA</h2>
    
    <div class="visualizer-box">
        <canvas id="vu"></canvas>
    </div>
    <div class="tracks-grid" id="grid-latina"></div>
</div>

<hr style="border: 1px solid #222; width: 80%;">

<div class="section-wrap">
    <div class="video-box" style="border-color: var(--neon-pink);">
        <video id="v-thunder" loop muted playsinline>
            <source src="tx.mp4" type="video/mp4">
        </video>
    </div>
    <img src="Legion.JPG" id="img-thunder" class="album-cover">
    <h2 style="color:var(--neon-pink)">⚡ THUNDER LEGION</h2>
    <div class="tracks-grid" id="grid-thunder"></div>
</div>

<a class="kofi" href="https://ko-fi.com/luisduque" target="_blank">👽</a>

<audio id="audio-player" crossorigin="anonymous"></audio>

<script>
/* 🌠 ESTRELLAS */
const sCanvas = document.getElementById('space-canvas');
const sCtx = sCanvas.getContext('2d');
let stars = [];
function initStars() {
    sCanvas.width = window.innerWidth; sCanvas.height = window.innerHeight;
    stars = [];
    for(let i=0; i<200; i++) stars.push({x: Math.random()*sCanvas.width, y: Math.random()*sCanvas.height, z: Math.random()*sCanvas.width});
}
function drawStars() {
    sCtx.fillStyle = 'black'; sCtx.fillRect(0,0,sCanvas.width, sCanvas.height);
    stars.forEach(s => {
        s.z -= 2; if(s.z<=0) s.z=sCanvas.width;
        let x = (s.x - sCanvas.width/2) * (sCanvas.width/s.z) + sCanvas.width/2;
        let y = (s.y - sCanvas.height/2) * (sCanvas.width/s.z) + sCanvas.height/2;
        let size = (1 - s.z/sCanvas.width) * 3;
        sCtx.fillStyle = 'white'; sCtx.beginPath(); sCtx.arc(x,y,size,0,Math.PI*2); sCtx.fill();
    });
    requestAnimationFrame(drawStars);
}
initStars(); drawStars();

/* 🎧 TRACKS */
const tracks1 = [
    {file:"baila-conmigo.mp3", name:"💃 Baila Conmigo"}, {file:"baila-mi-corazon.mp3", name:"❤️ Baila Mi Corazón"},
    {file:"baila-pegadito.mp3", name:"🔥 Baila Pegadito"}, {file:"bajo-el-mismo-alambre.mp3", name:"⚡ Bajo el Mismo Alambre"},
    {file:"dime-si-vuelves.mp3", name:"🌙 Dime Si Vuelves"}, {file:"la-silla-vacia.mp3", name:"🪑 La Silla Vacía"},
    {file:"luna.mp3", name:"🌕 Luna"}, {file:"me-quede-solo.mp3", name:"🖤 Me Quedé Solo"},
    {file:"pegate-al-pulso.mp3", name:"🫀 Pégate al Pulso"}, {file:"pegate-mas.mp3", name:"🔊 Pégate Más"},
    {file:"tu-recuerdo.mp3", name:"🌫️ Tu Recuerdo"}, {file:"tus-ojos.mp3", name:"👁️ Tus Ojos"}
];

const tracks2 = [
    {file:"cathedral.mp3", name:"⛪ Cathedral", t:"3:03"}, {file:"citadel.mp3", name:"🏰 Citadel", t:"3:13"},
    {file:"emf.mp3", name:"⚡ EMF", t:"3:07"}, {file:"four.mp3", name:"🔢 Four", t:"2:44"},
    {file:"ip.mp3", name:"🌐 IP", t:"3:15"}, {file:"march.mp3", name:"🥁 March", t:"2:49"},
    {file:"mecanic.mp3", name:"⚙️ Mecanic", t:"2:54"}, {file:"phase.mp3", name:"🔄 Phase", t:"3:29"},
    {file:"pulsating.mp3", name:"💓 Pulsating", t:"3:18"}, {file:"pulse.mp3", name:"💓 Pulse", t:"3:34"},
    {file:"resurgir.mp3", name:"🌅 Resurgir", t:"2:31"}, {file:"siege.mp3", name:"🏰 Siege", t:"3:09"},
    {file:"skyforge.mp3", name:"🌌 Skyforge", t:"3:04"}, {file:"strings.mp3", name:"🎻 Strings", t:"3:04"},
    {file:"vanguard.mp3", name:"🛡️ Vanguard", t:"3:12"}, {file:"viking.mp3", name:"🪓 Viking", t:"2:43"},
    {file:"war.mp3", name:"⚔️ War", t:"2:47"}
];

const player = document.getElementById('audio-player');
let currentId = null;
let aCtx, analyser, data;

function render(list, gridId, prefix) {
    const grid = document.getElementById(gridId);
    list.forEach((t, i) => {
        grid.innerHTML += `
        <div class="track-card" id="card-${prefix}-${i}">
            <div style="display:flex; justify-content:space-between">
                <b>${t.name}</b>
                <span id="time-${prefix}-${i}" class="track-time">${t.t || '00:00'}</span>
            </div>
            <div class="evolution-bar"><div class="progress-fill" id="bar-${prefix}-${i}"></div></div>
            <div class="controls">
                <button class="btn-play" onclick="playS('${prefix}', ${i}, '${t.file}')">PLAY ▶</button>
                <button class="btn-pause" onclick="pauseS()">PAUSE ⏸</button>
            </div>
        </div>`;
    });
}
render(tracks1, "grid-latina", "lat");
render(tracks2, "grid-thunder", "thun");

function playS(prefix, idx, file) {
    if(!aCtx) {
        aCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = aCtx.createAnalyser();
        const src = aCtx.createMediaElementSource(player);
        src.connect(analyser); analyser.connect(aCtx.destination);
        data = new Uint8Array(analyser.frequencyBinCount);
        drawV();
    }
    const id = `${prefix}-${idx}`;
    if(currentId !== id) { player.src = file; currentId = id; }
    player.play();
    
    document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${id}`).classList.add('active');

    // Manejo de videos
    const vL = document.getElementById('v-latina'), vT = document.getElementById('v-thunder');
    const iL = document.getElementById('img-latina'), iT = document.getElementById('img-thunder');
    if(prefix === 'lat') {
        vL.play(); vT.pause(); iL.classList.add('rotating'); iT.classList.remove('rotating');
    } else {
        vT.play(); vL.pause(); iT.classList.add('rotating'); iL.classList.remove('rotating');
    }
}

function pauseS() {
    player.pause();
    document.querySelectorAll('video').forEach(v => v.pause());
    document.querySelectorAll('.album-cover').forEach(img => img.classList.remove('rotating'));
}

player.ontimeupdate = () => {
    if(!currentId) return;
    const p = (player.currentTime / player.duration) * 100;
    document.getElementById(`bar-${currentId}`).style.width = p + "%";
};

function drawV() {
    requestAnimationFrame(drawV);
    const cvs = document.getElementById('vu'), ctx = cvs.getContext('2d');
    cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0,0,cvs.width, cvs.height);
    const bw = (cvs.width / data.length) * 2.5;
    let x = 0;
    for(let i=0; i<data.length; i++) {
        let bh = data[i] / 1.5;
        ctx.fillStyle = `rgb(0, ${data[i]+100}, 255)`;
        ctx.fillRect(x, cvs.height-bh, bw, bh);
        x += bw + 1;
    }
}
</script>
</body>
</html>
