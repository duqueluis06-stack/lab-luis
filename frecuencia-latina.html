<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lab-Luis | Neon Sound Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* 🌌 CONFIGURACIÓN ESPACIAL */
:root {
    --neon-blue: #00ffff;
    --neon-pink: #ff00ff;
    --neon-green: #00ffcc;
    --glass: rgba(255, 255, 255, 0.1);
}

body {
    margin: 0;
    font-family: 'Courier New', Courier, monospace;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* ⭐ ESTRELLAS */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0.6;
    animation: pulse-star 3s infinite;
}

@keyframes pulse-star {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
}

/* 🎬 VIDEOS (DISCO MODE) */
.video-container {
    display: flex;
    justify-content: space-around;
    padding: 100px 20px 20px;
    position: relative;
    z-index: 1;
}

.video {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid var(--neon-blue);
    box-shadow: 0 0 25px var(--neon-blue);
    background: #111; /* Por si el video tarda en cargar */
    display: block; /* Asegura que se renderice */
}

/* 🖼️ MAIN PANEL */
.main-content {
    position: relative;
    z-index: 2;
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
}

.cover {
    width: 160px;
    border-radius: 50%;
    border: 3px solid white;
    animation: rotate 10s linear infinite;
    animation-play-state: paused;
}

@keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* 📊 NEON VISUALIZER */
.visualizer-card {
    background: rgba(0, 0, 0, 0.6);
    border: 2px solid var(--neon-blue);
    border-radius: 20px;
    padding: 20px;
    margin: 20px;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
}

canvas {
    width: 100%;
    height: 120px;
}

/* ⏱️ DIGITAL CLOCK */
#time-display {
    font-size: 1.2rem;
    color: var(--neon-green);
    text-shadow: 0 0 10px var(--neon-green);
    margin-bottom: 10px;
}

#info {
    font-size: 0.8rem;
    letter-spacing: 2px;
    color: var(--neon-pink);
}

/* 🎧 TRACKLIST */
.tracks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.track-card {
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
    padding: 15px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

.track-card:hover {
    border-color: var(--neon-green);
    box-shadow: 0 0 15px var(--neon-green);
}

.controls button {
    background: none;
    border: 2px solid var(--neon-green);
    color: var(--neon-green);
    padding: 5px 15px;
    border-radius: 20px;
    cursor: pointer;
}

.controls button:hover {
    background: var(--neon-green);
    color: black;
}

/* NAV */
.navbar {
    position: fixed;
    top: 0; width: 100%;
    background: rgba(0,0,0,0.8);
    padding: 15px 0;
    z-index: 1000;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.nav-btn { color: white; text-decoration: none; border-bottom: 1px solid var(--neon-blue); padding: 5px; }

</style>
</head>

<body>

<div class="stars" id="star-container"></div>

<nav class="navbar">
    <a class="nav-btn" href="#">🏠 INICIO</a>
    <a class="nav-btn" href="#">🎧 LAB</a>
</nav>

<div class="video-container">
    <video class="video" id="v1" loop muted playsinline>
        <source src="dancing.mp4" type="video/mp4">
    </video>
    <video class="video" id="v2" loop muted playsinline>
        <source src="dancing.mp4" type="video/mp4">
    </video>
</div>

<div class="main-content">
    <img src="frecuencia-latina.PNG" id="main-cover" class="cover" alt="Portada">
    
    <div class="visualizer-card">
        <div id="time-display">00:00 / 00:00</div>
        <canvas id="vu"></canvas>
        <div id="info">ANALIZADOR DE ESPECTRO NEÓN V4</div>
    </div>

    <div class="tracks-grid" id="tracks"></div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
/* GENERAR ESTRELLAS */
const starContainer = document.getElementById('star-container');
for(let i=0; i<100; i++){
    let s = document.createElement("div");
    s.className = "star";
    s.style.width = s.style.height = Math.random() * 3 + "px";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.animationDelay = Math.random() * 5 + "s";
    starContainer.appendChild(s);
}

const tracks = [
    {file:"baila-conmigo.mp3", name:"💃 Baila Conmigo"},
    {file:"baila-mi-corazon.mp3", name:"❤️ Baila Mi Corazón"},
    {file:"baila-pegadito.mp3", name:"🔥 Baila Pegadito"},
    {file:"bajo-el-mismo-alambre.mp3", name:"⚡ Bajo el Mismo Alambre"},
    {file:"dime-si-vuelves.mp3", name:"🌙 Dime Si Vuelves"},
    {file:"la-silla-vacia.mp3", name:"🪑 La Silla Vacía"},
    {file:"luna.mp3", name:"🌕 Luna"},
    {file:"me-quede-solo.mp3", name:"🖤 Me Quedé Solo"},
    {file:"pegate-al-pulso.mp3", name:"🫀 Pégate al Pulso"},
    {file:"pegate-mas.mp3", name:"🔊 Pégate Más"},
    {file:"tu-recuerdo.mp3", name:"🌫️ Tu Recuerdo"},
    {file:"tus-ojos.mp3", name:"👁️ Tus Ojos"}
];

let audio = document.getElementById("audio");
let v1 = document.getElementById("v1");
let v2 = document.getElementById("v2");
let cover = document.getElementById("main-cover");
let currentIdx = 0;
let audioCtx, analyser, data;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaElementSource(audio);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        src.connect(analyser);
        analyser.connect(audioCtx.destination);
        data = new Uint8Array(analyser.frequencyBinCount);
        draw();
    }
}

function playTrack(idx) {
    initAudio();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    
    currentIdx = idx;
    audio.src = tracks[idx].file;
    audio.play();
    
    // Sincronizar UI y Video
    v1.play(); v2.play();
    cover.style.animationPlayState = "running";
}

function pauseMedia() {
    audio.pause();
    v1.pause();
    v2.pause();
    cover.style.animationPlayState = "paused";
}

// Actualizar tiempo transcurrido
audio.ontimeupdate = () => {
    const cur = formatTime(audio.currentTime);
    const dur = formatTime(audio.duration || 0);
    document.getElementById("time-display").innerText = `${cur} / ${dur}`;
};

function formatTime(secs) {
    let m = Math.floor(secs / 60);
    let s = Math.floor(secs % 60);
    return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
}

audio.onended = () => {
    currentIdx = (currentIdx + 1) % tracks.length;
    playTrack(currentIdx);
};

/* 📊 MOTOR DE EVOLUCIÓN NEÓN */
function draw() {
    requestAnimationFrame(draw);
    let canvas = document.getElementById("vu");
    let ctx = canvas.getContext("2d");
    let w = canvas.width = canvas.offsetWidth;
    let h = canvas.height = canvas.offsetHeight;

    analyser.getByteFrequencyData(data);
    ctx.clearRect(0, 0, w, h);

    // Dibujar línea de evolución
    ctx.beginPath();
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#00ffff';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00ffff';

    let sliceWidth = w / data.length;
    let x = 0;

    for (let i = 0; i < data.length; i++) {
        let v = data[i] / 128.0;
        let y = (v * h / 2);

        if (i === 0) ctx.moveTo(x, h - y);
        else ctx.lineTo(x, h - y);

        x += sliceWidth;
    }

    ctx.lineTo(w, h / 2);
    ctx.stroke();
}

/* LISTA DE CANCIONES */
const grid = document.getElementById("tracks");
tracks.forEach((t, idx) => {
    grid.innerHTML += `
    <div class="track-card">
        <div class="track-info"><strong>${t.name}</strong></div>
        <div class="controls">
            <button onclick="playTrack(${idx})">▶</button>
            <button onclick="pauseMedia()">⏸</button>
        </div>
    </div>`;
});
</script>

</body>
</html>
