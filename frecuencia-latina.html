<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Frecuencia Latina - Lab Luis V7 Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --neon-blue: #00ffff;
    --neon-pink: #ff00ff;
    --neon-green: #00ffcc;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* 🌌 FONDO ESPACIAL */
.space-background {
    position: fixed; width: 100%; height: 100%; z-index: -1;
    background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%);
}
.star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; }

/* 🔘 NAVBAR */
.navbar {
    position: fixed; top: 0; width: 100%;
    display: flex; justify-content: center; gap: 15px;
    padding: 15px 0; background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px); z-index: 1000;
    border-bottom: 1px solid var(--neon-blue);
}
.nav-btn {
    text-decoration: none; color: var(--neon-green);
    border: 1px solid var(--neon-green); padding: 8px 15px;
    border-radius: 5px; font-size: 12px; font-weight: bold;
}

/* 🎬 VIDEO Y DISCO (PNG) */
.media-header {
    display: flex; flex-direction: column; align-items: center;
    padding-top: 100px; gap: 20px;
}

.video-main {
    width: 220px; height: 160px; object-fit: cover;
    border-radius: 15px; border: 2px solid var(--neon-blue);
    box-shadow: 0 0 20px var(--neon-blue);
}

.album-cover {
    width: 140px; height: 140px; border-radius: 50%;
    border: 3px solid white; box-shadow: 0 0 25px rgba(255,255,255,0.3);
    transition: transform 0.5s;
}

/* Animación de rotación */
.rotating { animation: spin 10s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* 📊 VISUALIZADOR PRINCIPAL */
.visualizer-box {
    width: 90%; max-width: 600px; margin: 20px auto;
    text-align: center;
}
canvas { width: 100%; height: 80px; filter: drop-shadow(0 0 8px var(--neon-blue)); }

/* 🎧 LISTA DE TRACKS CON BARRA DE NEÓN */
.tracks-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px; max-width: 1100px; margin: 0 auto 100px; padding: 20px;
}

.track-card {
    background: rgba(255, 255, 255, 0.05); padding: 20px;
    border-radius: 15px; position: relative;
    border: 1px solid #222; transition: 0.3s;
}

.track-card.active { border-color: var(--neon-green); background: rgba(0, 255, 204, 0.05); }

.track-info { margin-bottom: 10px; }
.track-name { font-weight: bold; display: block; margin-bottom: 5px; }
.track-time { font-family: monospace; font-size: 0.9rem; color: var(--neon-blue); }

/* Barra de evolución neón por track */
.evolution-bar {
    width: 100%; height: 4px; background: #222;
    border-radius: 2px; margin-top: 8px; overflow: hidden;
}
.progress-fill {
    width: 0%; height: 100%; background: var(--neon-pink);
    box-shadow: 0 0 10px var(--neon-pink);
}

.controls button {
    background: none; border: 1px solid var(--neon-green);
    color: var(--neon-green); padding: 5px 12px; border-radius: 5px; cursor: pointer;
}

/* ☕ KO-FI */
.kofi {
    position: fixed; bottom: 30px; right: 30px;
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; z-index: 2000; text-decoration: none;
    animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
</style>
</head>

<body>

<div class="space-background" id="space"></div>

<nav class="navbar">
    <a class="nav-btn" href="duqueluis-mp3.html">⬅ VOLVER</a>
    <a class="nav-btn" href="index.html">🏠 INICIO</a>
</nav>

<div class="media-header">
    <video class="video-main" id="v1" loop muted playsinline>
        <source src="dancing.mp4" type="video/mp4">
    </video>
    <img src="frecuencia-latina.PNG" id="album-img" class="album-cover" alt="Album Name">
</div>

<div class="visualizer-box">
    <canvas id="vu"></canvas>
</div>

<div class="tracks-grid" id="tracks"></div>

<a class="kofi" href="https://ko-fi.com/luisduque" target="_blank">👽</a>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
/* ESTRELLAS */
const space = document.getElementById('space');
for(let i=0; i<100; i++){
    let s = document.createElement("div");
    s.className = "star";
    s.style.width = s.style.height = Math.random() * 3 + "px";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    space.appendChild(s);
}

const tracks = [
    {file:"baila-conmigo.mp3", name:"💃 Baila Conmigo"},
    {file:"baila-mi-corazon.mp3", name:"❤️ Baila Mi Corazón"},
    {file:"baila-pegadito.mp3", name:"🔥 Baila Pegadito"},
    {file:"bajo-el-mismo-alambre.mp3", name:"⚡ Bajo el Mismo Alambre"},
    {file:"dime-si-vuelves.mp3", name:"🌙 Dime Si Vuelves"},
    {file:"la-silla-vacia.mp3", name:"🪑 La Silla Vacía"},
    {file:"luna.mp3", name:"🌕 Luna"},
    {file:"me-quede-solo.mp3", name:"🖤 Me Quedé Solo"},
    {file:"pegate-al-pulso.mp3", name:"🫀 Pégate al Pulso"},
    {file:"pegate-mas.mp3", name:"🔊 Pégate Más"},
    {file:"tu-recuerdo.mp3", name:"🌫️ Tu Recuerdo"},
    {file:"tus-ojos.mp3", name:"👁️ Tus Ojos"}
];

let audio = document.getElementById("audio");
let v1 = document.getElementById("v1");
let albumImg = document.getElementById("album-img");
let currentIndex = -1;
let audioCtx, analyser, data;

// Generar UI
const grid = document.getElementById("tracks");
tracks.forEach((t, idx) => {
    grid.innerHTML += `
    <div class="track-card" id="card-${idx}">
        <div class="track-info">
            <span class="track-name">${t.name}</span>
            <span class="track-time" id="time-${idx}">00:00 / 00:00</span>
        </div>
        <div class="evolution-bar">
            <div class="progress-fill" id="progress-${idx}"></div>
        </div>
        <div class="controls" style="margin-top:10px;">
            <button onclick="playTrack(${idx})">▶ PLAY</button>
            <button onclick="pauseTrack()">⏸ PAUSE</button>
        </div>
    </div>`;
});

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaElementSource(audio);
        analyser = audioCtx.createAnalyser();
        src.connect(analyser);
        analyser.connect(audioCtx.destination);
        data = new Uint8Array(analyser.frequencyBinCount);
        draw();
    }
}

function playTrack(idx) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    if (currentIndex !== idx) {
        // Resetear barra anterior
        if(currentIndex !== -1) document.getElementById(`progress-${currentIndex}`).style.width = "0%";
        
        currentIndex = idx;
        audio.src = tracks[idx].file;
        
        // UI feedback
        document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`card-${idx}`).classList.add('active');
    }
    
    audio.play();
    v1.play();
    albumImg.classList.add('rotating'); // Empieza a girar
}

function pauseTrack() {
    audio.pause();
    v1.pause();
    albumImg.classList.remove('rotating'); // Se detiene
}

// Autoplay
audio.onended = () => {
    let next = (currentIndex + 1) % tracks.length;
    playTrack(next);
};

audio.ontimeupdate = () => {
    if (currentIndex === -1) return;
    
    const cur = audio.currentTime;
    const dur = audio.duration || 0;
    const percent = (cur / dur) * 100;
    
    // Actualizar barra de evolución de este track
    document.getElementById(`progress-${currentIndex}`).style.width = percent + "%";
    
    // Actualizar tiempo de este track
    document.getElementById(`time-${currentIndex}`).innerText = `${formatTime(cur)} / ${formatTime(dur)}`;
};

function formatTime(s) {
    let m = Math.floor(s/60);
    let sec = Math.floor(s%60);
    return (m<10?"0":"")+m+":"+(sec<10?"0":"")+sec;
}

function draw() {
    requestAnimationFrame(draw);
    let canvas = document.getElementById("vu");
    let ctx = canvas.getContext("2d");
    let w = canvas.width = canvas.offsetWidth;
    let h = canvas.height = canvas.offsetHeight;
    if(!analyser) return;
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0,0,w,h);
    ctx.beginPath();
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#00ffff';
    let x = 0;
    let slice = w / data.length;
    for(let i=0; i<data.length; i++) {
        let v = data[i]/128.0;
        let y = (v*h)/2;
        if(i===0) ctx.moveTo(x,h-y); else ctx.lineTo(x,h-y);
        x+=slice;
    }
    ctx.stroke();
}
</script>
</body>
</html>
