<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Frecuencia Latina - Luis Duque</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 BACKGROUND */
body{
margin:0;
font-family:Arial;
background:black;
color:#00ffcc;
overflow-x:hidden;
}

/* ⭐ estrellas ligeras */
.stars{
position:fixed;
width:100%;
height:100%;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:0.5;
animation:fall 18s linear infinite;
}

@keyframes fall{
from{transform:translateY(-10vh);}
to{transform:translateY(110vh);}
}

/* 🎬 MP4 */
.video{
position:fixed;
width:160px;
height:120px;
object-fit:cover;
border-radius:10px;
border:2px solid #ff00ff;
box-shadow:0 0 12px #00ffff;
z-index:2;
}

.v1{top:10px;left:10px;}
.v2{top:10px;right:10px;}

/* 🖼️ PORTADA */
.cover{
width:200px;
display:block;
margin:20px auto;
border-radius:15px;
box-shadow:0 0 18px #00ffff;
}

/* LAYOUT */
.container{
display:flex;
margin-top:160px;
position:relative;
z-index:2;
}

.tracks{
flex:1;
padding:10px;
}

.track{
background:rgba(0,255,255,0.08);
margin:6px;
padding:10px;
border-radius:10px;
font-size:14px;
}

button{
background:black;
color:#00ffcc;
border:1px solid #00ffcc;
margin:3px;
cursor:pointer;
}

/* 📊 VU */
canvas{
width:100%;
height:140px;
background:rgba(0,0,0,0.6);
border:1px solid #00ffff;
}

/* 🔘 BOTONES */
.exit,.home{
position:fixed;
top:10px;
padding:8px 10px;
border-radius:8px;
border:1px solid #00ffcc;
background:black;
z-index:10;
font-size:12px;
}

.exit{left:10px;}
.home:nth-of-type(2){left:120px;}
.home:nth-of-type(3){left:230px;}

/* ☕ KO-FI */
.kofi{
position:fixed;
bottom:20px;
right:20px;
width:70px;
height:70px;
border-radius:50%;
background:radial-gradient(circle,#00ffcc,#ff00ff);
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
box-shadow:0 0 15px #00ffff;
z-index:10;
text-decoration:none;
}

.kofi::after{
content:"☕ APOYA";
position:absolute;
bottom:-30px;
font-size:10px;
color:#00ffcc;
width:100px;
text-align:center;
}

</style>
</head>

<body>

<div class="stars"></div>

<!-- 🎬 MP4 -->
<video class="video v1" id="v1" src="dancing.mp4" loop muted></video>
<video class="video v2" id="v2" src="dancing.mp4" loop muted></video>

<!-- 🔘 BOTONES -->
<a class="exit" href="duqueluis-mp3.html">⬅ REGRESO</a>
<a class="home" href="music.html">🎧 AUDIO LAB</a>
<a class="home" href="index.html">🏠 INICIO</a>

<!-- 🖼️ PORTADA -->
<img src="frecuencia-latina.PNG" class="cover">

<div class="container">

<div class="tracks" id="tracks"></div>

<div>
<canvas id="vu"></canvas>
<div id="info">⏱ 0:00</div>
</div>

</div>

<!-- ☕ -->
<a class="kofi" href="https://ko-fi.com/luisduque" target="_blank">👽</a>

<audio id="audio"></audio>

<script>

/* ⭐ estrellas ligeras */
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
document.querySelector(".stars").appendChild(s);
}

/* 🎧 TRACKS */
const tracks=[
{file:"baila-conmigo.mp3", name:"💃 Baila Conmigo"},
{file:"baila-mi-corazon.mp3", name:"❤️ Baila Mi Corazón"},
{file:"baila-pegadito.mp3", name:"🔥 Baila Pegadito"},
{file:"bajo-el-mismo-alambre.mp3", name:"⚡ Bajo el Mismo Alambre"},
{file:"dime-si-vuelves.mp3", name:"🌙 Dime Si Vuelves"},
{file:"la-silla-vacia.mp3", name:"🪑 La Silla Vacía"},
{file:"luna.mp3", name:"🌕 Luna"},
{file:"me-quede-solo.mp3", name:"🖤 Me Quedé Solo"},
{file:"pegate-al-pulso.mp3", name:"🫀 Pégate al Pulso"},
{file:"pegate-mas.mp3", name:"🔊 Pégate Más"},
{file:"tu-recuerdo.mp3", name:"🌫️ Tu Recuerdo"},
{file:"tus-ojos.mp3", name:"👁️ Tus Ojos"}
];

let audio=document.getElementById("audio");
let i=0;

/* 🎬 sync video */
function playVideo(){
v1.play(); v2.play();
}
function pauseVideo(){
v1.pause(); v2.pause();
}

audio.onplay=playVideo;
audio.onpause=pauseVideo;

/* ▶ play continuo */
function playTrack(index){
audio.src=tracks[index].file;
audio.play();
}

audio.onended=function(){
i++;
if(i<tracks.length){
playTrack(i);
}
};

/* UI */
let div=document.getElementById("tracks");

tracks.forEach((t,idx)=>{
div.innerHTML+=`
<div class="track">
<strong>${t.name}</strong><br>
<button onclick="i=${idx};playTrack(i)">▶</button>
<button onclick="audio.pause()">⏸</button>
</div>`;
});

/* 📊 VU OPTIMIZADO */
const ctx=new AudioContext();
const src=ctx.createMediaElementSource(audio);
const analyser=ctx.createAnalyser();
src.connect(analyser);
analyser.connect(ctx.destination);

let data=new Uint8Array(analyser.frequencyBinCount);

function draw(){
requestAnimationFrame(draw);

let c=document.getElementById("vu").getContext("2d");
let w=c.canvas.width=c.canvas.offsetWidth;
let h=c.canvas.height=c.canvas.offsetHeight;

analyser.getByteFrequencyData(data);

c.fillStyle="black";
c.fillRect(0,0,w,h);

let avg=0;

for(let x=0;x<data.length;x++){
avg+=data[x];
let v=data[x]/255*h;
c.fillStyle="#00ffff";
c.fillRect(x*2,h-v,1,v);
}

avg/=data.length;
document.getElementById("info").innerText="Hz ~ "+Math.round(avg*10);

}

draw();

</script>

</body>
</html>
