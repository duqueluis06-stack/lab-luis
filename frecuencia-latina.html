<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Frecuencia Latina & Thunder Legion | Lab Luis Duque</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --neon-blue: #00ffff;
            --neon-pink: #ff00ff;
            --neon-green: #00ffcc;
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* 🌌 FONDO WARP SPEED */
        #space-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* 🔘 NAVBAR */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 60px;
            display: flex; justify-content: center; align-items: center; gap: 20px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-blue); z-index: 2000;
        }
        .nav-btn {
            text-decoration: none; color: var(--neon-green);
            border: 1px solid var(--neon-green); padding: 5px 15px;
            border-radius: 4px; font-size: 12px; font-weight: bold;
        }

        /* ✈️ TÍTULO AEROPUERTO (MARQUEE) */
        .airport-marquee {
            position: fixed; top: 62px; width: 100%;
            background: #111; border-bottom: 1px solid var(--neon-green);
            overflow: hidden; z-index: 1500;
        }
        .marquee-content {
            display: inline-block; white-space: nowrap;
            font-family: 'Courier New', monospace; font-size: 18px;
            color: var(--neon-green); padding: 10px 0;
            animation: marquee 25s linear infinite;
        }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 🏗️ ESTRUCTURA DE ÁLBUMES */
        .album-section {
            padding: 140px 20px 60px;
            display: flex; flex-direction: column; align-items: center;
        }
        .thunder-bg { background: rgba(255, 0, 255, 0.03); border-top: 1px solid #333; }

        .media-box {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            margin-bottom: 30px; width: 100%;
        }

        .video-display {
            width: 90%; max-width: 480px; aspect-ratio: 16/9;
            background: #000; border-radius: 12px; object-fit: contain;
            border: 3px solid var(--neon-blue); box-shadow: 0 0 25px rgba(0,255,255,0.3);
        }
        .video-thunder { border-color: var(--neon-pink); box-shadow: 0 0 25px rgba(255,0,255,0.3); }

        .cover-art {
            width: 130px; height: 130px; border-radius: 50%;
            border: 4px solid white; box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
        .rotating { animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 📊 VUMETERS */
        .vu-container {
            width: 90%; max-width: 700px; height: 100px;
            background: rgba(0,0,0,0.7); border: 1px solid #333;
            border-radius: 10px; margin-bottom: 30px;
        }
        canvas { width: 100%; height: 100%; }

        /* 🎧 GRIDS DE TRACKS */
        .tracks-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px; width: 100%; max-width: 1100px;
        }
        .track-card {
            background: rgba(20, 20, 20, 0.9); border: 1px solid #444;
            padding: 15px; border-radius: 8px; transition: 0.3s;
        }
        .track-card.active-lat { border-color: var(--neon-green); background: rgba(0,255,204,0.05); }
        .track-card.active-thu { border-color: var(--neon-pink); background: rgba(255,0,255,0.05); }

        .progress-wrap { width: 100%; height: 4px; background: #111; margin: 10px 0; border-radius: 2px; }
        .progress-bar { width: 0%; height: 100%; background: var(--neon-pink); }

        .play-btn {
            background: none; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 5px 12px; cursor: pointer;
            font-weight: bold; border-radius: 3px;
        }
        .play-btn:hover { background: var(--neon-green); color: #000; }

        .kofi {
            position: fixed; bottom: 20px; right: 20px;
            width: 55px; height: 55px; background: linear-gradient(45deg, #f0f, #0ff);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 24px; z-index: 3000;
        }
    </style>
</head>
<body>

<canvas id="space-canvas"></canvas>

<nav class="navbar">
    <a href="index.html" class="nav-btn">INICIO</a>
    <a href="#section-latina" class="nav-btn">FRECUENCIA LATINA</a>
    <a href="#section-thunder" class="nav-btn">THUNDER LEGION</a>
</nav>

<div class="airport-marquee">
    <div class="marquee-content">
        +++ AHORA REPRODUCIENDO: LABORATORIO SONORO LUIS DUQUE +++ DESTINO 1: FRECUENCIA LATINA (12 TRACKS) +++ DESTINO 2: THUNDER LEGION (17 TRACKS) +++ EL ARTE DIGITAL Y LA FÍSICA SE FUSIONAN +++
    </div>
</div>

<section id="section-latina" class="album-section">
    <h2 style="color:var(--neon-green)">💃 ÁLBUM: FRECUENCIA LATINA</h2>
    <div class="media-box">
        <video id="vid-lat" class="video-display" loop muted playsinline>
            <source src="dancing.mp4" type="video/mp4">
        </video>
        <img id="img-lat" src="frecuencia-latina.PNG" class="cover-art" alt="Latina Cover">
        <div class="vu-container">
            <canvas id="vu-lat"></canvas>
        </div>
    </div>
    <div id="grid-lat" class="tracks-grid"></div>
</section>

<section id="section-thunder" class="album-section thunder-bg">
    <h2 style="color:var(--neon-pink)">⚡ ÁLBUM: THUNDER LEGION</h2>
    <div class="media-box">
        <video id="vid-thu" class="video-display video-thunder" loop muted playsinline>
            <source src="tx.mp4" type="video/mp4">
        </video>
        <img id="img-thu" src="legion.jpg" class="cover-art" alt="Legion Cover">
        <div class="vu-container">
            <canvas id="vu-thu"></canvas>
        </div>
    </div>
    <div id="grid-thu" class="tracks-grid"></div>
</section>

<a href="https://ko-fi.com/luisduque" class="kofi">👽</a>

<audio id="aud-lat" crossorigin="anonymous"></audio>
<audio id="aud-thu" crossorigin="anonymous"></audio>

<script>
/* 🎧 DATA COMPLETA - SIN OMISIONES */
const listLat = [
    {f:"baila-conmigo.mp3", n:"Baila Conmigo"}, {f:"baila-mi-corazon.mp3", n:"Baila Mi Corazón"},
    {f:"baila-pegadito.mp3", n:"Baila Pegadito"}, {f:"bajo-el-mismo-alambre.mp3", n:"Bajo el Mismo Alambre"},
    {f:"dime-si-vuelves.mp3", n:"Dime Si Vuelves"}, {f:"la-silla-vacia.mp3", n:"La Silla Vacía"},
    {f:"luna.mp3", n:"Luna"}, {f:"me-quede-solo.mp3", n:"Me Quedé Solo"},
    {f:"pegate-al-pulso.mp3", n:"Pégate al Pulso"}, {f:"pegate-mas.mp3", n:"Pégate Más"},
    {f:"tu-recuerdo.mp3", n:"Tu Recuerdo"}, {f:"tus-ojos.mp3", n:"Tus Ojos"}
];

const listThu = [
    {f:"cathedral.mp3", n:"Cathedral"}, {f:"citadel.mp3", n:"Citadel"},
    {f:"emf.mp3", n:"EMF"}, {f:"four.mp3", n:"Four"},
    {f:"ip.mp3", n:"IP"}, {f:"march.mp3", n:"March"},
    {f:"mecanic.mp3", n:"Mecanic"}, {f:"phase.mp3", n:"Phase"},
    {f:"pulsating.mp3", n:"Pulsating"}, {f:"pulse.mp3", n:"Pulse"},
    {f:"resurgir.mp3", n:"Resurgir"}, {f:"siege.mp3", n:"Siege"},
    {f:"skyforge.mp3", n:"Skyforge"}, {f:"strings.mp3", n:"Strings"},
    {f:"vanguard.mp3", n:"Vanguard"}, {f:"viking.mp3", n:"Viking"},
    {f:"war.mp3", n:"War"}
];

/* 🛠️ MOTORES DE AUDIO Y ANALYZERS */
let actx1, actx2, ana1, ana2, dat1, dat2;

function playLat(i) {
    if(!actx1) {
        actx1 = new AudioContext(); ana1 = actx1.createAnalyser();
        const s = actx1.createMediaElementSource(document.getElementById('aud-lat'));
        s.connect(ana1); ana1.connect(actx1.destination);
        dat1 = new Uint8Array(ana1.frequencyBinCount);
    }
    stopThu();
    const a = document.getElementById('aud-lat');
    a.src = listLat[i].f; a.play();
    document.getElementById('vid-lat').play();
    document.getElementById('img-lat').classList.add('rotating');
    updateCards('lat', i);
}

function playThu(i) {
    if(!actx2) {
        actx2 = new AudioContext(); ana2 = actx2.createAnalyser();
        const s = actx2.createMediaElementSource(document.getElementById('aud-thu'));
        s.connect(ana2); ana2.connect(actx2.destination);
        dat2 = new Uint8Array(ana2.frequencyBinCount);
    }
    stopLat();
    const a = document.getElementById('aud-thu');
    a.src = listThu[i].f; a.play();
    document.getElementById('vid-thu').play();
    document.getElementById('img-thu').classList.add('rotating');
    updateCards('thu', i);
}

function stopLat() { 
    document.getElementById('aud-lat').pause(); 
    document.getElementById('vid-lat').pause();
    document.getElementById('img-lat').classList.remove('rotating');
}
function stopThu() { 
    document.getElementById('aud-thu').pause(); 
    document.getElementById('vid-thu').pause();
    document.getElementById('img-thu').classList.remove('rotating');
}

/* 📊 DIBUJO DE VUMETERS INDEPENDIENTES */
function loop() {
    requestAnimationFrame(loop);
    if(ana1) {
        const c = document.getElementById('vu-lat'), x = c.getContext('2d');
        ana1.getByteFrequencyData(dat1);
        x.clearRect(0,0,c.width,c.height);
        x.fillStyle = '#00ffcc';
        for(let i=0; i<60; i++) {
            let h = (dat1[i]/255)*c.height;
            x.fillRect(i*5, c.height-h, 3, h);
        }
    }
    if(ana2) {
        const c = document.getElementById('vu-thu'), x = c.getContext('2d');
        ana2.getByteFrequencyData(dat2);
        x.clearRect(0,0,c.width,c.height);
        x.fillStyle = '#ff00ff';
        for(let i=0; i<60; i++) {
            let h = (dat2[i]/255)*c.height;
            x.fillRect(i*5, c.height-h, 3, h);
        }
    }
}

/* 🎨 RENDERIZADO INICIAL */
const gLat = document.getElementById('grid-lat');
listLat.forEach((t, i) => {
    gLat.innerHTML += `<div class="track-card" id="c-lat-${i}">
        <b>${t.n}</b>
        <div class="progress-wrap"><div class="progress-bar" id="b-lat-${i}"></div></div>
        <button class="play-btn" onclick="playLat(${i})">PLAY</button>
    </div>`;
});

const gThu = document.getElementById('grid-thu');
listThu.forEach((t, i) => {
    gThu.innerHTML += `<div class="track-card" id="c-thu-${i}">
        <b>${t.n}</b>
        <div class="progress-wrap"><div class="progress-bar" id="b-thu-${i}"></div></div>
        <button class="play-btn" onclick="playThu(${i})">PLAY</button>
    </div>`;
});

function updateCards(type, idx) {
    document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active-lat', 'active-thu'));
    document.getElementById(`c-${type}-${idx}`).classList.add(type === 'lat' ? 'active-lat' : 'active-thu');
}

/* 🌠 STARFIELD */
const sc = document.getElementById('space-canvas'); const sct = sc.getContext('2d');
let stars = Array(200).fill().map(() => ({x: Math.random()*2000-1000, y: Math.random()*2000-1000, z: Math.random()*2000}));
function moveStars() {
    sc.width = window.innerWidth; sc.height = window.innerHeight;
    sct.fillStyle = 'black'; sct.fillRect(0,0,sc.width, sc.height);
    sct.save(); sct.translate(sc.width/2, sc.height/2);
    stars.forEach(s => {
        s.z -= 4; if(s.z<=0) s.z = 2000;
        let px = s.x / (s.z/1000), py = s.y / (s.z/1000);
        sct.fillStyle = 'white'; sct.beginPath(); sct.arc(px, py, (1-s.z/2000)*3, 0, Math.PI*2); sct.fill();
    });
    sct.restore(); requestAnimationFrame(moveStars);
}

moveStars(); loop();
</script>
</body>
</html>
