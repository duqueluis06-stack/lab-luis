<style>
:root {
    --neon-blue: #00ffff;
    --neon-pink: #ff00ff;
    --neon-green: #00ffcc;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

#space-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
}

/* 🔘 NAVBAR */
.navbar {
    position: fixed; top: 0; width: 100%;
    display: flex; justify-content: center; gap: 15px;
    padding: 15px 0; background: rgba(0,0,0,0.8);
    backdrop-filter: blur(15px); z-index: 1000;
    border-bottom: 2px solid var(--neon-blue);
}
.nav-btn {
    text-decoration: none; color: var(--neon-green);
    border: 1px solid var(--neon-green); padding: 8px 18px;
    border-radius: 5px; font-size: 13px; font-weight: bold;
    text-transform: uppercase;
}

/* ✈️ TÍTULO AEROPUERTO 3D */
.airport-zone {
    margin-top: 100px;
    background: #111;
    border-top: 4px solid #222;
    border-bottom: 4px solid #222;
    padding: 20px 0;
    overflow: hidden;
    perspective: 800px;
}
.marquee-3d {
    display: inline-block;
    white-space: nowrap;
    font-size: 3rem;
    font-weight: 900;
    color: #ffcc00;
    text-transform: uppercase;
    animation: flight 20s linear infinite;
    text-shadow: 4px 4px 0px #664400, 8px 8px 20px rgba(0,0,0,0.8);
    transform-style: preserve-3d;
}
@keyframes flight {
    from { transform: translateX(100%) rotateX(20deg); }
    to { transform: translateX(-100%) rotateX(20deg); }
}

/* 🎬 SECCIONES */
.main-container {
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px;
}
.video-frame {
    width: 95%; max-width: 480px;
    border: 3px solid var(--neon-blue);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
    background: #000;
    margin-bottom: 20px;
}
.video-frame video { width: 100%; display: block; object-fit: contain; }

.album-disc {
    width: 150px; height: 150px; border-radius: 50%;
    border: 4px solid white; box-shadow: 0 0 30px rgba(255,255,255,0.2);
    margin: 20px 0;
}
.rotating { animation: spin 8s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* 📊 VÚMETRO VISTOSO */
.vu-meter-box {
    width: 100%; max-width: 700px; margin: 10px auto;
    background: rgba(0,0,0,0.8); border-radius: 20px;
    padding: 15px; border: 1px solid #333;
}
canvas#vu-canvas { width: 100%; height: 120px; }

/* 🎧 GRID */
.tracks-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px; width: 100%; max-width: 1200px; padding: 20px;
}
.track-card {
    background: rgba(20, 20, 20, 0.9); padding: 20px;
    border-radius: 15px; border: 1px solid #333; transition: 0.3s;
}
.track-card.active { border-color: var(--neon-green); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }

.progress-container {
    width: 100%; height: 6px; background: #111;
    border-radius: 3px; margin: 15px 0; overflow: hidden;
}
.progress-bar { width: 0%; height: 100%; background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

/* 🔘 BOTONES */
.control-btns { display: flex; gap: 10px; }
.btn-p {
    flex: 1; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px;
}
.play { background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); }
.pause { background: transparent; border: 1px solid #ff4444; color: #ff4444; }
.play:hover { background: var(--neon-green); color: #000; }
.pause:hover { background: #ff4444; color: #000; }

.kofi {
    position: fixed; bottom: 30px; right: 30px;
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 25px; z-index: 2000; text-decoration: none;
    box-shadow: 0 0 20px var(--neon-pink);
}
</style>
</head>
<body>

<canvas id="space-canvas"></canvas>

<nav class="navbar">
    <a class="nav-btn" href="duqueluis-mp3.html">⬅ VOLVER</a>
    <a class="nav-btn" href="index.html">🏠 INICIO</a>
</nav>

<div class="airport-zone">
    <div class="marquee-3d">
        +++ FRECUENCIA LATINA +++ LABORATORIO LUIS DUQUE +++ EXPERIMENTAL SOUNDS +++ THUNDER LEGION +++
    </div>
</div>

<section class="main-container">
    <div class="video-frame">
        <video id="vid1" loop muted playsinline>
            <source src="dancing.mp4" type="video/mp4">
        </video>
    </div>
    <img src="frecuencia-latina.PNG" id="img1" class="album-disc" alt="Frecuencia Latina">
    <h2 style="color:var(--neon-blue)">🕺 FRECUENCIA LATINA</h2>
    
    <div class="vu-meter-box">
        <canvas id="vu-canvas"></canvas>
    </div>

    <div class="tracks-grid" id="grid1"></div>
</section>

<hr style="border: 1px solid #222; width: 90%;">

<section class="main-container">
    <div class="video-frame" style="border-color: var(--neon-pink);">
        <video id="vid2" loop muted playsinline>
            <source src="tx.mp4" type="video/mp4">
        </video>
    </div>
    <img src="legion.JPG" id="img2" class="album-disc" alt="Thunder Legion">
    <h2 style="color:var(--neon-pink)">⚡ THUNDER LEGION</h2>
    <div class="tracks-grid" id="grid2"></div>
</section>

<a class="kofi" href="https://ko-fi.com/luisduque" target="_blank">👽</a>

<audio id="audio-engine" crossorigin="anonymous"></audio>

<script>
/* 🌠 ESTRELLAS */
const sc = document.getElementById('space-canvas');
const sx = sc.getContext('2d');
let stars = [];
function initS(){ sc.width=window.innerWidth; sc.height=window.innerHeight; stars=[]; for(let i=0;i<200;i++) stars.push({x:Math.random()*sc.width, y:Math.random()*sc.height, z:Math.random()*sc.width}); }
function drawS(){ sx.fillStyle='black'; sx.fillRect(0,0,sc.width,sc.height); stars.forEach(s=>{ s.z-=2; if(s.z<=0) s.z=sc.width; let x=(s.x-sc.width/2)*(sc.width/s.z)+sc.width/2; let y=(s.y-sc.height/2)*(sc.width/s.z)+sc.height/2; let sz=(1-s.z/sc.width)*3; sx.fillStyle='white'; sx.beginPath(); sx.arc(x,y,sz,0,Math.PI*2); sx.fill(); }); requestAnimationFrame(drawS); }
initS(); drawS();

/* 🎧 LISTAS COMPLETAS */
const fLatina = [
    {f:"baila-conmigo.mp3", n:"💃 Baila Conmigo"}, {f:"baila-mi-corazon.mp3", n:"❤️ Baila Mi Corazón"},
    {f:"baila-pegadito.mp3", n:"🔥 Baila Pegadito"}, {f:"bajo-el-mismo-alambre.mp3", n:"⚡ Bajo el Mismo Alambre"},
    {f:"dime-si-vuelves.mp3", n:"🌙 Dime Si Vuelves"}, {f:"la-silla-vacia.mp3", n:"🪑 La Silla Vacía"},
    {f:"luna.mp3", n:"🌕 Luna"}, {f:"me-quede-solo.mp3", n:"🖤 Me Quedé Solo"},
    {f:"pegate-al-pulso.mp3", n:"🫀 Pégate al Pulso"}, {f:"pegate-mas.mp3", n:"🔊 Pégate Más"},
    {f:"tu-recuerdo.mp3", n:"🌫️ Tu Recuerdo"}, {f:"tus-ojos.mp3", n:"👁️ Tus Ojos"}
];

const tLegion = [
    {f:"cathedral.mp3", n:"⛪ Cathedral"}, {f:"citadel.mp3", n:"🏰 Citadel"},
    {f:"emf.mp3", n:"⚡ EMF"}, {f:"four.mp3", n:"🔢 Four"},
    {f:"ip.mp3", n:"🌐 IP"}, {f:"march.mp3", n:"🥁 March"},
    {f:"mecanic.mp3", n:"⚙️ Mecanic"}, {f:"phase.mp3", n:"🔄 Phase"},
    {f:"pulsating.mp3", n:"💓 Pulsating"}, {f:"pulse.mp3", n:"💓 Pulse"},
    {f:"resurgir.mp3", n:"🌅 Resurgir"}, {f:"siege.mp3", n:"🏰 Siege"},
    {f:"skyforge.mp3", n:"🌌 Skyforge"}, {f:"strings.mp3", n:"🎻 Strings"},
    {f:"vanguard.mp3", n:"🛡️ Vanguard"}, {f:"viking.mp3", n:"🪓 Viking"},
    {f:"war.mp3", n:"⚔️ War"}
];

const engine = document.getElementById('audio-engine');
let currentKey = null;
let aCtx, analyser, data;

function renderGrid(list, target, key) {
    const g = document.getElementById(target);
    list.forEach((t, i) => {
        g.innerHTML += `
        <div class="track-card" id="card-${key}-${i}">
            <div style="display:flex; justify-content:space-between"><b>${t.n}</b> <span id="time-${key}-${i}">00:00</span></div>
            <div class="progress-container"><div class="progress-bar" id="bar-${key}-${i}"></div></div>
            <div class="control-btns">
                <button class="btn-p play" onclick="playSong('${key}', ${i}, '${t.f}')">PLAY ▶</button>
                <button class="btn-p pause" onclick="stopSong()">PAUSE ⏸</button>
            </div>
        </div>`;
    });
}
renderGrid(fLatina, "grid1", "lat");
renderGrid(tLegion, "grid2", "thun");

function playSong(key, idx, file) {
    if(!aCtx) {
        aCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = aCtx.createAnalyser();
        const s = aCtx.createMediaElementSource(engine);
        s.connect(analyser); analyser.connect(aCtx.destination);
        data = new Uint8Array(analyser.frequencyBinCount);
        drawVU();
    }
    const id = `${key}-${idx}`;
    if(currentKey !== id) { engine.src = file; currentKey = id; }
    engine.play();
    
    document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${id}`).classList.add('active');

    const v1 = document.getElementById('vid1'), v2 = document.getElementById('vid2');
    const i1 = document.getElementById('img1'), i2 = document.getElementById('img2');
    
    if(key === 'lat') {
        v1.play(); v2.pause(); i1.classList.add('rotating'); i2.classList.remove('rotating');
    } else {
        v2.play(); v1.pause(); i2.classList.add('rotating'); i1.classList.remove('rotating');
    }
}

function stopSong() {
    engine.pause();
    document.querySelectorAll('video').forEach(v => v.pause());
    document.querySelectorAll('.album-disc').forEach(img => img.classList.remove('rotating'));
}

engine.ontimeupdate = () => {
    if(!currentKey) return;
    const p = (engine.currentTime / engine.duration) * 100;
    document.getElementById(`bar-${currentKey}`).style.width = p + "%";
    document.getElementById(`time-${currentKey}`).innerText = Math.floor(engine.currentTime/60) + ":" + Math.floor(engine.currentTime%60).toString().padStart(2,'0');
};

function drawVU() {
    requestAnimationFrame(drawVU);
    const cvs = document.getElementById('vu-canvas'), ctx = cvs.getContext('2d');
    cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0,0,cvs.width, cvs.height);
    const bw = (cvs.width / data.length) * 2.5;
    let x = 0;
    for(let i=0; i<data.length; i++) {
        let bh = data[i] / 1.5;
        ctx.fillStyle = `rgb(0, ${data[i]+100}, 255)`;
        ctx.fillRect(x, cvs.height-bh, bw, bh);
        x += bw + 1;
    }
}
</script>
</body>
