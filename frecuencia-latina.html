<style>
:root {
    --neon-blue: #00ffff;
    --neon-pink: #ff00ff;
    --neon-green: #00ffcc;
    --bg-dark: #050505;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg-dark);
    color: white;
    overflow-x: hidden;
}

/* 🌌 FONDO ESPACIAL */
#space-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
}

/* 🔘 NAVBAR REPARADA */
.navbar {
    position: fixed; top: 0; width: 100%;
    display: flex; justify-content: center; gap: 15px;
    padding: 15px 0; background: rgba(0,0,0,0.9);
    backdrop-filter: blur(15px); z-index: 1000;
    border-bottom: 2px solid var(--neon-blue);
}
.nav-btn {
    text-decoration: none; color: var(--neon-green);
    border: 1px solid var(--neon-green); padding: 8px 18px;
    border-radius: 5px; font-size: 13px; font-weight: bold;
    text-transform: uppercase; transition: 0.3s;
}
.nav-btn:hover { background: var(--neon-green); color: black; }

/* ✈️ TÍTULO AEROPUERTO 3D MARQUEE */
.airport-header {
    margin-top: 100px;
    perspective: 1000px;
    overflow: hidden;
    background: #111;
    border-top: 4px solid #333;
    border-bottom: 4px solid #333;
    padding: 10px 0;
}
.marquee-3d {
    display: inline-block;
    white-space: nowrap;
    font-size: 2.5rem;
    font-weight: 900;
    text-transform: uppercase;
    color: #ffcc00;
    text-shadow: 2px 2px 0px #996600, 4px 4px 5px rgba(0,0,0,0.5);
    animation: scroll3d 15s linear infinite;
    transform-style: preserve-3d;
}
@keyframes scroll3d {
    from { transform: translateX(100%) rotateX(10deg); }
    to { transform: translateX(-100%) rotateX(10deg); }
}

/* 🎬 SECCIONES DE VIDEO SEPARADAS */
.album-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
}
.video-container {
    width: 90%; max-width: 500px;
    margin-bottom: 20px;
    position: relative;
    border: 3px solid var(--neon-blue);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
}
.video-container video { width: 100%; display: block; }

.album-cover {
    width: 120px; height: 120px; border-radius: 50%;
    border: 3px solid white; margin: 15px 0;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}
.rotating { animation: spin 8s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* 📊 VÚMETRO MEJORADO */
.visualizer-box {
    width: 95%; max-width: 800px; margin: 10px auto;
    background: #000; border-radius: 10px;
    padding: 5px; border: 2px solid #222;
}
canvas#vu { width: 100%; height: 120px; }

/* 🎧 TRACKS */
.tracks-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px; max-width: 1200px; margin: 0 auto; padding: 20px;
}
.track-card {
    background: linear-gradient(145deg, #151515, #0a0a0a);
    padding: 20px; border-radius: 12px;
    border: 1px solid #333; transition: 0.3s;
}
.track-card.active { border-color: var(--neon-pink); background: #1a0a1a; }

/* 🔘 BOTONES SEPARADOS */
.controls { display: flex; gap: 10px; margin-top: 15px; }
.btn-play { 
    background: #00ffcc; color: black; border: none; 
    padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1;
}
.btn-pause { 
    background: transparent; color: #ff00ff; border: 1px solid #ff00ff; 
    padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1;
}
.btn-play:hover { background: white; }
.btn-pause:hover { background: #ff00ff; color: black; }

.evolution-bar {
    width: 100%; height: 4px; background: #222;
    border-radius: 2px; margin-top: 10px; overflow: hidden;
}
.progress-fill { width: 0%; height: 100%; background: var(--neon-pink); }

/* ☕ KO-FI */
.kofi {
    position: fixed; bottom: 30px; right: 30px;
    width: 65px; height: 65px; border-radius: 50%;
    background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; z-index: 2000; text-decoration: none;
    animation: pulse 2s infinite; box-shadow: 0 0 25px var(--neon-pink);
}
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
</style>
</head>

<body>

<canvas id="space-canvas"></canvas>

<nav class="navbar">
    <a class="nav-btn" href="duqueluis-mp3.html">⬅ VOLVER</a>
    <a class="nav-btn" href="index.html">🏠 INICIO</a>
</nav>

<div class="airport-header">
    <div class="marquee-3d">
        +++ FRECUENCIA LATINA +++ PROYECTO MUSICAL EXPERIMENTAL +++ LUIS DUQUE +++ THUNDER LEGION +++ LABORATIO SONORO +++ 
    </div>
</div>

<section class="album-section">
    <div class="video-container">
        <video id="vid-latino" loop muted playsinline>
            <source src="dancing.mp4" type="video/mp4">
        </video>
    </div>
    <img src="frecuencia-latina.PNG" id="img-latino" class="album-cover" alt="Latino Cover">
    <h2 style="color:var(--neon-blue)">🕺 FRECUENCIA LATINA</h2>
    
    <div class="visualizer-box">
        <canvas id="vu"></canvas>
    </div>

    <div class="tracks-grid" id="grid-latino"></div>
</section>

<section class="album-section" style="background: rgba(255,0,255,0.03);">
    <div class="video-container" style="border-color: var(--neon-pink);">
        <video id="vid-thunder" loop muted playsinline>
            <source src="tx.mp4" type="video/mp4">
        </video>
    </div>
    <img src="frecuencia-latina.PNG" id="img-thunder" class="album-cover" alt="Thunder Cover">
    <h2 style="color:var(--neon-pink)">⚡ THUNDER LEGION</h2>
    
    <div class="tracks-grid" id="grid-thunder"></div>
</section>

<a class="kofi" href="https://ko-fi.com/luisduque" target="_blank">
    👽
    <span style="position:absolute; bottom:-18px; font-size:10px; color:#ffffff;">KO-FI</span>
</a>

<p style="text-align:center; padding: 50px; color:#666;">
    ⚡ Apoya el laboratorio impulsando nuevos experimentos sonoros — Luis Duque
</p>

<audio id="audio-player" crossorigin="anonymous"></audio>

<script>
/* 🌠 SPACE ENGINE */
const spaceCanvas = document.getElementById('space-canvas');
const sCtx = spaceCanvas.getContext('2d');
let stars = [];
function initStars() {
    spaceCanvas.width = window.innerWidth; spaceCanvas.height = window.innerHeight;
    stars = [];
    for(let i=0; i<200; i++) stars.push({x: Math.random()*spaceCanvas.width - spaceCanvas.width/2, y: Math.random()*spaceCanvas.height - spaceCanvas.height/2, z: Math.random()*spaceCanvas.width});
}
function updateSpace() {
    sCtx.fillStyle = 'black'; sCtx.fillRect(0,0,spaceCanvas.width, spaceCanvas.height);
    sCtx.save(); sCtx.translate(spaceCanvas.width/2, spaceCanvas.height/2);
    stars.forEach(s => {
        s.z -= 2; if(s.z<=0) s.z=spaceCanvas.width;
        let sx = (s.x/s.z)*spaceCanvas.width; let sy = (s.y/s.z)*spaceCanvas.height;
        let size = (1-s.z/spaceCanvas.width)*3; sCtx.fillStyle = 'white';
        sCtx.beginPath(); sCtx.arc(sx,sy,size,0,Math.PI*2); sCtx.fill();
    });
    sCtx.restore(); requestAnimationFrame(updateSpace);
}
initStars(); updateSpace();

/* 🎧 TRACKS DATA */
const latinoTracks = [
    {file:"baila-conmigo.mp3", name:"💃 Baila Conmigo"},
    {file:"baila-mi-corazon.mp3", name:"❤️ Baila Mi Corazón"},
    {file:"baila-pegadito.mp3", name:"🔥 Baila Pegadito"},
    {file:"bajo-el-mismo-alambre.mp3", name:"⚡ Bajo el Mismo Alambre"},
    {file:"dime-si-vuelves.mp3", name:"🌙 Dime Si Vuelves"},
    {file:"la-silla-vacia.mp3", name:"🪑 La Silla Vacía"},
    {file:"luna.mp3", name:"🌕 Luna"},
    {file:"me-quede-solo.mp3", name:"🖤 Me Quedé Solo"},
    {file:"pegate-al-pulso.mp3", name:"🫀 Pégate al Pulso"},
    {file:"pegate-mas.mp3", name:"🔊 Pégate Más"},
    {file:"tu-recuerdo.mp3", name:"🌫️ Tu Recuerdo"},
    {file:"tus-ojos.mp3", name:"👁️ Tus Ojos"}
];

const thunderTracks = [
    {file:"cathedral.mp3", name:"⛪ Cathedral", time:"3:03"},
    {file:"citadel.mp3", name:"🏰 Citadel", time:"3:13"},
    {file:"emf.mp3", name:"⚡ EMF", time:"3:07"},
    {file:"four.mp3", name:"🔢 Four", time:"2:44"},
    {file:"ip.mp3", name:"🌐 IP", time:"3:15"},
    {file:"march.mp3", name:"🥁 March", time:"2:49"},
    {file:"mecanic.mp3", name:"⚙️ Mecanic", time:"2:54"},
    {file:"phase.mp3", name:"🔄 Phase", time:"3:29"},
    {file:"pulsating.mp3", name:"💓 Pulsating", time:"3:18"},
    {file:"pulse.mp3", name:"💓 Pulse", time:"3:34"},
    {file:"resurgir.mp3", name:"🌅 Resurgir", time:"2:31"},
    {file:"siege.mp3", name:"🏰 Siege", time:"3:09"},
    {file:"skyforge.mp3", name:"🌌 Skyforge", time:"3:04"},
    {file:"strings.mp3", name:"🎻 Strings", time:"3:04"},
    {file:"vanguard.mp3", name:"🛡️ Vanguard", time:"3:12"},
    {file:"viking.mp3", name:"🪓 Viking", time:"2:43"},
    {file:"war.mp3", name:"⚔️ War", time:"2:47"}
];

const player = document.getElementById("audio-player");
let audioCtx, analyser, dataArray;
let currentActiveId = null;

function renderGrid(data, containerId, prefix) {
    const container = document.getElementById(containerId);
    data.forEach((t, i) => {
        container.innerHTML += `
        <div class="track-card" id="card-${prefix}-${i}">
            <div style="display:flex; justify-content:space-between">
                <span style="font-weight:bold">${t.name}</span>
                <span id="time-${prefix}-${i}" class="track-time">00:00</span>
            </div>
            <div class="evolution-bar"><div class="progress-fill" id="bar-${prefix}-${i}"></div></div>
            <div class="controls">
                <button class="btn-play" onclick="playMusic('${prefix}', ${i}, '${t.file}')">PLAY ▶</button>
                <button class="btn-pause" onclick="pauseMusic()">PAUSE ⏸</button>
            </div>
        </div>`;
    });
}

renderGrid(latinoTracks, "grid-latino", "lat");
renderGrid(thunderTracks, "grid-thunder", "thun");

function playMusic(prefix, idx, file) {
    if (!audioCtx) initAudioVisualizer();
    
    const id = `${prefix}-${idx}`;
    const vidLat = document.getElementById("vid-latino");
    const vidThun = document.getElementById("vid-thunder");
    const imgLat = document.getElementById("img-latino");
    const imgThun = document.getElementById("img-thunder");

    if (currentActiveId !== id) {
        player.src = file;
        currentActiveId = id;
    }

    player.play();
    
    // Control de videos y rotación por sección
    if (prefix === 'lat') {
        vidLat.play(); vidThun.pause();
        imgLat.classList.add('rotating'); imgThun.classList.remove('rotating');
    } else {
        vidThun.play(); vidLat.pause();
        imgThun.classList.add('rotating'); imgLat.classList.remove('rotating');
    }

    document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${id}`).classList.add('active');
}

function pauseMusic() {
    player.pause();
    document.getElementById("vid-latino").pause();
    document.getElementById("vid-thunder").pause();
    document.querySelectorAll('.album-cover').forEach(img => img.classList.remove('rotating'));
}

player.ontimeupdate = () => {
    if (!currentActiveId) return;
    const p = (player.currentTime / player.duration) * 100;
    document.getElementById(`bar-${currentActiveId}`).style.width = p + "%";
    document.getElementById(`time-${currentActiveId}`).innerText = formatTime(player.currentTime);
};

function formatTime(s) {
    let m = Math.floor(s/60), sec = Math.floor(s%60);
    return (m<10?"0":"")+m+":"+(sec<10?"0":"")+sec;
}

function initAudioVisualizer() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaElementSource(player);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    drawVisualizer();
}

function drawVisualizer() {
    requestAnimationFrame(drawVisualizer);
    const canvas = document.getElementById("vu");
    const ctx = canvas.getContext("2d");
    analyser.getByteFrequencyData(dataArray);
    
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let barWidth = (canvas.width / dataArray.length) * 2.5;
    let x = 0;

    for (let i = 0; i < dataArray.length; i++) {
        let barHeight = dataArray[i] / 2;
        let r = barHeight + (25 * (i / dataArray.length));
        let g = 250 * (i / dataArray.length);
        let b = 50;

        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
        x += barWidth + 1;
    }
}
</script>
</body>
