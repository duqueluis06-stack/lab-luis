<script>
/* 🌠 ESTRELLAS */
const canvasStars = document.getElementById('space-canvas');
const ctxStars = canvasStars.getContext('2d');
let stars = [];
function initStars() {
    canvasStars.width = window.innerWidth; canvasStars.height = window.innerHeight;
    stars = [];
    for(let i=0; i<200; i++) stars.push({x: Math.random()*canvasStars.width, y: Math.random()*canvasStars.height, z: Math.random()*canvasStars.width});
}
function drawStars() {
    ctxStars.fillStyle = 'black'; ctxStars.fillRect(0,0,canvasStars.width, canvasStars.height);
    stars.forEach(s => {
        s.z -= 2; if(s.z <= 0) s.z = canvasStars.width;
        let x = (s.x - canvasStars.width/2) * (canvasStars.width/s.z) + canvasStars.width/2;
        let y = (s.y - canvasStars.height/2) * (canvasStars.width/s.z) + canvasStars.height/2;
        let size = (1 - s.z/canvasStars.width) * 3;
        ctxStars.fillStyle = 'white'; ctxStars.beginPath(); ctxStars.arc(x,y,size,0,Math.PI*2); ctxStars.fill();
    });
    requestAnimationFrame(drawStars);
}
initStars(); drawStars();

/* 🎧 DATOS */
const tracks1 = [
    {file:"baila-conmigo.mp3", name:"💃 Baila Conmigo"},
    {file:"baila-mi-corazon.mp3", name:"❤️ Baila Mi Corazón"},
    {file:"baila-pegadito.mp3", name:"🔥 Baila Pegadito"},
    {file:"bajo-el-mismo-alambre.mp3", name:"⚡ Bajo el Mismo Alambre"},
    {file:"dime-si-vuelves.mp3", name:"🌙 Dime Si Vuelves"},
    {file:"la-silla-vacia.mp3", name:"🪑 La Silla Vacía"},
    {file:"luna.mp3", name:"🌕 Luna"},
    {file:"me-quede-solo.mp3", name:"🖤 Me Quedé Solo"},
    {file:"pegate-al-pulso.mp3", name:"🫀 Pégate al Pulso"},
    {file:"pegate-mas.mp3", name:"🔊 Pégate Más"},
    {file:"tu-recuerdo.mp3", name:"🌫️ Tu Recuerdo"},
    {file:"tus-ojos.mp3", name:"👁️ Tus Ojos"}
];

const tracks2 = [
    {file:"cathedral.mp3", name:"⛪ Cathedral", time:"3:03"},
    {file:"citadel.mp3", name:"🏰 Citadel", time:"3:13"},
    {file:"emf.mp3", name:"⚡ EMF", time:"3:07"},
    {file:"four.mp3", name:"🔢 Four", time:"2:44"},
    {file:"ip.mp3", name:"🌐 IP", time:"3:15"},
    {file:"march.mp3", name:"🥁 March", time:"2:49"},
    {file:"mecanic.mp3", name:"⚙️ Mecanic", time:"2:54"},
    {file:"phase.mp3", name:"🔄 Phase", time:"3:29"},
    {file:"pulsating.mp3", name:"💓 Pulsating", time:"3:18"},
    {file:"pulse.mp3", name:"💓 Pulse", time:"3:34"},
    {file:"resurgir.mp3", name:"🌅 Resurgir", time:"2:31"},
    {file:"siege.mp3", name:"🏰 Siege", time:"3:09"},
    {file:"skyforge.mp3", name:"🌌 Skyforge", time:"3:04"},
    {file:"strings.mp3", name:"🎻 Strings", time:"3:04"},
    {file:"vanguard.mp3", name:"🛡️ Vanguard", time:"3:12"},
    {file:"viking.mp3", name:"🪓 Viking", time:"2:43"},
    {file:"war.mp3", name:"⚔️ War", time:"2:47"}
];

const audio = document.getElementById('audio');
let currentId = null;
let audioCtx, analyser, dataArray;

function render(list, gridId, prefix) {
    const grid = document.getElementById(gridId);
    list.forEach((t, i) => {
        grid.innerHTML += `
        <div class="track-card" id="card-${prefix}-${i}">
            <div style="display:flex; justify-content:space-between">
                <b>${t.name}</b>
                <span id="time-${prefix}-${i}" class="track-time">00:00</span>
            </div>
            <div class="evolution-bar"><div class="progress-fill" id="bar-${prefix}-${i}"></div></div>
            <div class="controls">
                <button class="btn-play" onclick="playS('${prefix}', ${i}, '${t.file}')">PLAY ▶</button>
                <button class="btn-pause" onclick="pauseS()">PAUSE ⏸</button>
            </div>
        </div>`;
    });
}
render(tracks1, "grid1", "lat");
render(tracks2, "grid2", "thun");

function playS(prefix, idx, file) {
    if(!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser); analyser.connect(audioCtx.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        drawV();
    }
    const id = `${prefix}-${idx}`;
    if(currentId !== id) {
        audio.src = file;
        currentId = id;
    }
    audio.play();
    document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${id}`).classList.add('active');
    
    // Videos
    const v1 = document.getElementById('v1'), v2 = document.getElementById('v2');
    const img1 = document.getElementById('img1'), img2 = document.getElementById('img2');
    if(prefix === 'lat') {
        v1.play(); v2.pause(); img1.classList.add('rotating'); img2.classList.remove('rotating');
    } else {
        v2.play(); v1.pause(); img2.classList.add('rotating'); img1.classList.remove('rotating');
    }
}

function pauseS() {
    audio.pause();
    document.querySelectorAll('video').forEach(v => v.pause());
    document.querySelectorAll('.album-cover').forEach(i => i.classList.remove('rotating'));
}

audio.ontimeupdate = () => {
    if(!currentId) return;
    const p = (audio.currentTime / audio.duration) * 100;
    document.getElementById(`bar-${currentId}`).style.width = p + "%";
    document.getElementById(`time-${currentId}`).innerText = Math.floor(audio.currentTime/60) + ":" + Math.floor(audio.currentTime%60).toString().padStart(2,'0');
};

function drawV() {
    requestAnimationFrame(drawV);
    const canvas = document.getElementById('vu'), ctx = canvas.getContext('2d');
    analyser.getByteFrequencyData(dataArray);
    ctx.clearRect(0,0,canvas.width, canvas.height);
    const bw = (canvas.width / dataArray.length) * 2;
    let x = 0;
    for(let i=0; i<dataArray.length; i++) {
        let bh = dataArray[i] / 2;
        ctx.fillStyle = `rgb(0, ${dataArray[i]+100}, 255)`;
        ctx.fillRect(x, canvas.height-bh, bw, bh);
        x += bw + 1;
    }
}
</script>
</body>
