<div class="controls">
<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
</div>

<div class="track" onclick="loadTrack('piel-de-grafeno-audio.mp3')">🎧 Piel de Grafito</div>
<div class="track" onclick="loadTrack('Cables-De-Plata.mp3')">⚡ Cables de Plata</div>

<!-- NUEVOS -->
<div class="track" onclick="loadTrack('soledadfolk.mp3')">🎧 Soledad Folk</div>
<div class="track" onclick="loadTrack('pixel-y-piel.mp3')">🎧 Pixel y Piel</div>
<div class="track" onclick="loadTrack('latidos-de-la-maquina.mp3')">⚡ Latidos de la Máquina</div>
<div class="track" onclick="loadTrack('este-loco-mundo-dual.mp3')">🌐 Mundo Dual</div>
<div class="track" onclick="loadTrack('espectro-sintetico.mp3')">🧬 Espectro Sintético</div>

</div>

<canvas id="vumeter"></canvas>

</div>

<script>

const audio = document.getElementById("audio");

function loadTrack(src){
    audio.src = src;
    audio.play();
}

function play(){ audio.play(); }
function pause(){ audio.pause(); }

let ctx = new (window.AudioContext || window.webkitAudioContext)();
let analyser = ctx.createAnalyser();
let source = ctx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(ctx.destination);

analyser.fftSize = 128;

let dataArray = new Uint8Array(analyser.frequencyBinCount);

function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    const canvas = document.getElementById("vumeter");
    const c = canvas.getContext("2d");

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    c.clearRect(0,0,canvas.width,canvas.height);

    let barWidth = canvas.width / dataArray.length;

    for(let i=0;i<dataArray.length;i++){
        let h = dataArray[i];
        c.fillStyle = `rgb(${h*2},${255-h},${150+h/2})`;
        c.fillRect(i*barWidth, canvas.height - h/2, barWidth-1, h/2);
    }
}

draw();

</script>
