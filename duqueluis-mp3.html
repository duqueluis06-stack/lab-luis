<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quantum Audio Lab X</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:#00ffcc;
    text-align:center;
}

/* =========================
   🌌 EMBED SOLO DESKTOP
========================= */

.sketchfab-bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:none;
    z-index:-3;
}

/* 📱 en móvil se apaga limpio */
@media (max-width:768px){
    .sketchfab-bg{
        display:none;
    }
    body{
        background:#050510;
    }
}

/* overlay suave */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-2;
}

/* =========================
   ⚡ TITULO
========================= */

h1{
    font-size:26px;
    margin-top:18px;
    color:#fff700;
    text-shadow:0 0 10px #00f0ff;
}

.subtitle{
    font-size:12px;
    opacity:0.8;
}

/* =========================
   📦 CONTENEDOR
========================= */

.container{
    width:92%;
    max-width:520px;
    margin:auto;
}

/* =========================
   🧬 ELEMENTOS PEQUEÑOS CONTROLADOS
========================= */

.card{
    margin:12px 0;
    padding:10px;
    border-radius:12px;
    background:rgba(0,0,0,0.55);
    border:1px solid rgba(0,255,255,0.25);
}

/* 🔥 GIF YA NO GIGANTE */
.card img{
    width:100%;
    max-height:180px;
    object-fit:contain;
    border-radius:10px;
}

/* =========================
   🎧 AUDIO
========================= */

.controls{
    margin-top:10px;
}

button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:6px 10px;
    border-radius:6px;
    margin:3px;
}

/* =========================
   ⚖️ FOOTER SIMPLE
========================= */

.footer{
    font-size:10px;
    color:#777;
    margin:30px 10px 15px;
    border-top:1px solid rgba(0,255,255,0.15);
    padding-top:8px;
}

</style>
</head>

<body>

<!-- 🌌 EMBED -->
<iframe class="sketchfab-bg"
src="https://sketchfab.com/models/fe6092358a334504b12d594edc713465/embed?autostart=1&transparent=1&ui_controls=0">
</iframe>

<div class="overlay"></div>

<!-- HEADER -->
<h1>⚡ Quantum Audio Lab X ⚡</h1>
<div class="subtitle">NEURAL RESONANCE SYSTEM</div>

<div class="container">

    <!-- 🧬 GIF (AHORA CONTROLADO) -->
    <div class="card">
        <img src="NeuroLuis.gif" alt="gif">
    </div>

    <!-- 🖼 + 🎧 AUDIO UNIDO -->
    <div class="card">

        <img src="Piel-De-Grafito.PNG">

        <audio id="audio">
            <source src="piel-de-grafeno-audio.mp3">
        </audio>

        <div class="controls">
            <button onclick="play()">▶</button>
            <button onclick="pause()">⏸</button>
          
        </div>

    </div>

</div>

<a href="index.html" style="color:#00ffcc; display:inline-block; margin:15px;">
⬅ Volver
</a>

<!-- ⚖️ LEGAL LIMPIO -->
<div class="footer">
© 2026 Luis Duque – Piel de Grafito. Todos los derechos reservados.
</div>

<script>

const audio = document.getElementById("audio");

function play(){ audio.play(); }
function pause(){ audio.pause(); }
function stop(){ audio.pause(); audio.currentTime = 0; }

</script>

</body>
</html>
