<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Audio Lab – Luis Duque</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    background:black;
    color:#00ffcc;
    font-family:Arial;
    text-align:center;
    margin:0;
}

h1{
    margin-top:30px;
    text-shadow:0 0 10px #00ffff, 0 0 20px #ff00ff;
}

.container{
    margin-top:40px;
}

.audio-box{
    border:2px solid #00ffcc;
    padding:20px;
    border-radius:12px;
    display:inline-block;
    box-shadow:0 0 25px #00ffff;
    background:rgba(0,0,0,0.6);
}

img{
    width:260px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 0 15px #00ffff;
}

audio{
    margin-top:10px;
    width:100%;
}
</style>

</head>

<body>

<h1>🎧 Audio Lab – Luis Duque</h1>
<p>Exploración sonora experimental</p>

<div class="container">

    <div class="audio-box">

        <!-- IMAGEN O GIF -->
        <img src="NeuroLuis.gif">

        <h2>Piel de Grafeno</h2>

        <!-- AUDIO -->
        <audio controls>
            <source src="piel-de-grafeno-audio.mp3" type="audio/mpeg">
        </audio>

    </div>

</div>

</body>
</html>
