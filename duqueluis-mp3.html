<script>

const audio = document.getElementById("audio");

let ctx, analyser, source, data;

function init(){
    if(ctx) return;

    ctx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = ctx.createAnalyser();

    source = ctx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize = 128;
    data = new Uint8Array(analyser.frequencyBinCount);

    render();
}

function play(src){
    init();
    audio.src = src;
    audio.play();
}

function pause(){
    audio.pause();
}

function render(){
    requestAnimationFrame(render);

    if(!analyser) return;

    analyser.getByteFrequencyData(data);

    const c = document.getElementById("vumeter").getContext("2d");

    const canvas = document.getElementById("vumeter");
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    c.clearRect(0,0,canvas.width,canvas.height);

    let w = canvas.width / data.length;

    for(let i=0;i<data.length;i++){
        let h = data[i];
        c.fillStyle = `rgb(${h*2},${255-h},${120+h/2})`;
        c.fillRect(i*w, canvas.height - h/2, w-1, h/2);
    }
}

render();

</script>
