</a>

<script>

const audio=document.getElementById("audio");

let currentTrack=null;
let lastTime=0;

/* AUDIO FIX */
const ctx=new (window.AudioContext||window.webkitAudioContext)();
const analyser=ctx.createAnalyser();
const source=ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);

document.addEventListener("click",()=>{
if(ctx.state==="suspended")ctx.resume();
},{once:true});

/* TRACKS IZQUIERDA */
const tracks=[
"soledad-folk.mp3",
"pixel-y-piel.mp3",
"latidos-de-la-maquina.mp3",
"este-loco-mundo-dual.mp3",
"espectro-sintetico.mp3",
"piel-de-grafeno-audio.mp3",
"Cables-De-Plata.mp3"
];

/* TRACKS DERECHA */
const cumbiaTracks=[
"boulevards.mp3",
"cumbia-de-minuit.mp3",
"dernier-bus-pour-sabanas.mp3",
"entre-deux-mondes.mp3",
"entre-tes-ombres.mp3",
"minuit-sur-la-piste.mp3",
"reste-avec-moi.mp3",
"rues-hier.mp3",
"sous-le-ciel-de-buenos-aires.mp3",
"stade-de-nos-reves.mp3"
];

function play(file){
if(currentTrack!==file){
audio.src=file;
currentTrack=file;
lastTime=0;
}
audio.currentTime=lastTime;
audio.play();
}

function pause(){
audio.pause();
lastTime=audio.currentTime;
}

function time(s){
if(!s||isNaN(s))return"0:00";
let m=Math.floor(s/60);
let sec=Math.floor(s%60);
return m+":"+(sec<10?"0"+sec:sec);
}

function render(){

const left=document.getElementById("tracks");
const right=document.getElementById("cumbiaTracks");

left.innerHTML="";
right.innerHTML="";

let d=audio.duration||0;

/* izquierda */
tracks.forEach(f=>{
let active=currentTrack===f;
let p=active?(audio.currentTime/d)*100:0;

left.innerHTML+=`
<div class="track ${active?"active":""}">
<div class="track-top">
<strong>${f}</strong>
<div>
<button onclick="play('${f}')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>
<div class="time">${active?time(audio.currentTime)+" / "+time(d):"--:--"}</div>
<div class="bar"><div class="fill" style="width:${p}%"></div></div>
</div>`;
});

/* derecha */
cumbiaTracks.forEach(f=>{
let active=currentTrack===f;
let p=active?(audio.currentTime/d)*100:0;

right.innerHTML+=`
<div class="track ${active?"active":""}">
<div class="track-top">
<strong>${f}</strong>
<div>
<button onclick="play('${f}')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>
<div class="time">${active?time(audio.currentTime)+" / "+time(d):"--:--"}</div>
<div class="bar"><div class="fill" style="width:${p}%"></div></div>
</div>`;
});

}

setInterval(render,400);

/* VU */
const data=new Uint8Array(analyser.frequencyBinCount);

function draw(){
requestAnimationFrame(draw);
analyser.getByteFrequencyData(data);

const c=vu.getContext("2d");

vu.width=vu.offsetWidth;
vu.height=vu.offsetHeight;

c.clearRect(0,0,vu.width,vu.height);

let w=vu.width/data.length;

for(let i=0;i<data.length;i++){
let h=data[i];
c.fillStyle=`rgb(${h*2},${255-h},255)`;
c.fillRect(i*w,vu.height-h/2,w-1,h/2);
}
}
draw();

</script>
