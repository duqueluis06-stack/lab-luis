<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quantum Audio Lab</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================
   🌌 BASE
========================= */

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:black;
    color:#00ffcc;
    text-align:center;
    overflow-x:hidden;
    padding-bottom:100px;
}

/* =========================
   🎥 EMBED MEJORADO
========================= */

.sketchfab-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:0;
    z-index:0;

    filter:brightness(0.8) blur(1px); /* 🔥 disimula imagen fea */
}

@media (max-width:768px){
    .sketchfab-bg{
        opacity:0.5;
    }
}

/* =========================
   🌫 OVERLAY
========================= */

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.25);
    z-index:1;
    pointer-events:none;
}

/* =========================
   ⚡ TITULO
========================= */

h1{
    margin-top:18px;
    font-size:26px;
    color:#fff700;
    text-shadow:
        0 0 5px #00f0ff,
        0 0 15px #00f0ff,
        0 0 25px #00f0ff;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 5px #00f0ff;}
    to{ text-shadow:0 0 25px #00f0ff;}
}

.subtitle{
    font-size:12px;
    opacity:0.85;
}

/* =========================
   📦 CONTENIDO
========================= */

.container, h1, .subtitle, .footer, .volver{
    position:relative;
    z-index:2;
}

.container{
    width:92%;
    max-width:520px;
    margin:auto;
}

/* =========================
   🧬 CARDS
========================= */

.card{
    margin:12px 0;
    padding:10px;
    border-radius:12px;
    background:rgba(0,0,0,0.45);
    border:1px solid rgba(0,255,255,0.25);
    backdrop-filter:blur(4px);
}

.card img{
    width:100%;
    max-height:240px;
    object-fit:contain;
    border-radius:10px;
}

/* =========================
   🎧 AUDIO
========================= */

.controls{
    margin-top:10px;
}

button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:6px 10px;
    border-radius:6px;
    margin:3px;
}

/* =========================
   🌈 VUMETER RGB
========================= */

canvas{
    width:100%;
    height:70px;
    margin-top:10px;
    background:rgba(0,0,0,0.4);
    border-radius:6px;
}

/* =========================
   🔙 BOTON VOLVER
========================= */

.volver{
    display:inline-block;
    margin:20px;
    padding:10px 18px;
    border:1px solid #00ffcc;
    border-radius:8px;
    color:#00ffcc;
    text-decoration:none;
    box-shadow:0 0 10px #00ffcc;
    transition:0.3s;
}

.volver:hover{
    background:#00ffcc;
    color:black;
    box-shadow:0 0 20px #00ffcc;
}

/* =========================
   ⚖️ FOOTER
========================= */

.footer{
    font-size:11px;
    color:#ccc;
    margin:40px 10px 20px;
    padding:12px;
    background:rgba(0,0,0,0.6);
    border-top:1px solid rgba(0,255,255,0.3);
    position:relative;
    z-index:3;
}

</style>
</head>

<body>

<!-- 🎥 EMBED -->
<iframe class="sketchfab-bg"
src="https://sketchfab.com/models/fe6092358a334504b12d594edc713465/embed?autostart=1&ui_controls=0&ui_infos=0&ui_hint=0"
allow="autoplay; fullscreen; xr-spatial-tracking">
</iframe>

<div class="overlay"></div>

<h1>⚡ QUANTUM AUDIO LAB ⚡</h1>
<div class="subtitle">Neural Sonic Interface</div>

<div class="container">

    <div class="card">
        <img src="NeuroLuis.gif">
    </div>

    <div class="card">

        <img src="Piel-De-Grafito.PNG">

        <audio id="audio">
            <source src="piel-de-grafeno-audio.mp3">
        </audio>

        <div class="controls">
            <button onclick="play()">▶</button>
            <button onclick="pause()">⏸</button>
        </div>

        <canvas id="vumeter"></canvas>

    </div>

</div>

<a href="index.html" class="volver">⬅ VOLVER</a>

<div class="footer">
© 2026 Luis Duque – Piel de Grafito. Todos los derechos reservados.
</div>

<script>

const audio = document.getElementById("audio");

function play(){
    audio.play();
    initAudio();
}

function pause(){
    audio.pause();
}

/* =========================
   🌈 VUMETER RGB REAL
========================= */

let ctx, analyser, source, dataArray;

function initAudio(){

    if(ctx) return;

    ctx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = ctx.createAnalyser();

    source = ctx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize = 128;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    draw();
}

function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    const canvas = document.getElementById("vumeter");
    const c = canvas.getContext("2d");

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    c.clearRect(0,0,canvas.width,canvas.height);

    let barWidth = canvas.width / dataArray.length;

    for(let i=0;i<dataArray.length;i++){

        let h = dataArray[i];

        /* 🌈 COLOR RGB DINÁMICO */
        let r = h * 2;
        let g = 255 - h;
        let b = 150 + (h / 2);

        c.fillStyle = "rgb(" + r + "," + g + "," + b + ")";
        c.fillRect(i * barWidth, canvas.height - h/2, barWidth - 1, h/2);
    }
}

</script>

</body>
</html>
