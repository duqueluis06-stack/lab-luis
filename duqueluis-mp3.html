<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Audio Lab</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050505;
color:#00ffcc;
}

/* layout */
.layout{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.panel{
flex:1;
min-width:280px;
background:#000;
padding:10px;
border-radius:10px;
border:1px solid #00ffcc33;
}

/* imágenes */
.album-img{
width:100%;
max-height:180px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

/* centro */
.center{
text-align:center;
}

.center img{
width:120px;
}

/* tracks */
.track{
padding:8px;
margin:6px 0;
border-radius:8px;
background:#001;
}

button{
background:black;
color:#00ffcc;
border:1px solid #00ffcc;
border-radius:5px;
padding:4px 8px;
}

.time{
font-size:11px;
}

.bar{
height:4px;
background:#111;
margin-top:4px;
}

.fill{
height:100%;
background:#00ffcc;
width:0%;
}

/* botones */
.bottom{
text-align:center;
margin-top:20px;
}

.neon{
display:inline-block;
padding:10px 20px;
margin:10px;
border:1px solid #00ffcc;
border-radius:20px;
color:#00ffcc;
text-decoration:none;
box-shadow:0 0 10px #00ffcc;
}

.patreon{
position:fixed;
bottom:10px;
right:10px;
background:linear-gradient(90deg,#00ffcc,#ff00ff);
color:black;
padding:10px;
border-radius:10px;
text-decoration:none;
}

/* móvil */
@media(max-width:800px){
.layout{
flex-direction:column;
}
.album-img{
max-height:140px;
}
}
</style>
</head>

<body>

<div class="layout">

<!-- IZQUIERDA -->
<div class="panel">
<img src="disco-grafito.PNG" class="album-img">
<div id="tracks"></div>
</div>

<!-- CENTRO -->
<div class="panel center">
<img src="NeuroLuis.gif">
<canvas id="vu"></canvas>
</div>

<!-- DERECHA -->
<div class="panel">
<img src="cumbia-francaise.jpg" class="album-img">
<div id="cumbia"></div>
</div>

</div>

<div class="bottom">
<a href="index.html" class="neon">🏠 INICIO</a>
<a href="music.html" class="neon">🎧 MÁS MÚSICA</a>
</div>

<a class="patreon" href="https://www.patreon.com/posts/155356854">
💿 Descargar en Patreon
</a>

<audio id="audio"></audio>

<script>

const audio = document.getElementById("audio");
let current = null;
let lastTime = 0;

/* FIX audio móvil */
document.addEventListener("click", ()=>{
audio.play().catch(()=>{});
},{once:true});

/* álbum 1 */
const tracks=[
{file:"soledad-folk.mp3",name:"🌿 Soledad"},
{file:"pixel-y-piel.mp3",name:"🧬 Pixel"},
{file:"latidos-de-la-maquina.mp3",name:"⚙️ Máquina"},
{file:"este-loco-mundo-dual.mp3",name:"🌐 Dual"},
{file:"espectro-sintetico.mp3",name:"🧠 Espectro"},
{file:"piel-de-grafeno-audio.mp3",name:"🧊 Grafeno"},
{file:"Cables-De-Plata.mp3",name:"⚡ Cables"}
];

/* álbum 2 */
const cumbia=[
{file:"boulevards.mp3",name:"🌆 Boulevards"},
{file:"cumbia-de-minuit.mp3",name:"🌙 Minuit"},
{file:"dernier-bus-pour-sabanas.mp3",name:"🚌 Bus"},
{file:"entre-deux-mondes.mp3",name:"🌀 Mondes"},
{file:"entre-tes-ombres.mp3",name:"🌘 Ombres"},
{file:"minuit-sur-la-piste.mp3",name:"💃 Piste"},
{file:"reste-avec-moi.mp3",name:"❤️ Moi"},
{file:"rues-hier.mp3",name:"🏙️ Rues"},
{file:"sous-le-ciel-de-buenos-aires.mp3",name:"🌎 Aires"},
{file:"stade-de-nos-reves.mp3",name:"🏟️ Rêves"}
];

function play(file){
if(current!==file){
audio.src=file;
current=file;
lastTime=0;
}
audio.currentTime=lastTime;
audio.play();
}

function pause(){
audio.pause();
lastTime=audio.currentTime;
}

function time(s){
if(!s)return"0:00";
let m=Math.floor(s/60);
let sec=Math.floor(s%60);
return m+":"+(sec<10?"0"+sec:sec);
}

function render(){
let d=audio.duration||0;

tracksDiv.innerHTML="";
cumbiaDiv.innerHTML="";

tracks.forEach(t=>{
let active=current===t.file;
let p=active?(audio.currentTime/d)*100:0;

tracksDiv.innerHTML+=`
<div class="track">
${t.name}
<button onclick="play('${t.file}')">▶</button>
<button onclick="pause()">⏸</button>
<div class="time">${active?time(audio.currentTime)+" / "+time(d):"--"}</div>
<div class="bar"><div class="fill" style="width:${p}%"></div></div>
</div>`;
});

cumbia.forEach(t=>{
let active=current===t.file;
let p=active?(audio.currentTime/d)*100:0;

cumbiaDiv.innerHTML+=`
<div class="track">
${t.name}
<button onclick="play('${t.file}')">▶</button>
<button onclick="pause()">⏸</button>
<div class="time">${active?time(audio.currentTime)+" / "+time(d):"--"}</div>
<div class="bar"><div class="fill" style="width:${p}%"></div></div>
</div>`;
});
}

setInterval(render,500);

/* VU */
let ctx=new AudioContext();
let analyser=ctx.createAnalyser();
let src=ctx.createMediaElementSource(audio);
src.connect(analyser);
analyser.connect(ctx.destination);

let data=new Uint8Array(analyser.frequencyBinCount);

function draw(){
requestAnimationFrame(draw);
analyser.getByteFrequencyData(data);
let c=vu.getContext("2d");

vu.width=vu.offsetWidth;
vu.height=vu.offsetHeight;

c.clearRect(0,0,vu.width,vu.height);

let w=vu.width/data.length;

for(let i=0;i<data.length;i++){
let h=data[i];
c.fillRect(i*w,vu.height-h/2,w-1,h/2);
}
}
draw();

</script>

</body>
</html>
