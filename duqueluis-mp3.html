<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quantum Audio Lab — Luis Duque</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron', Arial;
background:#050505;
color:#00ffcc;
overflow-x:hidden;
}

.sketchfab-bg{
position:fixed;
inset:0;
width:100%;
height:100%;
border:0;
z-index:0;
opacity:0.85;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.25);
z-index:1;
}

h1{
position:relative;
z-index:2;
text-align:center;
margin:12px;
font-size:28px;
color:#00f0ff;
text-shadow:0 0 12px #00f0ff;
}

.layout{
position:relative;
z-index:2;
display:flex;
gap:14px;
width:95%;
margin:auto;
}

.panel{
flex:1;
background:rgba(10,10,10,0.7);
border:1px solid rgba(0,255,255,0.35);
border-radius:14px;
padding:12px;
backdrop-filter:blur(6px);
}

.center{
width:220px;
text-align:center;
}

.album-img{
width:100%;
border-radius:12px;
margin-bottom:10px;
}

.center img{
width:130px;
}

.track{
margin:8px 0;
padding:10px;
border-radius:10px;
background:rgba(0,255,255,0.08);
}

.track.active{
box-shadow:0 0 14px #00ffcc;
border:1px solid #00ffcc;
}

.track-top{
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:black;
border:1px solid #00ffcc;
color:#00ffcc;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
}

.time{
font-size:11px;
margin-top:4px;
opacity:0.8;
}

.bar{
height:4px;
background:#111;
border-radius:4px;
margin-top:6px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ffcc,#ff00ff);
}

canvas{
width:100%;
height:80px;
background:rgba(0,0,0,0.6);
border-radius:10px;
margin-top:10px;
}

.exit{
position:fixed;
top:15px;
left:15px;
padding:10px;
border:1px solid #00ffcc;
color:#00ffcc;
text-decoration:none;
border-radius:10px;
z-index:10;
}

.patreon{
position:fixed;
bottom:15px;
right:15px;
padding:12px;
background:linear-gradient(90deg,#00ffcc,#ff00ff);
color:black;
border-radius:12px;
text-decoration:none;
font-weight:bold;
}

.more{
position:fixed;
bottom:85px;
left:50%;
transform:translateX(-50%);
padding:10px 14px;
border:1px solid #ff00ff;
color:#00ffcc;
background:rgba(0,0,0,0.6);
text-decoration:none;
border-radius:20px;
}
</style>
</head>

<body>

<iframe class="sketchfab-bg"
src="https://sketchfab.com/models/fe6092358a334504b12d594edc713465/embed?autostart=1&ui_controls=0"
allow="autoplay; fullscreen"></iframe>

<div class="overlay"></div>

<h1>⚡ QUANTUM AUDIO LAB ⚡</h1>

<a class="exit" href="index.html">INICIO</a>

<div class="layout">

<div class="panel">
<img src="disco-grafito.PNG" class="album-img">
<audio id="audio"></audio>
<div id="left"></div>
</div>

<div class="panel center">
<img src="NeuroLuis.gif">
<canvas id="vu"></canvas>
</div>

<div class="panel">
<img src="cumbia-frances.jpg" class="album-img">
<div id="right"></div>
</div>

</div>

<a class="more" href="music.html">🎧 MÁS MÚSICA</a>
<a class="patreon" href="https://www.patreon.com/posts/155356854">💿 PATREON</a>

<script>

const audio=document.getElementById("audio");

let current=null;
let lastTime=0;

/* AUDIO */
const ctx=new (window.AudioContext||window.webkitAudioContext)();
const analyser=ctx.createAnalyser();
const source=ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);

document.addEventListener("click",()=>ctx.resume(),{once:true});

/* DATA REAL */
const leftTracks=[
{file:"soledad-folk.mp3", name:"🌿 Soledad Folk"},
{file:"pixel-y-piel.mp3", name:"🧬 Pixel et Peau"},
{file:"latidos-de-la-maquina.mp3", name:"⚙️ Machine Beats"},
{file:"este-loco-mundo-dual.mp3", name:"🌐 Monde Dual"},
{file:"espectro-sintetico.mp3", name:"🧠 Spectre Synthétique"},
{file:"piel-de-grafeno-audio.mp3", name:"🧊 Graphène Skin"},
{file:"Cables-De-Plata.mp3", name:"⚡ Câbles d’Argent"}
];

const rightTracks=[
{file:"boulevards.mp3", name:"🌆 Boulevards"},
{file:"cumbia-de-minuit.mp3", name:"🌙 Cumbia de Minuit"},
{file:"dernier-bus-pour-sabanas.mp3", name:"🚌 Dernier Bus pour Sabanas"},
{file:"entre-deux-mondes.mp3", name:"🌀 Entre Deux Mondes"},
{file:"entre-tes-ombres.mp3", name:"🌘 Entre Tes Ombres"},
{file:"minuit-sur-la-piste.mp3", name:"💃 Minuit sur la Piste"},
{file:"reste-avec-moi.mp3", name:"❤️ Reste avec Moi"},
{file:"rues-hier.mp3", name:"🏙️ Rues d’hier"},
{file:"sous-le-ciel-de-buenos-aires.mp3", name:"🌎 Sous le Ciel de Buenos Aires"},
{file:"stade-de-nos-reves.mp3", name:"🏟️ Stade de nos Rêves"}
];

function play(f){
if(current!==f){
audio.src=f;
current=f;
lastTime=0;
}
audio.currentTime=lastTime;
audio.play();
}

function pause(){
audio.pause();
lastTime=audio.currentTime;
}

function render(){

const l=document.getElementById("left");
const r=document.getElementById("right");

l.innerHTML="";
r.innerHTML="";

let d=audio.duration||0;

leftTracks.forEach(t=>{
let a=current===t.file;
let p=a?(audio.currentTime/d)*100:0;

l.innerHTML+=`
<div class="track ${a?"active":""}">
<div class="track-top">
<strong>${t.name}</strong>
<div>
<button onclick="play('${t.file}')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>
<div class="time">${a?Math.floor(audio.currentTime):"--"} / ${Math.floor(d)||0}</div>
<div class="bar"><div class="fill" style="width:${p}%"></div></div>
</div>`;
});

rightTracks.forEach(t=>{
let a=current===t.file;
let p=a?(audio.currentTime/d)*100:0;

r.innerHTML+=`
<div class="track ${a?"active":""}">
<div class="track-top">
<strong>${t.name}</strong>
<div>
<button onclick="play('${t.file}')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>
<div class="time">${a?Math.floor(audio.currentTime):"--"} / ${Math.floor(d)||0}</div>
<div class="bar"><div class="fill" style="width:${p}%"></div></div>
</div>`;
});
}

setInterval(render,400);

/* VU */
const data=new Uint8Array(analyser.frequencyBinCount);

function draw(){
requestAnimationFrame(draw);
analyser.getByteFrequencyData(data);

const c=vu.getContext("2d");
vu.width=vu.offsetWidth;
vu.height=vu.offsetHeight;

c.clearRect(0,0,vu.width,vu.height);

let w=vu.width/data.length;

for(let i=0;i<data.length;i++){
let h=data[i];
c.fillStyle=`rgb(${h*2},${255-h},255)`;
c.fillRect(i*w,vu.height-h/2,w-1,h/2);
}
}
draw();

</script>

</body>
</html>
