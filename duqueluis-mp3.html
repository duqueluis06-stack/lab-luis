<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quantum Audio Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:#00ffcc;
overflow-x:hidden;
}

/* SKETCHFAB BACKGROUND OPTIMIZADO */
.sketchfab-bg{
position:fixed;
inset:0;
width:100%;
height:100%;
border:0;
z-index:0;
opacity:0.55;
pointer-events:none;
}

/* DARK OVERLAY */
.overlay{
position:fixed;
inset:0;
background:radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.95));
z-index:1;
}

/* HEADER */
h1{
position:relative;
z-index:2;
text-align:center;
color:#00f0ff;
text-shadow:0 0 15px #00f0ff;
margin:12px;
}

/* LAYOUT */
.layout{
position:relative;
z-index:2;
display:flex;
gap:12px;
width:92%;
max-width:1100px;
margin:auto;
align-items:flex-start;
}

/* LEFT TRACK PANEL */
.panel{
flex:1;
background:rgba(0,0,0,0.45);
border:1px solid rgba(0,255,255,0.3);
border-radius:12px;
padding:10px;
backdrop-filter:blur(6px);
}

/* RIGHT GIF */
.side{
width:260px;
background:rgba(0,0,0,0.35);
border:1px solid rgba(0,255,255,0.2);
border-radius:12px;
padding:8px;
}

/* GIF */
.side img{
width:100%;
border-radius:10px;
}

/* TRACK */
.track{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
margin:8px 0;
border-radius:10px;
background:linear-gradient(90deg, rgba(0,255,255,0.08), rgba(255,0,255,0.06));
border:1px solid rgba(0,255,255,0.2);
}

/* BUTTONS */
button{
background:black;
border:1px solid #00ffcc;
color:#00ffcc;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

/* PATREON FIXED */
.patreon{
position:fixed;
bottom:15px;
right:15px;
padding:12px 14px;
border-radius:12px;
background:black;
border:1px solid #00ffcc;
box-shadow:0 0 20px #00ffcc;
z-index:10;
}

/* EXIT */
.exit{
position:fixed;
bottom:15px;
left:15px;
z-index:10;
padding:10px;
border:1px solid red;
color:red;
text-decoration:none;
background:black;
border-radius:10px;
}

/* VU METER */
canvas{
width:100%;
height:90px;
margin-top:10px;
background:rgba(0,0,0,0.5);
border-radius:8px;
}

</style>
</head>

<body>

<iframe class="sketchfab-bg"
src="https://sketchfab.com/models/fe6092358a334504b12d594edc713465/embed?autostart=1&ui_controls=0">
</iframe>

<div class="overlay"></div>

<h1>⚡ QUANTUM AUDIO LAB</h1>

<div class="layout">

<!-- LEFT -->
<div class="panel">

<audio id="audio"></audio>

<div class="track">
<span>Track 01</span>
<button onclick="play('soledad-folk.mp3')">PLAY</button>
</div>

<div class="track">
<span>Track 02</span>
<button onclick="play('pixel-y-piel.mp3')">PLAY</button>
</div>

<div class="track">
<span>Track 03</span>
<button onclick="play('latidos-de-la-maquina.mp3')">PLAY</button>
</div>

<div class="track">
<span>Track 04</span>
<button onclick="play('este-loco-mundo-dual.mp3')">PLAY</button>
</div>

<div class="track">
<span>Track 05</span>
<button onclick="play('espectro-sintetico.mp3')">PLAY</button>
</div>

<div class="track">
<span>Track 06</span>
<button onclick="play('piel-de-grafeno-audio.mp3')">PLAY</button>
</div>

<div class="track">
<span>Track 07</span>
<button onclick="play('cables-de-plata.mp3')">PLAY</button>
</div>

<canvas id="vu"></canvas>

</div>

<!-- RIGHT -->
<div class="side">
<img src="NeuroLuis.gif">
</div>

</div>

PATREON DOWNLOADS
</a>

<a class="exit" href="index.html">EXIT</a>

<script>

const audio = document.getElementById("audio");

let ctx, analyser, src, data;

function unlock(){
if(ctx) return;
ctx = new (window.AudioContext || window.webkitAudioContext)();
analyser = ctx.createAnalyser();
src = ctx.createMediaElementSource(audio);
src.connect(analyser);
analyser.connect(ctx.destination);
analyser.fftSize = 128;
data = new Uint8Array(analyser.frequencyBinCount);
draw();
}

function play(file){
unlock();
audio.src = file;
audio.play();
}

function draw(){
requestAnimationFrame(draw);
if(!analyser) return;

analyser.getByteFrequencyData(data);

const c = document.getElementById("vu").getContext("2d");
const canvas = document.getElementById("vu");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

c.clearRect(0,0,canvas.width,canvas.height);

let w = canvas.width / data.length;

for(let i=0;i<data.length;i++){
let h = data[i];
c.fillStyle = `rgb(${h*2},${255-h},255)`;
c.fillRect(i*w, canvas.height - h/2, w-1, h/2);
}
}

</script>

</body>
</html>
