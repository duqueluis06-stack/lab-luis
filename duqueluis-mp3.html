<script>

const audio = document.getElementById("audio");

const tracks = [
{file:"soledad-folk.mp3", name:"Soledad Folk", desc:"folk digital / 4:12"},
{file:"pixel-y-piel.mp3", name:"Pixel y Piel", desc:"glitch humano / 3:58"},
{file:"latidos-de-la-maquina.mp3", name:"Latidos de la Máquina", desc:"biomecánico / 5:10"},
{file:"este-loco-mundo-dual.mp3", name:"Este Loco Mundo Dual", desc:"realidad híbrida / 4:44"},
{file:"espectro-sintetico.mp3", name:"Espectro Sintético", desc:"procesamiento sensorial / 5:01"},
{file:"piel-de-grafeno-audio.mp3", name:"Piel de Grafito", desc:"estructura acústica / 3:33"},
{file:"Cables-De-Plata.mp3", name:"Cables de Plata", desc:"transmisión pura / 4:20"}
];

let ctx, analyser, source, data;
let currentTrack = null;
function init(){
if(ctx) return;
ctx = new (window.AudioContext || window.webkitAudioContext)();
analyser = ctx.createAnalyser();
source = ctx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(ctx.destination);

analyser.fftSize = 128;
data = new Uint8Array(analyser.frequencyBinCount);
draw();
}

function play(file){
init();
audio.src = file;
audio.play();
currentTrack = file;
render();
}

function pause(){
audio.pause();
}
audio.onended = () => {
currentTrack = null;
render();
};

function draw(){
requestAnimationFrame(draw);
if(!analyser) return;

analyser.getByteFrequencyData(data);

const canvas = document.getElementById("vu");
const c = canvas.getContext("2d");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

c.clearRect(0,0,canvas.width,canvas.height);

let w = canvas.width / data.length;

for(let i=0;i<data.length;i++){
let h = data[i];
c.fillStyle = `rgb(${h*2},${255-h},255)`;
c.fillRect(i*w, canvas.height-h/2, w-1, h/2);
}
}

function render(){
const container = document.getElementById("tracks");
container.innerHTML = "";

tracks.forEach(t=>{
container.innerHTML += `
<div class="track ${t.file === currentTrack ? "active" : ""}">
<div class="track-top">
<strong>${t.name}</strong>
<div>
<button onclick="play('${t.file}')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>
<div class="desc">🎧 ${t.desc}</div>
</div>`;
});
}

render();
draw();

</script>
