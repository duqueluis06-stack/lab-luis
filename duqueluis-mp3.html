<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:#00ffcc;
    text-align:center;
    overflow-x:hidden;
}

/* BACKGROUND */
.sketchfab-bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:0;
    z-index:0;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.25);
    z-index:1;
}

/* GIF */
.gif{
    position:fixed;
    top:15px;
    right:15px;
    width:110px;
    z-index:3;
    border-radius:10px;
    box-shadow:0 0 15px #00ffcc;
}

/* CONTAINER */
.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:650px;
    margin:auto;
    padding-top:10px;
}

/* TRACKS */
.track{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:8px auto;
    padding:10px;
    width:90%;
    border-radius:10px;
    background:rgba(0,0,0,0.4);
    border:1px solid rgba(0,255,255,0.25);
    box-shadow:0 0 10px rgba(0,255,255,0.1);
}

.name{
    font-size:13px;
    text-align:left;
}

/* BOTONES */
button{
    margin-left:5px;
    padding:6px 10px;
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    border-radius:6px;
    cursor:pointer;
}

/* VU */
canvas{
    width:90%;
    height:70px;
    margin:15px auto;
    display:block;
    background:rgba(0,0,0,0.4);
    border-radius:8px;
}

</style>
</head>

<body>

<!-- SKETCHFAB -->
<iframe class="sketchfab-bg"
src="https://sketchfab.com/models/fe6092358a334504b12d594edc713465/embed?autostart=1&ui_controls=0">
</iframe>

<div class="overlay"></div>

<!-- GIF -->
<img class="gif" src="NeuroLuis.gif">

<div class="container">

<h1>⚡ QUANTUM AUDIO LAB ⚡</h1>

<audio id="audio"></audio>

<!-- TRACKS RESTAURADOS -->
<div class="track">
<span class="name">Soledad Folk</span>
<div>
<button onclick="play('soledadfolk.mp3')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>

<div class="track">
<span class="name">Pixel y Piel</span>
<div>
<button onclick="play('pixel-y-piel.mp3')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>

<div class="track">
<span class="name">Latidos de la Máquina</span>
<div>
<button onclick="play('latidos-de-la-maquina.mp3')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>

<div class="track">
<span class="name">Este Loco Mundo Dual</span>
<div>
<button onclick="play('este-loco-mundo-dual.mp3')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>

<div class="track">
<span class="name">Espectro Sintético</span>
<div>
<button onclick="play('espectro-sintetico.mp3')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>

<canvas id="vumeter"></canvas>

</div>

<script>

const audio = document.getElementById("audio");

let ctx, analyser, source, dataArray;
let ready = false;

function initAudio(){
    if(ready) return;

    ctx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = ctx.createAnalyser();

    source = ctx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize = 128;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    ready = true;
    draw();
}

function play(src){
    if(!ready) initAudio();
    audio.src = src;
    audio.play();
}

function pause(){
    audio.pause();
}

/* VU METER */
function draw(){
    requestAnimationFrame(draw);

    if(!ready) return;

    analyser.getByteFrequencyData(dataArray);

    const canvas = document.getElementById("vumeter");
    const c = canvas.getContext("2d");

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    c.clearRect(0,0,canvas.width,canvas.height);

    let barWidth = canvas.width / dataArray.length;

    for(let i=0;i<dataArray.length;i++){
        let h = dataArray[i];
        c.fillStyle = `rgb(${h*2},${255-h},${150+h/2})`;
        c.fillRect(i*barWidth, canvas.height - h/2, barWidth-1, h/2);
    }
}

draw();

</script>

</body>
</html>
