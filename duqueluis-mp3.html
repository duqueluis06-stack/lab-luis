<canvas id="vumeter"></canvas>

<script>

const audio = document.getElementById("audio");

let ctx, analyser, source, dataArray;
let ready = false;

function init(){
    if(ready) return;

    ctx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = ctx.createAnalyser();

    source = ctx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(ctx.destination);

    analyser.fftSize = 128;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    ready = true;
    draw();
}

function play(src){
    if(!ready) init();
    audio.src = src;
    audio.play();
}

function pause(){
    audio.pause();
}

/* VU */
function draw(){
    requestAnimationFrame(draw);

    if(!ready) return;

    analyser.getByteFrequencyData(dataArray);

    const canvas = document.getElementById("vumeter");
    const c = canvas.getContext("2d");

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    c.clearRect(0,0,canvas.width,canvas.height);

    let barWidth = canvas.width / dataArray.length;

    for(let i=0;i<dataArray.length;i++){
        let h = dataArray[i];
        c.fillStyle = `rgb(${h*2},${255-h},${150+h/2})`;
        c.fillRect(i*barWidth, canvas.height - h/2, barWidth-1, h/2);
    }
}

draw();

</script>
