<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quantum Audio Lab</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================
   🌌 BASE
========================= */

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:black;
    color:#00ffcc;
    text-align:center;
    overflow-x:hidden;
}

/* =========================
   🎥 EMBED 3D
========================= */

.sketchfab-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:0;
    z-index:-1;
}

/* 📱 móvil: no bloquear render */
@media (max-width:768px){
    .sketchfab-bg{
        opacity:0.25;
        filter:blur(0.3px);
    }
}

/* =========================
   🌫 OVERLAY SUAVE
========================= */

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:0;
    pointer-events:none;
}

/* =========================
   🧠 TITULO
========================= */

h1{
    margin-top:18px;
    font-size:24px;
    color:#fff700;
    text-shadow:0 0 10px #00f0ff;
}

.subtitle{
    font-size:12px;
    opacity:0.7;
}

/* =========================
   📦 LAYOUT
========================= */

.container{
    width:92%;
    max-width:520px;
    margin:auto;
}

/* =========================
   🧬 BLOQUES
========================= */

.card{
    margin:12px 0;
    padding:10px;
    border-radius:12px;
    background:rgba(0,0,0,0.55);
    border:1px solid rgba(0,255,255,0.25);
}

/* GIF + IMAGEN CONTROLADOS */
.card img{
    width:100%;
    max-height:180px;
    object-fit:contain;
    border-radius:10px;
}

/* =========================
   🎧 AUDIO CONTROLES
========================= */

.controls{
    margin-top:10px;
}

button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:6px 10px;
    border-radius:6px;
    margin:3px;
}

/* =========================
   ⚖️ FOOTER MINIMAL
========================= */

.footer{
    font-size:10px;
    color:#777;
    margin:25px 10px 15px;
    border-top:1px solid rgba(0,255,255,0.15);
    padding-top:6px;
}

/* =========================
   📱 AJUSTE MÓVIL
========================= */

@media (max-width:768px){
    .card img{
        max-height:150px;
    }
}

</style>
</head>

<body>

<!-- 🎥 EMBED -->
<iframe class="sketchfab-bg"
src="https://sketchfab.com/models/fe6092358a334504b12d594edc713465/embed?autostart=1&ui_controls=0&ui_infos=0&ui_hint=0"
allow="autoplay; fullscreen; xr-spatial-tracking">
</iframe>

<!-- 🌫 overlay -->
<div class="overlay"></div>

<!-- TITULO -->
<h1>⚡ Quantum Audio Lab ⚡</h1>
<div class="subtitle">NEURAL SYSTEM</div>

<!-- CONTENIDO -->
<div class="container">

    <!-- GIF -->
    <div class="card">
        <img src="NeuroLuis.gif" alt="gif">
    </div>

    <!-- IMAGEN + AUDIO -->
    <div class="card">

        <img src="Piel-De-Grafito.PNG">

        <audio id="audio">
            <source src="piel-de-grafeno-audio.mp3">
        </audio>

        <div class="controls">
            <button onclick="play()">▶</button>
            <button onclick="pause()">⏸</button>
        </div>

    </div>

</div>

<!-- VOLVER -->
<a href="index.html" style="color:#00ffcc; display:inline-block; margin:15px;">
⬅ Volver
</a>

<!-- ⚖️ LEGAL-->
<div class="footer">
© 2026 Luis Duque – Piel de Grafito. Todos los derechos reservados.
</div>

<script>

const audio = document.getElementById("audio");

function play(){
    audio.play();
}

function pause(){
    audio.pause();
}

</script>

</body>
</html>
