<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quantum Audio Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:black;
    color:#00ffcc;
    overflow:hidden;
}

/* FONDO */
.sketchfab-bg{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    border:0;
    z-index:0;
    filter:brightness(1.2) contrast(1.2);
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.2);
    z-index:1;
}

/* GIF pequeño flotante */
.gif{
    position:fixed;
    top:10px;
    right:10px;
    width:140px;
    z-index:3;
    border-radius:10px;
    box-shadow:0 0 20px #00ffcc;
}

/* LAYOUT */
.main{
    position:relative;
    z-index:2;
    display:flex;
    height:100vh;
}

.left{
    width:100%;
    padding:20px;
    overflow-y:auto;
}

/* TITULOS */
h1{
    color:#fff700;
    text-shadow:0 0 15px #00f0ff;
}

.subtitle{
    font-size:12px;
    opacity:0.8;
}

/* PATREON NEÓN MULTICOLOR */
.patreon{
    display:inline-block;
    margin:15px 0;
    padding:10px 18px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    color:white;
    animation:neon 3s infinite linear;
    border:2px solid transparent;
}

@keyframes neon{
    0%{box-shadow:0 0 10px cyan;color:cyan;}
    25%{box-shadow:0 0 10px magenta;color:magenta;}
    50%{box-shadow:0 0 10px lime;color:lime;}
    75%{box-shadow:0 0 10px yellow;color:yellow;}
    100%{box-shadow:0 0 10px cyan;color:cyan;}
}

/* TRACKS */
.track{
    margin:12px 0;
    padding:12px;
    border-radius:12px;
    background:rgba(0,0,0,0.45);
    border:1px solid rgba(0,255,255,0.2);
}

.track-title{
    font-size:14px;
}

.track-desc{
    font-size:11px;
    opacity:0.8;
    margin:6px 0;
}

.buttons button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:5px 8px;
    margin-right:5px;
    border-radius:6px;
    cursor:pointer;
}

/* VU */
canvas{
    width:100%;
    height:80px;
    margin-top:10px;
    background:rgba(0,0,0,0.4);
    border-radius:6px;
}
</style>
</head>

<body>

<iframe class="sketchfab-bg"
src="https://sketchfab.com/models/fe6092358a334504b12d594edc713465/embed?autostart=1&ui_controls=0&ui_infos=0&ui_hint=0">
</iframe>

<div class="overlay"></div>

<img class="gif" src="NeuroLuis.gif">

<div class="main">
<div class="left">

<h1>⚡ QUANTUM AUDIO LAB</h1>
<div class="subtitle">Neural Sonic Interface</div>

<a class="patreon" target="_blank"
href="https://www.patreon.com/posts/155296476">
⚡ Descargas exclusivas en Patreon
</a>

<canvas id="vumeter"></canvas>

<!-- TRACKS -->
<div id="tracks"></div>

</div>
</div>

<audio id="audio"></audio>

<script>

const audio = document.getElementById("audio");

const tracks = [
["piel-de-grafeno-audio.mp3","Piel de Grafito","Señal experimental"],
["Cables-De-Plata.mp3","Cables de Plata","Frecuencia metálica"],
["soledadfolk.mp3","Soledad Folk","Folk digital"],
["pixel-y-piel.mp3","Pixel y Piel","Dualidad humana"],
["latidos-de-la-maquina.mp3","Latidos de la Máquina","Híbrido orgánico"],
["este-loco-mundo-dual.mp3","Mundo Dual","Realidad fragmentada"],
["espectro-sintetico.mp3","Espectro Sintético","Conciencia artificial"]
];

const container = document.getElementById("tracks");

tracks.forEach(t=>{
    const div = document.createElement("div");
    div.className="track";
    div.innerHTML=`
        <div class="track-title">${t[1]}</div>
        <div class="track-desc">${t[2]}</div>
        <div class="buttons">
            <button onclick="playTrack('${t[0]}')">▶</button>
            <button onclick="pauseTrack()">⏸</button>
        </div>
    `;
    container.appendChild(div);
});

function playTrack(src){
    audio.src = src;
    audio.play();
}

function pauseTrack(){
    audio.pause();
}

/* VU METER */
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const analyser = ctx.createAnalyser();
const source = ctx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(ctx.destination);

analyser.fftSize = 128;

const dataArray = new Uint8Array(analyser.frequencyBinCount);

function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    const canvas = document.getElementById("vumeter");
    const c = canvas.getContext("2d");

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    c.clearRect(0,0,canvas.width,canvas.height);

    let barWidth = canvas.width / dataArray.length;

    for(let i=0;i<dataArray.length;i++){
        let h = dataArray[i];

        c.fillStyle = `rgb(${h*2},${255-h},${150+h/2})`;
        c.fillRect(i*barWidth, canvas.height - h/2, barWidth-1, h/2);
    }
}

draw();

</script>

</body>
</html>
