<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quantum Audio Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:black;
    color:#00ffcc;
}

/* FONDO */
.sketchfab-bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:0;
    z-index:0;
    filter:brightness(1.2) contrast(1.2);
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.25);
    z-index:1;
}

/* GIF */
.gif{
    position:fixed;
    top:15px;
    right:25px;
    width:110px;
    z-index:3;
    border-radius:10px;
    box-shadow:0 0 15px #00ffcc;
}

/* LAYOUT */
.main{
    position:relative;
    z-index:2;
    display:flex;
    height:100vh;
}

.left{
    width:60%;
    padding:15px;
    overflow-y:auto;
}

/* TITULO */
h1{
    color:#fff700;
    text-shadow:0 0 10px #00f0ff;
    font-size:22px;
}

.subtitle{
    font-size:12px;
    opacity:0.8;
}

/* PATREON NEÓN */
.patreon{
    display:inline-block;
    margin:10px 0;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    animation:neon 3s infinite linear;
    border:1px solid transparent;
    font-size:12px;
}

@keyframes neon{
    0%{color:cyan; box-shadow:0 0 8px cyan;}
    25%{color:magenta; box-shadow:0 0 8px magenta;}
    50%{color:lime; box-shadow:0 0 8px lime;}
    75%{color:yellow; box-shadow:0 0 8px yellow;}
    100%{color:cyan; box-shadow:0 0 8px cyan;}
}

/* TRACKS VERTICALES */
.track{
    margin:8px 0;
    padding:10px;
    border-radius:10px;
    background:rgba(0,0,0,0.4);
    border:1px solid rgba(0,255,255,0.2);
    width:90%;
}

.track-title{
    font-size:13px;
}

.track-desc{
    font-size:10px;
    opacity:0.75;
    margin:4px 0;
}

button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:4px 8px;
    font-size:11px;
    border-radius:6px;
    margin-right:5px;
}

/* VU METER */
canvas{
    width:90%;
    height:70px;
    margin:10px 0;
    background:rgba(0,0,0,0.4);
    border-radius:6px;
}
</style>
</head>

<body>

<iframe class="sketchfab-bg"
src="https://sketchfab.com/models/fe6092358a334504b12d594edc713465/embed?autostart=1&ui_controls=0&ui_infos=0&ui_hint=0">
</iframe>

<div class="overlay"></div>

<img class="gif" src="NeuroLuis.gif">

<div class="main">
<div class="left">

<h1>⚡ QUANTUM AUDIO LAB</h1>
<div class="subtitle">Neural Sonic Interface</div>

<a class="patreon" target="_blank"
href="https://www.patreon.com/posts/155296476">
⚡ Patreon / Descargas exclusivas
</a>

<canvas id="vumeter"></canvas>

<div id="tracks"></div>

</div>
</div>

<audio id="audio"></audio>

<script>

const audio = document.getElementById("audio");

let ctx = new (window.AudioContext || window.webkitAudioContext)();
let analyser = ctx.createAnalyser();
let source = ctx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(ctx.destination);

analyser.fftSize = 128;
let dataArray = new Uint8Array(analyser.frequencyBinCount);

/* TRACKS */
const tracks = [
["piel-de-grafeno-audio.mp3","Piel de Grafito","Señal experimental"],
["Cables-De-Plata.mp3","Cables de Plata","Frecuencia metálica"],
["soledadfolk.mp3","Soledad Folk","Folk digital"],
["pixel-y-piel.mp3","Pixel y Piel","Dualidad humana"],
["latidos-de-la-maquina.mp3","Latidos de la Máquina","Híbrido orgánico"],
["este-loco-mundo-dual.mp3","Mundo Dual","Realidad fragmentada"],
["espectro-sintetico.mp3","Espectro Sintético","Conciencia artificial"]
];

const container = document.getElementById("tracks");

tracks.forEach(t=>{
    let div = document.createElement("div");
    div.className="track";

    div.innerHTML=`
        <div class="track-title">${t[1]}</div>
        <div class="track-desc">${t[2]}</div>
        <button onclick="playTrack('${t[0]}')">▶</button>
        <button onclick="pauseTrack()">⏸</button>
    `;

    container.appendChild(div);
});

function playTrack(src){
    audio.src = src;
    audio.play();
}

function pauseTrack(){
    audio.pause();
}

/* VU RGB */
function draw(){
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    const canvas = document.getElementById("vumeter");
    const c = canvas.getContext("2d");

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    c.clearRect(0,0,canvas.width,canvas.height);

    let barWidth = canvas.width / dataArray.length;

    for(let i=0;i<dataArray.length;i++){
        let h = dataArray[i];

        let r = h*2;
        let g = 255-h;
        let b = 120 + h/2;

        c.fillStyle = `rgb(${r},${g},${b})`;
        c.fillRect(i*barWidth, canvas.height - h/2, barWidth-1, h/2);
    }
}

draw();

</script>

</body>
</html>
