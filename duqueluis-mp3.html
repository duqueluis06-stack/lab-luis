<style>
body{

.layout{

.panel{

.side img{

.track{

background:linear-gradient(90deg,rgba(0,255,255,0.10),rgba(255,0,255,0.06));

.track.active{

<script>

const audio = document.getElementById("audio");

let currentTrack = null;
let lastTime = 0;

/* álbum 1 */
const tracks = [
{file:"soledad-folk.mp3", name:"🌿 Soledad Folk", desc:"folk digital"},
{file:"pixel-y-piel.mp3", name:"🧬 Pixel y Piel", desc:"glitch"},
{file:"latidos-de-la-maquina.mp3", name:"⚙️ Máquina", desc:"biomecánico"},
{file:"este-loco-mundo-dual.mp3", name:"🌐 Mundo Dual", desc:"híbrido"},
{file:"espectro-sintetico.mp3", name:"🧠 Espectro", desc:"sensorial"},
{file:"piel-de-grafeno-audio.mp3", name:"🧊 Grafeno", desc:"estructura"},
{file:"Cables-De-Plata.mp3", name:"⚡ Cables", desc:"transmisión"}
];

/* álbum 2 */
const cumbiaTracks = [
{file:"boulevards.mp3", name:"🌆 Boulevards"},
{file:"cumbia-de-minuit.mp3", name:"🌙 Cumbia de Minuit"},
{file:"dernier-bus-pour-sabanas.mp3", name:"🚌 Dernier Bus"},
{file:"entre-deux-mondes.mp3", name:"🌀 Entre Deux Mondes"},
{file:"entre-tes-ombres.mp3", name:"🌘 Ombres"},
{file:"minuit-sur-la-piste.mp3", name:"💃 Minuit"},
{file:"reste-avec-moi.mp3", name:"❤️ Moi"},
{file:"rues-hier.mp3", name:"🏙️ Rues d’hier"},
{file:"sous-le-ciel-de-buenos-aires.mp3", name:"🌎 Buenos Aires"},
{file:"stade-de-nos-reves.mp3", name:"🏟️ Rêves"}
];

function play(file){
if(currentTrack !== file){
audio.src = file;
currentTrack = file;
lastTime = 0;
}
audio.currentTime = lastTime;
audio.play();
}

function pause(){
audio.pause();
lastTime = audio.currentTime;
}

function formatTime(s){
if(!s || isNaN(s)) return "0:00";
const m = Math.floor(s/60);
const sec = Math.floor(s%60);
return m+":"+(sec<10?"0"+sec:sec);
}

function render(){
const left = document.getElementById("tracks");
const right = document.getElementById("cumbia");

left.innerHTML="";
right.innerHTML="";

const dur = audio.duration || 0;

tracks.forEach(t=>{
const active = currentTrack===t.file;
const prog = active ? (audio.currentTime/dur)*100 : 0;

left.innerHTML+=`
<div class="track ${active?"active":""}">
<div class="track-top">
<strong>${t.name}</strong>
<div>
<button onclick="play('${t.file}')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>
<div class="desc">${t.desc}</div>
<div class="time">${active?formatTime(audio.currentTime)+" / "+formatTime(dur):"--:-- / --:--"}</div>
<div class="bar"><div class="fill" style="width:${prog}%"></div></div>
</div>`;
});

cumbiaTracks.forEach(t=>{
const active = currentTrack===t.file;
const prog = active ? (audio.currentTime/dur)*100 : 0;

right.innerHTML+=`
<div class="track ${active?"active":""}">
<div class="track-top">
<strong>${t.name}</strong>
<div>
<button onclick="play('${t.file}')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>
<div class="time">${active?formatTime(audio.currentTime)+" / "+formatTime(dur):"--:-- / --:--"}</div>
<div class="bar"><div class="fill" style="width:${prog}%"></div></div>
</div>`;
});
}

setInterval(render,500);

/* VU meter */
let ctx = new AudioContext();
let analyser = ctx.createAnalyser();
let source = ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);

let data = new Uint8Array(analyser.frequencyBinCount);

function draw(){
requestAnimationFrame(draw);
analyser.getByteFrequencyData(data);
let canvas = document.getElementById("vu");
let c = canvas.getContext("2d");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

c.clearRect(0,0,canvas.width,canvas.height);

let w = canvas.width/data.length;

for(let i=0;i<data.length;i++){
let h=data[i];
c.fillStyle=`rgb(${h*2},${255-h},255)`;
c.fillRect(i*w,canvas.height-h/2,w-1,h/2);
}
}
draw();

</script>
