<script>

const audio = document.getElementById("audio");

const tracks = [
{file:"soledad-folk.mp3", name:"Soledad Folk", desc:"folk digital / 4:12"},
{file:"pixel-y-piel.mp3", name:"Pixel y Piel", desc:"glitch humano / 3:58"},
{file:"latidos-de-la-maquina.mp3", name:"Latidos de la Máquina", desc:"biomecánico / 5:10"},
{file:"este-loco-mundo-dual.mp3", name:"Este Loco Mundo Dual", desc:"realidad híbrida / 4:44"},
{file:"espectro-sintetico.mp3", name:"Espectro Sintético", desc:"procesamiento sensorial / 5:01"},
{file:"piel-de-grafeno-audio.mp3", name:"Piel de Grafito", desc:"estructura acústica / 3:33"},
{file:"Cables-De-Plata.mp3", name:"Cables de Plata", desc:"transmisión pura / 4:20"}
];

let ctx, analyser, source, data;

let currentTrack = null;
let lastTime = 0;

function init(){
if(ctx) return;

ctx = new (window.AudioContext || window.webkitAudioContext)();
analyser = ctx.createAnalyser();
source = ctx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(ctx.destination);

analyser.fftSize = 256;
data = new Uint8Array(analyser.frequencyBinCount);

draw();
}

/* 🧠 FIX PRINCIPAL: NO RESETEAR AUDIO */
function play(file){
init();

if (currentTrack !== file) {
audio.src = file;
currentTrack = file;
lastTime = 0;
}

audio.currentTime = lastTime;
audio.play();

render();
}

function pause(){
audio.pause();
lastTime = audio.currentTime;
}

function formatTime(s){
if(!s || isNaN(s)) return "0:00";
const m = Math.floor(s/60);
const sec = Math.floor(s%60);
return `${m}:${sec<10?"0"+sec:sec}`;
}

/* 🔊 VU */
function draw(){
requestAnimationFrame(draw);

if(!analyser) return;

analyser.getByteFrequencyData(data);

const canvas = document.getElementById("vu");
const c = canvas.getContext("2d");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

c.clearRect(0,0,canvas.width,canvas.height);

let w = canvas.width / data.length;

for(let i=0;i<data.length;i++){
let h = data[i];
c.fillStyle = `rgb(${h*2},${255-h},255)`;
c.fillRect(i*w, canvas.height-h/2, w-1, h/2);
}
}

/* 🎧 RENDER */
function render(){
const container = document.getElementById("tracks");
container.innerHTML = "";

const safeDuration = isNaN(audio.duration) || !audio.duration ? 0 : audio.duration;

tracks.forEach(t=>{
const active = currentTrack === t.file;

const progress = active && safeDuration
? (audio.currentTime / safeDuration) * 100
: 0;

container.innerHTML += `
<div class="track ${active ? "active" : ""}">
<div class="track-top">
<strong>${t.name}</strong>
<div>
<button onclick="play('${t.file}')">▶</button>
<button onclick="pause()">⏸</button>
</div>
</div>

<div class="desc">🎧 ${t.desc}</div>

<div class="time">
${active
 ? `${formatTime(audio.currentTime)} / ${formatTime(safeDuration)}`
 : "--:-- / --:--"}
</div>

<div class="bar">
<div class="fill" style="width:${progress}%"></div>
</div>
</div>`;
});
}

/* 🔄 sincronización estable */
setInterval(render, 500);
draw();

</script>
