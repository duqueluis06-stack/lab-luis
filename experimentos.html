<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Experimentos - Laboratorio | Lab Luis</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* BLACK HOLE */
.blackhole{
  position:fixed;
  top:10px;
  right:10px;
  z-index:9999;
  padding:10px 14px;
  background:linear-gradient(45deg,#00ffcc,#00aaff);
  color:#000;
  font-weight:bold;
  border-radius:10px;
  text-decoration:none;
}

/* PANEL */
#panel{
  position:fixed;
  top:10px;
  left:10px;
  z-index:9999;
  width:220px;
  padding:10px;
  background:rgba(0,0,0,0.7);
  border:1px solid #00ffcc;
  font-size:12px;
}

#hud{
  position:fixed;
  bottom:10px;
  left:10px;
  z-index:9999;
  font-size:11px;
  background:rgba(0,0,0,0.6);
  padding:6px;
  border:1px solid #00ffcc;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<a class="blackhole" href="index3d.html">🌀 Black Hole 3D</a>

<div id="panel">
⚡ Intensidad <br>
<input id="intensity" type="range" min="10" max="200" value="80"><br><br>

🌊 Velocidad luz <br>
<input id="cval" type="range" min="1" max="10" value="3"><br><br>

<button onclick="emitLight()">💡 Emitir luz</button>
</div>

<div id="hud">LAB ACTIVE ⚡</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* =========================
   STATE
========================= */
let intensity = 80;
let lightSpeed = 3;
let t = 0;

/* UI */
document.getElementById("intensity").oninput = e=>{
  intensity = +e.target.value;
};
document.getElementById("cval").oninput = e=>{
  lightSpeed = +e.target.value;
};

/* =========================
   EARTH + SATELLITE
========================= */
let earthA = 0;
let satA = 0;

/* =========================
   LIGHT SYSTEM
========================= */
let pulses = [];

function emitLight(){
  pulses.push({
    x: earthX,
    y: earthY,
    tx: satX,
    ty: satY,
    p: 0
  });
}

/* =========================
   MOUSE
========================= */
let mouse = {x:innerWidth/2,y:innerHeight/2};

window.addEventListener("mousemove",e=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

/* =========================
   LOOP
========================= */
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2;
  const cy = canvas.height/2;

  /* WAVES */
  for(let y=0;y<canvas.height;y+=10){

    let wave = Math.sin((y+t)*0.01)*intensity;

    let influence = Math.exp(-Math.abs(mouse.y-y)*0.01)*20;

    ctx.strokeStyle="rgba(0,255,204,0.3)";
    ctx.beginPath();

    ctx.moveTo(cx,y);
    ctx.lineTo(cx-200+wave+influence,y);

    ctx.moveTo(cx,y);
    ctx.lineTo(cx+200-wave-influence,y);

    ctx.stroke();
  }

  /* EARTH */
  earthX = cx + Math.cos(earthA)*150;
  earthY = cy + Math.sin(earthA)*80;

  ctx.fillStyle="#00aaff";
  ctx.beginPath();
  ctx.arc(earthX,earthY,14,0,Math.PI*2);
  ctx.fill();

  /* SATELLITE */
  satX = cx + Math.cos(satA)*260;
  satY = cy + Math.sin(satA)*140;

  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.arc(satX,satY,5,0,Math.PI*2);
  ctx.fill();

  /* LASER */
  ctx.strokeStyle="#ff00ff";
  ctx.beginPath();
  ctx.moveTo(earthX,earthY);
  ctx.lineTo(satX,satY);
  ctx.stroke();

  /* LIGHT PULSES */
  for(let p of pulses){

    let dx = p.tx - p.x;
    let dy = p.ty - p.y;

    p.p += lightSpeed / 200;

    p.cx = p.x + dx*p.p;
    p.cy = p.y + dy*p.p;

    ctx.fillStyle="#ff00ff";
    ctx.beginPath();
    ctx.arc(p.cx,p.cy,4,0,Math.PI*2);
    ctx.fill();
  }

  pulses = pulses.filter(p=>p.p<1);

  /* HUD */
  document.getElementById("hud").innerHTML =
  `INT: ${intensity} | LIGHT SPEED: ${lightSpeed} | PULSES: ${pulses.length}`;

  earthA += 0.01;
  satA += 0.015;
  t += 2;

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
