<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Universal Space-Time Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LE6LX7FC2Q"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-LE6LX7FC2Q');
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --neon-green: #39ff14;
            --neon-purple: #bc13fe;
            --neon-main: #00ffcc;
            --neon-red: #ff3131;
            --gold: #ffcc00;
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100%; width: 100%;
        }

        /* --- MOTOR DE FONDO (CINEMATOGRÁFICO) --- */
        #canvas-cosmos {
            position: fixed; top: 0; left: 0;
            z-index: 1;
            filter: contrast(1.2) brightness(1.1);
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            z-index: 2; pointer-events: none;
        }

        /* --- INTERFAZ --- */
        header {
            position: fixed; top: 0; left: 50%;
            transform: translateX(-50%);
            z-index: 90;
            padding: 15px 30px;
            font-size: clamp(14px, 3vw, 22px);
            font-weight: 900;
            text-align: center;
            background: rgba(0,0,0,0.8);
            border-bottom: 2px solid var(--neon-main);
            border-radius: 0 0 15px 15px;
            letter-spacing: 4px;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        img.logo {
            position: fixed; top: 20px; left: 20px;
            width: 80px; height: 80px;
            z-index: 100;
            border: 2px solid var(--neon-main);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-main);
            transition: 0.4s;
            object-fit: cover;
        }
        img.logo:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 0 30px var(--neon-cyan); }

        /* PANEL DE NAVEGACIÓN */
        .control-panel {
            position: fixed; top: 120px; left: 20px;
            z-index: 100;
            background: rgba(0, 10, 10, 0.7);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 15px;
            padding: 12px;
            backdrop-filter: blur(10px);
        }

        .panel-grid { display: flex; flex-direction: column; gap: 8px; }

        .panel-grid a {
            padding: 10px 18px;
            text-decoration: none;
            color: var(--neon-main);
            border: 1px solid rgba(0, 255, 204, 0.2);
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .panel-grid a:hover {
            background: var(--neon-main);
            color: #000;
            box-shadow: 0 0 15px var(--neon-main);
            transform: translateX(8px);
        }

        /* BOTÓN ESPECIAL BLACK HOLE */
        .blackhole-btn {
            position: fixed; top: 20px; right: 20px;
            z-index: 100;
            padding: 12px 25px;
            font-size: 12px;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(45deg, #000, #bc13fe, #ff00ff);
            background-size: 200% 200%;
            animation: gradient-flow 3s infinite alternate;
            border-radius: 25px;
            text-decoration: none;
            box-shadow: 0 0 20px var(--neon-purple);
            border: 1px solid #fff;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        @keyframes gradient-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .blackhole-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--neon-purple);
        }

        /* TARJETA NARRATIVA CINEMÁTICA */
        .narrative-engine {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            width: 80%; max-width: 600px;
            background: rgba(0, 5, 5, 0.85);
            border-left: 5px solid var(--neon-cyan);
            padding: 20px;
            border-radius: 0 15px 15px 0;
            z-index: 80;
            backdrop-filter: blur(10px);
            text-align: left;
        }

        #stage-title { 
            font-size: 24px; color: var(--neon-cyan); margin: 0; 
            text-transform: uppercase; letter-spacing: 5px;
        }

        #stage-desc { 
            font-size: 13px; margin-top: 8px; color: #ccc; 
            line-height: 1.6; font-family: sans-serif;
        }

        #btn-start-audio {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 200; padding: 20px 40px; border: 2px solid var(--neon-main);
            background: #000; color: var(--neon-main); font-family: 'Orbitron';
            cursor: pointer; letter-spacing: 5px; font-weight: 900;
        }

        #creditos_btn {
            position: fixed; bottom: 15px; right: 15px;
            padding: 5px 10px; background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-main);
            color: var(--neon-main); border-radius: 5px;
            cursor: pointer; z-index: 100; font-size: 10px;
        }
    </style>
</head>

<body>

<div class="vignette"></div>
<canvas id="canvas-cosmos"></canvas>

<button id="btn-start-audio">INICIAR SISTEMA</button>

<header>⚡ LAB LUIS – Quantum Engine</header>

<img src="logo.jpg" class="logo" alt="Lab Logo">

<div class="control-panel">
    <div class="panel-grid">
        <a href="index.html">🏠 Inicio</a>
        <a href="proyectos.html">👽 Vórtice</a>
        <a href="laboratorio.html">📝 Pioneros</a>
        <a href="libros.html">📚 KDP Libros</a>
    </div>
</div>

<a href="index3d.html" class="blackhole-btn">🌀 BLACK HOLE 3D</a>

<div class="narrative-engine" id="narrative-box" style="opacity: 0;">
    <h2 id="stage-title">INICIALIZANDO</h2>
    <p id="stage-desc">Esperando autorización del núcleo cuántico...</p>
</div>

<div id="creditos_btn" onclick="window.location.href='creditos.html'">ⓘ Créditos</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, particles = [], active = false;

    const timeline = [
        { t: "Línea de Planck", d: "10⁻³⁵ metros. El espacio-tiempo es una espuma cuántica de vibración pura sin dirección definida.", color: "#00f2ff", dur: 8000 },
        { t: "Fase Subatómica", d: "Surgen Quarks y Gluones. El tiempo adquiere su flecha irreversible hacia el futuro.", color: "#ffffff", dur: 8000 },
        { t: "Entropía Vital", d: "La vida lucha contra el desorden acumulando errores. El tiempo biológico es una cuenta regresiva.", color: "#39ff14", dur: 8000 },
        { t: "Salto Warp", d: "Atravesando la curvatura gravitacional. El tiempo se dilata mientras el espacio se contrae.", color: "#ffcc00", dur: 10000 },
        { t: "Singularidad", d: "Colapso total. Más allá del horizonte de sucesos, las leyes de la física dejan de existir.", color: "#bc13fe", dur: 12000 }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w - w/2;
            this.y = Math.random() * h - h/2;
            this.z = Math.random() * w;
            this.pz = this.z;
            this.size = Math.random() * 2;
            this.ang = Math.random() * Math.PI * 2;
        }

        update() {
            if (stage === 3) { // Warp Speed
                this.z -= 25;
                if (this.z < 1) this.init();
            } else if (stage === 4) { // Vortex
                this.ang += 0.03;
                this.z *= 0.98;
                if (this.z < 10) this.z = w;
            } else { // Normal drift
                this.z -= 0.5;
                if (this.z < 1) this.init();
            }
        }

        draw() {
            let s = timeline[stage];
            ctx.fillStyle = s.color;
            ctx.strokeStyle = s.color;

            let sx = (this.x / this.z) * 600 + w/2;
            let sy = (this.y / this.z) * 600 + h/2;

            if (stage === 3) {
                let px = (this.x / this.pz) * 600 + w/2;
                let py = (this.y / this.pz) * 600 + h/2;
                ctx.lineWidth = (1 - this.z/w) * 4;
                ctx.globalAlpha = (1 - this.z/w);
                ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy); ctx.stroke();
                this.pz = this.z;
            } else if (stage === 4) {
                let rx = Math.cos(this.ang) * (this.z/w * w/3) + w/2;
                let ry = Math.sin(this.ang) * (this.z/w * w/3) + h/2;
                ctx.globalAlpha = Math.random();
                ctx.beginPath(); ctx.arc(rx, ry, this.size * 2, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.globalAlpha = (1 - this.z/w);
                ctx.beginPath(); ctx.arc(sx, sy, this.size * (1 - this.z/w) * 3, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    particles = Array.from({ length: 500 }, () => new Particle());

    function loop() {
        ctx.fillStyle = stage === 3 ? "rgba(0,0,0,0.2)" : "rgba(0,0,0,0.15)";
        ctx.fillRect(0, 0, w, h);

        if (active) {
            particles.forEach(p => {
                p.update();
                p.draw();
            });
        }
        requestAnimationFrame(loop);
    }

    function changeStage() {
        const s = timeline[stage];
        const box = document.getElementById("narrative-box");
        box.style.opacity = 0;
        
        setTimeout(() => {
            document.getElementById("stage-title").innerText = s.t;
            document.getElementById("stage-desc").innerText = s.d;
            document.getElementById("stage-title").style.color = s.color;
            box.style.opacity = 1;
            
            // Efecto de flash al cambiar
            ctx.fillStyle = "white";
            ctx.fillRect(0,0,w,h);
        }, 500);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            changeStage();
        }, s.dur);
    }

    document.getElementById('btn-start-audio').addEventListener('click', function() {
        this.style.display = 'none';
        active = true;
        changeStage();
    });

    loop();
</script>
</body>
</html>
