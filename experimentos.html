<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Experimentos - Laboratorio | Lab Luis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0; padding: 0; overflow-x: hidden;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #000; color: #00ffcc;
    }

    /* Estética Neón Superior */
    header {
        padding: 20px; font-size: 30px; font-weight: bold;
        background: rgba(0,0,0,0.85);
        border-bottom: 2px solid #00ffcc;
        text-align: center;
        text-shadow: 0 0 15px #00ffcc;
        position: relative; z-index: 10;
    }

    img.logo {
        width: 140px; margin: 15px auto; display: block;
        border: 2px solid #00ffcc; border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        position: relative; z-index: 10;
    }

    .control-panel {
        width: 85%; max-width: 800px; margin: 15px auto;
        padding: 15px; background: rgba(0,0,0,0.8);
        border: 1px solid #00ffcc; border-radius: 12px;
        position: relative; z-index: 10;
        box-shadow: inset 0 0 15px rgba(0, 255, 204, 0.2);
    }

    .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .panel-grid a {
        padding: 10px; text-align: center; text-decoration: none;
        color: #00ffcc; border: 1px solid rgba(0,255,204,0.3);
        background: rgba(0,20,20,0.5); border-radius: 8px;
        transition: 0.4s; font-weight: bold;
    }
    .panel-grid a:hover {
        background: #00ffcc; color: #000;
        box-shadow: 0 0 20px #00ffcc;
    }

    .blackhole-container { text-align: center; margin: 15px; position: relative; z-index: 10; }
    .blackhole-btn {
        display: inline-block; padding: 12px 25px;
        background: linear-gradient(45deg, #00ffcc, #0055ff);
        color: #fff; font-weight: bold; border-radius: 30px;
        text-decoration: none; text-transform: uppercase;
        box-shadow: 0 0 25px rgba(0, 255, 204, 0.6);
        border: none; cursor: pointer;
    }

    /* CANVAS */
    #canvas-cosmos {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%; z-index: -1;
    }

    /* TARJETA CIENTÍFICA EVOLUCIONADA */
    .video-card {
        width: 90%; max-width: 650px; margin: 20px auto;
        padding: 25px; background: rgba(0,5,10,0.9);
        border: 2px solid #00f2ff; border-radius: 15px;
        position: relative; z-index: 10;
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.3), inset 0 0 20px rgba(0, 242, 255, 0.1);
        backdrop-filter: blur(5px);
    }

    #stage-title {
        font-size: 26px; color: #00f2ff; margin: 0;
        text-transform: uppercase; letter-spacing: 3px;
        text-shadow: 0 0 10px #00f2ff;
    }

    #stage-desc {
        font-size: 15px; color: #e0faff; margin-top: 12px;
        line-height: 1.6; font-family: 'Consolas', monospace;
    }

    #creditos_btn {
        position: fixed; bottom: 15px; right: 15px;
        padding: 8px 12px; font-size: 12px;
        background: rgba(0,0,0,0.8); border: 1px solid #00ffcc;
        color: #00ffcc; border-radius: 50%; cursor: pointer;
        z-index: 100; box-shadow: 0 0 10px #00ffcc;
    }
</style>
</head>

<body>

<header>⚡ LAB LUIS – Quantum Reality</header>

<img src="logo.jpg" class="logo" alt="Lab Logo">

<div class="control-panel">
    <div class="panel-grid">
        <a href="index.html">🏠 Inicio</a>
        <a href="proyectos.html">👽 Vórtice</a>
        <a href="laboratorio.html">🧪 Ciencia</a>
        <a href="libros.html">📚 Libros</a>
    </div>
</div>

<div class="blackhole-container">
    <a class="blackhole-btn" href="index3d.html">🌀 Event Horizon 3D</a>
</div>

<canvas id="canvas-cosmos"></canvas>

<div class="video-card">
    <div class="narrative-box">
        <h2 id="stage-title">Escala de Planck</h2>
        <p id="stage-desc">Procesando datos de la espuma cuántica...</p>
    </div>
</div>

<div id="creditos_btn" onclick="window.location.href='creditos.html'">?</div>

<script>
const canvas = document.getElementById("canvas-cosmos");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let currentStage = 0;
let particles = [];
let planets = [];

const timeline = [
    { t: "Línea de Planck", d: "A $10^{-35}$m, la geometría del espacio-tiempo se rompe. Aquí el tiempo no fluye, 'hierve' en fluctuaciones de energía pura.", color: "#00f2ff", glow: 20 },
    { t: "Sopa de Quarks y Leptones", d: "El universo se enfría. Neutrinos y electrones nacen de la energía. El tiempo adquiere una dirección única hacia el futuro.", color: "#ffffff", glow: 10 },
    { t: "Forja Atómica", d: "La gravedad domina. Se crean los núcleos de hidrógeno. El tiempo curva el espacio alrededor de la masa masiva.", color: "#ffff00", glow: 15 },
    { t: "Entropía Biológica", d: "Vida: Una anomalía que lucha contra el desorden. Envejecemos porque nuestras células pierden la batalla contra la oxidación y el tiempo.", color: "#44ff44", glow: 12 },
    { t: "Muerte Térmica y Expansión", d: "La Energía Oscura separa las galaxias. Al final, el tiempo se detendrá en un universo frío, oscuro e infinito.", color: "#ff00ff", glow: 25 }
];

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 3;
        this.vy = (Math.random() - 0.5) * 3;
        this.size = Math.random() * 2 + 1;
        this.hue = 180;
        this.life = Math.random() * 100;
    }
    update() {
        if(currentStage === 0) { // Planck: Movimiento cuántico saltarín
            this.x += (Math.random() - 0.5) * 15;
            this.y += (Math.random() - 0.5) * 15;
        } else if(currentStage === 3) { // Vida: Degradación
            this.size += 0.06;
            if(this.size > 12) this.reset();
        } else if(currentStage === 4) { // Expansión acelerada
            let dx = this.x - canvas.width/2;
            let dy = this.y - canvas.height/2;
            this.x += dx * 0.05;
            this.y += dy * 0.05;
            if(this.x < 0 || this.x > canvas.width) this.reset();
        } else {
            this.x += this.vx;
            this.y += this.vy;
        }
        
        if(this.x < 0) this.x = canvas.width;
        if(this.x > canvas.width) this.x = 0;
        if(this.y < 0) this.y = canvas.height;
        if(this.y > canvas.height) this.y = 0;
    }
    draw() {
        ctx.shadowBlur = timeline[currentStage].glow;
        ctx.shadowColor = timeline[currentStage].color;
        ctx.fillStyle = timeline[currentStage].color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0; // Reset para rendimiento
    }
}

class Planet {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.r = Math.random() * 40 + 10;
        this.color = `hsl(${Math.random()*360}, 70%, 50%)`;
        this.speed = Math.random() * 0.5 + 0.1;
    }
    draw() {
        let grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
        grad.addColorStop(0, this.color);
        grad.addColorStop(1, 'black');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        // Anillo de neón
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(this.x, this.y, this.r * 1.8, this.r * 0.5, Math.PI/4, 0, Math.PI * 2);
        ctx.stroke();
    }
    update() {
        if(currentStage === 4) {
            let dx = this.x - canvas.width/2;
            let dy = this.y - canvas.height/2;
            this.x += dx * 0.01;
            this.y += dy * 0.01;
            if(this.x < -100 || this.x > canvas.width+100) { this.x = canvas.width/2; this.y = canvas.height/2; this.r = 5; }
            this.r += 0.05;
        }
    }
}

function init() {
    particles = []; planets = [];
    for(let i = 0; i < 150; i++) particles.push(new Particle());
    for(let i = 0; i < 5; i++) planets.push(new Planet());
}

function loop() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if(currentStage >= 2) { // Mostrar planetas solo en escalas grandes
        planets.forEach(pl => { pl.update(); pl.draw(); });
    }

    particles.forEach(p => {
        p.update();
        p.draw();
    });
    requestAnimationFrame(loop);
}

setInterval(() => {
    currentStage = (currentStage + 1) % timeline.length;
    document.getElementById("stage-title").innerText = timeline[currentStage].t;
    document.getElementById("stage-desc").innerText = timeline[currentStage].d;
    document.getElementById("stage-title").style.color = timeline[currentStage].color;
}, 10000);

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    init();
});

init();
loop();
</script>
</body>
</html>
