<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Quantum Master Engine PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        :root {
            --planck: #00f2ff;
            --atomic: #ffffff;
            --bio: #39ff14;
            --cosmos: #ffcc00;
            --vortex: #bc13fe;
            --exit: #ff3131;
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; height: 100%; width: 100%;
        }

        #canvas-cosmos { 
            position: fixed; top: 0; left: 0; z-index: 1; 
        }

        header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 100%; pointer-events: none;
        }

        .title-3d {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(22px, 6vw, 40px);
            color: #fff; text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 
                0 1px 0 #444, 0 4px 0 #222,
                0 0 10px var(--planck), 0 0 30px var(--planck);
            -webkit-text-stroke: 1px rgba(255,255,255,0.3);
        }

        .ui-panel {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 20px;
        }

        .orb {
            width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 24px;
            background: rgba(0,0,0,0.8); border: 2px solid #fff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 20px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); box-shadow: 0 0 20px var(--exit); }

        .narrative {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 85%; max-width: 600px;
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 15px;
            border: 2px solid var(--planck);
        }
        #st-title { font-size: 24px; color: var(--planck); margin: 0; text-transform: uppercase; }
        #st-desc { font-size: 14px; color: #ccc; margin-top: 10px; line-height: 1.4; }

        img.logo { position: fixed; top: 20px; left: 20px; width: 70px; z-index: 110; border-radius: 50%; border: 2px solid var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LAB LUIS QUANTUM</div></header>
<img src="logo.jpg" class="logo" alt="LUIS">

<div class="ui-panel">
    <a href="index.html" class="orb btn-exit">🏠</a>
    <div id="btn-audio" class="orb">🔊</div>
</div>

<div class="narrative">
    <h2 id="st-title">LABORATORIO LUIS</h2>
    <p id="st-desc">Pulsa el botón de sonido para iniciar el ciclo de existencia cuántica.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h;
    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    let stage = 0;
    let particles = [];
    let audioCtx, masterGain;
    let sequenceActive = false;
    let vortexAngle = 0;
    let globalGlow = 0;

    const timeline = [
        { t: "Líneas de Planck", d: "Vibración primordial de cuerdas (10⁻³⁵m). El tejido de la realidad oscila en un estado de potencial puro.", color: "#00f2ff", dur: 10000 },
        { t: "Forja Atómica", d: "Quarks, Protones y Neutrones se agrupan. Electrones y Neutrinos fantasmales danzan en el vacío atómico.", color: "#ffffff", dur: 12000 },
        { t: "Entropía Biológica", d: "La oxidación celular por radicales libres causa el envejecimiento. El ADN se desestabiliza y la vida se marchita.", color: "#39ff14", dur: 12000 },
        { t: "Expansión Relativista", d: "Velocidad de la luz. Las galaxias se alejan. La masa de los planetas curva el tiempo hacia el infinito.", color: "#ffcc00", dur: 12000 },
        { t: "Desdoblamiento Cuántico", d: "¡Colapso inminente! El espacio-tiempo se nubla y gira en un espejismo masivo antes del gran rebote.", color: "#bc13fe", dur: 15000 }
    ];

    class QuantumObject {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
            this.size = Math.random() * 3 + 1;
            this.angle = Math.random() * Math.PI * 2;
            this.orbit = Math.random() * 80 + 30;
            this.life = 1.0;
        }
        draw() {
            if(stage === 0) { // PLANCK: CUERDAS REALISTAS
                ctx.strokeStyle = `rgba(0, 242, 255, ${Math.random()})`;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                for(let i=0; i<5; i++) {
                    let ox = Math.sin(Date.now()*0.01 + this.angle + i) * 30;
                    ctx.lineTo(this.x + ox, this.y + (i*10));
                }
                ctx.stroke();
            } 
            else if(stage === 1) { // ÁTOMO COMPLEJO
                ctx.fillStyle = "#ff2d55"; // Núcleo (Protones)
                ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, Math.PI*2); ctx.fill();
                // Electrones Caóticos
                for(let i=0; i<3; i++) {
                    let rot = Date.now()*0.005 + (i * 2);
                    let ex = this.x + Math.cos(rot) * (this.orbit + i*10);
                    let ey = this.y + Math.sin(rot) * (this.orbit + i*10);
                    ctx.fillStyle = i === 0 ? "#00f2ff" : "#fff";
                    ctx.beginPath(); ctx.arc(ex, ey, 2, 0, Math.PI*2); ctx.fill();
                }
            } 
            else if(stage === 2) { // BIOLOGÍA Y OXIDACIÓN
                this.life -= 0.002; if(this.life < 0) this.life = 1;
                let r = 50 + (1-this.life)*150;
                let g = 255 * this.life;
                let b = 20 + (1-this.life)*50;
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.life})`;
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size * 6 * (1.2 - this.life), 0, Math.PI*2);
                ctx.fill();
                // Efecto de "marchitado"
                if(Math.random() > 0.95) {
                    ctx.strokeStyle = "#8b4513";
                    ctx.strokeRect(this.x-10, this.y-10, 20, 20);
                }
            }
            else if(stage === 3) { // PLANETAS
                let s = w/this.z;
                let px = w/2 + (this.x-w/2)*s; let py = h/2 + (this.y-h/2)*s;
                this.z -= 20; if(this.z < 1) this.z = w;
                ctx.fillStyle = timeline[3].color;
                ctx.beginPath(); ctx.arc(px, py, this.size*s*4, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
            }
            else if(stage === 4) { // DESDOBLAMIENTO (ESPEJISMO)
                this.angle += 0.15; // Girando a alta velocidad
                this.orbit *= 0.98;
                let dist = this.orbit * 8;
                this.x = w/2 + Math.cos(this.angle) * dist;
                this.y = h/2 + Math.sin(this.angle) * dist;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); 
                ctx.ellipse(this.x, this.y, this.size*10, this.size, this.angle, 0, Math.PI*2);
                ctx.fill();
            }
        }
    }

    particles = Array.from({ length: 120 }, () => new QuantumObject());

    function loop() {
        if(stage === 4) {
            // Efecto nublado y giratorio (Desdoblamiento)
            ctx.fillStyle = "rgba(0,0,0,0.05)";
            ctx.fillRect(0,0,w,h);
            ctx.save();
            ctx.translate(w/2, h/2);
            ctx.rotate(vortexAngle);
            vortexAngle += 0.1; // Rotación masiva
            ctx.globalAlpha = 0.3;
            ctx.filter = "blur(4px)";
            ctx.drawImage(canvas, -w/2, -h/2);
            ctx.restore();
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.fillRect(0,0,w,h);
            ctx.filter = "none";
        }

        // Titileo de pre-colapso
        if(stage === 3 && Math.random() > 0.97) {
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            ctx.fillRect(0,0,w,h);
        }

        particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function startSequence() {
        if(!sequenceActive) return;
        const cur = timeline[stage];
        document.getElementById("st-title").innerText = cur.t;
        document.getElementById("st-desc").innerText = cur.d;
        document.getElementById("st-title").style.color = cur.color;

        // Audio Proyectado
        const playSfx = (f, t, d) => {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime + d);
        };

        if(stage === 0) playSfx(523, 'sine', 4);
        if(stage === 2) playSfx(110, 'triangle', 4);
        if(stage === 4) playSfx(40, 'square', 10);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { 
                ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); // Big Bang Flash
                particles.forEach(p => p.init());
            }
            startSequence();
        }, cur.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        sequenceActive = true;
        this.style.display = 'none';
        startSequence();
    });

    loop();
</script>
</body>
</html>
