<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Quantum Master PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        
        :root {
            --planck: #00f2ff; --atomic: #fff; --bio: #39ff14; --cosmos: #ffcc00; --vortex: #bc13fe; --exit: #ff3131;
        }

        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: sans-serif; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* HEADER 3D NEÓN */
        header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 100%; pointer-events: none;
        }
        .title-3d {
            font-family: 'Orbitron', sans-serif; font-size: clamp(20px, 6vw, 40px);
            color: #fff; text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 0 0 10px var(--planck), 0 0 30px var(--planck), 0 5px 10px rgba(0,0,0,0.5);
        }

        /* BOTONES ORBES */
        .ui-panel { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 20px; }
        .orb {
            width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 26px; background: rgba(0,0,0,0.8); border: 2px solid #fff;
            transition: 0.3s; box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 25px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); }
        .orb:hover { transform: scale(1.1); filter: brightness(1.3); }

        /* NARRATIVA */
        .narrative {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 85%; max-width: 600px;
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 15px; border: 2px solid var(--planck);
        }
        #st-title { font-size: 22px; color: var(--planck); margin: 0; text-transform: uppercase; }
        #st-desc { font-size: 14px; color: #ccc; margin-top: 8px; line-height: 1.4; }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LAB LUIS MASTER</div></header>

<div class="ui-panel">
    <a href="index.html" class="orb btn-exit">🏠</a>
    <div id="btn-audio" class="orb">🔊</div>
    <a href="index3d.html" class="orb btn-bh">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">SISTEMA APAGADO</h2>
    <p id="st-desc">HAZ CLIC EN EL BOTÓN CELESTE (🔊) PARA INICIAR LA SECUENCIA.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, particles = [], audioCtx, sequenceActive = false, vortexAngle = 0;

    const timeline = [
        { t: "Líneas de Planck", d: "Micro-cuerdas vibrando a alta frecuencia (10⁻³⁵m). El tejido de la realidad.", color: "#00f2ff", dur: 10000 },
        { t: "Forja Atómica", d: "Protones, Neutrones y Electrones. Los neutrinos atraviesan el vacío.", color: "#ffffff", dur: 10000 },
        { t: "Entropía Biológica", d: "Oxidación celular: la energía se pierde, la célula se expande y muere (marrón óxido).", color: "#39ff14", dur: 12000 },
        { t: "Relatividad", d: "Expansión galáctica. Planetas y estrellas con relieve deformando el espacio.", color: "#ffcc00", dur: 12000 },
        { t: "Desdoblamiento", d: "¡COLAPSO! El universo gira y se nubla en un espejismo antes de volver al origen.", color: "#bc13fe", dur: 14000 }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h; this.z = Math.random() * w;
            this.size = Math.random() * 3 + 2; this.angle = Math.random() * Math.PI * 2;
            this.orbit = Math.random() * 100 + 40; this.life = 1.0;
        }
        draw() {
            if (stage === 0) { // PLANCK: LÍNEAS VIBRANTES
                ctx.strokeStyle = `rgba(0, 242, 255, ${Math.random()})`;
                ctx.beginPath();
                let v = Math.sin(Date.now() * 0.05 + this.angle) * 30;
                ctx.moveTo(this.x - v, this.y); ctx.lineTo(this.x + v, this.y + 10);
                ctx.stroke();
            } else if (stage === 2) { // BIO: OXIDACIÓN
                this.life -= 0.003; if (this.life < 0) this.life = 1;
                let r = 50 + (1-this.life)*200, g = 255 * this.life;
                ctx.fillStyle = `rgba(${r}, ${g}, 50, ${this.life})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size * (1.5 - this.life) * 4, 0, Math.PI*2); ctx.fill();
            } else if (stage === 4) { // VÓRTICE / DESDOBLAMIENTO
                this.angle += 0.2; this.orbit *= 0.99;
                let dist = this.orbit * 8;
                this.x = w/2 + Math.cos(this.angle) * dist;
                this.y = h/2 + Math.sin(this.angle) * dist;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.ellipse(this.x, this.y, this.size*10, this.size, this.angle, 0, Math.PI*2); ctx.fill();
            } else { // ÁTOMOS / COSMOS
                ctx.fillStyle = timeline[stage].color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    for (let i = 0; i < 150; i++) particles.push(new Particle());

    function loop() {
        if (stage === 4) {
            ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexAngle);
            vortexAngle += 0.1; ctx.globalAlpha = 0.5; ctx.filter = "blur(5px)";
            ctx.drawImage(canvas, -w/2, -h/2); ctx.restore();
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        if (sequenceActive) particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function startSequence() {
        const cur = timeline[stage];
        document.getElementById("st-title").innerText = cur.t;
        document.getElementById("st-desc").innerText = cur.d;
        document.getElementById("st-title").style.color = cur.color;

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if (stage === 0) particles.forEach(p => p.init());
            startSequence();
        }, cur.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        sequenceActive = true;
        this.style.display = 'none';
        startSequence();
    });

    loop();
</script>
</body>
</html>
