<body>

<header>⚡ LAB LUIS – Experimental Physics & Energy</header>

<img src="logo.jpg" class="logo">

<div class="control-panel">
<div class="panel-grid">

<!-- 🌌 CANVAS UNIVERSAL -->
<canvas id="canvas-cosmos"></canvas>

<div class="video-card">
<div class="narrative-box">
<h2 id="stage-title">Línea de Planck</h2>
<p id="stage-desc">$10^{-44}s$: El tiempo es vibración cuántica.</p>
</div>
</div>

<div id="creditos_btn" onclick="window.location.href='creditos.html'">ⓘ</div>

<script>
const canvas = document.getElementById("canvas-cosmos");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let currentStage = 0;

const timeline = [
{ t:"Línea de Planck", d:"Tiempo como red cuántica vibratoria.", color:"#00f2ff", count:300 },
{ t:"Partículas", d:"Quarks y leptones en dinámica estable.", color:"#ffffff", count:180 },
{ t:"Átomos", d:"Estructura organizada de la materia.", color:"#ffff00", count:120 },
{ t:"Vida", d:"Envejecimiento y entropía biológica.", color:"#44ff44", count:80 },
{ t:"Cosmos", d:"Expansión del universo hacia el infinito.", color:"#ff00ff", count:220 }
];

let particles = [];

class P{
constructor(){
this.reset();
}
reset(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.vx=(Math.random()-0.5)*2;
this.vy=(Math.random()-0.5)*2;
this.size=Math.random()*2+1;
this.age=0;
}
update(){
switch(currentStage){
case 0:
this.x+=(Math.random()-0.5)*8;
this.y+=(Math.random()-0.5)*8;
break;
case 3:
this.size+=0.05;
this.age++;
if(this.age>200)this.reset();
break;
case 4:
this.x+=(this.x-canvas.width/2)*0.03;
this.y+=(this.y-canvas.height/2)*0.03;
break;
default:
this.x+=this.vx;
this.y+=this.vy;
}
if(this.x<0)this.x=canvas.width;
if(this.x>canvas.width)this.x=0;
if(this.y<0)this.y=canvas.height;
if(this.y>canvas.height)this.y=0;
}
draw(){
ctx.fillStyle=timeline[currentStage].color;
ctx.fillRect(this.x,this.y,this.size,this.size);
}
}

function init(){
particles=[];
for(let i=0;i<300;i++)particles.push(new P());
}
init();

function loop(){
ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let p of particles){
p.update();
p.draw();
}

requestAnimationFrame(loop);
}
loop();

setInterval(()=>{
currentStage=(currentStage+1)%timeline.length;
document.getElementById("stage-title").innerText=timeline[currentStage].t;
document.getElementById("stage-desc").innerText=timeline[currentStage].d;
document.getElementById("stage-title").style.color=timeline[currentStage].color;
},8000);

window.addEventListener("resize",()=>{
canvas.width=innerWidth;
canvas.height=innerHeight;
});
</script>

</body>
