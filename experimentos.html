<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LAB LUIS - Universal Reality Engine 3D</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --planck:#00f2ff;
    --atomic:#fff;
    --bio:#39ff14;
    --cosmos:#ffcc00;
    --vortex:#bc13fe;
    --exit:#ff3131;
}

body,html{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:Segoe UI;
}

#canvas-cosmos{
    position:fixed;
    top:0;
    left:0;
}

/* HEADER */
header{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    z-index:100;
    pointer-events:none;
}

.title{
    font-size:26px;
    font-weight:900;
    color:#fff;
    letter-spacing:6px;
    text-shadow:0 0 20px var(--planck);
}

/* UI */
.ui{
    position:fixed;
    top:20px;
    right:20px;
    z-index:200;
    display:flex;
    flex-direction:column;
    gap:10px;
}

button,a{
    padding:10px 14px;
    border-radius:20px;
    border:1px solid #fff;
    background:rgba(0,0,0,0.6);
    color:#fff;
    cursor:pointer;
    text-decoration:none;
}

.exit{
    border-color:var(--exit);
    color:var(--exit);
}
</style>
</head>

<body>

<canvas id="canvas-cosmos"></canvas>

<header><div class="title">LAB LUIS UNIVERSAL</div></header>

<div class="ui">
<button id="audio">🔊 AUDIO</button>
<a class="exit" href="index.html">🏠 SALIR</a>
<a href="index3d.html">🌀 BLACK HOLE</a>
</div>

<script>

const canvas=document.getElementById("canvas-cosmos");
const ctx=canvas.getContext("2d");

let w,h;
let isMobile;

function resize(){
    w=canvas.width=innerWidth;
    h=canvas.height=innerHeight;
    isMobile=w<768;
}
resize();
onresize=resize;

/* STATE */
let stage=0;
let audioCtx, masterGain;
let vortex=0;
let swirl=0;

/* AUDIO */
function initAudio(){
    audioCtx=new (window.AudioContext||webkitAudioContext)();
    masterGain=audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
    masterGain.gain.value=0.2;

    let o=audioCtx.createOscillator();
    o.type="sine";
    o.frequency.value=55;
    o.connect(masterGain);
    o.start();

    document.getElementById("audio").style.display="none";

    cycle();
}

function sound(f,type,d,v=0.1){
    if(!audioCtx) return;

    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();

    o.type=type;
    o.frequency.value=f;

    g.gain.setValueAtTime(v,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);

    o.connect(g);
    g.connect(masterGain);

    o.start();
    o.stop(audioCtx.currentTime+d);
}

/* PARTICLE */
class P{
constructor(){this.reset();}

reset(){
    this.x=Math.random()*w;
    this.y=Math.random()*h;

    this.a=Math.random()*Math.PI*2;
    this.r=Math.random()*Math.min(w,h);
    this.v=(Math.random()-0.5)*0.02;
}

update(){
    const cx=w/2, cy=h/2;

    if(stage===0){
        this.x+=(cx-this.x)*0.08;
        this.y+=(cy-this.y)*0.08;
    }

    if(stage===1){
        this.x+=Math.sin(this.a)*2;
        this.y+=Math.cos(this.a)*2;
    }

    if(stage===2){
        this.a+=this.v;
        this.r*=0.99;

        this.x=cx+Math.cos(this.a)*this.r;
        this.y=cy+Math.sin(this.a)*this.r;
    }

    if(stage===3){
        // EXPANSIÓN
        this.x+=(this.x-cx)*0.03;
        this.y+=(this.y-cy)*0.03;
    }
}

draw(){
    ctx.fillStyle=
        stage===0? "#00f2ff":
        stage===1? "#fff":
        stage===2? "#39ff14":
        "#bc13fe";

    ctx.beginPath();
    ctx.arc(this.x,this.y,2,0,Math.PI*2);
    ctx.fill();
}
}

let ps=Array.from({length:isMobile?120:250},()=>new P());

/* LOOP VISUAL */
function loop(){

    ctx.fillStyle = stage===2
        ? "rgba(0,0,0,0.08)"
        : "rgba(0,0,0,0.2)";

    ctx.fillRect(0,0,w,h);

    if(stage===3){
        // 🌪️ VÓRTICE REAL
        swirl += 0.01;

        ctx.save();
        ctx.translate(w/2,h/2);
        ctx.rotate(swirl);

        ctx.globalAlpha=0.35;
        ctx.drawImage(canvas,-w/2,-h/2);

        ctx.restore();
        ctx.globalAlpha=1;
    }

    ps.forEach(p=>p.update()||p.draw());

    requestAnimationFrame(loop);
}
loop();

/* SECUENCIA */
function cycle(){

    stage=(stage+1)%4;

    if(stage===1) sound(200,"sine",2);
    if(stage===2) sound(80,"triangle",4);
    if(stage===3) sound(40,"square",6,0.2);

    setTimeout(cycle,9000);
}

/* AUDIO START */
document.getElementById("audio").onclick=initAudio;

</script>

</body>
</html>
