<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Cosmic Cycle Mastery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="canonical" href="https://duquemartini.com/experimentos.html">

    <style>
        :root {
            --neon: #00ffcc;
            --void: #bc13fe;
            --planck: #00f2ff;
            --white: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; height: 100%; width: 100%;
        }

        #canvas-cosmos { position: fixed; top: 0; left: 0; z-index: 1; }

        /* --- INTERFAZ CINEMATOGRÁFICA --- */
        header {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; pointer-events: none;
        }

        .title-3d {
            font-size: clamp(20px, 6vw, 36px); font-weight: 900; letter-spacing: 10px;
            color: #fff; text-transform: uppercase;
            text-shadow: 0 1px 0 #ccc, 0 5px 15px rgba(0, 255, 204, 0.6), 0 10px 30px rgba(0,0,0,0.5);
        }

        .top-console {
            position: fixed; top: 20px; right: 20px; z-index: 110;
            display: flex; flex-direction: column; gap: 10px;
        }

        .btn-ui {
            padding: 12px 20px; font-size: 11px; font-weight: bold;
            border-radius: 5px; text-decoration: none; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
        }

        #audio-init { background: var(--neon); color: #000; border: none; box-shadow: 0 0 20px var(--neon); }
        .bh-link { background: rgba(188, 19, 254, 0.3); color: #fff; border-color: var(--void); }

        .side-nav {
            position: fixed; top: 120px; left: 20px; z-index: 110;
            display: flex; flex-direction: column; gap: 8px;
        }
        .side-link {
            padding: 10px 18px; font-size: 11px; text-decoration: none;
            color: var(--neon); background: rgba(0,0,0,0.4);
            border-left: 4px solid var(--neon); transition: 0.3s;
            text-transform: uppercase;
        }
        .side-link:hover { background: var(--neon); color: #000; padding-left: 28px; }

        .narrative-box {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 80%; pointer-events: none;
        }
        #stage-title { font-size: 26px; color: var(--planck); margin: 0; text-transform: uppercase; letter-spacing: 4px; }
        #stage-desc { font-size: 14px; color: #777; margin-top: 10px; font-style: italic; }

        img.logo { position: fixed; top: 20px; left: 20px; width: 70px; z-index: 110; border: 1px solid var(--neon); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>

<header><div class="title-3d">LAB LUIS QUANTUM</div></header>
<img src="logo.jpg" class="logo" alt="Logo">

<div class="side-nav">
    <a href="index.html" class="side-link">Inicio</a>
    <a href="proyectos.html" class="side-link">Vórtice</a>
    <a href="laboratorio.html" class="side-link">Pioneros</a>
    <a href="libros.html" class="side-link">Libros</a>
</div>

<div class="top-console">
    <button id="audio-init" class="btn-ui">🔊 Activar Sistema de Audio</button>
    <a href="index3d.html" class="btn-ui bh-link">🌀 Black Hole 3D</a>
</div>

<div class="narrative-box">
    <h2 id="stage-title">Sincronizando...</h2>
    <p id="stage-desc">Esperando activación de los motores cuánticos.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, isMobile = window.innerWidth < 768;
    
    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let stage = 0;
    let particles = [];
    let planets = [];
    let angleVortex = 0;
    let audioCtx, masterGain;

    // --- MOTOR DE AUDIO ---
    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        masterGain.gain.value = 0.2;
        document.getElementById('audio-init').style.display = 'none';
        rotateCycle();
    }

    function playTone(freq, type, dur, vol = 0.1) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(g); g.connect(masterGain);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    // --- CLASES VISUALES ---
    class Planet {
        constructor() { this.reset(); }
        reset() {
            this.z = Math.random() * w;
            this.x = (Math.random() - 0.5) * w * 2;
            this.y = (Math.random() - 0.5) * h * 2;
            this.size = Math.random() * 40 + 20;
            this.color = `hsl(${Math.random() * 360}, 50%, 50%)`;
        }
        draw() {
            this.z -= 15; // Velocidad de acercamiento
            if(this.z < 1) this.reset();
            let screenX = w/2 + this.x / (this.z/w);
            let screenY = h/2 + this.y / (this.z/w);
            let r = this.size / (this.z/w);

            let g = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, r);
            g.addColorStop(0, this.color);
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(screenX, screenY, r, 0, Math.PI*2);
            ctx.fill();
        }
    }

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * w;
            this.y = Math.random() * h;
            this.size = Math.random() * 2 + 1;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = (Math.random() - 0.5) * 4;
            this.angle = Math.random() * Math.PI * 2;
            this.dist = Math.random() * w;
        }
        update() {
            if (stage === 0) { // Planck
                this.y += (h / 2 - this.y) * 0.1;
                this.x += (Math.random() - 0.5) * 30;
            } else if (stage === 1) { // Expansión
                this.x += (this.x - w/2) * 0.1;
                this.y += (this.y - h/2) * 0.1;
                if(this.x < 0 || this.x > w) this.reset();
            } else if (stage === 2) { // Vórtice Remolino
                this.angle += 0.05;
                this.dist *= 0.98;
                this.x = w/2 + Math.cos(this.angle) * this.dist;
                this.y = h/2 + Math.sin(this.angle) * this.dist;
                if(this.dist < 5) this.reset();
            }
        }
        draw() {
            ctx.fillStyle = stage === 0 ? varPlanck : (stage === 1 ? '#fff' : varVoid);
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fill();
        }
    }

    const varPlanck = "#00f2ff", varVoid = "#bc13fe";
    particles = Array.from({ length: isMobile ? 100 : 300 }, () => new Particle());
    planets = Array.from({ length: 5 }, () => new Planet());

    function loop() {
        ctx.fillStyle = stage === 2 ? "rgba(0,0,0,0.05)" : "rgba(0,0,0,0.2)";
        ctx.fillRect(0,0,w,h);

        if(stage === 1) planets.forEach(p => p.draw());
        
        if(stage === 2) { // Efecto espejo remolino
            ctx.save();
            ctx.translate(w/2, h/2);
            ctx.rotate(angleVortex);
            angleVortex += 0.01;
            ctx.restore();
        }

        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }

    function rotateCycle() {
        const stages = [
            { t: "Línea de Planck", d: "El origen: vibración en una sola dimensión.", dur: 8000 },
            { t: "Expansión Lumínica", d: "Velocidad de la luz. Los mundos pasan de largo.", dur: 10000 },
            { t: "Vórtice del Final", d: "Colapso absoluto. El remolino del tiempo se espeja.", dur: 12000 }
        ];

        const cur = stages[stage];
        document.getElementById("stage-title").innerText = cur.t;
        document.getElementById("stage-desc").innerText = cur.d;
        document.getElementById("stage-title").style.color = (stage === 0 ? varPlanck : (stage === 1 ? "#fff" : varVoid));

        // Sonido por fase
        if(stage === 0) playTone(440, 'sine', 2);
        if(stage === 1) playTone(110, 'sawtooth', 4);
        if(stage === 2) {
            playTone(60, 'square', 6, 0.2);
            // Flash de impacto
            ctx.fillStyle = "rgba(255,255,255,0.8)";
            ctx.fillRect(0,0,w,h);
        }

        setTimeout(() => {
            stage = (stage + 1) % stages.length;
            rotateCycle();
        }, cur.dur);
    }

    document.getElementById('audio-init').addEventListener('click', initAudio);
    loop();
</script>
</body>
</html>
