<body>

<button id="btn-main-init">INICIAR CRÓNICA</button>

<div class="vignette"></div>

<div class="narrative-card" id="narrative-box" style="opacity: 0;">
    <h2 id="stage-title">...</h2>
    <p id="stage-desc">...</p>
</div>

<button id="creditos_btn" onclick="window.location.href='creditos.html'">INFO SYSTEM</button>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, particles = [], active = false;
    let audioCtx, mainGain;

    const timeline = [
        { t: "Líneas de Planck", d: "10⁻³⁵m. El tejido base vibra en una red de espuma cuántica estacionaria.", color: "#00f2ff", dur: 9000, freq: 440 },
        { t: "Fase Subatómica", d: "Quarks y neutrinos emergen. El tiempo adquiere su flecha irreversible.", color: "#ffffff", dur: 9000, freq: 330 },
        { t: "Entropía Vital", d: "La vida lucha contra el desorden. El tiempo biológico es una cuenta regresiva.", color: "#39ff14", dur: 9000, freq: 220 },
        { t: "Salto Warp", d: "Dilatación temporal extrema. El espacio se curva acelerando hacia las estrellas.", color: "#ffcc00", dur: 11000, freq: 110 },
        { t: "Singularidad", d: "Colapso total. Más allá del horizonte, las leyes físicas se desintegran.", color: "#bc13fe", dur: 14000, freq: 60 }
    ];

    const resize = () => { 
        w = canvas.width = window.innerWidth; 
        h = canvas.height = window.innerHeight; 
        initParticles();
    };
    window.addEventListener('resize', resize);

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        mainGain = audioCtx.createGain();
        mainGain.connect(audioCtx.destination);
        mainGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    }

    function playTone(f) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4);
        osc.connect(g); g.connect(mainGain);
        osc.start(); osc.stop(audioCtx.currentTime + 4);
    }

    class Particle {
        constructor(ix, iy) {
            this.gridX = ix; // Para fase Planck
            this.gridY = iy;
            this.init();
        }

        init() {
            this.x = Math.random() * w - w/2;
            this.y = Math.random() * h - h/2;
            this.z = Math.random() * w;
            this.pz = this.z;
            this.size = Math.random() * 1.5 + 0.5;
            this.ang = Math.random() * Math.PI * 2;
            this.vibrateX = 0;
            this.vibrateY = 0;
        }

        update() {
            if (stage === 0) { // PLANCK: Vibración en red
                this.vibrateX = Math.sin(Date.now() * 0.01 + this.gridX) * 2;
                this.vibrateY = Math.cos(Date.now() * 0.01 + this.gridY) * 2;
            } else if (stage === 3) { // WARP
                this.z -= 25;
                if(this.z < 1) this.z = w;
            } else if (stage === 4) { // BLACK HOLE
                this.ang += 0.05;
                this.z *= 0.98;
                if(this.z < 10) this.z = w;
            } else { // NORMAL
                this.z -= 1;
                if(this.z < 1) this.z = w;
            }
        }

        draw() {
            let s = timeline[stage];
            ctx.globalAlpha = 1 - (this.z / w);
            ctx.fillStyle = s.color;
            ctx.strokeStyle = s.color;

            if (stage === 0) { // Render Planck: Líneas vibrantes en toda la pantalla
                let x = (this.gridX * (w / 20)) + this.vibrateX;
                let y = (this.gridY * (h / 20)) + this.vibrateY;
                ctx.beginPath();
                ctx.arc(x, y, this.size * 2, 0, Math.PI * 2);
                ctx.fill();
                // Dibujar micro-enlaces
                ctx.globalAlpha = 0.1;
                ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+10, y+10); ctx.stroke();
            } else {
                let k = 600 / this.z;
                let sx = this.x * k + w/2;
                let sy = this.y * k + h/2;

                if (stage === 3) { // Warp trails
                    let pk = 600 / this.pz;
                    let px = this.x * pk + w/2;
                    let py = this.y * pk + h/2;
                    ctx.lineWidth = (1 - this.z/w) * 5;
                    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy); ctx.stroke();
                    this.pz = this.z;
                } else if (stage === 4) { // Vortex dots
                    let rx = Math.cos(this.ang) * (this.z/w * w/2) + w/2;
                    let ry = Math.sin(this.ang) * (this.z/w * w/2) + h/2;
                    ctx.beginPath(); ctx.arc(rx, ry, this.size * k * 0.1, 0, Math.PI*2); ctx.fill();
                } else { // Subatomic / Entropia
                    ctx.beginPath(); ctx.arc(sx, sy, this.size * k * 0.1, 0, Math.PI*2); ctx.fill();
                }
            }
        }
    }

    function initParticles() {
        particles = [];
        // Crear red para Planck (20x20 nodos)
        for(let i=0; i<25; i++) {
            for(let j=0; j<25; j++) {
                particles.push(new Particle(i, j));
            }
        }
        // Partículas extra para profundidad
        for(let i=0; i<400; i++) {
            particles.push(new Particle(Math.random()*20, Math.random()*20));
        }
    }

    function loop() {
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(0, 0, w, h);
        if (active) {
            particles.forEach(p => { p.update(); p.draw(); });
        }
        requestAnimationFrame(loop);
    }

    function nextStage() {
        const s = timeline[stage];
        const box = document.getElementById("narrative-box");
        box.style.opacity = 0;
        
        setTimeout(() => {
            document.getElementById("stage-title").innerText = s.t;
            document.getElementById("stage-desc").innerText = s.d;
            document.getElementById("stage-title").style.color = s.color;
            box.style.opacity = 1;
            playTone(s.freq);
            // Flash cinematográfico
            ctx.fillStyle = "white"; ctx.globalAlpha = 0.5; ctx.fillRect(0,0,w,h);
        }, 800);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            nextStage();
        }, s.dur);
    }

    document.getElementById('btn-main-init').addEventListener('click', function() {
        this.style.display = 'none';
        initAudio();
        active = true;
        nextStage();
    });

    resize();
    loop();
</script>
</body>
