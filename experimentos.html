<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Quantum Master Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        :root {
            --planck: #00f2ff;
            --atomic: #ffffff;
            --bio: #39ff14;
            --cosmos: #ffcc00;
            --vortex: #bc13fe;
            --exit: #ff3131;
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; height: 100%; width: 100%;
        }

        #canvas-cosmos { 
            position: fixed; top: 0; left: 0; z-index: 1; 
            filter: contrast(1.2) brightness(1.1);
        }

        /* --- TÍTULO 3D NEÓN --- */
        header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 100%; pointer-events: none;
        }

        .title-3d {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(22px, 6vw, 40px);
            color: #fff; text-transform: uppercase; letter-spacing: 5px;
            /* Profundidad 3D con doble borde neón */
            text-shadow: 
                0 1px 0 #444, 0 2px 0 #333, 0 3px 0 #222,
                0 0 10px var(--planck), 0 0 20px var(--planck), 
                0 0 40px var(--planck);
            -webkit-text-stroke: 1px rgba(255,255,255,0.5);
        }

        /* --- BOTONES ORBES NEÓN --- */
        .ui-panel {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 20px;
        }

        .orb {
            width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 24px;
            background: rgba(0,0,0,0.8); border: 2px solid #fff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            pointer-events: auto; /* Asegura que el clic funcione */
        }

        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 20px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); box-shadow: 0 0 20px var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); box-shadow: 0 0 20px var(--vortex); }

        .orb:hover { transform: scale(1.15) rotate(10deg); filter: brightness(1.4); }
        .orb:active { transform: scale(0.9); }

        /* --- NARRATIVA --- */
        .narrative {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 85%; max-width: 600px;
            background: rgba(0,0,0,0.85); padding: 20px; border-radius: 15px;
            border: 1px solid var(--planck); box-shadow: 0 0 30px rgba(0,242,255,0.2);
        }
        #st-title { font-size: 24px; color: var(--planck); margin: 0; font-weight: bold; text-transform: uppercase; }
        #st-desc { font-size: 15px; color: #ddd; margin-top: 10px; line-height: 1.5; }

        img.logo { position: fixed; top: 20px; left: 20px; width: 70px; z-index: 110; border-radius: 50%; border: 2px solid var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>

<header><div class="title-3d">LAB LUIS QUANTUM</div></header>
<img src="logo.jpg" class="logo" alt="LUIS">

<div class="ui-panel">
    <a href="index.html" class="orb btn-exit">🏠</a>
    <div id="btn-audio" class="orb">🔊</div>
    <a href="index3d.html" class="orb btn-bh">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">INICIALIZANDO</h2>
    <p id="st-desc">Presiona el botón celeste para activar la secuencia cuántica y el sonido.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h;
    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    let stage = 0;
    let entities = [];
    let audioCtx, masterGain;
    let sequenceActive = false;
    let vortexAngle = 0;

    const timeline = [
        { t: "Líneas de Planck", d: "Micro-cuerdas vibrantes a 10⁻³⁵m. El tejido de la realidad no es sólido, es frecuencia pura.", color: "#00f2ff", dur: 10000 },
        { t: "Fisica Atómica", d: "Protones y neutrones forman el núcleo. Electrones y neutrinos danzan en el vacío cuántico.", color: "#ffffff", dur: 12000 },
        { t: "Oxidación Biológica", d: "La vida muere por la entropía. Los radicales libres oxidan las células y el ADN pierde su integridad.", color: "#39ff14", dur: 12000 },
        { t: "Relatividad Estelar", d: "Expansión galáctica a la velocidad de la luz. Los planetas deforman el espacio a su paso.", color: "#ffcc00", dur: 12000 },
        { t: "Desdoblamiento", d: "El universo colapsa. La luz se distorsiona y todo gira hacia el punto cero de Planck.", color: "#bc13fe", dur: 14000 }
    ];

    function playSfx(freq, type, dur) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(masterGain);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w;
            this.size = Math.random() * 3 + 1;
            this.angle = Math.random() * Math.PI * 2;
            this.orbit = Math.random() * 60 + 20;
            this.life = 1;
        }
        draw() {
            ctx.shadowBlur = 0;
            if(stage === 0) { // LÍNEAS DE PLANCK (CUERDAS)
                ctx.strokeStyle = timeline[0].color;
                ctx.lineWidth = 1;
                ctx.beginPath();
                let vibe = Math.sin(Date.now()*0.02 + this.angle) * 20;
                ctx.moveTo(this.x - vibe, this.y);
                ctx.lineTo(this.x + vibe, this.y + 15);
                ctx.stroke();
            } else if(stage === 1) { // ÁTOMO
                ctx.fillStyle = "#ff3131"; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
                let ex = this.x + Math.cos(Date.now()*0.008 + this.angle)*this.orbit;
                let ey = this.y + Math.sin(Date.now()*0.008 + this.angle)*this.orbit;
                ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.arc(ex, ey, 2, 0, Math.PI*2); ctx.fill();
            } else if(stage === 2) { // BIOLOGÍA
                this.life -= 0.002; if(this.life < 0) this.life = 1;
                ctx.fillStyle = this.life > 0.4 ? `rgba(57, 255, 20, ${this.life})` : `rgba(139, 69, 19, ${this.life})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 4 * this.life, 0, Math.PI*2); ctx.fill();
            } else if(stage === 3) { // COSMOS
                let s = w/this.z;
                let px = w/2 + (this.x-w/2)*s; let py = h/2 + (this.y-h/2)*s;
                this.z -= 15; if(this.z < 1) this.z = w;
                let g = ctx.createRadialGradient(px, py, 0, px, py, this.size*s);
                g.addColorStop(0, "#fff"); g.addColorStop(0.3, timeline[3].color); g.addColorStop(1, "transparent");
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(px, py, this.size*s*3, 0, Math.PI*2); ctx.fill();
            } else if(stage === 4) { // VÓRTICE
                this.angle += 0.07; this.orbit *= 0.99;
                this.x = w/2 + Math.cos(this.angle) * this.orbit * 5;
                this.y = h/2 + Math.sin(this.angle) * this.orbit * 5;
                ctx.fillStyle = "rgba(188, 19, 254, 0.6)";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size*2, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    entities = Array.from({ length: 150 }, () => new Particle());

    function loop() {
        if(stage === 4) {
            ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexAngle);
            vortexAngle += 0.01; ctx.globalAlpha = 0.4;
            ctx.drawImage(canvas, -w/2, -h/2); ctx.restore(); ctx.globalAlpha = 1;
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,w,h);
        }
        entities.forEach(e => e.draw());
        requestAnimationFrame(loop);
    }

    function startSequence() {
        if(!sequenceActive) return;
        const cur = timeline[stage];
        document.getElementById("st-title").innerText = cur.t;
        document.getElementById("st-desc").innerText = cur.d;
        document.getElementById("st-title").style.color = cur.color;

        if(stage === 0) playSfx(440, 'sine', 3);
        if(stage === 2) playSfx(220, 'triangle', 4);
        if(stage === 4) playSfx(60, 'square', 8);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { 
                ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); 
                entities.forEach(e => e.init());
            }
            startSequence();
        }, cur.dur);
    }

    // --- ACTIVADOR DE AUDIO Y EVENTOS ---
    document.getElementById('btn-audio').addEventListener('click', function() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            masterGain.gain.value = 0.2;
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        sequenceActive = true;
        this.style.display = 'none'; // Desaparece tras activar
        startSequence();
    });

    loop();
</script>
</body>
</html>
