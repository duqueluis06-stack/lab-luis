<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Cinematic Science Experience</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Laboratorio de física experimental de Lab Luis. Exploración del espacio-tiempo.">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LE6LX7FC2Q"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-LE6LX7FC2Q');
    </script>

    <style>
        :root {
            --neon-main: #00ffcc;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
        }

        body, html {
            margin: 0; padding: 0;
            background: #000; /* Fondo base negro absoluto */
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden;
            height: 100%;
        }

        /* --- MOTOR VISUAL DE FONDO --- */
        #canvas-cosmos {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* --- HEADER Y PRESENTACIÓN --- */
        header {
            position: relative; z-index: 10;
            padding: 30px;
            font-size: 34px;
            font-weight: bold;
            text-align: center;
            background: rgba(0,0,0,0.8);
            border-bottom: 2px solid var(--neon-main);
            text-shadow: 0 0 15px var(--neon-main), 0 0 30px var(--neon-main);
            letter-spacing: 4px;
        }

        img.logo {
            position: relative; z-index: 10;
            width: 180px;
            margin: 20px auto;
            display: block;
            border: 3px solid var(--neon-main);
            border-radius: 15px;
            box-shadow: 0 0 25px var(--neon-main);
        }

        /* --- BOTONERA Y PANEL --- */
        .control-panel {
            position: relative; z-index: 10;
            width: 90%; max-width: 800px;
            margin: 20px auto;
            padding: 25px;
            background: rgba(0, 10, 10, 0.9);
            border: 2px solid var(--neon-main);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            backdrop-filter: blur(10px);
        }

        .panel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .panel-grid a {
            padding: 15px;
            text-decoration: none;
            color: var(--neon-main);
            border: 1px solid var(--neon-main);
            background: rgba(0,0,0,0.7);
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            transition: 0.4s;
            position: relative; overflow: hidden;
        }

        .panel-grid a:hover {
            background: var(--neon-main);
            color: #000;
            box-shadow: 0 0 40px var(--neon-main);
            transform: translateY(-3px);
        }

        /* BOTÓN BLACK HOLE ESTILO HOLLYWOOD */
        .blackhole-btn {
            position: relative; z-index: 10;
            display: block;
            width: fit-content;
            margin: 30px auto;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #000, #bc13fe, #00f2ff);
            background-size: 200% 200%;
            animation: gradientMove 3s infinite alternate;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 0 30px var(--neon-purple);
            border: 2px solid #fff;
            text-transform: uppercase;
            transition: 0.3s;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .blackhole-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 60px var(--neon-purple), 0 0 20px var(--neon-blue);
        }

        /* --- TARJETA DE NARRATIVA CIENTÍFICA --- */
        .narrative-card {
            position: relative; z-index: 10;
            width: 85%; max-width: 700px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(0, 5, 5, 0.95);
            border: 2px solid var(--neon-blue);
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
            border-left: 10px solid var(--neon-blue);
        }

        #stage-title { 
            font-size: 32px; color: var(--neon-blue); margin: 0; 
            text-transform: uppercase; text-shadow: 0 0 10px var(--neon-blue);
        }

        #stage-desc { 
            font-size: 17px; margin-top: 15px; color: #fff; 
            line-height: 1.6; font-family: 'Consolas', monospace;
        }

        #creditos_btn {
            position: fixed; bottom: 15px; right: 15px;
            padding: 10px 15px; background: rgba(0,0,0,0.8);
            border: 1px solid var(--neon-main);
            color: var(--neon-main); border-radius: 5px;
            cursor: pointer; z-index: 100;
        }
    </style>
</head>

<body>

<canvas id="canvas-cosmos"></canvas>

<header>⚡ LAB LUIS – Quantum Engine</header>

<img src="logo.jpg" class="logo" alt="Lab Logo">

<div class="control-panel">
    <div class="panel-grid">
        <a href="index.html">🏠 Inicio</a>
        <a href="proyectos.html">👽 Vórtice</a>
        <a href="laboratorio.html">📝 Pioneros</a>
        <a href="libros.html">📚 KDP Libros</a>
    </div>
</div>

<a href="index3d.html" class="blackhole-btn">🌀 Iniciar Secuencia Black Hole 3D</a>

<div class="narrative-card">
    <h2 id="stage-title">Escala de Planck</h2>
    <p id="stage-desc">Inicializando simulación del tejido espacio-temporal...</p>
</div>

<div id="creditos_btn" onclick="window.location.href='creditos.html'">ⓘ Créditos</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let stage = 0;
    const timeline = [
        { t: "Línea de Planck", d: "Escala 10⁻³⁵m. Aquí el espacio-tiempo es una espuma cuántica. El tiempo no fluye, es una vibración pura de energía neón.", color: "#00f2ff" },
        { t: "Fase Subatómica", d: "Quarks y Leptones aparecen. Los Neutrinos atraviesan mundos sin colisionar. El tiempo adquiere su flecha irreversible.", color: "#ffffff" },
        { t: "Entropía Biológica", d: "¿Por qué envejecemos? Por el desgaste celular y la degradación del ADN. La vida es una lucha contra el desorden del tiempo.", color: "#39ff14" },
        { t: "Estratósfera y Planeta", d: "Saliendo de la Biósfera. La masa de la Tierra curva el tiempo local. La gravedad se vuelve la fuerza dominante.", color: "#00aaff" },
        { t: "Expansión Infinita", d: "Energía Oscura. El Universo se estira más rápido que la luz. Todo se desvanece en un vacío eterno y púrpura.", color: "#bc13fe" }
    ];

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = (Math.random() - 0.5) * 4;
            this.age = 0;
        }
        update() {
            if (stage === 0) { // Planck: Vibración
                this.x += (Math.random() - 0.5) * 12;
                this.y += (Math.random() - 0.5) * 12;
            } else if (stage === 2) { // Vida: Envejecimiento
                this.size += 0.08;
                this.age++;
                if (this.age > 120) this.reset();
            } else if (stage === 4) { // Expansión
                let dx = this.x - canvas.width / 2;
                let dy = this.y - canvas.height / 2;
                this.x += dx * 0.05;
                this.y += dy * 0.05;
                if (this.x < 0 || this.x > canvas.width) this.reset();
            } else {
                this.x += this.vx;
                this.y += this.vy;
            }
            // Bordes
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            ctx.fillStyle = timeline[stage].color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = timeline[stage].color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    let particles = Array.from({ length: 250 }, () => new Particle());

    function loop() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)"; // Efecto de rastro (Motion Blur)
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(loop);
    }

    setInterval(() => {
        stage = (stage + 1) % timeline.length;
        const t = document.getElementById("stage-title");
        const d = document.getElementById("stage-desc");
        t.innerText = timeline[stage].t;
        d.innerText = timeline[stage].d;
        t.style.color = timeline[stage].color;
        
        // Destello de transición
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }, 11000);

    window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    loop();
</script>
</body>
</html>
