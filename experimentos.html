<style>
body {
    background: url('fondo_experimentos.JPG') no-repeat center center fixed;
    background-size: cover;
    color:#00ffcc;
    font-family: Arial, sans-serif;
    text-align:center;

/* HEADER */
header {
    padding:25px;
    background:rgba(0,0,0,0.6);
    border-bottom:1px solid rgba(0,255,204,0.5);
}

header h1 {
    font-size:32px;
    text-shadow:0 0 10px #00ffff;
    animation: glowPulse 3s infinite alternate;
}

@keyframes glowPulse {
  0% { text-shadow:0 0 5px #00ffff; }
  100% { text-shadow:0 0 25px #00ffcc, 0 0 50px #00ffff; }
}

/* LOGO */
img.logo {
    width:200px;
    margin:20px 0;
    border-radius:10px;
    border:2px solid #00ffcc;
}

/* PANEL */
.control-panel {
  margin:20px auto;
  padding:20px;
  width:85%;
  max-width:900px;
  background:rgba(0,0,0,0.75);
  border:1px solid #00ffcc;
  border-radius:12px;
  box-shadow:0 0 20px #00ffcc;
}

.panel-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* BOTONES MENU */
.panel-grid a {
  padding:12px;
  text-decoration:none;
  color:#00ffcc;
  border:1px solid rgba(0,255,204,0.4);
  border-radius:8px;
  background:rgba(0,0,0,0.5);
  position:relative;
  overflow:hidden;
  animation: floatText 2.5s infinite alternate;
}

@keyframes floatText {
  0% { transform: translateY(0); }
  100% { transform: translateY(-3px); }
}

.panel-grid a:hover {
  transform:scale(1.08);
  background:#00ffcc;
  color:#000;
  box-shadow:0 0 25px #00ffcc;
}

.panel-grid a::before {
  content:"";
  position:absolute;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.7),transparent);
  transition:0.5s;
}

.panel-grid a:hover::before {
  left:100%;
}

/* BLACK HOLE */
.blackhole-btn {
  display:inline-block;
  margin:15px;
  padding:14px 22px;
  font-weight:bold;
  background:linear-gradient(45deg,#00ffcc,#00aaff);
  color:#000;
  border-radius:12px;
  text-decoration:none;
  position:relative;
  overflow:hidden;
  animation:pulse 2s infinite alternate;
}

@keyframes pulse {
  0% { box-shadow:0 0 10px #00ffcc; }
  100% { box-shadow:0 0 40px #00aaff; }
}

.blackhole-btn::after {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background:radial-gradient(circle,rgba(255,255,255,0.2),transparent);
  animation:spin 6s linear infinite;
}

@keyframes spin {
  from { transform:rotate(0deg); }
  to { transform:rotate(360deg); }
}

/* VIDEO */
.video-card {
    margin:40px auto;
    padding:20px;
    width:80%;
    max-width:800px;
    border:1px solid rgba(0,255,204,0.5);
    border-radius:12px;
    background:rgba(0,0,0,0.65);
}

.video-card iframe {
    width:100%;
    height:400px;
    border-radius:10px;
}

.video-card h2, .video-card h3 {
    animation: textExpand 3s infinite alternate;
}

@keyframes textExpand {
  from { letter-spacing:1px; }
  to { letter-spacing:3px; }
}

/* CRÉDITOS */
