<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LAB LUIS - Quantum Swirl Engine</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --neon:#00ffcc;
    --void:#bc13fe;
    --planck:#00f2ff;
}

body,html{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:Segoe UI;
}

/* CANVAS */
#canvas-cosmos{
    position:fixed;
    top:0;
    left:0;
}

/* HEADER 3D */
header{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:100;
    pointer-events:none;
}

.title-3d{
    font-size:28px;
    font-weight:900;
    letter-spacing:6px;
    color:#fff;
    text-shadow:
    0 1px 0 #ccc,
    0 2px 0 #999,
    0 10px 20px rgba(0,255,204,0.4);
}

/* CONTROLES (NO TAPAN EL TÍTULO) */
.controls{
    position:fixed;
    top:80px;
    right:15px;
    z-index:90;
    display:flex;
    flex-direction:column;
    gap:10px;
}

button,a{
    font-size:11px;
    padding:10px 14px;
    border-radius:20px;
    border:1px solid #fff;
    background:rgba(0,0,0,0.4);
    color:#fff;
    text-decoration:none;
}

#audio{
    background:var(--neon);
    color:#000;
}

/* INFO */
.info{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    color:#aaa;
    text-align:center;
    z-index:50;
}

h2{color:var(--planck); margin:0;}
</style>
</head>

<body>

<canvas id="canvas-cosmos"></canvas>

<header>
<div class="title-3d">LAB LUIS QUANTUM</div>
</header>

<div class="controls">
<button id="audio">🔊 AUDIO</button>
<a href="index3d.html">🌀 BLACK HOLE</a>
</div>

<div class="info">
<h2 id="t">INICIALIZANDO</h2>
<p id="d">Flujo interdimensional estable...</p>
</div>

<script>
const c=document.getElementById("canvas-cosmos");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let stage=0;
let audio, gain;

const timeline=[
{t:"Planck",c:"#00f2ff"},
{t:"Expansión",c:"#fff"},
{t:"Torsión",c:"#bc13fe"},
{t:"Desdoblamiento",c:"#ff3131"}
];

class P{
constructor(){this.reset();}
reset(){
this.x=Math.random()*c.width;
this.y=Math.random()*c.height;
this.vx=(Math.random()-0.5)*2;
this.vy=(Math.random()-0.5)*2;
this.a=Math.random()*Math.PI*2;
this.d=0;
}
update(){
let cx=c.width/2;
let cy=c.height/2;

if(stage===0){
this.x+=(cx-this.x)*0.05;
this.y+=(cy-this.y)*0.05;
}

if(stage===1){
this.x+=this.vx;
this.y+=this.vy;
}

if(stage===2){
this.a+=0.05;
this.x+=(cx-this.x)*0.03;
this.y+=(cy-this.y)*0.03;
this.x+=Math.cos(this.a)*2;
this.y+=Math.sin(this.a)*2;
}

if(stage===3){
let dx=cx-this.x;
let dy=cy-this.y;
let dist=Math.sqrt(dx*dx+dy*dy);

this.a+=0.2;

// 🌪️ remolino fuerte
this.x+=dx*0.02 - dy*0.08;
this.y+=dy*0.02 + dx*0.08;

// colapso suave
this.x+=Math.cos(this.a)*3;
this.y+=Math.sin(this.a)*3;

if(dist<5){
this.reset();
}
}
}

draw(){
ctx.fillStyle=timeline[stage].c;
ctx.beginPath();
ctx.arc(this.x,this.y,2,0,Math.PI*2);
ctx.fill();
}
}

let ps=Array.from({length:180},()=>new P());

function loop(){
ctx.fillStyle=stage===3?"rgba(0,0,0,0.15)":"rgba(0,0,0,0.25)";
ctx.fillRect(0,0,c.width,c.height);

ps.forEach(p=>{p.update();p.draw();});

requestAnimationFrame(loop);
}

/* AUDIO AVANZADO */
function audioInit(){
audio=new (window.AudioContext||webkitAudioContext)();
gain=audio.createGain();
gain.connect(audio.destination);
gain.gain.value=0.2;

let osc=audio.createOscillator();
osc.type="sine";
osc.frequency.value=55;
osc.connect(gain);
osc.start();

document.getElementById("audio").style.display="none";
}

function fx(type){
if(!audio)return;

let o=audio.createOscillator();
let g=audio.createGain();
o.connect(g);g.connect(gain);

if(type==="swirl"){
o.type="sawtooth";
o.frequency.setValueAtTime(80,audio.currentTime);
o.frequency.exponentialRampToValueAtTime(1200,audio.currentTime+2);
}

if(type==="collapse"){
o.frequency.setValueAtTime(300,audio.currentTime);
o.frequency.exponentialRampToValueAtTime(20,audio.currentTime+3);
}

g.gain.value=0.3;
g.gain.exponentialRampToValueAtTime(0.01,audio.currentTime+3);

o.start();o.stop(audio.currentTime+3);
}

function cycle(){
stage=(stage+1)%4;

if(stage===2) fx("swirl");
if(stage===3) fx("collapse");

document.getElementById("t").innerText=timeline[stage].t;
document.getElementById("d").innerText="Estado cuántico activo...";
}

document.getElementById("audio").onclick=audioInit;

setInterval(cycle,9000);
loop();

onresize=()=>{
c.width=innerWidth;
c.height=innerHeight;
};
</script>

</body>
</html>
