<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - QUANTUM CINEMATIC vFINAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        :root {
            --planck: #00f2ff; --atomic: #fff; --bio: #39ff14;
            --cosmos: #ffcc00; --vortex: #bc13fe; --exit: #ff3131;
        }

        body, html { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; height: 100%; width: 100%; 
            font-family: 'Segoe UI', sans-serif;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* --- TÍTULO 3D REFORZADO --- */
        header {
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            z-index: 50; text-align: center; width: 100%; pointer-events: none;
        }
        .title-3d {
            font-family: 'Orbitron', sans-serif; font-weight: 900; 
            font-size: clamp(24px, 7vw, 50px);
            color: #fff; text-transform: uppercase; letter-spacing: 8px;
            /* Efecto de profundidad real */
            text-shadow: 
                0 1px 0 #444, 0 2px 0 #444, 0 3px 0 #333, 0 4px 0 #333, 0 5px 0 #222,
                0 0 20px var(--planck), 0 10px 30px rgba(0,0,0,0.8);
            -webkit-text-stroke: 1px rgba(255,255,255,0.2);
        }

        /* --- PANEL DE ORBES (Bajados para no tapar el título) --- */
        .ui-panel { 
            position: fixed; top: 20px; right: 20px; z-index: 1000; 
            display: flex; flex-direction: row; gap: 15px; 
        }
        .orb {
            width: 60px; height: 60px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 24px; 
            background: rgba(0,0,0,0.8); border: 2px solid #fff;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 25px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); box-shadow: 0 0 20px var(--vortex); }
        .orb:hover { transform: scale(1.1); filter: brightness(1.3); }

        /* NARRATIVA */
        .narrative {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 85%; max-width: 650px;
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 15px;
            border: 2px solid var(--planck);
        }
        #st-title { font-size: 22px; color: var(--planck); margin: 0; text-transform: uppercase; }
        #st-desc { font-size: 14px; color: #ccc; margin-top: 10px; line-height: 1.5; }

        img.logo { position: fixed; top: 20px; left: 20px; width: 65px; z-index: 110; border-radius: 50%; border: 2px solid var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LAB LUIS QUANTUM</div></header>
<img src="logo.jpg" class="logo" alt="LUIS">

<div class="ui-panel">
    <a href="index.html" class="orb btn-exit">🏠</a>
    <div id="btn-audio" class="orb">🔊</div>
    <a href="index3d.html" class="orb btn-bh">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">LABORATORIO LUIS</h2>
    <p id="st-desc">Pulsa el botón de sonido para activar los osciladores cuánticos y el desdoblamiento.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, particles = [], audioCtx, masterGain, active = false, vortexAngle = 0;

    const timeline = [
        { t: "Líneas de Planck", d: "Cuerdas vibratorias a 10⁻³⁵m. Frecuencia pura en el tejido espacial.", color: "#00f2ff", dur: 10000, freq: 440, wave: 'sine' },
        { t: "Fragua Atómica", d: "Ensamblaje de nucleones. Electrones y neutrinos en equilibrio.", color: "#ffffff", dur: 12000, freq: 330, wave: 'triangle' },
        { t: "Oxidación Bio", d: "Pérdida de energía. Las células se hinchan, pierden su color y se oxidan.", color: "#39ff14", dur: 12000, freq: 220, wave: 'sine' },
        { t: "Expansión Estelar", d: "Fuga galáctica. Relieve estelar deformando la métrica del espacio.", color: "#ffcc00", dur: 12000, freq: 110, wave: 'sawtooth' },
        { t: "Desdoblamiento", d: "¡COLAPSO! Espejismo cuántico. El universo gira y se nubla hacia el origen.", color: "#bc13fe", dur: 15000, freq: 60, wave: 'square' }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w; this.size = Math.random() * 4 + 2;
            this.angle = Math.random() * Math.PI * 2; this.orbit = Math.random() * 100 + 40;
            this.life = 1.0;
        }
        draw() {
            if (stage === 0) { // PLANCK HD
                ctx.strokeStyle = `rgba(0, 242, 255, ${Math.random()})`;
                ctx.lineWidth = 1; ctx.beginPath();
                let v = Math.sin(Date.now() * 0.05 + this.x) * 40;
                ctx.moveTo(this.x, 0); ctx.lineTo(this.x + v, h); ctx.stroke();
            } else if (stage === 2) { // BIO OXIDACIÓN
                this.life -= 0.003; if(this.life < 0) this.life = 1;
                let r = 50 + (1-this.life)*205, g = 255 * this.life;
                ctx.fillStyle = `rgba(${r}, ${g}, 50, ${this.life})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size * (1.6 - this.life) * 5, 0, Math.PI*2); ctx.fill();
            } else if (stage === 4) { // DESDOBLAMIENTO FINAL
                this.angle += 0.25; this.orbit *= 0.99;
                this.x = w/2 + Math.cos(this.angle) * this.orbit * 9;
                this.y = h/2 + Math.sin(this.angle) * this.orbit * 9;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.ellipse(this.x, this.y, this.size*15, this.size*2, this.angle, 0, Math.PI*2); ctx.fill();
            } else { // ÁTOMOS / COSMOS
                ctx.fillStyle = timeline[stage].color;
                ctx.shadowBlur = 10; ctx.shadowColor = timeline[stage].color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
    }

    particles = Array.from({ length: 140 }, () => new Particle());

    function playSound(freq, type) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
        osc.connect(gain); gain.connect(masterGain);
        osc.start(); osc.stop(audioCtx.currentTime + 3);
    }

    function loop() {
        if (stage === 4) {
            ctx.fillStyle = "rgba(0,0,0,0.06)"; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexAngle);
            vortexAngle += 0.15; ctx.globalAlpha = 0.4; ctx.filter = "blur(8px) contrast(1.4)";
            ctx.drawImage(canvas, -w/2, -h/2); ctx.restore();
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        if (active) particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function run() {
        const s = timeline[stage];
        document.getElementById("st-title").innerText = s.t;
        document.getElementById("st-title").style.color = s.color;
        document.getElementById("st-desc").innerText = s.d;
        playSound(s.freq, s.wave);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { 
                ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); 
                particles.forEach(p => p.init());
            }
            run();
        }, s.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        active = true; this.style.display = 'none';
        run();
    });

    loop();
</script>
</body>
</html>
