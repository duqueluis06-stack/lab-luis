<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - EXPERIMENTAL CORE V4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LE6LX7FC2Q"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-LE6LX7FC2Q');
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
        
        :root {
            --planck: #00f2ff;
            --bio: #39ff14;
            --vortex: #bc13fe;
            --exit: #ff3131;
            --star: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; height: 100%; width: 100%; 
            font-family: 'Orbitron', sans-serif;
            color: #fff;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; filter: contrast(1.2) brightness(1.1); }

        /* --- TÍTULO COMPACTO NEÓN --- */
        header {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            z-index: 60; text-align: center; pointer-events: none;
        }
        .title-3d {
            font-weight: 900; font-size: 24px; color: #fff; 
            text-transform: uppercase; letter-spacing: 6px;
            text-shadow: 0 0 10px var(--planck), 0 0 20px rgba(0,242,255,0.5);
            background: rgba(0,0,0,0.6); padding: 8px 25px; border-radius: 50px;
            border: 1px solid rgba(0, 242, 255, 0.4);
            backdrop-filter: blur(5px);
        }

        /* --- UI DISTRIBUIDA (IZQUIERDA / DERECHA) --- */
        .panel-left { position: fixed; top: 20px; left: 20px; z-index: 1000; }
        .panel-right { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 12px; }

        .orb {
            width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 20px; 
            background: rgba(0,0,0,0.85); border: 2px solid #fff;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        .btn-exit { border-color: var(--exit); color: var(--exit); }
        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 20px var(--planck); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); }
        .orb:hover { transform: scale(1.1) rotate(10deg); filter: brightness(1.3); }

        /* --- NARRATIVA MINIMALISTA ABAJO --- */
        .narrative-card {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 85%; max-width: 450px;
            background: rgba(0,5,5,0.9); padding: 15px 20px; border-radius: 40px;
            border: 1px solid var(--planck); box-shadow: 0 0 30px rgba(0,242,255,0.2);
            backdrop-filter: blur(15px); pointer-events: none;
        }
        #stage-title { font-size: 16px; color: var(--planck); margin: 0; letter-spacing: 3px; text-shadow: 0 0 10px var(--planck); }
        #stage-desc { font-size: 11px; color: #ddd; margin-top: 5px; font-family: sans-serif; line-height: 1.4; }
        
        img.logo { position: fixed; top: 85px; left: 20px; width: 55px; z-index: 110; border-radius: 50%; border: 1px solid var(--planck); opacity: 0.6; }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>

<header><div class="title-3d">LUIS QUANTUM</div></header>

<img src="logo.jpg" class="logo" alt="Lab Luis">

<div class="panel-left">
    <a href="index.html" class="orb btn-exit" title="Inicio">🏠</a>
</div>

<div class="panel-right">
    <div id="btn-audio" class="orb" title="Activar Sonido">🔊</div>
    <a href="index3d.html" class="orb btn-bh" title="Singularidad 3D">🌀</a>
</div>

<div class="narrative-card">
    <h2 id="stage-title">SISTEMA STANDBY</h2>
    <p id="stage-desc">Pulsa el orbe 🔊 para iniciar el desdoblamiento experimental.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, particles = [], audioCtx, masterGain, active = false, vortexAngle = 0;

    const timeline = [
        { t: "Líneas de Planck", d: "Escala 10⁻³⁵m. Vibración pura de energía cuántica en el tejido base.", color: "#00f2ff", dur: 10000, f: 523, wave: 'sine' },
        { t: "Fragua Atómica", d: "Formación de materia con relieve. Neutrones y Quarks en equilibrio.", color: "#ffffff", dur: 12000, f: 392, wave: 'triangle' },
        { t: "Oxidación Bio", d: "Apoptosis celular. La membrana vibra y se fragmenta bajo el desgaste del tiempo.", color: "#39ff14", dur: 12000, f: 261, wave: 'sine' },
        { t: "Expansión Warp", d: "Velocidad Luz. Estrellas vectoriales deforman el espacio en fuga galáctica.", color: "#ffcc00", dur: 14000, f: 130, wave: 'sawtooth' },
        { t: "Desdoblamiento", d: "Singularidad: El universo se espeja y empaña en el colapso final.", color: "#bc13fe", dur: 20000, f: 65, wave: 'square' }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w; this.size = Math.random() * 3 + 1;
            this.angle = Math.random() * Math.PI * 2; this.orbit = Math.random() * 150 + 50;
            this.life = 1.0; this.speed = Math.random() * 25 + 15;
        }
        draw() {
            if (stage === 0) { // PLANCK
                ctx.strokeStyle = `rgba(0, 242, 255, ${Math.random()*0.8})`;
                ctx.lineWidth = 1; ctx.beginPath();
                let v = Math.tan(Date.now() * 0.02 + this.x) * 20;
                ctx.moveTo(this.x, 0); ctx.lineTo(this.x + v, h); ctx.stroke();
            } else if (stage === 2) { // BIO OXIDACIÓN VIBRANTE
                this.life -= 0.004; if(this.life < 0) this.life = 1;
                let vib = Math.sin(Date.now()*0.1)*5;
                ctx.fillStyle = `rgba(${60+(1-this.life)*190}, ${255*this.life}, 50, ${this.life})`;
                ctx.beginPath(); ctx.ellipse(this.x + vib, this.y, this.size*15*(1.5-this.life), this.size*8, 0, 0, Math.PI*2); ctx.fill();
            } else if (stage === 3) { // WARP ESTRELLAS REALISTAS
                let sc = w/this.z; let px = w/2 + (this.x-w/2)*sc, py = h/2 + (this.y-h/2)*sc;
                this.z -= this.speed; if(this.z < 1) this.z = w;
                let x2 = w/2 + (this.x-w/2)*(w/(this.z+this.speed*0.8));
                let y2 = h/2 + (this.y-h/2)*(w/(this.z+this.speed*0.8));
                ctx.strokeStyle = `rgba(255, 204, 0, ${sc/15})`;
                ctx.lineWidth = sc; ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x2, y2); ctx.stroke();
            } else if (stage === 4) { // SINGULARIDAD DESDOBLAMIENTO
                this.angle += 0.35; this.orbit *= 0.985;
                let dx = w/2 + Math.cos(this.angle) * this.orbit * 12;
                let dy = h/2 + Math.sin(this.angle) * this.orbit * 12;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.ellipse(dx, dy, this.size*30, this.size*1.5, this.angle, 0, Math.PI*2); ctx.fill();
            } else { // ATOMIC / DEFAULT
                ctx.fillStyle = timeline[stage].color;
                ctx.shadowBlur = 10; ctx.shadowColor = timeline[stage].color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
    }

    particles = Array.from({ length: 180 }, () => new Particle());

    function playAudio(f, wtype) {
        if(!audioCtx) return;
        let o = audioCtx.createOscillator(); let g = audioCtx.createGain();
        o.type = wtype; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0.12, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 4);
        o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime + 4);
    }

    function loop() {
        if (stage === 4) {
            ctx.fillStyle = "rgba(255,255,255,0.04)"; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexAngle);
            vortexAngle += 0.25; ctx.globalAlpha = 0.5;
            ctx.filter = `blur(12px) contrast(1.5) hue-rotate(${vortexAngle*5}deg)`;
            ctx.drawImage(canvas, -w/2-10, -h/2-10, w+20, h+20); ctx.restore();
        } else {
            ctx.fillStyle = `rgba(0,0,0,${stage === 3 ? 0.15 : 0.25})`; 
            ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        if (active) particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function step() {
        const s = timeline[stage];
        document.getElementById("stage-title").innerText = s.t;
        document.getElementById("stage-desc").innerText = s.d;
        document.getElementById("stage-title").style.color = s.color;
        playAudio(s.f, s.wave);
        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); particles.forEach(p => p.init()); }
            step();
        }, s.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        active = true; this.style.display = 'none'; step();
    });

    loop();
</script>
</body>
</html>
