<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Universal Space-Time Chronicle (Cinema Version)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Simulación cinemática del espacio-tiempo. Laboratorio LUIS.">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LE6LX7FC2Q"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-LE6LX7FC2Q');

    <style>
        /* Tipografías de Ciencia Ficción: Orbitron para títulos, Roboto Mono para datos */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Roboto+Mono:wght@300;700&display=swap');
        
        :root {
            /* Paleta de Neón Cinemática */
            --neon-cyan: #00f2ff;
            --neon-green: #39ff14;
            --neon-purple: #bc13fe;
            --neon-main: #00ffcc;
            --neon-gold: #ffcc00;
            --neon-red: #ff3131;
            --bg-dark: #000000;
            --ui-bg: rgba(0, 5, 5, 0.7);
            --transition-speed: 0.6s;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            overflow: hidden;
            height: 100%; width: 100%;
            -webkit-font-smoothing: antialiased;
        }

        /* --- POST-PROCESADO CINEMÁTICO (BLOOM Y VIÑETA) --- */
        /* La viñeta enfoca la mirada en el centro y da profundidad */
        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.9) 120%);
            z-index: 5; pointer-events: none;
        }

        /* El bloom hace que las luces neón 'sangren' sobre el negro */
        canvas {
            position: fixed; top: 0; left: 0;
            z-index: 1;
            filter: blur(0.5px) contrast(1.1) brightness(1.1); /* Efecto Bloom suave */
        }

        /* --- INTERFAZ PERIFÉRICA (MINIMALISTA) --- */
        
        /* 1. TÍTULO (Centro Superior, Compacto) */
        header {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            pointer-events: none;
            text-align: center;
        }

        .cinema-title { 
            font-family: 'Orbitron', sans-serif;
            font-weight: 400; /* Fino y elegante */
            font-size: clamp(14px, 2vw, 18px);
            text-transform: uppercase;
            letter-spacing: 10px; /* Mucho espacio entre letras */
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0.9;
        }

        /* 2. GRUPO IZQUIERDO: LOGO Y INICIO (ORB CIRCULAR) */
        .ui-left-group {
            position: fixed; top: 30px; left: 30px;
            z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            gap: 20px;
        }

        img.logo {
            width: 70px; height: 70px;
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
            transition: var(--transition-speed);
            object-fit: cover;
        }
        img.logo:hover { transform: scale(1.05); border-color: var(--neon-cyan); box-shadow: 0 0 25px var(--neon-cyan); }

        .orb-btn {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        /* Efecto Neón Cian para Inicio */
        .orb-start { border-color: rgba(0, 242, 255, 0.2); color: rgba(0, 242, 255, 0.6); }
        .orb-start:hover { 
            transform: scale(1.1) translateY(-5px); 
            border-color: var(--neon-cyan); 
            color: #fff; 
            box-shadow: 0 0 25px var(--neon-cyan);
            text-shadow: 0 0 5px #fff;
        }

        /* 3. GRUPO DERECHO: BLACK HOLE (ORB NEÓN PULSANTE) */
        .ui-right-group {
            position: fixed; top: 30px; right: 30px;
            z-index: 100;
        }

        .orb-blackhole {
            border-color: rgba(188, 19, 254, 0.3);
            color: var(--neon-purple);
            font-size: 24px;
            background: radial-gradient(circle at center, rgba(0,0,0,0.8) 30%, rgba(188, 19, 254, 0.15) 100%);
            animation: orb-pulse 2s infinite alternate; /* Pulsación orgánica */
        }
        .orb-blackhole:hover {
            transform: scale(1.15) rotate(15deg);
            border-color: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 30px var(--neon-purple), 0 0 15px var(--neon-cyan);
        }

        @keyframes orb-pulse {
            0% { box-shadow: 0 0 15px rgba(188, 19, 254, 0.2); border-color: rgba(188, 19, 254, 0.3); }
            100% { box-shadow: 0 0 30px rgba(188, 19, 254, 0.5); border-color: rgba(188, 19, 254, 0.6); }
        }

        /* 4. TARJETA NARRATIVA (Abajo Centro, Elegante) */
        .narrative-card {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            width: 80%; max-width: 650px;
            background: var(--ui-bg);
            border-top: 1px solid rgba(0, 242, 255, 0.3); /* Borde neón sutil */
            padding: 25px;
            border-radius: 15px;
            z-index: 80;
            backdrop-filter: blur(15px); /* Desenfoque de fondo cinemático */
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: opacity 1s, transform 1s;
        }

        #stage-title { 
            font-family: 'Orbitron', sans-serif;
            font-size: 26px; font-weight: 900;
            color: var(--neon-cyan); margin: 0; 
            text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 0 0 15px var(--neon-cyan);
        }

        #stage-desc { 
            font-size: 13px; font-weight: 300;
            margin-top: 12px; color: rgba(255,255,255,0.7); 
            line-height: 1.8; letter-spacing: 1px;
            font-family: 'Roboto Mono', monospace;
        }

        /* BOTÓN GIGANTE INICIAL (Cubre pantalla) */
        #btn-main-init {
            position: fixed; inset: 0; z-index: 2000;
            background: var(--bg-dark); color: var(--neon-main);
            border: none; font-family: 'Orbitron'; font-size: 18px;
            letter-spacing: 15px; font-weight: 400; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            text-transform: uppercase;
            transition: all 1s;
        }
        #btn-main-init:hover { background: #010808; text-shadow: 0 0 25px var(--neon-main); color: #fff; }

        /* CRÉDITOS (Minimalistas, Derecha Inferior) */
        #creditos_btn {
            position: fixed; bottom: 15px; right: 20px;
            padding: 5px 10px; background: transparent;
            border: none; color: rgba(255,255,255,0.2); 
            cursor: pointer; z-index: 100; font-size: 10px;
            font-family: 'Roboto Mono', monospace; letter-spacing: 1px;
        }
        #creditos_btn:hover { color: var(--neon-main); }
    </style>
</head>

<body>

<button id="btn-main-init">INICIAR SISTEMA QUÁNTICO</button>

<div class="vignette"></div>
<canvas id="canvas-cosmos"></canvas>

<header><div class="cinema-title">LUIS QUANTUM CHRONICLE</div></header>

<div class="ui-left-group">
    <img src="logo.jpg" class="logo" alt="Lab Logo">
    <a href="index.html" class="orb-btn orb-start" title="Volver al Inicio">🏠</a>
</div>

<div class="ui-right-group">
    <a href="index3d.html" class="orb-btn orb-blackhole" title="Secuencia Black Hole 3D">🌀</a>
</div>

<div class="narrative-card" id="narrative-box" style="opacity: 0; transform: translate(-50%, 20px);">
    <h2 id="stage-title">...</h2>
    <p id="stage-desc">...</p>
</div>

<div id="creditos_btn" onclick="window.location.href='creditos.html'">ⓘ INFO</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, particles = [], active = false;
    
    // Configuración de Audio
    let audioCtx, mainGain, reverbConvolver;

    // Timeline de la Crónica Universal
    const timeline = [
        { t: "Línea de Planck", d: "Escala 10⁻³⁵m. El tejido fundamental vibrando en frecuencias neón puras. Caos cuántico elemental.", color: "#00f2ff", dur: 10000, freqBase: 440, freqHar: 880 },
        { t: "Fase Subatómica", d: "Quarks y gluones emergen del vacío. La flecha del tiempo comienza su marcha irreversible.", color: "#ffffff", dur: 10000, freqBase: 330, freqHar: 660 },
        { t: "Entropía Vital", d: "La vida lucha contra el desorden acumulando errores. El tiempo biológico es una cuenta regresiva vital.", color: "#39ff14", dur: 10000, freqBase: 220, freqHar: 440 },
        { t: "Expansión Warp", d: "Velocidad Luz superada. Dilatación temporal extrema. El espacio se curva mientras aceleramos hacia las estrellas.", color: "#ffcc00", dur: 12000, freqBase: 110, freqHar: 220 },
        { t: "Singularidad", d: "Colapso total gravitacional. Más allá del horizonte de sucesos, las leyes de la física se desintegran en el infinito.", color: "#bc13fe", dur: 15000, freqBase: 55, freqHar: 110 }
    ];

    // Ajustar Canvas a pantalla completo
    const resize = () => { 
        w = canvas.width = window.innerWidth; 
        h = canvas.height = window.innerHeight; 
        ctx.lineCap = 'round'; // Líneas más suaves
    };
    window.addEventListener('resize', resize); resize();

    // --- SISTEMA DE AUDIO SINFÓNICO ---
    function initAudio() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mainGain = audioCtx.createGain();
            mainGain.connect(audioCtx.destination);
            mainGain.gain.setValueAtTime(0.08, audioCtx.currentTime); // Volumen general bajo
        } catch(e) { console.log("Web Audio no soportado"); }
    }

    function playQuantumSynth(baseFreq, harFreq) {
        if(!audioCtx) return;
        const now = audioCtx.currentTime;
        
        // Oscilador Principal (Onda Sinusoidal profunda)
        const osc1 = audioCtx.createOscillator();
        const g1 = audioCtx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(baseFreq, now);
        osc1.frequency.exponentialRampToValueAtTime(baseFreq * 0.9, now + 4);
        g1.gain.setValueAtTime(0, now);
        g1.gain.linearRampToValueAtTime(0.1, now + 0.1);
        g1.gain.exponentialRampToValueAtTime(0.001, now + 5);
        
        // Oscilador Armónico (Onda Triangular más brillante)
        const osc2 = audioCtx.createOscillator();
        const g2 = audioCtx.createGain();
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(harFreq, now);
        g2.gain.setValueAtTime(0, now);
        g2.gain.linearRampToValueAtTime(0.03, now + 0.5);
        g2.gain.exponentialRampToValueAtTime(0.001, now + 4);

        osc1.connect(g1); g1.connect(mainGain);
        osc2.connect(g2); g2.connect(mainGain);
        
        osc1.start(now); osc1.stop(now + 5);
        osc2.start(now); osc2.stop(now + 5);
    }

    // --- CLASE PARTÍCULA QUÁNTICA (CON PROFUNDIDAD DE CAMPO) ---
    class Particle {
        constructor() { this.init(true); }
        init(firstTime = false) {
            // Posición X,Y relativa al centro
            this.x = Math.random() * w - w/2;
            this.y = Math.random() * h - h/2;
            // Profundidad Z: w es cerca, 1 es lejos
            this.z = firstTime ? Math.random() * w : w; 
            this.pz = this.z; // Z anterior para Warp
            this.baseSize = Math.random() * 1.5 + 0.5;
            this.angle = Math.random() * Math.PI * 2;
            this.speed = Math.random() * 0.2 + 0.1;
        }

        update() {
            if (stage === 3) { // Modo Warp: Aceleración extrema
                this.z -= 30; 
            } else if (stage === 4) { // Modo Singularidad: Vórtice Gravitacional
                this.angle += 0.03;
                // Atracción al centro (reducción de Z y radio)
                this.z *= 0.985; 
                this.speed += 0.01; // Aceleración
            } else { // Deriva normal
                this.z -= this.speed * 2;
                this.angle += 0.002;
            }

            // Resetear partícula si sobrepasa la cámara o llega al fondo
            if (this.z < 1) this.init();
        }

        draw() {
            let s = timeline[stage];
            
            // Factor de perspectiva (Depth of Field)
            // 0 = muy lejos (oscuro, borroso), 1 = muy cerca (brillante, nítido)
            let perspective = 1 - (this.z / w); 
            
            // Proyección 3D a 2D
            // El factor '600' simula la distancia focal
            let k = 600 / this.z;
            let sx = this.x * k + w/2;
            let sy = this.y * k + h/2;
            
            // No dibujar si está fuera de la pantalla (optimización)
            if (sx < 0 || sx > w || sy < 0 || sy > h) return;

            // Estilo visual basado en la Profundidad
            let alpha = perspective * perspective; // Desvanecimiento no lineal
            let size = this.baseSize * k * perspective; // Más grandes cerca
            
            ctx.fillStyle = s.color;
            ctx.strokeStyle = s.color;
            ctx.globalAlpha = alpha;

            if (stage === 3) { // DIBUJO MODO WARP: Estelas de Luz (Light Trails)
                let pk = 600 / this.pz; // Factor K anterior
                let px = this.x * pk + w/2;
                let py = this.y * pk + h/2;
                
                // Grosor de la línea basado en la cercanía
                ctx.lineWidth = size * 0.5; 
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(sx, sy);
                ctx.stroke();
                this.pz = this.z; // Actualizar Z anterior

            } else { // DIBUJO MODO NORMAL: Puntos Luminosos
                ctx.beginPath();
                // Simulación de desenfoque DoF sutil usando sombra
                ctx.shadowBlur = perspective * 15; 
                ctx.shadowColor = s.color;
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0; // Reset sombra para rendimiento
            }
        }
    }

    // Inicializar Pool de Partículas (Más cantidad para efecto cine)
    particles = Array.from({ length: 800 }, () => new Particle());

    // --- BUCLE DE RENDERIZADO PRINCIPAL (60 FPS) ---
    function loop() {
        // Efecto de rastro cinemático (Motion Blur)
        // Fondo negro casi opaco. En Warp, rastro más largo (menos opacidad).
        ctx.fillStyle = stage === 3 ? "rgba(0,0,0,0.3)" : "rgba(0,0,0,0.2)";
        ctx.globalAlpha = 1; // Asegurar opacidad del fondo
        ctx.fillRect(0, 0, w, h);

        if (active) {
            particles.forEach(p => {
                p.update();
                p.draw();
            });
        }
        requestAnimationFrame(loop);
    }

    // --- MOTOR NARRATIVO Y DE SECUENCIA ---
    function sequence() {
        const s = timeline[stage];
        const box = document.getElementById("narrative-box");
        
        // Ocultar tarjeta (Fade Out)
        box.style.opacity = 0;
        box.style.transform = "translate(-50%, 20px)";
        
        // Esperar al desvanecimiento antes de cambiar contenido
        setTimeout(() => {
            document.getElementById("stage-title").innerText = s.t;
            document.getElementById("stage-desc").innerText = s.d;
            document.getElementById("stage-title").style.color = s.color;
            document.getElementById("stage-title").style.textShadow = `0 0 15px ${s.color}`;
            // Borde superior de la tarjeta cambia de color sutilmente
            box.style.borderTopColor = `rgba(${parseInt(s.color.slice(1,3),16)}, ${parseInt(s.color.slice(3,5),16)}, ${parseInt(s.color.slice(5,7),16)}, 0.3)`;
            
            // Mostrar tarjeta (Fade In y Desplazamiento hacia arriba)
            box.style.opacity = 1;
            box.style.transform = "translate(-50%, 0px)";
            
            // Efectos Sonoros Quánticos
            playQuantumSynth(s.freqBase, s.freqHar);
            
            // DESTELLO CINEMÁTICO DE CAMBIO DE FASE
            // Un fogonazo blanco puro instantáneo que se desvanece
            ctx.fillStyle = "white"; 
            ctx.globalAlpha = 0.8;
            ctx.fillRect(0,0,w,h);
        }, 600); // Coincide con la velocidad de transición CSS

        // Programar siguiente etapa
        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            sequence();
        }, s.dur);
    }

    // --- GESTOR DE INICIO (PANTALLA COMPLETA) ---
    document.getElementById('btn-main-init').addEventListener('click', function() {
        // Fade out y eliminación de la pantalla de inicio
        this.style.opacity = '0';
        setTimeout(() => this.remove(), 1000);
        
        initAudio(); // Activar audio obligatoriamente por evento de usuario
        active = true;
        sequence(); // Iniciar la crónica
    });

    // Iniciar bucle gráfico (antes que la secuencia)
    loop();
</script>
</body>
</html>
