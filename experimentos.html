<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Cosmic Engine MASTER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="canonical" href="https://duquemartini.com/experimentos.html">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        :root {
            --planck: #00f2ff;
            --atomic: #ffffff;
            --bio: #39ff14;
            --cosmos: #ffcc00;
            --vortex: #bc13fe;
            --exit: #ff3131;
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; height: 100%; width: 100%;
        }

        #canvas-cosmos { position: fixed; top: 0; left: 0; z-index: 1; filter: contrast(1.1) brightness(1.1); }

        /* --- UI PANEL BLINDADO --- */
        header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 100%; pointer-events: none;
        }

        .title-3d {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(20px, 6vw, 38px);
            color: #fff; text-transform: uppercase; letter-spacing: 6px;
            text-shadow: 
                0 1px 0 #444, 0 4px 0 #111,
                0 0 15px var(--planck), 0 0 40px var(--planck);
            -webkit-text-stroke: 1px rgba(255,255,255,0.3);
        }

        .ui-panel {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 20px;
        }

        .orb {
            width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 26px;
            background: rgba(0,0,0,0.8); border: 2.5px solid #fff;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            pointer-events: auto;
        }

        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 25px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); box-shadow: 0 0 25px var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); box-shadow: 0 0 25px var(--vortex); }

        .orb:hover { transform: scale(1.15) rotate(15deg); filter: brightness(1.3); }

        /* NARRATIVA */
        .narrative {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 85%; max-width: 650px;
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 15px;
            border: 2px solid var(--planck); box-shadow: 0 0 40px rgba(0,242,255,0.2);
        }
        #st-title { font-size: 24px; color: var(--planck); margin: 0; text-transform: uppercase; }
        #st-desc { font-size: 14px; color: #ccc; margin-top: 10px; line-height: 1.5; }

        img.logo { position: fixed; top: 20px; left: 20px; width: 70px; z-index: 110; border-radius: 50%; border: 2px solid var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LAB LUIS MASTER</div></header>
<img src="logo.jpg" class="logo" alt="LUIS">

<div class="ui-panel">
    <a href="index.html" class="orb btn-exit" title="Inicio">🏠</a>
    <div id="btn-audio" class="orb" title="Activar Sistema">🔊</div>
    <a href="index3d.html" class="orb btn-bh" title="Black Hole 3D">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">SISTEMA INICIALIZADO</h2>
    <p id="st-desc">Pulsa el orbe de sonido para iniciar la secuencia cinematográfica del cosmos.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h;
    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    let stage = 0;
    let particles = [];
    let audioCtx, masterGain;
    let sequenceActive = false;
    let vortexAngle = 0;
    let collapseGlitch = 0;

    const timeline = [
        { t: "Micro-Filamentos de Planck", d: "Microscopio Cuántico: Cuerdas vibrando a ultra-alta frecuencia (10⁻³⁵m) definiendo la geometría espacial.", color: "#00f2ff", dur: 12000 },
        { t: "Forja Atómica PRO", d: "Protones, Neutrones y Quarks texturizados. Los neutrinos fantasmales cruzan el vacío.", color: "#ffffff", dur: 14000 },
        { t: "Física de Oxidación Celular", d: "Entropía Biológica: Las células pierden energía cinética, se expanden y se oxidan (marrón texturizado) hasta morir.", color: "#39ff14", dur: 16000 },
        { t: "Relatividad Estelar", d: "Expansión Galáctica Cinematic. Planetas y estrellas con relieve y 'lens flare' deforman el espacio.", color: "#ffcc00", dur: 16000 },
        { t: "Desdoblamiento Final", d: "¡Colapso Spielberg! El espacio-tiempo sufre distorsión de lente y un remolino translúcido a velocidad warp.", color: "#bc13fe", dur: 18000 }
    ];

    class QuantumObject {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w;
            this.vx = (Math.random() - 0.5) * 5; this.vy = (Math.random() - 0.5) * 5;
            this.size = Math.random() * 3 + 1;
            this.angle = Math.random() * Math.PI * 2;
            this.orbit = Math.random() * 90 + 30;
            this.life = 1.0;
            this.hue = Math.random() * 30; // Para planetas texturizados
        }
        draw() {
            ctx.shadowBlur = 0;
            if(stage === 0) { // PLANCK: FILAMENTOS DE ULTRA-ALTA FRECUENCIA
                ctx.strokeStyle = `rgba(0, 242, 255, ${0.5 + Math.random()*0.5})`;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                // Aberración cromática simulada
                for(let i=0; i<3; i++) {
                    let vibe = Math.sin(Date.now()*0.05 + this.angle + i)*50;
                    ctx.moveTo(this.x + i*2, 0); 
                    ctx.bezierCurveTo(this.x+vibe, h/2, this.x-vibe, h/2, this.x + i*2, h);
                }
                ctx.stroke();
            } else if(stage === 1) { // ÁTOMO TEXTURIZADO
                ctx.fillStyle = "#ff2d55"; ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x+2, this.y-2, 2, 0, Math.PI*2); ctx.fill(); // Relieve núcleo
                for(let i=0; i<3; i++) {
                    let rot = Date.now()*0.007 + this.angle + (i*2);
                    let ex = this.x + Math.cos(rot)*(this.orbit + i*8);
                    let ey = this.y + Math.sin(rot)*(this.orbit + i*8);
                    ctx.fillStyle = i===0 ? "#00f2ff" : "#fff";
                    ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI*2); ctx.fill();
                }
            } else if(stage === 2) { // BIOLOGÍA: PÉRDIDA DE ENERGÍA Y EXPANSIÓN
                this.life -= 0.0025; if(this.life < 0) this.life = 1;
                let vibe = this.life * 10; // Células jóvenes vibran rápido, viejas lento
                this.x += (Math.random()-0.5) * vibe;
                this.y += (Math.random()-0.5) * vibe;
                let scale = 1.3 - this.life; // Se expanden al morir
                let r = 50 + (1-this.life)*210; let g = 255 * this.life; let b = 50 + (1-this.life)*40;
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.life})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size*6*scale, 0, Math.PI*2); ctx.fill();
                // Textura óxido
                if(this.life < 0.4 && Math.random() > 0.8) {
                    ctx.fillStyle = "rgba(139, 69, 19, 0.5)";
                    ctx.fillRect(this.x-10, this.y-10, 20, 20);
                }
            } else if(stage === 3) { // COSMOS CINEMATIC (PLANETAS Y ESTRELLAS CON RELIEVE)
                let s = w/this.z;
                let px = w/2 + (this.x-w/2)*s; let py = h/2 + (this.y-h/2)*s;
                this.z -= 25; if(this.z < 1) this.z = w;
                // Planeta con gradiente gaseoso
                let g = ctx.createRadialGradient(px, py, 0, px, py, this.size*s*4);
                g.addColorStop(0, "#fff"); g.addColorStop(0.2, `hsl(${timeline[3].color}, 100%, 70%)`); g.addColorStop(1, "transparent");
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(px, py, this.size*s*5, 0, Math.PI*2); ctx.fill();
                // Anamorphic Lens Flare simulado
                if(this.size > 2) {
                    ctx.fillStyle = "rgba(255,255,255,0.05)"; ctx.fillRect(0, py-2, w, 4);
                }
            } else if(stage === 4) { // VÓRTICE / DESDOBLAMIENTO (ESPEJISMO DISTORSIONADO)
                this.angle += 0.25; this.orbit *= 0.985;
                let dist = this.orbit * 9;
                this.x = w/2 + Math.cos(this.angle) * dist;
                this.y = h/2 + Math.sin(this.angle) * dist;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); 
                // Deformación cuántica (elipse estirada)
                ctx.ellipse(this.x, this.y, this.size*20, this.size*2, this.angle, 0, Math.PI*2);
                ctx.fill();
            }
        }
    }

    particles = Array.from({ length: isMobile ? 80 : 150 }, () => new QuantumObject());

    function loop() {
        if(stage === 4) {
            // Efecto cinematográfico de colapso (nublado, giratorio, translúcido)
            ctx.fillStyle = "rgba(0,0,0,0.06)"; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexAngle);
            vortexAngle += 0.2; // Velocidad warp
            ctx.globalAlpha = 0.4; ctx.filter = "blur(8px) contrast(1.5)"; // Efecto nublado espejado
            ctx.drawImage(canvas, -w/2, -h/2); ctx.restore();
            // Glitch final de pre-reinicio
            if(Math.random() > 0.96) { ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); }
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function startSequence() {
        if(!sequenceActive) return;
        const cur = timeline[stage];
        document.getElementById("st-title").innerText = cur.t;
        document.getElementById("st-desc").innerText = cur.d;
        document.getElementById("st-title").style.color = cur.color;

        const playSfx = (f, t, d) => {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime + d);
        };

        if(stage === 0) playSfx(523, 'sine', 3);
        if(stage === 3) playSfx(110, 'sawtooth', 5);
        if(stage === 4) playSfx(50, 'square', 12);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); particles.forEach(p => p.init()); }
            startSequence();
        }, cur.dur);
    }

    // --- PANEL DE CONTROL BLINDADO ---
    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        sequenceActive = true; this.style.display = 'none';
        startSequence();
    });

    loop();
</script>
</body>
</html>
