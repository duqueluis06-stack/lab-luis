<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Quantum Bounce Engine</title>
    
    <meta name="description" content="Simulación de universo cíclico y rebote cuántico interdimensional. Experimentos de Lab Luis.">
    <link rel="canonical" href="https://duquemartini.com/experimentos.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        :root {
            --neon-main: #00ffcc;
            --neon-purple: #bc13fe;
            --neon-blue: #00f2ff;
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; height: 100%; width: 100%;
        }

        #canvas-cosmos { position: fixed; top: 0; left: 0; z-index: 1; }

        /* INTERFAZ PERIFÉRICA */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 15px; font-size: clamp(14px, 4vw, 22px);
            text-align: center; background: rgba(0,0,0,0.8);
            border-bottom: 1px solid var(--neon-main);
            letter-spacing: 4px; text-shadow: 0 0 10px var(--neon-main);
        }

        img.logo {
            position: fixed; top: 60px; left: 15px;
            width: clamp(60px, 10vw, 100px); z-index: 100;
            border: 2px solid var(--neon-main); border-radius: 8px;
            box-shadow: 0 0 15px var(--neon-main);
        }

        .control-panel {
            position: fixed; top: 180px; left: 15px; z-index: 100;
            background: rgba(0,15,15,0.8); padding: 10px;
            border: 1px solid var(--neon-main); border-radius: 10px;
        }

        .panel-grid { display: flex; flex-direction: column; gap: 8px; }
        .panel-grid a {
            padding: 8px 12px; text-decoration: none; color: var(--neon-main);
            border: 1px solid rgba(0,255,204,0.3); font-size: 11px;
            text-transform: uppercase; border-radius: 5px; transition: 0.3s;
        }
        .panel-grid a:hover { background: var(--neon-main); color: #000; box-shadow: 0 0 15px var(--neon-main); }

        .blackhole-btn {
            position: fixed; top: 70px; right: 15px; z-index: 100;
            padding: 12px 20px; font-size: 11px; font-weight: bold;
            background: linear-gradient(45deg, #000, #bc13fe);
            border: 2px solid #fff; border-radius: 25px; color: #fff;
            text-decoration: none; box-shadow: 0 0 15px var(--neon-purple);
        }

        .narrative-card {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 600px; background: rgba(0,5,5,0.9);
            border-left: 5px solid var(--neon-blue); padding: 20px;
            z-index: 100; pointer-events: none; border-radius: 0 10px 10px 0;
        }

        #stage-title { font-size: 22px; color: var(--neon-blue); margin: 0; text-transform: uppercase; }
        #stage-desc { font-size: 14px; margin-top: 5px; color: #ccc; }

        /* BOTÓN DE AUDIO (REQUERIDO POR NAVEGADORES) */
        #audio-trigger {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1000; padding: 20px 40px; background: var(--neon-main);
            color: #000; font-weight: bold; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 30px var(--neon-main);
        }
    </style>
</head>
<body>

<button id="audio-trigger">ACTIVAR SISTEMA CUÁNTICO (AUDIO)</button>
<canvas id="canvas-cosmos"></canvas>

<header>⚡ LAB LUIS – Quantum Cicles</header>
<img src="logo.jpg" class="logo" alt="Lab Luis">

<div class="control-panel">
    <div class="panel-grid">
        <a href="index.html">🏠 Inicio</a>
        <a href="proyectos.html">👽 Vórtice</a>
        <a href="laboratorio.html">📝 Pioneros</a>
        <a href="libros.html">📚 Libros</a>
    </div>
</div>

<a href="index3d.html" class="blackhole-btn">🌀 BLACK HOLE 3D</a>

<div class="narrative-card">
    <h2 id="stage-title">Escala de Planck</h2>
    <p id="stage-desc">Inicializando tejido interdimensional...</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    const isMobile = window.innerWidth < 768;

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let stage = 0;
    let particles = [];
    let audioCtx, masterGain;

    // --- SISTEMA DE AUDIO (SYNTH) ---
    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        masterGain.gain.value = 0.1;
        document.getElementById('audio-trigger').style.display = 'none';
        playHum(200, 'sine', 0.05); // Hum de fondo
    }

    function playHum(freq, type, vol) {
        let osc = audioCtx.createOscillator();
        let g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        osc.connect(g);
        g.connect(masterGain);
        osc.start();
        return {osc, g};
    }

    function playImpact() {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let g = audioCtx.createGain();
        osc.frequency.setTargetAtTime(40, audioCtx.currentTime, 0.1);
        g.gain.setValueAtTime(0.5, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
        osc.connect(g); g.connect(masterGain);
        osc.start(); osc.stop(audioCtx.currentTime + 1);
    }

    const timeline = [
        { t: "Línea de Planck", d: "10⁻³⁵m. El universo es una cuerda interdimensional vibrante.", color: "#00f2ff" },
        { t: "Fase Subatómica", d: "Materia neón en formación. El tiempo fluye.", color: "#ffffff" },
        { t: "Entropía Biológica", d: "Vida y muerte. El desgaste del ADN consume la luz.", color: "#39ff14" },
        { t: "Expansión Crítica", d: "La relatividad estira el espacio hasta chocar con el horizonte.", color: "#bc13fe" },
        { t: "REBOTE INTERDIMENSIONAL", d: "¡Impacto con la pantalla espectral! Colapso y retorno a Planck.", color: "#ff3131" }
    ];

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = (Math.random() - 0.5) * 4;
            this.active = true;
        }
        update() {
            if (stage === 0) { // Planck: Vibración lineal
                this.x += (Math.random() - 0.5) * 10;
                this.y = (canvas.height/2) + (Math.random() - 0.5) * 20; 
            } else if (stage === 3) { // Expansión violenta
                let dx = this.x - canvas.width/2;
                let dy = this.y - canvas.height/2;
                this.x += dx * 0.08; this.y += dy * 0.08;
                if(this.x < 0 || this.x > canvas.width) this.reset();
            } else if (stage === 4) { // El Choque
                this.x += (canvas.width/2 - this.x) * 0.2;
                this.y += (canvas.height/2 - this.y) * 0.2;
            } else {
                this.x += this.vx; this.y += this.vy;
            }
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            ctx.fillStyle = timeline[stage].color;
            if(!isMobile) { ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle; }
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    particles = Array.from({ length: isMobile ? 70 : 150 }, () => new Particle());

    function loop() {
        ctx.fillStyle = stage === 4 ? "rgba(255, 255, 255, 0.3)" : "rgba(0, 0, 0, 0.2)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }

    function changeStage() {
        stage = (stage + 1) % timeline.length;
        if(stage === 4) { // Momento del choque
            playImpact();
            setTimeout(() => { 
                stage = 0; // Reinicio inmediato tras el impacto
                updateUI();
            }, 1500); 
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById("stage-title").innerText = timeline[stage].t;
        document.getElementById("stage-desc").innerText = timeline[stage].d;
        document.getElementById("stage-title").style.color = timeline[stage].color;
    }

    document.getElementById('audio-trigger').addEventListener('click', initAudio);
    setInterval(changeStage, 10000);
    loop();
</script>
</body>
</html>
