<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LAB LUIS - Universal Engine + Black Hole</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://duquemartini.com/experimentos.html">

<style>
body,html{
margin:0;padding:0;
overflow:hidden;background:#000;
font-family:Segoe UI;
}

canvas{position:fixed;top:0;left:0}

header{
position:fixed;top:15px;left:50%;
transform:translateX(-50%);
z-index:10;
color:#fff;
text-shadow:0 0 20px #00f2ff;
}

#title{font-size:26px;letter-spacing:5px}

.ui{
position:fixed;top:20px;right:20px;
z-index:20;
display:flex;flex-direction:column;gap:12px;
}

.btn{
width:60px;height:60px;
border-radius:50%;
display:flex;align-items:center;justify-content:center;
background:#000;border:2px solid #fff;
color:#fff;cursor:pointer;
}

#home{border-color:#ff3131;color:#ff3131}
#audio{border-color:#00f2ff;color:#00f2ff}
#bh{border-color:#bc13fe;color:#bc13fe}

.panel{
position:fixed;bottom:25px;left:50%;
transform:translateX(-50%);
color:#ccc;text-align:center;width:80%;
}

h2{margin:0;font-size:20px}
p{font-size:13px}
</style>
</head>

<body>

<canvas id="c"></canvas>

<header><div id="title">LAB LUIS ENGINE</div></header>

<div class="ui">
<a class="btn" id="home" href="index.html">🏠</a>
<div class="btn" id="audio">🔊</div>
<a class="btn" id="bh" href="index3d.html">🌀</a>
</div>

<div class="panel">
<h2 id="t">Inicializando</h2>
<p id="d">Campo cuántico en estado base.</p>
</div>

<script>
const c=document.getElementById("c");
const x=c.getContext("2d");

let w,h;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener("resize",rs);rs();

let stage=0;
let audioCtx,gain;

/* 🌌 partículas universales */
class P{
constructor(){
this.reset();
}
reset(){
this.x=Math.random()*w;
this.y=Math.random()*h;
this.z=Math.random()*w;
this.a=Math.random()*Math.PI*2;
this.life=1;
}
draw(){

// PLANCK FIELD
if(stage===0){
x.fillStyle="#00f2ff";
x.fillRect(this.x,this.y,1,1);
}

// ATOMOS
if(stage===1){
x.fillStyle="#fff";
x.beginPath();
x.arc(this.x,this.y,2,0,7);
x.fill();
}

// BIOLOGIA
if(stage===2){
this.life-=0.002;
x.fillStyle=`rgba(57,255,20,${this.life})`;
x.beginPath();
x.arc(this.x,this.y,3,0,7);
x.fill();
}

// EXPANSION
if(stage===3){
this.z-=8;
if(this.z<1)this.z=w;
let s=w/this.z;
let px=w/2+(this.x-w/2)*s;
let py=h/2+(this.y-h/2)*s;
x.fillStyle="#ffcc00";
x.beginPath();
x.arc(px,py,2*s,0,7);
x.fill();
}

// 🌀 BLACK HOLE (GRAVEDAD REAL SIMULADA)
if(stage===4){
let dx=this.x-w/2;
let dy=this.y-h/2;
let dist=Math.sqrt(dx*dx+dy*dy)+0.001;

// fuerza gravitacional
let force=120/dist;

this.x-=dx*force*0.02;
this.y-=dy*force*0.02;

// espiral
let ang=Math.atan2(dy,dx)+0.1;
this.x=w/2+Math.cos(ang)*dist*0.9;
this.y=h/2+Math.sin(ang)*dist*0.9;

x.fillStyle="rgba(188,19,254,0.8)";
x.beginPath();
x.arc(this.x,this.y,2,0,7);
x.fill();

// horizonte evento
x.strokeStyle="#bc13fe";
x.beginPath();
x.arc(w/2,h/2,60,0,7);
x.stroke();
}
}
}

let pts=Array.from({length:220},()=>new P());

function loop(){
x.fillStyle="rgba(0,0,0,0.25)";
x.fillRect(0,0,w,h);
pts.forEach(p=>p.draw());
requestAnimationFrame(loop);
}
loop();

/* 🔊 audio */
function tone(f){
if(!audioCtx)return;
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.frequency.value=f;
g.gain.value=0.1;
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+3);
o.connect(g);g.connect(gain);
o.start();o.stop(audioCtx.currentTime+3);
}

/* 🎬 ciclo */
function cycle(){

let t=[
["Planck","Fluctuación base"],
["Átomo","Materia estable"],
["Vida","Entropía activa"],
["Expansión","Universo relativista"],
["Black Hole","Colapso gravitacional total"]
];

document.getElementById("t").innerText=t[stage][0];
document.getElementById("d").innerText=t[stage][1];

if(stage===0)tone(500);
if(stage===2)tone(220);
if(stage===4)tone(40);

setTimeout(()=>{
stage=(stage+1)%5;
cycle();
},12000);
}

/* 🔊 init */
document.getElementById("audio").onclick=()=>{
audioCtx=new AudioContext();
gain=audioCtx.createGain();
gain.connect(audioCtx.destination);
document.getElementById("audio").style.display="none";
cycle();
}
</script>

</body>
</html>
