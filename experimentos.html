<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Universal Cycle Engine</title>
    
    <meta name="description" content="Simulación de universo cíclico interdimensional. Rebote cuántico y expansión cinemática.">
    <link rel="canonical" href="https://duquemartini.com/experimentos.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        :root {
            --neon: #00ffcc;
            --void: #bc13fe;
            --planck: #00f2ff;
            --glass: rgba(0, 5, 5, 0.7);
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            color: #fff; font-family: 'Orbitron', 'Segoe UI', sans-serif;
            overflow: hidden; height: 100%; width: 100%;
        }

        #canvas-cosmos { position: fixed; top: 0; left: 0; z-index: 1; }

        /* --- INTERFAZ NO INTRUSIVA (ESQUINAS) --- */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 10px; font-size: 14px; text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            letter-spacing: 5px; color: var(--neon); pointer-events: none;
        }

        img.logo {
            position: fixed; top: 15px; left: 15px;
            width: 70px; z-index: 110; border-radius: 5px;
            border: 1px solid var(--neon); opacity: 0.8;
        }

        /* Botones de navegación compactos en la parte superior izquierda */
        .nav-container {
            position: fixed; top: 100px; left: 15px; z-index: 110;
            display: flex; flex-direction: column; gap: 5px;
        }

        .nav-link {
            padding: 6px 12px; font-size: 10px; text-decoration: none;
            color: var(--neon); border: 1px solid rgba(0, 255, 204, 0.2);
            background: var(--glass); border-radius: 3px;
            text-transform: uppercase; transition: 0.3s;
        }
        .nav-link:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        /* Botón Black Hole y Activador Audio (Esquina Superior Derecha) */
        .top-right-group {
            position: fixed; top: 15px; right: 15px; z-index: 110;
            display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
        }

        .btn-exp {
            padding: 10px 20px; font-size: 11px; font-weight: bold;
            border: 1px solid #fff; border-radius: 20px; text-decoration: none;
            text-transform: uppercase; cursor: pointer; transition: 0.4s;
        }

        #audio-init { background: var(--neon); color: #000; border: none; }
        .bh-link { background: linear-gradient(45deg, #000, var(--void)); color: #fff; border-color: var(--void); }

        /* Narrativa en la base */
        .narrative-box {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 500px; z-index: 100;
            border-bottom: 2px solid var(--planck); padding: 15px;
            text-align: center; background: rgba(0,0,0,0.5); pointer-events: none;
        }
        #stage-title { font-size: 20px; color: var(--planck); margin: 0; letter-spacing: 3px; }
        #stage-desc { font-size: 12px; color: #aaa; margin-top: 5px; line-height: 1.4; }

        @media (max-width: 768px) {
            .nav-container { top: 15px; left: auto; right: 15px; transform: translateY(120px); }
            .top-right-group { top: 10px; right: 10px; }
            img.logo { width: 50px; }
        }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>

<header>LUIS QUANTUM LAB</header>

<img src="logo.jpg" class="logo" alt="Lab Luis">

<div class="nav-container">
    <a href="index.html" class="nav-link">🏠 Inicio</a>
    <a href="proyectos.html" class="nav-link">👽 Vórtice</a>
    <a href="laboratorio.html" class="nav-link">📝 Pioneros</a>
    <a href="libros.html" class="nav-link">📚 Libros</a>
</div>

<div class="top-right-group">
    <button id="audio-init" class="btn-exp">🔊 ACTIVAR AUDIO</button>
    <a href="index3d.html" class="btn-exp bh-link">🌀 BLACK HOLE 3D</a>
</div>

<div class="narrative-box">
    <h2 id="stage-title">INICIALIZANDO</h2>
    <p id="stage-desc">Sincronizando flujos interdimensionales...</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    const isMobile = window.innerWidth < 768;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let stage = 0;
    let particles = [];
    let audioCtx, masterGain, lowOsc, noiseGen;

    // --- MOTOR DE AUDIO AVANZADO (4 TIPOS) ---
    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        masterGain.gain.value = 0.15;
        
        // 1. Hum de fondo (Deep Space)
        playDrone(60, 'sine', 0.1);
        // 2. Ondas Cuánticas (Subatómico)
        playDrone(110, 'triangle', 0.05);
        
        document.getElementById('audio-init').style.display = 'none';
    }

    function playDrone(freq, type, vol) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        osc.connect(g); g.connect(masterGain);
        osc.start();
    }

    function triggerSfx(type) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(masterGain);

        if(type === 'bounce') { // Estruendo de impacto
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 1.5);
            g.gain.setValueAtTime(0.6, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
        } else if(type === 'warp') { // Sonido de expansión
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(40, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 2);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
        }
        osc.start(); osc.stop(audioCtx.currentTime + 2);
    }

    const timeline = [
        { t: "Línea de Planck", d: "Materia primordial alineada en la dimensión cero.", color: "#00f2ff" },
        { t: "Crecimiento Estelar", d: "Formación de núcleos galácticos y sistemas complejos.", color: "#ffffff" },
        { t: "Horizonte de Eventos", d: "La gravedad colapsa. El tiempo se estira al límite.", color: "#bc13fe" },
        { t: "REBOTE CUÁNTICO", d: "Impacto con la pantalla espectral. Colapso hacia el origen.", color: "#ff3131" }
    ];

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 3 + 1;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
            this.color = timeline[0].color;
        }
        update() {
            if (stage === 0) { // Línea de Planck (Efecto Interdimensional)
                this.y += (canvas.height / 2 - this.y) * 0.1;
                this.x += (Math.random() - 0.5) * 20;
                if(this.x < 0 || this.x > canvas.width) this.x = Math.random() * canvas.width;
            } else if (stage === 1) { // Estrellas con rastro
                this.x += this.vx; this.y += this.vy;
            } else if (stage === 2) { // Expansión violenta
                let dx = this.x - canvas.width/2;
                let dy = this.y - canvas.height/2;
                this.x += dx * 0.07; this.y += dy * 0.07;
                if(Math.abs(dx) > canvas.width || Math.abs(dy) > canvas.height) this.reset();
            } else if (stage === 3) { // El Choque (Succión)
                this.x += (canvas.width/2 - this.x) * 0.15;
                this.y += (canvas.height/2 - this.y) * 0.15;
            }
        }
        draw() {
            ctx.shadowBlur = isMobile ? 0 : 15;
            ctx.shadowColor = timeline[stage].color;
            ctx.fillStyle = timeline[stage].color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    particles = Array.from({ length: isMobile ? 80 : 250 }, () => new Particle());

    function loop() {
        // Estela cinematográfica
        ctx.fillStyle = stage === 3 ? "rgba(255, 255, 255, 0.4)" : "rgba(0, 0, 0, 0.15)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(loop);
    }

    function runCycle() {
        stage = (stage + 1) % timeline.length;
        
        if(stage === 2) triggerSfx('warp');
        if(stage === 3) {
            triggerSfx('bounce');
            setTimeout(() => { stage = 0; updateUI(); }, 1800);
        }
        
        updateUI();
    }

    function updateUI() {
        const t = document.getElementById("stage-title");
        const d = document.getElementById("stage-desc");
        t.innerText = timeline[stage].t;
        d.innerText = timeline[stage].d;
        t.style.color = timeline[stage].color;
    }

    document.getElementById('audio-init').addEventListener('click', initAudio);
    setInterval(runCycle, 10000);
    loop();

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>
</body>
</html>
