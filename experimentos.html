<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LAB LUIS - Cosmic Cycle Stable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body,html{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:Segoe UI;
}

#canvas-cosmos{
    position:fixed;
    top:0;
    left:0;
}

/* HEADER */
header{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    z-index:100;
    pointer-events:none;
}

.title{
    font-size:26px;
    font-weight:900;
    color:#fff;
    letter-spacing:6px;
    text-shadow:0 0 20px #00ffcc;
}

/* CONTROLES */
.controls{
    position:fixed;
    top:20px;
    right:20px;
    z-index:200;
    display:flex;
    flex-direction:column;
    gap:10px;
}

button,a{
    padding:10px 14px;
    font-size:11px;
    border-radius:20px;
    border:1px solid #fff;
    background:rgba(0,0,0,0.5);
    color:#fff;
    text-decoration:none;
    cursor:pointer;
}

/* SALIDA SEGURA */
.exit{
    background:#ff3131;
    border-color:#ff3131;
    font-weight:bold;
}

/* INFO */
.info{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    color:#aaa;
    width:80%;
}

h2{margin:0;color:#00f2ff;}
</style>
</head>

<body>

<canvas id="canvas-cosmos"></canvas>

<header>
<div class="title">LAB LUIS QUANTUM</div>
</header>

<div class="controls">
<button id="audio">🔊 AUDIO</button>
<a href="index3d.html">🌀 BLACK HOLE</a>
<a class="exit" href="index.html">⛔ SALIR</a>
</div>

<div class="info">
<h2 id="t">INICIALIZANDO</h2>
<p id="d">Campo estable...</p>
</div>

<script>
const c=document.getElementById("canvas-cosmos");
const ctx=c.getContext("2d");

let w,h;
function resize(){
    w=c.width=innerWidth;
    h=c.height=innerHeight;
}
resize();
onresize=resize;

let stage=0;
let audioCtx, masterGain;

/* AUDIO */
function initAudio(){
    audioCtx=new (window.AudioContext||webkitAudioContext)();
    masterGain=audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
    masterGain.gain.value=0.2;

    let osc=audioCtx.createOscillator();
    osc.type="sine";
    osc.frequency.value=55;
    osc.connect(masterGain);
    osc.start();

    document.getElementById("audio").style.display="none";

    cycle();
}

function sound(type){
    if(!audioCtx) return;

    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();

    o.connect(g);
    g.connect(masterGain);

    if(type==="warp"){
        o.type="sawtooth";
        o.frequency.setValueAtTime(120,audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(900,audioCtx.currentTime+2);
    }

    if(type==="collapse"){
        o.type="square";
        o.frequency.setValueAtTime(500,audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(30,audioCtx.currentTime+3);
    }

    if(type==="vortex"){
        o.type="triangle";
        o.frequency.setValueAtTime(200,audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(40,audioCtx.currentTime+4);
    }

    g.gain.setValueAtTime(0.3,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+3);

    o.start();
    o.stop(audioCtx.currentTime+4);
}

/* PARTICULAS */
class P{
constructor(){this.reset();}

reset(){
    this.x=Math.random()*w;
    this.y=Math.random()*h;

    this.angle=Math.random()*Math.PI*2;
    this.radius=Math.random()*Math.min(w,h);
    this.spin=Math.random()*0.02+0.01;

    this.vx=(Math.random()-0.5)*2;
    this.vy=(Math.random()-0.5)*2;
}

update(){
    const cx=w/2, cy=h/2;

    if(stage===0){
        this.x+=(cx-this.x)*0.08;
        this.y+=(cy-this.y)*0.08;
    }

    if(stage===1){
        this.x+=this.vx;
        this.y+=this.vy;
    }

    if(stage===2){
        this.angle+=this.spin;
        this.radius*=0.99;

        this.x=cx+Math.cos(this.angle)*this.radius;
        this.y=cy+Math.sin(this.angle)*this.radius;
    }
}

draw(){
    ctx.fillStyle =
        stage===0?"#00f2ff":
        stage===1?"#ffffff":
        "#bc13fe";

    ctx.beginPath();
    ctx.arc(this.x,this.y,2,0,Math.PI*2);
    ctx.fill();
}
}

let ps=Array.from({length:220},()=>new P());

/* LOOP */
function loop(){
    ctx.fillStyle=stage===2?"rgba(0,0,0,0.08)":"rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,w,h);

    ps.forEach(p=>{p.update();p.draw();});

    requestAnimationFrame(loop);
}
loop();

/* CICLO SEGURO */
function cycle(){

    stage=(stage+1)%3;

    if(stage===1) sound("warp");
    if(stage===2) sound("vortex");

    document.getElementById("t").innerText=
    stage===0?"PLANCK":
    stage===1?"EXPANSIÓN":
    "VÓRTICE";

    document.getElementById("d").innerText=
    stage===0?"Estado inicial estable":
    stage===1?"Expansión del sistema":
    "Remolino gravitacional";

    setTimeout(cycle,9000);
}

document.getElementById("audio").onclick=initAudio;

/* ESCAPE EXTRA (SEGURIDAD) */
window.addEventListener("keydown",(e)=>{
    if(e.key==="Escape"){
        window.location.href="index.html";
    }
});
</script>

</body>
</html>
