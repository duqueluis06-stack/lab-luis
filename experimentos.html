    <style>
        :root {
            --neon-main: #00ffcc;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-glass: rgba(0, 10, 10, 0.8);
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100%; width: 100%;
            touch-action: none; /* Evita zooms accidentales en móvil */
        }

        /* FONDO INTERACTIVO */
        #canvas-cosmos {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* --- INTERFAZ RESPONSIVA --- */

        /* Logo adaptable */
        img.logo {
            position: fixed; top: 15px; left: 15px;
            width: 80px; z-index: 100;
            border: 2px solid var(--neon-main);
            border-radius: 8px;
            box-shadow: 0 0 15px var(--neon-main);
        }

        /* Título superior central */
        header {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 90; padding: 10px;
            font-size: 16px; font-weight: bold;
            text-align: center; background: rgba(0,0,0,0.7);
            border-bottom: 1px solid var(--neon-main);
            letter-spacing: 2px; text-transform: uppercase;
        }

        /* Panel de navegación (Lado Izquierdo) */
        .control-panel {
            position: fixed; top: 110px; left: 15px;
            z-index: 100; width: 140px;
            background: var(--bg-glass);
            border: 1px solid var(--neon-main);
            border-radius: 10px; padding: 10px;
            backdrop-filter: blur(5px);
        }

        .panel-grid { display: flex; flex-direction: column; gap: 8px; }

        .panel-grid a {
            padding: 8px; text-decoration: none;
            color: var(--neon-main); border: 1px solid rgba(0,255,204,0.3);
            border-radius: 5px; font-size: 11px; font-weight: bold;
            text-align: center; transition: 0.3s;
            text-transform: uppercase;
        }

        .panel-grid a:hover { background: var(--neon-main); color: #000; box-shadow: 0 0 15px var(--neon-main); }

        /* Botón Black Hole (Derecha Superior) */
        .blackhole-btn {
            position: fixed; top: 50px; right: 15px;
            z-index: 100; padding: 12px 20px;
            font-size: 12px; font-weight: bold; color: #fff;
            background: linear-gradient(45deg, #000, #bc13fe);
            border: 2px solid #fff; border-radius: 25px;
            text-decoration: none; text-transform: uppercase;
            box-shadow: 0 0 15px var(--neon-purple);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--neon-purple); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px var(--neon-purple); }
            100% { transform: scale(1); box-shadow: 0 0 10px var(--neon-purple); }
        }

        /* Narrativa (Abajo) */
        .narrative-card {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); width: 90%; max-width: 600px;
            background: rgba(0, 5, 5, 0.9);
            border-left: 5px solid var(--neon-blue);
            padding: 15px; border-radius: 0 10px 10px 0;
            z-index: 100; pointer-events: none;
        }

        #stage-title { font-size: 18px; color: var(--neon-blue); margin: 0; text-transform: uppercase; }
        #stage-desc { font-size: 13px; margin-top: 5px; color: #ccc; line-height: 1.4; }

        /* AJUSTES PARA PC (Pantallas grandes) */
        @media (min-width: 768px) {
            img.logo { width: 120px; top: 25px; left: 25px; }
            header { font-size: 24px; padding: 15px; }
            .control-panel { top: 180px; left: 25px; width: 180px; padding: 15px; }
            .panel-grid a { font-size: 13px; padding: 12px; }
            .blackhole-btn { top: 30px; right: 30px; font-size: 15px; padding: 15px 30px; }
            #stage-title { font-size: 28px; }
            #stage-desc { font-size: 16px; }
            .narrative-card { bottom: 40px; padding: 25px; }
        }

        /* Créditos */
        #creditos_btn {
            position: fixed; bottom: 10px; right: 10px;
            padding: 5px 10px; background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-main);
            color: var(--neon-main); border-radius: 5px;
            z-index: 101; font-size: 10px; cursor: pointer;
        }
    </style>
</head>

<body>

<canvas id="canvas-cosmos"></canvas>

<header>⚡ LAB LUIS – QUANTUM ENGINE</header>

<img src="logo.jpg" class="logo" alt="Logo Lab Luis">

<div class="control-panel">
    <div class="panel-grid">
        <a href="index.html">🏠 Inicio</a>
        <a href="proyectos.html">👽 Vórtice</a>
        <a href="laboratorio.html">📝 Pioneros</a>
        <a href="libros.html">📚 Libros</a>
    </div>
</div>

<a href="index3d.html" class="blackhole-btn">🌀 BLACK HOLE 3D</a>

<div class="narrative-card">
    <h2 id="stage-title">Sincronizando...</h2>
    <p id="stage-desc">Iniciando motor de visualización espacio-temporal.</p>
</div>

<div id="creditos_btn" onclick="window.location.href='creditos.html'">ⓘ</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");

    // Optimización dinámica: Menos partículas en móvil
    const isMobile = window.innerWidth < 768;
    const particleCount = isMobile ? 80 : 200;

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let stage = 0;
    const timeline = [
        { t: "Línea de Planck", d: "10⁻³⁵m. La realidad es una vibración neón caótica.", color: "#00f2ff" },
        { t: "Fase Subatómica", d: "Nacimiento de partículas. El tiempo fluye al futuro.", color: "#ffffff" },
        { t: "Vida y Entropía", d: "Envejecemos por el desgaste del ADN. El tiempo nos consume.", color: "#39ff14" },
        { t: "Estratósfera", d: "La gravedad terrestre curva el tiempo local.", color: "#00aaff" },
        { t: "Expansión Final", d: "El universo se estira hacia el vacío eterno.", color: "#bc13fe" }
    ];

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * (isMobile ? 1.5 : 2.5) + 0.5;
            this.vx = (Math.random() - 0.5) * (isMobile ? 2 : 4);
            this.vy = (Math.random() - 0.5) * (isMobile ? 2 : 4);
            this.age = 0;
        }
        update() {
            if (stage === 0) {
                this.x += (Math.random() - 0.5) * 8;
                this.y += (Math.random() - 0.5) * 8;
            } else if (stage === 2) {
                this.size += 0.05; this.age++;
                if (this.age > 100) this.reset();
            } else if (stage === 4) {
                let dx = this.x - canvas.width / 2;
                let dy = this.y - canvas.height / 2;
                this.x += dx * 0.03; this.y += dy * 0.03;
                if (this.x < 0 || this.x > canvas.width) this.reset();
            } else {
                this.x += this.vx; this.y += this.vy;
            }
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            // Se elimina shadowBlur en móvil para evitar bloqueos
            if (!isMobile) {
                ctx.shadowBlur = 8;
                ctx.shadowColor = timeline[stage].color;
            }
            ctx.fillStyle = timeline[stage].color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    let particles = Array.from({ length: particleCount }, () => new Particle());

    function loop() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }

    setInterval(() => {
        stage = (stage + 1) % timeline.length;
        document.getElementById("stage-title").innerText = timeline[stage].t;
        document.getElementById("stage-desc").innerText = timeline[stage].d;
        document.getElementById("stage-title").style.color = timeline[stage].color;
    }, 10000);

    window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    loop();
</script>
</body>
</html>
