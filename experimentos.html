<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Universal Reality Engine 3D</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="canonical" href="https://duquemartini.com/experimentos.html">

    <style>
        :root {
            --planck: #00f2ff;
            --atomic: #ffffff;
            --bio: #39ff14;
            --cosmos: #ffcc00;
            --vortex: #bc13fe;
            --exit: #ff3131;
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            color: #fff; font-family: 'Orbitron', 'Segoe UI', sans-serif;
            overflow: hidden; height: 100%; width: 100%;
        }

        #canvas-cosmos { position: fixed; top: 0; left: 0; z-index: 1; }

        /* --- HEADER CON TÍTULO 3D NEÓN --- */
        header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; pointer-events: none; width: 100%;
        }

        .title-3d-neon {
            font-size: clamp(20px, 6vw, 36px);
            font-weight: 900; letter-spacing: 8px;
            color: #fff; text-transform: uppercase;
            /* Efecto 3D con bordes de Neón */
            text-shadow: 
                0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 
                0 4px 0 #b9b9b9, 0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1), 
                0 0 5px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.3), 
                0 3px 5px rgba(0,0,0,.2), 0 5px 10px rgba(0,0,0,.25), 
                0 0 20px var(--planck), 0 0 30px var(--planck);
            animation: neonPulse 2s infinite alternate;
        }

        @keyframes neonPulse {
            from { text-shadow: 0 0 10px var(--planck), 0 0 20px var(--planck), 0 5px 10px rgba(0,0,0,.25); }
            to { text-shadow: 0 0 15px var(--planck), 0 0 30px var(--planck), 0 0 40px var(--planck), 0 5px 10px rgba(0,0,0,.25); }
        }

        /* --- UI ORBES (SUPERIOR DERECHA) --- */
        .ui-orb-container {
            position: fixed; top: 20px; right: 20px; z-index: 110;
            display: flex; flex-direction: column; gap: 15px; align-items: flex-end;
        }

        .orb {
            width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s; border: 2px solid #fff;
            text-decoration: none; font-size: 18px; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        #audio-init { border-color: var(--planck); box-shadow: 0 0 20px var(--planck); color: var(--planck); }
        .bh-link { border-color: var(--vortex); box-shadow: 0 0 20px var(--vortex); color: var(--vortex); }
        
        /* Botón Salir (Inicio) */
        .exit-link { 
            border-color: var(--exit); box-shadow: 0 0 20px var(--exit); color: var(--exit);
            font-weight: bold; font-size: 14px;
        }
        .orb:hover { transform: scale(1.1); box-shadow: 0 0 30px #fff; }

        /* --- NARRATIVA --- */
        .narrative-box {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 85%; max-width: 650px;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #stage-title { font-size: 20px; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        #stage-desc { font-size: 14px; color: #aaa; margin-top: 8px; line-height: 1.5; font-family: 'Consolas', monospace; }

        img.logo { position: fixed; top: 20px; left: 20px; width: 60px; z-index: 110; border-radius: 50%; border: 2px solid var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>

<header><div class="title-3d-neon">LAB LUIS UNIVERSAL</div></header>
<img src="logo.jpg" class="logo" alt="Logo">

<div class="ui-orb-container">
    <a href="index.html" class="orb exit-link" title="Volver a Inicio / Salir">🏠</a>
    <div id="audio-init" class="orb" title="Activar Audio">🔊</div>
    <a href="index3d.html" class="orb bh-link" title="Black Hole 3D">🌀</a>
</div>

<div class="narrative-box">
    <h2 id="stage-title">SISTEMA CUÁNTICO ACTIVADO</h2>
    <p id="stage-desc">Inicia el audio para observar la vibración de las micro-líneas de Planck primordiales.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h;
    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    let stage = 0;
    let particles = [];
    let audioCtx, masterGain;
    let vortexAngle = 0;
    let distortionAmount = 0;

    const timeline = [
        { t: "Micro-Líneas de Planck", d: "10⁻³⁵m. La realidad fundamental no son puntos, sino micro-líneas vibrantes de energía pura (Teoría de Cuerdas).", color: "#00f2ff", dur: 12000 },
        { t: "Núcleo Atómico", d: "Protones, neutrones y electrones orbitando. Los neutrinos cruzan el tejido sin interactuar.", color: "#ffffff", dur: 14000 },
        { t: "Oxidación Celular", d: "La vida envejece y muere porque las células se oxidan (Entropía). Los electrones pierden equilibrio, dañando el ADN.", color: "#39ff14", dur: 16000 },
        { t: "Expansión Galáctica", d: "Velocidad de la luz. Estrellas y planetas se alejan. La gravedad curva el espacio-tiempo (Relatividad).", color: "#ffcc00", dur: 16000 },
        { t: "Desdoblamiento Cuántico", d: "Colapso total. La luz se distorsiona, el espacio-tiempo gira y se deforma antes de volver al origen.", color: "#bc13fe", dur: 18000 }
    ];

    function playSound(f, type, d, vol=0.1) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = type; o.frequency.value = f;
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
        o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime + d);
    }

    class Entity {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w;
            this.size = Math.random() * 3 + 1;
            this.angle = Math.random() * Math.PI * 2;
            this.orbit = Math.random() * 50 + 20;
            this.life = 1; // Para la fase biológica
        }
        draw() {
            if(stage === 0) { // MICRO-LÍNEAS DE PLANCK VIBRANTES
                ctx.strokeStyle = timeline[0].color;
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                // Efecto de vibración de cuerda tensa
                let vibe = Math.sin(Date.now()*0.02 + this.angle) * 15;
                ctx.moveTo(this.x - vibe, this.y);
                ctx.lineTo(this.x + vibe, this.y + 10); // Línea corta vertical/diagonal vibrante
                ctx.stroke();
            } else if(stage === 1) { // ÁTOMO
                ctx.fillStyle = "#ff3131"; // Protón
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
                let ex = this.x + Math.cos(Date.now()*0.005 + this.angle)*this.orbit;
                let ey = this.y + Math.sin(Date.now()*0.005 + this.angle)*this.orbit;
                ctx.fillStyle = "#00f2ff"; // Electrón
                ctx.beginPath(); ctx.arc(ex, ey, 2, 0, Math.PI*2); ctx.fill();
            } else if(stage === 2) { // CÉLULA (Oxidación/Fragmentación)
                this.life -= 0.001;
                if(this.life < 0) this.life = 1;
                ctx.fillStyle = `rgba(57, 255, 20, ${this.life})`; // Verde neón desvaneciéndose
                if(this.life < 0.3) ctx.fillStyle = `rgba(139, 69, 19, ${this.life + 0.2})`; // Marrón oxidación
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 3 * this.life, 0, Math.PI*2); ctx.fill();
            } else if(stage === 3) { // COSMOS (Planetas/Estrellas)
                let s = w/this.z;
                let px = w/2 + (this.x-w/2)*s;
                let py = h/2 + (this.y-h/2)*s;
                this.z -= 15; if(this.z < 1) this.z = w;
                let g = ctx.createRadialGradient(px, py, 0, px, py, this.size*s);
                g.addColorStop(0, "#fff"); g.addColorStop(0.3, timeline[3].color); g.addColorStop(1, "transparent");
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(px, py, this.size*s*2, 0, Math.PI*2); ctx.fill();
            } else if(stage === 4) { // VÓRTICE / DESDOBLAMIENTO (Deformación de luz)
                this.angle += 0.06; this.orbit *= 0.985;
                // Deformación cuántica elíptica apuntando al centro
                let targetX = w/2, targetY = h/2;
                this.x = targetX + Math.cos(this.angle) * this.orbit * 6;
                this.y = targetY + Math.sin(this.angle) * this.orbit * 6;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                // Rotación de la partícula individual para el efecto de desdoblamiento
                let angToCenter = Math.atan2(targetY - this.y, targetX - this.x);
                ctx.rotate(angToCenter + vortexAngle); 
                
                ctx.fillStyle = `rgba(188, 19, 254, ${0.5 + Math.sin(Date.now()*0.01)*0.3})`; // Neón Void oscilante
                ctx.beginPath(); 
                // Elipse estirada para simular distorsión de luz
                ctx.ellipse(0, 0, this.size * (distortionAmount + 1), this.size, 0, 0, Math.PI*2); 
                ctx.fill();
                ctx.restore();
            }
        }
    }

    particles = Array.from({ length: isMobile ? 80 : 180 }, () => new Entity());

    function loop() {
        if(stage === 4) { // Efecto Espejo Gidatorio Translúcido (Vórtice)
            ctx.fillStyle = "rgba(10, 0, 20, 0.1)"; // Fondo Void oscuro
            ctx.fillRect(0,0,w,h);
            
            distortionAmount = Math.sin(Date.now()*0.001) * 10; // La distorsión oscila

            ctx.save();
            ctx.translate(w/2, h/2);
            ctx.rotate(vortexAngle); // Gira todo el canvas espejado
            vortexAngle += 0.008;
            ctx.globalAlpha = 0.4; // Translúcido
            // Espejamos el canvas sobre sí mismo con rotación
            ctx.scale(1 + distortionAmount*0.01, 1); 
            ctx.drawImage(canvas, -w/2, -h/2);
            ctx.restore();
            ctx.globalAlpha = 1.0;
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.fillRect(0,0,w,h);
            vortexAngle = 0; distortionAmount = 0;
        }

        particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function startSequence() {
        if(!audioCtx) return;
        const cur = timeline[stage];
        document.getElementById("stage-title").innerText = cur.t;
        document.getElementById("stage-desc").innerText = cur.d;
        document.getElementById("stage-title").style.color = cur.color;

        // Sonidos evolucionados
        if(stage === 0) playSound(523, 'sine', 5, 0.08); // Tono puro Planck
        if(stage === 1) playSound(880, 'sine', 2, 0.05); // Tono agudo Átomo
        if(stage === 2) playSound(329, 'triangle', 4, 0.1); // Tono orgánico Bio
        if(stage === 3) playSound(110, 'sawtooth', 6, 0.12); // Rugido Cosmos
        if(stage === 4) playSound(60, 'square', 12, 0.2); // Estruendo Colapso (Void)

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { // Flash de reinicio (Big Bang)
                ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
                particles.forEach(p => p.init()); // Reiniciar partículas
            }
            startSequence();
        }, cur.dur);
    }

    document.getElementById('audio-init').addEventListener('click', () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        masterGain.gain.value = 0.15;
        document.getElementById('audio-init').style.display = 'none';
        startSequence();
    });

    loop();
</script>
</body>
</html>
