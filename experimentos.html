<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Experimentos - Laboratorio | Lab Luis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">

<style>
    body {
        margin: 0;
        padding: 0;
        overflow-x: hidden; /* Evita scroll lateral */
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #000;
        color: #00ffcc;
    }

    header {
        padding: 25px;
        font-size: 34px;
        font-weight: bold;
        background: rgba(0,0,0,0.8);
        border-bottom: 1px solid #00ffcc;
        text-align: center;
        position: relative;
        z-index: 10;
    }

    img.logo {
        width: 150px;
        margin: 15px auto;
        display: block;
        border: 2px solid #00ffcc;
        border-radius: 10px;
        position: relative;
        z-index: 10;
    }

    .control-panel {
        width: 85%;
        max-width: 900px;
        margin: 20px auto;
        padding: 20px;
        background: rgba(0,0,0,0.75);
        border: 1px solid #00ffcc;
        border-radius: 12px;
        position: relative;
        z-index: 10;
    }

    .panel-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    .panel-grid a {
        padding: 12px;
        text-align: center;
        text-decoration: none;
        color: #00ffcc;
        border: 1px solid rgba(0,255,204,0.4);
        background: rgba(0,0,0,0.5);
        border-radius: 8px;
        transition: 0.3s;
    }

    .panel-grid a:hover {
        background: #00ffcc;
        color: #000;
    }

    .blackhole-container {
        text-align: center;
        margin: 20px;
        position: relative;
        z-index: 10;
    }

    .blackhole-btn {
        display: inline-block;
        padding: 14px 22px;
        background: linear-gradient(45deg, #00ffcc, #00aaff);
        color: #000;
        font-weight: bold;
        border-radius: 12px;
        text-decoration: none;
        box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
    }

    /* 🌌 CANVAS AL FONDO */
    #canvas-cosmos {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
    }

    /* TARJETA CIENTÍFICA NARRATIVA */
    .video-card {
        width: 85%;
        max-width: 600px;
        margin: 30px auto;
        padding: 20px;
        background: rgba(0,0,0,0.85);
        border: 2px solid #00f2ff;
        border-radius: 12px;
        position: relative;
        z-index: 10;
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
    }

    .narrative-box {
        text-align: center;
    }

    #stage-title {
        font-size: 28px;
        color: #00f2ff;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    #stage-desc {
        font-size: 16px;
        color: #fff;
        margin-top: 10px;
        line-height: 1.5;
    }

    #creditos_btn {
        position: fixed;
        bottom: 10px;
        right: 10px;
        padding: 6px 10px;
        font-size: 12px;
        background: rgba(0,0,0,0.5);
        border: 1px solid #00ffcc;
        border-radius: 6px;
        cursor: pointer;
        z-index: 100;
        color: #00ffcc;
    }
</style>
</head>

<body>

<header>⚡ LAB LUIS – Physics & Space-Time</header>

<img src="logo.jpg" class="logo" alt="Logo Lab">

<div class="control-panel">
    <div class="panel-grid">
        <a href="index.html">🏠 Inicio</a>
        <a href="proyectos.html">👽 Vórtice</a>
        <a href="laboratorio.html">🧪 Ciencia</a>
        <a href="libros.html">📚 Libros</a>
    </div>
</div>

<div class="blackhole-container">
    <a class="blackhole-btn" href="index3d.html">🌀 Black Hole 3D</a>
</div>

<canvas id="canvas-cosmos"></canvas>

<div class="video-card">
    <div class="narrative-box">
        <h2 id="stage-title">Escala de Planck</h2>
        <p id="stage-desc">El límite fundamental. El tiempo es una espuma cuántica vibratoria ($10^{-44}s$).</p>
    </div>
</div>

<div id="creditos_btn" onclick="window.location.href='creditos.html'">ⓘ Créditos</div>

<script>
const canvas = document.getElementById("canvas-cosmos");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let currentStage = 0;

// Definición detallada de la evolución del Universo
const timeline = [
    { t: "Línea de Planck", d: "A escala mínima, el tiempo no es lineal, sino una vibración caótica de energía.", color: "#00f2ff" },
    { t: "Partículas Subatómicas", d: "Quarks, Neutrinos y Electrones. La materia es estable y el tiempo fluye con orden.", color: "#ffffff" },
    { t: "Materia y Átomos", d: "Protones y Neutrones se unen. La gravedad empieza a curvar el tejido del espacio-tiempo.", color: "#ffff00" },
    { t: "Vida y Entropía", d: "Envejecemos porque las células acumulan errores. La flecha del tiempo dicta la muerte biológica.", color: "#44ff44" },
    { t: "Expansión Infinita", d: "Energía Oscura. El espacio se estira. El universo se expande hacia el vacío absoluto.", color: "#ff00ff" }
];

let particles = [];

class Particle {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.size = Math.random() * 2 + 1;
        this.age = 0;
        this.maxAge = Math.random() * 200 + 100;
    }
    update() {
        switch(currentStage) {
            case 0: // Planck: Vibración caótica
                this.x += (Math.random() - 0.5) * 10;
                this.y += (Math.random() - 0.5) * 10;
                break;
            case 3: // Vida: Envejecimiento (Crecen y mueren)
                this.size += 0.04;
                this.age++;
                if(this.age > this.maxAge) this.reset();
                break;
            case 4: // Expansión: Huida hacia los bordes
                let dx = this.x - canvas.width / 2;
                let dy = this.y - canvas.height / 2;
                this.x += dx * 0.03;
                this.y += dy * 0.03;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
                break;
            default: // Movimiento cinético estándar
                this.x += this.vx;
                this.y += this.vy;
        }

        // Rebote en bordes (excepto en expansión)
        if (currentStage !== 4) {
            if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
    }
    draw() {
        ctx.fillStyle = timeline[currentStage].color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function init() {
    particles = [];
    for(let i = 0; i < 250; i++) particles.push(new Particle());
}

function loop() {
    // Estela de movimiento (motion blur)
    ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for(let p of particles) {
        p.update();
        p.draw();
    }
    requestAnimationFrame(loop);
}

// Rotación de etapas científicas cada 10 segundos
setInterval(() => {
    currentStage = (currentStage + 1) % timeline.length;
    const titleElem = document.getElementById("stage-title");
    const descElem = document.getElementById("stage-desc");
    
    titleElem.innerText = timeline[currentStage].t;
    descElem.innerText = timeline[currentStage].d;
    titleElem.style.color = timeline[currentStage].color;
}, 10000);

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    init();
});

init();
loop();
</script>

</body>
</html>
