<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - QUANTUM SUPREME VFX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
        
        :root {
            --planck: #00f2ff; --bio: #39ff14; --vortex: #bc13fe; --exit: #ff3131; --star: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; height: 100%; width: 100%; 
            font-family: 'Orbitron', sans-serif;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; filter: contrast(1.2) brightness(1.1); }

        /* HEADER COMPACTO Y ELEGANTE */
        header {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            z-index: 60; text-align: center; pointer-events: none;
        }
        .title-3d {
            font-weight: 900; font-size: 24px; color: #fff; 
            text-transform: uppercase; letter-spacing: 6px;
            text-shadow: 0 0 10px var(--planck), 0 0 20px rgba(0,242,255,0.5);
            background: rgba(0,0,0,0.5); padding: 5px 20px; border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        /* UI DISTRIBUIDA */
        .panel-left { position: fixed; top: 20px; left: 20px; z-index: 1000; }
        .panel-right { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 12px; }

        .orb {
            width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 18px; 
            background: rgba(0,0,0,0.85); border: 2px solid #fff;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 20px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); }
        .orb:hover { transform: scale(1.1) rotate(10deg); filter: brightness(1.3); }

        /* NARRATIVA ABAJO */
        .narrative {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 85%; max-width: 400px;
            background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 30px;
            border: 1px solid var(--planck); backdrop-filter: blur(8px);
        }
        #st-title { font-size: 13px; color: var(--planck); margin: 0; letter-spacing: 2px; text-shadow: 0 0 5px var(--planck); }
        #st-desc { font-size: 9px; color: #bbb; margin-top: 3px; font-family: sans-serif; text-transform: uppercase; }
        
        img.logo { position: fixed; top: 75px; left: 18px; width: 50px; z-index: 110; border-radius: 50%; border: 1px solid var(--planck); opacity: 0.6; }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LUIS QUANTUM</div></header>
<img src="logo.jpg" class="logo">

<div class="panel-left">
    <a href="index.html" class="orb btn-exit">🏠</a>
</div>

<div class="panel-right">
    <div id="btn-audio" class="orb">🔊</div>
    <a href="index3d.html" class="orb btn-bh">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">SISTEMA INACTIVO</h2>
    <p id="st-desc">Pulsa audio para iniciar el desdoblamiento experimental</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, parts = [], audioCtx, masterGain, active = false, vAng = 0;

    const timeline = [
        { t: "Cuerdas de Planck", d: "Oscilación Cuántica 10⁻³⁵m", color: "#00f2ff", dur: 10000, f: 523, w: 'sine' },
        { t: "Materia Volumétrica", d: "Fuerza Nuclear y Relieve Atómico", color: "#ffffff", dur: 12000, f: 392, w: 'triangle' },
        { t: "Corrosión Biológica", d: "Fragmentación de Membrana Celular", color: "#39ff14", dur: 12000, f: 261, w: 'sine' },
        { t: "Expansión Warp", d: "Vectores de Luz a Velocidad Relativista", color: "#ffcc00", dur: 14000, f: 130, w: 'sawtooth' },
        { t: "Desdoblamiento", d: "Singularidad: El Espacio se Empaña", color: "#bc13fe", dur: 20000, f: 65, w: 'square' }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    class Part {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w; this.s = Math.random() * 3 + 1;
            this.a = Math.random() * Math.PI * 2; this.o = Math.random() * 100 + 50;
            this.life = 1.0; this.v = Math.random() * 30 + 20;
        }
        draw() {
            if (stage === 0) { // PLANCK ESPECTRAL
                ctx.strokeStyle = `rgba(0, 242, 255, ${Math.random()*0.6})`;
                ctx.lineWidth = 0.5; ctx.beginPath();
                let v = Math.tan(Date.now()*0.02 + this.x)*20;
                ctx.moveTo(this.x, 0); ctx.lineTo(this.x + v, h); ctx.stroke();
            } else if (stage === 1) { // ÁTOMO CON GLOW
                ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
                ctx.fillStyle = "#ff2d55"; ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                let r = Date.now()*0.01 + this.a;
                ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.arc(this.x + Math.cos(r)*40, this.y + Math.sin(r)*40, 2, 0, Math.PI*2); ctx.fill();
            } else if (stage === 2) { // BIO FRAGMENTADO
                this.life -= 0.004; if(this.life < 0) this.life = 1;
                ctx.fillStyle = `rgba(${50+(1-this.life)*200}, ${255*this.life}, 50, ${this.life})`;
                ctx.beginPath(); ctx.ellipse(this.x, this.y, this.s*15*(1.5-this.life), this.s*8, this.a, 0, Math.PI*2); ctx.fill();
                if(this.life < 0.3) { ctx.fillStyle="#8b4513"; ctx.fillRect(this.x+20, this.y-10, 3, 3); }
            } else if (stage === 3) { // WARP ESTRELLAS CINEMÁTICAS
                let sc = w/this.z; let px = w/2 + (this.x-w/2)*sc, py = h/2 + (this.y-h/2)*sc;
                this.z -= this.v; if(this.z < 1) this.z = w;
                let x2 = w/2 + (this.x-w/2)*(w/(this.z+this.v*0.8));
                let y2 = h/2 + (this.y-h/2)*(w/(this.z+this.v*0.8));
                ctx.strokeStyle = `rgba(255, 204, 0, ${sc/15})`;
                ctx.lineWidth = sc; ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x2, y2); ctx.stroke();
            } else if (stage === 4) { // SINGULARIDAD VÓRTICE
                this.a += 0.3; this.o *= 0.99;
                let dx = w/2 + Math.cos(this.a)*this.o*12;
                let dy = h/2 + Math.sin(this.a)*this.o*12;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.ellipse(dx, dy, this.s*30, this.s*1.5, this.a, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    parts = Array.from({ length: 180 }, () => new Part());

    function play(f, wtype) {
        if(!audioCtx) return;
        let o = audioCtx.createOscillator(); let g = audioCtx.createGain();
        o.type = wtype; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0.15, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 4);
        o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime + 4);
    }

    function loop() {
        if (stage === 4) {
            ctx.fillStyle = "rgba(255,255,255,0.04)"; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vAng);
            vAng += 0.2; ctx.globalAlpha = 0.5;
            ctx.filter = `blur(12px) contrast(1.5) hue-rotate(${vAng*10}deg)`;
            ctx.drawImage(canvas, -w/2-10, -h/2-10, w+20, h+20); ctx.restore();
        } else {
            ctx.fillStyle = `rgba(0,0,0,${stage === 3 ? 0.1 : 0.25})`; 
            ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        if (active) parts.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function step() {
        const s = timeline[stage];
        document.getElementById("st-title").innerText = s.t;
        document.getElementById("st-desc").innerText = s.d;
        document.getElementById("st-title").style.color = s.color;
        play(s.f, s.w);
        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); parts.forEach(p => p.init()); }
            step();
        }, s.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        active = true; this.style.display = 'none'; step();
    });

    loop();
</script>
</body>
</html>
