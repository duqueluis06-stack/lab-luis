  <h2>⏳ ¿Qué es el tiempo?</h2>
  <p>Escala física desde estructura cuántica hasta sistema cósmico. Visualización dinámica de propagación de estados energéticos.</p>
  <canvas id="timeCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById("timeCanvas");
const ctx = canvas.getContext("2d");

function resize(){
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener("resize", resize);

ctx.font = "12px Arial";

const layers = [
"Planck","Quarks","Átomos","Moléculas",
"Células","Humano","Planeta","Sistema Solar"
];

let nodes = [];

for(let i=0;i<220;i++){
nodes.push({
x:Math.random()*canvas.offsetWidth,
y:Math.random()*canvas.offsetHeight,
vx:(Math.random()-0.5)*1.8,
vy:(Math.random()-0.5)*1.8
});
}

function loop(){

ctx.fillStyle="rgba(0,0,0,0.35)";
ctx.fillRect(0,0,canvas.offsetWidth,canvas.offsetHeight);

for(let i=0;i<layers.length;i++){
let y=(canvas.offsetHeight/layers.length)*i;

ctx.strokeStyle="rgba(0,255,204,0.2)";
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(canvas.offsetWidth,y);
ctx.stroke();

ctx.fillStyle="#00ffcc";
ctx.fillText(layers[i],10,y+12);
}

for(let p of nodes){
p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.offsetWidth) p.vx*=-1;
if(p.y<0||p.y>canvas.offsetHeight) p.vy*=-1;

ctx.fillStyle="rgba(0,255,255,0.85)";
ctx.fillRect(p.x,p.y,2,2);
}

requestAnimationFrame(loop);
}
loop();

canvas.addEventListener("click",(e)=>{
const r=canvas.getBoundingClientRect();
const mx=e.clientX-r.left;
const my=e.clientY-r.top;

for(let p of nodes){
let dx=p.x-mx;
let dy=p.y-my;
let d=Math.sqrt(dx*dx+dy*dy);

if(d<160){
p.vx+=dx*0.02;
p.vy+=dy*0.02;
}
}
});
</script>
