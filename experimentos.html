<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Cronología Universal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="canonical" href="https://duquemartini.com/experimentos.html">

    <style>
        :root {
            --neon: #00ffcc;
            --planck: #00f2ff;
            --bio: #39ff14;
            --void: #bc13fe;
            --impact: #ff3131;
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; height: 100%; width: 100%;
        }

        #canvas-cosmos { position: fixed; top: 0; left: 0; z-index: 1; }

        /* --- INTERFAZ: BOTONES CIRCULARES NEÓN --- */
        header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; pointer-events: none;
        }

        .title-3d {
            font-size: clamp(18px, 5vw, 30px); font-weight: 900; letter-spacing: 10px;
            color: #fff; text-transform: uppercase;
            text-shadow: 0 0 20px var(--planck);
        }

        .ui-orb-container {
            position: fixed; top: 20px; right: 20px; z-index: 110;
            display: flex; flex-direction: column; gap: 20px;
        }

        .orb {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s; border: 2px solid #fff;
            text-decoration: none; font-size: 20px; background: rgba(0,0,0,0.5);
            box-shadow: 0 0 15px #fff;
        }

        #audio-init { border-color: var(--neon); box-shadow: 0 0 20px var(--neon); color: var(--neon); }
        .bh-link { border-color: var(--void); box-shadow: 0 0 20px var(--void); color: var(--void); }
        .orb:hover { transform: scale(1.1) rotate(15deg); }

        /* --- NAVEGACIÓN LATERAL --- */
        .side-nav {
            position: fixed; top: 120px; left: 20px; z-index: 110;
            display: flex; flex-direction: column; gap: 10px;
        }
        .side-link {
            padding: 8px 15px; font-size: 11px; text-decoration: none;
            color: var(--neon); border: 1px solid var(--neon);
            border-radius: 20px; transition: 0.3s; text-transform: uppercase;
        }
        .side-link:hover { background: var(--neon); color: #000; }

        /* --- CAJA NARRATIVA (LENTA Y EXPLICATIVA) --- */
        .narrative-box {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 90%; max-width: 700px;
            background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        #stage-title { font-size: 22px; margin: 0; letter-spacing: 3px; }
        #stage-desc { font-size: 15px; color: #ccc; margin-top: 10px; line-height: 1.6; }

        img.logo { position: fixed; top: 20px; left: 20px; width: 60px; z-index: 110; border-radius: 50%; }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>

<header><div class="title-3d">QUANTUM EXISTENCE</div></header>
<img src="logo.jpg" class="logo" alt="Logo">

<div class="side-nav">
    <a href="index.html" class="side-link">Inicio</a>
    <a href="proyectos.html" class="side-link">Vórtice</a>
    <a href="libros.html" class="side-link">Libros</a>
</div>

<div class="ui-orb-container">
    <div id="audio-init" class="orb" title="Activar Sonido">🔊</div>
    <a href="index3d.html" class="orb bh-link" title="Black Hole 3D">🌀</a>
</div>

<div class="narrative-box">
    <h2 id="stage-title">SISTEMA LISTO</h2>
    <p id="stage-desc">Haz clic en el orbe de sonido para iniciar la secuencia evolutiva.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h;
    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    let stage = 0;
    let particles = [];
    let planets = [];
    let audioCtx, masterGain;
    let vortexAngle = 0;

    // --- SECUENCIA NARRATIVA DETALLADA ---
    const timeline = [
        { t: "1. Escala de Planck", d: "El tejido más pequeño de la realidad. Aquí no existen objetos, solo cuerdas vibrantes de energía pura a 10⁻³⁵m.", color: "#00f2ff", dur: 12000 },
        { t: "2. Sopa Subatómica", d: "Quarks y electrones se agrupan. El tiempo comienza a fluir de forma lineal para crear la materia que conocemos.", color: "#ffffff", dur: 12000 },
        { t: "3. La Célula y la Vida", d: "La biología aparece. Envejecemos porque nuestras células acumulan errores de copia (entropía). El tiempo biológico es un proceso de oxidación.", color: "#39ff14", dur: 15000 },
        { t: "4. Expansión Estelar", d: "Dejamos la Tierra. Planetas y galaxias se alejan. La gravedad de los astros curva el tiempo, haciéndolo relativo para cada observador.", color: "#ffcc00", dur: 15000 },
        { t: "5. Horizonte Final", d: "Llegamos al límite. El universo se espeja, el espacio se desdobla y todo comienza a girar en un remolino eterno.", color: "#bc13fe", dur: 15000 },
        { t: "6. Colapso y Reinicio", d: "La gran implosión. Todo se comprime en un punto infinitamente denso para volver a nacer en Planck.", color: "#ff3131", dur: 8000 }
    ];

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        masterGain.gain.value = 0.2;
        document.getElementById('audio-init').style.display = 'none';
        runCycle();
    }

    function playSound(freq, type, dur) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(g); g.connect(masterGain);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w;
            this.size = Math.random() * 2 + 1;
            this.angle = Math.random() * Math.PI * 2;
            this.dist = Math.random() * w * 0.5;
        }
        update() {
            if(stage === 0) { // Planck
                this.y = h/2 + Math.sin(this.x * 0.05) * 20;
                this.x += 5; if(this.x > w) this.x = 0;
            } else if(stage === 2) { // Célula (vibración orgánica)
                this.x += Math.sin(Date.now()*0.001) * 2;
                this.y += Math.cos(Date.now()*0.001) * 2;
            } else if(stage === 3 || stage === 4) { // Expansión
                this.z -= 10; if(this.z < 1) this.z = w;
            } else if(stage === 5) { // Vórtice
                this.angle += 0.05; this.dist *= 0.99;
                this.x = w/2 + Math.cos(this.angle) * this.dist;
                this.y = h/2 + Math.sin(this.angle) * this.dist;
            }
        }
        draw() {
            ctx.fillStyle = timeline[stage].color;
            ctx.beginPath();
            if(stage === 3 || stage === 4) {
                let s = w/this.z;
                ctx.arc(w/2 + (this.x-w/2)*s, h/2 + (this.y-h/2)*s, this.size*s, 0, Math.PI*2);
            } else {
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            }
            ctx.fill();
        }
    }

    particles = Array.from({ length: 200 }, () => new Particle());

    function loop() {
        ctx.fillStyle = stage === 5 ? "rgba(0,0,0,0.05)" : "rgba(0,0,0,0.2)";
        ctx.fillRect(0,0,w,h);

        if(stage === 5) { // Efecto Espejo Remolino
            ctx.save();
            ctx.translate(w/2, h/2);
            ctx.rotate(vortexAngle);
            vortexAngle += 0.02;
            ctx.globalAlpha = 0.5;
            ctx.drawImage(canvas, -w/2, -h/2);
            ctx.restore();
        }

        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }

    function runCycle() {
        const cur = timeline[stage];
        document.getElementById("stage-title").innerText = cur.t;
        document.getElementById("stage-desc").innerText = cur.d;
        document.getElementById("stage-title").style.color = cur.color;

        // Sonidos específicos por fase
        if(stage === 0) playSound(440, 'sine', 3);
        if(stage === 2) playSound(220, 'triangle', 4);
        if(stage === 4) playSound(880, 'sawtooth', 2);
        if(stage === 5) playSound(60, 'square', 8);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { // Flash de reinicio
                ctx.fillStyle = "#fff"; ctx.fillRect(0,0,w,h);
            }
            runCycle();
        }, cur.dur);
    }

    document.getElementById('audio-init').addEventListener('click', initAudio);
    loop();
</script>
</body>
</html>
