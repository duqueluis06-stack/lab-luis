<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - QUANTUM SINGULARITY MASTER v2.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        :root {
            --planck: #00f2ff; --atomic: #ffffff; --bio: #39ff14;
            --cosmos: #ffcc00; --vortex: #bc13fe; --exit: #ff3131;
        }

        body, html { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; height: 100%; width: 100%; 
            font-family: 'Orbitron', sans-serif;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* --- TÍTULO 3D MASTER --- */
        header {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            z-index: 60; text-align: center; width: 100%; pointer-events: none;
        }
        .title-3d {
            font-weight: 900; font-size: clamp(28px, 9vw, 60px);
            color: #fff; text-transform: uppercase; letter-spacing: 15px;
            text-shadow: 
                0 1px 0 #555, 0 2px 0 #444, 0 3px 0 #333, 0 4px 0 #222, 0 5px 0 #111,
                0 0 30px var(--planck), 0 0 60px rgba(0,242,255,0.5);
            transition: 0.5s;
        }

        /* --- UI PANEL BLINDADO --- */
        .ui-panel { 
            position: fixed; top: 30px; right: 30px; z-index: 1000; 
            display: flex; flex-direction: row; gap: 20px; 
        }
        .orb {
            width: 70px; height: 70px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 28px; 
            background: rgba(0,0,0,0.9); border: 3px solid #fff;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
        }
        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 40px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); box-shadow: 0 0 30px var(--vortex); }
        .orb:hover { transform: scale(1.15) rotate(360deg); filter: brightness(1.4); }

        /* --- NARRATIVA --- */
        .narrative {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 90%; max-width: 800px;
            background: rgba(0,0,0,0.95); padding: 30px; border-radius: 25px;
            border: 1px solid var(--planck); box-shadow: 0 0 60px rgba(0,242,255,0.15);
            backdrop-filter: blur(20px);
        }
        #st-title { font-size: 28px; color: var(--planck); margin: 0; letter-spacing: 5px; text-transform: uppercase; }
        #st-desc { font-size: 16px; color: #bbb; margin-top: 15px; line-height: 1.7; font-family: 'Segoe UI', sans-serif; }
        
        img.logo { position: fixed; top: 30px; left: 30px; width: 85px; z-index: 110; border-radius: 50%; border: 3px solid var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d" id="main-title">LUIS ENGINE</div></header>
<img src="logo.jpg" class="logo" alt="LUIS">

<div class="ui-panel">
    <a href="index.html" class="orb btn-exit">🏠</a>
    <div id="btn-audio" class="orb">🔊</div>
    <a href="index3d.html" class="orb btn-bh">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">ESTADO: STANDBY</h2>
    <p id="st-desc">Sincroniza los osciladores cuánticos pulsando el orbe de audio para iniciar el desdoblamiento espectral.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, particles = [], audioCtx, masterGain, active = false, vortexAngle = 0, globalOpacity = 1;

    const timeline = [
        { t: "Cuerdas de Planck", d: "Vibración microscópica de alta frecuencia (10⁻³⁵m). El tejido base de la realidad oscila en el vacío.", color: "#00f2ff", dur: 11000, f: 523.25, type: 'sine' },
        { t: "Núcleo Atómico", d: "Fuerza Nuclear Fuerte: Ensamblaje de protones y quarks con relieve neutrónico de alta densidad.", color: "#ffffff", dur: 13000, f: 392.00, type: 'triangle' },
        { t: "Entropía Biológica", d: "La célula cumple su ciclo, pierde energía, se expande y se oxida (marrón espectral) antes del colapso físico.", color: "#39ff14", dur: 15000, f: 261.63, type: 'sine' },
        { t: "Expansión Warp", d: "Velocidad de la luz: El universo se estira. Las estrellas deforman el espacio en una fuga galáctica masiva.", color: "#ffcc00", dur: 15000, f: 130.81, type: 'sawtooth' },
        { t: "Desdoblamiento Final", d: "¡SINGULARIDAD! El espacio se empaña y gira a velocidades relativistas hacia un portal interdimensional.", color: "#bc13fe", dur: 20000, f: 65.41, type: 'square' }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w; this.size = Math.random() * 5 + 2;
            this.angle = Math.random() * Math.PI * 2; this.orbit = Math.random() * 150 + 50;
            this.life = 1.0; this.history = []; this.speed = Math.random() * 40 + 10;
        }
        draw() {
            if (stage === 0) { // PLANCK: FILAMENTOS HD
                ctx.strokeStyle = `rgba(0, 242, 255, ${Math.random() * 0.7})`;
                ctx.lineWidth = 1.2; ctx.beginPath();
                let v = Math.tan(Date.now() * 0.03 + this.x) * 30;
                ctx.moveTo(this.x, 0); ctx.bezierCurveTo(this.x + v, h/3, this.x - v, 2*h/3, this.x, h);
                ctx.stroke();
            } else if (stage === 1) { // ÁTOMO RELIEVE
                ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
                ctx.fillStyle = "#ff2d55"; ctx.beginPath(); ctx.arc(this.x, this.y, 7, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                let r = Date.now() * 0.009 + this.angle;
                ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.arc(this.x + Math.cos(r)*this.orbit, this.y + Math.sin(r)*this.orbit, 3, 0, Math.PI*2); ctx.fill();
            } else if (stage === 2) { // BIO OXIDACIÓN PRO
                this.life -= 0.0025; if(this.life < 0) this.life = 1;
                let r = 50 + (1-this.life)*205, g = 255 * this.life, b = 20 + (1-this.life)*50;
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.life})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size * (1.8 - this.life) * 6, 0, Math.PI*2); ctx.fill();
                if(this.life < 0.4) { ctx.fillStyle = "rgba(100,50,0,0.5)"; ctx.fillRect(this.x-5, this.y-5, 10, 10); }
            } else if (stage === 3) { // SALTO RELATIVISTA
                let s = w/this.z; let px = w/2 + (this.x-w/2)*s, py = h/2 + (this.y-h/2)*s;
                this.z -= this.speed; if(this.z < 1) this.z = w;
                ctx.strokeStyle = `rgba(255, 204, 0, ${s/25})`; ctx.lineWidth = s;
                ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + (px-w/2)*0.15, py + (py-h/2)*0.15); ctx.stroke();
            } else if (stage === 4) { // PORTAL Y DESDOBLAMIENTO
                this.angle += 0.35; this.orbit *= 0.982;
                let dx = w/2 + Math.cos(this.angle) * this.orbit * 12;
                let dy = h/2 + Math.sin(this.angle) * this.orbit * 12;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.ellipse(dx, dy, this.size*30, this.size*2, this.angle, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    particles = Array.from({ length: 200 }, () => new Particle());

    function playQuantumSound(freq, type) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 5);
        osc.connect(gain); gain.connect(masterGain);
        osc.start(); osc.stop(audioCtx.currentTime + 5);
    }

    function loop() {
        if (stage === 4) {
            // EFECTO ESPEJO EMPAÑADO (DIFUSIÓN) Y GIRO ESPECTRAL
            ctx.fillStyle = `rgba(255, 255, 255, 0.03)`; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexAngle);
            vortexAngle += 0.25; ctx.globalAlpha = 0.4;
            ctx.filter = `blur(${Math.random()*15}px) contrast(1.5) brightness(1.2)`;
            ctx.drawImage(canvas, -w/2, -h/2); ctx.restore();
            // Fuerza espectral atrapando la luz
            if(Math.random() > 0.92) {
                ctx.strokeStyle = "rgba(188, 19, 254, 0.4)"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(w/2, h/2, Math.random()*w, 0, Math.PI*2); ctx.stroke();
            }
        } else {
            ctx.fillStyle = `rgba(0, 0, 0, ${stage === 3 ? 0.08 : 0.25})`; 
            ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        if (active) particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function step() {
        const s = timeline[stage];
        document.getElementById("st-title").innerText = s.t;
        document.getElementById("st-title").style.color = s.color;
        document.getElementById("st-desc").innerText = s.d;
        document.getElementById("main-title").style.textShadow = `0 0 30px ${s.color}`;
        playQuantumSound(s.f, s.type);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { 
                ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); 
                particles.forEach(p => p.init());
            }
            step();
        }, s.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        active = true; this.style.display = 'none';
        step();
    });

    loop();
</script>
</body>
</html>
