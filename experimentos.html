<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Quantum Master Engine FINAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        :root {
            --planck: #00f2ff;
            --atomic: #ffffff;
            --bio: #39ff14;
            --cosmos: #ffcc00;
            --vortex: #bc13fe;
            --exit: #ff3131;
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; height: 100%; width: 100%;
        }

        #canvas-cosmos { position: fixed; top: 0; left: 0; z-index: 1; }

        header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 100%; pointer-events: none;
        }

        .title-3d {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(22px, 6vw, 40px);
            color: #fff; text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 0 1px 0 #444, 0 4px 0 #222, 0 0 15px var(--planck), 0 0 35px var(--planck);
            -webkit-text-stroke: 1px rgba(255,255,255,0.3);
        }

        /* --- PANEL DE ORBES (Botones Redondos Neón) --- */
        .ui-panel {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 20px;
        }

        .orb {
            width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 26px;
            background: rgba(0,0,0,0.85); border: 2.5px solid #fff;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 25px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); box-shadow: 0 0 25px var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); box-shadow: 0 0 25px var(--vortex); }

        .orb:hover { transform: scale(1.15) rotate(15deg); filter: brightness(1.3); }

        .narrative {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 85%; max-width: 600px;
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 15px;
            border: 2px solid var(--planck); box-shadow: 0 0 40px rgba(0,242,255,0.2);
        }
        #st-title { font-size: 24px; color: var(--planck); margin: 0; text-transform: uppercase; }
        #st-desc { font-size: 14px; color: #ccc; margin-top: 10px; line-height: 1.5; }

        img.logo { position: fixed; top: 20px; left: 20px; width: 70px; z-index: 110; border-radius: 50%; border: 2px solid var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LAB LUIS QUANTUM</div></header>
<img src="logo.jpg" class="logo" alt="LUIS">

<div class="ui-panel">
    <a href="index.html" class="orb btn-exit" title="Inicio">🏠</a>
    <div id="btn-audio" class="orb" title="Activar Audio">🔊</div>
    <a href="index3d.html" class="orb btn-bh" title="Black Hole 3D">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">SISTEMA INICIAL</h2>
    <p id="st-desc">Inicia el audio para ver las líneas de Planck vibrar y el ciclo de la materia.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h;
    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    let stage = 0;
    let particles = [];
    let audioCtx, masterGain;
    let sequenceActive = false;
    let vortexAngle = 0;

    const timeline = [
        { t: "Líneas de Planck", d: "Micro-cuerdas vibrantes de energía pura. Aquí nace la geometría del universo.", color: "#00f2ff", dur: 10000 },
        { t: "Forja Atómica", d: "Quarks, protones, neutrones y electrones se ensamblan. Los neutrinos cruzan el vacío.", color: "#ffffff", dur: 12000 },
        { t: "Oxidación Bio", d: "Envejecemos por entropía. Los electrones se desequilibran y las células mueren por oxidación.", color: "#39ff14", dur: 12000 },
        { t: "Límite Estelar", d: "Expansión galáctica a la velocidad de la luz. El tiempo se curva por la masa de los planetas.", color: "#ffcc00", dur: 12000 },
        { t: "Desdoblamiento", d: "¡Colapso Cuántico! El universo se nubla, gira y se espeja antes de volver al punto cero.", color: "#bc13fe", dur: 15000 }
    ];

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w;
            this.size = Math.random() * 3 + 1;
            this.angle = Math.random() * Math.PI * 2;
            this.orbit = Math.random() * 80 + 20;
            this.life = 1.0;
        }
        draw() {
            if(stage === 0) { // PLANCK: LÍNEAS REALISTAS
                ctx.strokeStyle = `rgba(0, 242, 255, ${Math.random()})`;
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                let v = Math.sin(Date.now()*0.02 + this.angle)*40;
                ctx.moveTo(this.x - v, this.y); ctx.lineTo(this.x + v, this.y + 15);
                ctx.stroke();
            } else if(stage === 1) { // ÁTOMO (Nucleones y Quarks)
                ctx.fillStyle = "#ff2d55"; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
                let rot = Date.now()*0.006 + this.angle;
                let ex = this.x + Math.cos(rot)*this.orbit;
                let ey = this.y + Math.sin(rot)*this.orbit;
                ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.arc(ex, ey, 2, 0, Math.PI*2); ctx.fill();
            } else if(stage === 2) { // OXIDACIÓN CELULAR
                this.life -= 0.003; if(this.life < 0) this.life = 1;
                let r = 50 + (1-this.life)*200; let g = 255 * this.life;
                ctx.fillStyle = `rgba(${r}, ${g}, 50, ${this.life})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size*(6-this.life*4), 0, Math.PI*2); ctx.fill();
            } else if(stage === 3) { // EXPANSIÓN
                let s = w/this.z;
                let px = w/2 + (this.x-w/2)*s; let py = h/2 + (this.y-h/2)*s;
                this.z -= 18; if(this.z < 1) this.z = w;
                ctx.fillStyle = timeline[3].color; ctx.beginPath(); ctx.arc(px, py, this.size*s*3, 0, Math.PI*2); ctx.fill();
            } else if(stage === 4) { // VÓRTICE / DESDOBLAMIENTO
                this.angle += 0.2; this.orbit *= 0.99;
                let dist = this.orbit * 8;
                this.x = w/2 + Math.cos(this.angle) * dist;
                this.y = h/2 + Math.sin(this.angle) * dist;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.ellipse(this.x, this.y, this.size*15, this.size, this.angle, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    particles = Array.from({ length: 130 }, () => new Particle());

    function loop() {
        if(stage === 4) {
            ctx.fillStyle = "rgba(0,0,0,0.08)"; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexAngle);
            vortexAngle += 0.15; ctx.globalAlpha = 0.4; ctx.filter = "blur(6px)";
            ctx.drawImage(canvas, -w/2, -h/2); ctx.restore();
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function startSequence() {
        if(!sequenceActive) return;
        const cur = timeline[stage];
        document.getElementById("st-title").innerText = cur.t;
        document.getElementById("st-desc").innerText = cur.d;
        document.getElementById("st-title").style.color = cur.color;

        const playSfx = (f, t, d) => {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime + d);
        };

        if(stage === 0) playSfx(523, 'sine', 3);
        if(stage === 4) playSfx(50, 'square', 10);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); particles.forEach(p => p.init()); }
            startSequence();
        }, cur.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        sequenceActive = true; this.style.display = 'none';
        startSequence();
    });

    loop();
</script>
</body>
</html>
