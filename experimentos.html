<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - EXPERIMENTAL CORE V3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
        :root { --planck: #00f2ff; --bio: #39ff14; --vortex: #bc13fe; --exit: #ff3131; }
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        header { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 60; text-align: center; width: auto; pointer-events: none; }
        .title-3d { font-weight: 900; font-size: 28px; color: #fff; text-transform: uppercase; letter-spacing: 8px; text-shadow: 0 1px 0 #444, 0 0 15px var(--planck); border-bottom: 1px solid rgba(0, 242, 255, 0.3); padding-bottom: 5px; }

        .panel-left { position: fixed; top: 25px; left: 25px; z-index: 1000; }
        .panel-right { position: fixed; top: 25px; right: 25px; z-index: 1000; display: flex; gap: 15px; }
        .orb { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; font-size: 20px; background: rgba(0,0,0,0.8); border: 2px solid #fff; transition: 0.4s; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 20px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); }

        .narrative { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; width: 80%; max-width: 450px; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 40px; border: 1px solid var(--planck); backdrop-filter: blur(10px); }
        #st-title { font-size: 14px; color: var(--planck); margin: 0; letter-spacing: 3px; text-shadow: 0 0 8px var(--planck); }
        #st-desc { font-size: 10px; color: #aaa; margin-top: 4px; font-family: sans-serif; }
        img.logo { position: fixed; top: 85px; left: 20px; width: 55px; z-index: 110; border-radius: 50%; border: 1px solid var(--planck); opacity: 0.7; }
    </style>
</head>
<body>
<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LUIS QUANTUM</div></header>
<img src="logo.jpg" class="logo">
<div class="panel-left"><a href="index.html" class="orb btn-exit">🏠</a></div>
<div class="panel-right"><div id="btn-audio" class="orb">🔊</div><a href="index3d.html" class="orb btn-bh">🌀</a></div>
<div class="narrative"><h2 id="st-title">SISTEMA STANDBY</h2><p id="st-desc">INICIAR SECUENCIA EXPERIMENTAL</p></div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, particles = [], audioCtx, masterGain, active = false, vortexV = 0;

    const timeline = [
        { t: "Cuerdas de Planck", d: "VIBRACIÓN BASE CUÁNTICA", color: "#00f2ff", dur: 10000, f: 440, wave: 'sine' },
        { t: "Materia Atómica", d: "FRAGUA SUBATÓMICA", color: "#ffffff", dur: 12000, f: 330, wave: 'triangle' },
        { t: "Oxidación Bio", d: "FRAGMENTACIÓN CELULAR", color: "#39ff14", dur: 12000, f: 220, wave: 'sine' },
        { t: "Expansión Warp", d: "VELOCIDAD LUZ: FUGA ESTELAR", color: "#ffcc00", dur: 12000, f: 110, wave: 'sawtooth' },
        { t: "Singularidad", d: "DESDOBLAMIENTO ESPECTRAL", color: "#bc13fe", dur: 20000, f: 55, wave: 'square' }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w; this.size = Math.random() * 2 + 1;
            this.angle = Math.random() * Math.PI * 2; this.orbit = Math.random() * 150 + 50;
            this.speed = Math.random() * 20 + 15;
        }
        draw() {
            if (stage === 0) { // PLANCK
                ctx.strokeStyle = `rgba(0, 242, 255, ${Math.random()})`;
                ctx.beginPath(); let v = Math.sin(Date.now() * 0.05 + this.x) * 30;
                ctx.moveTo(this.x, 0); ctx.lineTo(this.x + v, h); ctx.stroke();
            } else if (stage === 2) { // BIO
                let r = 50 + Math.random()*200, g = 255 * Math.random();
                ctx.fillStyle = `rgba(${r}, ${g}, 40, 0.6)`;
                ctx.beginPath(); ctx.ellipse(this.x, this.y, this.size*15, this.size*8, Math.random(), 0, Math.PI*2); ctx.fill();
            } else if (stage === 3) { // WARP: ESTRELLAS CON RASTRO REALISTA
                let s = w/this.z; let px = w/2 + (this.x-w/2)*s, py = h/2 + (this.y-h/2)*s;
                this.z -= this.speed; if(this.z < 1) this.z = w;
                let x2 = w/2 + (this.x-w/2)*(w/(this.z + this.speed * 0.5));
                let y2 = h/2 + (this.y-h/2)*(w/(this.z + this.speed * 0.5));
                ctx.strokeStyle = `rgba(255, 204, 0, ${s/20})`;
                ctx.lineWidth = this.size * s; ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x2, y2); ctx.stroke();
            } else if (stage === 4) { // SINGULARIDAD
                this.angle += 0.4; this.orbit *= 0.99;
                let dx = w/2 + Math.cos(this.angle) * this.orbit * 10;
                let dy = h/2 + Math.sin(this.angle) * this.orbit * 10;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.ellipse(dx, dy, this.size*20, this.size, this.angle, 0, Math.PI*2); ctx.fill();
            } else { // ATOMIC
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    particles = Array.from({ length: 200 }, () => new Particle());

    function playAudio(f, w) {
        if(!audioCtx) return;
        let o = audioCtx.createOscillator(); let g = audioCtx.createGain();
        o.type = w; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 4);
        o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime + 4);
    }

    function loop() {
        if (stage === 4) { // DESDOBLAMIENTO: ESPEJO EMPAÑADO
            ctx.fillStyle = "rgba(255,255,255,0.05)"; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexV);
            vortexV += 0.3; ctx.globalAlpha = 0.4;
            ctx.filter = `blur(15px) contrast(1.5) hue-rotate(${vortexV*5}deg)`;
            ctx.drawImage(canvas, -w/2-5, -h/2-5, w+10, h+10); ctx.restore();
        } else {
            ctx.fillStyle = `rgba(0,0,0,${stage === 3 ? 0.15 : 0.25})`; ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        if (active) particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function step() {
        const s = timeline[stage];
        document.getElementById("st-title").innerText = s.t;
        document.getElementById("st-desc").innerText = s.d;
        document.getElementById("st-title").style.color = s.color;
        playAudio(s.f, s.wave);
        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); particles.forEach(p => p.init()); }
            step();
        }, s.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        active = true; this.style.display = 'none'; step();
    });

    loop();
</script>
</body>
</html>
