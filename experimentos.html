<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - QUANTUM SINGULARITY FINAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        :root { --planck: #00f2ff; --bio: #39ff14; --vortex: #bc13fe; --exit: #ff3131; }

        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* TÍTULO ARRIBA - SIN ESTORBAR */
        header { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); z-index: 50; text-align: center; width: 100%; pointer-events: none; }
        .title-3d {
            font-size: clamp(24px, 8vw, 55px); color: #fff; text-transform: uppercase; letter-spacing: 10px;
            text-shadow: 0 1px 0 #555, 0 4px 0 #111, 0 0 30px var(--planck);
        }

        /* BOTONES NEÓN */
        .ui-panel { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 15px; }
        .orb {
            width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 22px; background: rgba(0,0,0,0.85); border: 2px solid #fff;
            transition: 0.3s; box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 25px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); }

        /* NARRATIVA MINIMALISTA ABAJO */
        .narrative {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 100;
            text-align: center; width: 85%; max-width: 500px; background: rgba(0,0,0,0.8);
            padding: 12px 20px; border-radius: 50px; border: 1px solid var(--planck); backdrop-filter: blur(10px);
        }
        #st-title { font-size: 16px; color: var(--planck); margin: 0; letter-spacing: 2px; text-shadow: 0 0 10px var(--planck); }
        #st-desc { font-size: 11px; color: #fff; margin-top: 5px; opacity: 0.8; font-family: sans-serif; }
        
        img.logo { position: fixed; top: 20px; left: 20px; width: 60px; z-index: 110; border-radius: 50%; border: 2px solid var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LUIS QUANTUM</div></header>
<img src="logo.jpg" class="logo">

<div class="ui-panel">
    <a href="index.html" class="orb btn-exit">🏠</a>
    <div id="btn-audio" class="orb">🔊</div>
    <a href="index3d.html" class="orb btn-bh">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">LABORATORIO LUIS</h2>
    <p id="st-desc">Pulsa el ORBE CELESTE para activar la singularidad.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, particles = [], audioCtx, masterGain, active = false, vortexAngle = 0;

    const timeline = [
        { t: "Líneas de Planck", d: "TEJIDO BASE - VIBRACIÓN 10⁻³⁵m", color: "#00f2ff", dur: 10000, f: 523, wave: 'sine' },
        { t: "Fragua Atómica", d: "MATERIA SUBATÓMICA - EQUILIBRIO QUARK", color: "#ffffff", dur: 12000, f: 392, wave: 'triangle' },
        { t: "Oxidación Bio", d: "APOPTOSIS Y FRAGMENTACIÓN CELULAR", color: "#39ff14", dur: 12000, f: 261, wave: 'sine' },
        { t: "Fuga Galáctica", d: "VELOCIDAD WARP - EXPANSIÓN ESTELAR", color: "#ffcc00", dur: 12000, f: 130, wave: 'sawtooth' },
        { t: "Singularidad", d: "COLAPSO ESPECTRAL - ESPEJO CUÁNTICO", color: "#bc13fe", dur: 18000, f: 65, wave: 'square' }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w; this.size = Math.random() * 4 + 2;
            this.angle = Math.random() * Math.PI * 2; this.orbit = Math.random() * 120 + 40;
            this.life = 1.0;
        }
        draw() {
            if (stage === 0) { // PLANCK VIBRANTE
                ctx.strokeStyle = `rgba(0, 242, 255, ${0.2 + Math.random()*0.8})`;
                ctx.lineWidth = 1; ctx.beginPath();
                let v = Math.sin(Date.now() * 0.04 + this.x) * 40;
                ctx.moveTo(this.x, 0); ctx.lineTo(this.x + v, h); ctx.stroke();
            } else if (stage === 2) { // BIO REALISTA
                this.life -= 0.003; if(this.life < 0) this.life = 1;
                let r = 60 + (1-this.life)*180, g = 255 * this.life;
                ctx.fillStyle = `rgba(${r}, ${g}, 40, ${this.life})`;
                let vib = Math.sin(Date.now()*0.1)*5;
                ctx.beginPath(); ctx.ellipse(this.x + vib, this.y, this.size*10*(1.5-this.life), this.size*6, 0, 0, Math.PI*2); ctx.fill();
                if(this.life < 0.4) { ctx.fillStyle="#8B4513"; ctx.fillRect(this.x, this.y, 2, 2); } // Fragmentos
            } else if (stage === 4) { // SINGULARIDAD ESPECTRAL
                this.angle += 0.35; this.orbit *= 0.985;
                let dx = w/2 + Math.cos(this.angle) * this.orbit * 12;
                let dy = h/2 + Math.sin(this.angle) * this.orbit * 12;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.ellipse(dx, dy, this.size*25, this.size*1.2, this.angle, 0, Math.PI*2); ctx.fill();
            } else { // COSMOS/ATOMIC
                let s = stage === 3 ? w/this.z : 1;
                let px = stage === 3 ? w/2 + (this.x-w/2)*s : this.x;
                let py = stage === 3 ? h/2 + (this.y-h/2)*s : this.y;
                if(stage === 3) { this.z -= 20; if(this.z < 1) this.z = w; }
                ctx.fillStyle = timeline[stage].color;
                ctx.beginPath(); ctx.arc(px, py, this.size*s, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    particles = Array.from({ length: 160 }, () => new Particle());

    function playAudio(freq, type) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator(); let g = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 4);
        osc.connect(g); g.connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + 4);
    }

    function loop() {
        if (stage === 4) {
            ctx.fillStyle = "rgba(255,255,255,0.03)"; ctx.fillRect(0,0,w,h); // Espejo empañado
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexAngle);
            vortexAngle += 0.25; ctx.globalAlpha = 0.4;
            ctx.filter = `blur(12px) contrast(1.5) brightness(1.2)`;
            ctx.drawImage(canvas, -w/2, -h/2); ctx.restore();
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        if (active) particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function step() {
        const s = timeline[stage];
        document.getElementById("st-title").innerText = s.t;
        document.getElementById("st-title").style.color = s.color;
        document.getElementById("st-desc").innerText = s.d;
        playAudio(s.f, s.wave);
        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); particles.forEach(p => p.init()); }
            step();
        }, s.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        active = true; this.style.display = 'none';
        step();
    });

    loop();
</script>
</body>
</html>
