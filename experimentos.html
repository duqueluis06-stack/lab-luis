<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Quantum Reality Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="canonical" href="https://duquemartini.com/experimentos.html">

    <style>
        :root {
            --planck: #00f2ff;
            --atomic: #ffffff;
            --bio: #39ff14;
            --cosmos: #ffcc00;
            --vortex: #bc13fe;
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; height: 100%; width: 100%;
        }

        #canvas-cosmos { position: fixed; top: 0; left: 0; z-index: 1; }

        /* --- INTERFAZ: ORBES NEÓN --- */
        header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; pointer-events: none;
        }

        .title-3d {
            font-size: clamp(16px, 4vw, 28px); font-weight: 900; letter-spacing: 6px;
            color: #fff; text-transform: uppercase;
            text-shadow: 0 0 15px var(--planck), 0 5px 10px rgba(0,0,0,1);
        }

        .ui-orb-container {
            position: fixed; top: 20px; right: 20px; z-index: 110;
            display: flex; flex-direction: column; gap: 15px;
        }

        .orb {
            width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s; border: 2px solid #fff;
            text-decoration: none; font-size: 18px; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        #audio-init { border-color: var(--planck); box-shadow: 0 0 20px var(--planck); color: var(--planck); }
        .bh-link { border-color: var(--vortex); box-shadow: 0 0 20px var(--vortex); color: var(--vortex); }

        /* --- NARRATIVA --- */
        .narrative-box {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 85%; max-width: 650px;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #stage-title { font-size: 20px; margin: 0; text-transform: uppercase; }
        #stage-desc { font-size: 14px; color: #aaa; margin-top: 8px; line-height: 1.5; }

        img.logo { position: fixed; top: 20px; left: 20px; width: 60px; z-index: 110; border-radius: 50%; border: 1px solid var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>

<header><div class="title-3d">LAB LUIS UNIVERSAL</div></header>
<img src="logo.jpg" class="logo" alt="Logo">

<div class="ui-orb-container">
    <div id="audio-init" class="orb">🔊</div>
    <a href="index3d.html" class="orb bh-link">🌀</a>
</div>

<div class="narrative-box">
    <h2 id="stage-title">SISTEMA CUÁNTICO</h2>
    <p id="stage-desc">Inicia el audio para observar la vibración de las cuerdas primordiales.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h;
    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    let stage = 0;
    let particles = [];
    let audioCtx, masterGain;
    let vortexAngle = 0;

    const timeline = [
        { t: "Teoría de Cuerdas", d: "Antes de la materia, todo es vibración. Las cuerdas de Planck definen las leyes de la física.", color: "#00f2ff", dur: 12000 },
        { t: "Núcleo Atómico", d: "Protones, neutrones y electrones. Los neutrinos atraviesan el tejido sin tocar nada.", color: "#ffffff", dur: 14000 },
        { t: "Entropía Celular", d: "La vida envejece. Los electrones pierden equilibrio y las células se oxidan y fragmentan.", color: "#39ff14", dur: 14000 },
        { t: "Expansión Galáctica", d: "Velocidad de la luz. Estrellas y planetas se curvan por la relatividad general.", color: "#ffcc00", dur: 16000 },
        { t: "Vórtice Translúcido", d: "Desdoblamiento final. El universo gira y se espeja antes del colapso total.", color: "#bc13fe", dur: 15000 }
    ];

    function playSound(f, type, d) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = type; o.frequency.value = f;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
        o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime + d);
    }

    class Entity {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w;
            this.size = Math.random() * 3 + 1;
            this.angle = Math.random() * Math.PI * 2;
            this.orbit = Math.random() * 50 + 20;
            this.speed = (Math.random() - 0.5) * 0.1;
        }
        draw() {
            ctx.shadowBlur = 0;
            if(stage === 0) { // CUERDAS VIBRANTES
                ctx.strokeStyle = timeline[0].color;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + Math.sin(Date.now()*0.01 + this.angle)*30, this.y + Math.cos(Date.now()*0.01 + this.angle)*30);
                ctx.stroke();
            } else if(stage === 1) { // ÁTOMO (Electrones/Neutrinos)
                ctx.fillStyle = "#ff3131"; // Protón
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
                // Electrón orbitando
                let ex = this.x + Math.cos(Date.now()*0.005 + this.angle)*this.orbit;
                let ey = this.y + Math.sin(Date.now()*0.005 + this.angle)*this.orbit;
                ctx.fillStyle = "#00f2ff";
                ctx.beginPath(); ctx.arc(ex, ey, 2, 0, Math.PI*2); ctx.fill();
            } else if(stage === 2) { // CÉLULA (Fragmentación)
                ctx.fillStyle = this.angle > 3 ? "#1a4d1a" : "#39ff14";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size * (Math.sin(Date.now()*0.001)+2), 0, Math.PI*2); ctx.fill();
            } else if(stage === 3) { // PLANETAS Y ESTRELLAS
                let s = w/this.z;
                let px = w/2 + (this.x-w/2)*s;
                let py = h/2 + (this.y-h/2)*s;
                this.z -= 12; if(this.z < 1) this.z = w;
                
                let g = ctx.createRadialGradient(px, py, 0, px, py, this.size*s);
                g.addColorStop(0, "#fff"); g.addColorStop(0.2, timeline[3].color); g.addColorStop(1, "transparent");
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(px, py, this.size*s*2, 0, Math.PI*2); ctx.fill();
            } else if(stage === 4) { // VÓRTICE
                this.angle += 0.04; this.orbit *= 0.99;
                this.x = w/2 + Math.cos(this.angle) * this.orbit * 5;
                this.y = h/2 + Math.sin(this.angle) * this.orbit * 5;
                ctx.fillStyle = "rgba(188, 19, 254, 0.5)";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    particles = Array.from({ length: 150 }, () => new Entity());

    function loop() {
        if(stage === 4) {
            ctx.fillStyle = "rgba(0,0,0,0.08)";
            ctx.fillRect(0,0,w,h);
            // Efecto Espejo Translúcido
            ctx.save();
            ctx.translate(w/2, h/2);
            ctx.rotate(vortexAngle);
            vortexAngle += 0.005;
            ctx.globalAlpha = 0.4;
            ctx.drawImage(canvas, -w/2, -h/2);
            ctx.restore();
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.fillRect(0,0,w,h);
        }

        particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function startSequence() {
        const cur = timeline[stage];
        document.getElementById("stage-title").innerText = cur.t;
        document.getElementById("stage-desc").innerText = cur.d;
        document.getElementById("stage-title").style.color = cur.color;

        if(stage === 0) playSound(523, 'sine', 4);
        if(stage === 1) playSound(880, 'sine', 2);
        if(stage === 3) playSound(110, 'sawtooth', 5);
        if(stage === 4) playSound(55, 'square', 10);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); }
            startSequence();
        }, cur.dur);
    }

    document.getElementById('audio-init').addEventListener('click', () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        masterGain.gain.value = 0.15;
        document.getElementById('audio-init').style.display = 'none';
        startSequence();
    });

    loop();
</script>
</body>
</html>
