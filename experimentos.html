<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Experimentos - Laboratorio | Lab Luis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  background:#000;
  font-family:Arial;
}

/* 🌌 UNIVERSO */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* 🧪 PANEL */
#panel{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
  background:rgba(0,0,0,0.7);
  border:1px solid #00ffcc;
  color:#00ffcc;
  padding:12px;
  width:200px;
  font-size:12px;
}

#panel button{
  width:100%;
  margin-top:6px;
  padding:6px;
  border:none;
  cursor:pointer;
  background:#00ffcc;
  color:#000;
  font-weight:bold;
}

/* 🌀 BLACK HOLE (INTACTO) */
#blackhole{
  position:fixed;
  top:10px;
  right:10px;
  z-index:9999;
  padding:10px 14px;
  background:linear-gradient(45deg,#00ffcc,#00aaff);
  color:#000;
  font-weight:bold;
  border-radius:10px;
  text-decoration:none;
}

/* 📡 HUD */
#hud{
  position:fixed;
  bottom:10px;
  left:10px;
  z-index:10;
  background:rgba(0,0,0,0.6);
  color:#00ffcc;
  padding:8px;
  font-size:12px;
  border:1px solid #00ffcc;
}
</style>
</head>

<body>

<!-- 🌀 BLACK HOLE (NO TOCAR) -->
<a id="blackhole" href="index3d.html">🌀 Black Hole 3D</a>

<!-- 🧪 PANEL -->
<div id="panel">
🧬 LAB LUIS

<button onclick="mode='time'">⏳ Tiempo</button>
<button onclick="mode='light'">💡 Luz</button>
<button onclick="mode='space'">🪐 Espacio</button>
<button onclick="emitLight()">⚡ Emitir luz</button>
</div>

<!-- 📡 HUD -->
<div id="hud">Sistema activo</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

/* 🌌 ESTRELLAS */
let stars = [];
for(let i=0;i<500;i++){
  stars.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    z:Math.random()*2
  });
}

/* ⚙️ SISTEMA */
let mode = "time";
let pulses = [];

/* 💡 EMITIR LUZ */
function emitLight(){
  pulses.push({p:0});
}

/* 🎯 INTERACCIÓN */
let mx=0,my=0;

window.addEventListener("mousemove",(e)=>{
  mx = e.clientX / innerWidth - 0.5;
  my = e.clientY / innerHeight - 0.5;
});

/* 🌌 LOOP */
function draw(){

  ctx.clearRect(0,0,c.width,c.height);

  /* ESTRELLAS */
  for(let s of stars){
    s.y += 0.3 + s.z;

    if(s.y > c.height){
      s.y = 0;
      s.x = Math.random()*c.width;
    }

    ctx.fillStyle = "#00ffcc";
    ctx.globalAlpha = 0.5 + s.z*0.3;
    ctx.fillRect(s.x,s.y,1.5,1.5);
  }

  /* LUZ (SIMULACIÓN SIMPLE) */
  for(let p of pulses){
    p.p += 0.01;

    let x = c.width/2 + (mx*200)*p.p;
    let y = c.height/2 + (my*200)*p.p;

    ctx.beginPath();
    ctx.fillStyle = "rgba(255,0,255,0.8)";
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fill();
  }

  pulses = pulses.filter(p=>p.p<1);

  /* HUD */
  document.getElementById("hud").innerText =
  "Modo: " + mode + " | Pulsos: " + pulses.length;

  requestAnimationFrame(draw);
}

draw();

/* RESIZE */
window.addEventListener("resize",()=>{
  c.width = innerWidth;
  c.height = innerHeight;
});
</script>

</body>
</html>
