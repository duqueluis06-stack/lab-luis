    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --neon-green: #39ff14;
            --neon-purple: #bc13fe;
            --neon-main: #00ffcc;
            --neon-red: #ff3131;
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100%; width: 100%;
        }

        canvas {
            position: fixed; top: 0; left: 0;
            z-index: 1;
            filter: contrast(1.2) brightness(1.2);
        }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%);
            z-index: 2; pointer-events: none;
        }

        /* --- INTERFAZ --- */
        header {
            position: fixed; top: 0; left: 50%;
            transform: translateX(-50%);
            z-index: 90;
            padding: 15px 40px;
            font-size: clamp(12px, 2.5vw, 20px);
            font-weight: 900;
            text-align: center;
            background: rgba(0,0,0,0.85);
            border-bottom: 2px solid var(--neon-main);
            border-radius: 0 0 20px 20px;
            letter-spacing: 6px;
            pointer-events: none;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.4);
        }

        img.logo {
            position: fixed; top: 20px; left: 20px;
            width: 75px; height: 75px;
            z-index: 100;
            border: 2px solid var(--neon-main);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-main);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            object-fit: cover;
        }
        img.logo:hover { transform: scale(1.1) rotate(10deg); box-shadow: 0 0 30px var(--neon-cyan); }

        .control-panel {
            position: fixed; top: 120px; left: 20px;
            z-index: 100;
            background: rgba(0, 15, 15, 0.7);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(12px);
        }

        .panel-grid { display: flex; flex-direction: column; gap: 10px; }

        .panel-grid a {
            padding: 10px 20px;
            text-decoration: none;
            color: var(--neon-main);
            border: 1px solid rgba(0, 255, 204, 0.2);
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .panel-grid a:hover {
            background: var(--neon-main);
            color: #000;
            box-shadow: 0 0 20px var(--neon-main);
            transform: translateX(10px);
        }

        .blackhole-btn {
            position: fixed; top: 20px; right: 20px;
            z-index: 100;
            padding: 14px 28px;
            font-size: 11px;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(45deg, #000, #bc13fe, #ff00ff);
            background-size: 200% 200%;
            animation: grad-flow 3s infinite alternate;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 0 20px var(--neon-purple);
            border: 1px solid #fff;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        @keyframes grad-flow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .blackhole-btn:hover { transform: scale(1.1); box-shadow: 0 0 35px var(--neon-purple); }

        .narrative-engine {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            width: 85%; max-width: 650px;
            background: rgba(0, 8, 8, 0.9);
            border-left: 6px solid var(--neon-cyan);
            padding: 25px;
            border-radius: 0 20px 20px 0;
            z-index: 80;
            backdrop-filter: blur(15px);
            box-shadow: -15px 0 30px rgba(0,0,0,0.8);
        }

        #stage-title { font-size: 26px; color: var(--neon-cyan); margin: 0; text-transform: uppercase; letter-spacing: 6px; }
        #stage-desc { font-size: 14px; margin-top: 10px; color: #ddd; line-height: 1.6; font-family: sans-serif; }

        #btn-init {
            position: fixed; inset: 0; z-index: 1000;
            background: #000; color: var(--neon-main);
            border: none; font-family: 'Orbitron'; font-size: 20px;
            letter-spacing: 10px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: 0.5s;
        }
        #btn-init:hover { background: #051010; text-shadow: 0 0 20px var(--neon-main); }

        #creditos_btn {
            position: fixed; bottom: 15px; right: 15px;
            padding: 6px 12px; background: rgba(0,0,0,0.6);
            border: 1px solid var(--neon-main);
            color: var(--neon-main); border-radius: 5px;
            cursor: pointer; z-index: 100; font-size: 10px;
        }
    </style>
</head>

<body>

<button id="btn-init">INICIAR SECUENCIA</button>

<div class="vignette"></div>
<canvas id="canvas-cosmos"></canvas>

<header>⚡ LAB LUIS – Quantum Engine</header>
<img src="logo.jpg" class="logo" alt="Lab Logo">

<div class="control-panel">
    <div class="panel-grid">
        <a href="index.html">🏠 Inicio</a>
        <a href="proyectos.html">👽 Vórtice</a>
        <a href="laboratorio.html">📝 Pioneros</a>
        <a href="libros.html">📚 KDP Libros</a>
    </div>
</div>

<a href="index3d.html" class="blackhole-btn">🌀 BLACK HOLE 3D</a>

<div class="narrative-engine" id="narrative-box" style="opacity: 0;">
    <h2 id="stage-title">...</h2>
    <p id="stage-desc">...</p>
</div>

<div id="creditos_btn" onclick="window.location.href='creditos.html'">ⓘ Créditos</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, particles = [], active = false;
    let audioCtx, mainGain;

    const timeline = [
        { t: "Línea de Planck", d: "Escala 10⁻³⁵m. El espacio-tiempo es una espuma cuántica vibrando en frecuencias neón.", color: "#00f2ff", dur: 9000, freq: 440 },
        { t: "Fase Subatómica", d: "Quarks y neutrinos emergen del vacío. La flecha del tiempo comienza su marcha irreversible.", color: "#ffffff", dur: 9000, freq: 330 },
        { t: "Entropía Vital", d: "La vida lucha contra el desorden acumulando errores. El tiempo biológico es una cuenta regresiva.", color: "#39ff14", dur: 9000, freq: 220 },
        { t: "Salto Warp", d: "Dilatación temporal extrema. El espacio se curva mientras aceleramos hacia el horizonte estelar.", color: "#ffcc00", dur: 11000, freq: 110 },
        { t: "Singularidad", d: "Colapso total del espacio-tiempo. Más allá del horizonte, las leyes de la física se desintegran.", color: "#bc13fe", dur: 14000, freq: 60 }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    // AUDIO SYSTEM
    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        mainGain = audioCtx.createGain();
        mainGain.connect(audioCtx.destination);
        mainGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    }

    function playSynth(freq) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq/1.5, audioCtx.currentTime + 3);
        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.1);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 5);
        osc.connect(g); g.connect(mainGain);
        osc.start(); osc.stop(audioCtx.currentTime + 5);
    }

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w - w/2;
            this.y = Math.random() * h - h/2;
            this.z = Math.random() * w;
            this.pz = this.z;
            this.size = Math.random() * 2;
            this.ang = Math.random() * Math.PI * 2;
        }
        update() {
            if (stage === 3) this.z -= 28;
            else if (stage === 4) { this.ang += 0.04; this.z *= 0.98; }
            else this.z -= 0.7;
            if (this.z < 1) this.init();
        }
        draw() {
            let s = timeline[stage];
            ctx.fillStyle = s.color; ctx.strokeStyle = s.color;
            let sx = (this.x / this.z) * 600 + w/2;
            let sy = (this.y / this.z) * 600 + h/2;

            if (stage === 3) {
                let px = (this.x / this.pz) * 600 + w/2;
                let py = (this.y / this.pz) * 600 + h/2;
                ctx.lineWidth = (1 - this.z/w) * 4;
                ctx.globalAlpha = (1 - this.z/w);
                ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(sx, sy); ctx.stroke();
                this.pz = this.z;
            } else {
                ctx.globalAlpha = (1 - this.z/w);
                ctx.beginPath(); ctx.arc(sx, sy, this.size * (1 - this.z/w) * 4, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    particles = Array.from({ length: 600 }, () => new Particle());

    function loop() {
        ctx.fillStyle = stage === 3 ? "rgba(0,0,0,0.25)" : "rgba(0,0,0,0.18)";
        ctx.fillRect(0, 0, w, h);
        if (active) particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }

    function sequence() {
        const s = timeline[stage];
        const box = document.getElementById("narrative-box");
        box.style.opacity = 0;
        
        setTimeout(() => {
            document.getElementById("stage-title").innerText = s.t;
            document.getElementById("stage-desc").innerText = s.d;
            document.getElementById("stage-title").style.color = s.color;
            box.style.opacity = 1;
            playSynth(s.freq);
            ctx.fillStyle = "white"; ctx.fillRect(0,0,w,h); // Flash
        }, 600);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            sequence();
        }, s.dur);
    }

    document.getElementById('btn-init').addEventListener('click', function() {
        this.style.opacity = '0';
        setTimeout(() => this.remove(), 500);
        initAudio();
        active = true;
        sequence();
    });

    loop();
</script>
</body>
</html>
