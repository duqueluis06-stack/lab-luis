<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Cinematic Space-Time Experience</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --neon-main: #00ffcc;
            --neon-alert: #ff3131;
            --neon-space: #bc13fe;
            --glass: rgba(0, 15, 15, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #000; font-family: 'Courier New', Courier, monospace;
            color: var(--neon-main);
        }

        /* --- INTERFAZ ESTILO HOLLYWOOD --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            border-bottom: 1px solid rgba(0, 255, 204, 0.3);
            text-align: center; padding: 15px 0;
            letter-spacing: 5px; text-shadow: 0 0 10px var(--neon-main);
        }

        .control-panel {
            position: fixed; top: 100px; left: 20px; z-index: 100;
            background: var(--glass); border: 1px solid var(--neon-main);
            padding: 20px; border-radius: 0 20px 20px 0;
            box-shadow: 5px 0 20px rgba(0, 255, 204, 0.2);
            backdrop-filter: blur(10px);
        }

        .panel-grid { display: flex; flex-direction: column; gap: 15px; }

        .panel-grid a, .blackhole-btn {
            padding: 12px 25px; text-decoration: none; color: var(--neon-main);
            border: 1px solid var(--neon-main); border-radius: 4px;
            font-weight: bold; text-transform: uppercase; font-size: 13px;
            transition: all 0.3s ease; text-align: center;
            background: rgba(0, 255, 204, 0.05);
        }

        .panel-grid a:hover, .blackhole-btn:hover {
            background: var(--neon-main); color: #000;
            box-shadow: 0 0 30px var(--neon-main); transform: translateX(10px);
        }

        .blackhole-btn {
            position: fixed; top: 100px; right: 20px;
            background: linear-gradient(45deg, #000, #bc13fe);
            border-color: #bc13fe; color: #fff;
        }

        /* --- NARRATIVA CIENTÍFICA --- */
        .narrative-card {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); width: 70%;
            background: rgba(0, 5, 5, 0.9);
            border: 2px solid var(--neon-main);
            padding: 25px; border-radius: 15px; z-index: 100;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.3);
            border-left: 8px solid var(--neon-main);
        }

        #stage-title { 
            font-size: 32px; margin: 0; color: #fff;
            text-shadow: 2px 2px 0 var(--neon-main);
        }

        #stage-desc { 
            font-size: 16px; margin-top: 10px; color: #00ffcc; 
            line-height: 1.6; font-style: italic;
        }

        /* --- CANVAS --- */
        #canvas-cosmos { position: fixed; top: 0; left: 0; z-index: 1; }

        /* Efecto de glitch/ruido cinematográfico */
        .overlay-fx {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1; pointer-events: none; z-index: 2;
        }
    </style>
</head>
<body>

<div class="overlay-fx"></div>

<header>⚡ LAB LUIS – QUANTUM CHRONOS ENGINE</header>

<div class="control-panel">
    <div class="panel-grid">
        <a href="index.html">🏠 INICIO</a>
        <a href="proyectos.html">👽 VÓRTICE</a>
        <a href="laboratorio.html">🧪 CIENCIA</a>
        <a href="libros.html">📚 LIBROS</a>
    </div>
</div>

<a class="blackhole-btn" href="index3d.html">🌀 BLACK HOLE 3D</a>

<canvas id="canvas-cosmos"></canvas>

<div class="narrative-card">
    <h2 id="stage-title">Sincronizando...</h2>
    <p id="stage-desc">Iniciando secuencia de visualización espacio-temporal.</p>
</div>

<script>
const canvas = document.getElementById("canvas-cosmos");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let currentStage = 0;
let particles = [];
let stars = [];

// Cronología cinematográfica
const timeline = [
    { t: "Línea de Planck", d: "Escala 10⁻³⁵m. El tejido de la realidad se desgarra. El tiempo no fluye, es una espuma cuántica de pura vibración.", color: "#00ffcc" },
    { t: "Fase Subatómica", d: "Aparecen Quarks y Neutrinos. La materia es un caos neón de alta energía. Los Neutrinos atraviesan mundos sin tocar nada.", color: "#ffffff" },
    { t: "Entropía Biológica", d: "La fragilidad humana. Envejecemos porque la información en el ADN se degrada con cada segundo. La muerte es el triunfo de la entropía sobre el orden.", color: "#39ff14" },
    { t: "Salida Atmosférica", d: "Atravesando la Estratósfera. El planeta se vuelve un punto azul. La gravedad curva la luz y el tiempo alrededor de la Tierra.", color: "#00aaff" },
    { t: "Expansión Infinita", d: "Energía Oscura. El Universo se estira hacia el vacío absoluto. Todo lo que conocemos se perderá en un infinito frío y oscuro.", color: "#bc13fe" }
];

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4;
        this.life = 1;
        this.growth = Math.random() * 0.1;
    }
    update() {
        if (currentStage === 0) { // Planck: Caos
            this.x += (Math.random() - 0.5) * 15;
            this.y += (Math.random() - 0.5) * 15;
        } else if (currentStage === 2) { // Vida: Envejecimiento
            this.size += 0.08;
            if (this.size > 15) this.reset();
        } else if (currentStage === 4) { // Expansión
            let dx = this.x - canvas.width / 2;
            let dy = this.y - canvas.height / 2;
            this.x += dx * 0.06;
            this.y += dy * 0.06;
            if (this.x < 0 || this.x > canvas.width) this.reset();
        } else {
            this.x += this.vx;
            this.y += this.vy;
        }

        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }
    draw() {
        ctx.shadowBlur = 15;
        ctx.shadowColor = timeline[currentStage].color;
        ctx.fillStyle = timeline[currentStage].color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

function init() {
    particles = [];
    for (let i = 0; i < 200; i++) particles.push(new Particle());
}

function animate() {
    // Estela de cine (Motion Blur)
    ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    // Dibujar planetas/estratosfera en etapas avanzadas
    if (currentStage >= 3) {
        ctx.beginPath();
        let grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, 200);
        grad.addColorStop(0, timeline[currentStage].color);
        grad.addColorStop(1, "transparent");
        ctx.fillStyle = grad;
        ctx.arc(canvas.width/2, canvas.height/2, 200, 0, Math.PI*2);
        ctx.fill();
    }

    requestAnimationFrame(animate);
}

// Progresión de la escena
setInterval(() => {
    currentStage = (currentStage + 1) % timeline.length;
    const title = document.getElementById("stage-title");
    const desc = document.getElementById("stage-desc");
    
    title.innerText = timeline[currentStage].t;
    desc.innerText = timeline[currentStage].d;
    title.style.color = timeline[currentStage].color;
    
    // Flash cinematográfico al cambiar de escala
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.fillRect(0,0,canvas.width, canvas.height);
}, 12000);

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

init();
animate();
</script>
</body>
</html>
