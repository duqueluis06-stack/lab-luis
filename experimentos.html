<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LAB LUIS - Cosmic Rewrite Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body,html{
margin:0;
overflow:hidden;
background:black;
font-family:Segoe UI;
}

#c{
position:fixed;
top:0;left:0;
}

/* HEADER CINEMÁTICO */
header{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%);
z-index:10;
text-align:center;
color:white;
pointer-events:none;
}

h1{
font-size:28px;
letter-spacing:6px;
text-shadow:0 0 25px #00f2ff;
}

/* UI */
.ui{
position:fixed;
top:20px;
right:20px;
z-index:20;
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
width:60px;height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.6);
border:2px solid white;
color:white;
cursor:pointer;
text-decoration:none;
font-size:20px;
backdrop-filter:blur(8px);
}

#audio{border-color:#00f2ff}
#bh{border-color:#bc13fe}
#home{border-color:#ff3131}

/* NARRATIVA */
#panel{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
width:80%;
max-width:700px;
text-align:center;
color:#ccc;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<canvas id="c"></canvas>

<header>
<h1 id="t">THE VOID BEFORE TIME</h1>
<div id="d">Silencio absoluto del universo inicial</div>
</header>

<div class="ui">
<a class="btn" id="home" href="index.html">🏠</a>
<div class="btn" id="audio">🔊</div>
<a class="btn" id="bh" href="index3d.html">🌀</a>
</div>

<div id="panel">Sistema inactivo</div>

<script>
const c=document.getElementById("c");
const x=c.getContext("2d");

let w,h;
function R(){w=c.width=innerWidth;h=c.height=innerHeight}
R();addEventListener("resize",R);

let stage=0;
let t=0;
let A,G;

/* AUDIO CINEMÁTICO */
function audio(){
A=new AudioContext();
G=A.createGain();
G.connect(A.destination);
G.gain.value=0.12;

let o=A.createOscillator();
o.type="sine";
o.frequency.value=40;
o.connect(G);
o.start();
}

/* PARTICULAS */
let P=[];
for(let i=0;i<300;i++){
P.push({
x:Math.random()*w,
y:Math.random()*h,
a:Math.random()*6.28,
r:Math.random()*2+1
});
}

/* UPDATE UNIVERSAL */
function U(p){

// PLANCK FIELD
if(stage===0){
p.x+=Math.sin(p.a+t*0.02)*2;
p.y+=Math.cos(p.a+t*0.02)*2;
}

// ATOMOS
if(stage===1){
let cx=w/2,cy=h/2;
p.a+=0.03;
p.x=cx+Math.cos(p.a)*90;
p.y=cy+Math.sin(p.a)*90;
}

// VIDA
if(stage===2){
p.y+=Math.sin(t*0.01)*1.5;
p.x+=Math.cos(t*0.01)*1.5;
}

// COSMOS
if(stage===3){
p.x+=(p.x-w/2)*0.02;
p.y+=(p.y-h/2)*0.02;
}

// VÓRTICE FINAL 🔥
if(stage===4){
let cx=w/2,cy=h/2;
let dx=p.x-cx;
let dy=p.y-cy;
let d=Math.sqrt(dx*dx+dy*dy);

let ang=Math.atan2(dy,dx)+0.05;

// giro espaciotemporal
p.x=cx+Math.cos(ang)*d*0.96;
p.y=cy+Math.sin(ang)*d*0.96;
}
}

/* DRAW */
function D(p){

x.fillStyle=
stage===0?"#00f2ff":
stage===1?"#fff":
stage===2?"#39ff14":
stage===3?"#ffcc00":
"#bc13fe";

x.beginPath();
x.arc(p.x,p.y,p.r,0,6.28);
x.fill();
}

/* LOOP */
function loop(){

t++;

x.fillStyle=stage===4?"rgba(0,0,0,0.08)":"rgba(0,0,0,0.2)";
x.fillRect(0,0,w,h);

for(let p of P){
U(p);
D(p);
}

/* cámara vórtice */
if(stage===4){
x.save();
x.globalAlpha=0.3;
x.translate(w/2,h/2);
x.rotate(t*0.003);
x.drawImage(c,-w/2,-h/2);
x.restore();
}

requestAnimationFrame(loop);
}
loop();

/* TIMELINE */
const S=[
["PLANCK FIELD","Fluctuación cuántica primordial"],
["ÁTOMO","Estructura nuclear de la materia"],
["VIDA","Entropía biológica y evolución"],
["COSMOS","Expansión relativista"],
["VÓRTICE","Colapso espaciotemporal"]
];

function next(){

let c=S[stage];
document.getElementById("t").textContent=c[0];
document.getElementById("d").textContent=c[1];
document.getElementById("panel").textContent="fase "+stage;

stage=(stage+1)%S.length;

setTimeout(next,9000);
}

/* AUDIO */
document.getElementById("audio").onclick=()=>{
audio();
next();
document.getElementById("audio").style.display="none";
};

</script>

</body>
</html>
