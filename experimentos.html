<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - QUANTUM WARP DRIVE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LE6LX7FC2Q"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-LE6LX7FC2Q');
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
        :root { --planck: #00f2ff; --vortex: #bc13fe; --exit: #ff3131; }

        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Orbitron', sans-serif; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* TÍTULO COMPACTO SUPERIOR */
        header { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 60; pointer-events: none; }
        .title-3d { font-weight: 900; font-size: 22px; color: #fff; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px var(--planck); background: rgba(0,0,0,0.7); padding: 5px 20px; border-radius: 30px; border: 1px solid var(--planck); }

        /* UI DISTRIBUIDA */
        .ui-left { position: fixed; top: 20px; left: 20px; z-index: 1000; }
        .ui-right { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px; }
        .orb { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; font-size: 18px; background: rgba(0,0,0,0.8); border: 2px solid #fff; transition: 0.3s; }
        .btn-exit { border-color: var(--exit); color: var(--exit); }
        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 15px var(--planck); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); }

        /* NARRATIVA */
        .narrative { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; text-align: center; width: 80%; max-width: 400px; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 30px; border: 1px solid var(--planck); backdrop-filter: blur(10px); }
        #st-title { font-size: 14px; color: var(--planck); margin: 0; letter-spacing: 2px; }
        #st-desc { font-size: 10px; color: #ccc; margin-top: 4px; font-family: sans-serif; }
        img.logo { position: fixed; top: 75px; left: 15px; width: 50px; border-radius: 50%; border: 1px solid var(--planck); opacity: 0.5; z-index: 50; }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LUIS QUANTUM</div></header>
<img src="logo.jpg" class="logo">

<div class="ui-left"><a href="index.html" class="orb btn-exit">🏠</a></div>
<div class="ui-right">
    <div id="btn-audio" class="orb">🔊</div>
    <a href="index3d.html" class="orb btn-bh">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">LABORATORIO LUIS</h2>
    <p id="st-desc">INICIA EL OSCILADOR PARA LA SECUENCIA WARP</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, stars = [], audioCtx, masterGain, active = false, vortexV = 0;

    const timeline = [
        { t: "Líneas de Planck", d: "TEJIDO VIBRATORIO CUÁNTICO", color: "#00f2ff", dur: 10000, f: 523 },
        { t: "Fragua Atómica", d: "MATERIA EN FORMACIÓN", color: "#ffffff", dur: 10000, f: 392 },
        { t: "Oxidación Bio", d: "ENTROPÍA Y DESGASTE CELULAR", color: "#39ff14", dur: 12000, f: 261 },
        { t: "Expansión Warp", d: "VELOCIDAD LUZ: TÚNEL ESTELAR", color: "#ffcc00", dur: 15000, f: 196 },
        { t: "Singularidad", d: "DESDOBLAMIENTO: COLAPSO DEL ESPACIO", color: "#bc13fe", dur: 20000, f: 65 }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    class Star {
        constructor() { this.init(); }
        init() {
            this.x = (Math.random() - 0.5) * w * 2;
            this.y = (Math.random() - 0.5) * h * 2;
            this.z = Math.random() * w;
            this.prevZ = this.z;
            this.life = 1.0;
        }
        draw() {
            if (stage === 3) { // WARP ESTRELLAS REALES
                let sx = (this.x / this.z) * 500 + w/2;
                let sy = (this.y / this.z) * 500 + h/2;
                let px = (this.x / this.prevZ) * 500 + w/2;
                let py = (this.y / this.prevZ) * 500 + h/2;

                this.prevZ = this.z;
                this.z -= 25; // Velocidad de avance
                if (this.z < 1) this.init();

                ctx.strokeStyle = `rgba(255, 204, 0, ${0.1 + (1 - this.z/w)})`;
                ctx.lineWidth = 2; ctx.beginPath();
                ctx.moveTo(px, py); ctx.lineTo(sx, sy); ctx.stroke();
            } else if (stage === 4) { // SINGULARIDAD (DESDOBLAMIENTO)
                vortexV += 0.0001;
                let ang = Math.atan2(this.y, this.x) + vortexV * 50;
                let dist = Math.sqrt(this.x*this.x + this.y*this.y) * (this.z/w);
                let dx = w/2 + Math.cos(ang) * dist;
                let dy = h/2 + Math.sin(ang) * dist;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.arc(dx, dy, 2, 0, Math.PI*2); ctx.fill();
                this.z *= 0.98; if(this.z < 1) this.z = w;
            } else { // OTRAS FASES
                let speed = stage === 0 ? 10 : 2;
                this.x += (Math.random()-0.5) * speed;
                this.y += (Math.random()-0.5) * speed;
                ctx.fillStyle = timeline[stage].color;
                ctx.beginPath(); ctx.arc(this.x % w + w/2, this.y % h + h/2, 2, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    stars = Array.from({ length: 400 }, () => new Star());

    function loop() {
        if (stage === 4) { // EFECTO ESPEJO EMPAÑADO
            ctx.fillStyle = "rgba(255,255,255,0.05)"; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(0.1);
            ctx.globalAlpha = 0.6; ctx.filter = "blur(8px) contrast(1.5)";
            ctx.drawImage(canvas, -w/2, -h/2); ctx.restore();
        } else {
            ctx.fillStyle = `rgba(0,0,0,${stage === 3 ? 0.15 : 0.3})`;
            ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        if (active) stars.forEach(s => s.draw());
        requestAnimationFrame(loop);
    }

    function step() {
        const s = timeline[stage];
        document.getElementById("st-title").innerText = s.t;
        document.getElementById("st-desc").innerText = s.d;
        document.getElementById("st-title").style.color = s.color;
        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) stars.forEach(s => s.init());
            step();
        }, s.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        active = true; this.style.display = 'none'; step();
    });

    loop();
</script>
</body>
</html>
