<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LAB LUIS - COSMIC ENGINE v3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body,html{
margin:0;
overflow:hidden;
background:black;
font-family:Segoe UI;
}

canvas{
position:fixed;
top:0;left:0;
}

#ui{
position:fixed;
top:20px;
right:20px;
z-index:10;
display:flex;
flex-direction:column;
gap:15px;
}

.btn{
width:60px;
height:60px;
border-radius:50%;
border:1px solid cyan;
background:rgba(0,0,0,0.7);
color:cyan;
font-size:20px;
cursor:pointer;
box-shadow:0 0 20px cyan;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

#title{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
color:white;
text-shadow:0 0 20px cyan;
font-size:22px;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="title">LAB LUIS COSMIC ENGINE</div>

<div id="ui">
<button class="btn" onclick="goHome()">🏠</button>
<button class="btn" onclick="toggleAudio()">🔊</button>
<button class="btn" onclick="setStage(4)">🕳️</button>
</div>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");

let w,h;
function resize(){
w=c.width=innerWidth;
h=c.height=innerHeight;
}
resize();
addEventListener("resize",resize);

let stage=0;
let audio=false;

const N=300;

const p=Array.from({length:N},()=>({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
vx:(Math.random()-0.5)*2,
vy:(Math.random()-0.5)*2,
r:Math.random()*2+1,
a:Math.random()*Math.PI*2,
life:1
}));

function drawPlanck(o){
ctx.strokeStyle="rgba(0,255,255,0.4)";
ctx.beginPath();
let v=Math.sin(o.a+Date.now()*0.002)*30;
ctx.moveTo(o.x-v,o.y);
ctx.lineTo(o.x+v,o.y+15);
ctx.stroke();
}

function drawAtom(o){
let cx=w/2,cy=h/2;

ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(cx,cy,6,0,7);
ctx.fill();

let t=Date.now()*0.002;

ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(cx+Math.cos(t+o.a)*80,cy+Math.sin(t+o.a)*80,2,0,7);
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(cx+Math.cos(t*1.2+o.a)*120,cy+Math.sin(t*1.2+o.a)*120,2,0,7);
ctx.fill();
}

function drawCell(o){
o.life-=0.003;
if(o.life<0)o.life=1;

o.x+=(Math.random()-0.5)*2;
o.y+=(Math.random()-0.5)*2;

ctx.fillStyle=`rgba(0,255,100,${o.life})`;
ctx.beginPath();
ctx.arc(o.x,o.y,5+10*(1-o.life),0,7);
ctx.fill();
}

function drawCosmos(o){
let z=200;
let s=z/(z+Math.random()*200);

let x=w/2+(o.x-w/2)*s;
let y=h/2+(o.y-h/2)*s;

ctx.fillStyle="gold";
ctx.beginPath();
ctx.arc(x,y,2*s,0,7);
ctx.fill();
}

function drawBlackHole(o){

let cx=w/2,cy=h/2;

let dx=o.x-cx;
let dy=o.y-cy;

let dist=Math.sqrt(dx*dx+dy*dy)+0.1;

let force=120/dist;

o.vx-=dx*force*0.002;
o.vy-=dy*force*0.002;

o.vx*=0.99;
o.vy*=0.99;

o.x+=o.vx;
o.y+=o.vy;

// disco de acreción
ctx.strokeStyle="rgba(180,0,255,0.6)";
ctx.beginPath();
ctx.arc(cx,cy,120,0,7);
ctx.stroke();

// partícula
ctx.fillStyle="rgba(255,255,255,0.6)";
ctx.beginPath();
ctx.arc(o.x,o.y,o.r+force*2,0,7);
ctx.fill();

// núcleo
ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(cx,cy,10,0,7);
ctx.fill();
}

function loop(){

ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,w,h);

for(let o of p){

if(stage===0) drawPlanck(o);
if(stage===1) drawAtom(o);
if(stage===2) drawCell(o);
if(stage===3) drawCosmos(o);
if(stage===4) drawBlackHole(o);

}

requestAnimationFrame(loop);
}

function setStage(s){
stage=s;
}

function goHome(){
window.location.href="index.html";
}

function toggleAudio(){
audio=!audio;
}

setInterval(()=>stage=(stage+1)%5,10000);

loop();

</script>

</body>
</html>
