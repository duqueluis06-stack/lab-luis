<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - QUANTUM EXPERIMENTS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        
        :root {
            --planck: #00f2ff; --bio: #39ff14; --vortex: #bc13fe; --exit: #ff3131; --gold: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; height: 100%; width: 100%; 
            font-family: 'Orbitron', sans-serif;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* HEADER 3D ELEVADO */
        header {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            z-index: 60; text-align: center; width: 100%; pointer-events: none;
        }
        .title-3d {
            font-weight: 900; font-size: clamp(26px, 9vw, 60px);
            color: #fff; text-transform: uppercase; letter-spacing: 15px;
            text-shadow: 
                0 1px 0 #444, 0 3px 0 #222, 0 6px 0 #000,
                0 0 25px var(--planck), 0 0 50px rgba(0,242,255,0.4);
            animation: breathe 4s infinite ease-in-out;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.96); opacity: 0.8; } }

        /* UI PANEL */
        .ui-panel { position: fixed; top: 25px; right: 25px; z-index: 1000; display: flex; gap: 20px; }
        .orb {
            width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 26px; background: rgba(0,0,0,0.9); border: 3px solid #fff;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(255,255,255,0.2), inset 0 0 10px rgba(255,255,255,0.1);
        }
        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 30px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); box-shadow: 0 0 20px var(--vortex); }
        .orb:hover { transform: scale(1.15) rotate(15deg); filter: brightness(1.3); }

        /* NARRATIVA MINIMALISTA */
        .narrative {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 85%; max-width: 550px;
            background: rgba(0,0,0,0.85); padding: 15px 25px; border-radius: 50px;
            border: 1px solid var(--planck); box-shadow: 0 0 40px rgba(0,242,255,0.2);
            backdrop-filter: blur(15px); pointer-events: none;
        }
        #st-title { font-size: 18px; color: var(--planck); margin: 0; letter-spacing: 4px; text-shadow: 0 0 10px var(--planck); }
        #st-desc { font-size: 12px; color: #ddd; margin-top: 6px; font-family: sans-serif; letter-spacing: 1px; }
        
        img.logo { position: fixed; top: 25px; left: 25px; width: 75px; z-index: 110; border-radius: 50%; border: 3px solid var(--planck); box-shadow: 0 0 20px var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LUIS QUANTUM</div></header>
<img src="logo.jpg" class="logo" alt="LUIS">

<div class="ui-panel">
    <a href="index.html" class="orb btn-exit">🏠</a>
    <div id="btn-audio" class="orb">🔊</div>
    <a href="index3d.html" class="orb btn-bh">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">LABORATORIO LUIS</h2>
    <p id="st-desc">INICIAR SECUENCIA EXPERIMENTAL: DESDOBLAMIENTO ESPECTRAL</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, entities = [], audioCtx, masterGain, active = false, vortexV = 0;

    const timeline = [
        { t: "Líneas de Planck", d: "TEJIDO CUÁNTICO - VIBRACIÓN 10⁻³⁵m", color: "#00f2ff", dur: 10000, f: 440, wave: 'sine' },
        { t: "Fragua Atómica", d: "ENSAMBLAJE DE MATERIA CON RELIEVE", color: "#ffffff", dur: 12000, f: 330, wave: 'triangle' },
        { t: "Oxidación Bio", d: "APOPTOSIS: FRAGMENTACIÓN DE ENERGÍA", color: "#39ff14", dur: 13000, f: 220, wave: 'sine' },
        { t: "Expansión Warp", d: "RELATIVIDAD: FUGA ESTELAR RELIEVE", color: "#ffcc00", dur: 13000, f: 110, wave: 'sawtooth' },
        { t: "Singularidad", d: "DESDOBLAMIENTO: EL UNIVERSO SE EMPAÑA", color: "#bc13fe", dur: 18000, f: 55, wave: 'square' }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    class Entity {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w; this.size = Math.random() * 5 + 2;
            this.angle = Math.random() * Math.PI * 2; this.orbit = Math.random() * 150 + 50;
            this.life = 1.0; this.speed = Math.random() * 25 + 10;
        }
        draw() {
            if (stage === 0) { // PLANCK HD
                ctx.strokeStyle = `rgba(0, 242, 255, ${0.3 + Math.random()*0.7})`;
                ctx.lineWidth = 1.2; ctx.beginPath();
                let v = Math.tan(Date.now() * 0.02 + this.x) * 25;
                ctx.moveTo(this.x, 0); ctx.lineTo(this.x + v, h); ctx.stroke();
            } 
            else if (stage === 1) { // ÁTOMO RELIEVE
                ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
                ctx.fillStyle = "#ff2d55"; ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                let r = Date.now() * 0.008 + this.angle;
                ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.arc(this.x + Math.cos(r)*this.orbit, this.y + Math.sin(r)*this.orbit, 3, 0, Math.PI*2); ctx.fill();
            }
            else if (stage === 2) { // BIO OXIDACIÓN VIBRANTE
                this.life -= 0.003; if(this.life < 0) this.life = 1;
                let vib = Math.sin(Date.now()*0.1)*5;
                let r = 50 + (1-this.life)*200, g = 255 * this.life;
                ctx.fillStyle = `rgba(${r}, ${g}, 40, ${this.life})`;
                ctx.beginPath(); 
                ctx.ellipse(this.x + vib, this.y, this.size*12*(1.6-this.life), this.size*8, vib*0.1, 0, Math.PI*2);
                ctx.fill();
                if(this.life < 0.4) { // Fragmentos de óxido
                    ctx.fillStyle = "rgba(139, 69, 19, 0.6)";
                    ctx.beginPath(); ctx.arc(this.x + 15, this.y - 10, 2, 0, Math.PI*2); ctx.fill();
                }
            }
            else if (stage === 3) { // COSMOS RELIEVE
                let s = w/this.z; let px = w/2 + (this.x-w/2)*s, py = h/2 + (this.y-h/2)*s;
                this.z -= this.speed; if(this.z < 1) this.z = w;
                let grad = ctx.createRadialGradient(px, py, 0, px, py, this.size*s*3);
                grad.addColorStop(0, "#fff"); grad.addColorStop(0.4, timeline[3].color); grad.addColorStop(1, "transparent");
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(px, py, this.size*s*4, 0, Math.PI*2); ctx.fill();
            }
            else if (stage === 4) { // SINGULARIDAD ESPECTRAL
                this.angle += 0.35; this.orbit *= 0.985;
                let dx = w/2 + Math.cos(this.angle) * this.orbit * 12;
                let dy = h/2 + Math.sin(this.angle) * this.orbit * 12;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.ellipse(dx, dy, this.size*30, this.size*1.5, this.angle, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    entities = Array.from({ length: 180 }, () => new Entity());

    function playAudio(freq, wave) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator(); let g = audioCtx.createGain();
        osc.type = wave; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.15, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 5);
        osc.connect(g); g.connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + 5);
    }

    function loop() {
        if (stage === 4) {
            // EL DESDOBLAMIENTO: ESPEJO EMPAÑADO Y GIRO INFINITO
            ctx.fillStyle = "rgba(255,255,255,0.03)"; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexV);
            vortexV += 0.3; ctx.globalAlpha = 0.4;
            ctx.filter = `blur(12px) contrast(1.6) brightness(1.1)`;
            ctx.drawImage(canvas, -w/2, -h/2); ctx.restore();
            // Rayos espectrales
            if(Math.random() > 0.95) { ctx.strokeStyle="#bc13fe"; ctx.beginPath(); ctx.moveTo(w/2,h/2); ctx.lineTo(Math.random()*w, Math.random()*h); ctx.stroke(); }
        } else {
            ctx.fillStyle = `rgba(0,0,0,${stage === 3 ? 0.08 : 0.25})`; 
            ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        if (active) entities.forEach(e => e.draw());
        requestAnimationFrame(loop);
    }

    function step() {
        const s = timeline[stage];
        document.getElementById("st-title").innerText = s.t;
        document.getElementById("st-title").style.color = s.color;
        document.getElementById("st-desc").innerText = s.d;
        playAudio(s.f, s.wave);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { 
                ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); 
                entities.forEach(e => e.init());
            }
            step();
        }, s.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        active = true; this.style.display = 'none';
        step();
    });

    loop();
</script>
</body>
</html>
