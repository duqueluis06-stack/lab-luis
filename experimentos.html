<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Quantum Singularity Engine v2.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        :root {
            --planck: #00f2ff;
            --atomic: #ffffff;
            --bio: #39ff14;
            --cosmos: #ffcc00;
            --vortex: #bc13fe;
            --exit: #ff3131;
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; height: 100%; width: 100%;
        }

        #canvas-cosmos { 
            position: fixed; top: 0; left: 0; z-index: 1; 
            filter: contrast(1.1) brightness(1.1);
        }

        /* --- TÍTULO MASTER 3D NEÓN (ARRIBA CENTRAL) --- */
        header {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            z-index: 50; text-align: center; width: 100%; pointer-events: none;
        }

        .title-3d {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(22px, 6vw, 50px);
            font-weight: 900; letter-spacing: 12px;
            color: #fff; text-transform: uppercase;
            /* Profundidad 3D con borde neón */
            text-shadow: 
                0 1px 0 #ccc, 0 3px 0 #aaa, 0 6px 0 #888, 
                0 0 20px var(--planck), 0 0 30px var(--planck), 
                0 0 40px var(--planck);
            -webkit-text-stroke: 1px rgba(255,255,255,0.2);
            animation: pulseNeón 3s infinite alternate;
        }

        @keyframes pulseNeón {
            from { text-shadow: 0 0 10px var(--planck), 0 0 20px var(--planck), 0 5px 10px rgba(0,0,0,0.5); }
            to { text-shadow: 0 0 15px var(--planck), 0 0 30px var(--planck), 0 0 50px var(--planck), 0 5px 10px rgba(0,0,0,0.5); }
        }

        /* --- ORBES DE NEÓN 3D (Botones de Control) --- */
        .ui-panel {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 15px;
        }

        .orb {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 20px;
            background: rgba(0,0,0,0.8); border: 2.5px solid #fff;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255,255,255,0.3), inset 0 0 10px rgba(255,255,255,0.1);
        }

        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 20px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); box-shadow: 0 0 15px var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); box-shadow: 0 0 15px var(--vortex); }

        .orb:hover { transform: scale(1.1) rotate(10deg); filter: brightness(1.2); }

        /* --- NARRATIVA MINIMALISTA ABAJO --- */
        .narrative {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 90%; max-width: 600px;
            background: rgba(0,0,0,0.9); padding: 15px 25px; border-radius: 50px;
            border: 1px solid var(--planck); box-shadow: 0 0 30px rgba(0,242,255,0.2);
            backdrop-filter: blur(10px); pointer-events: none;
        }

        #stage-title { font-size: 22px; color: var(--planck); margin: 0; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--planck); }
        #stage-desc { font-size: 14px; color: #ccc; margin-top: 8px; line-height: 1.5; font-weight: 400; font-family: 'Consolas', monospace; }

        img.logo { position: fixed; top: 20px; left: 20px; width: 70px; z-index: 110; border-radius: 50%; border: 3px solid var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>

<header><div class="title-3d">LUIS QUANTUM</div></header>

<img src="logo.jpg" class="logo" alt="Lab Luis">

<div class="ui-panel">
    <a href="index.html" class="orb btn-exit" title="Volver a Inicio">🏠</a>
    <div id="btn-audio" class="orb" title="Activar Sonido">🔊</div>
    <a href="index3d.html" class="orb btn-bh" title="Black Hole 3D">🌀</a>
</div>

<div class="narrative">
    <h2 id="stage-title">SISTEMA OFF-LINE</h2>
    <p id="stage-desc">Presiona el orbe celeste (🔊) para activar los osciladores cuánticos y el desdoblamiento espectral.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h;
    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    let stage = 0;
    let particles = [];
    let audioCtx, masterGain;
    let sequenceActive = false;
    let vortexAngle = 0;

    const timeline = [
        { t: "Líneas de Planck", d: "Micro-cuerdas vibratorias a ultra-alta frecuencia (10⁻³⁵m). El tejido base de la realidad espacial.", color: "#00f2ff", dur: 12000, f: 523 },
        { t: "Núcleo Materia", d: "Formación de Protones y Neutrones. Electrones y Neutrinos en danza cuántica de equilibrio.", color: "#ffffff", dur: 14000, f: 392 },
        { t: "Entropía Bio", d: "La célula muere por oxidación (apoptosis visual). Los electrones se desequilibran, la membrana se deforma.", color: "#39ff14", dur: 14000, f: 261 },
        { t: "Expansión Warp", d: "Velocidad luz. Estrellas y planetas con relieve masivo deforman el espacio en fuga galáctica.", color: "#ffcc00", dur: 16000, f: 130 },
        { t: "COLAPSO ESPECTRAL", d: "¡SINGULARIDAD! Espejismo cuántico. El universo gira y se nubla hacia el punto cero de Planck.", color: "#bc13fe", dur: 20000, f: 60 }
    ];

    class QuantumObject {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w; this.size = Math.random() * 4 + 2;
            this.angle = Math.random() * Math.PI * 2; this.orbit = Math.random() * 100 + 40;
            this.life = 1.0;
        }
        draw() {
            if (stage === 0) { // PLANCK HD (LÍNEAS VIBRATORIAS REALES)
                ctx.strokeStyle = `rgba(0, 242, 255, ${0.4 + Math.random() * 0.6})`;
                ctx.lineWidth = 1; ctx.beginPath();
                // Efecto de cuerda tensa vibrando en toda la pantalla
                let vibe = Math.sin(Date.now() * 0.05 + this.x) * 40;
                ctx.moveTo(this.x, 0); ctx.lineTo(this.x + vibe, h); ctx.stroke();
            } else if (stage === 1) { // ÁTOMO RELIEVE (Neutrones texturizados)
                ctx.fillStyle = "#ff2d55"; ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.arc(this.x-2, this.y-2, 3, 0, Math.PI*2); ctx.fill(); // Brillo relieve
                let rot = Date.now() * 0.007 + this.angle;
                ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.arc(this.x + Math.cos(rot)*this.orbit, this.y + Math.sin(rot)*this.orbit, 3, 0, Math.PI*2); ctx.fill();
            } else if (stage === 2) { // BIO OXIDACIÓN (Fragmentación y Apoptosis)
                this.life -= 0.003; if(this.life < 0) this.life = 1;
                // Escala elíptica al perder energía celular
                let r = 58 + (1-this.life)*200, g = 255 * this.life;
                ctx.fillStyle = `rgba(${r}, ${g}, 50, ${this.life})`;
                ctx.beginPath(); 
                ctx.ellipse(this.x, this.y, this.size * (1.6 - this.life) * 8, this.size * (1.6 - this.life) * 5, 0, 0, Math.PI*2);
                ctx.fill();
                if(this.life < 0.4) { ctx.fillStyle="rgba(139, 69, 19, 0.4)"; ctx.fillRect(this.x+5, this.y-5, 5, 5); } // Oxidación marrón
            } else if (stage === 3) { // COSMOS CINEMATIC (Textura planetas gaseosos)
                let s = w/this.z;
                let px = w/2 + (this.x-w/2)*s; let py = h/2 + (this.y-h/2)*s;
                this.z -= 20; if(this.z < 1) this.z = w;
                // Planetas texturizados
                let grad = ctx.createRadialGradient(px, py, 0, px, py, this.size*s*4);
                grad.addColorStop(0, "#fff"); grad.addColorStop(0.3, timeline[3].color); grad.addColorStop(1, "transparent");
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(px, py, this.size*s*5, 0, Math.PI*2); ctx.fill();
            } else if (stage === 4) { // VÓRTICE / DESDOBLAMIENTO (ESPEJO EMPAÑADO)
                this.angle += 0.3; // Girando a alta velocidad
                this.orbit *= 0.985;
                let dist = this.orbit * 8;
                this.x = w/2 + Math.cos(this.angle) * dist;
                this.y = h/2 + Math.sin(this.angle) * dist;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); 
                // Deformación cuántica elíptica
                ctx.ellipse(this.x, this.y, this.size*15, this.size*1.5, this.angle, 0, Math.PI*2);
                ctx.fill();
            }
        }
    }

    particles = Array.from({ length: 140 }, () => new QuantumObject());

    function playSound(freq) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.type = stage === 4 ? 'square' : 'sine';
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 4);
        osc.connect(g); g.connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + 4);
    }

    function loop() {
        if (stage === 4) {
            // EFECTO ESPEJO EMPAÑADO Y GIRO ESPECTRAL
            ctx.fillStyle = `rgba(0, 0, 0, 0.05)`; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = `rgba(255,255,255,0.02)`; // Empañado blanco translúcido
            ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexAngle);
            vortexAngle += 0.2; ctx.globalAlpha = 0.4;
            ctx.filter = `blur(${Math.random()*8+4}px) brightness(1.2) contrast(1.5)`; // Nublado dinámico espejado
            ctx.drawImage(canvas, -w/2, -h/2); ctx.restore(); ctx.globalAlpha = 1.0;
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        if (active) particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function startSequence() {
        const cur = timeline[stage];
        document.getElementById("stage-title").innerText = cur.t;
        document.getElementById("stage-desc").innerText = cur.d;
        document.getElementById("stage-title").style.color = cur.color;
        document.getElementById("st-title").style.textShadow = `0 0 10px ${cur.color}`;
        playSound(cur.f);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); particles.forEach(p => p.init()); }
            startSequence();
        }, cur.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        active = true; this.style.display = 'none';
        startSequence();
    });

    loop();
</script>
</body>
</html>
