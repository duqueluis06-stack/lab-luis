<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - UNIVERSAL QUANTUM ENGINE vX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        :root {
            --planck: #00f2ff; --atomic: #fff; --bio: #39ff14;
            --cosmos: #ffcc00; --vortex: #bc13fe; --exit: #ff3131;
        }

        body, html { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; height: 100%; width: 100%; 
            font-family: 'Orbitron', sans-serif;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* HEADER CINEMATOGRÁFICO 3D */
        header {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 100%; pointer-events: none;
        }
        .title-3d {
            font-weight: 900; font-size: clamp(24px, 8vw, 45px);
            color: #fff; text-transform: uppercase; letter-spacing: 10px;
            text-shadow: 
                0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 0 4px 0 #b9b9b9,
                0 0 20px var(--planck), 0 0 40px var(--planck), 0 10px 20px rgba(0,0,0,0.8);
            animation: glow 2s infinite alternate;
        }
        @keyframes glow { to { text-shadow: 0 0 30px var(--planck), 0 0 60px var(--planck); } }

        /* PANEL DE CONTROL DE ALTA GAMA */
        .ui-panel { position: fixed; top: 30px; right: 30px; z-index: 1000; display: flex; flex-direction: column; gap: 25px; }
        .orb {
            width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 28px; background: rgba(0,0,0,0.9); border: 3px solid #fff;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(255,255,255,0.2), inset 0 0 15px rgba(255,255,255,0.1);
        }
        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 30px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); box-shadow: 0 0 30px var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); box-shadow: 0 0 30px var(--vortex); }
        .orb:hover { transform: scale(1.2) rotate(360deg); filter: brightness(1.5); }

        /* NARRATIVA DINÁMICA */
        .narrative {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 90%; max-width: 700px;
            background: rgba(0,0,0,0.95); padding: 25px; border-radius: 20px;
            border: 1px solid var(--planck); box-shadow: 0 0 50px rgba(0,242,255,0.1);
            backdrop-filter: blur(10px);
        }
        #st-title { font-size: 26px; color: var(--planck); margin: 0; letter-spacing: 2px; }
        #st-desc { font-size: 15px; color: #aaa; margin-top: 12px; line-height: 1.6; font-family: 'Segoe UI', sans-serif; }
        
        img.logo { position: fixed; top: 30px; left: 30px; width: 80px; z-index: 110; border-radius: 50%; border: 3px solid var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LAB LUIS QUANTUM</div></header>
<img src="logo.jpg" class="logo" alt="LUIS">

<div class="ui-panel">
    <a href="index.html" class="orb btn-exit" title="Salir">🏠</a>
    <div id="btn-audio" class="orb" title="Iniciar">🔊</div>
    <a href="index3d.html" class="orb btn-bh" title="Black Hole">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">SISTEMA OFF-LINE</h2>
    <p id="st-desc">Pulsa el ORBE DE AUDIO para despertar el tejido de Planck y el desdoblamiento cuántico.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, entities = [], audioCtx, masterGain, active = false, vortexAlpha = 0;

    const timeline = [
        { t: "Vibración de Planck", d: "Visión microscópica: Filamentos de energía pura vibrando a 10³⁰ Hz. El tejido fundamental de la realidad.", color: "#00f2ff", dur: 12000 },
        { t: "Fragua Subatómica", d: "Quarks y neutrinos en danza perpetua. El núcleo atómico se estabiliza con relieve neutrónico.", color: "#ffffff", dur: 14000 },
        { t: "Oxidación Celular", d: "Entropía Biológica: Las células pierden su frecuencia vital, se hinchan y se oxidan por radicales libres.", color: "#39ff14", dur: 16000 },
        { t: "Expansión Estelar", d: "Velocidad de la luz. Estrellas y planetas con relieve masivo deforman el espacio-tiempo en su huida.", color: "#ffcc00", dur: 16000 },
        { t: "El Gran Desdoblamiento", d: "¡COLAPSO TOTAL! El universo gira, se nubla y se espeja en un remolino cuántico infinito.", color: "#bc13fe", dur: 20000 }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    class Entity {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w; this.size = Math.random() * 4 + 2;
            this.angle = Math.random() * Math.PI * 2; this.orbit = Math.random() * 120 + 40;
            this.life = 1.0; this.energy = Math.random() * 20;
        }
        draw() {
            if (stage === 0) { // PLANCK: FILAMENTOS REALES
                ctx.strokeStyle = `rgba(0, 242, 255, ${0.4 + Math.random() * 0.6})`;
                ctx.lineWidth = 0.7; ctx.beginPath();
                let vibe = Math.sin(Date.now() * 0.05 + this.energy) * 60;
                ctx.moveTo(this.x, 0); ctx.bezierCurveTo(this.x + vibe, h / 2, this.x - vibe, h / 2, this.x, h);
                ctx.stroke();
            } 
            else if (stage === 1) { // ÁTOMO RELIEVE
                ctx.fillStyle = "#ff2d55"; ctx.beginPath(); ctx.arc(this.x, this.y, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.arc(this.x-2, this.y-2, 3, 0, Math.PI*2); ctx.fill();
                let r = Date.now() * 0.008 + this.angle;
                ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.arc(this.x + Math.cos(r)*this.orbit, this.y + Math.sin(r)*this.orbit, 3, 0, Math.PI*2); ctx.fill();
            }
            else if (stage === 2) { // BIO: OXIDACIÓN DINÁMICA
                this.life -= 0.002; if(this.life < 0) this.life = 1;
                let swell = (1.5 - this.life) * 10;
                let r = 50 + (1-this.life)*200, g = 255 * this.life;
                ctx.fillStyle = `rgba(${r}, ${g}, 50, ${this.life})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size + swell, 0, Math.PI*2); ctx.fill();
                if(this.life < 0.5) { // Puntos de oxidación
                    ctx.fillStyle = "rgba(100, 50, 0, 0.6)"; ctx.beginPath(); ctx.arc(this.x + 5, this.y - 5, 2, 0, Math.PI*2); ctx.fill();
                }
            }
            else if (stage === 3) { // COSMOS RELIEVE
                let s = w/this.z; let px = w/2 + (this.x-w/2)*s, py = h/2 + (this.y-h/2)*s;
                this.z -= 20; if(this.z < 1) this.z = w;
                let grad = ctx.createRadialGradient(px, py, 0, px, py, this.size*s);
                grad.addColorStop(0, "#fff"); grad.addColorStop(0.4, timeline[3].color); grad.addColorStop(1, "transparent");
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(px, py, this.size*s*5, 0, Math.PI*2); ctx.fill();
            }
            else if (stage === 4) { // DESDOBLAMIENTO (MÁXIMA VELOCIDAD)
                this.angle += 0.3; this.orbit *= 0.985;
                this.x = w/2 + Math.cos(this.angle) * this.orbit * 8;
                this.y = h/2 + Math.sin(this.angle) * this.orbit * 8;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.ellipse(this.x, this.y, this.size*15, this.size*2, this.angle, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    entities = Array.from({ length: 150 }, () => new Entity());

    function loop() {
        if (stage === 4) {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexAlpha);
            vortexAlpha += 0.2; ctx.globalAlpha = 0.3; ctx.filter = "blur(10px) contrast(2)";
            ctx.drawImage(canvas, -w/2, -h/2); ctx.restore();
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        
        if (active) {
            entities.forEach(e => e.draw());
            // Glitch aleatorio en expansión
            if(stage === 3 && Math.random() > 0.98) { ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fillRect(0,0,w,h); }
        }
        requestAnimationFrame(loop);
    }

    function step() {
        const s = timeline[stage];
        document.getElementById("st-title").innerText = s.t;
        document.getElementById("st-title").style.color = s.color;
        document.getElementById("st-desc").innerText = s.d;

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); entities.forEach(e => e.reset()); }
            step();
        }, s.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        active = true; this.style.display = 'none';
        step();
    });

    loop();
</script>
</body>
</html>
