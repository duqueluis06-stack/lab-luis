<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - Quantum Bounce Engine</title>
    
    <meta name="description" content="Laboratorio avanzado de Lab Luis. Simulación de desdoblamiento espacio-temporal y rebote cuántico.">
    <link rel="canonical" href="https://duquemartini.com/experimentos.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        :root {
            --neon: #00ffcc;
            --void: #bc13fe;
            --planck: #00f2ff;
            --alert: #ff3131;
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; height: 100%; width: 100%;
        }

        #canvas-cosmos { position: fixed; top: 0; left: 0; z-index: 1; }

        /* --- HEADER CINEMATOGRÁFICO CON EFECTO 3D --- */
        header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; pointer-events: none; width: 100%;
        }

        .title-3d {
            font-size: clamp(18px, 5vw, 32px);
            font-weight: 900; letter-spacing: 8px;
            color: #fff;
            text-transform: uppercase;
            /* Efecto de profundidad 3D */
            text-shadow: 
                0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 
                0 4px 0 #b9b9b9, 0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1), 
                0 0 5px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.3), 
                0 3px 5px rgba(0,0,0,.2), 0 5px 10px rgba(0,0,0,.25), 
                0 10px 10px rgba(0,0,0,.2), 0 20px 20px rgba(0,0,0,.15),
                0 0 20px var(--neon);
        }

        /* --- CONSOLA DE MANDOS (SUPERIOR DERECHA) --- */
        .top-console {
            position: fixed; top: 20px; right: 20px;
            z-index: 110; display: flex; flex-direction: column; gap: 12px;
            align-items: flex-end;
        }

        .btn-ui {
            padding: 12px 24px; font-size: 12px; font-weight: bold;
            border-radius: 4px; text-decoration: none; text-transform: uppercase;
            cursor: pointer; transition: 0.3s all cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }

        #audio-init { 
            background: var(--neon); color: #000; border: none;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }
        #audio-init:hover { transform: scale(1.05); box-shadow: 0 0 40px var(--neon); }

        .bh-link { 
            background: rgba(188, 19, 254, 0.2); color: #fff; 
            border-color: var(--void);
        }
        .bh-link:hover { background: var(--void); box-shadow: 0 0 30px var(--void); }

        /* --- NAVEGACIÓN LATERAL --- */
        .side-nav {
            position: fixed; top: 120px; left: 20px; z-index: 110;
            display: flex; flex-direction: column; gap: 8px;
        }
        .side-link {
            padding: 8px 15px; font-size: 11px; text-decoration: none;
            color: var(--neon); background: rgba(0,0,0,0.6);
            border-left: 3px solid var(--neon); transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .side-link:hover { background: var(--neon); color: #000; padding-left: 25px; }

        /* --- CAJA NARRATIVA --- */
        .narrative-anchor {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: 80%; max-width: 600px;
            text-align: center; pointer-events: none;
        }
        #stage-title { font-size: 24px; color: var(--planck); margin: 0; text-shadow: 0 0 10px var(--planck); }
        #stage-desc { font-size: 14px; color: #888; margin-top: 8px; font-style: italic; }

        img.logo {
            position: fixed; top: 20px; left: 20px;
            width: 80px; z-index: 110; border: 1px solid var(--neon);
        }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>

<header>
    <div class="title-3d">LAB LUIS QUANTUM</div>
</header>

<img src="logo.jpg" class="logo" alt="Logo">

<div class="side-nav">
    <a href="index.html" class="side-link">Inicio</a>
    <a href="proyectos.html" class="side-link">Vórtice</a>
    <a href="laboratorio.html" class="side-link">Pioneros</a>
    <a href="libros.html" class="side-link">KDP Libros</a>
</div>

<div class="top-console">
    <button id="audio-init" class="btn-ui">🔊 Activar Sonido</button>
    <a href="index3d.html" class="btn-ui bh-link">🌀 Black Hole 3D</a>
</div>

<div class="narrative-anchor">
    <h2 id="stage-title">ESTADO: INICIALIZANDO</h2>
    <p id="stage-desc">Sincronizando flujos de relatividad general...</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    const isMobile = window.innerWidth < 768;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let stage = 0;
    let particles = [];
    let audioCtx, masterGain;

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        masterGain.gain.value = 0.2;
        
        // Drone profundo de fondo
        const osc = audioCtx.createOscillator();
        osc.type = 'sine'; osc.frequency.value = 55; 
        const g = audioCtx.createGain(); g.gain.value = 0.1;
        osc.connect(g); g.connect(masterGain);
        osc.start();

        document.getElementById('audio-init').style.display = 'none';
    }

    function playSfx(type) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(masterGain);

        if(type === 'warp') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(50, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 3);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3);
        } else if(type === 'collapse') {
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 4);
            g.gain.setValueAtTime(0.4, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 4);
        }
        osc.start(); osc.stop(audioCtx.currentTime + 4);
    }

    const timeline = [
        { t: "Línea de Planck", d: "Dimensión cero: Vibración pura en el origen del tiempo.", color: "#00f2ff" },
        { t: "Relatividad General", d: "La masa deforma el tejido. El universo se expande.", color: "#ffffff" },
        { t: "Desdoblamiento", d: "¡Falla crítica! El espacio-tiempo se desgarra y colapsa.", color: "#bc13fe" },
        { t: "Rebote Cuántico", d: "Retorno al origen a través de la pantalla espectral.", color: "#ff3131" }
    ];

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 3 + 1;
            this.vx = (Math.random() - 0.5) * 3;
            this.vy = (Math.random() - 0.5) * 3;
            this.stretch = 1;
        }
        update() {
            if (stage === 0) { // Planck
                this.y += (canvas.height / 2 - this.y) * 0.08;
                this.x += (Math.random() - 0.5) * 25;
                this.stretch = 1;
            } else if (stage === 1) { // Expansión
                let dx = this.x - canvas.width/2;
                let dy = this.y - canvas.height/2;
                this.x += dx * 0.04; this.y += dy * 0.04;
                if(Math.abs(dx) > canvas.width || Math.abs(dy) > canvas.height) this.reset();
            } else if (stage === 2) { // Desdoblamiento (Efecto Spielberg)
                let dx = canvas.width/2 - this.x;
                let dy = canvas.height/2 - this.y;
                this.x += dx * 0.02; this.y += dy * 0.02;
                // Deformación visual (Spaghettification)
                this.stretch = 15; 
            }
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            if(stage === 2) {
                let angle = Math.atan2(canvas.height/2 - this.y, canvas.width/2 - this.x);
                ctx.rotate(angle);
            }
            ctx.fillStyle = timeline[stage].color;
            if(!isMobile) { ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle; }
            ctx.beginPath();
            // Dibujamos elipsis estiradas en el desdoblamiento
            ctx.ellipse(0, 0, this.size * this.stretch, this.size, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    particles = Array.from({ length: isMobile ? 80 : 200 }, () => new Particle());

    function loop() {
        // Efecto de rastro de cámara
        ctx.fillStyle = stage === 2 ? "rgba(20, 0, 40, 0.3)" : "rgba(0, 0, 0, 0.2)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }

    function rotateCycle() {
        stage = (stage + 1) % 4;
        if(stage === 1) playSfx('warp');
        if(stage === 2) playSfx('collapse');
        
        updateUI();

        // El desdoblamiento dura más (4 segundos)
        let delay = (stage === 2) ? 6000 : 10000;
        setTimeout(rotateCycle, delay);
    }

    function updateUI() {
        document.getElementById("stage-title").innerText = timeline[stage].t;
        document.getElementById("stage-desc").innerText = timeline[stage].d;
        document.getElementById("stage-title").style.color = timeline[stage].color;
    }

    document.getElementById('audio-init').addEventListener('click', initAudio);
    setTimeout(rotateCycle, 2000);
    loop();

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>
</body>
</html>
