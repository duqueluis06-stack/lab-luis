<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - EXPERIMENTAL CORE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
        
        :root {
            --planck: #00f2ff; --bio: #39ff14; --vortex: #bc13fe; --exit: #ff3131;
        }

        body, html { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; height: 100%; width: 100%; 
            font-family: 'Orbitron', sans-serif;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* TÍTULO COMPACTO 3D NEÓN AL TOPE */
        header {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            z-index: 60; text-align: center; width: auto; pointer-events: none;
        }
        .title-3d {
            font-weight: 900; font-size: 28px; color: #fff; 
            text-transform: uppercase; letter-spacing: 8px;
            text-shadow: 
                0 1px 0 #444, 0 2px 0 #333, 0 0 15px var(--planck);
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            padding-bottom: 5px;
        }

        /* UI DISTRIBUIDA: IZQUIERDA Y DERECHA */
        .panel-left { position: fixed; top: 25px; left: 25px; z-index: 1000; }
        .panel-right { position: fixed; top: 25px; right: 25px; z-index: 1000; display: flex; gap: 15px; }

        .orb {
            width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 20px; background: rgba(0,0,0,0.8); border: 2px solid #fff;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 20px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); box-shadow: 0 0 15px var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); box-shadow: 0 0 15px var(--vortex); }
        .orb:hover { transform: scale(1.1); filter: brightness(1.3); }

        /* NARRATIVA MINIMALISTA */
        .narrative {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 80%; max-width: 450px;
            background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 40px;
            border: 1px solid var(--planck); backdrop-filter: blur(10px);
        }
        #st-title { font-size: 14px; color: var(--planck); margin: 0; letter-spacing: 3px; text-shadow: 0 0 8px var(--planck); }
        #st-desc { font-size: 10px; color: #aaa; margin-top: 4px; font-family: sans-serif; }
        
        /* LOGO AJUSTADO ABAJO O ARRIBA SEGÚN PREFERENCIA, AQUÍ LO MANTENGO ARRIBA CERCA DE INICIO */
        img.logo { position: fixed; top: 85px; left: 20px; width: 55px; z-index: 110; border-radius: 50%; border: 1px solid var(--planck); opacity: 0.7; }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LUIS QUANTUM</div></header>
<img src="logo.jpg" class="logo">

<div class="panel-left">
    <a href="index.html" class="orb btn-exit" title="Inicio">🏠</a>
</div>

<div class="panel-right">
    <div id="btn-audio" class="orb" title="Audio">🔊</div>
    <a href="index3d.html" class="orb btn-bh" title="Black Hole">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">SISTEMA STANDBY</h2>
    <p id="st-desc">ACTIVE EL OSCILADOR CUÁNTICO (🔊) PARA LA SECUENCIA</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, particles = [], audioCtx, masterGain, active = false, vortexV = 0;

    const timeline = [
        { t: "Cuerdas de Planck", d: "TEJIDO VIBRATORIO - 10⁻³⁵m", color: "#00f2ff", dur: 10000, f: 440, wave: 'sine' },
        { t: "Materia Atómica", d: "FRAGUA DE PARTÍCULAS - RELIEVE", color: "#ffffff", dur: 12000, f: 330, wave: 'triangle' },
        { t: "Oxidación Bio", d: "APOPTOSIS: DISIPACIÓN DE MEMBRANA", color: "#39ff14", dur: 12000, f: 220, wave: 'sine' },
        { t: "Salto Warp", d: "EXPANSIÓN RELATIVISTA - FUGA LUZ", color: "#ffcc00", dur: 12000, f: 110, wave: 'sawtooth' },
        { t: "Singularidad", d: "DESDOBLAMIENTO ESPECTRAL - COLAPSO", color: "#bc13fe", dur: 20000, f: 55, wave: 'square' }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w; this.size = Math.random() * 4 + 1;
            this.angle = Math.random() * Math.PI * 2; this.orbit = Math.random() * 150 + 50;
            this.life = 1.0; this.speed = Math.random() * 30 + 10;
        }
        draw() {
            if (stage === 0) { // PLANCK
                ctx.strokeStyle = `rgba(0, 242, 255, ${Math.random()})`;
                ctx.lineWidth = 1; ctx.beginPath();
                let v = Math.sin(Date.now() * 0.05 + this.x) * 35;
                ctx.moveTo(this.x, 0); ctx.lineTo(this.x + v, h); ctx.stroke();
            } 
            else if (stage === 1) { // ÁTOMO RELIEVE
                ctx.shadowBlur = 10; ctx.shadowColor = "#fff";
                ctx.fillStyle = "#ff2d55"; ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                let r = Date.now() * 0.01 + this.angle;
                ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.arc(this.x + Math.cos(r)*30, this.y + Math.sin(r)*30, 2, 0, Math.PI*2); ctx.fill();
            }
            else if (stage === 2) { // BIO OXIDACIÓN VIBRANTE
                this.life -= 0.0035; if(this.life < 0) this.life = 1;
                let r = 50 + (1-this.life)*200, g = 255 * this.life;
                ctx.fillStyle = `rgba(${r}, ${g}, 40, ${this.life})`;
                let vib = Math.sin(Date.now()*0.1)*this.size;
                ctx.beginPath(); ctx.ellipse(this.x + vib, this.y, this.size*15*(1.5-this.life), this.size*8, 0, 0, Math.PI*2); ctx.fill();
            }
            else if (stage === 3) { // WARP
                let s = w/this.z; let px = w/2 + (this.x-w/2)*s, py = h/2 + (this.y-h/2)*s;
                this.z -= this.speed; if(this.z < 1) this.z = w;
                ctx.fillStyle = timeline[3].color; ctx.beginPath(); ctx.arc(px, py, this.size*s, 0, Math.PI*2); ctx.fill();
            }
            else if (stage === 4) { // SINGULARIDAD MEJORADA
                this.angle += 0.4; this.orbit *= 0.988;
                let dx = w/2 + Math.cos(this.angle) * this.orbit * 10;
                let dy = h/2 + Math.sin(this.angle) * this.orbit * 10;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.ellipse(dx, dy, this.size*25, this.size, this.angle, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    particles = Array.from({ length: 160 }, () => new Particle());

    function playAudio(freq, wave) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator(); let g = audioCtx.createGain();
        osc.type = wave; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.12, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 4);
        osc.connect(g); g.connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + 4);
    }

    function loop() {
        if (stage === 4) {
            // EFECTO DESDOBLAMIENTO: FEEDBACK RADIAL
            ctx.fillStyle = "rgba(255,255,255,0.02)"; ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexV);
            vortexV += 0.25; ctx.globalAlpha = 0.5;
            ctx.filter = `blur(10px) contrast(1.4) hue-rotate(${vortexV*10}deg)`;
            ctx.drawImage(canvas, -w/2-10, -h/2-10, w+20, h+20); ctx.restore();
        } else {
            ctx.fillStyle = `rgba(0,0,0,${stage === 3 ? 0.1 : 0.25})`; 
            ctx.fillRect(0,0,w,h); ctx.filter = "none";
        }
        if (active) particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function step() {
        const s = timeline[stage];
        document.getElementById("st-title").innerText = s.t;
        document.getElementById("st-title").style.color = s.color;
        document.getElementById("st-desc").innerText = s.d;
        playAudio(s.f, s.wave);
        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); particles.forEach(p => p.init()); }
            step();
        }, s.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        active = true; this.style.display = 'none';
        step();
    });

    loop();
</script>
</body>
</html>
