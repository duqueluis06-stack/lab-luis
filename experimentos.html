<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LAB LUIS - QUANTUM SINGULARITY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        :root {
            --planck: #00f2ff; --atomic: #fff; --bio: #39ff14;
            --cosmos: #ffcc00; --vortex: #bc13fe; --exit: #ff3131;
        }

        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        header { position: fixed; top: 110px; left: 50%; transform: translateX(-50%); z-index: 50; text-align: center; width: 100%; pointer-events: none; }
        .title-3d {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: clamp(24px, 8vw, 55px);
            color: #fff; text-transform: uppercase; letter-spacing: 12px;
            text-shadow: 0 1px 0 #555, 0 3px 0 #333, 0 6px 0 #111, 0 0 25px var(--planck);
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.98); } }

        .ui-panel { position: fixed; top: 25px; right: 25px; z-index: 1000; display: flex; gap: 20px; }
        .orb {
            width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; font-size: 26px; background: rgba(0,0,0,0.85); border: 2.5px solid #fff;
            transition: 0.4s; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        #btn-audio { border-color: var(--planck); color: var(--planck); box-shadow: 0 0 30px var(--planck); }
        .btn-exit { border-color: var(--exit); color: var(--exit); }
        .btn-bh { border-color: var(--vortex); color: var(--vortex); box-shadow: 0 0 30px var(--vortex); }
        .orb:hover { transform: scale(1.2) rotate(15deg); filter: brightness(1.4); }

        .narrative {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 85%; max-width: 750px;
            background: rgba(0,0,0,0.92); padding: 25px; border-radius: 20px; border: 1px solid var(--planck);
            backdrop-filter: blur(15px);
        }
        #st-title { font-size: 24px; color: var(--planck); margin: 0; letter-spacing: 3px; }
        #st-desc { font-size: 14px; color: #ddd; margin-top: 12px; line-height: 1.6; }

        img.logo { position: fixed; top: 25px; left: 25px; width: 75px; z-index: 110; border-radius: 50%; border: 3px solid var(--planck); }
    </style>
</head>
<body>

<canvas id="canvas-cosmos"></canvas>
<header><div class="title-3d">LUIS SINGULARITY</div></header>
<img src="logo.jpg" class="logo" alt="LUIS">

<div class="ui-panel">
    <a href="index.html" class="orb btn-exit">🏠</a>
    <div id="btn-audio" class="orb">🔊</div>
    <a href="index3d.html" class="orb btn-bh">🌀</a>
</div>

<div class="narrative">
    <h2 id="st-title">MOTOR ESTACIONARIO</h2>
    <p id="st-desc">Inicia el audio para romper la barrera de la luz y presenciar el desdoblamiento espectral.</p>
</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");
    let w, h, stage = 0, particles = [], audioCtx, masterGain, active = false, vortexV = 0, blurVal = 0;

    const timeline = [
        { t: "Cuerdas de Planck", d: "Micro-oscilaciones de alta frecuencia. El origen del todo.", color: "#00f2ff", dur: 9000, f: 523, w: 'sine' },
        { t: "Núcleo de Materia", d: "Fuerza nuclear fuerte. Estabilizando la masa subatómica.", color: "#ffffff", dur: 10000, f: 349, w: 'triangle' },
        { t: "Oxidación Bio-Entrópica", d: "Pérdida de tensión superficial. La energía se disipa y la materia se expande hacia su fin.", color: "#39ff14", dur: 11000, f: 220, w: 'sine' },
        { t: "Salto Relativista", d: "Velocidad Warp. La luz se estira y las estrellas deforman el vacío en su huida.", color: "#ffcc00", dur: 11000, f: 110, w: 'sawtooth' },
        { t: "Desdoblamiento Espectral", d: "¡COLAPSO! El universo se empaña, gira y es devorado por un agujero negro hacia otra dimensión.", color: "#bc13fe", dur: 16000, f: 55, w: 'square' }
    ];

    const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * w; this.y = Math.random() * h;
            this.z = Math.random() * w; this.size = Math.random() * 5 + 2;
            this.angle = Math.random() * Math.PI * 2; this.orbit = Math.random() * 150 + 50;
            this.life = 1.0; this.speed = Math.random() * 30 + 10;
        }
        draw() {
            if (stage === 0) { // PLANCK VIBRATORIO
                ctx.strokeStyle = `rgba(0, 242, 255, ${Math.random()})`;
                ctx.lineWidth = 1.5; ctx.beginPath();
                let v = Math.tan(Date.now() * 0.02 + this.x) * 20; // Vibración más errática
                ctx.moveTo(this.x, 0); ctx.lineTo(this.x + v, h); ctx.stroke();
            } else if (stage === 3) { // SALTO VELOCIDAD LUZ
                let s = w/this.z;
                let px = w/2 + (this.x-w/2)*s, py = h/2 + (this.y-h/2)*s;
                this.z -= this.speed; if(this.z < 1) this.z = w;
                ctx.strokeStyle = `rgba(255, 204, 0, ${s/20})`;
                ctx.lineWidth = s; ctx.beginPath();
                ctx.moveTo(px, py); ctx.lineTo(px + (px-w/2)*0.1, py + (py-h/2)*0.1); ctx.stroke(); // Estiramiento
            } else if (stage === 4) { // AGUJERO NEGRO Y DESDOBLAMIENTO
                this.angle += 0.35; this.orbit *= 0.98;
                let dx = w/2 + Math.cos(this.angle) * this.orbit * 12;
                let dy = h/2 + Math.sin(this.angle) * this.orbit * 12;
                ctx.fillStyle = `rgba(188, 19, 254, ${Math.random()})`;
                ctx.beginPath(); ctx.ellipse(dx, dy, this.size*25, this.size*1.5, this.angle, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = timeline[stage].color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    particles = Array.from({ length: 180 }, () => new Particle());

    function playAudio(freq, type) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator(); let g = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.15, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 4);
        osc.connect(g); g.connect(masterGain);
        osc.start(); osc.stop(audioCtx.currentTime + 4);
    }

    function loop() {
        if (stage === 4) {
            // EFECTO ESPEJO EMPAÑADO Y GIRO ESPECTRAL
            blurVal = Math.min(blurVal + 0.05, 15);
            ctx.fillStyle = `rgba(255,255,255,0.02)`; // El universo se aclara/empaña
            ctx.fillRect(0,0,w,h);
            ctx.save(); ctx.translate(w/2, h/2); ctx.rotate(vortexV);
            vortexV += 0.3; ctx.filter = `blur(${blurVal}px) brightness(1.2) contrast(1.5)`;
            ctx.drawImage(canvas, -w/2, -h/2); ctx.restore();
            // Portales interdimensionales aleatorios
            if(Math.random() > 0.9) {
                ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.beginPath();
                ctx.arc(w/2, h/2, Math.random()*w, 0, Math.PI*2); ctx.stroke();
            }
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fillRect(0,0,w,h); ctx.filter = "none";
            blurVal = 0;
        }
        if (active) particles.forEach(p => p.draw());
        requestAnimationFrame(loop);
    }

    function sequence() {
        const s = timeline[stage];
        document.getElementById("st-title").innerText = s.t;
        document.getElementById("st-title").style.color = s.color;
        document.getElementById("st-desc").innerText = s.d;
        playAudio(s.f, s.w);

        setTimeout(() => {
            stage = (stage + 1) % timeline.length;
            if(stage === 0) { 
                ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); 
                particles.forEach(p => p.init());
            }
            sequence();
        }, s.dur);
    }

    document.getElementById('btn-audio').addEventListener('click', function() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination);
        active = true; this.style.display = 'none';
        sequence();
    });

    loop();
</script>
</body>
</html>
