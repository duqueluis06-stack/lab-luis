<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LAB LUIS - Universal Space-Time Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --neon-cyan: #00f2ff;
        --neon-green: #39ff14;
        --neon-magenta: #ff00ff;
        --neon-red: #ff3131;
    }

    body, html { 
        margin: 0; padding: 0; overflow: hidden; 
        background: #000; font-family: 'Orbitron', sans-serif;
        color: #fff;
    }

    /* Interfaz Superior */
    header {
        position: relative; z-index: 100;
        padding: 20px; text-align: center;
        background: linear-gradient(to bottom, rgba(0,242,255,0.2), transparent);
        border-bottom: 1px solid var(--neon-cyan);
        box-shadow: 0 0 20px rgba(0,242,255,0.3);
    }

    .main-nav {
        display: flex; justify-content: center; gap: 15px;
        margin-top: 15px; position: relative; z-index: 100;
    }

    .btn-nav {
        padding: 10px 20px; border: 1px solid var(--neon-cyan);
        background: rgba(0,0,0,0.8); color: var(--neon-cyan);
        text-decoration: none; border-radius: 5px;
        text-transform: uppercase; font-size: 12px; letter-spacing: 2px;
        transition: 0.4s;
    }

    .btn-nav:hover {
        background: var(--neon-cyan); color: #000;
        box-shadow: 0 0 20px var(--neon-cyan);
    }

    /* El Velo de la Narrativa */
    #narrative-engine {
        position: absolute; bottom: 10%; left: 50%;
        transform: translateX(-50%);
        width: 80%; max-width: 800px;
        background: rgba(0, 0, 0, 0.85);
        border-left: 5px solid var(--neon-cyan);
        padding: 30px; border-radius: 0 20px 20px 0;
        z-index: 100; pointer-events: none;
        box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        backdrop-filter: blur(10px);
    }

    #stage-title { 
        font-size: 32px; margin: 0; text-transform: uppercase;
        color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan);
    }

    #stage-desc { 
        font-size: 16px; line-height: 1.6; margin-top: 15px; 
        color: #ccc; font-family: 'Consolas', monospace;
    }

    /* Canvas de Alta Definición */
    #world {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%; z-index: 1;
    }

    .blackhole-float {
        position: fixed; top: 20%; right: 5%; z-index: 100;
    }

    /* Efecto CRT/Scanline para realismo científico */
    body::after {
        content: " "; position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 4px, 3px 100%;
        pointer-events: none; z-index: 1000;
    }
</style>
</head>
<body>

<header>
    <div style="font-size: 24px; letter-spacing: 5px; color: var(--neon-cyan);">LAB LUIS - EXPERIMENTAL SYSTEM</div>
    <nav class="main-nav">
        <a href="#" class="btn-nav">Vórtice</a>
        <a href="#" class="btn-nav">Pionero</a>
        <a href="#" class="btn-nav">Laboratorio</a>
    </nav>
</header>

<div class="blackhole-float">
    <a href="#" class="btn-nav" style="border-color: var(--neon-magenta); color: var(--neon-magenta);">🌀 Black Hole Event</a>
</div>

<canvas id="world"></canvas>

<div id="narrative-engine">
    <h2 id="stage-title">INICIALIZANDO...</h2>
    <p id="stage-desc">Sincronizando con el tejido del espacio-tiempo.</p>
</div>

<script>
const canvas = document.getElementById("world");
const ctx = canvas.getContext("2d");
const title = document.getElementById("stage-title");
const desc = document.getElementById("stage-desc");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let time = 0;
let stage = 0;
let particles = [];
let entities = [];

const stages = [
    {
        name: "Escala de Planck",
        desc: "Estamos a 10⁻³⁵ metros. Aquí la geometría clásica no existe. El espacio-tiempo es una 'espuma' de fluctuaciones cuánticas donde el tiempo hierve y no tiene dirección fija.",
        color: "#00f2ff",
        count: 400
    },
    {
        name: "Reino Subatómico",
        desc: "Surgen Quarks, Gluones y Leptones. Las fuerzas fundamentales se separan. Los Neutrinos atraviesan todo. El tiempo comienza su flecha entrópica hacia el futuro.",
        color: "#ffffff",
        count: 200
    },
    {
        name: "Entropía Biológica",
        desc: "La materia se organiza en Células. ¿Por qué morimos? Por la acumulación de errores en la replicación del ADN y el desgaste de los telómeros. El tiempo aquí es una cuenta regresiva vital.",
        color: "#39ff14",
        count: 100
    },
    {
        name: "Escala Planetaria",
        desc: "Saliendo de la Biósfera. Atravesamos la Estratósfera hacia el vacío. La Gravedad curva el tiempo. Lo que es un segundo aquí, es diferente cerca de una masa estelar.",
        color: "#ff3131",
        count: 50
    },
    {
        name: "Expansión Eterna",
        desc: "Energía Oscura. El Universo se estira más rápido que la luz. Las galaxias se alejan para siempre hacia el Gran Frío. Al final, solo quedará el vacío infinito.",
        color: "#ff00ff",
        count: 150
    }
];

class Particle {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.z = Math.random() * canvas.width;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.radius = Math.random() * 2;
        this.history = [];
    }
    draw() {
        ctx.beginPath();
        ctx.fillStyle = stages[stage].color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = stages[stage].color;
        
        if (stage === 0) { // Planck: Saltos cuánticos
            ctx.arc(this.x + (Math.random()-0.5)*20, this.y + (Math.random()-0.5)*20, this.radius * 2, 0, Math.PI*2);
        } else if (stage === 2) { // Células: Dibujar núcleos
            ctx.arc(this.x, this.y, this.radius * 4, 0, Math.PI*2);
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.stroke();
        } else {
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        }
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    update() {
        if (stage === 2) { // Envejecimiento
            this.radius += 0.02;
            if (this.radius > 6) this.reset();
        } else if (stage === 4) { // Expansión
            let dx = this.x - canvas.width/2;
            let dy = this.y - canvas.height/2;
            this.x += dx * 0.04;
            this.y += dy * 0.04;
            if (this.x < 0 || this.x > canvas.width) this.reset();
        } else {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
    }
}

// Planetas y estructuras masivas
class Celestial {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = 20 + Math.random() * 50;
    }
    draw() {
        if (stage >= 3) {
            let g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            g.addColorStop(0, stages[stage].color);
            g.addColorStop(1, "transparent");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fill();
            
            // Anillos neón
            ctx.strokeStyle = stages[stage].color;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.ellipse(this.x, this.y, this.size*2, this.size*0.5, time/20, 0, Math.PI*2);
            ctx.stroke();
        }
    }
}

function init() {
    particles = [];
    entities = [];
    for(let i=0; i<300; i++) particles.push(new Particle());
    for(let i=0; i<5; i++) entities.push(new Celestial());
}

function render() {
    time++;
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0,0,canvas.width, canvas.height);

    entities.forEach(e => e.draw());
    particles.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(render);
}

// Sistema de progresión narrativa
function nextStage() {
    stage = (stage + 1) % stages.length;
    title.style.color = stages[stage].color;
    title.innerText = stages[stage].name;
    desc.innerText = stages[stage].desc;
    
    // Efecto glitch al cambiar
    ctx.fillStyle = "white";
    ctx.fillRect(0,0,canvas.width, canvas.height);
}

setInterval(nextStage, 12000); // 12 segundos por escala científica
nextStage(); // Lanzar primera etapa
init();
render();

window.onresize = () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
};
</script>
</body>
</html>
