    <style>

            --neon-cyan: #00f2ff;

        }

        /* 3. NAVEGACIÓN (Izquierda Superior, debajo del logo) */

            position: fixed; top: 150px; left: 20px;
            z-index: 100;

        /* 4. BOTÓN BLACK HOLE (Derecha Superior) */

<body>

<canvas id="canvas-cosmos"></canvas>

<header>⚡ LAB LUIS – Quantum Engine</header>

<div class="narrative-engine">
    <h2 id="stage-title">Escala de Planck</h2>
    <p id="stage-desc">Inicializando simulación del tejido espacio-temporal fundamental...</p>
</div>

<div id="creditos_btn" onclick="window.location.href='creditos.html'">ⓘ Créditos</div>

<script>
    const canvas = document.getElementById("canvas-cosmos");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let stage = 0;
    let time = 0;
    let celestialEntities = [];

    const timeline = [
        { t: "Línea de Planck", d: "Estamos a 10⁻³⁵ metros. Aquí el espacio-tiempo es una 'espuma cuántica'. El tiempo no fluye, es una vibración pura de energía neón sin dirección definida.", color: "#00f2ff", pCount: 300 },
        { t: "Fase Subatómica", d: "Surgen Quarks, Gluones y Leptones. Neutrinos atraviesan mundos sin colisionar. El tiempo adquiere su flecha irreversible hacia el futuro.", color: "#ffffff", pCount: 200 },
        { t: "Materia y Entropía", d: "¿Por qué envejecemos? La vida lucha contra el desorden acumulando errores en el ADN. El tiempo biológico es una cuenta regresiva vital.", color: "#39ff14", pCount: 100 },
        { t: "Escala Planetaria", d: "Saliendo de la Biósfera. Atravesamos la Estratósfera. La masa de la Tierra curva el tiempo local. La gravedad se vuelve la fuerza dominante.", color: "#ff3131", pCount: 80 },
        { t: "Expansión Infinita", d: "Energía Oscura. El Universo se estira más rápido que la luz. Todo lo que conocemos se perderá en un infinito frío y oscuro.", color: "#ff00ff", pCount: 150 }
    ];

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = (Math.random() - 0.5) * 4;
            this.age = 0;
            this.history = [];
        }
        update() {
            if (stage === 0) { // Planck: Caos vibratorio
                this.x += (Math.random() - 0.5) * 15;
                this.y += (Math.random() - 0.5) * 15;
            } else if (stage === 2) { // Vida: Envejecimiento
                this.size += 0.08;
                this.age++;
                if (this.age > 120) this.reset();
            } else if (stage === 4) { // Expansión acelerada
                let dx = this.x - canvas.width / 2;
                let dy = this.y - canvas.height / 2;
                this.x += dx * 0.05;
                this.y += dy * 0.05;
                if (this.x < 0 || this.x > canvas.width) this.reset();
            } else {
                this.x += this.vx;
                this.y += this.vy;
            }
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
            ctx.fillStyle = timeline[stage].color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = timeline[stage].color;
            ctx.beginPath();
            if(stage === 0){ // Planck: Estilo 'espuma cuántica'
                ctx.arc(this.x + (Math.random()-0.5)*20, this.y + (Math.random()-0.5)*20, this.size*2, 0, Math.PI*2);
            } else {
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            }
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    class Celestial {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = 20 + Math.random() * 50;
        }
        draw() {
            if (stage >= 3) {
                let g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                g.addColorStop(0, timeline[stage].color);
                g.addColorStop(1, "transparent");
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                
                // Anillos neón
                ctx.strokeStyle = timeline[stage].color;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size*2, this.size*0.5, time/20, 0, Math.PI*2);
                ctx.stroke();
            }
        }
    }

    let particles = Array.from({ length: 300 }, () => new Particle());
    let celestials = Array.from({ length: 5 }, () => new Celestial());

    function loop() {
        time++;
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)"; // Efecto de rastro
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        celestials.forEach(c => c.draw());
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(loop);
    }

    setInterval(() => {
        stage = (stage + 1) % timeline.length;
        document.getElementById("stage-title").innerText = timeline[stage].t;
        document.getElementById("stage-desc").innerText = timeline[stage].d;
        document.getElementById("stage-title").style.color = timeline[stage].color;
        
        // Destello cinematográfico al cambiar de escala
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }, 12000); // 12 segundos por etapa

    window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    loop();
</script>
