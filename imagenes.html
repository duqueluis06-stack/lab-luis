<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CyberLab - Luis</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:url('fondo_imagenes.JPG') no-repeat center center fixed;
    background-size:cover;
    color:#00ffcc;
    text-align:center;
}

/* HEADER */
header {
    padding:20px;
    font-size:32px;
    text-shadow:0 0 10px #00ffff;
    position:relative;
}

/* ÁTOMO (arriba derecha, pequeño, no molesta) */
.atomo {
    position:absolute;
    top:10px;
    right:15px;
    width:70px;
    height:70px;
}

.nucleo {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.nucleo span {
    position:absolute;
    width:7px;
    height:7px;
    border-radius:50%;
    box-shadow:0 0 8px #ff00ff;
}

.nucleo span:nth-child(1){background:#ff00ff; top:-6px; left:-6px;}
.nucleo span:nth-child(2){background:#00ffff; top:6px; left:6px;}
.nucleo span:nth-child(3){background:#ff00ff; top:-6px; left:6px;}
.nucleo span:nth-child(4){background:#00ffff; top:6px; left:-6px;}

.orbita {
    position:absolute;
    width:100%;
    height:100%;
    border:1px solid rgba(0,255,255,0.3);
    border-radius:50%;
    animation:rotar 5s linear infinite;
}

.o2 { transform:rotate(60deg); }
.o3 { transform:rotate(120deg); }

@keyframes rotar {
    from {transform:rotate(0deg);}
    to {transform:rotate(360deg);}
}

.electron {
    width:5px;
    height:5px;
    background:#00ffff;
    border-radius:50%;
    position:absolute;
    top:-2px;
    left:50%;
    transform:translateX(-50%);
    box-shadow:0 0 6px #00ffff;
}

/* NAV */
nav a {
    margin:0 10px;
    color:#ff9900;
    text-decoration:none;
}
nav a:hover {color:#00ffff;}

/* CARDS */
.card {
    display:inline-block;
    width:250px;
    margin:15px;
    padding:10px;
    border:1px solid #00ffcc;
    background:rgba(0,0,0,0.5);
}

.card img {width:100%;}

/* BOTÓN ROSA */
.neon-btn {
    display:inline-block;
    padding:10px 18px;
    background:#000;
    color:#ff00ff;
    border:2px solid #ff00ff;
    text-decoration:none;
    border-radius:10px;
}

.neon-btn:hover {
    background:#ff00ff;
    color:#000;
}

/* CARA SIMPLE (al lado del botón) */
.cara {
    display:inline-block;
    width:60px;
    height:60px;
    margin-left:10px;
    position:relative;
    background:#111;
    border-radius:50%;
    border:2px solid #00ffcc;
    vertical-align:middle;
}

.ojo {
    width:14px;
    height:14px;
    background:#fff;
    border-radius:50%;
    position:absolute;
    top:18px;
}

#ojo1 { left:10px; }
#ojo2 { right:10px; }

.pupila {
    width:5px;
    height:5px;
    background:#000;
    border-radius:50%;
    position:absolute;
    top:5px;
    left:5px;
}

.boca {
    width:25px;
    height:10px;
    border-bottom:2px solid #00ffcc;
    border-radius:0 0 20px 20px;
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
}

</style>
</head>

<body>

<header>
CyberLab - Arte Electrónico

<!-- ⚛️ ÁTOMO -->
<div class="atomo">
  <div class="nucleo">
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="orbita o1"><div class="electron"></div></div>
  <div class="orbita o2"><div class="electron"></div></div>
  <div class="orbita o3"><div class="electron"></div></div>
</div>
</header>

<nav>
<a href="#">Inicio</a>
<a href="#">Proyectos</a>
<a href="#">Experimentos</a>
</nav>

<h2>Galería</h2>

<div class="card">
<img src="art1.jpg">
<p>Imagen 1 - descripción experimental</p>
</div>

<div class="card">
<img src="art2.jpg">
<p>Imagen 2 - sistema visual</p>
</div>

<br><br>

<!-- BOTÓN + CARA -->
<a class="neon-btn" href="https://gofund.me/1d047dee2">Apoyar Proyecto</a>

<div class="cara">
  <div class="ojo" id="ojo1"><div class="pupila"></div></div>
  <div class="ojo" id="ojo2"><div class="pupila"></div></div>
  <div class="boca"></div>
</div>

<script>
document.addEventListener("mousemove", e=>{
    document.querySelectorAll(".pupila").forEach(p=>{
        const r = p.parentElement.getBoundingClientRect();
        const dx = e.clientX - (r.left + r.width/2);
        const dy = e.clientY - (r.top + r.height/2);
        const a = Math.atan2(dy,dx);
        p.style.transform = `translate(${Math.cos(a)*3}px,${Math.sin(a)*3}px)`;
    });
});
</script>

</body>
</html>
