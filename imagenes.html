<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CyberLab - Luis</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:url('fondo_imagenes.JPG') no-repeat center center fixed;
    background-size:cover;
    color:#00ffcc;
    text-align:center;
}

/* HEADER */
header {
    padding:20px;
    font-size:32px;
    position:relative;
    z-index:5;
}

/* NAV (RESTAURADO + CLICK OK) */
nav {
    position:relative;
    z-index:10;
    margin:10px;
}

nav a {
    margin:0 12px;
    color:#ff9900;
    text-decoration:none;
    font-weight:bold;
    cursor:pointer;
}

nav a:hover { color:#00ffff; }

/* 🔥 ÁTOMO (NO BLOQUEA CLICS) */
.atomo {
    position:absolute;
    top:10px;
    right:15px;
    width:70px;
    height:70px;
    pointer-events:none; /* 🔑 CLAVE: no bloquea botones */
}

/* resto átomo */
.nucleo {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.nucleo span {
    position:absolute;
    width:7px;
    height:7px;
    border-radius:50%;
    box-shadow:0 0 8px #ff00ff;
}

.orbita {
    position:absolute;
    width:100%;
    height:100%;
    border:1px solid rgba(0,255,255,0.3);
    border-radius:50%;
    animation:rotar 5s linear infinite;
}

@keyframes rotar {
    from {transform:rotate(0deg);}
    to {transform:rotate(360deg);}
}

.electron {
    width:5px;
    height:5px;
    background:#00ffff;
    border-radius:50%;
    position:absolute;
    top:-2px;
    left:50%;
}

/* SECCIONES */
.section {
    margin:30px;
}

/* 🖼️ GALERÍA */
.card {
    display:inline-block;
    width:260px;
    margin:15px;
    padding:12px;
    border:1px solid #00ffcc;
    background:rgba(0,0,0,0.5);
    border-radius:8px;
    cursor:pointer;
}

.card img {
    width:100%;
    border-radius:5px;
}

.card p {
    font-size:13px;
    color:white;
}

/* 💥 LIGHTBOX */
.lightbox {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.lightbox img {
    max-width:90%;
    max-height:90%;
    border:2px solid #00ffff;
}

/* BOTÓN */
.neon-btn {
    display:inline-block;
    padding:10px 18px;
    background:#000;
    color:#ff00ff;
    border:2px solid #ff00ff;
    text-decoration:none;
    border-radius:10px;
    margin-top:20px;
    cursor:pointer;
}

.neon-btn:hover {
    background:#ff00ff;
    color:#000;
}

/* CARA */
.cara {
    display:inline-block;
    width:60px;
    height:60px;
    margin-left:10px;
    position:relative;
    background:#111;
    border-radius:50%;
    border:2px solid #00ffcc;
}

.ojo {
    width:14px;
    height:14px;
    background:#fff;
    border-radius:50%;
    position:absolute;
    top:18px;
}

#ojo1 { left:10px; }
#ojo2 { right:10px; }

.pupila {
    width:5px;
    height:5px;
    background:#000;
    border-radius:50%;
    position:absolute;
}

.boca {
    width:25px;
    height:10px;
    border-bottom:2px solid #00ffcc;
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
}
</style>
</head>

<body>

<header>
CyberLab - Luis

<div class="atomo">
  <div class="orbita"><div class="electron"></div></div>
  <div class="orbita"><div class="electron"></div></div>
  <div class="orbita"><div class="electron"></div></div>
</div>
</header>

<!-- 🔥 NAV RESTAURADO COMPLETO -->
<nav>
<a onclick="alert('Inicio')">Inicio</a>
<a onclick="alert('Proyectos')">Proyectos</a>
<a onclick="alert('Experimentos')">Experimentos</a>
<a onclick="alert('Libros')">Libros</a>
</nav>

<!-- 🖼️ GALERÍA COMPLETA -->
<div class="section">
<h2>Arte Electrónico</h2>

<div class="card" onclick="openImg('art1.jpg')">
<img src="art1.jpg">
<p>Exploración artística 1</p>
</div>

<div class="card" onclick="openImg('art2.jpg')">
<img src="art2.jpg">
<p>Exploración artística 2</p>
</div>

<div class="card" onclick="openImg('art3.jpg')">
<img src="art3.jpg">
<p>Exploración artística 3</p>
</div>
</div>

<!-- 💥 LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImg()">
<img id="lightboxImg">
</div>

<!-- 💚 BOTÓN -->
<a class="neon-btn" href="https://gofund.me/1d047dee2">
Apoyar Proyecto
</a>

<div class="cara">
  <div class="ojo" id="ojo1"><div class="pupila"></div></div>
  <div class="ojo" id="ojo2"><div class="pupila"></div></div>
  <div class="boca"></div>
</div>

<script>

/* 👁️ MOUSE TRACKING */
document.addEventListener("mousemove", e=>{
    document.querySelectorAll(".pupila").forEach(p=>{
        const r = p.parentElement.getBoundingClientRect();
        const dx = e.clientX - (r.left + r.width/2);
        const dy = e.clientY - (r.top + r.height/2);
        const a = Math.atan2(dy,dx);
        p.style.transform = `translate(${Math.cos(a)*3}px,${Math.sin(a)*3}px)`;
    });
});

/* 🖼️ LIGHTBOX */
function openImg(src){
    document.getElementById("lightboxImg").src = src;
    document.getElementById("lightbox").style.display = "flex";
}

function closeImg(){
    document.getElementById("lightbox").style.display = "none";
}

</script>

</body>
</html>
