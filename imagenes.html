<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CyberLab - Luis</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:url('fondo_imagenes.JPG') no-repeat center center fixed;
    background-size:cover;
    color:#00ffcc;
    text-align:center;
}

header {
    padding:20px;
    font-size:32px;
    position:relative;
}

nav {
    margin:10px;
}

nav button {
    background:#000;
    border:2px solid #ff00ff;
    color:#ff00ff;
    padding:8px 14px;
    margin:5px;
    cursor:pointer;
    border-radius:8px;
}

nav button:hover {
    background:#ff00ff;
    color:#000;
}

/* ÁTOMO seguro */
.atomo {
    position:absolute;
    top:10px;
    right:15px;
    width:70px;
    height:70px;
    pointer-events:none;
}

.orbita {
    position:absolute;
    width:100%;
    height:100%;
    border:1px solid rgba(0,255,255,0.3);
    border-radius:50%;
    animation:spin 5s linear infinite;
}

@keyframes spin {
    from {transform:rotate(0deg);}
    to {transform:rotate(360deg);}
}

.electron {
    width:5px;
    height:5px;
    background:#00ffff;
    border-radius:50%;
    position:absolute;
}

/* GALERÍA */
.section { margin:30px; }

.grid {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    width:250px;
    margin:15px;
    border:1px solid #00ffcc;
    background:rgba(0,0,0,0.5);
    border-radius:8px;
    cursor:pointer;
    overflow:hidden;
}

.card img {
    width:100%;
}

.card p {
    padding:8px;
    font-size:13px;
    color:white;
}

/* LIGHTBOX */
.lightbox {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:center;
}

.lightbox img {
    max-width:90%;
    max-height:90%;
    border:2px solid #00ffff;
}

/* BOTÓN */
.neon-btn {
    display:inline-block;
    padding:10px 18px;
    border:2px solid #ff00ff;
    color:#ff00ff;
    text-decoration:none;
    border-radius:10px;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
CyberLab - Luis

<div class="atomo">
  <div class="orbita"></div>
  <div class="orbita"></div>
  <div class="orbita"></div>
</div>
</header>

<!-- 🧠 BOTONES SIN ERRORES -->
<nav>
<button data-page="inicio">Inicio</button>
<button data-page="proyectos">Proyectos</button>
<button data-page="experimentos">Experimentos</button>
<button data-page="libros">Libros</button>
</nav>

<!-- 🖼️ GALERÍA COMPLETA (NO SE PIERDE NADA) -->
<div class="section">
<h2>Arte Electrónico</h2>
<div class="grid" id="gallery"></div>
</div>

<!-- 💥 LIGHTBOX -->
<div class="lightbox" id="lightbox">
<img id="lightboxImg">
</div>

<script>

/* 🧠 DATOS COMPLETOS DE IMÁGENES */
const images = [
 {src:"art1.jpg", text:"Exploración artística 1"},
 {src:"art2.jpg", text:"Exploración artística 2"},
 {src:"art3.jpg", text:"Exploración artística 3"},
 {src:"art4.jpg", text:"Exploración artística 4"},
 {src:"art5.jpg", text:"Exploración artística 5"},
 {src:"spiritbox.jpg", text:"SpiritBox experimental"},
 {src:"radio1.jpg", text:"Sistema de radio 1"},
 {src:"radio2.jpg", text:"Sistema híbrido"},
 {src:"eolienne.jpg", text:"Mini eólica"},
 {src:"emf.jpg", text:"Detector EMF"}
];

/* 🖼️ GENERAR GALERÍA SIN PERDER NADA */
const gallery = document.getElementById("gallery");

images.forEach(img=>{
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
        <img src="${img.src}">
        <p>${img.text}</p>
    `;
    div.addEventListener("click", ()=>{
        document.getElementById("lightboxImg").src = img.src;
        document.getElementById("lightbox").style.display = "flex";
    });
    gallery.appendChild(div);
});

/* 💥 LIGHTBOX CIERRE */
document.getElementById("lightbox").addEventListener("click", ()=>{
    document.getElementById("lightbox").style.display = "none";
});

/* 🧭 BOTONES SIN ERROR */
document.querySelectorAll("nav button").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        console.log("Navegación:", btn.dataset.page);
    });
});

</script>

</body>
</html>
