<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CyberLab - Luis</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#00ffcc;
text-align:center;
}

/* HEADER */
header{
padding:20px;
font-size:28px;
position:relative;
}

/* BOTONES */
nav{
margin:10px;
}

nav button{
background:black;
border:2px solid #ff00ff;
color:#ff00ff;
padding:8px 14px;
margin:5px;
cursor:pointer;
}

nav button:hover{
background:#ff00ff;
color:black;
}

/* GALERÍA */
.section{
margin:20px;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
width:220px;
margin:10px;
border:1px solid #00ffcc;
background:#111;
cursor:pointer;
}

.card img{
width:100%;
}

.card p{
font-size:12px;
padding:5px;
}

/* LIGHTBOX */
.lightbox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

/* GOFUNDME */
a{
display:inline-block;
margin:15px;
padding:10px 15px;
border:2px solid #ff00ff;
color:#ff00ff;
text-decoration:none;
}

/* CARA */
.cara{
width:60px;
height:60px;
border-radius:50%;
border:2px solid #00ffcc;
display:inline-block;
position:relative;
margin-left:10px;
}

.ojo{
width:12px;
height:12px;
background:white;
border-radius:50%;
position:absolute;
top:18px;
}

#o1{left:12px;}
#o2{right:12px;}

.pupila{
width:4px;
height:4px;
background:black;
border-radius:50%;
position:absolute;
}

/* ATOM SIMPLIFICADO (NO BLOQUEA) */
.atomo{
position:absolute;
top:10px;
right:10px;
width:60px;
height:60px;
pointer-events:none;
}
</style>
</head>

<body>

<header>
CyberLab - Luis

<div class="atomo"></div>
</header>

<!-- BOTONES -->
<nav>
<button data="inicio">Inicio</button>
<button data="proyectos">Proyectos</button>
<button data="exp">Experimentos</button>
</nav>

<!-- GOFUNDME -->
<a href="https://gofund.me/1d047dee2" target="_blank">
Apoyar Proyecto
</a>

<div class="cara">
<div class="ojo" id="o1"><div class="pupila"></div></div>
<div class="ojo" id="o2"><div class="pupila"></div></div>
</div>

<!-- GALERÍA -->
<div class="section">
<h2>Galería</h2>

<div class="grid" id="grid"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lb">
<img id="lbimg">
</div>

<script>

console.log("JS cargado OK");

/* 🧠 GALERÍA SEGURA */
const imgs = [
{src:"art1.jpg", txt:"Imagen 1"},
{src:"art2.jpg", txt:"Imagen 2"},
{src:"art3.jpg", txt:"Imagen 3"},
{src:"art4.jpg", txt:"Imagen 4"},
{src:"art5.jpg", txt:"Imagen 5"}
];

const grid = document.getElementById("grid");

imgs.forEach(i=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=`<img src="${i.src}"><p>${i.txt}</p>`;
d.onclick=()=>{
document.getElementById("lbimg").src=i.src;
document.getElementById("lb").style.display="flex";
};
grid.appendChild(d);
});

/* LIGHTBOX CLOSE */
document.getElementById("lb").onclick=()=>{
document.getElementById("lb").style.display="none";
};

/* BOTONES SIN ERROR */
document.querySelectorAll("nav button").forEach(b=>{
b.addEventListener("click",()=>{
console.log("click:",b.getAttribute("data"));
});
});

/* OJOS SIGUEN CURSOR */
document.addEventListener("mousemove",e=>{
document.querySelectorAll(".pupila").forEach(p=>{
const r=p.parentElement.getBoundingClientRect();
const dx=e.clientX-(r.left+r.width/2);
const dy=e.clientY-(r.top+r.height/2);
const a=Math.atan2(dy,dx);
p.style.transform=`translate(${Math.cos(a)*3}px,${Math.sin(a)*3}px)`;
});
});

</script>

</body>
</html>
