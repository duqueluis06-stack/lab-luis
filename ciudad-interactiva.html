<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE RECUPERACIÓN QUANTUM</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: monospace; }
        #debug { position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.8); padding: 10px; z-index: 1000; }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 1000; }
        button { padding: 15px 25px; background: #000; color: #0ff; border: 2px solid #0ff; cursor: pointer; font-weight: bold; }
        #loader { position: fixed; inset: 0; background: #000; color: #0ff; display: flex; align-items: center; justify-content: center; z-index: 2000; }
    </style>
</head>
<body>

    <div id="loader">INICIALIZANDO NÚCLEO...</div>
    <div id="debug">ESTADO: INICIANDO...</div>
    
    <div class="controls">
        <button onmousedown="move='w'" onmouseup="move=null">↑</button>
        <button onmousedown="move='s'" onmouseup="move=null">↓</button>
        <button onclick="resetPos()">🎯 RE-SPAWN</button>
        <button onclick="location.href='index.html'">🏠 SALIR</button>
    </div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const log = (t) => document.getElementById('debug').innerText = "LOG: " + t;
        let scene, camera, renderer, luis, mixer, move = null;
        let cityMixer;
        const clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000505);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 2));

            // SUELO DE PRUEBA (Si ves esto, Three.js funciona)
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x112211}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            const draco = new THREE.DRACOLoader();
            draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
            const loader = new THREE.GLTFLoader();
            loader.setDRACOLoader(draco);

            log("Cargando ciudad...");
            loader.load('ciudad_quantum.glb', (gltf) => {
                scene.add(gltf.scene);
                if(gltf.animations.length) {
                    cityMixer = new THREE.AnimationMixer(gltf.scene);
                    gltf.animations.forEach(clip => cityMixer.clipAction(clip).play());
                }
                log("Ciudad OK. Cargando Luis...");

                loader.load('luis_avatar.glb', (av) => {
                    luis = av.scene;
                    luis.scale.set(0.015, 0.015, 0.015);
                    scene.add(luis);
                    if(av.animations.length) {
                        mixer = new THREE.AnimationMixer(luis);
                        mixer.clipAction(av.animations[0]).play();
                    }
                    document.getElementById('loader').style.display = 'none';
                    log("SISTEMA ONLINE");
                }, undefined, (e) => log("Error Luis: " + e));

            }, (xhr) => {
                let p = Math.round(xhr.loaded / xhr.total * 100);
                document.getElementById('loader').innerText = "CARGANDO CIUDAD: " + p + "%";
            }, (e) => log("Error Ciudad: " + e));

            new THREE.OrbitControls(camera, renderer.domElement);
        }

        function resetPos() {
            if(luis) { luis.position.set(0,0,0); camera.position.set(0,5,10); }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if(mixer) mixer.update(delta);
            if(cityMixer) cityMixer.update(delta);
            if(luis && move) {
                if(move === 'w') luis.translateZ(0.2);
                if(move === 's') luis.translateZ(-0.2);
            }
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
