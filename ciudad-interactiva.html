<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIUDAD INTERACTIVA - QUANTUM</title>
    <style>
        :root { --neon: #00ffff; --rgb: #ff00ff; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* HEADER */
        header {
            position: absolute; top: 0; width: 100%; height: 50px;
            background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; 
            align-items: center; padding: 0 15px; box-sizing: border-box; z-index: 100;
            border-bottom: 2px solid var(--neon);
        }

        .btn-exit {
            color: #fff; text-decoration: none; background: #ff0000; 
            padding: 5px 15px; border-radius: 5px; font-weight: bold;
            text-transform: uppercase; font-size: 12px;
        }

        /* CONTROLES TIPO GTA PARA MÓVIL */
        .controls { 
            position: absolute; bottom: 20px; left: 20px; 
            display: grid; grid-template-columns: repeat(3, 65px); 
            grid-template-rows: repeat(2, 65px); gap: 8px; z-index: 100; 
        }
        .btn { 
            width: 65px; height: 65px; background: rgba(255,255,255,0.1); 
            border: 2px solid var(--neon); color: var(--neon); 
            font-size: 20px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; user-select: none; 
            border-radius: 12px; backdrop-filter: blur(4px);
        }
        .btn:active { background: var(--neon); color: #000; transform: scale(0.95); }

        .panic-btn { 
            position: absolute; bottom: 20px; right: 20px; width: 70px; height: 70px; 
            background: var(--rgb); color: #fff; border: none; font-weight: bold; 
            border-radius: 50%; cursor: pointer; z-index: 100; box-shadow: 0 0 15px var(--rgb);
        }

        #loader { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon); 
        }
    </style>
</head>
<body>

<div id="loader">
    <h2 id="load-msg">CARGANDO MUNDO 3D...</h2>
    <div style="width: 200px; height: 10px; border: 1px solid var(--neon); border-radius: 5px;">
        <div id="bar" style="width: 0%; height: 100%; background: var(--neon);"></div>
    </div>
</div>

<header>
    <div style="color: var(--neon); font-size: 14px; font-weight: bold;">SISTEMA: <span id="st" style="color: #fff;">INICIALIZANDO</span></div>
    <a href="index.html" class="btn-exit">SALIR AL MENÚ</a>
</header>

<div class="controls">
    <div></div>
    <div class="btn" id="btn-w">↑</div>
    <div></div>
    <div class="btn" id="btn-a">←</div>
    <div class="btn" id="btn-s">↓</div>
    <div class="btn" id="btn-d">→</div>
</div>

<button class="panic-btn" onclick="resetLuis()">RECENTER</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, luis, controls;
    let mixers = []; 
    let moveDir = null;
    const clock = new THREE.Clock();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 5000);
        
        // --- RENDERIZADO DE ALTA CALIDAD ---
        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Evita que se vea cuadrado/pixelado
        renderer.outputEncoding = THREE.sRGBEncoding; // Mejora los colores
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // Iluminación
        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
        const loader = new THREE.GLTFLoader();
        loader.setDRACOLoader(draco);

        // CARGAR CIUDAD
        loader.load('ciudad_quantum.glb', (gltf) => {
            scene.add(gltf.scene);
            
            // Animación de los AUTOS (si vienen en el GLB de la ciudad)
            if(gltf.animations && gltf.animations.length) {
                let mCity = new THREE.AnimationMixer(gltf.scene);
                gltf.animations.forEach(clip => {
                    mCity.clipAction(clip).play();
                });
                mixers.push(mCity);
            }

            // CARGAR AVATAR LUIS
            loader.load('luis_avatar.glb', (av) => {
                luis = av.scene;
                scene.add(luis);
                
                // Ajuste inicial de Luis
                luis.scale.set(1.5, 1.5, 1.5); 
                luis.position.set(0, 0, 0);

                if(av.animations.length) {
                    let mLuis = new THREE.AnimationMixer(luis);
                    mLuis.clipAction(av.animations[0]).play();
                    mixers.push(mLuis);
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('st').innerText = "CONECTADO";
                resetLuis();
            });
        }, (xhr) => {
            let prg = (xhr.loaded / xhr.total * 100);
            document.getElementById('bar').style.width = prg + '%';
        });

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Movimiento de cámara suave

        setupEvents();
    }

    function setupEvents() {
        const btns = { 'btn-w': 'w', 'btn-a': 'a', 'btn-s': 's', 'btn-d': 'd' };
        Object.keys(btns).forEach(id => {
            const el = document.getElementById(id);
            const dir = btns[id];
            
            // Mouse
            el.addEventListener('mousedown', () => moveDir = dir);
            el.addEventListener('mouseup', () => moveDir = null);
            // Touch
            el.addEventListener('touchstart', (e) => { e.preventDefault(); moveDir = dir; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); moveDir = null; });
        });
    }

    function resetLuis() {
        if(!luis) return;
        luis.position.set(0, 0, 0);
        camera.position.set(0, 8, -15);
        controls.target.copy(luis.position);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        
        // Actualiza animaciones (Autos y Luis)
        mixers.forEach(m => m.update(delta));

        if(luis && moveDir) {
            const speed = 0.3; // Velocidad de movimiento
            const rotSpeed = 0.05; // Velocidad de giro

            if(moveDir === 'w') luis.translateZ(speed);
            if(moveDir === 's') luis.translateZ(-speed);
            if(moveDir === 'a') luis.rotation.y += rotSpeed;
            if(moveDir === 'd') luis.rotation.y -= rotSpeed;

            // Seguimiento de cámara suave
            controls.target.lerp(luis.position, 0.1);
        }
        
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
    animate();
</script>
</body>
</html>
