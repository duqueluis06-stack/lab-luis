<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GTA STABLE CITY</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;touch-action:none;}
body{overflow:hidden;background:#000;font-family:monospace;}

#debug{
position:absolute;top:10px;left:10px;
color:#0f0;background:rgba(0,0,0,0.6);
padding:6px;font-size:12px;z-index:10;
}

#exit{
position:fixed;top:10px;right:10px;
z-index:20;padding:10px 14px;
border:1px solid #f55;color:#f55;
background:rgba(0,0,0,0.4);
}

#loader{
position:fixed;inset:0;
display:flex;align-items:center;justify-content:center;
background:#000;color:#0ff;z-index:9999;
}

/* PAD */
.pad{
position:fixed;bottom:20px;left:20px;
display:grid;
grid-template-columns:60px 60px 60px;
grid-template-rows:60px 60px 60px;
gap:5px;z-index:50;
}

.pad button{
background:#000;border:2px solid #0ff;
color:#0ff;border-radius:10px;
}
.pad button:active{background:#0ff;color:#000;}
</style>
</head>

<body>

<div id="loader">CARGANDO GTA SYSTEM...</div>
<div id="debug">INIT</div>
<button id="exit" onclick="location.href='index.html'">SALIR</button>

<div class="pad">
<div></div>
<button ontouchstart="move(0,1)" ontouchend="move(0,0)">▲</button>
<div></div>

<button ontouchstart="move(-1,0)" ontouchend="move(0,0)">◀</button>
<div></div>
<button ontouchstart="move(1,0)" ontouchend="move(0,0)">▶</button>

<div></div>
<button ontouchstart="move(0,-1)" ontouchend="move(0,0)">▼</button>
<div></div>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene,camera,renderer;
let avatar,city;
let clock=new THREE.Clock();

let vx=0,vz=0;
let speed=0.06;

/* ===================== */
function log(t){
document.getElementById("debug").innerText=t;
}

/* ===================== */
function move(x,z){
vx=x;
vz=z;
}

/* ===================== */
init();
animate();

/* ===================== */
function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x000010);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,2));

const loader=new THREE.GLTFLoader();

/* =========================
   🌆 CIUDAD SEGURA
========================= */
loader.load("ciudad_quantum.glb",(g)=>{

city=g.scene;
scene.add(city);

/* 🔥 CENTRADO AUTOMÁTICO */
const box=new THREE.Box3().setFromObject(city);
const center=box.getCenter(new THREE.Vector3());
city.position.sub(center);

log("CIUDAD OK");

});

/* =========================
   🧍 AVATAR
========================= */
loader.load("luis-avatar2.glb",(a)=>{

avatar=a.scene;
avatar.scale.set(1,1,1);
avatar.position.set(0,0,0);
scene.add(avatar);

log("AVATAR OK");

document.getElementById("loader").style.display="none";

});

}

/* ===================== */
function animate(){

requestAnimationFrame(animate);

let dt=clock.getDelta();

/* MOVIMIENTO */
if(avatar && (vx||vz)){
avatar.position.x += vx*speed;
avatar.position.z += vz*speed;

/* rotación natural */
avatar.rotation.y=Math.atan2(vx,vz);
}

/* CAMERA GTA STYLE */
if(avatar){

const target=new THREE.Vector3(
avatar.position.x,
avatar.position.y+2,
avatar.position.z+5
);

camera.position.lerp(target,0.08);
camera.lookAt(avatar.position);

}

renderer.render(scene,camera);

}

</script>

</body>
</html>
