<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Reality - Final Build</title>
    <style>
        :root { --neon-cyan: #00f6ff; --neon-magenta: #ff00ff; --matrix-green: #00ff41; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        /* Mensaje que desaparece */
        #manifesto-zone {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            z-index: 90; width: 80%; max-width: 400px;
            background: rgba(0, 0, 0, 0.8); border: 1px solid var(--matrix-green);
            padding: 15px; border-radius: 5px; opacity: 1;
            transition: opacity 1.5s ease-in-out; pointer-events: none;
        }
        #typing-text { color: var(--matrix-green); text-shadow: 0 0 8px var(--matrix-green); font-size: 14px; margin: 0; line-height: 1.4; }

        /* UI HUD */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .neon-btn {
            pointer-events: auto; background: rgba(0,0,0,0.8); border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 12px 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px var(--neon-cyan); text-transform: uppercase; transition: 0.3s;
            text-decoration: none; font-size: 12px;
        }
        #btn-exit { border-color: var(--neon-magenta); color: var(--neon-magenta); box-shadow: 0 0 15px var(--neon-magenta); align-self: flex-end; }

        #controls { display: flex; justify-content: space-between; align-items: flex-end; }
        #joy-base { width: 130px; height: 130px; border-radius: 50%; border: 1px dashed var(--neon-cyan); position: relative; display: flex; align-items: center; justify-content: center; }
        #joy-knob { width: 55px; height: 55px; background: var(--neon-cyan); border-radius: 50%; position: absolute; box-shadow: 0 0 20px var(--neon-cyan); }
        #zoom-btn { width: 85px; height: 85px; border-radius: 50%; border-color: #fff; color: #fff; }
        #zoom-btn.active { background: #fff; color: #000; box-shadow: 0 0 30px #fff; }

        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: var(--neon-cyan); }
    </style>
</head>
<body>

<div id="loader"><h2>SINCRONIZANDO NEURAL LINK...</h2></div>

<div id="manifesto-zone">
    <p id="typing-text"></p>
</div>

<div id="ui">
    <a href="index.html" id="btn-exit" class="neon-btn">DESCONECTAR</a>
    
    <div id="controls">
        <div id="joy-base"><div id="joy-knob" class="neon-btn"></div></div>
        <button id="zoom-btn" class="neon-btn">ZOOM<br>FACIAL</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://www.gstatic.com/draco/versioned/decoders/1.4.1/draco_decoder.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
class QuantumFinalEngine {
    constructor() {
        this.init();
        this.lights();
        this.loadAssets();
        this.setupControls();
        this.animate();
    }

    init() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000002);
        
        // Cámara corregida para evitar el efecto "nublado" inicial
        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.05, 1000);
        this.camera.position.set(0, 1.2, 4.5); // Posición inicial de seguridad

        this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure = 1.2;
        
        document.body.appendChild(this.renderer.domElement);
        this.clock = new THREE.Clock();
    }

    lights() {
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(5, 10, 7);
        this.scene.add(sun);
        
        this.faceLight = new THREE.PointLight(0xffffff, 0, 3);
        this.faceLight.position.set(0, 1.6, 1);
        this.scene.add(this.faceLight);
    }

    loadAssets() {
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);

        // Ciudad Draco
        loader.load('ciudad_quantum.glb', (glb) => {
            this.city = glb.scene;
            this.city.position.set(0, -0.5, -8); // Alejar ciudad para que no estorbe al avatar
            this.scene.add(this.city);
        });

        // Avatar 4K
        loader.load('luis-avatar2.glb', (glb) => {
            this.avatar = glb.scene;
            this.scene.add(this.avatar);
            
            // Iniciar Animación (Caminar o Idle)
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(glb.animations.length > 0) {
                // Si tiene varias animaciones, la 0 suele ser idle y la 1 caminar
                const action = this.mixer.clipAction(glb.animations[0]);
                action.play();
            }

            document.getElementById('loader').style.display = 'none';
            this.startTyping();
        });
    }

    startTyping() {
        const txt = "Ya estoy adentro. Estoy observando cómo pasa el mundo digital... son las primeras pruebas de una nueva realidad.";
        const el = document.getElementById('typing-text');
        const zone = document.getElementById('manifesto-zone');
        let i = 0;

        const type = () => {
            if (i < txt.length) {
                el.innerHTML += txt.charAt(i);
                i++;
                setTimeout(type, 35);
            } else {
                // Desaparecer después de 2 segundos de terminar
                setTimeout(() => { zone.style.opacity = '0'; }, 2000);
            }
        };
        type();
    }

    setupControls() {
        this.rotY = 0; this.isZoom = false; this.active = false;
        const knob = document.getElementById('joy-knob');
        const joy = document.getElementById('joy-base');

        const move = (e) => {
            if(!this.active) return;
            const t = e.touches ? e.touches[0] : e;
            const r = joy.getBoundingClientRect();
            const dx = t.clientX - (r.left + r.width/2);
            const dist = Math.min(Math.abs(dx), 55);
            knob.style.transform = `translateX(${Math.sign(dx)*dist}px)`;
            this.rotY = Math.sign(dx) * (dist/55) * 0.05;
        };

        joy.ontouchstart = () => this.active = true;
        window.ontouchmove = move;
        window.ontouchend = () => { this.active = false; knob.style.transform = 'translateX(0)'; this.rotY = 0; };

        const zBtn = document.getElementById('zoom-btn');
        zBtn.ontouchstart = (e) => { e.preventDefault(); this.isZoom = true; zBtn.classList.add('active'); };
        zBtn.ontouchend = () => { this.isZoom = false; zBtn.classList.remove('active'); };
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const delta = this.clock.getDelta();
        if(this.mixer) this.mixer.update(delta);

        if(this.avatar) {
            this.avatar.rotation.y += this.rotY;
            
            // Cámara Inteligente: Cuerpo completo vs Rostro
            const targetPos = this.isZoom ? new THREE.Vector3(0, 1.6, 0.7) : new THREE.Vector3(0, 1.1, 4.0);
            const targetLook = this.isZoom ? new THREE.Vector3(0, 1.6, 0) : new THREE.Vector3(0, 1.0, 0);
            
            this.camera.position.lerp(targetPos, 0.1);
            this.camera.lookAt(targetLook);
            this.faceLight.intensity = this.isZoom ? 1.5 : 0;
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new QuantumFinalEngine();
</script>
</body>
</html>
