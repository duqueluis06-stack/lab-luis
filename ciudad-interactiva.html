<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUIS QUANTUM - REBORN</title>
    <style>
        :root { --neon: #00ffff; --rgb: #ff00ff; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* HEADER CON BORDE ANIMADO RGB */
        header {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; 
            align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 100;
            border-bottom: 3px solid; border-image: linear-gradient(90deg, red, yellow, lime, cyan, blue, magenta, red) 1;
            animation: chroma 5s linear infinite;
        }
        @keyframes chroma { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

        /* JOYSTICK VISUAL */
        .controls { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: repeat(3, 60px); gap: 5px; z-index: 100; }
        .btn { width: 60px; height: 60px; background: rgba(0,255,255,0.1); border: 2px solid var(--neon); color: var(--neon); font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; border-radius: 10px; }
        .btn:active { background: var(--neon); color: #000; }

        /* BOTÓN DE LOCALIZACIÓN (EL SALVADOR) */
        .panic-btn { position: absolute; bottom: 20px; right: 20px; padding: 20px; background: var(--rgb); color: #fff; border: none; font-weight: bold; border-radius: 50%; cursor: pointer; box-shadow: 0 0 20px var(--rgb); z-index: 100; }

        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon); }
    </style>
</head>
<body>

<div id="loader">
    <h2 id="load-msg">SINCRO DE SISTEMA...</h2>
    <div style="width: 200px; height: 5px; background: #222;"><div id="bar" style="width: 0%; height: 100%; background: var(--neon);"></div></div>
</div>

<header>
    <div style="color: #fff; font-size: 12px;">STATUS: <span id="st">CARGANDO</span></div>
    <a href="index.html" style="color: #fff; text-decoration: none; border: 1px solid #fff; padding: 5px 10px; border-radius: 4px;">🏠 INICIO</a>
</header>

<div class="controls">
    <div></div><div class="btn" onmousedown="startMove('w')" onmouseup="stopMove()">↑</div><div></div>
    <div class="btn" onmousedown="startMove('a')" onmouseup="stopMove()">←</div>
    <div class="btn" onmousedown="startMove('s')" onmouseup="stopMove()">↓</div>
    <div class="btn" onmousedown="startMove('d')" onmouseup="stopMove()">→</div>
</div>

<button class="panic-btn" onclick="resetLuis()">🎯 LUIS</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, luis, controls;
    let mixers = []; // AQUÍ SE GUARDAN TODAS LAS ANIMACIONES
    let moveDir = null;
    const clock = new THREE.Clock();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 3000);
        camera.position.set(0, 10, 20);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const pL = new THREE.PointLight(0x00ffff, 2);
        pL.position.set(10, 10, 10);
        scene.add(pL);

        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
        const loader = new THREE.GLTFLoader();
        loader.setDRACOLoader(draco);

        // CARGAR CIUDAD
        loader.load('ciudad_quantum.glb', (gltf) => {
            scene.add(gltf.scene);
            // ACTIVAR AUTOS Y LUCES DE CIUDAD
            if(gltf.animations.length) {
                let mCity = new THREE.AnimationMixer(gltf.scene);
                gltf.animations.forEach(clip => mCity.clipAction(clip).play());
                mixers.push(mCity);
            }

            // CARGAR AVATAR
            loader.load('luis_avatar.glb', (av) => {
                luis = av.scene;
                resetLuis(); // Ponlo en su sitio
                scene.add(luis);
                
                if(av.animations.length) {
                    let mLuis = new THREE.AnimationMixer(luis);
                    mLuis.clipAction(av.animations[0]).play();
                    mixers.push(mLuis);
                }
                document.getElementById('loader').style.display = 'none';
                document.getElementById('st').innerText = "ONLINE";
            });
        }, (xhr) => {
            document.getElementById('bar').style.width = (xhr.loaded / xhr.total * 100) + '%';
        });

        controls = new THREE.OrbitControls(camera, renderer.domElement);
    }

    function resetLuis() {
        if(!luis) return;
        luis.scale.set(0.015, 0.015, 0.015); // Tamaño humano
        luis.position.set(5, 0, 5); // Fuera de los edificios
        camera.position.set(5, 5, 15);
        controls.target.set(5, 0, 5);
    }

    function startMove(d) { moveDir = d; }
    function stopMove() { moveDir = null; }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        
        // ESTO DESPIERTA TODO (Autos y Luis)
        mixers.forEach(m => m.update(delta));

        if(luis && moveDir) {
            const speed = 0.2;
            if(moveDir === 'w') luis.translateZ(speed);
            if(moveDir === 's') luis.translateZ(-speed);
            if(moveDir === 'a') luis.rotation.y += 0.05;
            if(moveDir === 'd') luis.rotation.y -= 0.05;
            // La cámara sigue a Luis
            controls.target.copy(luis.position);
        }
        
        controls.update();
        renderer.render(scene, camera);
    }

    init();
    animate();
</script>
</body>
</html>
