<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SISTEMA DE RECUPERACIÓN QUANTUM</title>

<style>

/* =========================
   🌐 RESET MÓVIL TOTAL
========================= */
*{
    margin:0;
    padding:0;
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
    touch-action:none;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:monospace;
}

/* =========================
   📊 DEBUG PANEL
========================= */
#debug{
    position:absolute;
    top:10px;
    left:10px;
    padding:8px;
    font-size:12px;
    color:#0f0;
    background:rgba(0,0,0,0.7);
    z-index:10;
}

/* =========================
   ⏳ LOADER
========================= */
#loader{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    color:#0ff;
    z-index:9999;
    font-size:16px;
}

/* =========================
   🎮 JOYSTICK IZQUIERDO
========================= */
.controls-left{
    position:fixed;
    bottom:20px;
    left:20px;
    display:grid;
    grid-template-columns:65px 65px 65px;
    grid-template-rows:65px 65px 65px;
    gap:6px;
    z-index:999;
}

/* =========================
   🎮 ACCIONES DERECHA
========================= */
.controls-right{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:999;
}

/* =========================
   🔘 BOTONES NEÓN
========================= */
button{
    width:65px;
    height:65px;
    border-radius:14px;
    background:rgba(0,0,0,0.6);
    border:2px solid #0ff;
    color:#0ff;
    font-size:11px;
    box-shadow:0 0 12px #0ff;
    transition:0.1s;
    touch-action:manipulation;
}

button:active{
    background:#0ff;
    color:#000;
    transform:scale(0.95);
}

/* =========================
   🚪 BOTÓN SALIDA
========================= */
.exit-btn{
    position:fixed;
    top:10px;
    right:10px;
    z-index:9999;
    width:80px;
    height:40px;
    font-size:12px;
    border:2px solid red;
    color:red;
    box-shadow:0 0 10px red;
}

</style>
</head>

<body>

<div id="loader">CARGANDO SISTEMA QUANTUM...</div>
<div id="debug">INIT...</div>

<button class="exit-btn" onclick="exitSystem()">🚪 SALIR</button>

<!-- =========================
     🎮 JOYSTICK
========================= -->
<div class="controls-left">

    <div></div>
    <button ontouchstart="move('forward',true)" ontouchend="move('forward',false)">▲</button>
    <div></div>

    <button ontouchstart="move('left',true)" ontouchend="move('left',false)">◀</button>
    <div></div>
    <button ontouchstart="move('right',true)" ontouchend="move('right',false)">▶</button>

    <div></div>
    <button ontouchstart="move('back',true)" ontouchend="move('back',false)">▼</button>
    <div></div>

</div>

<!-- =========================
     🎮 ACCIONES
========================= -->
<div class="controls-right">
    <button onclick="action('walk')">🚶</button>
    <button onclick="action('run')">🏃</button>
    <button onclick="action('jump')">🟡</button>
    <button onclick="action('climb')">🧗</button>
    <button onclick="action('crouch')">🪑</button>
</div>

<!-- =========================
     LIBS THREE.JS
========================= -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

/* =========================
   🌌 ENGINE CORE
========================= */

let scene, camera, renderer;
let luis, mixer, cityMixer;
let clock = new THREE.Clock();
let controls;

let dir = {x:0, z:0};
let speed = 0.06;
let state = "idle";

/* =========================
   📊 DEBUG
========================= */
function log(t){
    document.getElementById("debug").innerText = t;
}

/* =========================
   🚪 SALIR
========================= */
function exitSystem(){
    window.location.href = "index.html";
}

/* =========================
   🎮 MOVIMIENTO
========================= */
function move(type, active){

    if(type==="forward") dir.z = active ? -1 : 0;
    if(type==="back") dir.z = active ? 1 : 0;
    if(type==="left") dir.x = active ? -1 : 0;
    if(type==="right") dir.x = active ? 1 : 0;

    state = active ? "walk" : "idle";
}

/* =========================
   🎮 ACCIONES
========================= */
function action(type){

    log("ACTION: " + type);

    if(type==="run") speed = 0.12;
    if(type==="walk") speed = 0.06;
    if(type==="jump") state = "jump";
    if(type==="crouch") state = "crouch";
    if(type==="climb") state = "climb";
}

/* =========================
   🚀 INIT ENGINE
========================= */
function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000010);

    camera = new THREE.PerspectiveCamera(
        75,
        innerWidth/innerHeight,
        0.1,
        1000
    );

    camera.position.set(0,3,6);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 2));

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const draco = new THREE.DRACOLoader();
    draco.setDecoderPath("https://www.gstatic.com/draco/v1/decoders/");

    const loader = new THREE.GLTFLoader();
    loader.setDRACOLoader(draco);

    log("Cargando ciudad...");

    /* =========================
       🌆 CIUDAD
    ========================= */
    loader.load("ciudad_quantum.glb", (gltf)=>{

        scene.add(gltf.scene);

        if(gltf.animations.length){
            cityMixer = new THREE.AnimationMixer(gltf.scene);
            gltf.animations.forEach(c=>cityMixer.clipAction(c).play());
        }

        log("Ciudad OK → cargando avatar");

        /* =========================
           👤 AVATAR
        ========================= */
        loader.load("luis_avatar.glb", (av)=>{

            luis = av.scene;

            // 👤 ESCALA HUMANA REAL
            luis.scale.set(1.0,1.0,1.0);
            luis.position.set(0,1,0);

            scene.add(luis);

            mixer = new THREE.AnimationMixer(luis);

            if(av.animations && av.animations.length){

                av.animations.forEach((clip)=>{
                    mixer.clipAction(clip).play();
                });

            }

            document.getElementById("loader").style.display="none";
            log("SISTEMA ONLINE");

        });

    });

}

/* =========================
   🎬 LOOP PRINCIPAL
========================= */
function animate(){

    requestAnimationFrame(animate);

    let delta = clock.getDelta();

    if(mixer) mixer.update(delta);
    if(cityMixer) cityMixer.update(delta);

    if(luis){

        let moving = dir.x !== 0 || dir.z !== 0;

        if(moving){
            luis.position.x += dir.x * speed;
            luis.position.z += dir.z * speed;
        }

        /* =========================
           🎯 CAM FOLLOW SUAVE
        ========================= */
        camera.position.lerp(
            new THREE.Vector3(
                luis.position.x,
                luis.position.y + 3,
                luis.position.z + 6
            ),
            0.05
        );

        camera.lookAt(luis.position);
    }

    if(controls) controls.update();

    renderer.render(scene, camera);
}

/* =========================
   🚀 START
========================= */
init();
animate();

</script>

</body>
</html>
