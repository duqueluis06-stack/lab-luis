<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUIS QUANTUM CONTROL</title>
    <style>
        :root { --cyan: #00ffff; --mag: #ff00ff; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* INTERFAZ DE COMANDO */
        #gui { position: absolute; top: 0; width: 100%; z-index: 100; pointer-events: none; }
        .header { background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--cyan); padding: 10px 20px; display: flex; justify-content: space-between; pointer-events: auto; }
        
        /* BOTONES DE MOVIMIENTO (JOYSTICK) */
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; z-index: 100; }
        .btn { width: 70px; height: 70px; background: rgba(0,255,255,0.1); border: 2px solid var(--cyan); color: var(--cyan); border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 20px; display: flex; align-items: center; justify-content: center; user-select: none; }
        .btn:active { background: var(--cyan); color: #000; }
        .btn-panic { position: absolute; bottom: 30px; right: 20px; width: 120px; height: 50px; background: #f00; border: none; color: #fff; font-weight: bold; border-radius: 5px; cursor: pointer; z-index: 100; box-shadow: 0 0 20px #f00; }

        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--cyan); }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h2 id="msg">CARGANDO PROTOCOLO 3D...</h2>
        <div style="width: 200px; height: 2px; background: #222;"><div id="bar" style="width: 0%; height: 100%; background: var(--cyan);"></div></div>
    </div>

    <div id="gui">
        <div class="header">
            <div style="color: #fff;">● LUIS_AVATAR: <span id="status">Buscando...</span></div>
            <a href="index.html" style="color: var(--cyan); text-decoration: none; border: 1px solid var(--cyan); padding: 5px 10px;">SALIR</a>
        </div>
    </div>

    <div class="controls">
        <div></div><div class="btn" onmousedown="move('w')" onmouseup="stop()">↑</div><div></div>
        <div class="btn" onmousedown="move('a')" onmouseup="stop()">←</div>
        <div class="btn" onmousedown="move('s')" onmouseup="stop()">↓</div>
        <div class="btn" onmousedown="move('d')" onmouseup="stop()">→</div>
    </div>

    <button class="btn-panic" onclick="panic()">🎯 LOCALIZAR</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, luis, mixer, city;
        const clock = new THREE.Clock();
        let moving = null;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
            camera.position.set(0, 15, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // ILUMINACIÓN BRUTAL
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            const draco = new THREE.DRACOLoader();
            draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
            const loader = new THREE.GLTFLoader();
            loader.setDRACOLoader(draco);

            // CARGAR CIUDAD
            loader.load('ciudad_quantum.glb', (gltf) => {
                city = gltf.scene;
                scene.add(city);
                
                // CARGAR LUIS
                loader.load('luis_avatar.glb', (av) => {
                    luis = av.scene;
                    panic(); // Ajusta escala y posición al entrar
                    scene.add(luis);
                    
                    mixer = new THREE.AnimationMixer(luis);
                    if(av.animations.length) mixer.clipAction(av.animations[0]).play();
                    
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('status').innerText = "CONECTADO";
                }, undefined, (err) => { document.getElementById('msg').innerText = "ERROR CARGANDO LUIS"; });

            }, (xhr) => {
                document.getElementById('bar').style.width = (xhr.loaded / xhr.total * 100) + '%';
            }, (err) => { document.getElementById('msg').innerText = "ERROR CARGANDO CIUDAD"; });

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
        }

        function move(dir) { moving = dir; }
        function stop() { moving = null; }

        // BOTÓN DE PÁNICO: REPARA TAMAÑO Y POSICIÓN
        function panic() {
            if(!luis) return;
            luis.scale.set(0.01, 0.01, 0.01); // Escala minúscula para que quepa en la calle
            luis.position.set(0, 0, 0);       // Lo trae al centro
            camera.position.set(0, 5, 10);    // Pone la cámara detrás
            document.getElementById('status').innerText = "LOCALIZADO";
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if(mixer) mixer.update(delta);
            
            if(luis && moving) {
                const speed = 0.5;
                if(moving === 'w') luis.translateZ(speed);
                if(moving === 's') luis.translateZ(-speed);
                if(moving === 'a') luis.rotation.y += 0.05;
                if(moving === 'd') luis.rotation.y -= 0.05;
            }
            
            renderer.render(scene, camera);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
