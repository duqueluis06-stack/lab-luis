<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Avatar Showcase Pro</title>
    <style>
        :root { --neon-cyan: #00f6ff; --neon-magenta: #ff00ff; --bg-dark: #010103; }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); font-family: 'Segoe UI', Roboto, sans-serif; color: white; }
        canvas { display: block; }

        /* --- UI HUD ESTILO NEÓN --- */
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 25px; z-index: 100;
        }

        .neon-btn {
            pointer-events: auto; background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--neon-cyan); color: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            text-transform: uppercase; font-weight: bold; letter-spacing: 1.5px;
            cursor: pointer; transition: all 0.2s ease;
            user-select: none; -webkit-user-select: none;
        }
        .neon-btn:active { transform: scale(0.95); box-shadow: 0 0 20px var(--neon-cyan); }

        /* Superior: Salir */
        #top-zone { display: flex; justify-content: flex-end; }
        #btn-exit { padding: 12px 24px; border-color: var(--neon-magenta); color: var(--neon-magenta); box-shadow: 0 0 10px var(--neon-magenta); }

        /* Inferior: Controles */
        #bottom-zone { display: flex; justify-content: space-between; align-items: flex-end; }

        /* D-Pad Rotacional */
        #joy-container {
            width: 150px; height: 150px; border-radius: 50%;
            background: rgba(0, 246, 255, 0.03); border: 2px dashed rgba(0, 246, 255, 0.3);
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        #joy-knob {
            width: 60px; height: 60px; background: var(--neon-cyan);
            border-radius: 50%; box-shadow: 0 0 25px var(--neon-cyan);
            position: absolute; pointer-events: auto; outline: none; border: none;
        }

        /* Botones Acción */
        #action-zone { display: flex; gap: 15px; }
        .btn-action { width: 80px; height: 80px; border-radius: 50%; font-size: 12px; text-align: center; }
        #btn-zoom { border-color: #fff; color: #fff; box-shadow: 0 0 10px #fff; }
        #btn-zoom.active { background: #fff; color: #000; box-shadow: 0 0 25px #fff; }

        /* PANTALLA DE CARGA */
        #loader {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--neon-cyan); text-align: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(0, 246, 255, 0.1);
            border-top-color: var(--neon-cyan); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div style="text-transform: uppercase; letter-spacing: 3px; font-weight: bold;">Renderizando Quantum System</div>
    <div id="load-status" style="font-size: 12px; margin-top: 10px; opacity: 0.7;">Inicializando...</div>
</div>

<div id="ui-layer">
    <div id="top-zone">
        <button id="btn-exit" class="neon-btn" onclick="window.location.href='index.html'">Salir</button>
    </div>

    <div id="bottom-zone">
        <div id="joy-container">
            <div id="joy-knob" class="neon-btn"></div>
        </div>

        <div id="action-zone">
            <button id="btn-zoom" class="neon-btn btn-action">Zoom<br>Rostro</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
/**
 * QUANTUM AVATAR SHOWCASE ENGINE PRO
 */
class AvatarShowcase {
    constructor() {
        this.clock = new THREE.Clock();
        
        // --- CONFIGURACIÓN DE CÁMARA (Cuerpo Completo -> Rostro) ---
        // Asumimos que la cara del avatar está aprox. a y=1.65m y los pies a y=0m
        this.config = {
            cameraData: {
                // Default: Cuerpo completo (Más lejos, punto de mira céntrico)
                default: { pos: new THREE.Vector3(0, 1.0, 3.5), look: new THREE.Vector3(0, 0.9, 0) }, 
                // Zoom: Solo rostro (Cerca, punto de mira alto)
                zoom: { pos: new THREE.Vector3(0, 1.66, 0.6), look: new THREE.Vector3(0, 1.66, 0) }      
            },
            lerpSpeed: 0.08,
            rotationSpeed: 0.04
        };
        
        this.state = {
            loaded: false,
            joyActive: false,
            rotationY: 0,
            isZoomed: false,
            currentCameraTarget: JSON.parse(JSON.stringify(this.config.cameraData.default))
        };

        this.initGraphics();
        this.initLights();
        this.loadModels();
        this.setupControls();
        this.animate();
    }

    initGraphics() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x010103);
        
        // Niebla reducida drásticamente para que la ciudad de fondo sea visible
        // FogExp2(color, densidad). 0.02 es muy baja, permitiendo ver el fondo.
        this.scene.fog = new THREE.FogExp2(0x010103, 0.02);

        this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 2000);
        // Iniciamos en la posición de cuerpo completo
        this.camera.position.copy(this.config.cameraData.default.pos);
        
        this.renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        // --- MOTOR FOTORREALISTA ---
        this.renderer.outputEncoding = THREE.sRGBEncoding; // Vital para texturas IA
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping; // Contraste cinematográfico para la piel
        this.renderer.toneMappingExposure = 1.3; // Exposición ligeramente subida para ver detalles
        
        document.body.appendChild(this.renderer.domElement);
    }

    initLights() {
        // 1. Luz ambiental global fuerte para asegurar que todo sea visible (incluida la ciudad)
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // 2. Luz de estudio principal (Key Light) - Apunta a la cara/cuerpo
        this.mainLight = new THREE.DirectionalLight(0xfff0dd, 1.2); // Tono cálido
        this.mainLight.position.set(1, 2, 3);
        this.scene.add(this.mainLight);

        // 3. Luz de contra (Rim Light) Cyan - Separa el avatar del fondo y resalta contornos
        const rimLight = new THREE.SpotLight(0x00f6ff, 1.5, 15, 0.4);
        rimLight.position.set(-3, 4, -2);
        this.scene.add(rimLight);

        // 4. Luz de relleno facial para el Zoom (se activa al presionar el botón)
        this.zoomLight = new THREE.PointLight(0xffffff, 0, 3);
        this.zoomLight.position.set(0, 1.7, 1.0);
        this.scene.add(this.zoomLight);

        // 5. Luz específica para iluminar la ciudad de fondo
        const cityLight = new THREE.DirectionalLight(0x4444ff, 0.5); // Tono azulado nocturno
        cityLight.position.set(-10, 5, -10); // Desde atrás/izquierda
        this.scene.add(cityLight);
    }

    loadModels() {
        const manager = new THREE.LoadingManager();
        const status = document.getElementById('load-status');

        manager.onProgress = (url, loaded, total) => {
            status.innerText = `Cargando Activos GLB: ${Math.round((loaded/total)*100)}%`;
        };

        manager.onLoad = () => {
            this.state.loaded = true;
            document.getElementById('loader').style.display = 'none';
            // Enfocar inicialmente al cuerpo completo
            this.camera.lookAt(this.config.cameraData.default.look);
        };

        const loader = new THREE.GLTFLoader(manager);

        // 1. Cargar Ciudad de Fondo (ciudad_quantum.glb)
        loader.load('ciudad_quantum.glb', (gltf) => {
            this.city = gltf.scene;
            
            // --- AJUSTE DE VISIBILIDAD DE CIUDAD ---
            this.city.scale.set(1, 1, 1); // Escala estándar
            // Posicionada detrás del avatar (z=-10) y sobre el suelo (y=0 o ajustado)
            // Asegúrate de que el suelo de la ciudad esté en y=0 si el avatar está en y=0
            this.city.position.set(0, 0, -10); 
            this.scene.add(this.city);
            
            // Forzar actualización de materiales si se ven oscuros
            this.city.traverse(child => {
                if(child.isMesh) {
                    child.material.depthWrite = true;
                    // child.material.emissive = new THREE.Color(0x111111); // Opcional: auto-iluminación tenue
                }
            });

        }, undefined, (e) => { console.error("Error Ciudad:", e); status.innerText = "Error: ciudad_quantum.glb no encontrada"; });

        // 2. Cargar Avatar (luis-avatar2.glb)
        loader.load('luis-avatar2.glb', (gltf) => {
            this.avatar = gltf.scene;
            this.avatar.position.set(0, 0, 0); // Pies en el origen del mundo
            this.scene.add(this.avatar);
            
            // Habilitar sombras en el avatar para mayor realismo de detalles
            this.avatar.traverse(child => { if(child.isMesh) { child.castShadow = true; child.receiveShadow = true; } });

            // Animación Automática (Idle)
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(gltf.animations.length > 0) {
                // Reproducimos la primera (suele ser respiración/idle si es un avatar fotorrealista)
                this.mixer.clipAction(gltf.animations[0]).play();
            }
        }, undefined, (e) => { console.error("Error Avatar:", e); status.innerText = "Error: luis-avatar2.glb no encontrada"; });
    }

    setupControls() {
        const knob = document.getElementById('joy-knob');
        const container = document.getElementById('joy-container');
        const btnZoom = document.getElementById('btn-zoom');

        // --- D-Pad Analógico Rotacional ---
        const handleJoyMove = (e) => {
            if(!this.state.joyActive) return;
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            
            // Movimiento horizontal (X) controla rotación (Y)
            const dx = touch.clientX - centerX;
            const dist = Math.min(Math.abs(dx), 60);
            const sign = Math.sign(dx);

            // Visual del knob
            knob.style.left = `calc(50% + ${sign * dist}px - 30px)`;
            
            // Aplicar velocidad de rotación
            this.state.rotationY = sign * (dist / 60) * this.config.rotationSpeed;
        };

        container.addEventListener('touchstart', (e) => { this.state.joyActive = true; handleJoyMove(e); });
        window.addEventListener('touchmove', handleJoyMove);
        window.addEventListener('touchend', () => {
            this.state.joyActive = false;
            knob.style.left = 'calc(50% - 30px)'; // Reset visual
            this.state.rotationY = 0; // Detener rotación
        });

        // --- Lógica del Botón ZOOM ---
        const setZoom = (active) => {
            this.state.isZoomed = active;
            if(active) {
                btnZoom.classList.add('active');
                this.state.currentCameraTarget = this.config.cameraData.zoom;
                this.zoomLight.intensity = 1.2; // Encender luz de relleno facial
            } else {
                btnZoom.classList.remove('active');
                this.state.currentCameraTarget = this.config.cameraData.default;
                this.zoomLight.intensity = 0; // Apagar
            }
        };

        btnZoom.addEventListener('touchstart', (e) => { e.preventDefault(); setZoom(true); });
        btnZoom.addEventListener('touchend', () => { setZoom(false); });
        // Soporte ratón
        btnZoom.addEventListener('mousedown', () => { setZoom(true); });
        btnZoom.addEventListener('mouseup', () => { setZoom(false); });

        // Resize
        window.addEventListener('resize', () => {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        if(!this.state.loaded) return;

        const delta = this.clock.getDelta();

        // 1. Actualizar Animación (si existe)
        if(this.mixer) this.mixer.update(delta);

        // 2. Rotar Avatar (Eje Y)
        if (this.avatar && Math.abs(this.state.rotationY) > 0.001) {
            this.avatar.rotation.y += this.state.rotationY;
        }

        // 3. Suavizado de Cámara (Lerp)
        if(this.camera) {
            // Suavizado de posición (Lerp)
            this.camera.position.lerp(this.state.currentCameraTarget.pos, this.config.lerpSpeed);
            
            // Suavizado del punto de mira (lookAt)
            // Para mantener el realismo fotorrealista, el lookAt directo es más estable
            this.camera.lookAt(this.state.currentCameraTarget.look);
        }

        this.renderer.render(this.scene, this.camera);
    }
}

// Iniciar aplicación al cargar la ventana
window.onload = () => { new AvatarShowcase(); };
</script>
</body>
</html>
