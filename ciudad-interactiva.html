<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLEAN ENGINE</title>

<style>
body{margin:0;overflow:hidden;background:#000;}
#ui{position:absolute;top:10px;left:10px;color:#0f0;z-index:10;}
</style>
</head>

<body>

<div id="ui">ENGINE OK</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene,camera,renderer;
let avatar,city;
let vx=0,vz=0;
let speed=0.05;

init();
animate();

function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x000010);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000);
camera.position.set(0,5,10);

renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,2));

const loader=new THREE.GLTFLoader();

/* CITY */
loader.load("ciudad_quantum.glb",(g)=>{

city=g.scene;
scene.add(city);

/* centrado real */
const box=new THREE.Box3().setFromObject(city);
const center=box.getCenter(new THREE.Vector3());
city.position.sub(center);

camera.lookAt(0,0,0);

});

/* AVATAR */
loader.load("luis-avatar2.glb",(a)=>{

avatar=a.scene;
scene.add(avatar);

avatar.position.set(0,0,0);

});

}

/* INPUT SIMULADO SIMPLE */
window.addEventListener("keydown",(e)=>{

if(e.key==="w")vz=1;
if(e.key==="s")vz=-1;
if(e.key==="a")vx=-1;
if(e.key==="d")vx=1;

});

window.addEventListener("keyup",()=>{
vx=0;vz=0;
});

function animate(){

requestAnimationFrame(animate);

if(avatar){

avatar.position.x += vx*speed;
avatar.position.z += vz*speed;

}

if(avatar){
camera.position.lerp(
new THREE.Vector3(
avatar.position.x,
avatar.position.y+5,
avatar.position.z+10
),0.05);

camera.lookAt(avatar.position);
}

renderer.render(scene,camera);

}

</script>

</body>
</html>
