<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Engine r128</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .neon-btn { 
            pointer-events: auto; background: rgba(0,0,0,0.8); border: 2px solid #0ff; 
            color: #0ff; box-shadow: 0 0 15px #0ff; cursor: pointer; font-weight: bold;
        }
        #btn-exit { position: absolute; top: 20px; right: 20px; padding: 10px; border-color: #f0f; color: #f0f; }
        
        /* Joystick */
        #joy-con { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; border: 2px dashed #0ff; border-radius: 50%; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #0ff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px #0ff; }
        
        /* Actions */
        #actions { position: absolute; bottom: 50px; right: 40px; display: flex; gap: 15px; }
        .btn-act { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Loader */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #0ff; display: flex; align-items: center; justify-content: center; z-index: 100; text-align: center; }
    </style>
</head>
<body>

<div id="loader">
    <div>
        <h1 style="text-shadow: 0 0 10px #0ff;">CONECTANDO A CIUDAD_QUANTUM...</h1>
        <p id="status">Verificando archivos GLB...</p>
    </div>
</div>

<div id="ui">
    <button id="btn-exit" class="neon-btn" onclick="window.location.href='index.html'">SALIR</button>
    <div id="joy-con"><div id="joy-stick"></div></div>
    <div id="actions">
        <div id="w-btn" class="neon-btn btn-act" style="opacity:0.5">WALK</div>
        <div id="r-btn" class="neon-btn btn-act">RUN</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
    let scene, camera, renderer, clock, mixer, avatar, city;
    let move = { x: 0, z: 0, active: false, run: true };
    const status = document.getElementById('status');

    function init() {
        scene = new THREE.Scene();
        clock = new THREE.Clock();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5)); // Luz ambiente extra fuerte

        const loader = new THREE.GLTFLoader();

        // Cargar Ciudad
        loader.load('ciudad_quantum.glb', (gltf) => {
            city = gltf.scene;
            scene.add(city);
            status.innerText = "Ciudad detectada. Cargando Avatar...";
            checkReady();
        }, undefined, (e) => {
            status.innerHTML = "<span style='color:red'>ERROR: No se encontró ciudad_quantum.glb</span><br>Asegúrate de que el nombre sea exacto.";
        });

        // Cargar Avatar
        loader.load('luis-avatar2.glb', (gltf) => {
            avatar = gltf.scene;
            scene.add(avatar);
            mixer = new THREE.AnimationMixer(avatar);
            if(gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();
            status.innerText = "Avatar detectado. Iniciando...";
            checkReady();
        }, undefined, (e) => {
            status.innerHTML = "<span style='color:red'>ERROR: No se encontró luis-avatar2.glb</span>";
        });

        setupControls();
        animate();
    }

    function checkReady() {
        if(city && avatar) {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function setupControls() {
        const joy = document.getElementById('joy-con');
        const stick = document.getElementById('joy-stick');
        
        const onMove = (e) => {
            if(!move.active) return;
            const t = e.touches[0];
            const r = joy.getBoundingClientRect();
            const dx = t.clientX - (r.left + 60);
            const dy = t.clientY - (r.top + 60);
            const d = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const a = Math.atan2(dy, dx);

            stick.style.left = `calc(50% + ${Math.cos(a)*d}px)`;
            stick.style.top = `calc(50% + ${Math.sin(a)*d}px)`;
            
            move.x = Math.cos(a) * (d/50);
            move.z = Math.sin(a) * (d/50);
        };

        joy.addEventListener('touchstart', (e) => { move.active = true; onMove(e); });
        window.addEventListener('touchmove', onMove);
        window.addEventListener('touchend', () => {
            move.active = false;
            stick.style.left = '50%'; stick.style.top = '50%';
            move.x = 0; move.z = 0;
        });

        document.getElementById('w-btn').ontouchstart = () => { move.run = false; updateBtn(); };
        document.getElementById('r-btn').ontouchstart = () => { move.run = true; updateBtn(); };
    }

    function updateBtn() {
        document.getElementById('w-btn').style.opacity = move.run ? "0.5" : "1";
        document.getElementById('r-btn').style.opacity = move.run ? "1" : "0.5";
    }

    function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta();

        if (avatar && (Math.abs(move.x) > 0.01 || Math.abs(move.z) > 0.01)) {
            const s = move.run ? 0.3 : 0.1;
            avatar.position.x += move.x * s;
            avatar.position.z += move.z * s;
            avatar.rotation.y = Math.atan2(-move.x, -move.z);
            if(mixer) mixer.update(dt);
        }

        if (avatar) {
            const camPos = new THREE.Vector3(0, 5, 8).applyQuaternion(avatar.quaternion).add(avatar.position);
            camera.position.lerp(camPos, 0.1);
            camera.lookAt(avatar.position.x, avatar.position.y + 2, avatar.position.z);
        }

        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
