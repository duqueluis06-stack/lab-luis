<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SISTEMA QUANTUM - AVATAR HUMANO</title>

<style>
*{
    margin:0;
    padding:0;
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:monospace;
}

#debug{
    position:absolute;
    top:10px;
    left:10px;
    color:#0f0;
    background:rgba(0,0,0,0.6);
    padding:6px;
    font-size:12px;
    z-index:10;
}

#loader{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    color:#0ff;
    z-index:9999;
}

#exit{
    position:fixed;
    top:10px;
    right:10px;
    z-index:9999;
    padding:10px;
    border:2px solid red;
    color:red;
    background:transparent;
}

</style>
</head>

<body>

<div id="loader">CARGANDO AVATAR HUMANO...</div>
<div id="debug">INIT</div>

<button id="exit" onclick="location.href='index.html'">SALIR</button>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

<script>

/* =========================
   ENGINE
========================= */

let scene, camera, renderer;
let avatar, mixer;
let walkAction, idleAction;
let activeAction;

let clock = new THREE.Clock();

let vx = 0, vz = 0;
let speed = 0.06;

/* =========================
   INIT
========================= */

function init(){

scene = new THREE.Scene();
scene.background = new THREE.Color(0x000010);

camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,3,6);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 2));

const loader = new THREE.GLTFLoader();

/* =========================
   🌆 CIUDAD
========================= */
loader.load("ciudad_quantum.glb",(gltf)=>{

scene.add(gltf.scene);

/* =========================
   🧍‍♂️ AVATAR MIXAMO
========================= */
loader.load("mixamo_character.glb",(av)=>{

avatar = av.scene;

avatar.scale.set(1,1,1);
avatar.position.set(0,1,0);

scene.add(avatar);

/* =========================
   🎬 MIXER HUMANO REAL
========================= */
mixer = new THREE.AnimationMixer(avatar);

/* ✔ IDLE */
idleAction = mixer.clipAction(
    av.animations.find(a => a.name.toLowerCase().includes("idle")) || av.animations[0]
);

/* ✔ WALK */
walkAction = mixer.clipAction(
    av.animations.find(a => a.name.toLowerCase().includes("walk")) || av.animations[0]
);

idleAction.play();
activeAction = idleAction;

document.getElementById("loader").style.display="none";

});

});

}

/* =========================
   MOVIMIENTO
========================= */

function move(x,z){
    vx = x;
    vz = z;
}

/* =========================
   SWITCH ANIMACIONES
========================= */

function updateAnimation(){

let moving = (vx !== 0 || vz !== 0);

if(!mixer) return;

if(moving){

    if(activeAction !== walkAction){
        idleAction.fadeOut(0.2);
        walkAction.reset().fadeIn(0.2).play();
        activeAction = walkAction;
    }

}else{

    if(activeAction !== idleAction){
        walkAction.fadeOut(0.2);
        idleAction.reset().fadeIn(0.2).play();
        activeAction = idleAction;
    }

}

}

/* =========================
   LOOP
========================= */

function animate(){

requestAnimationFrame(animate);

let delta = clock.getDelta();

if(mixer) mixer.update(delta);

if(avatar){

    let moving = (vx !== 0 || vz !== 0);

    if(moving){

        avatar.position.x += vx * speed;
        avatar.position.z += vz * speed;

    }

    updateAnimation();

    camera.position.lerp(
        new THREE.Vector3(
            avatar.position.x,
            avatar.position.y + 3,
            avatar.position.z + 6
        ),
        0.08
    );

    camera.lookAt(avatar.position);
}

renderer.render(scene,camera);

}

/* =========================
   START
========================= */

init();
animate();

</script>

</body>
</html>
