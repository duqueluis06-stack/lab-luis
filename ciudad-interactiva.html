<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUIS QUANTUM - FINAL DUAL</title>
    <style>
        :root {
            --m-green: #00ff41;
            --n-cyan: #00f6ff;
            --n-pink: #ff00ff;
            --glass: rgba(0, 15, 0, 0.85);
        }

        /* SEGURIDAD: NO COPIAR / NO HACKEAR */
        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }

        /* EFECTO MATRIX FONDO */
        #matrix-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.15; pointer-events: none;
        }

        /* TEXTO SUPERIOR - NO TAPA AL AVATAR */
        #ui-header {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 650px; z-index: 1000; pointer-events: none;
        }

        #msg-box {
            background: var(--glass);
            border: 1px solid var(--m-green);
            padding: 15px; border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
            transition: opacity 1s; opacity: 1;
        }

        #text-render {
            color: #fff; font-size: 18px; text-align: center; line-height: 1.4;
            text-shadow: 0 0 8px var(--m-green), 2px 2px #000; margin: 0;
        }

        #exit-btn {
            position: absolute; top: 20px; right: 20px; z-index: 1100;
            padding: 10px 18px; border: 2px solid var(--n-pink);
            background: rgba(0,0,0,0.8); color: var(--n-pink);
            font-size: 11px; font-weight: bold; text-decoration: none;
            border-radius: 4px; box-shadow: 0 0 10px var(--n-pink);
        }

        /* CONTROLES TÁCTILES ABAJO */
        #ui-controls {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; pointer-events: none;
        }

        .joystick {
            width: 100px; height: 100px; border: 2px solid var(--m-green);
            border-radius: 50%; background: rgba(0, 255, 65, 0.1);
            position: relative; pointer-events: auto; touch-action: none;
        }

        .knob {
            width: 40px; height: 40px; background: #fff; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #fff;
        }

        #zoom-btn {
            width: 70px; height: 70px; border: 2px solid var(--n-cyan);
            background: #000; color: var(--n-cyan); border-radius: 50%;
            font-size: 10px; font-weight: bold; cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 15px var(--n-cyan);
        }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<audio id="musica-dual" loop>
    <source src="este-loco-mundo-dual.mp3" type="audio/mpeg">
</audio>

<a href="index.html" id="exit-btn">EXIT</a>

<div id="ui-header">
    <div id="msg-box"><p id="text-render"></p></div>
</div>

<div id="ui-controls">
    <div id="joy-l" class="joystick"><div id="knob-l" class="knob"></div></div>
    <button id="zoom-btn">ZOOM 4K</button>
    <div id="joy-r" class="joystick"><div id="knob-r" class="knob"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
// MATRIX
const canvas = document.getElementById('matrix-bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const letters = "0101010101010110101010101101010";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";
    drops.forEach((y, i) => {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}
setInterval(drawMatrix, 35);

// TEXTO
const msg = "He entrado al sistema. Metacognición digital activa entre el mundo real, mi yo real y mi avatar. Soy la consciencia en este mundo dual.";
let charIdx = 0;
function type() {
    const el = document.getElementById('text-render');
    if(charIdx < msg.length) {
        el.innerHTML += msg.charAt(charIdx);
        charIdx++;
        setTimeout(type, 45);
    } else {
        setTimeout(() => { document.getElementById('msg-box').style.opacity = "0"; }, 6000);
    }
}

// ENGINE
class QuantumWorld {
    constructor() {
        this.input = { mv: {x:0, y:0}, lk: {x:0, y:0} };
        this.isZoom = false;
        this.time = 0;
        this.init();
        this.load();
        this.events();
        this.render();
    }

    init() {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x000000, 0.06);
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 2000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domElement);

        this.scene.add(new THREE.AmbientLight(0xffffff, 2.2));
        this.scene.add(new THREE.GridHelper(400, 80, 0x00ff41, 0x001100));

        this.rig = new THREE.Group();
        this.scene.add(this.rig);
        this.rig.add(this.camera);
    }

    load() {
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);

        loader.load('ciudad_quantum.glb', (g) => {
            this.city = g.scene;
            this.city.position.set(0, 10, -30);
            this.city.scale.setScalar(4.5);
            this.scene.add(this.city);
        });

        loader.load('luis-avatar2.glb', (g) => {
            this.avatar = g.scene;
            this.avatar.scale.setScalar(0.28);
            this.scene.add(this.avatar);
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(g.animations.length > 0) this.mixer.clipAction(g.animations[0]).play();
            type();
        });
    }

    events() {
        const audio = document.getElementById('musica-dual');
        const setup = (id, kId, type) => {
            const el = document.getElementById(id), kn = document.getElementById(kId);
            let active = false;
            const h = (e) => {
                if(!active) return;
                audio.play().catch(()=>{}); // Inicia tu música al tocar
                const p = e.touches ? e.touches[0] : e;
                const r = el.getBoundingClientRect();
                const x = (p.clientX - (r.left + 50)) / 50, y = (p.clientY - (r.top + 50)) / 50;
                const m = Math.min(Math.sqrt(x*x+y*y), 1), a = Math.atan2(y, x);
                kn.style.transform = `translate(calc(-50% + ${Math.cos(a)*m*30}px), calc(-50% + ${Math.sin(a)*m*30}px))`;
                this.input[type] = {x: Math.cos(a)*m, y: Math.sin(a)*m};
            };
            el.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchmove', h);
            window.addEventListener('touchend', () => { active = false; kn.style.transform='translate(-50%,-50%)'; this.input[type]={x:0, y:0}; });
        };
        setup('joy-l', 'knob-l', 'mv'); setup('joy-r', 'knob-r', 'lk');
        document.getElementById('zoom-btn').onclick = () => {
            audio.play().catch(()=>{});
            this.isZoom = !this.isZoom;
        };
    }

    render() {
        requestAnimationFrame(() => this.render());
        this.time += 0.02;
        if(this.mixer) this.mixer.update(0.016);
        
        if(this.city) {
            this.city.rotation.y += 0.002;
            this.city.rotation.x = Math.sin(this.time) * 0.05;
            this.city.position.y = 8 + Math.sin(this.time * 0.5) * 2;
        }

        if(this.avatar) {
            const speed = 0.16;
            const nextX = this.avatar.position.x + this.input.mv.x * speed;
            const nextZ = this.avatar.position.z + this.input.mv.y * speed;
            if(Math.abs(nextX) < 20) this.avatar.position.x = nextX;
            if(Math.abs(nextZ) < 30) this.avatar.position.z = nextZ;

            this.avatar.position.y = 0.1 + Math.sin(this.time * 2) * 0.04;

            if(Math.abs(this.input.mv.x) > 0.05) this.avatar.rotation.y = Math.atan2(this.input.mv.x, this.input.mv.y);

            this.rig.position.lerp(this.avatar.position, 0.1);
            this.rig.rotation.y -= this.input.lk.x * 0.04;

            const tZ = this.isZoom ? 0.38 : 1.35;
            const tY = this.isZoom ? 0.42 : 0.35;
            this.camera.position.lerp(new THREE.Vector3(0, tY, tZ), 0.1);
            this.camera.lookAt(new THREE.Vector3(0, tY, 0).add(this.avatar.position));
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new QuantumWorld();
</script>
</body>
</html>
