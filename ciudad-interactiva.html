<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Reality - Final 4K Render</title>
    <style>
        :root { --neon: #00f6ff; --magenta: #ff00ff; --matrix: #00ff41; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        /* Mensaje Digital Estilo Hacker */
        #manifesto-zone {
            position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
            z-index: 90; width: 80%; max-width: 500px;
            background: rgba(0, 0, 0, 0.7); border-left: 3px solid var(--matrix);
            padding: 15px; opacity: 1; transition: opacity 1.5s; pointer-events: none;
        }
        #typing-text { color: var(--matrix); text-shadow: 0 0 8px var(--matrix); font-size: 14px; margin: 0; font-weight: bold; }

        /* UI HUD */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; padding: 20px; }
        
        /* Botón Salir Minimalista */
        #btn-exit {
            position: absolute; top: 25px; right: 25px; pointer-events: auto;
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--magenta);
            color: var(--magenta); background: rgba(0,0,0,0.8); font-size: 9px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 0 15px var(--magenta); text-decoration: none; font-weight: bold;
        }

        /* Joysticks Profesionales */
        .joy-container {
            position: absolute; bottom: 40px; width: 110px; height: 110px;
            border: 2px double var(--neon); border-radius: 50%;
            background: rgba(0,246,255,0.05); pointer-events: auto; touch-action: none;
        }
        #joy-move { left: 35px; } 
        #joy-look { right: 35px; }
        
        .knob {
            width: 45px; height: 45px; background: var(--neon); border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--neon), inset 0 0 10px white;
        }

        /* Botón ZOOM 4K */
        #zoom-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 75px; height: 75px; border-radius: 50%; border: 2px solid #fff;
            background: rgba(0,0,0,0.9); color: #fff; pointer-events: auto; cursor: pointer;
            font-size: 11px; font-weight: bold; box-shadow: 0 0 20px #fff;
        }
        #zoom-btn.active { background: #fff; color: #000; scale: 1.1; }

        /* Cargador de Sistema */
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon); }
        .spin { width: 50px; height: 50px; border: 3px solid var(--neon); border-top-color: transparent; border-radius: 50%; animation: s 1s linear infinite; margin-bottom: 20px; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spin"></div>
    <h2 style="letter-spacing: 3px;">QUANTUM ENGINE 4K</h2>
    <p id="load-info">Optimizando Texturas de Ciudad...</p>
</div>

<div id="manifesto-zone"><p id="typing-text"></p></div>

<div id="ui">
    <a href="index.html" id="btn-exit">SALIR</a>
    
    <div id="joy-move" class="joy-container"><div id="knob-move" class="knob"></div></div>
    
    <button id="zoom-btn">ZOOM<br>DETALLE</button>
    
    <div id="joy-look" class="joy-container"><div id="knob-look" class="knob"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://www.gstatic.com/draco/versioned/decoders/1.4.1/draco_decoder.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
/**
 * MOTOR DE RENDERIZADO CUÁNTICO v5.0 - FINAL BUILD
 */
class QuantumSystem {
    constructor() {
        this.input = { move: {x:0, y:0}, look: {x:0, y:0} };
        this.isZoom = false;
        this.initCore();
        this.initLights();
        this.loadUniverse();
        this.bindInterface();
        this.runLoop();
    }

    initCore() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000003);
        this.scene.fog = new THREE.FogExp2(0x000003, 0.015); // Niebla para realismo de edificios

        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.01, 3000);
        
        // Renderizador de Alta Precisión
        this.renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            precision: 'highp', 
            powerPreference: "high-performance",
            logarithmicDepthBuffer: true 
        });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure = 1.3;
        document.body.appendChild(this.renderer.domElement);
        
        this.clock = new THREE.Clock();
        this.camBase = new THREE.Group(); 
        this.scene.add(this.camBase);
        this.camBase.add(this.camera);
    }

    initLights() {
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const sun = new THREE.DirectionalLight(0xffffff, 1.8);
        sun.position.set(10, 20, 10);
        this.scene.add(sun);
        
        this.faceLight = new THREE.PointLight(0xffffff, 0, 5);
        this.scene.add(this.faceLight);
    }

    loadUniverse() {
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);

        // 1. CARGA DE CIUDAD (Posicionada en la avenida)
        loader.load('ciudad_quantum.glb', (glb) => {
            this.city = glb.scene;
            // Ajuste crítico para estar en la calle asfáltica
            this.city.position.set(0, -2.5, -20); 
            this.scene.add(this.city);
            
            // Reparación de Texturas "Derretidas"
            this.city.traverse(n => {
                if(n.isMesh) {
                    n.material.side = THREE.DoubleSide;
                    if(n.material.map) {
                        n.material.map.anisotropy = 16;
                        n.material.map.minFilter = THREE.LinearMipmapLinearFilter;
                    }
                }
            });
        });

        // 2. CARGA DE AVATAR (Con sistema de animación de piernas)
        loader.load('luis-avatar2.glb', (glb) => {
            this.avatar = glb.scene;
            this.avatar.position.set(0, 0, 0); 
            this.scene.add(this.avatar);
            
            this.mixer = new THREE.AnimationMixer(this.avatar);
            this.actions = {};
            
            // Mapear todas las animaciones disponibles
            glb.animations.forEach(clip => {
                this.actions[clip.name.toLowerCase()] = this.mixer.clipAction(clip);
            });

            // Reproducir Idle por defecto
            const firstAnim = Object.values(this.actions)[0];
            if(firstAnim) firstAnim.play();

            document.getElementById('loader').style.display = 'none';
            this.typeManifesto();
        });
    }

    typeManifesto() {
        const msg = "Ya estoy adentro. Estoy observando cómo pasa el mundo digital... son las primeras pruebas de una nueva realidad.";
        let i = 0;
        const target = document.getElementById('typing-text');
        const interval = setInterval(() => {
            target.innerHTML += msg.charAt(i);
            i++;
            if(i >= msg.length) {
                clearInterval(interval);
                setTimeout(() => { document.getElementById('manifesto-zone').style.opacity = '0'; }, 3000);
            }
        }, 35);
    }

    bindInterface() {
        const setupJoy = (id, knobId, isMove) => {
            const el = document.getElementById(id);
            const knob = document.getElementById(knobId);
            let active = false;

            const handle = (e) => {
                if(!active) return;
                const t = e.touches ? e.touches[0] : e;
                const rect = el.getBoundingClientRect();
                const x = (t.clientX - (rect.left + 55)) / 55;
                const y = (t.clientY - (rect.top + 55)) / 55;
                const mag = Math.min(Math.sqrt(x*x + y*y), 1);
                const angle = Math.atan2(y, x);
                
                const fx = Math.cos(angle) * mag;
                const fy = Math.sin(angle) * mag;
                
                knob.style.transform = `translate(calc(-50% + ${fx*40}px), calc(-50% + ${fy*40}px))`;
                if(isMove) this.input.move = {x: fx, y: fy};
                else this.input.look = {x: fx, y: fy};
            };

            el.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchmove', handle);
            window.addEventListener('touchend', () => {
                active = false;
                knob.style.transform = 'translate(-50%, -50%)';
                if(isMove) this.input.move = {x:0, y:0};
                else this.input.look = {x:0, y:0};
            });
        };

        setupJoy('joy-move', 'knob-move', true);
        setupJoy('joy-look', 'knob-look', false);

        const z = document.getElementById('zoom-btn');
        z.addEventListener('touchstart', (e) => { e.preventDefault(); this.isZoom = true; z.classList.add('active'); });
        z.addEventListener('touchend', () => { this.isZoom = false; z.classList.remove('active'); });
    }

    runLoop() {
        requestAnimationFrame(() => this.runLoop());
        const delta = this.clock.getDelta();
        
        if(this.mixer) {
            this.mixer.update(delta);
            // Si el joystick se mueve, podrías hacer un crossfade a 'walk' aquí si la animación existe
        }

        if(this.avatar) {
            // Movimiento del Avatar en la Calle
            const speed = 0.07;
            this.avatar.position.x += this.input.move.x * speed;
            this.avatar.position.z += this.input.move.y * speed;
            
            if(Math.abs(this.input.move.x) > 0.1 || Math.abs(this.input.move.y) > 0.1) {
                this.avatar.rotation.y = Math.atan2(this.input.move.x, this.input.move.y);
            }

            // Cámara 360 y Zoom
            this.camBase.position.copy(this.avatar.position);
            this.camBase.rotation.y -= this.input.look.x * 0.05;

            const targetPos = this.isZoom ? new THREE.Vector3(0, 1.65, 0.7) : new THREE.Vector3(0, 1.2, 4.2);
            this.camera.position.lerp(targetPos, 0.1);
            this.camera.lookAt(new THREE.Vector3(0, this.isZoom ? 1.65 : 1.0, 0).add(this.avatar.position));
            
            this.faceLight.position.copy(this.avatar.position).add(new THREE.Vector3(0, 1.65, 0.5));
            this.faceLight.intensity = this.isZoom ? 1.6 : 0;
        }

        this.renderer.render(this.scene, this.camera);
    }
}

window.onload = () => new QuantumSystem();
</script>
</body>
</html>
