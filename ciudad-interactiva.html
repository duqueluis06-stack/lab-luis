<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INSPECTOR LUIS AVATAR</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        canvas { display: block; touch-action: none; }
        #info { position: absolute; top: 10px; left: 10px; color: #0ff; pointer-events: none; text-shadow: 1px 1px 2px #000; }
        #controls-hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #0ff; pointer-events: none; font-size: 12px; }
        .back-btn { position: absolute; top: 10px; right: 10px; background: red; color: white; padding: 10px; text-decoration: none; font-weight: bold; border-radius: 5px; z-index: 100; }
    </style>
</head>
<body>

<div id="info">LUIS_AVATAR_REALISM_CHECK<br>ESTADO: VISTA_PREVIA</div>
<a href="index.html" class="back-btn">SALIR</a>
<div id="controls-hint">USA 1 DEDO PARA ROTAR | 2 DEDOS PARA ZOOM</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, luis;

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000500);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 3); // Posición inicial para ver el pecho/cara

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // Iluminación de estudio para resaltar el realismo de la IA
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
        scene.add(hemiLight);
        
        const spotLight = new THREE.SpotLight(0xffffff, 2);
        spotLight.position.set(5, 5, 5);
        scene.add(spotLight);

        // Cuadrícula verde de base
        const grid = new THREE.GridHelper(20, 20, 0x00ff00, 0x003300);
        scene.add(grid);

        // CONTROLES DE ZOOM Y ROTACIÓN (OrbitControls)
        // Esto es lo que permite que hagas zoom en el rostro
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.2, 0); // Apunta a la altura de la cara

        const loader = new THREE.GLTFLoader();
        loader.load('luis_avatar.glb', (gltf) => {
            luis = gltf.scene;
            
            // NO forzamos rotación extraña, dejamos que el modelo cargue como es
            // Solo ajustamos escala para que quepa en pantalla
            const box = new THREE.Box3().setFromObject(luis);
            const size = box.getSize(new THREE.Vector3());
            const scale = 1.8 / size.y;
            luis.scale.setScalar(scale);
            
            scene.add(luis);
            console.log("Avatar cargado en pose original");
        });

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (controls) controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
