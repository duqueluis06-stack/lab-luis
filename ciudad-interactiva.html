<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Reality: Protocolo Final Luis</title>
    <style>
        :root {
            --m-green: #00ff41;
            --n-cyan: #00f6ff;
            --n-pink: #ff0055;
            --glass: rgba(0, 10, 0, 0.9);
            --text-shadow: 0 0 10px rgba(0, 255, 65, 0.8);
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: var(--m-green); }

        /* UI SUPERIOR: BOTÓN DE SALIDA (EXIT) */
        #ui-top {
            position: absolute; top: 0; left: 0; width: 100%; display: flex;
            justify-content: flex-end; padding: 20px; box-sizing: border-box; z-index: 1000;
        }

        #btn-exit {
            padding: 12px 24px; border: 2px solid var(--n-pink);
            background: rgba(0, 0, 0, 0.8); color: var(--n-pink);
            font-size: 12px; font-weight: bold; text-decoration: none;
            border-radius: 5px; box-shadow: 0 0 15px var(--n-pink);
            transition: all 0.2s; cursor: pointer; pointer-events: auto;
        }
        #btn-exit:hover { background: var(--n-pink); color: #000; box-shadow: 0 0 25px var(--n-pink); }

        /* UI INFERIOR: DIÁLOGOS Y JOYSTICKS */
        #ui-bottom {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 220px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 30px; box-sizing: border-box; z-index: 1000; pointer-events: none;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        /* CUADRO DE DIÁLOGO ESTILO SUBTÍTULOS (GRANDE PARA MÓVIL Y ABAJO) */
        #dialogue-container {
            width: 90%; max-width: 700px; margin-bottom: 20px;
            background: var(--glass); border-top: 2px solid var(--m-green);
            padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,65,0.3);
            text-align: center;
        }

        #typing-text {
            color: #fff; font-size: 20px; line-height: 1.4;
            text-shadow: 0 0 10px var(--m-green), 1px 1px 2px #000;
            margin: 0; min-height: 1.4em;
        }

        /* CONTROLES TÁCTILES */
        #controls-row {
            width: 100%; display: flex; justify-content: space-around;
            align-items: center; pointer-events: none;
        }

        .joystick-base {
            width: 110px; height: 110px; border: 3px solid var(--m-green);
            border-radius: 50%; background: rgba(0, 255, 65, 0.05);
            box-shadow: 0 0 20px var(--m-green); position: relative; pointer-events: auto; touch-action: none;
        }

        .knob {
            width: 45px; height: 45px; background: #fff; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #fff; border: 2px solid var(--m-green);
        }

        #btn-zoom-4k {
            width: 80px; height: 80px; border: 3px solid var(--n-cyan);
            background: #000; color: var(--n-cyan); border-radius: 50%;
            font-weight: bold; font-size: 11px; cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 15px var(--n-cyan);
        }

        /* PANTALLA DE CARGA Matrix */
        #loading {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--m-green);
        }
    </style>
</head>
<body>

<audio id="music-dual" loop>
    <source src="este-loco-mundo-dual.mp3" type="audio/mpeg">
</audio>

<div id="loading">
    <h1 style="letter-spacing: 5px;">INICIANDO MUNDO DUAL... V7</h1>
    <div style="width: 200px; height: 2px; background: #111;">
        <div id="progress" style="width: 0%; height: 100%; background: var(--m-green); box-shadow: 0 0 10px var(--m-green);"></div>
    </div>
</div>

<div id="ui-top">
    <a href="index.html" id="btn-exit">SALIR (EXIT)</a>
</div>

<div id="ui-bottom">
    <div id="dialogue-container">
        <p id="typing-text"></p>
    </div>
    <div id="controls-row">
        <div id="joy-l" class="joystick-base"><div id="knob-l" class="knob"></div></div>
        <button id="btn-zoom-4k">ZOOM 4K</button>
        <div id="joy-r" class="joystick-base"><div id="knob-r" class="knob"></div></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
/**
 * LUIS AVATAR PRO: MUNDO DUAL V7
 * FIJACIÓN DE BRAZOS, CIUDAD GIRATORIA Y UI MOBILE
 */

const introMessage = "He entrado al sistema. Todo se ve muy raro... pero hay una metacognición digital entre el mundo real, mi yo real y mi avatar. Soy la consciencia flotando en este loco mundo dual.";

function typeWriterEffect() {
    const textEl = document.getElementById('typing-text');
    let i = 0;
    const interval = setInterval(() => {
        if(i < introMessage.length) {
            textEl.innerHTML += introMessage.charAt(i);
            i++;
        } else {
            clearInterval(interval);
            // El mensaje permanece abajo, no desaparece para no perder la inmersión.
        }
    }, 45);
}

class QuantumFinalEngine {
    constructor() {
        this.input = { mv: {x:0, y:0}, lk: {x:0, y:0} };
        this.isZoom = false;
        this.time = 0;
        
        this.init();
        this.lights();
        this.createMatrixFloor();
        this.loadAssets();
        this.events();
        this.animate();
    }

    init() {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x000000, 0.08); // Niebla sutil para profundidad

        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.01, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domElement);

        this.clock = new THREE.Clock();
        
        // Rig de cámara para seguimiento pro
        this.cameraRig = new THREE.Group();
        this.scene.add(this.cameraRig);
        this.cameraRig.add(this.camera);
    }

    lights() {
        this.scene.add(new THREE.AmbientLight(0xffffff, 1.8));
        const d = new THREE.DirectionalLight(0xffffff, 1.0);
        d.position.set(5, 10, 7);
        this.scene.add(d);
    }

    createMatrixFloor() {
        // La cuadrícula neón estándar
        const grid = new THREE.GridHelper(400, 80, 0x00ff41, 0x001100);
        this.scene.add(grid);
    }

    loadAssets() {
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);

        const progressEl = document.getElementById('progress');

        // 1. CARGAR CIUDAD (Y posicionarla DETRÁS para que gire)
        loader.load('ciudad_quantum.glb', (gltf) => {
            this.city = gltf.scene;
            // Posicionamos la ciudad atrás (-15m en Z) y centrada.
            // La rotación inicial se mantiene en 0 para que gire en su eje.
            this.city.position.set(0, 0, -15); 
            this.scene.add(this.city);
            progressEl.style.width = "50%";
        });

        // 2. CARGAR AVATAR (Limpiando manipulaciones previas de huesos)
        loader.load('luis-avatar2.glb', (gltf) => {
            this.avatar = gltf.scene;
            this.avatar.scale.setScalar(0.28); // Escala para que se vea nítido el rostro
            // Nace en el punto cero, sobre la cuadrícula.
            this.avatar.position.set(0, 0, 0);
            this.scene.add(this.avatar);

            // Sincronizar animaciones (para que tenga pose de Idle y baje los brazos)
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(gltf.animations.length > 0) {
                // Forzamos la animación 0, que suele ser Idle o pose de reposo.
                this.mixer.clipAction(gltf.animations[0]).play();
            } else {
                console.warn("El avatar no tiene animaciones. Podría quedar en T-Pose.");
            }

            // Luz de énfasis facial
            this.neonLight = new THREE.PointLight(0x00f6ff, 3, 2);
            this.scene.add(this.neonLight);

            progressEl.style.width = "100%";
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                // Iniciamos la música al cargar, pero la mayoría de navegadores lo bloquean hasta el primer toque.
                document.getElementById('music-dual').play().catch(()=>{});
                typeWriterEffect();
            }, 800);
        });
    }

    events() {
        const setupJoy = (id, knobId, isMove) => {
            const area = document.getElementById(id), knob = document.getElementById(knobId);
            let ok = false;
            
            const handle = (e) => {
                if(!ok) return;
                // Activar música al primer toque (truco para navegadores)
                document.getElementById('music-dual').play().catch(()=>{});
                
                const p = e.touches ? e.touches[0] : e;
                const r = area.getBoundingClientRect();
                const fx = (p.clientX - (r.left + 55)) / 55, fy = (p.clientY - (r.top + 55)) / 55;
                const m = Math.min(Math.sqrt(fx*fx + fy*fy), 1), a = Math.atan2(fy, fx);
                knob.style.transform = `translate(calc(-50% + ${Math.cos(a)*m*35}px), calc(-50% + ${Math.sin(a)*m*35}px))`;
                if(isMove) this.input.mv = {x: Math.cos(a)*m, y: Math.sin(a)*m}; else this.input.lk = {x: Math.cos(a)*m, y: Math.sin(a)*m};
            };
            area.addEventListener('touchstart', () => ok = true);
            window.addEventListener('touchmove', handle);
            window.addEventListener('touchend', () => { ok = false; knob.style.transform = 'translate(-50%, -50%)'; if(isMove) this.input.mv={x:0, y:0}; else this.input.lk={x:0, y:0}; });
        };
        setupJoy('joy-l', 'knob-l', true); setupJoy('joy-r', 'knob-r', false);
        document.getElementById('btn-zoom-4k').onclick = () => this.isZoom = !this.isZoom;
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const delta = this.clock.getDelta();
        this.time += 0.05;
        if(this.mixer) this.mixer.update(delta);

        // ROTACIÓN LENTA DE LA CIUDAD (Detrás)
        if(this.city) {
            this.city.rotation.y += 0.002; // Efecto de rotación lenta
        }

        if(this.avatar) {
            // Levitación cuántica y respiración
            this.avatar.position.y = 0.12 + Math.sin(this.time) * 0.06;

            // Movimiento suave
            this.avatar.position.x += this.input.mv.x * 0.14;
            this.avatar.position.z += this.input.mv.y * 0.14;
            if(Math.abs(this.input.mv.x) > 0.05 || Math.abs(this.input.mv.y) > 0.05) {
                this.avatar.rotation.y = THREE.MathUtils.lerp(this.avatar.rotation.y, Math.atan2(this.input.mv.x, this.input.mv.y), 0.1);
            }

            // Seguimiento de cámara cinematográfico (Mobile Friendly)
            this.cameraRig.position.lerp(this.avatar.position, 0.1);
            this.cameraRig.rotation.y -= this.input.lk.x * 0.04;

            // Zoom 4K enfocado al rostro
            const camZ = this.isZoom ? 0.35 : 1.3;
            const camY = this.isZoom ? 0.42 : 0.35;
            this.camera.position.lerp(new THREE.Vector3(0, camY, camZ), 0.1);
            
            const lookH = this.isZoom ? 0.42 : 0.25;
            this.camera.lookAt(new THREE.Vector3(0, lookH, 0).add(this.avatar.position));
            
            if(this.neonLight) this.neonLight.position.copy(this.avatar.position).add(new THREE.Vector3(0, 0.4, 0.3));
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new QuantumFinalEngine();
</script>
</body>
</html>
