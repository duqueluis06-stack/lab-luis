<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matrix Avenue - Luis Edition</title>
    <style>
        :root { --matrix-green: #00ff41; --glow: #003300; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        #hud {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            color: var(--matrix-green); font-size: 11px; pointer-events: none;
            background: rgba(0, 10, 0, 0.8); padding: 10px; border: 1px solid var(--matrix-green);
        }

        .joystick-zone {
            position: absolute; bottom: 40px; width: 110px; height: 110px;
            border: 2px solid var(--matrix-green); border-radius: 50%;
            background: rgba(0, 255, 65, 0.05); z-index: 110; touch-action: none;
        }
        #joy-move { left: 30px; } 
        #joy-look { right: 30px; }
        .knob {
            position: absolute; top: 50%; left: 50%; width: 45px; height: 45px;
            background: var(--matrix-green); border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--matrix-green);
        }

        #zoom-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--matrix-green);
            background: #000; color: var(--matrix-green); font-weight: bold; z-index: 120;
            box-shadow: 0 0 20px var(--glow); cursor: pointer;
        }

        #loader {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; align-items: center; justify-content: center; color: var(--matrix-green);
        }
    </style>
</head>
<body>

<div id="loader"><h2>REESCRIBIENDO CÓDIGO MATRIX...</h2></div>
<div id="hud">SYSTEM_STATUS: ACTIVE<br>GRID_MODE: ON<br>USER: LUIS_4K</div>

<div id="ui">
    <div id="joy-move" class="joystick-zone"><div id="knob-move" class="knob"></div></div>
    <button id="zoom-btn">ZOOM<br>4K</button>
    <div id="joy-look" class="joystick-zone"><div id="knob-look" class="knob"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
class MatrixEngine {
    constructor() {
        this.input = { move: {x:0, y:0}, look: {x:0, y:0} };
        this.isZoom = false;
        this.init();
        this.createMatrixFloor();
        this.loadAssets();
        this.setupControls();
        this.animate();
    }

    init() {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.Fog(0x000000, 10, 50);
        
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domElement);

        this.clock = new THREE.Clock();
        
        // Luces Matrix
        const ambient = new THREE.AmbientLight(0x00ff41, 0.5);
        this.scene.add(ambient);
        const point = new THREE.PointLight(0xffffff, 1.5, 20);
        this.scene.add(point);
        this.point = point;

        this.rig = new THREE.Group();
        this.scene.add(this.rig);
        this.rig.add(this.camera);
    }

    createMatrixFloor() {
        // Rejilla verde estilo Matrix
        const size = 200;
        const divisions = 100;
        const grid = new THREE.GridHelper(size, divisions, 0x00ff41, 0x002200);
        grid.position.y = -0.01;
        this.scene.add(grid);
    }

    loadAssets() {
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);

        // Cargar Ciudad Estática
        loader.load('ciudad_quantum.glb', (gltf) => {
            this.city = gltf.scene;
            this.city.position.set(0, 0, 0); // No la movemos nosotros, la dejamos fija
            this.scene.add(this.city);
        });

        // Cargar Avatar con ESCALA REAL (Pequeño para la ciudad)
        loader.load('luis-avatar2.glb', (gltf) => {
            this.avatar = gltf.scene;
            this.avatar.scale.setScalar(0.2); // Escala humana
            this.scene.add(this.avatar);
            
            this.mixer = new THREE.AnimationMixer(this.avatar);
            this.actions = {};
            
            gltf.animations.forEach(anim => {
                const n = anim.name.toLowerCase();
                if(n.includes('walk') || n.includes('run')) this.actions.walk = this.mixer.clipAction(anim);
                if(n.includes('idle')) this.actions.idle = this.mixer.clipAction(anim);
            });

            // Forzado manual si fallan los nombres
            if(!this.actions.walk) this.actions.walk = this.mixer.clipAction(gltf.animations[gltf.animations.length-1]);
            if(!this.actions.idle) this.actions.idle = this.mixer.clipAction(gltf.animations[0]);

            this.actions.idle.play();
            document.getElementById('loader').style.display = 'none';
        });
    }

    setupControls() {
        const createJoy = (id, knobId, isMove) => {
            const area = document.getElementById(id), knob = document.getElementById(knobId);
            let active = false;
            
            const handle = (e) => {
                if(!active) return;
                const p = e.touches ? e.touches[0] : e;
                const r = area.getBoundingClientRect();
                const x = (p.clientX - (r.left + 55)) / 55;
                const y = (p.clientY - (r.top + 55)) / 55;
                const mag = Math.min(Math.sqrt(x*x + y*y), 1);
                const ang = Math.atan2(y, x);
                const fx = Math.cos(ang) * mag, fy = Math.sin(ang) * mag;
                
                knob.style.transform = `translate(calc(-50% + ${fx*35}px), calc(-50% + ${fy*35}px))`;
                if(isMove) this.input.move = {x: fx, y: fy}; else this.input.look = {x: fx, y: fy};
            };

            area.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchmove', handle);
            window.addEventListener('touchend', () => {
                active = false; knob.style.transform = 'translate(-50%, -50%)';
                if(isMove) this.input.move = {x:0, y:0}; else this.input.look = {x:0, y:0};
            });
        };

        createJoy('joy-move', 'knob-move', true);
        createJoy('joy-look', 'knob-look', false);
        document.getElementById('zoom-btn').onclick = () => this.isZoom = !this.isZoom;
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const dt = this.clock.getDelta();
        if(this.mixer) this.mixer.update(dt);

        if(this.avatar) {
            // Movimiento corregido: El avatar se mueve, la ciudad no.
            const speed = 0.15;
            this.avatar.position.x += this.input.move.x * speed;
            this.avatar.position.z += this.input.move.y * speed;

            const moving = Math.abs(this.input.move.x) > 0.1 || Math.abs(this.input.move.y) > 0.1;
            
            if(moving) {
                const targetRotation = Math.atan2(this.input.move.x, this.input.move.y);
                this.avatar.rotation.y = THREE.MathUtils.lerp(this.avatar.rotation.y, targetRotation, 0.1);
                
                if(!this.actions.walk.isRunning()) {
                    this.actions.idle.fadeOut(0.2);
                    this.actions.walk.reset().fadeIn(0.2).play();
                }
            } else {
                if(!this.actions.idle.isRunning()) {
                    this.actions.walk.fadeOut(0.2);
                    this.actions.idle.reset().fadeIn(0.2).play();
                }
            }

            // Cámara sigue al avatar
            this.rig.position.lerp(this.avatar.position, 0.1);
            this.rig.rotation.y -= this.input.look.x * 0.04;

            const camPos = this.isZoom ? new THREE.Vector3(0, 0.35, 0.2) : new THREE.Vector3(0, 0.25, 0.8);
            this.camera.position.lerp(camPos, 0.1);
            
            const targetY = this.isZoom ? 0.35 : 0.2;
            this.camera.lookAt(new THREE.Vector3(0, targetY, 0).add(this.avatar.position));
            
            this.point.position.copy(this.avatar.position).add(new THREE.Vector3(0, 1, 1));
        }
        this.renderer.render(this.scene, this.camera);
    }
}

window.onload = () => new MatrixEngine();
</script>
</body>
</html>
