<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUIS QUANTUM GTA</title>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; }
canvas { display:block; touch-action:none; }

#ui{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    justify-content:space-between;
    padding:15px;
    pointer-events:none;
}

.btn{
    pointer-events:auto;
    width:65px; height:65px;
    background:rgba(0,255,255,0.3);
    border:2px solid #0ff;
    color:#fff;
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
}

.controls{
    display:grid;
    grid-template-columns:repeat(3,70px);
    gap:5px;
}

.actions{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.btn-big{
    width:90px; height:50px;
    background:#f0f;
    border:2px solid #fff;
    border-radius:10px;
    font-size:12px;
}

#loading{
    position:fixed; inset:0;
    background:#000;
    color:#0ff;
    display:flex; align-items:center; justify-content:center;
    z-index:1000;
}
</style>
</head>

<body>

<div id="loading">CARGANDO...</div>

<div id="ui">
    <div style="display:flex; justify-content:space-between;">
        <a href="index.html" class="btn btn-big" style="background:red;">SALIR</a>
        <div style="color:#0ff;">ONLINE</div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div class="controls">
            <div></div><div class="btn" id="w">↑</div><div></div>
            <div class="btn" id="a">←</div><div class="btn" id="s">↓</div><div class="btn" id="d">→</div>
        </div>

        <div class="actions">
            <div class="btn btn-big" id="run">RUN</div>
            <div class="btn btn-big" id="reset">RESET</div>
        </div>
    </div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.128/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.128/examples/jsm/loaders/GLTFLoader.js";

let scene, camera, renderer;
let luis, mixer;
let clock = new THREE.Clock();

let move = { w:false, a:false, s:false, d:false, run:false };

init();

function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    document.body.appendChild(renderer.domElement);

    // luces
    scene.add(new THREE.AmbientLight(0xffffff,0.8));
    const light = new THREE.DirectionalLight(0xffffff,1);
    light.position.set(5,10,7);
    scene.add(light);

    // loader con control
    const manager = new THREE.LoadingManager();

    manager.onLoad = ()=>{
        document.getElementById("loading").style.display = "none";
        resetLuis();
    };

    manager.onError = (url)=>{
        console.error("Error cargando:", url);
        document.getElementById("loading").innerHTML = "ERROR";
    };

    const loader = new GLTFLoader(manager);

    // cargar ciudad
    loader.load("ciudad_quantum.glb",
        (gltf)=>{
            gltf.scene.traverse(obj=>{
                if(obj.isMesh) obj.receiveShadow = true;
            });
            scene.add(gltf.scene);
        }
    );

    // cargar avatar
    loader.load("luis_avatar.glb",
        (gltf)=>{
            luis = gltf.scene;
            scene.add(luis);

            if(gltf.animations.length){
                mixer = new THREE.AnimationMixer(luis);
                mixer.clipAction(gltf.animations[0]).play();
            }
        }
    );

    setupControls();
    animate();
}

function setupControls(){
    ["w","a","s","d","run"].forEach(id=>{
        const el = document.getElementById(id);

        const on = e=>{ e.preventDefault(); move[id]=true; };
        const off = e=>{ e.preventDefault(); move[id]=false; };

        el.addEventListener("touchstart", on);
        el.addEventListener("touchend", off);
        el.addEventListener("touchcancel", off);

        el.addEventListener("mousedown", on);
        el.addEventListener("mouseup", off);
        el.addEventListener("mouseleave", off);
    });

    document.getElementById("reset").onclick = resetLuis;
}

function resetLuis(){
    if(!luis) return;
    luis.position.set(0,0,0);
    camera.position.set(0,5,12);
}

function animate(){
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    if(mixer) mixer.update(delta);

    if(luis){
        const speed = (move.run ? 6 : 2.5) * delta;
        const rot = 2 * delta;

        if(move.w) luis.translateZ(speed);
        if(move.s) luis.translateZ(-speed);
        if(move.a) luis.rotation.y += rot;
        if(move.d) luis.rotation.y -= rot;

        // cámara GTA
        const target = new THREE.Vector3(0,6,-12);
        target.applyQuaternion(luis.quaternion);
        target.add(luis.position);

        camera.position.lerp(target, 0.1);
        camera.lookAt(luis.position.x, luis.position.y+2, luis.position.z);
    }

    renderer.render(scene,camera);
}

addEventListener("resize", ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
