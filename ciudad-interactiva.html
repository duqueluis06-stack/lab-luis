<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum City Final - Traffic Edition</title>
    <style>
        :root { --neon: #00f6ff; --magenta: #ff00ff; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; }
        .btn { pointer-events: auto; background: rgba(0,0,0,0.8); border: 2px solid var(--neon); color: var(--neon); padding: 15px; cursor: pointer; font-weight: bold; box-shadow: 0 0 10px var(--neon); }
        #joy-con { width: 140px; height: 140px; border-radius: 50%; border: 2px dashed var(--neon); position: relative; display: flex; align-items: center; justify-content: center; background: rgba(0,246,255,0.05); }
        #knob { width: 60px; height: 60px; background: var(--neon); border-radius: 50%; box-shadow: 0 0 20px var(--neon); position: absolute; }
        #zoom-btn { width: 80px; height: 80px; border-radius: 50%; align-self: flex-end; border-color: #fff; color: #fff; }
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon); }
    </style>
</head>
<body>

<div id="loader">
    <h2 id="load-msg">CONECTANDO CIUDAD Y TRÁFICO...</h2>
</div>

<div id="ui">
    <div style="display:flex; justify-content: flex-end;">
        <button class="btn" style="border-color:var(--magenta); color:var(--magenta);" onclick="location.reload()">REINICIAR</button>
    </div>
    <div style="display:flex; justify-content: space-between; align-items: flex-end;">
        <div id="joy-con"><div id="knob" class="btn"></div></div>
        <button id="zoom-btn" class="btn">ZOOM</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
class QuantumFinal {
    constructor() {
        this.cars = [];
        this.init();
        this.lights();
        this.load();
        this.controls();
        this.animate();
    }

    init() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000005);
        // Quitamos la niebla para asegurar que la ciudad se vea hasta el fondo
        this.camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 5000);
        this.camera.position.set(0, 1, 4);

        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure = 1.5;
        document.body.appendChild(this.renderer.domElement);
        this.clock = new THREE.Clock();
    }

    lights() {
        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        this.scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(5, 10, 7);
        this.scene.add(sun);
        
        // Luz azul de ciudad detrás
        const cityBacklight = new THREE.PointLight(0x00ffff, 2, 50);
        cityBacklight.position.set(0, 5, -10);
        this.scene.add(cityBacklight);
    }

    createTraffic() {
        // Creamos 15 "autos" (luces neón que se mueven)
        const colors = [0x00f6ff, 0xff00ff, 0xffff00];
        for(let i=0; i<15; i++) {
            const carGeo = new THREE.BoxGeometry(0.4, 0.2, 0.8);
            const carMat = new THREE.MeshBasicMaterial({ color: colors[i%3] });
            const car = new THREE.Mesh(carGeo, carMat);
            
            // Posiciones aleatorias en lo que sería "la calle" detrás del avatar
            car.position.set((Math.random()-0.5)*40, 0.1, -15 - (Math.random()*30));
            car.userData.speed = 0.1 + Math.random()*0.3;
            this.scene.add(car);
            this.cars.push(car);
        }
    }

    load() {
        const loader = new THREE.GLTFLoader();
        
        // Cargar Ciudad
        loader.load('ciudad_quantum.glb', (glb) => {
            this.city = glb.scene;
            this.city.position.set(0, -0.1, -5); // Un poco atrás para no pisar al avatar
            this.scene.add(this.city);
            
            // TRUCO MAESTRO: Forzar a que cada parte de la ciudad sea visible
            this.city.traverse(child => {
                if(child.isMesh) {
                    child.material.side = THREE.DoubleSide; // Ver por ambos lados
                    child.material.needsUpdate = true;
                }
            });
            this.createTraffic();
        }, undefined, (e) => console.error("Error Ciudad"));

        // Cargar Avatar
        loader.load('luis-avatar2.glb', (glb) => {
            this.avatar = glb.scene;
            this.scene.add(this.avatar);
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(glb.animations.length > 0) this.mixer.clipAction(glb.animations[0]).play();
            document.getElementById('loader').style.display = 'none';
        });
    }

    controls() {
        this.rotY = 0;
        this.zoom = false;
        const knob = document.getElementById('knob');
        
        window.addEventListener('touchstart', (e) => {
            if(e.target.id === 'knob') this.joyActive = true;
        });

        window.addEventListener('touchmove', (e) => {
            if(!this.joyActive) return;
            const t = e.touches[0];
            const r = document.getElementById('joy-con').getBoundingClientRect();
            const dx = t.clientX - (r.left + 70);
            const dist = Math.min(Math.abs(dx), 50);
            knob.style.left = `calc(50% + ${Math.sign(dx)*dist}px - 30px)`;
            this.rotY = Math.sign(dx) * (dist/50) * 0.05;
        });

        window.addEventListener('touchend', () => {
            this.joyActive = false;
            knob.style.left = 'calc(50% - 30px)';
            this.rotY = 0;
        });

        const zBtn = document.getElementById('zoom-btn');
        zBtn.ontouchstart = () => this.zoom = true;
        zBtn.ontouchend = () => this.zoom = false;
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const dt = this.clock.getDelta();
        if(this.mixer) this.mixer.update(dt);

        if(this.avatar) {
            this.avatar.rotation.y += this.rotY;
            
            // Lógica de cámara
            const targetPos = this.zoom ? new THREE.Vector3(0, 1.66, 0.7) : new THREE.Vector3(0, 1.1, 3.5);
            const targetLook = this.zoom ? new THREE.Vector3(0, 1.66, 0) : new THREE.Vector3(0, 1, 0);
            
            this.camera.position.lerp(targetPos, 0.1);
            this.camera.lookAt(targetLook);
        }

        // Mover tráfico
        this.cars.forEach(car => {
            car.position.x += car.userData.speed;
            if(car.position.x > 25) car.position.x = -25; // Loop infinito de autos
        });

        this.renderer.render(this.scene, this.camera);
    }
}

window.onload = () => new QuantumFinal();
</script>
</body>
</html>
