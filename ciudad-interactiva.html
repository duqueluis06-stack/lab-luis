<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CITY AVATAR SYSTEM</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
touch-action:none;
}

body{
overflow:hidden;
background:#000;
font-family:monospace;
}

/* DEBUG */
#debug{
position:absolute;
top:10px;
left:10px;
color:#0f0;
background:rgba(0,0,0,0.6);
padding:6px;
font-size:12px;
z-index:10;
}

/* EXIT */
#exit{
position:fixed;
top:10px;
right:10px;
z-index:20;
padding:10px 14px;
border:1px solid #f00;
color:#f00;
background:rgba(0,0,0,0.5);
}

/* LEFT MOVEMENT PAD */
#pad{
position:fixed;
bottom:20px;
left:20px;
display:grid;
grid-template-columns:60px 60px 60px;
grid-template-rows:60px 60px 60px;
gap:6px;
z-index:50;
}

#pad button{
background:#000;
border:2px solid #0ff;
color:#0ff;
border-radius:10px;
font-size:14px;
}

/* ACTION BAR */
#actions{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:50;
}

#actions button{
width:60px;
height:60px;
background:#000;
border:2px solid #f0f;
color:#0ff;
border-radius:10px;
}

/* AVATAR FOCUS BOX */
#focus{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80px;
height:80px;
border:2px solid #0ff;
border-radius:10px;
pointer-events:none;
opacity:0.3;
z-index:5;
}
</style>
</head>

<body>

<div id="debug">INIT</div>
<div id="focus"></div>

<button id="exit" onclick="location.href='index.html'">SALIR</button>

<!-- MOVIMIENTO -->
<div id="pad">
<div></div>
<button ontouchstart="move(0,1)" ontouchend="move(0,0)">▲</button>
<div></div>

<button ontouchstart="move(-1,0)" ontouchend="move(0,0)">◀</button>
<div></div>
<button ontouchstart="move(1,0)" ontouchend="move(0,0)">▶</button>

<div></div>
<button ontouchstart="move(0,-1)" ontouchend="move(0,0)">▼</button>
<div></div>
</div>

<!-- ACCIONES -->
<div id="actions">
<button onclick="speed=0.03">🚶</button>
<button onclick="speed=0.08">🏃</button>
<button onclick="focusAvatar()">🎯</button>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene,camera,renderer;
let avatar,city;
let vx=0,vz=0;
let speed=0.05;

function log(t){
document.getElementById("debug").innerText=t;
}

init();
animate();

/* ================= INIT ================= */
function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x000010);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,3000);
camera.position.set(0,5,10);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,2));

const loader=new THREE.GLTFLoader();

/* ================= CITY ================= */
loader.load("ciudad_quantum.glb",(g)=>{

city=g.scene;
scene.add(city);

log("CITY OK");

});

/* ================= AVATAR ================= */
loader.load("luis-avatar2.glb",(a)=>{

avatar=a.scene;
scene.add(avatar);

avatar.position.set(0,0,0);

log("AVATAR OK");

});

}

/* ================= INPUT ================= */
function move(x,z){
vx=x;
vz=z;
}

/* ================= FOCUS ================= */
function focusAvatar(){
if(!avatar) return;

camera.position.set(
avatar.position.x,
avatar.position.y+5,
avatar.position.z+10
);

camera.lookAt(avatar.position);
}

/* ================= LOOP ================= */
function animate(){

requestAnimationFrame(animate);

/* MOVIMIENTO */
if(avatar){

avatar.position.x += vx*speed;
avatar.position.z += vz*speed;

/* rotación simple */
if(vx||vz){
avatar.rotation.y=Math.atan2(vx,vz);
}

}

/* cámara seguimiento suave */
if(avatar){
camera.position.lerp(
new THREE.Vector3(
avatar.position.x,
avatar.position.y+5,
avatar.position.z+10
),0.05);

camera.lookAt(avatar.position);
}

renderer.render(scene,camera);

}

</script>

</body>
</html>
