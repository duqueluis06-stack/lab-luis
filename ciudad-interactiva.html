<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>QUANTUM CITY SAFE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;touch-action:none;}
body{overflow:hidden;background:#000;font-family:monospace;}

#debug{
position:absolute;top:10px;left:10px;
color:#0f0;background:rgba(0,0,0,0.6);
padding:6px;font-size:12px;z-index:10;
}

#loader{
position:fixed;inset:0;
display:flex;align-items:center;justify-content:center;
background:#000;color:#0ff;z-index:9999;
}

#exit{
position:fixed;top:10px;right:10px;
z-index:20;padding:10px 14px;
border:1px solid red;color:red;
background:rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<div id="loader">CARGANDO...</div>
<div id="debug">INIT</div>
<button id="exit" onclick="location.href='index.html'">SALIR</button>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene,camera,renderer;
let avatar=null;
let mixer=null;
let clock=new THREE.Clock();

let vx=0,vz=0;
let speed=0.05;

function log(t){
document.getElementById("debug").innerText=t;
}

function move(x,z){
vx=x;vz=z;
}

init();
animate();

/* ========================= */
function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x000010);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,3,6);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,2));

const loader=new THREE.GLTFLoader();

/* ===== CIUDAD ===== */
loader.load("ciudad_quantum.glb",(g)=>{

scene.add(g.scene);
log("CIUDAD OK");

/* ===== AVATAR ===== */
loader.load("luis-avatar2.glb",(a)=>{

avatar=a.scene;
avatar.scale.set(1,1,1);
avatar.position.set(0,1,0);
scene.add(avatar);

/* ===== ANIMACIÓN SEGURA ===== */
mixer=new THREE.AnimationMixer(avatar);

if(a.animations && a.animations.length>0){

let action=mixer.clipAction(a.animations[0]);
action.play();

log("AVATAR OK");

}else{
log("SIN ANIM");
}

document.getElementById("loader").style.display="none";

},

undefined,
()=>{

log("AVATAR FALLBACK");
document.getElementById("loader").style.display="none";

});

});

}

/* ========================= */
function animate(){

requestAnimationFrame(animate);

let dt=clock.getDelta();

if(mixer)mixer.update(dt);

if(avatar){

if(vx||vz){
avatar.position.x+=vx*speed;
avatar.position.z+=vz*speed;
}

camera.position.lerp(
new THREE.Vector3(
avatar.position.x,
avatar.position.y+3,
avatar.position.z+6
),0.08);

camera.lookAt(avatar.position);

}

renderer.render(scene,camera);

}

</script>

</body>
</html>
