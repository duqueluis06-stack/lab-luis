<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUIS 4K - MATRIX CITY</title>
    <style>
        :root {
            --m-green: #00ff41;
            --n-cyan: #00f6ff;
            --n-pink: #ff0055;
            --glass: rgba(0, 15, 0, 0.9);
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', monospace; }

        /* HUD SUPERIOR: CUADRO DE DIÁLOGO ESTILO IA */
        #top-interface {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 600px; z-index: 1000; pointer-events: none;
        }

        #msg-box {
            background: var(--glass);
            border: 2px solid var(--m-green);
            border-radius: 10px;
            padding: 15px 20px;
            color: #fff;
            font-size: 18px;
            font-weight: 300;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            text-shadow: 2px 2px 2px #000, 0 0 10px var(--m-green);
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* BOTÓN DE SALIDA - ESQUINA SUPERIOR */
        #exit-link {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; border: 2px solid var(--n-pink);
            color: var(--n-pink); text-decoration: none; font-weight: bold;
            border-radius: 5px; font-size: 12px; z-index: 1001;
            background: rgba(0,0,0,0.7); box-shadow: 0 0 10px var(--n-pink);
        }

        /* CONTROLES TÁCTILES */
        #touch-controls {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; pointer-events: none;
        }

        .joystick {
            width: 110px; height: 110px; border: 3px solid var(--m-green);
            border-radius: 50%; background: rgba(0, 255, 65, 0.05);
            box-shadow: 0 0 20px var(--m-green); position: relative; pointer-events: auto;
        }

        .knob {
            width: 45px; height: 45px; background: #fff; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #fff; border: 2px solid var(--m-green);
        }

        #zoom-btn {
            width: 80px; height: 80px; border: 3px solid var(--n-cyan);
            background: #000; color: var(--n-cyan); border-radius: 50%;
            font-weight: bold; cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 15px var(--n-cyan);
        }

        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--m-green);
        }
    </style>
</head>
<body>

<audio id="bg-music" loop><source src="este-loco-mundo-dual.mp3" type="audio/mpeg"></audio>

<div id="loading-screen">
    <h2 style="letter-spacing: 5px;">RENDERIZANDO CIUDAD DUAL...</h2>
    <div style="width: 200px; height: 2px; background: #222;">
        <div id="load-bar" style="width: 0%; height: 100%; background: var(--m-green); box-shadow: 0 0 10px var(--m-green);"></div>
    </div>
</div>

<a href="index.html" id="exit-link">EXIT_SYSTEM</a>

<div id="top-interface">
    <div id="msg-box"></div>
</div>

<div id="touch-controls">
    <div id="joy-l" class="joystick"><div id="knob-l" class="knob"></div></div>
    <button id="zoom-btn">ZOOM<br>DETALLE</button>
    <div id="joy-r" class="joystick"><div id="knob-r" class="knob"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
/**
 * LUIS 4K: THE DUAL WORLD EXPERIENCE
 */

const message = "He entrado al sistema... Todo se ve muy raro... pero hay una metacognición digital entre el mundo real, mi yo real y mi avatar. Soy la consciencia del mundo dual.";

function showMessage() {
    const box = document.getElementById('msg-box');
    box.style.opacity = "1";
    let i = 0;
    const timer = setInterval(() => {
        if(i < message.length) {
            box.innerHTML += message.charAt(i);
            i++;
        } else {
            clearInterval(timer);
            setTimeout(() => { box.style.opacity = "0"; }, 7000);
        }
    }, 50);
}

class MatrixCityEngine {
    constructor() {
        this.input = { mv: {x:0, y:0}, lk: {x:0, y:0} };
        this.isZoom = false;
        this.time = 0;
        this.init();
        this.buildNeonCity();
        this.loadAvatar();
        this.events();
        this.render();
    }

    init() {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x000000, 0.1);
        
        this.camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.01, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domElement);

        this.scene.add(new THREE.AmbientLight(0xffffff, 1.8));
        
        const grid = new THREE.GridHelper(500, 100, 0x00ff41, 0x001100);
        this.scene.add(grid);

        this.rig = new THREE.Group();
        this.scene.add(this.rig);
        this.rig.add(this.camera);
    }

    buildNeonCity() {
        // Generamos la ciudad proceduralmente en lugar de cargar un GLB pesado
        const geo = new THREE.BoxGeometry(1, 1, 1);
        for(let i=0; i<80; i++) {
            const h = 5 + Math.random() * 15;
            const mat = new THREE.MeshPhongMaterial({
                color: 0x000000,
                emissive: 0x00ff41,
                emissiveIntensity: 0.5,
                shininess: 100
            });
            const b = new THREE.Mesh(geo, mat);
            b.scale.set(2, h, 2);
            b.position.set(Math.random()*100-50, h/2, Math.random()*100-50);
            // Evitar que edificios nazcan en el centro
            if(Math.abs(b.position.x) > 5 || Math.abs(b.position.z) > 5) {
                this.scene.add(b);
            }
        }
    }

    loadAvatar() {
        const loader = new THREE.GLTFLoader();
        loader.load('luis-avatar2.glb', (gltf) => {
            this.avatar = gltf.scene;
            this.avatar.scale.setScalar(0.28); // Un poco más grande para el Spielberg look
            this.scene.add(this.avatar);

            // CORRECCIÓN DE POSICIÓN DE BRAZOS (Down Pose)
            this.avatar.traverse(node => {
                if(node.isBone) {
                    if(node.name.toLowerCase().includes('arm') || node.name.toLowerCase().includes('shoulder')) {
                        node.rotation.z = node.name.includes('L') ? 1.3 : -1.3;
                    }
                }
            });

            document.getElementById('load-bar').style.width = "100%";
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                showMessage();
            }, 800);
        });
    }

    events() {
        const setup = (id, kId, type) => {
            const el = document.getElementById(id), kn = document.getElementById(kId);
            let active = false;
            const move = (e) => {
                if(!active) return;
                document.getElementById('bg-music').play().catch(()=>{});
                const p = e.touches ? e.touches[0] : e;
                const r = el.getBoundingClientRect();
                const x = (p.clientX - (r.left + 55)) / 55, y = (p.clientY - (r.top + 55)) / 55;
                const m = Math.min(Math.sqrt(x*x+y*y), 1), a = Math.atan2(y, x);
                kn.style.transform = `translate(calc(-50% + ${Math.cos(a)*m*35}px), calc(-50% + ${Math.sin(a)*m*35}px))`;
                this.input[type] = {x: Math.cos(a)*m, y: Math.sin(a)*m};
            };
            el.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchmove', move);
            window.addEventListener('touchend', () => { active = false; kn.style.transform = 'translate(-50%,-50%)'; this.input[type] = {x:0, y:0}; });
        };
        setup('joy-l', 'knob-l', 'mv'); setup('joy-r', 'knob-r', 'lk');
        document.getElementById('zoom-btn').onclick = () => this.isZoom = !this.isZoom;
    }

    render() {
        requestAnimationFrame(() => this.render());
        this.time += 0.05;

        if(this.avatar) {
            // Levitación fluida
            this.avatar.position.y = 0.12 + Math.sin(this.time) * 0.06;

            // Movimiento Proporcional
            this.avatar.position.x += this.input.mv.x * 0.15;
            this.avatar.position.z += this.input.mv.y * 0.15;
            if(Math.abs(this.input.mv.x) > 0.1) this.avatar.rotation.y = Math.atan2(this.input.mv.x, this.input.mv.y);

            // CÁMARA SPIELBERG: Más cerca para ver el renderizado del rostro
            this.rig.position.lerp(this.avatar.position, 0.12);
            this.rig.rotation.y -= this.input.lk.x * 0.05;

            const targetDist = this.isZoom ? 0.35 : 1.1; // Mucho más cerca que antes
            const targetHeight = this.isZoom ? 0.45 : 0.35;
            
            this.camera.position.lerp(new THREE.Vector3(0, targetHeight, targetDist), 0.1);
            this.camera.lookAt(new THREE.Vector3(0, targetHeight, 0).add(this.avatar.position));
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new MatrixCityEngine();
</script>
</body>
</html>
