<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SISTEMA DE RECUPERACIÓN QUANTUM</title>

<style>
    body { margin:0; overflow:hidden; background:#000; font-family:monospace; }

    #debug{
        position:absolute;
        top:10px;
        left:10px;
        color:#0f0;
        background:rgba(0,0,0,0.7);
        padding:8px;
        z-index:10;
        font-size:12px;
    }

    #loader{
        position:fixed;
        inset:0;
        background:#000;
        color:#0ff;
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:9999;
        font-size:16px;
    }

    /* 🎮 CONTROLES IZQUIERDA (JOYSTICK) */
    .controls-left{
        position:fixed;
        bottom:20px;
        left:20px;
        display:grid;
        grid-template-columns:60px 60px 60px;
        grid-template-rows:60px 60px 60px;
        gap:6px;
        z-index:999;
    }

    /* 🎮 CONTROLES DERECHA (ACCIONES) */
    .controls-right{
        position:fixed;
        bottom:20px;
        right:20px;
        display:flex;
        flex-direction:column;
        gap:10px;
        z-index:999;
    }

    button{
        width:60px;
        height:60px;
        border-radius:12px;
        background:rgba(0,0,0,0.6);
        border:2px solid #0ff;
        color:#0ff;
        font-size:12px;
        box-shadow:0 0 10px #0ff;
        touch-action:none;
    }

    button:active{
        background:#0ff;
        color:#000;
    }

</style>
</head>

<body>

<div id="loader">CARGANDO SISTEMA QUANTUM...</div>
<div id="debug">INIT...</div>

<!-- 🎮 JOYSTICK IZQUIERDO -->
<div class="controls-left">
    <div></div>
    <button ontouchstart="move('forward',true)" ontouchend="move('forward',false)">▲</button>
    <div></div>

    <button ontouchstart="move('left',true)" ontouchend="move('left',false)">◀</button>
    <div></div>
    <button ontouchstart="move('right',true)" ontouchend="move('right',false)">▶</button>

    <div></div>
    <button ontouchstart="move('back',true)" ontouchend="move('back',false)">▼</button>
    <div></div>
</div>

<!-- 🎮 ACCIONES DERECHA -->
<div class="controls-right">
    <button onclick="action('walk')">🚶</button>
    <button onclick="action('run')">🏃</button>
    <button onclick="action('jump')">🟡</button>
    <button onclick="action('climb')">🧗</button>
    <button onclick="action('crouch')">🪑</button>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

let scene, camera, renderer, luis;
let mixer, cityMixer;
let clock = new THREE.Clock();
let dir = {x:0, z:0};
let speed = 0.06;
let controls;

function log(t){
    document.getElementById("debug").innerText = t;
}

function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000010);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0,3,6);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 2));

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const draco = new THREE.DRACOLoader();
    draco.setDecoderPath("https://www.gstatic.com/draco/v1/decoders/");

    const loader = new THREE.GLTFLoader();
    loader.setDRACOLoader(draco);

    log("Cargando ciudad...");

    loader.load("ciudad_quantum.glb", (gltf)=>{

        scene.add(gltf.scene);

        if(gltf.animations.length){
            cityMixer = new THREE.AnimationMixer(gltf.scene);
            gltf.animations.forEach(c=>cityMixer.clipAction(c).play());
        }

        log("Ciudad OK → cargando avatar");

        loader.load("luis_avatar.glb", (av)=>{

            luis = av.scene;

            // 👤 FIX VISIBILIDAD
            luis.scale.set(1.2,1.2,1.2);
            luis.position.set(0,1,0);

            scene.add(luis);

            if(av.animations.length){
                mixer = new THREE.AnimationMixer(luis);
                mixer.clipAction(av.animations[0]).play();
            }

            document.getElementById("loader").style.display="none";
            log("SISTEMA ONLINE");

        });

    });

}

function move(type, active){
    if(type==="forward") dir.z = active ? -1 : 0;
    if(type==="back") dir.z = active ? 1 : 0;
    if(type==="left") dir.x = active ? -1 : 0;
    if(type==="right") dir.x = active ? 1 : 0;
}

function action(type){
    log("ACTION: "+type);

    if(type==="run") speed = 0.12;
    if(type==="walk") speed = 0.05;
}

function animate(){

    requestAnimationFrame(animate);

    let delta = clock.getDelta();

    if(mixer) mixer.update(delta);
    if(cityMixer) cityMixer.update(delta);

    if(luis){
        luis.position.x += dir.x * speed;
        luis.position.z += dir.z * speed;

        // 🎯 cámara seguimiento suave
        camera.position.lerp(
            new THREE.Vector3(
                luis.position.x,
                luis.position.y + 3,
                luis.position.z + 6
            ),
            0.05
        );

        camera.lookAt(luis.position);
    }

    if(controls) controls.update();

    renderer.render(scene,camera);
}

init();
animate();

</script>

</body>
</html>
