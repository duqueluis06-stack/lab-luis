<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luis 4K: Matrix Cinematic</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --neon-glow: 0 0 20px #00ff41, 0 0 40px #003300;
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }

        /* HUD SUPERIOR */
        #top-ui {
            position: absolute; top: 20px; width: 100%; display: flex;
            justify-content: space-between; align-items: flex-start;
            padding: 0 30px; box-sizing: border-box; z-index: 1000;
        }

        /* DIÁLOGOS QUE APARECEN Y DESAPARECEN */
        #dialogue-box {
            color: var(--matrix-green);
            font-size: 24px; font-weight: 900; text-align: center;
            max-width: 60%; min-height: 50px;
            text-shadow: 2px 2px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000, var(--neon-glow);
            letter-spacing: 1px; pointer-events: none;
        }

        .exit-btn {
            background: rgba(0,0,0,0.8); border: 2px solid #ff0055;
            color: #ff0055; padding: 12px 25px; border-radius: 5px;
            font-weight: bold; text-decoration: none; font-size: 14px;
            box-shadow: 0 0 15px #ff0055; cursor: pointer; pointer-events: auto;
        }

        /* CONTROLES INFERIORES */
        #bottom-ui {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; pointer-events: none;
        }

        .joy-frame {
            width: 110px; height: 110px; border: 3px solid var(--matrix-green);
            border-radius: 50%; background: rgba(0, 255, 65, 0.1);
            box-shadow: var(--neon-glow); position: relative; pointer-events: auto;
        }

        .stick {
            width: 45px; height: 45px; background: #fff; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #fff; border: 2px solid var(--matrix-green);
        }

        #zoom-btn {
            width: 80px; height: 80px; border: 2px solid #fff; border-radius: 50%;
            background: #000; color: #fff; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px #fff; pointer-events: auto; font-size: 12px;
        }

        #loading {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; align-items: center; justify-content: center; color: var(--matrix-green);
        }
    </style>
</head>
<body>

<audio id="music" loop><source src="este-loco-mundo-dual.mp3" type="audio/mpeg"></audio>

<div id="loading"><h1>SISTEMA LUIS 4K: ONLINE</h1></div>

<div id="top-ui">
    <div style="width: 100px;"></div> <div id="dialogue-box"></div>
    <a href="index.html" class="exit-btn">SALIR</a>
</div>

<div id="bottom-ui">
    <div id="joy-l" class="joy-frame"><div id="stick-l" class="stick"></div></div>
    <button id="zoom-btn">ZOOM 4K</button>
    <div id="joy-r" class="joy-frame"><div id="stick-r" class="stick"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
/**
 * CINEMATIC ENGINE: SPIELBERG + MATRIX
 */

const dialogueText = "He entrado al sistema... Todo se ve muy raro... Hay una metacognición digital entre el mundo real y mi avatar... Soy el código en este mundo dual.";
const dialogueBox = document.getElementById('dialogue-box');

function startDialogue() {
    let i = 0;
    dialogueBox.innerHTML = "";
    const interval = setInterval(() => {
        if (i < dialogueText.length) {
            dialogueBox.innerHTML += dialogueText.charAt(i);
            i++;
        } else {
            clearInterval(interval);
            setTimeout(() => {
                dialogueBox.style.transition = "opacity 2s";
                dialogueBox.style.opacity = "0"; // Desaparece
            }, 5000);
        }
    }, 50);
}

class MatrixSpielbergEngine {
    constructor() {
        this.input = { mv: {x:0, y:0}, lk: {x:0, y:0} };
        this.isZoom = false;
        this.time = 0;
        this.init();
        this.createCables();
        this.load();
        this.events();
        this.render();
    }

    init() {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x000000, 0.15);
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.01, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domElement);

        this.scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        
        // Suelo Matrix
        const grid = new THREE.GridHelper(500, 100, 0x00ff41, 0x001100);
        this.scene.add(grid);

        this.rig = new THREE.Group();
        this.scene.add(this.rig);
        this.rig.add(this.camera);
    }

    createCables() {
        // Efecto de cables eléctricos desplazándose (Rayos de datos)
        this.cables = [];
        const mat = new THREE.LineBasicMaterial({ color: 0x00ff41 });
        for(let i=0; i<20; i++) {
            const points = [new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,20)];
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geo, mat);
            line.position.set(Math.random()*40-20, Math.random()*5, Math.random()*40-20);
            this.scene.add(line);
            this.cables.push(line);
        }
    }

    load() {
        const loader = new THREE.GLTFLoader();
        loader.load('luis-avatar2.glb', (gltf) => {
            this.avatar = gltf.scene;
            this.avatar.scale.setScalar(0.25);
            this.scene.add(this.avatar);

            // CORRECCIÓN DE BRAZOS: Forzar pose si no hay animación
            this.avatar.traverse(node => {
                if(node.isBone) {
                    if(node.name.toLowerCase().includes('arm') || node.name.toLowerCase().includes('shoulder')) {
                        node.rotation.z = node.name.includes('L') ? 1.2 : -1.2; // Baja los brazos
                    }
                }
            });

            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(gltf.animations.length > 0) this.mixer.clipAction(gltf.animations[0]).play();

            document.getElementById('loading').style.display = 'none';
            startDialogue();
        });
    }

    events() {
        const setupJoy = (id, sId, type) => {
            const el = document.getElementById(id), s = document.getElementById(sId);
            let active = false;
            const move = (e) => {
                if(!active) return;
                document.getElementById('music').play().catch(()=>{});
                const p = e.touches ? e.touches[0] : e;
                const r = el.getBoundingClientRect();
                const x = (p.clientX - (r.left + 55)) / 55, y = (p.clientY - (r.top + 55)) / 55;
                const m = Math.min(Math.sqrt(x*x+y*y), 1), a = Math.atan2(y,x);
                s.style.transform = `translate(calc(-50% + ${Math.cos(a)*m*35}px), calc(-50% + ${Math.sin(a)*m*35}px))`;
                this.input[type] = {x: Math.cos(a)*m, y: Math.sin(a)*m};
            };
            el.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchmove', move);
            window.addEventListener('touchend', () => { active = false; s.style.transform='translate(-50%,-50%)'; this.input[type]={x:0, y:0}; });
        };
        setupJoy('joy-l', 'stick-l', 'mv'); setupJoy('joy-r', 'stick-r', 'lk');
        document.getElementById('zoom-btn').onclick = () => this.isZoom = !this.isZoom;
    }

    render() {
        requestAnimationFrame(() => this.render());
        const dt = new THREE.Clock().getDelta();
        this.time += 0.05;
        if(this.mixer) this.mixer.update(0.016);

        if(this.avatar) {
            // Levitación y respiración
            this.avatar.position.y = 0.1 + Math.sin(this.time) * 0.05;

            // Movimiento
            this.avatar.position.x += this.input.mv.x * 0.12;
            this.avatar.position.z += this.input.mv.y * 0.12;
            
            if(Math.abs(this.input.mv.x) > 0.1) this.avatar.rotation.y = Math.atan2(this.input.mv.x, this.input.mv.y);

            // Cámara Spielberg
            this.rig.position.lerp(this.avatar.position, 0.1);
            this.rig.rotation.y -= this.input.lk.x * 0.04;
            const tCam = this.isZoom ? new THREE.Vector3(0, 0.45, 0.3) : new THREE.Vector3(0, 0.35, 1.5);
            this.camera.position.lerp(tCam, 0.1);
            this.camera.lookAt(new THREE.Vector3(0, this.isZoom ? 0.45 : 0.25, 0).add(this.avatar.position));

            // Cables de teletransporte
            this.cables.forEach(c => {
                c.position.z += 0.5;
                if(c.position.z > 20) c.position.z = -20;
            });
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new MatrixSpielbergEngine();
</script>
</body>
</html>
