<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quantum Reality - Final Fix PRO</title>

<style>
:root { --neon: #00f6ff; --magenta: #ff00ff; --matrix: #00ff41; }
body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }

#ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; padding: 20px; }

#btn-exit {
position: absolute; top: 25px; right: 25px; pointer-events: auto;
width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--magenta);
color: var(--magenta); background: rgba(0,0,0,0.8);
display:flex;align-items:center;justify-content:center;
box-shadow:0 0 10px var(--magenta);
text-decoration:none;font-weight:bold;
}

.joy-frame {
position:absolute; bottom:40px; width:110px;height:110px;
border:2px solid var(--neon); border-radius:50%;
background:rgba(0,246,255,0.05); pointer-events:auto;
}
#joy-l{left:30px;} #joy-r{right:30px;}

.knob{
width:45px;height:45px;background:var(--neon);
border-radius:50%;position:absolute;
top:50%;left:50%;transform:translate(-50%,-50%);
box-shadow:0 0 20px var(--neon);
}

#loader{
position:fixed;inset:0;background:#000;
display:flex;align-items:center;justify-content:center;
color:var(--neon);z-index:1000;
}
</style>
</head>

<body>

<div id="loader"><h2>CALIBRANDO...</h2></div>

<div id="ui">
<a href="index.html" id="btn-exit">EXIT</a>
<div id="joy-l" class="joy-frame"><div id="knob-l" class="knob"></div></div>
<div id="joy-r" class="joy-frame"><div id="knob-r" class="knob"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
class Engine {

constructor(){
this.input={m:{x:0,y:0},l:{x:0,y:0}};
this.state="idle";
this.init();
this.load();
this.ui();
this.loop();
}

init(){
this.scene=new THREE.Scene();
this.camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,2000);
this.renderer=new THREE.WebGLRenderer({antialias:true});
this.renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(this.renderer.domElement);

this.scene.add(new THREE.AmbientLight(0xffffff,1));

this.camBase=new THREE.Group();
this.scene.add(this.camBase);
this.camBase.add(this.camera);

this.clock=new THREE.Clock();
}

load(){
const loader=new THREE.GLTFLoader();

/* CIUDAD */
loader.load("ciudad_quantum.glb",(g)=>{
this.city=g.scene;
this.city.position.set(0,-2.2,-10); // AJUSTE SUELO
this.scene.add(this.city);
});

/* AVATAR */
loader.load("luis-avatar2.glb",(g)=>{

this.avatar=g.scene;
this.scene.add(this.avatar);

this.mixer=new THREE.AnimationMixer(this.avatar);

/* DETECCIÓN REAL */
this.anims={};
g.animations.forEach(a=>{
const n=a.name.toLowerCase();
if(n.includes("walk")||n.includes("run")) this.anims.walk=this.mixer.clipAction(a);
if(n.includes("idle")) this.anims.idle=this.mixer.clipAction(a);
});

/* fallback seguro */
if(!this.anims.idle) this.anims.idle=this.mixer.clipAction(g.animations[0]);
if(!this.anims.walk) this.anims.walk=this.mixer.clipAction(g.animations[g.animations.length-1]);

this.anims.idle.play();

document.getElementById("loader").style.display="none";
});
}

ui(){
const setup=(id,kn,move)=>{
const a=document.getElementById(id),k=document.getElementById(kn);
let active=false;

const moveFn=(e)=>{
if(!active)return;
const p=e.touches?e.touches[0]:e;
const r=a.getBoundingClientRect();
const x=(p.clientX-(r.left+55))/55;
const y=(p.clientY-(r.top+55))/55;
const m=Math.min(Math.sqrt(x*x+y*y),1);
const ang=Math.atan2(y,x);

const fx=Math.cos(ang)*m;
const fy=Math.sin(ang)*m;

k.style.transform=`translate(calc(-50% + ${fx*40}px), calc(-50% + ${fy*40}px))`;

if(move) this.input.m={x:fx,y:fy};
else this.input.l={x:fx,y:fy};
};

a.addEventListener("touchstart",()=>active=true);
window.addEventListener("touchmove",moveFn);
window.addEventListener("touchend",()=>{
active=false;
k.style.transform="translate(-50%,-50%)";
if(move)this.input.m={x:0,y:0};
else this.input.l={x:0,y:0};
});
};

setup("joy-l","knob-l",true);
setup("joy-r","knob-r",false);
}

loop(){
requestAnimationFrame(()=>this.loop());

const dt=this.clock.getDelta();
if(this.mixer) this.mixer.update(dt);

if(this.avatar){

/* VELOCIDAD DINÁMICA */
const speed = 2.5;
this.avatar.position.x += this.input.m.x * speed * dt;
this.avatar.position.z += this.input.m.y * speed * dt;

/* ROTACIÓN */
const moving=Math.abs(this.input.m.x)>0.05 || Math.abs(this.input.m.y)>0.05;

if(moving){

this.avatar.rotation.y=Math.atan2(this.input.m.x,this.input.m.y);

/* SINCRONIZACIÓN PASOS */
if(this.state!=="walk"){
this.anims.idle.fadeOut(0.2);
this.anims.walk.reset().fadeIn(0.2).play();
this.state="walk";
}

/* 🔥 clave: ajustar velocidad animación */
this.anims.walk.timeScale = 1.5;

}else{

if(this.state!=="idle"){
this.anims.walk.fadeOut(0.2);
this.anims.idle.reset().fadeIn(0.2).play();
this.state="idle";
}

}

/* CÁMARA */
this.camBase.position.copy(this.avatar.position);
this.camera.position.lerp(new THREE.Vector3(0,1.5,4),0.1);
this.camera.lookAt(this.avatar.position);

}

this.renderer.render(this.scene,this.camera);
}
}

window.onload=()=>new Engine();
</script>

</body>
</html>
