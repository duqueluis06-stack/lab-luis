<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUIS QUANTUM - FINAL</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: Arial; touch-action: none; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        .btn { 
            pointer-events: auto; width: 60px; height: 60px; background: rgba(0,255,255,0.3); 
            border: 2px solid #0ff; color: #0ff; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .controls { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: repeat(3, 62px); gap: 5px; }
        .actions { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-big { width: 80px; height: 40px; background: #f0f; border-color: #fff; color: #fff; font-size: 10px; }
        #loading { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: #0ff; }
    </style>
</head>
<body>

<div id="loading"><h1>CARGANDO...</h1></div>

<div id="ui">
    <div class="controls">
        <div></div><div class="btn" id="w">↑</div><div></div>
        <div class="btn" id="a">←</div><div class="btn" id="s">↓</div><div class="btn" id="d">→</div>
    </div>
    <div class="actions">
        <div class="btn btn-big" id="run">CORRER</div>
        <div class="btn btn-big" onclick="resetLuis()">RESCATE</div>
        <a href="index.html" class="btn btn-big" style="background:red; text-decoration:none">SALIR</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

<script>
    let scene, camera, renderer, luis, mixer, clock = new THREE.Clock();
    let move = { w:false, a:false, s:false, d:false, run:false };
    const mixers = [];

    // INICIO RÁPIDO
    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 5000);
        renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio > 1.5 ? 1.5 : window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 50, 10);
        scene.add(light);

        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
        loader.setDRACOLoader(draco);

        // CARGA CIUDAD
        loader.load('ciudad_quantum.glb', (gltf) => {
            scene.add(gltf.scene);
            if(gltf.animations.length) {
                let m = new THREE.AnimationMixer(gltf.scene);
                gltf.animations.forEach(a => m.clipAction(a).play());
                mixers.push(m);
            }
            console.log("Ciudad lista");
        }, undefined, (e) => console.error("Error ciudad"));

        // CARGA LUIS
        loader.load('luis_avatar.glb', (gltf) => {
            luis = gltf.scene;
            luis.scale.set(0.02, 0.02, 0.02); // Ajuste manual si es muy grande
            scene.add(luis);
            
            if(gltf.animations.length) {
                mixer = new THREE.AnimationMixer(luis);
                mixer.clipAction(gltf.animations[0]).play();
                mixers.push(mixer);
            }
            
            document.getElementById('loading').style.display = 'none';
            resetLuis();
        });

        setupInput();
        animate();
    }

    function setupInput() {
        const btns = ['w','a','s','d','run'];
        btns.forEach(id => {
            const el = document.getElementById(id === 'run' ? 'run' : id);
            el.addEventListener('pointerdown', () => move[id] = true);
            el.addEventListener('pointerup', () => move[id] = false);
            el.addEventListener('pointerleave', () => move[id] = false);
        });
    }

    function resetLuis() {
        if(!luis) return;
        luis.position.set(0, 0.5, 0); // Ajusta el 0.5 si se hunde
        camera.position.set(0, 10, 20);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        mixers.forEach(m => m.update(delta));

        if(luis) {
            const speed = move.run ? 0.6 : 0.2;
            const rSpeed = 0.05;

            if(move.w) luis.translateZ(speed);
            if(move.s) luis.translateZ(-speed);
            if(move.a) luis.rotation.y += rSpeed;
            if(move.d) luis.rotation.y -= rSpeed;

            // CÁMARA GTA SIMPLE (SIN BLOQUEOS)
            let offset = new THREE.Vector3(0, 6, -12);
            offset.applyQuaternion(luis.quaternion);
            camera.position.lerp(luis.position.clone().add(offset), 0.1);
            camera.lookAt(luis.position.x, luis.position.y + 2, luis.position.z);
        }
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
