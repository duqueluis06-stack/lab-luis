<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Reality - Final 4K Fix</title>
    <style>
        :root { --neon: #00f6ff; --matrix: #00ff41; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        #manifesto-zone {
            position: absolute; top: 20px; left: 20px; z-index: 90; width: 280px;
            background: rgba(0, 0, 0, 0.8); border-left: 3px solid var(--matrix);
            padding: 12px; color: var(--matrix); font-size: 12px;
        }

        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        
        .joy-frame {
            position: absolute; bottom: 40px; width: 100px; height: 100px;
            border: 2px solid var(--neon); border-radius: 50%;
            background: rgba(0,246,255,0.1); pointer-events: auto; touch-action: none;
        }
        #joy-l { left: 30px; } #joy-r { right: 30px; }
        .knob { width: 40px; height: 40px; background: var(--neon); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--neon); }

        #zoom-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid #fff;
            background: #000; color: #fff; pointer-events: auto; font-size: 10px; font-weight: bold;
        }

        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: var(--neon); }
    </style>
</head>
<body>

<div id="loader"><h2>FORZANDO MOTOR DE PIERNAS 4K...</h2></div>
<div id="manifesto-zone"><p id="typing-text">Sincronizando... Altura corregida. Posición: Avenida Central.</p></div>

<div id="ui">
    <div id="joy-l" class="joy-frame"><div id="knob-l" class="knob"></div></div>
    <button id="zoom-btn">ZOOM 4K</button>
    <div id="joy-r" class="joy-frame"><div id="knob-r" class="knob"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
class FinalQuantumEngine {
    constructor() {
        this.input = { m: {x:0, y:0}, l: {x:0, y:0} };
        this.isZoom = false;
        this.init();
        this.lights();
        this.load();
        this.ui();
        this.loop();
    }

    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domEncoding || this.renderer.domElement);
        this.clock = new THREE.Clock();
        this.camBase = new THREE.Group();
        this.scene.add(this.camBase);
        this.camBase.add(this.camera);
    }

    lights() {
        this.scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const d = new THREE.DirectionalLight(0xffffff, 1);
        d.position.set(5, 10, 7);
        this.scene.add(d);
    }

    load() {
        const gl = new THREE.GLTFLoader();
        const dr = new THREE.DRACOLoader();
        dr.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        gl.setDRACOLoader(dr);

        // CIUDAD: Ajustada para que aparezca JUSTO en la avenida frente a ti.
        gl.load('ciudad_quantum.glb', (g) => {
            this.city = g.scene;
            // Altura -0.80 para asegurar que los pies NO se entierren.
            // Z en -5 para que la ciudad no esté lejos, sino rodeándote.
            this.city.position.set(0, -0.80, -5); 
            this.scene.add(this.city);
        });

        // AVATAR: Sincronización de huesos.
        gl.load('luis-avatar2.glb', (g) => {
            this.avatar = g.scene;
            this.scene.add(this.avatar);
            this.mixer = new THREE.AnimationMixer(this.avatar);
            
            // ESCÁNER TOTAL DE ANIMACIONES:
            // Si el avatar abre los brazos, estamos usando la animación 0 (T-Pose).
            // Forzamos la búsqueda de cualquier clip que NO sea el primero.
            if(g.animations.length > 1) {
                this.walk = this.mixer.clipAction(g.animations[1]); // Generalmente caminar
                this.idle = this.mixer.clipAction(g.animations[0]);
            } else {
                this.walk = this.mixer.clipAction(g.animations[0]);
                this.idle = this.walk;
            }
            
            this.idle.play();
            document.getElementById('loader').style.display = 'none';
        });
    }

    ui() {
        const setup = (id, kn, move) => {
            const a = document.getElementById(id), k = document.getElementById(kn);
            let ok = false;
            const h = (e) => {
                if(!ok) return;
                const p = e.touches ? e.touches[0] : e;
                const r = a.getBoundingClientRect();
                const fx = (p.clientX - (r.left + 50)) / 50, fy = (p.clientY - (r.top + 50)) / 50;
                k.style.transform = `translate(calc(-50% + ${fx*30}px), calc(-50% + ${fy*30}px))`;
                if(move) this.input.m = {x: fx, y: fy}; else this.input.l = {x: fx, y: fy};
            };
            a.addEventListener('touchstart', () => ok = true);
            window.addEventListener('touchmove', h);
            window.addEventListener('touchend', () => { ok = false; k.style.transform = 'translate(-50%, -50%)'; if(move) this.input.m = {x:0, y:0}; else this.input.l = {x:0, y:0}; });
        };
        setup('joy-l', 'knob-l', true); setup('joy-r', 'knob-r', false);
        document.getElementById('zoom-btn').onclick = () => { this.isZoom = !this.isZoom; };
    }

    loop() {
        requestAnimationFrame(() => this.loop());
        const dt = this.clock.getDelta();
        if(this.mixer) this.mixer.update(dt);
        if(this.avatar) {
            const s = 0.1;
            this.avatar.position.x += this.input.m.x * s;
            this.avatar.position.z += this.input.m.y * s;
            
            const moving = Math.abs(this.input.m.x) > 0.1 || Math.abs(this.input.m.y) > 0.1;
            if(moving) {
                this.avatar.rotation.y = Math.atan2(this.input.m.x, this.input.m.y);
                if(this.walk && !this.walk.isRunning()) {
                    this.idle.stop();
                    this.walk.play();
                }
            } else {
                if(this.idle && !this.idle.isRunning()) {
                    this.walk.stop();
                    this.idle.play();
                }
            }

            this.camBase.position.copy(this.avatar.position);
            this.camBase.rotation.y -= this.input.l.x * 0.05;
            const tP = this.isZoom ? new THREE.Vector3(0, 1.6, 1) : new THREE.Vector3(0, 1.2, 4);
            this.camera.position.lerp(tP, 0.1);
            this.camera.lookAt(new THREE.Vector3(0, 1, 0).add(this.avatar.position));
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new FinalQuantumEngine();
</script>
</body>
</html>
