<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Reality - 4K Solid Fix</title>
    <style>
        :root { --neon: #00f6ff; --matrix: #00ff41; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        
        #manifesto {
            position: absolute; top: 20px; left: 20px; width: 250px;
            background: rgba(0,0,0,0.8); border-left: 3px solid var(--matrix);
            padding: 10px; color: var(--matrix); font-size: 12px;
        }

        .joystick {
            position: absolute; bottom: 40px; width: 100px; height: 100px;
            border: 2px solid var(--neon); border-radius: 50%;
            background: rgba(0,246,255,0.05); pointer-events: auto;
        }
        #joy-left { left: 30px; } #joy-right { right: 30px; }
        .knob { 
            width: 40px; height: 40px; background: var(--neon); border-radius: 50%; 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--neon);
        }

        #btn-zoom {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid #fff;
            background: rgba(0,0,0,0.9); color: #fff; pointer-events: auto;
            font-size: 10px; font-weight: bold; cursor: pointer;
        }

        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon); }
    </style>
</head>
<body>

<div id="loader"><h2>ESTABILIZANDO RENDER 4K...</h2><p>Corrigiendo altura de asfalto...</p></div>
<div id="manifesto"><b>SISTEMA LUIS 4K</b><br>Colisiones visuales activas.<br>Altura: Nivel Calle.</div>

<div id="ui-layer">
    <div id="joy-left" class="joystick"><div id="knob-l" class="knob"></div></div>
    <button id="btn-zoom">ZOOM<br>ROSTRO</button>
    <div id="joy-right" class="joystick"><div id="knob-r" class="knob"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
class SolidEngine {
    constructor() {
        this.move = { x: 0, y: 0 };
        this.look = { x: 0, y: 0 };
        this.isZoom = false;
        this.init();
        this.lights();
        this.load();
        this.setupControls();
        this.render();
    }

    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(this.renderer.domElement);
        
        this.clock = new THREE.Clock();
        this.container = new THREE.Group();
        this.scene.add(this.container);
        this.container.add(this.camera);
    }

    lights() {
        this.scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        this.spot = new THREE.PointLight(0xffffff, 2, 10);
        this.scene.add(this.spot);
    }

    load() {
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);

        // CIUDAD: Ajuste para evitar encastramiento inicial
        loader.load('ciudad_quantum.glb', (g) => {
            this.city = g.scene;
            // Movida 15m para nacer en calle abierta y -0.25 para salvar tobillos
            this.city.position.set(-15, -0.25, -10); 
            this.scene.add(this.city);
        });

        loader.load('luis-avatar2.glb', (g) => {
            this.avatar = g.scene;
            this.scene.add(this.avatar);
            this.mixer = new THREE.AnimationMixer(this.avatar);
            
            // Forzar detección de piernas (animación 1 o última)
            if(g.animations.length > 0) {
                this.idle = this.mixer.clipAction(g.animations[0]);
                this.walk = this.mixer.clipAction(g.animations[g.animations.length - 1]);
                this.idle.play();
            }
            document.getElementById('loader').style.display = 'none';
        });
    }

    setupControls() {
        const handle = (id, kn, isMove) => {
            const el = document.getElementById(id), k = document.getElementById(kn);
            let active = false;
            const move = (e) => {
                if(!active) return;
                const p = e.touches ? e.touches[0] : e;
                const r = el.getBoundingClientRect();
                const x = (p.clientX - (r.left + 50)) / 50;
                const y = (p.clientY - (r.top + 50)) / 50;
                k.style.transform = `translate(calc(-50% + ${x*30}px), calc(-50% + ${y*30}px))`;
                if(isMove) this.move = {x, y}; else this.look = {x, y};
            };
            el.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchmove', move);
            window.addEventListener('touchend', () => { 
                active = false; k.style.transform = 'translate(-50%, -50%)';
                if(isMove) this.move = {x:0, y:0}; else this.look = {x:0, y:0};
            });
        };
        handle('joy-left', 'knob-l', true);
        handle('joy-right', 'knob-r', false);
        document.getElementById('btn-zoom').onclick = () => this.isZoom = !this.isZoom;
    }

    render() {
        requestAnimationFrame(() => this.render());
        const delta = this.clock.getDelta();
        if(this.mixer) this.mixer.update(delta);

        if(this.avatar) {
            // Movimiento "Sólido"
            const speed = 0.12;
            this.avatar.position.x += this.move.x * speed;
            this.avatar.position.z += this.move.y * speed;

            const isMoving = Math.abs(this.move.x) > 0.1 || Math.abs(this.move.y) > 0.1;
            if(isMoving) {
                this.avatar.rotation.y = Math.atan2(this.move.x, this.move.y);
                if(!this.walk.isRunning()) { this.idle.stop(); this.walk.play(); }
            } else {
                if(!this.idle.isRunning()) { this.walk.stop(); this.idle.play(); }
            }

            // Cámara tipo Skate (Seguimiento suave)
            this.container.position.lerp(this.avatar.position, 0.1);
            this.container.rotation.y -= this.look.x * 0.04;

            const targetCam = this.isZoom ? new THREE.Vector3(0, 1.72, 0.5) : new THREE.Vector3(0, 1.3, 3.5);
            this.camera.position.lerp(targetCam, 0.1);
            this.camera.lookAt(new THREE.Vector3(0, this.isZoom ? 1.72 : 1, 0).add(this.avatar.position));

            // Luz 4K frontal
            this.spot.position.set(this.avatar.position.x, 2, this.avatar.position.z + 1);
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new SolidEngine();
</script>
</body>
</html>
