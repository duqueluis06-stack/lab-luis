<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Connection - Fidelity Build</title>
    <style>
        :root { --neon-cyan: #00f6ff; --neon-magenta: #ff00ff; --matrix-green: #00ff41; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        
        /* Contenedor del Mensaje tipo "Terminal" */
        #manifesto-zone {
            position: absolute; top: 100px; left: 20px; z-index: 90;
            max-width: 350px; pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--matrix-green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
            padding: 15px; border-radius: 5px;
        }

        /* Texto Verde Neón Letra por Letra */
        #typing-text {
            color: var(--matrix-green);
            text-shadow: 1px 1px 1px #000, 0 0 10px var(--matrix-green);
            font-size: 13px; font-family: 'Courier New', monospace;
            letter-spacing: 1px; line-height: 1.5; margin: 0;
        }
        /* Cursor parpadeante opcional al final */
        #cursor {
            display: inline-block; width: 8px; height: 13px;
            background: var(--matrix-green); margin-left: 2px;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* UI HUD Neón RGB Pulido */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; }
        
        .neon-btn {
            pointer-events: auto; background: rgba(0,0,0,0.85); border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 12px 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px var(--neon-cyan); text-transform: uppercase; transition: 0.2s ease-out;
            text-decoration: none; text-align: center; font-size: 13px; letter-spacing: 1.5px;
        }
        .neon-btn:active { transform: scale(0.95); box-shadow: 0 0 30px var(--neon-cyan); }
        
        /* Botón Salir Magenta */
        #btn-exit { border-color: var(--neon-magenta); color: var(--neon-magenta); box-shadow: 0 0 15px var(--neon-magenta); align-self: flex-end; }

        /* Controles Inferiores */
        #controls-row { display: flex; justify-content: space-between; align-items: flex-end; }
        #joy-base { width: 150px; height: 150px; border-radius: 50%; border: 2px dashed rgba(0, 246, 255, 0.4); position: relative; display: flex; align-items: center; justify-content: center; background: rgba(0,246,255,0.02); }
        #joy-knob { width: 65px; height: 65px; background: var(--neon-cyan); border-radius: 50%; box-shadow: 0 0 25px var(--neon-cyan); position: absolute; outline: none; border: none; }
        
        /* Botón ZOOM 4K */
        #zoom-btn { width: 95px; height: 95px; border-radius: 50%; border-color: #fff; color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.3); font-size: 13px; }
        #zoom-btn.active { background: #fff; color: #000; box-shadow: 0 0 40px #fff; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: var(--neon-cyan); }
    </style>
</head>
<body>

<div id="loader">
    <h2 style="letter-spacing: 5px; text-transform: uppercase;">Renderizando Fotorrealismo 4K</h2>
</div>

<div id="manifesto-zone">
    <p id="typing-text"></p><span id="cursor"></span>
</div>

<div id="ui">
    <div id="top-zone">
        <a href="index.html" id="btn-exit" class="neon-btn">SALIR AL INICIO</a>
    </div>

    <div id="controls-row">
        <div id="joy-base"><div id="joy-knob" class="neon-btn"></div></div>
        <button id="zoom-btn" class="neon-btn">ZOOM<br>DETALLE</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://www.gstatic.com/draco/versioned/decoders/1.4.1/draco_decoder.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
class QuantumMatrixPro {
    constructor() {
        this.init();
        this.lights();
        this.loadAssets();
        this.controls();
        this.animate();
    }

    init() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000003);
        
        this.camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.01, 2000);
        this.camera.position.set(0, 1.2, 3.8);

        // --- CONFIGURACIÓN DE ALTA FIDELIDAD ---
        // Desactivamos antialias para máxima nitidez de texturas fotorrealistas
        this.renderer = new THREE.WebGLRenderer({ antialias: false, logarithmicDepthBuffer: true, powerPreference: "high-performance" });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        
        // Forzamos pixel ratio 2.0 en móviles (Simulación 4K)
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0));
        
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure = 1.35; // Brillo óptimo para texturas de piel
        this.renderer.physicallyCorrectLights = true; 
        
        document.body.appendChild(this.renderer.domElement);
        this.clock = new THREE.Clock();
    }

    lights() {
        // 1. Luz Ambiental (Relleno)
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // 2. Luz de Estudio Principal (Key Light) - Resalta detalles faciales
        this.keyLight = new THREE.DirectionalLight(0xfff0dd, 1.4); 
        this.keyLight.position.set(2, 3, 4);
        this.keyLight.castShadow = true;
        this.scene.add(this.keyLight);
        
        // 3. Luz de Zoom Facial ( Point Light )
        this.faceLight = new THREE.PointLight(0xffffff, 0, 4);
        this.faceLight.position.set(0, 1.65, 0.8);
        this.scene.add(this.faceLight);

        // 4. Rim Light Cyan - Separa el avatar del fondo y resalta contornos
        const rim = new THREE.PointLight(0x00f6ff, 1.8, 12);
        rim.position.set(-3, 3, -2);
        this.scene.add(rim);
    }

    loadAssets() {
        const loader = new THREE.GLTFLoader();
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(dracoLoader);

        // Cargar Ciudad Draco
        loader.load('ciudad_quantum.glb', (glb) => {
            this.city = glb.scene;
            this.city.position.set(0, -0.1, -12); // Bajada y alejada para el encuadre
            this.scene.add(this.city);
            // Asegurar visibilidad total de texturas Draco
            this.city.traverse(n => { if(n.isMesh) { n.material.side = THREE.DoubleSide; n.material.depthWrite = true; } });
        }, undefined, (e) => console.error("Error Draco Ciudad:", e));

        // Cargar Avatar Fotorrealista IA
        loader.load('luis-avatar2.glb', (glb) => {
            this.avatar = glb.scene;
            this.avatar.position.set(0, 0, 0); // Pies en el origen
            this.scene.add(this.avatar);
            
            // Habilitar sombras en el avatar para matices
            this.avatar.traverse(child => { if(child.isMesh) { child.castShadow = true; child.receiveShadow = true; } });

            // Animación Automática (Idle)
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(glb.animations.length > 0) {
                this.mixer.clipAction(glb.animations[0]).play();
            }
            
            document.getElementById('loader').style.display = 'none';
            // Iniciar escritura del mensaje tras cargar
            this.startTypingEffect();
        }, undefined, (e) => {
            document.getElementById('loader').innerHTML = "<h2>Error: Asegúrate de que luis-avatar2.glb esté en la carpeta.</h2>";
        });
    }

    startTypingEffect() {
        const fullText = "Ya estoy adentro. Estoy observando cómo pasa el mundo digital... son las primeras pruebas de una nueva realidad.";
        const speed = 40; // Velocidad de escritura en ms (más bajo = más rápido)
        const textElement = document.getElementById('typing-text');
        const cursor = document.getElementById('cursor');
        let index = 0;

        const type = () => {
            if (index < fullText.length) {
                textElement.innerHTML += fullText.charAt(index);
                index++;
                setTimeout(type, speed);
            } else {
                // El texto ha terminado de escribirse. El cursor puede parpadear indefinidamente.
            }
        };
        
        type();
    }

    controls() {
        this.rotY = 0; this.active = false; this.isZoom = false;
        const knob = document.getElementById('joy-knob');
        const joy = document.getElementById('joy-base');

        const move = (e) => {
            if(!this.active) return;
            const t = e.touches ? e.touches[0] : e;
            const r = joy.getBoundingClientRect();
            const centerX = r.left + r.width/2;
            
            // Rotación Analógica Suave (Eje Y)
            const dx = t.clientX - centerX;
            const dist = Math.min(Math.abs(dx), 60);
            const sign = Math.sign(dx);

            knob.style.transform = `translate(calc(-50% + ${sign*dist}px), -50%)`;
            this.rotY = sign * (dist/60) * this.config.rotationSpeed || 0.05;
        };

        joy.addEventListener('touchstart', () => this.active = true, { passive: true });
        window.addEventListener('touchmove', move);
        window.addEventListener('touchend', () => { 
            this.active = false; 
            knob.style.transform = 'translate(-50%, -50%)'; 
            this.rotY = 0; 
        });

        const zBtn = document.getElementById('zoom-btn');
        zBtn.ontouchstart = (e) => { e.preventDefault(); this.isZoom = true; zBtn.classList.add('active'); };
        zBtn.ontouchend = () => { this.isZoom = false; zBtn.classList.remove('active'); };
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const dt = this.clock.getDelta();
        if(this.mixer) this.mixer.update(dt);

        if(this.avatar) {
            this.avatar.rotation.y += this.rotY;
            
            // Lógica de Cámara: Cuerpo Completo vs Rostro 4K
            const targetPos = this.isZoom ? new THREE.Vector3(0, 1.66, 0.7) : new THREE.Vector3(0, 1.0, 3.8);
            const targetLook = this.isZoom ? new THREE.Vector3(0, 1.66, 0) : new THREE.Vector3(0, 1.0, 0);
            
            this.camera.position.lerp(targetPos, 0.08); // Suavizado Lerp
            this.camera.lookAt(targetLook); // lookAt directo para máxima precisión
            
            // Activar luz de relleno facial durante el zoom
            this.faceLight.intensity = this.isZoom ? 1.5 : 0;
        }
        this.renderer.render(this.scene, this.camera);
    }
}

// LANZAMIENTO
window.onload = () => new QuantumMatrixPro();
</script>
</body>
</html>
