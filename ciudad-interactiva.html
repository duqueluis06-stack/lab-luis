<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocolo Luis: Mundo Dual</title>
    <style>
        :root {
            --m-green: #00ff41;
            --n-cyan: #00f6ff;
            --n-pink: #ff00ff;
            --glass: rgba(0, 20, 0, 0.85);
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: var(--m-green); }

        /* HUD Superior */
        #hud-top {
            position: absolute; top: 0; left: 0; width: 100%; display: flex;
            justify-content: space-between; padding: 25px; box-sizing: border-box; z-index: 100; pointer-events: none;
        }

        .terminal-panel {
            padding: 15px; background: var(--glass); border: 1px solid var(--m-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4); pointer-events: auto;
        }

        #typing-box { width: 320px; font-size: 12px; line-height: 1.4; }

        .sys-info { text-align: right; }
        #clock { font-size: 22px; color: var(--n-cyan); text-shadow: 0 0 10px var(--n-cyan); margin-bottom: 8px; }

        .btn-neon-exit {
            display: inline-block; padding: 10px 25px; border: 2px solid var(--n-pink);
            color: var(--n-pink); text-decoration: none; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; font-size: 12px;
            box-shadow: 0 0 10px var(--n-pink); transition: 0.3s; cursor: pointer;
        }
        .btn-neon-exit:hover { background: var(--n-pink); color: #000; box-shadow: 0 0 25px var(--n-pink); }

        /* UI Inferior */
        #ui-controls {
            position: absolute; bottom: 40px; left: 0; width: 100%;
            display: flex; justify-content: space-around; align-items: center; z-index: 110; pointer-events: none;
        }

        .joy-container {
            width: 130px; height: 130px; border: 2px solid var(--m-green);
            border-radius: 50%; background: rgba(0, 255, 65, 0.05);
            box-shadow: inset 0 0 20px var(--m-green); pointer-events: auto; position: relative;
        }
        .joy-stick {
            width: 55px; height: 55px; background: var(--m-green); border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 30px var(--m-green); border: 2px solid #fff;
        }

        #zoom-trigger {
            width: 85px; height: 85px; border: 2px solid #fff; border-radius: 50%;
            background: rgba(0,0,0,0.9); color: #fff; font-weight: bold;
            box-shadow: 0 0 15px #fff; cursor: pointer; pointer-events: auto;
            display: flex; align-items: center; justify-content: center; font-size: 11px;
        }

        /* Canvas de Lluvia Matrix */
        #matrix-bg { position: fixed; inset: 0; z-index: 1; opacity: 0.2; pointer-events: none; }

        #loading {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader-text { margin-bottom: 20px; letter-spacing: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<audio id="bg-music" loop>
    <source src="este-loco-mundo-dual.mp3" type="audio/mpeg">
</audio>

<div id="loading">
    <div class="loader-text">SINCRONIZANDO CONSCIENCIA...</div>
    <div style="width: 200px; height: 2px; background: #111;">
        <div id="progress" style="width: 0%; height: 100%; background: var(--m-green); box-shadow: 0 0 10px var(--m-green);"></div>
    </div>
</div>

<div id="hud-top">
    <div class="terminal-panel" id="typing-box">> INICIANDO SESIÓN...<br></div>
    <div class="sys-info">
        <div id="clock">00:00:00</div>
        <a href="index.html" class="btn-neon-exit">EXIT_SYSTEM</a>
    </div>
</div>

<div id="ui-controls">
    <div id="joy-l" class="joy-container"><div id="stick-l" class="joy-stick"></div></div>
    <button id="zoom-trigger">REVELAR<br>ROSTRO</button>
    <div id="joy-r" class="joy-container"><div id="stick-r" class="joy-stick"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
/**
 * MOTOR DE REALIDAD DUAL - LUIS AVATAR PRO
 */

// 1. LLUVIA MATRIX (FONDO)
const canvas = document.getElementById('matrix-bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const chars = "01010101010101010101010101010101";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function matrixEffect() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0f0';
    ctx.font = fontSize + 'px monospace';
    drops.forEach((y, i) => {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}
setInterval(matrixEffect, 35);

// 2. RELOJ Y TERMINAL
function updateClock() {
    const d = new Date();
    document.getElementById('clock').innerText = d.toTimeString().split(' ')[0];
}
setInterval(updateClock, 1000);

const introText = "He entrado al sistema. Se ve muy raro... hay una metacognición digital entre el mundo real, mi yo real y mi avatar. Soy el código en este loco mundo dual.";
let charIdx = 0;
function typeWriter() {
    if (charIdx < introText.length) {
        document.getElementById('typing-box').innerHTML += introText.charAt(charIdx);
        charIdx++;
        setTimeout(typeWriter, 40);
    }
}

// 3. MOTOR THREE.JS
class WorldDualEngine {
    constructor() {
        this.input = { move: {x:0, y:0}, look: {x:0, y:0} };
        this.zoom = false;
        this.time = 0;
        this.init();
        this.load();
        this.bind();
        this.loop();
    }

    init() {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x000500, 0.1);
        this.camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domElement);

        this.scene.add(new THREE.AmbientLight(0xffffff, 1.8));
        
        // Suelo Matrix
        const grid = new THREE.GridHelper(400, 80, 0x00ff41, 0x001100);
        this.scene.add(grid);

        this.rig = new THREE.Group();
        this.scene.add(this.rig);
        this.rig.add(this.camera);
    }

    load() {
        const loader = new THREE.GLTFLoader();
        loader.load('luis-avatar2.glb', (g) => {
            this.avatar = g.scene;
            this.avatar.scale.setScalar(0.26);
            this.scene.add(this.avatar);
            
            // Luz puntual para el rostro 4K
            this.faceLight = new THREE.PointLight(0x00f6ff, 2, 3);
            this.scene.add(this.faceLight);

            document.getElementById('progress').style.width = "100%";
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                typeWriter();
            }, 600);
        });
    }

    bind() {
        const setupJoy = (id, stickId, move) => {
            const el = document.getElementById(id), st = document.getElementById(stickId);
            let active = false;
            const start = () => { 
                active = true; 
                // ACTIVAR AUDIO AL PRIMER TOQUE
                document.getElementById('bg-music').play().catch(()=>{});
            };
            const moveEv = (e) => {
                if(!active) return;
                const p = e.touches ? e.touches[0] : e;
                const r = el.getBoundingClientRect();
                const x = (p.clientX - (r.left + 65)) / 65, y = (p.clientY - (r.top + 65)) / 65;
                const m = Math.min(Math.sqrt(x*x+y*y), 1), ang = Math.atan2(y, x);
                const fx = Math.cos(ang)*m, fy = Math.sin(ang)*m;
                st.style.transform = `translate(calc(-50% + ${fx*40}px), calc(-50% + ${fy*40}px))`;
                if(move) this.input.move = {x:fx, y:fy}; else this.input.look = {x:fx, y:fy};
            };
            el.addEventListener('touchstart', start);
            window.addEventListener('touchmove', moveEv);
            window.addEventListener('touchend', () => { active = false; st.style.transform = 'translate(-50%, -50%)'; if(move) this.input.move={x:0, y:0}; else this.input.look={x:0, y:0}; });
        };
        setupJoy('joy-l', 'stick-l', true); setupJoy('joy-r', 'stick-r', false);
        document.getElementById('zoom-trigger').onclick = () => this.zoom = !this.zoom;
    }

    loop() {
        requestAnimationFrame(() => this.loop());
        this.time += 0.05;

        if(this.avatar) {
            // EFECTO LEVITACIÓN (Compensación de falta de huesos)
            this.avatar.position.y = 0.15 + Math.sin(this.time) * 0.05;
            this.avatar.rotation.z = Math.sin(this.time * 0.5) * 0.02;

            // Movimiento
            this.avatar.position.x += this.input.move.x * 0.12;
            this.avatar.position.z += this.input.move.y * 0.12;

            if(Math.abs(this.input.move.x) > 0.1 || Math.abs(this.input.move.y) > 0.1) {
                const angle = Math.atan2(this.input.move.x, this.input.move.y);
                this.avatar.rotation.y = THREE.MathUtils.lerp(this.avatar.rotation.y, angle, 0.1);
            }

            // Cámara
            this.rig.position.lerp(this.avatar.position, 0.1);
            this.rig.rotation.y -= this.input.look.x * 0.04;

            const tPos = this.zoom ? new THREE.Vector3(0, 0.42, 0.25) : new THREE.Vector3(0, 0.3, 1.4);
            this.camera.position.lerp(tPos, 0.1);
            this.camera.lookAt(new THREE.Vector3(0, this.zoom ? 0.42 : 0.2, 0).add(this.avatar.position));
            
            if(this.faceLight) this.faceLight.position.copy(this.avatar.position).add(new THREE.Vector3(0, 0.4, 0.3));
        }
        this.renderer.render(this.scene, this.camera);
    }
}

window.onload = () => new WorldDualEngine();
</script>
</body>
</html>
