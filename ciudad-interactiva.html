<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum City v2.0 - Three.js r128</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }

        /* INTERFAZ NEÓN RGB */
        #ui-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        .neon-ui {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00f6ff;
            color: #00f6ff;
            box-shadow: 0 0 15px #00f6ff, inset 0 0 10px #00f6ff;
            text-transform: uppercase;
        }
        #btn-exit {
            position: absolute; top: 20px; right: 20px;
            padding: 12px 25px; border-color: #ff00ff; color: #ff00ff;
            box-shadow: 0 0 15px #ff00ff; cursor: pointer;
        }

        /* CONTROLES TÁCTILES */
        #joystick-zone {
            position: absolute; bottom: 50px; left: 50px;
            width: 150px; height: 150px; border-radius: 50%;
            background: rgba(0, 246, 255, 0.1);
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%;
            width: 60px; height: 60px; border-radius: 50%;
            background: #00f6ff; transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #00f6ff;
        }
        #action-zone {
            position: absolute; bottom: 60px; right: 50px;
            display: flex; gap: 20px;
        }
        .action-btn {
            width: 80px; height: 80px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer;
        }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #0ff; display: flex;
            align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>

<div id="loading-screen">CARGANDO SISTEMA QUANTUM...</div>

<div id="ui-wrapper">
    <button id="btn-exit" class="neon-ui" onclick="window.location.href='index.html'">SALIR</button>
    
    <div id="joystick-zone" class="neon-ui">
        <div id="joystick-knob"></div>
    </div>

    <div id="action-zone">
        <div id="walk-btn" class="neon-ui action-btn" style="opacity: 0.5;">WALK</div>
        <div id="run-btn" class="neon-ui action-btn">RUN</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
    /** * CONFIGURACIÓN GLOBAL
     */
    let scene, camera, renderer, clock, mixer;
    let avatar, city;
    let joystickActive = false;
    let moveState = { x: 0, y: 0, running: false };
    
    const MOVEMENT_SPEED = { walk: 0.15, run: 0.4 };
    const ROTATION_SPEED = 0.15;

    init();

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        // Cámara estilo GTA
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputEncoding = THREE.sRGBEncoding; // Crucial para ver texturas GLB correctamente
        document.body.appendChild(renderer.domElement);

        // Luces para asegurar visibilidad
        const hLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(hLight);
        
        const dLight = new THREE.DirectionalLight(0x00ffff, 1.5);
        dLight.position.set(10, 20, 10);
        scene.add(dLight);

        const loader = new THREE.GLTFLoader();

        // CARGA DE CIUDAD
        loader.load('ciudad_quantum.glb', (gltf) => {
            city = gltf.scene;
            scene.add(city);
            // Si la ciudad no aparece, puede ser por la escala. 
            // Descomenta la siguiente línea si sabes que es gigante:
            // city.scale.set(0.1, 0.1, 0.1);
            checkLoadStatus();
        }, undefined, (e) => console.error("Error Ciudad:", e));

        // CARGA DE AVATAR
        loader.load('luis-avatar2.glb', (gltf) => {
            avatar = gltf.scene;
            scene.add(avatar);
            
            // Animación
            mixer = new THREE.AnimationMixer(avatar);
            if (gltf.animations.length > 0) {
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
            }
            
            avatar.position.set(0, 0, 0);
            checkLoadStatus();
        }, undefined, (e) => console.error("Error Avatar:", e));

        setupJoystick();
        animate();
    }

    function checkLoadStatus() {
        if(city && avatar) {
            document.getElementById('loading-screen').style.display = 'none';
        }
    }

    function setupJoystick() {
        const zone = document.getElementById('joystick-zone');
        const knob = document.getElementById('joystick-knob');
        const rect = zone.getBoundingClientRect();
        const center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };

        const handleMove = (e) => {
            if(!joystickActive) return;
            const touch = e.touches[0];
            const dx = touch.clientX - center.x;
            const dy = touch.clientY - center.y;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 60);
            const angle = Math.atan2(dy, dx);

            knob.style.left = `calc(50% + ${Math.cos(angle) * dist}px)`;
            knob.style.top = `calc(50% + ${Math.sin(angle) * dist}px)`;

            moveState.x = Math.cos(angle) * (dist / 60);
            moveState.y = Math.sin(angle) * (dist / 60);
        };

        zone.addEventListener('touchstart', (e) => { joystickActive = true; handleMove(e); });
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', () => {
            joystickActive = false;
            knob.style.left = '50%'; knob.style.top = '50%';
            moveState.x = 0; moveState.y = 0;
        });

        document.getElementById('run-btn').onclick = () => {
            moveState.running = true;
            document.getElementById('run-btn').style.opacity = '1';
            document.getElementById('walk-btn').style.opacity = '0.5';
        };
        document.getElementById('walk-btn').onclick = () => {
            moveState.running = false;
            document.getElementById('walk-btn').style.opacity = '1';
            document.getElementById('run-btn').style.opacity = '0.5';
        };
    }

    function updateCharacter(delta) {
        if (!avatar) return;

        const currentSpeed = moveState.running ? MOVEMENT_SPEED.run : MOVEMENT_SPEED.walk;
        
        // Solo mover si hay input del joystick
        if (Math.abs(moveState.x) > 0.1 || Math.abs(moveState.y) > 0.1) {
            // Mover en X y Z
            avatar.position.x += moveState.x * currentSpeed;
            avatar.position.z += moveState.y * currentSpeed;

            // Rotación suave hacia la dirección de movimiento
            const targetRotation = Math.atan2(-moveState.x, -moveState.y);
            let diff = targetRotation - avatar.rotation.y;
            // Normalizar ángulo
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            avatar.rotation.y += diff * ROTATION_SPEED;

            // Actualizar animación solo si se mueve
            if (mixer) mixer.update(delta);
        }
    }

    function updateCamera() {
        if (!avatar) return;
        
        // Configuración de Tercera Persona: 4 unidades arriba, 8 atrás
        const relativeCameraOffset = new THREE.Vector3(0, 4, 8);
        const cameraOffset = relativeCameraOffset.applyMatrix4(avatar.matrixWorld);

        camera.position.x = THREE.MathUtils.lerp(camera.position.x, cameraOffset.x, 0.1);
        camera.position.y = THREE.MathUtils.lerp(camera.position.y, cameraOffset.y, 0.1);
        camera.position.z = THREE.MathUtils.lerp(camera.position.z, cameraOffset.z, 0.1);
        
        camera.lookAt(avatar.position.x, avatar.position.y + 1.5, avatar.position.z);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        
        updateCharacter(delta);
        updateCamera();
        
        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
