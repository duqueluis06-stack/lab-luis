<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Reality - Ultra 4K Fix</title>
    <style>
        :root { --neon: #00f6ff; --matrix: #00ff41; --magenta: #ff00ff; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        #manifesto-zone {
            position: absolute; top: 20px; left: 20px; z-index: 90; width: 280px;
            background: rgba(0, 0, 0, 0.9); border-left: 3px solid var(--matrix);
            padding: 12px; color: var(--matrix); font-size: 11px; pointer-events: none;
        }

        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        
        .joy-frame {
            position: absolute; bottom: 40px; width: 100px; height: 100px;
            border: 2px solid var(--neon); border-radius: 50%;
            background: rgba(0,246,255,0.1); pointer-events: auto; touch-action: none;
        }
        #joy-l { left: 30px; } #joy-r { right: 30px; }
        .knob { width: 42px; height: 42px; background: var(--neon); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px var(--neon); border: 2px solid #fff; }

        #zoom-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--magenta);
            background: rgba(0,0,0,0.9); color: var(--magenta); pointer-events: auto; font-size: 10px; font-weight: bold;
            box-shadow: 0 0 20px var(--magenta); cursor: pointer; text-align: center;
        }

        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: var(--neon); }
    </style>
</head>
<body>

<div id="loader"><h2>RENDERIZANDO TEXTURAS 4K...</h2></div>
<div id="manifesto-zone"><p id="typing-text">Sincronización Óptica 4K... <br>Ajustando Gravedad de la Avenida... <br>Luis Online.</p></div>

<div id="ui">
    <div id="joy-l" class="joy-frame"><div id="knob-l" class="knob"></div></div>
    <button id="zoom-btn">ZOOM<br>FACIAL 4K</button>
    <div id="joy-r" class="joy-frame"><div id="knob-r" class="knob"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
class UltraMasterEngine {
    constructor() {
        this.input = { m: {x:0, y:0}, l: {x:0, y:0} };
        this.isZoom = false;
        this.init();
        this.lights();
        this.load();
        this.ui();
        this.loop();
    }

    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.05, 1000);
        
        // MOTOR 4K: Antialias y High Power Preference
        this.renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            powerPreference: "high-performance",
            precision: "highp"
        });
        
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        // Esto fuerza la nitidez 4K en pantallas modernas
        this.renderer.setPixelRatio(window.devicePixelRatio > 1 ? 2 : 1);
        
        // MEJORA DE COLOR Y NITIDEZ
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure = 1.2;
        
        document.body.appendChild(this.renderer.domElement);
        this.clock = new THREE.Clock();
        this.camBase = new THREE.Group();
        this.scene.add(this.camBase);
        this.camBase.add(this.camera);
    }

    lights() {
        this.scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const d = new THREE.DirectionalLight(0xffffff, 1.3);
        d.position.set(2, 5, 2);
        this.scene.add(d);
    }

    load() {
        const gl = new THREE.GLTFLoader();
        const dr = new THREE.DRACOLoader();
        dr.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        gl.setDRACOLoader(dr);

        // CIUDAD: Bajada a -5.5 para aterrizar el avatar y movida a la izquierda (-10) para centrar la avenida
        gl.load('ciudad_quantum.glb', (g) => {
            this.city = g.scene;
            this.city.position.set(-10, -5.5, 0); 
            this.scene.add(this.city);
        });

        // AVATAR: Optimizado para rostro nítido
        gl.load('luis-avatar2.glb', (g) => {
            this.avatar = g.scene;
            this.scene.add(this.avatar);
            this.mixer = new THREE.AnimationMixer(this.avatar);
            
            // Búsqueda de animaciones por índice para evitar brazos quietos
            if(g.animations.length > 0) {
                this.idleAction = this.mixer.clipAction(g.animations[0]);
                // Intentamos usar la animación 1 o la última para caminar
                const walkIdx = g.animations.length > 1 ? 1 : 0;
                this.walkAction = this.mixer.clipAction(g.animations[walkIdx]);
                this.idleAction.play();
            }
            
            document.getElementById('loader').style.display = 'none';
        });
    }

    ui() {
        const setup = (id, kn, move) => {
            const a = document.getElementById(id), k = document.getElementById(kn);
            let ok = false;
            const h = (e) => {
                if(!ok) return;
                const p = e.touches ? e.touches[0] : e;
                const r = a.getBoundingClientRect();
                const fx = (p.clientX - (r.left + 50)) / 50, fy = (p.clientY - (r.top + 50)) / 50;
                k.style.transform = `translate(calc(-50% + ${fx*30}px), calc(-50% + ${fy*30}px))`;
                if(move) this.input.m = {x: fx, y: fy}; else this.input.l = {x: fx, y: fy};
            };
            a.addEventListener('touchstart', () => ok = true);
            window.addEventListener('touchmove', h);
            window.addEventListener('touchend', () => { 
                ok = false; k.style.transform = 'translate(-50%, -50%)'; 
                if(move) this.input.m = {x:0, y:0}; else this.input.l = {x:0, y:0}; 
            });
        };
        setup('joy-l', 'knob-l', true); setup('joy-r', 'knob-r', false);
        document.getElementById('zoom-btn').onclick = () => { this.isZoom = !this.isZoom; };
    }

    loop() {
        requestAnimationFrame(() => this.loop());
        const dt = this.clock.getDelta();
        if(this.mixer) this.mixer.update(dt);
        
        if(this.avatar) {
            const speed = 0.12; // Un poco más rápido para la avenida
            this.avatar.position.x += this.input.m.x * speed;
            this.avatar.position.z += this.input.m.y * speed;
            
            const moving = Math.abs(this.input.m.x) > 0.1 || Math.abs(this.input.m.y) > 0.1;
            
            if(moving) {
                this.avatar.rotation.y = Math.atan2(this.input.m.x, this.input.m.y);
                if(this.walkAction && !this.walkAction.isRunning()) {
                    this.idleAction.stop();
                    this.walkAction.play();
                }
            } else {
                if(this.idleAction && !this.idleAction.isRunning()) {
                    this.walkAction.stop();
                    this.idleAction.play();
                }
            }

            this.camBase.position.copy(this.avatar.position);
            this.camBase.rotation.y -= this.input.l.x * 0.05;
            
            // ZOOM AL ROSTRO 4K (Altura 1.75 directa al ojo)
            const tP = this.isZoom ? new THREE.Vector3(0, 1.75, 0.5) : new THREE.Vector3(0, 1.2, 3.8);
            this.camera.position.lerp(tP, 0.1);
            
            const lookTarget = this.isZoom ? 1.75 : 1.1;
            this.camera.lookAt(new THREE.Vector3(0, lookTarget, 0).add(this.avatar.position));
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new UltraMasterEngine();
</script>
</body>
</html>
