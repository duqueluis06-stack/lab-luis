<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUANTUM CITY - FINAL</title>

<style>
:root { --neon:#00ffff; --rgb:#ff00ff; }
body { margin:0; background:#000; overflow:hidden; font-family:sans-serif; }

header{
    position:absolute; top:0; width:100%; height:60px;
    display:flex; justify-content:space-between; align-items:center;
    padding:0 20px; z-index:1000;
}

.btn-exit{ background:red; color:#fff; padding:10px; text-decoration:none; }

.joystick{
    position:absolute; bottom:30px; left:30px;
    display:grid; grid-template-columns:repeat(3,70px); gap:10px;
}

.btn{
    width:70px; height:70px;
    border:2px solid cyan;
    display:flex; align-items:center; justify-content:center;
    color:cyan;
}

#loading{
    position:fixed; inset:0; background:#000;
    display:flex; align-items:center; justify-content:center;
    color:#0ff; z-index:9999;
}
</style>
</head>

<body>

<div id="loading">CARGANDO...</div>

<header>
    <div style="color:#fff;">LUIS <span style="color:#0ff;">ONLINE</span></div>
    <a href="index.html" class="btn-exit">SALIR</a>
</header>

<div class="joystick">
    <div></div><div class="btn" id="w">↑</div><div></div>
    <div class="btn" id="a">←</div><div class="btn" id="s">↓</div><div class="btn" id="d">→</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer, luis, mixer;
let clock = new THREE.Clock();
let keys = {w:false,a:false,s:false,d:false};

init();

function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 10000);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // luces
    scene.add(new THREE.AmbientLight(0xffffff,1));
    const light = new THREE.DirectionalLight(0xffffff,1.5);
    light.position.set(50,100,50);
    scene.add(light);

    const loader = new THREE.GLTFLoader();

    // ciudad
    loader.load("ciudad_quantum.glb", (gltf)=>{
        scene.add(gltf.scene);
    });

    // avatar
    loader.load("luis_avatar.glb", (gltf)=>{
        luis = gltf.scene;

        // 🔥 ESCALA HUMANA AUTOMÁTICA
        const box = new THREE.Box3().setFromObject(luis);
        const size = box.getSize(new THREE.Vector3()).y;

        const targetHeight = 1.75; // altura realista
        const scale = targetHeight / size;
        luis.scale.set(scale, scale, scale);

        // 🔥 BAJAR AL SUELO (NO FLOTAR)
        const box2 = new THREE.Box3().setFromObject(luis);
        const minY = box2.min.y;
        luis.position.y -= minY;

        scene.add(luis);

        // animación
        if(gltf.animations.length){
            mixer = new THREE.AnimationMixer(luis);
            mixer.clipAction(gltf.animations[0]).play();
        }

        document.getElementById("loading").style.display = "none";
        resetLuis();
    });

    setupControls();
    animate();
}

function setupControls(){
    ["w","a","s","d"].forEach(k=>{
        const el = document.getElementById(k);
        el.addEventListener("pointerdown", ()=>keys[k]=true);
        el.addEventListener("pointerup", ()=>keys[k]=false);
        el.addEventListener("pointerleave", ()=>keys[k]=false);
    });
}

function resetLuis(){
    if(!luis) return;
    luis.position.set(0,0,0);
    camera.position.set(0,4,8);
}

function animate(){
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    if(mixer) mixer.update(delta);

    if(luis){
        const speed = 4 * delta;
        const rot = 2 * delta;

        if(keys.w) luis.translateZ(speed);
        if(keys.s) luis.translateZ(-speed);
        if(keys.a) luis.rotation.y += rot;
        if(keys.d) luis.rotation.y -= rot;

        // cámara GTA
        const offset = new THREE.Vector3(0,4,-8);
        offset.applyQuaternion(luis.quaternion);

        const target = luis.position.clone().add(offset);

        camera.position.lerp(target, 0.1);
        camera.lookAt(luis.position);
    }

    renderer.render(scene,camera);
}

window.addEventListener("resize", ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
