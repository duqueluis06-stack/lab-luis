<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Reality - Professional Build</title>
    <style>
        :root { --neon: #00f6ff; --magenta: #ff00ff; --matrix: #00ff41; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        /* Mensaje Hacker Inferior */
        #manifesto-zone {
            position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
            z-index: 90; width: 85%; max-width: 450px;
            background: rgba(0, 0, 0, 0.75); border-left: 3px solid var(--matrix);
            padding: 12px; opacity: 1; transition: opacity 1.5s; pointer-events: none;
        }
        #typing-text { color: var(--matrix); text-shadow: 0 0 5px var(--matrix); font-size: 13px; margin: 0; }

        /* HUD UI */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; padding: 20px; }
        
        /* Botón Salir Circular */
        #btn-exit {
            position: absolute; top: 25px; right: 25px; pointer-events: auto;
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--magenta);
            color: var(--magenta); background: rgba(0,0,0,0.8); font-size: 9px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 0 10px var(--magenta); text-decoration: none; font-weight: bold;
        }

        /* Joysticks Duales */
        .joy-frame {
            position: absolute; bottom: 40px; width: 110px; height: 110px;
            border: 2px solid var(--neon); border-radius: 50%;
            background: rgba(0,246,255,0.05); pointer-events: auto; touch-action: none;
        }
        #joy-l { left: 30px; } 
        #joy-r { right: 30px; }
        
        .knob {
            width: 45px; height: 45px; background: var(--neon); border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--neon); border: 2px solid #fff;
        }

        /* ZOOM Central */
        #zoom-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 75px; height: 75px; border-radius: 50%; border: 2px solid #fff;
            background: rgba(0,0,0,0.9); color: #fff; pointer-events: auto; cursor: pointer;
            font-size: 10px; font-weight: bold; box-shadow: 0 0 15px #fff;
        }
        #zoom-btn.active { background: #fff; color: #000; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: var(--neon); }
    </style>
</head>
<body>

<div id="loader"><h2>DESCOMPRIMIENDO REALIDAD...</h2></div>

<div id="manifesto-zone"><p id="typing-text"></p></div>

<div id="ui">
    <a href="index.html" id="btn-exit">EXIT</a>
    <div id="joy-l" class="joy-frame"><div id="knob-l" class="knob"></div></div>
    <button id="zoom-btn">ZOOM<br>DETALLE</button>
    <div id="joy-r" class="joy-frame"><div id="knob-r" class="knob"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://www.gstatic.com/draco/versioned/decoders/1.4.1/draco_decoder.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
class UltimateSystem {
    constructor() {
        this.data = { m: {x:0, y:0}, l: {x:0, y:0} };
        this.isZoom = false;
        this.animState = 'idle';
        this.init();
        this.lights();
        this.load();
        this.ui();
        this.loop();
    }

    init() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000003);
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.05, 2000);
        
        this.renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Calidad 4K
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(this.renderer.domElement);
        
        this.clock = new THREE.Clock();
        this.camBase = new THREE.Group(); 
        this.scene.add(this.camBase);
        this.camBase.add(this.camera);
    }

    lights() {
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const d = new THREE.DirectionalLight(0xffffff, 1.5);
        d.position.set(5, 20, 10);
        this.scene.add(d);
        this.fLight = new THREE.PointLight(0xffffff, 0, 4);
        this.scene.add(this.fLight);
    }

    load() {
        const gl = new THREE.GLTFLoader();
        const dr = new THREE.DRACOLoader();
        dr.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        gl.setDRACOLoader(dr);

        // Ciudad - Altura Corregida
        gl.load('ciudad_quantum.glb', (g) => {
            this.city = g.scene;
            // Ajuste de altura para que el asfalto suba a tus pies
            this.city.position.set(0, -11.5, -10); 
            this.scene.add(this.city);
            this.city.traverse(n => { if(n.isMesh && n.material.map) n.material.map.anisotropy = 16; });
        });

        // Avatar - Sistema de Extremidades
        gl.load('luis-avatar2.glb', (g) => {
            this.avatar = g.scene;
            this.scene.add(this.avatar);
            
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(g.animations.length > 0) {
                this.idle = this.mixer.clipAction(g.animations[0]);
                // Si existe segunda animación, es Caminar. Si no, repetimos la 0.
                this.walk = this.mixer.clipAction(g.animations[1] || g.animations[0]);
                this.idle.play();
            }

            document.getElementById('loader').style.display = 'none';
            this.type();
        });
    }

    type() {
        const t = "Ya estoy adentro. Estoy observando cómo pasa el mundo digital... son las primeras pruebas de una nueva realidad.";
        let i = 0; const el = document.getElementById('typing-text');
        const it = setInterval(() => {
            if(i < t.length) { el.innerHTML += t.charAt(i); i++; }
            else { clearInterval(it); setTimeout(() => { document.getElementById('manifesto-zone').style.opacity = '0'; }, 3000); }
        }, 35);
    }

    ui() {
        const setup = (id, kn, move) => {
            const a = document.getElementById(id), k = document.getElementById(kn);
            let ok = false;
            const h = (e) => {
                if(!ok) return;
                const p = e.touches ? e.touches[0] : e;
                const r = a.getBoundingClientRect();
                const x = (p.clientX - (r.left + 55)) / 55, y = (p.clientY - (r.top + 55)) / 55;
                const m = Math.min(Math.sqrt(x*x + y*y), 1), an = Math.atan2(y, x);
                const fx = Math.cos(an) * m, fy = Math.sin(an) * m;
                k.style.transform = `translate(calc(-50% + ${fx*40}px), calc(-50% + ${fy*40}px))`;
                if(move) this.data.m = {x: fx, y: fy}; else this.data.l = {x: fx, y: fy};
            };
            a.addEventListener('touchstart', () => ok = true);
            window.addEventListener('touchmove', h);
            window.addEventListener('touchend', () => { ok = false; k.style.transform = 'translate(-50%, -50%)'; if(move) this.data.m = {x:0, y:0}; else this.data.l = {x:0, y:0}; });
        };
        setup('joy-l', 'knob-l', true); setup('joy-r', 'knob-r', false);
        const z = document.getElementById('zoom-btn');
        z.ontouchstart = (e) => { e.preventDefault(); this.isZoom = true; z.classList.add('active'); };
        z.ontouchend = () => { this.isZoom = false; z.classList.remove('active'); };
    }

    loop() {
        requestAnimationFrame(() => this.loop());
        const dt = this.clock.getDelta();
        if(this.mixer) this.mixer.update(dt);

        if(this.avatar) {
            const speed = 0.08;
            this.avatar.position.x += this.data.m.x * speed;
            this.avatar.position.z += this.data.m.y * speed;
            
            const isMoving = Math.abs(this.data.m.x) > 0.1 || Math.abs(this.data.m.y) > 0.1;
            if(isMoving) {
                this.avatar.rotation.y = Math.atan2(this.data.m.x, this.data.m.y);
                if(this.animState !== 'walk' && this.walk) {
                    this.idle.fadeOut(0.3); this.walk.reset().fadeIn(0.3).play();
                    this.animState = 'walk';
                }
            } else if(this.animState !== 'idle' && this.idle) {
                this.walk.fadeOut(0.3); this.idle.reset().fadeIn(0.3).play();
                this.animState = 'idle';
            }

            this.camBase.position.copy(this.avatar.position);
            this.camBase.rotation.y -= this.data.l.x * 0.05;

            const tPos = this.isZoom ? new THREE.Vector3(0, 1.65, 0.75) : new THREE.Vector3(0, 1.2, 4.3);
            this.camera.position.lerp(tPos, 0.1);
            this.camera.lookAt(new THREE.Vector3(0, this.isZoom ? 1.65 : 1, 0).add(this.avatar.position));
            this.fLight.position.copy(this.avatar.position).add(new THREE.Vector3(0, 1.65, 0.6));
            this.fLight.intensity = this.isZoom ? 1.8 : 0;
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new UltimateSystem();
</script>
</body>
</html>
