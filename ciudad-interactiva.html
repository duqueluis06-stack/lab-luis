<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUANTUM CITY - CLEAN BUILD</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif;}
canvas{display:block;touch-action:none;}

#ui{
position:absolute;inset:0;
display:flex;flex-direction:column;
justify-content:space-between;
padding:15px;
pointer-events:none;
}

.btn{
width:65px;height:65px;
border:2px solid cyan;
display:flex;align-items:center;justify-content:center;
pointer-events:auto;
color:#0ff;
user-select:none;
}

.controls{
display:grid;
grid-template-columns:repeat(3,70px);
gap:5px;
}

#loading{
position:fixed;inset:0;
background:#000;
color:#0ff;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}
</style>
</head>

<body>

<div id="loading">CARGANDO MUNDO...</div>

<div id="ui">
<div style="color:#0ff;">LUIS QUANTUM WORLD</div>

<div class="controls">
<div></div><div class="btn" id="w">↑</div><div></div>
<div class="btn" id="a">←</div><div class="btn" id="s">↓</div><div class="btn" id="d">→</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene,camera,renderer,luis,mixer;
let clock=new THREE.Clock();
let keys={w:false,a:false,s:false,d:false};

init();

function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x000000);

camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,10000);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

// 🔥 FIX MÓVIL (evita pantalla negra iPhone)
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;

document.body.appendChild(renderer.domElement);

// 🔥 luz fuerte (OBLIGATORIO para ciudad visible)
scene.add(new THREE.AmbientLight(0xffffff,3));

const sun=new THREE.DirectionalLight(0xffffff,4);
sun.position.set(200,300,200);
scene.add(sun);

const fill=new THREE.DirectionalLight(0x88ccff,1.5);
fill.position.set(-200,100,-200);
scene.add(fill);

const loader=new THREE.GLTFLoader();

// 🌆 CIUDAD
loader.load("ciudad_quantum.glb",(gltf)=>{

const city=gltf.scene;

// centrar
const box=new THREE.Box3().setFromObject(city);
const center=box.getCenter(new THREE.Vector3());
city.position.sub(center);

// suelo
city.position.y-=box.min.y;

scene.add(city);

console.log("CIUDAD OK");

});

// 🧍 AVATAR
loader.load("luis_avatar.glb",(gltf)=>{

luis=gltf.scene;

// 🔥 escala humana real
const box=new THREE.Box3().setFromObject(luis);
const h=box.getSize(new THREE.Vector3()).y;
const scale=1.75/h;
luis.scale.setScalar(scale);

// 🔥 orientación correcta (MIRAR AL FRENTE)
luis.rotation.y=0;

// suelo
const box2=new THREE.Box3().setFromObject(luis);
luis.position.y-=box2.min.y;

scene.add(luis);

// animación
if(gltf.animations.length){
mixer=new THREE.AnimationMixer(luis);
mixer.clipAction(gltf.animations[0]).play();
}

// cámara inicial
camera.position.set(0,4,8);

document.getElementById("loading").style.display="none";

});

setup();
animate();
}

function setup(){

["w","a","s","d"].forEach(k=>{
document.getElementById(k).onpointerdown=()=>keys[k]=true;
document.getElementById(k).onpointerup=()=>keys[k]=false;
});

}

function animate(){

requestAnimationFrame(animate);

let dt=clock.getDelta();

if(mixer) mixer.update(dt);

if(luis){

let speed=5*dt;

if(keys.w) luis.translateZ(speed);
if(keys.s) luis.translateZ(-speed);
if(keys.a) luis.rotation.y+=2*dt;
if(keys.d) luis.rotation.y-=2*dt;

// 🎥 cámara estable GTA
const offset=new THREE.Vector3(0,4,-7);
offset.applyQuaternion(luis.quaternion);

const target=luis.position.clone().add(offset);

camera.position.lerp(target,0.12);
camera.lookAt(luis.position);
}

renderer.render(scene,camera);

}

addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
