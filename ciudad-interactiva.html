<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum City - Navigation Mode</title>
    <style>
        :root { --neon: #00f6ff; --magenta: #ff00ff; --matrix: #00ff41; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        /* Mensaje Digital Inferior */
        #manifesto-zone {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            z-index: 90; width: 85%; max-width: 500px;
            background: rgba(0, 0, 0, 0.6); border-bottom: 2px solid var(--matrix);
            padding: 10px; opacity: 1; transition: opacity 1s; pointer-events: none; text-align: center;
        }
        #typing-text { color: var(--matrix); text-shadow: 0 0 5px var(--matrix); font-size: 13px; margin: 0; }

        /* UI HUD */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; padding: 15px; }
        
        /* Botón Salir Circular */
        #btn-exit {
            position: absolute; top: 20px; right: 20px; pointer-events: auto;
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--magenta);
            color: var(--magenta); background: rgba(0,0,0,0.8); font-size: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 0 10px var(--magenta); text-decoration: none; font-weight: bold;
        }

        /* Joysticks */
        .joy-area {
            position: absolute; bottom: 30px; width: 100px; height: 100px;
            border: 1px dashed var(--neon); border-radius: 50%; background: rgba(0,246,255,0.03);
            pointer-events: auto; touch-action: none;
        }
        #joy-left { left: 30px; } /* Mueve Avatar */
        #joy-right { right: 30px; } /* Mueve Cámara 360 */
        
        .knob {
            width: 40px; height: 40px; background: var(--neon); border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--neon);
        }

        /* Botón ZOOM Central */
        #zoom-btn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid #fff;
            background: rgba(0,0,0,0.8); color: #fff; pointer-events: auto; cursor: pointer;
            font-size: 10px; font-weight: bold; box-shadow: 0 0 15px #fff;
        }
        #zoom-btn.active { background: #fff; color: #000; }

        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: var(--neon); }
    </style>
</head>
<body>

<div id="loader"><h2>CONFIGURANDO ENTORNO 4K...</h2></div>

<div id="manifesto-zone"><p id="typing-text"></p></div>

<div id="ui">
    <a href="index.html" id="btn-exit">EXIT</a>
    
    <div id="joy-left" class="joy-area"><div id="knob-l" class="knob"></div></div>
    
    <button id="zoom-btn">ZOOM<br>4K</button>
    
    <div id="joy-right" class="joy-area"><div id="knob-r" class="knob"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://www.gstatic.com/draco/versioned/decoders/1.4.1/draco_decoder.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
class QuantumCityEngine {
    constructor() {
        this.moveData = { x: 0, z: 0 };
        this.lookData = { x: 0, y: 0 };
        this.init();
        this.lights();
        this.loadModels();
        this.setupJoysticks();
        this.animate();
    }

    init() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000003);
        
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 2000);
        
        this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure = 1.3;
        document.body.appendChild(this.renderer.domElement);
        
        this.clock = new THREE.Clock();
        this.camGroup = new THREE.Group(); // Para rotación 360 suave
        this.scene.add(this.camGroup);
        this.camGroup.add(this.camera);
    }

    lights() {
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(5, 10, 5);
        this.scene.add(sun);
        
        this.faceLight = new THREE.PointLight(0xffffff, 0, 3);
        this.scene.add(this.faceLight);
    }

    loadModels() {
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);

        // Ciudad - Ajustada para no enterrar al avatar
        loader.load('ciudad_quantum.glb', (glb) => {
            this.city = glb.scene;
            this.city.position.set(0, -1.8, -5); // Bajamos la ciudad 1.8 metros
            this.scene.add(this.city);
            
            // Maximizar textura 360
            this.city.traverse(n => {
                if(n.isMesh && n.material.map) {
                    n.material.map.anisotropy = 16;
                }
            });
        });

        // Avatar
        loader.load('luis-avatar2.glb', (glb) => {
            this.avatar = glb.scene;
            this.avatar.position.set(0, 0, 0); 
            this.scene.add(this.avatar);
            
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(glb.animations.length > 0) this.mixer.clipAction(glb.animations[0]).play();

            document.getElementById('loader').style.display = 'none';
            this.startTyping();
        });
    }

    startTyping() {
        const txt = "Ya estoy adentro. Estoy observando cómo pasa el mundo digital... son las primeras pruebas de una nueva realidad.";
        let i = 0;
        const type = () => {
            if (i < txt.length) {
                document.getElementById('typing-text').innerHTML += txt.charAt(i);
                i++; setTimeout(type, 30);
            } else {
                setTimeout(() => { document.getElementById('manifesto-zone').style.opacity = '0'; }, 3000);
            }
        };
        type();
    }

    setupJoysticks() {
        const setup = (id, knobId, callback) => {
            const area = document.getElementById(id);
            const knob = document.getElementById(knobId);
            let active = false;

            const move = (e) => {
                if(!active) return;
                const t = e.touches ? e.touches[0] : e;
                const r = area.getBoundingClientRect();
                const x = (t.clientX - (r.left + 50)) / 50;
                const y = (t.clientY - (r.top + 50)) / 50;
                const mag = Math.min(Math.sqrt(x*x + y*y), 1);
                const ang = Math.atan2(y, x);
                
                const finalX = Math.cos(ang) * mag;
                const finalY = Math.sin(ang) * mag;
                
                knob.style.transform = `translate(calc(-50% + ${finalX*40}px), calc(-50% + ${finalY*40}px))`;
                callback(finalX, finalY);
            };

            area.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchmove', move);
            window.addEventListener('touchend', () => { 
                active = false; 
                knob.style.transform = 'translate(-50%, -50%)'; 
                callback(0, 0); 
            });
        };

        // Joystick Izquierdo: Movimiento Avatar
        setup('joy-left', 'knob-l', (x, y) => {
            this.moveData = { x: x * 0.08, z: y * 0.08 };
        });

        // Joystick Derecho: Cámara 360
        setup('joy-right', 'knob-r', (x, y) => {
            this.lookData = { x: x * 0.05, y: y * 0.05 };
        });

        this.isZoom = false;
        const zBtn = document.getElementById('zoom-btn');
        zBtn.ontouchstart = (e) => { e.preventDefault(); this.isZoom = true; zBtn.classList.add('active'); };
        zBtn.ontouchend = () => { this.isZoom = false; zBtn.classList.remove('active'); };
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const dt = this.clock.getDelta();
        if(this.mixer) this.mixer.update(dt);

        if(this.avatar) {
            // 1. Mover Avatar
            this.avatar.position.x += this.moveData.x;
            this.avatar.position.z += this.moveData.z;
            if(Math.abs(this.moveData.x) > 0.01 || Math.abs(this.moveData.z) > 0.01) {
                this.avatar.rotation.y = Math.atan2(this.moveData.x, this.moveData.z);
            }

            // 2. Control Cámara 360
            this.camGroup.position.copy(this.avatar.position);
            this.camGroup.rotation.y -= this.lookData.x;

            // 3. Lógica Zoom 4K
            const targetCamPos = this.isZoom ? new THREE.Vector3(0, 1.65, 0.8) : new THREE.Vector3(0, 1.2, 4.5);
            this.camera.position.lerp(targetCamPos, 0.1);
            this.camera.lookAt(new THREE.Vector3(0, this.isZoom ? 1.65 : 1.0, 0).add(this.avatar.position));
            
            this.faceLight.position.copy(this.avatar.position).add(new THREE.Vector3(0, 1.65, 0.6));
            this.faceLight.intensity = this.isZoom ? 1.5 : 0;
        }

        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new QuantumCityEngine();
</script>
</body>
</html>
