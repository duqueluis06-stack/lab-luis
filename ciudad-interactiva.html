<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUANTUM CITY FIX FINAL</title>

<style>
body{margin:0;overflow:hidden;background:#000;}
canvas{display:block;}

#ui{
position:absolute;inset:0;
display:flex;flex-direction:column;
justify-content:space-between;
padding:15px;
pointer-events:none;
}

.btn{
width:65px;height:65px;
border:2px solid cyan;
display:flex;align-items:center;justify-content:center;
pointer-events:auto;
color:#0ff;
}
</style>
</head>

<body>

<div id="ui">
<div style="color:#0ff;">LUIS FIX ✔</div>

<div style="display:flex;gap:10px;">
<div class="btn" id="w">W</div>
<div class="btn" id="a">A</div>
<div class="btn" id="s">S</div>
<div class="btn" id="d">D</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene,camera,renderer,luis,mixer;
let keys={w:false,a:false,s:false,d:false};
let clock=new THREE.Clock();

init();

function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x000000);

camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.1,10000);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// 🔥 luz fuerte (evita invisibilidad total)
scene.add(new THREE.AmbientLight(0xffffff,2));
const sun=new THREE.DirectionalLight(0xffffff,2);
sun.position.set(100,200,100);
scene.add(sun);

const loader=new THREE.GLTFLoader();

// 🌆 CIUDAD (FORZADA VISIBILIDAD)
loader.load("ciudad_quantum.glb",(gltf)=>{

const city=gltf.scene;

// 🔥 CENTRAR
const box=new THREE.Box3().setFromObject(city);
const center=box.getCenter(new THREE.Vector3());
city.position.sub(center);

// 🔥 BAJAR AL SUELO
city.position.y-=box.min.y;

// 🔥 ESCALA SEGURA (EVITA “DESAPARECE”)
const size=box.getSize(new THREE.Vector3()).length();
if(size>300) city.scale.setScalar(0.01);

scene.add(city);

console.log("CIUDAD OK");

});

// 🧍 AVATAR (FIX ROTACIÓN + PIES)
loader.load("luis_avatar.glb",(gltf)=>{

luis=gltf.scene;

// 🔥 ROTACIÓN CORRECTA (ESTO ARREGLA “ESPALDA”)
luis.rotation.y=Math.PI;

// 🔥 ESCALA HUMANA
const box=new THREE.Box3().setFromObject(luis);
const h=box.getSize(new THREE.Vector3()).y;
const scale=1.75/h;
luis.scale.setScalar(scale);

// 🔥 PONER EN SUELO
const box2=new THREE.Box3().setFromObject(luis);
luis.position.y-=box2.min.y;

scene.add(luis);

// animación
if(gltf.animations.length){
mixer=new THREE.AnimationMixer(luis);
const action=mixer.clipAction(gltf.animations[0]);
action.play();
}

// 🔥 cámara inicial (EVITA ESPALDA PERMANENTE)
camera.position.set(0,3,6);

});

setup();
animate();
}

function setup(){
["w","a","s","d"].forEach(k=>{
document.getElementById(k).onpointerdown=()=>keys[k]=true;
document.getElementById(k).onpointerup=()=>keys[k]=false;
});
}

function animate(){
requestAnimationFrame(animate);

let dt=clock.getDelta();

if(mixer) mixer.update(dt);

if(luis){

let sp=5*dt;

// movimiento
if(keys.w) luis.translateZ(sp);
if(keys.s) luis.translateZ(-sp);
if(keys.a) luis.rotation.y+=2*dt;
if(keys.d) luis.rotation.y-=2*dt;

// 🎥 cámara tipo GTA REAL
const offset=new THREE.Vector3(0,3,-6);
offset.applyQuaternion(luis.quaternion);

const target=luis.position.clone().add(offset);

camera.position.lerp(target,0.12);
camera.lookAt(luis.position);
}

renderer.render(scene,camera);
}

addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
