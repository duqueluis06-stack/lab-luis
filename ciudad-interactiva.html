<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUIS QUANTUM CITY | PRO SIMULATOR</title>
    <style>
        :root { --neon: #00ffff; --magenta: #ff00ff; --rgb-speed: 5s; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* HEADER RGB BRUTAL */
        header {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 100;
            border-bottom: 3px solid; border-image: linear-gradient(90deg, #f00, #0f0, #00f, #f0f, #f00) 1;
            animation: hue-cycle var(--rgb-speed) linear infinite;
        }
        @keyframes hue-cycle { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

        /* HUD DE COMANDOS (BOTONES) */
        .controls-panel {
            position: absolute; bottom: 30px; right: 30px; 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; z-index: 100;
        }

        .cmd-btn {
            background: rgba(0,0,0,0.7); border: 2px solid var(--neon); color: var(--neon);
            padding: 15px 25px; cursor: pointer; font-weight: bold; border-radius: 8px;
            text-transform: uppercase; transition: 0.2s; box-shadow: 0 0 10px rgba(0,255,255,0.2);
        }
        .cmd-btn:active { background: var(--neon); color: #000; transform: scale(0.9); }
        .btn-jump { border-color: var(--magenta); color: var(--magenta); }

        .locate-btn {
            position: absolute; bottom: 30px; left: 30px;
            background: var(--neon); color: #000; padding: 20px;
            border-radius: 50%; font-weight: bold; border: none; cursor: pointer;
            box-shadow: 0 0 20px var(--neon); z-index: 100;
        }

        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon); }
        .loading-text { font-family: monospace; letter-spacing: 3px; margin-bottom: 15px; }
        .bar { width: 250px; height: 2px; background: #111; position: relative; }
        #progress { position: absolute; height: 100%; background: var(--neon); width: 0%; transition: 0.4s; }

        .nav-link { text-decoration: none; color: #fff; border: 1px solid #fff; padding: 8px 15px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loading-text">SYNC_SYSTEM_ONLINE</div>
        <div class="bar"><div id="progress"></div></div>
    </div>

    <header>
        <div style="color: #fff; font-size: 12px;">SYSTEM: <span id="mode-text">IDLE</span></div>
        <div style="display: flex; gap: 10px;">
            <a href="index.html" class="nav-link">🏠 HOME</a>
            <a href="experimentos.html" class="nav-link" style="border-color: var(--magenta); color: var(--magenta);">🌀 EXIT</a>
        </div>
    </header>

    <button class="locate-btn" onclick="resetPlayer()">🎯 RE-SPAWN</button>

    <div class="controls-panel">
        <button class="cmd-btn" onmousedown="setMove('walk')" onmouseup="setMove('idle')">🚶 Caminar</button>
        <button class="cmd-btn" onmousedown="setMove('run')" onmouseup="setMove('idle')">🏃 Correr</button>
        <button class="cmd-btn btn-jump" onclick="doJump()">🚀 Saltar</button>
        <button class="cmd-btn" onclick="changeView()">🎥 Cámara</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

    <script>
        let scene, camera, renderer, luis, mixer;
        let currentMode = 'idle';
        let velocity = 0;
        let isJumping = false;
        let jumpVelocity = 0;
        const mixers = [];
        const clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.Fog(0x020205, 50, 200);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            const light = new THREE.DirectionalLight(0x00ffff, 1);
            light.position.set(20, 100, 10);
            scene.add(light);

            const draco = new THREE.DRACOLoader();
            draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
            const loader = new THREE.GLTFLoader();
            loader.setDRACOLoader(draco);

            // 1. CARGAR CIUDAD
            loader.load('ciudad_quantum.glb', (gltf) => {
                scene.add(gltf.scene);
                if (gltf.animations.length) {
                    const m = new THREE.AnimationMixer(gltf.scene);
                    gltf.animations.forEach(c => m.clipAction(c).play());
                    mixers.push(m);
                }

                // 2. CARGAR LUIS
                loader.load('luis_avatar.glb', (avGltf) => {
                    luis = avGltf.scene;
                    // ESCALA MINI PARA QUE NO SEA GIGANTE
                    luis.scale.set(0.015, 0.015, 0.015); 
                    resetPlayer();
                    scene.add(luis);

                    mixer = new THREE.AnimationMixer(luis);
                    if(avGltf.animations.length) mixer.clipAction(avGltf.animations[0]).play();
                    
                    document.getElementById('loader').style.display = 'none';
                });
            }, (xhr) => {
                document.getElementById('progress').style.width = (xhr.loaded / xhr.total * 100) + '%';
            });
        }

        function resetPlayer() {
            if(!luis) return;
            // Spawn en una calle lateral (lejos del centro colapsado)
            luis.position.set(30, 0, 30);
            luis.rotation.y = Math.PI;
            velocity = 0;
        }

        function setMove(mode) {
            currentMode = mode;
            document.getElementById('mode-text').innerText = mode.toUpperCase();
            if(mode === 'walk') velocity = 0.15;
            else if(mode === 'run') velocity = 0.4;
            else velocity = 0;
        }

        function doJump() {
            if(!isJumping) {
                isJumping = true;
                jumpVelocity = 0.3;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            mixers.forEach(m => m.update(delta));
            if(mixer) mixer.update(delta);

            if (luis) {
                // MOVIMIENTO HACIA ADELANTE
                luis.translateZ(velocity);

                // LÓGICA DE SALTO (Física simple)
                if(isJumping) {
                    luis.position.y += jumpVelocity;
                    jumpVelocity -= 0.015; // Gravedad
                    if(luis.position.y <= 0) {
                        luis.position.y = 0;
                        isJumping = false;
                    }
                }

                // CÁMARA SIGUE A LUIS (Tercera persona)
                const relativeCameraOffset = new THREE.Vector3(0, 5, -15);
                const cameraOffset = relativeCameraOffset.applyMatrix4(luis.matrixWorld);
                camera.position.x = cameraOffset.x;
                camera.position.y = cameraOffset.y;
                camera.position.z = cameraOffset.z;
                camera.lookAt(luis.position.x, luis.position.y + 2, luis.position.z);
            }

            renderer.render(scene, camera);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
