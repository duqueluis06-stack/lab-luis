<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUIS QUANTUM - REPARADO</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; position: fixed; width: 100%; height: 100%; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .btn { 
            pointer-events: auto; width: 65px; height: 65px; background: rgba(0,255,255,0.3); 
            border: 2px solid #0ff; color: #fff; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            user-select: none; -webkit-user-select: none;
        }
        .controls { display: grid; grid-template-columns: repeat(3, 70px); gap: 5px; }
        .actions { display: flex; flex-direction: column; gap: 15px; }
        .btn-big { width: 90px; height: 50px; background: #f0f; border-color: #fff; border-radius: 10px; font-size: 12px; }
        #loading { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: #0ff; }
    </style>
</head>
<body>

<div id="loading"><h1>RECONECTANDO MATRIZ...</h1></div>

<div id="ui">
    <div style="display:flex; justify-content: space-between;">
        <a href="index.html" class="btn btn-big" style="background:red; text-decoration:none; display:flex;">SALIR</a>
        <div id="status" style="color:#0ff;">ESTADO: OK</div>
    </div>

    <div style="display:flex; justify-content: space-between; align-items: flex-end;">
        <div class="controls">
            <div></div><div class="btn" id="w">↑</div><div></div>
            <div class="btn" id="a">←</div><div class="btn" id="s">↓</div><div class="btn" id="d">→</div>
        </div>
        <div class="actions">
            <div class="btn btn-big" id="run">CORRER</div>
            <div class="btn btn-big" onclick="resetLuis()">RESCATE</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    let scene, camera, renderer, luis, mixer, clock = new THREE.Clock();
    let move = { w:false, a:false, s:false, d:false, run:false };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        scene.add(light);

        const loader = new THREE.GLTFLoader();

        // 1. CARGAR CIUDAD
        loader.load('ciudad_quantum.glb', (gltf) => {
            scene.add(gltf.scene);
            
            // 2. CARGAR LUIS (Solo después de la ciudad)
            loader.load('luis_avatar.glb', (avatar) => {
                luis = avatar.scene;
                luis.scale.set(1, 1, 1); // Escala real
                scene.add(luis);
                
                if(avatar.animations.length) {
                    mixer = new THREE.AnimationMixer(luis);
                    mixer.clipAction(avatar.animations[0]).play();
                }
                
                document.getElementById('loading').style.display = 'none';
                resetLuis();
            });
        });

        setupInput();
        animate();
    }

    function setupInput() {
        const btns = ['w','a','s','d','run'];
        btns.forEach(id => {
            const el = document.getElementById(id);
            // Eventos unificados para iPhone/PC
            const start = (e) => { e.preventDefault(); move[id] = true; };
            const end = (e) => { e.preventDefault(); move[id] = false; };
            
            el.addEventListener('touchstart', start);
            el.addEventListener('touchend', end);
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', end);
        });
    }

    function resetLuis() {
        if(!luis) return;
        luis.position.set(0, 0, 0);
        camera.position.set(0, 5, 12);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if(mixer) mixer.update(delta);

        if(luis) {
            const speed = move.run ? 0.4 : 0.15;
            const rSpeed = 0.05;

            if(move.w) luis.translateZ(speed);
            if(move.s) luis.translateZ(-speed);
            if(move.a) luis.rotation.y += rSpeed;
            if(move.d) luis.rotation.y -= rSpeed;

            // Seguimiento de cámara directo (Tipo GTA)
            const offset = new THREE.Vector3(0, 6, -12);
            offset.applyQuaternion(luis.quaternion);
            camera.position.copy(luis.position).add(offset);
            camera.lookAt(luis.position.x, luis.position.y + 2, luis.position.z);
        }
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
