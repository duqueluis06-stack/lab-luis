<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Avatar Showcase</title>
    <style>
        :root { --neon-cyan: #00f6ff; --neon-magenta: #ff00ff; --bg-dark: #020205; }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); font-family: 'Segoe UI', Roboto, sans-serif; color: white; }
        canvas { display: block; }

        /* --- UI HUD ESTILO NEÓN --- */
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 25px; z-index: 100;
        }

        .neon-btn {
            pointer-events: auto; background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--neon-cyan); color: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            text-transform: uppercase; font-weight: bold; letter-spacing: 1.5px;
            cursor: pointer; transition: all 0.2s ease;
            user-select: none; -webkit-user-select: none;
        }
        .neon-btn:active { transform: scale(0.95); box-shadow: 0 0 20px var(--neon-cyan); }

        /* Superior: Salir */
        #top-zone { display: flex; justify-content: flex-end; }
        #btn-exit { padding: 12px 24px; border-color: var(--neon-magenta); color: var(--neon-magenta); box-shadow: 0 0 10px var(--neon-magenta); }

        /* Inferior: Controles */
        #bottom-zone { display: flex; justify-content: space-between; align-items: flex-end; }

        /* D-Pad Rotacional */
        #joy-container {
            width: 150px; height: 150px; border-radius: 50%;
            background: rgba(0, 246, 255, 0.03); border: 2px dashed rgba(0, 246, 255, 0.3);
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        #joy-knob {
            width: 60px; height: 60px; background: var(--neon-cyan);
            border-radius: 50%; box-shadow: 0 0 25px var(--neon-cyan);
            position: absolute; pointer-events: auto; outline: none; border: none;
        }

        /* Botones Acción */
        #action-zone { display: flex; gap: 15px; }
        .btn-action { width: 80px; height: 80px; border-radius: 50%; font-size: 12px; text-align: center; }
        #btn-zoom { border-color: #fff; color: #fff; box-shadow: 0 0 10px #fff; }
        #btn-zoom.active { background: #fff; color: #000; box-shadow: 0 0 25px #fff; }

        /* PANTALLA DE CARGA */
        #loader {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--neon-cyan); text-align: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(0, 246, 255, 0.1);
            border-top-color: var(--neon-cyan); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div style="text-transform: uppercase; letter-spacing: 3px; font-weight: bold;">Cargando Rostro IA</div>
    <div id="load-status" style="font-size: 12px; margin-top: 10px; opacity: 0.7;">Inicializando...</div>
</div>

<div id="ui-layer">
    <div id="top-zone">
        <button id="btn-exit" class="neon-btn" onclick="window.location.href='index.html'">Salir</button>
    </div>

    <div id="bottom-zone">
        <div id="joy-container">
            <div id="joy-knob" class="neon-btn"></div>
        </div>

        <div id="action-zone">
            <button id="btn-zoom" class="neon-btn btn-action">Zoom<br>Rostro</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
/**
 * QUANTUM AVATAR SHOWCASE ENGINE
 */
class AvatarShowcase {
    constructor() {
        this.clock = new THREE.Clock();
        this.config = {
            cameraData: {
                default: { pos: new THREE.Vector3(0, 1.65, 0.8), look: new THREE.Vector3(0, 1.60, 0) }, // Primer plano pecho/cara
                zoom: { pos: new THREE.Vector3(0, 1.66, 0.4), look: new THREE.Vector3(0, 1.66, 0) }      // Primerísimo primer plano cara
            },
            lerpSpeed: 0.08,
            rotationSpeed: 0.05
        };
        
        this.state = {
            loaded: false,
            joyActive: false,
            rotationY: 0,
            isZoomed: false,
            currentCameraTarget: JSON.parse(JSON.stringify(this.config.cameraData.default))
        };

        this.initGraphics();
        this.initLights();
        this.loadModels();
        this.setupControls();
        this.animate();
    }

    initGraphics() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x010103);
        // Niebla para desenfocar la ciudad de fondo y dar profundidad
        this.scene.fog = new THREE.FogExp2(0x010103, 0.15);

        this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
        // Posición inicial de seguridad
        this.camera.position.set(0, 1.65, 2); 
        
        this.renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.outputEncoding = THREE.sRGBEncoding; // Vital para texturas fotorrealistas
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping; // Mejora el contraste de la piel
        this.renderer.toneMappingExposure = 1.2;
        document.body.appendChild(this.renderer.domElement);
    }

    initLights() {
        // Luz ambiental suave para rellenar sombras
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.3));

        // Luz de estudio principal (Key Light) - Apunta a la cara
        this.mainLight = new THREE.DirectionalLight(0xfff0dd, 1.5); // Tono cálido para la piel
        this.mainLight.position.set(1, 2, 2);
        this.scene.add(this.mainLight);

        // Luz de contra (Rim Light) - Separa el avatar del fondo
        const rimLight = new THREE.SpotLight(0x00f6ff, 1.2, 10, 0.5);
        rimLight.position.set(-2, 3, -2);
        this.scene.add(rimLight);

        // Luz específica para el Zoom (se activa/desactiva)
        this.zoomLight = new THREE.PointLight(0xffffff, 0, 2);
        this.zoomLight.position.set(0, 1.7, 0.5);
        this.scene.add(this.zoomLight);
    }

    loadModels() {
        const manager = new THREE.LoadingManager();
        const status = document.getElementById('load-status');

        manager.onProgress = (url, loaded, total) => {
            status.innerText = `Cargando: ${Math.round((loaded/total)*100)}%`;
        };

        manager.onLoad = () => {
            this.state.loaded = true;
            document.getElementById('loader').style.display = 'none';
            // Ajuste fino tras cargar: asegurar que la cámara mire al rostro
            this.camera.lookAt(this.config.cameraData.default.look);
        };

        const loader = new THREE.GLTFLoader(manager);

        // 1. Cargar Ciudad (Detrás, origen 0,0,0)
        loader.load('ciudad_quantum.glb', (gltf) => {
            this.city = gltf.scene;
            // Escalamos la ciudad si es necesario para que se vea detrás
            this.city.scale.set(10, 10, 10); 
            this.city.position.set(0, -2, -5); // La bajamos y alejamos
            this.scene.add(this.city);
        }, undefined, (e) => { console.error("Error Ciudad:", e); status.innerText = "Error cargando ciudad"; });

        // 2. Cargar Avatar (Al frente)
        loader.load('luis-avatar2.glb', (gltf) => {
            this.avatar = gltf.scene;
            this.avatar.position.set(0, 0, 0); // En el centro del mundo
            this.scene.add(this.avatar);
            
            // Si el avatar tiene una animación de "Idle" (respiración, parpadeo), la reproducimos
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(gltf.animations.length > 0) {
                // Reproducir la primera animación por defecto (suele ser Idle)
                this.mixer.clipAction(gltf.animations[0]).play();
            }
        }, undefined, (e) => { console.error("Error Avatar:", e); status.innerText = "Error cargando avatar"; });
    }

    setupControls() {
        const knob = document.getElementById('joy-knob');
        const container = document.getElementById('joy-container');
        const btnZoom = document.getElementById('btn-zoom');

        // --- Lógica del Joystick Rotacional ---
        const handleJoyMove = (e) => {
            if(!this.state.joyActive) return;
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            
            // Solo nos importa el movimiento horizontal (X) para rotar Y
            const dx = touch.clientX - centerX;
            const dist = Math.min(Math.abs(dx), 60);
            const sign = Math.sign(dx);

            // Visual del knob
            knob.style.left = `calc(50% + ${sign * dist}px - 30px)`;
            knob.style.top = `calc(50% - 30px)`; // Mantenemos Y céntrico

            // Guardamos la velocidad de rotación basada en la distancia
            this.state.rotationY = sign * (dist / 60) * this.config.rotationSpeed;
        };

        container.addEventListener('touchstart', (e) => { 
            this.state.joyActive = true; 
            handleJoyMove(e); 
        });
        window.addEventListener('touchmove', handleJoyMove);
        window.addEventListener('touchend', () => {
            this.state.joyActive = false;
            knob.style.left = 'calc(50% - 30px)'; // Reset visual
            this.state.rotationY = 0; // Detener rotación
        });

        // --- Lógica del Botón ZOOM ---
        const setZoom = (active) => {
            this.state.isZoomed = active;
            if(active) {
                btnZoom.classList.add('active');
                this.state.currentCameraTarget = this.config.cameraData.zoom;
                this.zoomLight.intensity = 1.0; // Luz de relleno facial
            } else {
                btnZoom.classList.remove('active');
                this.state.currentCameraTarget = this.config.cameraData.default;
                this.zoomLight.intensity = 0;
            }
        };

        btnZoom.addEventListener('touchstart', (e) => { e.preventDefault(); setZoom(true); });
        btnZoom.addEventListener('touchend', () => { setZoom(false); });
        // Soporte ratón por si acaso
        btnZoom.addEventListener('mousedown', () => { setZoom(true); });
        btnZoom.addEventListener('mouseup', () => { setZoom(false); });

        // Resize
        window.addEventListener('resize', () => {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        if(!this.state.loaded) return;

        const delta = this.clock.getDelta();

        // 1. Actualizar Animación (si existe)
        if(this.mixer) this.mixer.update(delta);

        // 2. Rotar Avatar (Eje Y)
        if (this.avatar && Math.abs(this.state.rotationY) > 0.001) {
            this.avatar.rotation.y += this.state.rotationY;
        }

        // 3. Suavizado de Cámara (Lerp)
        if(this.camera) {
            // Suavizado de posición
            this.camera.position.lerp(this.state.currentCameraTarget.pos, this.config.lerpSpeed);
            
            // Suavizado de punto de mira
            // Usamos un vector auxiliar para no modificar el config original
            const tempLookAt = new THREE.Vector3().lerpVectors(
                this.camera.getWorldDirection(new THREE.Vector3()).add(this.camera.position), // Dirección actual aproximada
                this.state.currentCameraTarget.look,
                this.config.lerpSpeed
            );
            this.camera.lookAt(this.state.currentCameraTarget.look); // lookAt directo es más estable para fotorrealismo
        }

        this.renderer.render(this.scene, this.camera);
    }
}

// Iniciar aplicación al cargar la ventana
window.onload = () => { new AvatarShowcase(); };
</script>
</body>
</html>
