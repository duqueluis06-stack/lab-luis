<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANTUM CITY | FULL RGB & ANIMATION</title>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', monospace;
        }

        /* HEADER RGB */
        header {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
            border-bottom: 3px solid;
            border-image: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000) 1;
            animation: rgb-cycle 4s linear infinite;
        }

        @keyframes rgb-cycle {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .btn-rgb {
            text-decoration: none;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 13px;
            border-radius: 5px;
            text-transform: uppercase;
            transition: 0.3s;
            border: 2px solid #fff;
            color: #fff;
            background: transparent;
        }

        .btn-home { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
        .btn-home:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 25px var(--neon-cyan); }
        
        .btn-exit { border-color: var(--neon-magenta); box-shadow: 0 0 10px var(--neon-magenta); }
        .btn-exit:hover { background: var(--neon-magenta); color: #000; box-shadow: 0 0 25px var(--neon-magenta); }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex;
            flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }

        .bar-container { width: 200px; height: 4px; background: #222; margin-top: 15px; border-radius: 2px; }
        #progress { width: 0%; height: 100%; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); transition: width 0.3s; }

        @media (max-width: 600px) {
            header { height: 80px; padding: 0 10px; }
            .btn-rgb { padding: 10px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div id="status">CARGANDO CIUDAD Y AVATAR...</div>
        <div class="bar-container"><div id="progress"></div></div>
    </div>

    <header>
        <div style="color: #fff; font-size: 12px;">● PROTOCOLO: <span style="color: var(--neon-cyan);">CIUDAD_RGB</span></div>
        <div style="display: flex; gap: 10px;">
            <a href="index.html" class="btn-rgb btn-home">🏠 INICIO</a>
            <a href="experimentos.html" class="btn-rgb btn-exit">🌀 SALIR</a>
        </div>
    </header>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // ILUMINACIÓN GLOBAL
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const directionalLight = new THREE.DirectionalLight(0x00ffff, 1);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // CONFIGURAR CARGADORES
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
        const loader = new THREE.GLTFLoader();
        loader.setDRACOLoader(dracoLoader);

        const mixers = []; // Lista para todas las animaciones

        // 1. CARGAR CIUDAD
        loader.load('ciudad_quantum.glb', (gltf) => {
            const city = gltf.scene;
            scene.add(city);

            // ACTIVAR ANIMACIONES DE LA CIUDAD (Autos, etc.)
            if (gltf.animations && gltf.animations.length) {
                const cityMixer = new THREE.AnimationMixer(city);
                gltf.animations.forEach((clip) => {
                    cityMixer.clipAction(clip).play();
                });
                mixers.push(cityMixer);
            }

            // 2. CARGAR AVATAR LUIS
            loader.load('luis_avatar.glb', (avatarGltf) => {
                const luis = avatarGltf.scene;
                luis.scale.set(1.5, 1.5, 1.5); // Ajusta tamaño si es necesario
                luis.position.set(0, 0, 0);    // Ajusta si queda volando
                scene.add(luis);

                // ANIMACIÓN DE LUIS
                if (avatarGltf.animations && avatarGltf.animations.length) {
                    const avatarMixer = new THREE.AnimationMixer(luis);
                    avatarMixer.clipAction(avatarGltf.animations[0]).play();
                    mixers.push(avatarMixer);
                }

                document.getElementById('loader').style.display = 'none';
            });
        }, (xhr) => {
            const p = (xhr.loaded / xhr.total) * 100;
            document.getElementById('progress').style.width = p + '%';
        });

        // CONTROLES DE CÁMARA
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        camera.position.set(0, 10, 25); // Vista inicial alejada para ver la ciudad
        controls.target.set(0, 2, 0);

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            // Actualizar todos los motores de animación
            mixers.forEach(m => m.update(delta));
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
