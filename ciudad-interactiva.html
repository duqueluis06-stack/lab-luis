<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Connection - Digital World</title>
    <style>
        :root { --neon-cyan: #00f6ff; --neon-magenta: #ff00ff; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; color: white; }
        
        /* Frase de Entrada */
        #manifesto {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            max-width: 300px; font-size: 14px; letter-spacing: 1px;
            color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan);
            border-left: 2px solid var(--neon-magenta); padding-left: 15px;
            pointer-events: none;
        }

        /* UI HUD Neón RGB */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; }
        
        .neon-btn {
            pointer-events: auto; background: rgba(0,0,0,0.8); border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 15px 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px var(--neon-cyan); text-transform: uppercase; transition: 0.3s;
            text-decoration: none; text-align: center;
        }
        .neon-btn:active { transform: scale(0.9); box-shadow: 0 0 30px var(--neon-cyan); }
        #btn-exit { border-color: var(--neon-magenta); color: var(--neon-magenta); box-shadow: 0 0 15px var(--neon-magenta); align-self: flex-end; }

        /* Controles */
        #controls-row { display: flex; justify-content: space-between; align-items: flex-end; }
        #joy-base { width: 140px; height: 140px; border-radius: 50%; border: 2px dashed var(--neon-cyan); position: relative; display: flex; align-items: center; justify-content: center; background: rgba(0,246,255,0.05); }
        #joy-knob { width: 60px; height: 60px; background: var(--neon-cyan); border-radius: 50%; box-shadow: 0 0 25px var(--neon-cyan); position: absolute; }
        
        #zoom-btn { width: 90px; height: 90px; border-radius: 50%; border-color: #fff; color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        #zoom-btn.active { background: #fff; color: #000; box-shadow: 0 0 40px #fff; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon-cyan); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="loader">
    <h2 style="letter-spacing: 5px;">INICIALIZANDO MUNDO DIGITAL</h2>
    <p id="load-status">Cargando módulos de descompresión...</p>
</div>

<div id="manifesto">
    "Ya estoy adentro. Estoy observando cómo pasa el mundo digital... son las primeras pruebas de una nueva realidad."
</div>

<div id="ui">
    <a href="index.html" id="btn-exit" class="neon-btn">DESCONECTAR</a>
    
    <div id="controls-row">
        <div id="joy-base"><div id="joy-knob" class="neon-btn"></div></div>
        <button id="zoom-btn" class="neon-btn">ZOOM<br>DETALLE</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://www.gstatic.com/draco/versioned/decoders/1.4.1/draco_decoder.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
class QuantumMatrix {
    constructor() {
        this.init();
        this.lights();
        this.loadAssets();
        this.controls();
        this.animate();
    }

    init() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000005);
        
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 2000);
        this.camera.position.set(0, 1.2, 3.8);

        this.renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio > 1 ? 2 : 1);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure = 1.3;
        
        document.body.appendChild(this.renderer.domElement);
        this.clock = new THREE.Clock();
    }

    lights() {
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const key = new THREE.DirectionalLight(0xffffff, 1.5);
        key.position.set(2, 5, 5);
        this.scene.add(key);
        
        // Luz de Zoom Facial
        this.faceLight = new THREE.PointLight(0xffffff, 0, 4);
        this.faceLight.position.set(0, 1.65, 1);
        this.scene.add(this.faceLight);

        // Rim Light Magenta
        const rim = new THREE.PointLight(0xff00ff, 2, 10);
        rim.position.set(-3, 2, -3);
        this.scene.add(rim);
    }

    loadAssets() {
        const loader = new THREE.GLTFLoader();
        
        // --- CONFIGURACIÓN DE DRACO ---
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(dracoLoader);

        const status = document.getElementById('load-status');

        // Cargar Ciudad Draco
        loader.load('ciudad_quantum.glb', (glb) => {
            this.city = glb.scene;
            this.city.position.set(0, 0, -10);
            this.scene.add(this.city);
            status.innerText = "Ciudad Descomprimida. Cargando Avatar...";
        }, undefined, (e) => console.error("Error Ciudad Draco:", e));

        // Cargar Avatar
        loader.load('luis-avatar2.glb', (glb) => {
            this.avatar = glb.scene;
            this.scene.add(this.avatar);
            
            // Buscar animaciones (Movimiento de cara o cuerpo)
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(glb.animations.length > 0) {
                this.mixer.clipAction(glb.animations[0]).play();
            }
            
            document.getElementById('loader').style.display = 'none';
        }, undefined, (e) => {
            status.innerText = "Error: Asegúrate de que luis-avatar2.glb esté en la carpeta.";
        });
    }

    controls() {
        this.rotY = 0; this.active = false; this.isZoom = false;
        const knob = document.getElementById('joy-knob');
        const joy = document.getElementById('joy-base');

        const move = (e) => {
            if(!this.active) return;
            const t = e.touches ? e.touches[0] : e;
            const r = joy.getBoundingClientRect();
            const dx = t.clientX - (r.left + r.width/2);
            const dist = Math.min(Math.abs(dx), 60);
            knob.style.left = `calc(50% + ${Math.sign(dx)*dist}px - 30px)`;
            this.rotY = Math.sign(dx) * (dist/60) * 0.05;
        };

        joy.ontouchstart = () => this.active = true;
        window.ontouchmove = move;
        window.ontouchend = () => { this.active = false; knob.style.left = 'calc(50% - 30px)'; this.rotY = 0; };

        const zBtn = document.getElementById('zoom-btn');
        zBtn.ontouchstart = (e) => { e.preventDefault(); this.isZoom = true; zBtn.classList.add('active'); };
        zBtn.ontouchend = () => { this.isZoom = false; zBtn.classList.remove('active'); };
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const dt = this.clock.getDelta();
        if(this.mixer) this.mixer.update(dt);

        if(this.avatar) {
            this.avatar.rotation.y += this.rotY;
            
            const tPos = this.isZoom ? new THREE.Vector3(0, 1.66, 0.7) : new THREE.Vector3(0, 1.1, 3.8);
            this.camera.position.lerp(tPos, 0.08);
            this.camera.lookAt(0, this.isZoom ? 1.66 : 1, 0);
            this.faceLight.intensity = this.isZoom ? 1.5 : 0;
        }
        this.renderer.render(this.scene, this.camera);
    }
}

window.onload = () => new QuantumMatrix();
</script>
</body>
</html>
