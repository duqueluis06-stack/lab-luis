<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANTUM CITY | LUIS RGB</title>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --rgb-speed: 4s;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        /* BARRA SUPERIOR RGB */
        header {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
            /* Borde animado RGB */
            border-bottom: 3px solid;
            border-image: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000) 1;
            animation: rgb-border var(--rgb-speed) linear infinite;
        }

        @keyframes rgb-border {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .sys-status {
            color: #fff;
            font-size: 12px;
            text-transform: uppercase;
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        /* BOTONES NEÓN RGB */
        .nav-controls {
            display: flex;
            gap: 15px;
        }

        .btn-rgb {
            text-decoration: none;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 13px;
            border-radius: 5px;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            border: 2px solid #fff;
            color: #fff;
            background: transparent;
        }

        /* Botón Inicio - Cyan */
        .btn-home {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        .btn-home:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 25px var(--neon-cyan);
        }

        /* Botón Salida - Magenta */
        .btn-exit {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
        }
        .btn-exit:hover {
            background: var(--neon-magenta);
            color: #000;
            box-shadow: 0 0 25px var(--neon-magenta);
        }

        /* PANTALLA DE CARGA */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .loading-bar-container {
            width: 200px;
            height: 4px;
            background: #222;
            margin-top: 15px;
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: width 0.3s;
        }

        /* RESPONSIVE MÓVIL */
        @media (max-width: 600px) {
            header { height: 80px; padding: 0 10px; }
            .btn-rgb { padding: 10px 12px; font-size: 11px; }
            .sys-status { font-size: 10px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div id="status">INICIALIZANDO PROTOCOLO RGB...</div>
        <div class="loading-bar-container">
            <div id="progress" class="loading-bar"></div>
        </div>
    </div>

    <header>
        <div class="sys-status">
            ● QUANTUM_CITY_V4 <br>
            <span style="color: var(--neon-cyan);">ACTIVE_USER: LUIS</span>
        </div>
        
        <div class="nav-controls">
            <a href="index.html" class="btn-rgb btn-home">🏠 INICIO</a>
            <a href="experimentos.html" class="btn-rgb btn-exit">🌀 SALIR</a>
        </div>
    </header>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // LUCES RGB
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const blueLight = new THREE.PointLight(0x00ffff, 2, 50);
        blueLight.position.set(5, 5, 5);
        scene.add(blueLight);

        const magentaLight = new THREE.PointLight(0xff00ff, 2, 50);
        magentaLight.position.set(-5, 5, -5);
        scene.add(magentaLight);

        // CONFIGURAR DRACO
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
        
        const loader = new THREE.GLTFLoader();
        loader.setDRACOLoader(dracoLoader);

        let mixer;

        // CARGAR CIUDAD
        loader.load('ciudad_quantum.glb', (gltf) => {
            scene.add(gltf.scene);
            
            // CARGAR LUIS
            loader.load('luis_avatar.glb', (avatarGltf) => {
                const luis = avatarGltf.scene;
                scene.add(luis);

                mixer = new THREE.AnimationMixer(luis);
                if(avatarGltf.animations.length > 0) {
                    mixer.clipAction(avatarGltf.animations[0]).play();
                }
                document.getElementById('loader').style.display = 'none';
            });
        }, (xhr) => {
            const percent = (xhr.loaded / xhr.total) * 100;
            document.getElementById('progress').style.width = percent + '%';
            document.getElementById('status').innerText = "CARGANDO ASSETS: " + Math.round(percent) + "%";
        });

        camera.position.set(0, 5, 12);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
