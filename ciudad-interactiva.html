<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANTUM CITY - PRO VERSION</title>
    <style>
        :root { --neon: #00ffff; --rgb: #ff00ff; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* Interfaz de Usuario */
        header {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0));
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 1000;
        }

        .btn-ui {
            padding: 10px 20px; border-radius: 5px; font-weight: bold;
            text-decoration: none; text-transform: uppercase; font-size: 12px;
            transition: 0.3s; cursor: pointer; border: 1px solid white;
        }
        .btn-exit { background: #ff0000; color: white; border: none; }
        .btn-exit:hover { background: #b30000; }

        /* Controles estilo Consola */
        .joystick-container {
            position: absolute; bottom: 30px; left: 30px;
            display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; z-index: 1000;
        }
        .control-btn {
            width: 70px; height: 70px; background: rgba(0, 255, 255, 0.15);
            border: 2px solid var(--neon); color: var(--neon);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; user-select: none; backdrop-filter: blur(5px);
        }
        .control-btn:active { background: var(--neon); color: black; transform: scale(0.9); }

        .locate-btn {
            position: absolute; bottom: 30px; right: 30px;
            width: 90px; height: 90px; background: var(--rgb);
            border: 4px solid white; border-radius: 50%; color: white;
            font-weight: bold; font-size: 11px; cursor: pointer;
            box-shadow: 0 0 25px var(--rgb); z-index: 1000;
        }

        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader-bar { width: 250px; height: 4px; background: #222; margin-top: 20px; border-radius: 2px; overflow: hidden; }
        #progress { width: 0%; height: 100%; background: var(--neon); transition: 0.1s; }
    </style>
</head>
<body>

<div id="loading-screen">
    <h2 style="color: var(--neon); letter-spacing: 5px;">INICIALIZANDO MOTOR</h2>
    <div class="loader-bar"><div id="progress"></div></div>
</div>

<header>
    <div style="color: white;">PLAYER: <span id="status" style="color: var(--neon);">CARGANDO...</span></div>
    <a href="index.html" class="btn-ui btn-exit">CERRAR SESIÓN</a>
</header>

<div class="joystick-container">
    <div></div><div class="control-btn" id="w">↑</div><div></div>
    <div class="control-btn" id="a">←</div><div class="control-btn" id="s">↓</div><div class="control-btn" id="d">→</div>
</div>

<button class="locate-btn" onclick="teleportLuis()">🎯<br>LOCALIZAR<br>JUGADOR</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    /** CONFIGURACIÓN GLOBAL **/
    let scene, camera, renderer, luis, controls, clock;
    let mixers = [];
    let keys = { w: false, a: false, s: false, d: false };

    function init() {
        clock = new THREE.Clock();
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);

        // Cámara mejorada
        camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 10000);
        
        // Renderizado Pro
        renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // Luces
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(100, 200, 100);
        scene.add(sun);

        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
        loader.setDRACOLoader(draco);

        // Carga en cadena
        loadWorld(loader);

        window.addEventListener('resize', onWindowResize);
        setupInput();
    }

    function loadWorld(loader) {
        // 1. Cargar Ciudad
        loader.load('ciudad_quantum.glb', (gltf) => {
            scene.add(gltf.scene);
            handleAnimations(gltf); // Autos y luces de ciudad

            // 2. Cargar Avatar
            loader.load('luis_avatar.glb', (av) => {
                luis = av.scene;
                
                // --- SISTEMA AUTOMÁTICO DE ESCALA ---
                const box = new THREE.Box3().setFromObject(luis);
                const size = box.getSize(new THREE.Vector3()).y;
                const targetHeight = 2.0; // Luis medirá 2 unidades de alto
                const scaleFactor = targetHeight / size;
                luis.scale.set(scaleFactor, scaleFactor, scaleFactor);

                scene.add(luis);
                handleAnimations(av); // Animación Luis

                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('status').innerText = "LUIS_QUANTUM";
                
                teleportLuis(); // Posicionar al inicio
            });
        }, (xhr) => {
            const p = (xhr.loaded / xhr.total) * 100;
            document.getElementById('progress').style.width = p + '%';
        });
    }

    function handleAnimations(model) {
        if (model.animations && model.animations.length) {
            const mixer = new THREE.AnimationMixer(model.scene);
            mixer.clipAction(model.animations[0]).play();
            mixers.push(mixer);
        }
    }

    function setupInput() {
        // Soporte Mouse/Touch
        const ids = ['w', 'a', 's', 'd'];
        ids.forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', () => keys[id] = true);
            el.addEventListener('pointerup', () => keys[id] = false);
            el.addEventListener('pointerleave', () => keys[id] = false);
        });

        // Soporte Teclado PC
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
    }

    function teleportLuis() {
        if (!luis) return;
        // Lo ponemos en el origen, pero un poco elevado para que no se entierre
        luis.position.set(0, 2, 0); 
        luis.rotation.y = Math.PI; // Mirando al frente
        
        // Cámara tipo GTA (Detrás)
        camera.position.set(0, 5, 10);
        controls.target.copy(luis.position);
        controls.update();
    }

    function updateMovement(delta) {
        if (!luis) return;

        const moveSpeed = 10 * delta;
        const rotateSpeed = 3 * delta;

        if (keys.w) luis.translateZ(moveSpeed);
        if (keys.s) luis.translateZ(-moveSpeed);
        if (keys.a) luis.rotation.y += rotateSpeed;
        if (keys.d) luis.rotation.y -= rotateSpeed;

        // La cámara sigue a Luis suavemente
        const offset = new THREE.Vector3(0, 5, -10).applyQuaternion(luis.quaternion);
        const cameraTarget = luis.position.clone().add(offset);
        camera.position.lerp(cameraTarget, 0.1);
        controls.target.lerp(luis.position, 0.2);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        
        mixers.forEach(m => m.update(delta));
        updateMovement(delta);
        
        if(controls) controls.update();
        renderer.render(scene, camera);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
    animate();
</script>
</body>
</html>
