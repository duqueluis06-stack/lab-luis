<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Reality FIX FINAL</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:monospace}

/* MENSAJE ARRIBA (NO MOLESTA) */
#manifesto-zone{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:50;
background:rgba(0,0,0,0.6);
padding:10px;
border-left:3px solid #00ff41;
}
#typing-text{color:#00ff41;font-size:12px}

/* EXIT */
#btn-exit{
position:absolute;
top:20px;
right:20px;
z-index:100;
color:#ff00ff;
border:2px solid #ff00ff;
padding:8px;
background:#000;
}

/* JOYSTICK */
.joy{
position:absolute;
bottom:30px;
width:100px;height:100px;
border:2px solid cyan;
border-radius:50%;
}
#joyL{left:30px}
.knob{
width:40px;height:40px;
background:cyan;
border-radius:50%;
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="manifesto-zone"><p id="typing-text"></p></div>
<a id="btn-exit" href="index.html">EXIT</a>

<div id="joyL" class="joy"><div id="knobL" class="knob"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>

let scene,camera,renderer,avatar,city,mixer;
let input={x:0,y:0};
let clock=new THREE.Clock();

init();
animate();

/* INIT */
function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,2000);
camera.position.set(0,2,5);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

/* DRACO */
const draco=new THREE.DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.4.1/");

const loader=new THREE.GLTFLoader();
loader.setDRACOLoader(draco);

/* CIUDAD */
loader.load("ciudad_quantum.glb",(g)=>{
city=g.scene;
city.position.set(0,-2.2,-10); // suelo calibrado
scene.add(city);
});

/* AVATAR */
loader.load("luis-avatar2.glb",(g)=>{

avatar=g.scene;
scene.add(avatar);

mixer=new THREE.AnimationMixer(avatar);

/* detectar animaciones */
let walk, idle;

g.animations.forEach(a=>{
let n=a.name.toLowerCase();
if(n.includes("walk")) walk=a;
if(n.includes("idle")) idle=a;
});

if(!idle) idle=g.animations[0];
if(!walk) walk=g.animations[g.animations.length-1];

avatar.userData.idle = mixer.clipAction(idle);
avatar.userData.walk = mixer.clipAction(walk);

avatar.userData.idle.play();

/* quitar loader */
document.getElementById("typing-text").innerText="Sistema listo";

});

}

/* JOYSTICK */
let joy=document.getElementById("joyL");
let knob=document.getElementById("knobL");
let active=false;

joy.addEventListener("touchstart",()=>active=true);

window.addEventListener("touchmove",(e)=>{
if(!active)return;

let t=e.touches[0];
let r=joy.getBoundingClientRect();

let x=(t.clientX-(r.left+50))/50;
let y=(t.clientY-(r.top+50))/50;

let len=Math.min(Math.sqrt(x*x+y*y),1);
let ang=Math.atan2(y,x);

input.x=Math.cos(ang)*len;
input.y=Math.sin(ang)*len;

knob.style.transform=`translate(calc(-50% + ${input.x*30}px), calc(-50% + ${input.y*30}px))`;
});

window.addEventListener("touchend",()=>{
active=false;
input={x:0,y:0};
knob.style.transform="translate(-50%,-50%)";
});

/* LOOP */
function animate(){
requestAnimationFrame(animate);

let dt=clock.getDelta();

if(mixer) mixer.update(dt);

if(avatar){

let speed=2;

/* mover */
avatar.position.x+=input.x*speed*dt;
avatar.position.z+=input.y*speed*dt;

/* rotar */
if(input.x||input.y){
avatar.rotation.y=Math.atan2(input.x,input.y);
}

/* animaciones sincronizadas */
let moving=Math.abs(input.x)>0.1||Math.abs(input.y)>0.1;

if(moving){

if(!avatar.userData.walk.isRunning()){
avatar.userData.idle.fadeOut(0.2);
avatar.userData.walk.reset().fadeIn(0.2).play();
}

/* 🔥 sincronización pasos */
avatar.userData.walk.timeScale = 1.8 * Math.sqrt(input.x*input.x+input.y*input.y);

}else{

if(!avatar.userData.idle.isRunning()){
avatar.userData.walk.fadeOut(0.2);
avatar.userData.idle.reset().fadeIn(0.2).play();
}

}

/* cámara */
camera.position.lerp(
new THREE.Vector3(
avatar.position.x,
avatar.position.y+1.6,
avatar.position.z+4
),0.1);

camera.lookAt(avatar.position);

}

renderer.render(scene,camera);
}

</script>

</body>
</html>
