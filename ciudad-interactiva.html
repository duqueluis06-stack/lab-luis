<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUANTUM CITY FINAL</title>

<style>
body{margin:0;overflow:hidden;background:#000;}
canvas{display:block;}

#ui{
position:absolute;inset:0;
display:flex;
flex-direction:column;
justify-content:space-between;
padding:15px;
pointer-events:none;
}

.controls{
display:grid;
grid-template-columns:repeat(3,70px);
gap:5px;
pointer-events:auto;
}

.btn{
width:65px;height:65px;
border:2px solid cyan;
display:flex;
align-items:center;
justify-content:center;
color:#0ff;
user-select:none;
}
</style>
</head>

<body>

<div id="ui">
<div style="color:#0ff;">LUIS ENGINE</div>

<div class="controls">
<div></div><div class="btn" id="w">↑</div><div></div>
<div class="btn" id="a">←</div><div class="btn" id="s">↓</div><div class="btn" id="d">→</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene,camera,renderer;
let player=new THREE.Object3D();
let luis;
let mixer;
let clock=new THREE.Clock();
let keys={w:false,a:false,s:false,d:false};

init();

function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x000000);

camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,20000);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.6;

document.body.appendChild(renderer.domElement);

// 🔥 luz fuerte (evita ciudad negra móvil)
scene.add(new THREE.AmbientLight(0xffffff,3));
const sun=new THREE.DirectionalLight(0xffffff,5);
sun.position.set(200,300,200);
scene.add(sun);

// jugador base
scene.add(player);

const loader=new THREE.GLTFLoader();

// 🌆 CIUDAD
loader.load("ciudad_quantum.glb",(gltf)=>{

const city=gltf.scene;

const box=new THREE.Box3().setFromObject(city);
const center=box.getCenter(new THREE.Vector3());

city.position.sub(center);
city.position.y -= box.min.y;

// escala segura
const size=box.getSize(new THREE.Vector3()).length();
city.scale.setScalar(size>200?0.01:1);

scene.add(city);

});

// 🧍 AVATAR
loader.load("luis_avatar.glb",(gltf)=>{

luis=gltf.scene;

// 🔥 FIX DEFINITIVO ESPALDA
luis.rotation.set(0,Math.PI,0);

// escala humana
const box=new THREE.Box3().setFromObject(luis);
const h=box.getSize(new THREE.Vector3()).y;
luis.scale.setScalar(1.75/h);

// suelo
const box2=new THREE.Box3().setFromObject(luis);
luis.position.y -= box2.min.y;

player.add(luis);

camera.position.set(0,3,6);

if(gltf.animations.length){
mixer=new THREE.AnimationMixer(luis);
mixer.clipAction(gltf.animations[0]).play();
}

});

setup();
animate();

}

function setup(){

["w","a","s","d"].forEach(k=>{
document.getElementById(k).onpointerdown=()=>keys[k]=true;
document.getElementById(k).onpointerup=()=>keys[k]=false;
document.getElementById(k).onpointerleave=()=>keys[k]=false;
});

}

function update(dt){

if(!luis) return;

let speed=5*dt;

// movimiento player
if(keys.w) player.translateZ(speed);
if(keys.s) player.translateZ(-speed);
if(keys.a) player.rotation.y+=2*dt;
if(keys.d) player.rotation.y-=2*dt;

// cámara tipo GTA estable
const offset=new THREE.Vector3(0,2.8,-5);
offset.applyQuaternion(player.quaternion);

const target=player.position.clone().add(offset);

camera.position.lerp(target,0.15);
camera.lookAt(player.position);

}

function animate(){

requestAnimationFrame(animate);

let dt=clock.getDelta();

if(mixer) mixer.update(dt);

update(dt);

renderer.render(scene,camera);

}

addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
