<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUANTUM SAFE ENGINE</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:monospace;}
#debug{position:absolute;top:10px;left:10px;color:#0f0;z-index:10;background:#0008;padding:6px;}
#exit{position:fixed;top:10px;right:10px;z-index:9999;padding:10px;border:2px solid red;color:red;background:transparent;}
#loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;color:#0ff;z-index:9999;}

button{
    position:fixed;
    bottom:20px;
    left:20px;
    z-index:9999;
}
</style>
</head>
<body>

<div id="loader">CARGANDO SISTEMA...</div>
<div id="debug">INIT</div>

<button id="exit" onclick="location.href='index.html'">SALIR</button>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

<script>

let scene,camera,renderer;
let avatar=null;   // 👈 IMPORTANTE: puede NO existir
let mixer=null;
let clock=new THREE.Clock();

let vx=0,vz=0;
let speed=0.05;

/* =========================
   LOG
========================= */
function log(t){
    document.getElementById("debug").innerText=t;
}

/* =========================
   MOVE SIMPLE
========================= */
function move(x,z){
    vx=x;
    vz=z;
}

/* =========================
   INIT SAFE
========================= */
function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x000010);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,3,6);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,2));

const draco=new THREE.DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/v1/decoders/");

const loader=new THREE.GLTFLoader();
loader.setDRACOLoader(draco);

/* =========================
   CIUDAD (OBLIGATORIA)
========================= */
loader.load("ciudad_quantum.glb",(gltf)=>{

scene.add(gltf.scene);
log("CIUDAD OK");

/* =========================
   AVATAR (OPCIONAL)
========================= */
loader.load("luis_avatar.glb",(av)=>{

avatar=av.scene;
avatar.scale.set(1,1,1);
avatar.position.set(0,1,0);

scene.add(avatar);

mixer=new THREE.AnimationMixer(avatar);

if(av.animations && av.animations.length>0){
    mixer.clipAction(av.animations[0]).play();
    log("AVATAR OK");
}else{
    log("AVATAR SIN ANIM");
}

document.getElementById("loader").style.display="none";

},

undefined,

(err)=>{
    log("AVATAR FALLBACK OK");
    console.warn(err);
    document.getElementById("loader").style.display="none";
}

);

},

undefined,

(err)=>{
    log("ERROR CIUDAD");
    console.error(err);
}

);

}

/* =========================
   LOOP SAFE
========================= */
function animate(){

requestAnimationFrame(animate);

let delta=clock.getDelta();

if(mixer) mixer.update(delta);

/* =========================
   SI NO HAY AVATAR → NO CRASHEA
========================= */
if(avatar){

let moving=(vx!==0||vz!==0);

if(moving){
    avatar.position.x+=vx*speed;
    avatar.position.z+=vz*speed;
}

camera.position.lerp(
    new THREE.Vector3(
        avatar.position.x,
        avatar.position.y+3,
        avatar.position.z+6
    ),
    0.08
);

camera.lookAt(avatar.position);

}

renderer.render(scene,camera);

}

init();
animate();

</script>

</body>
</html>
