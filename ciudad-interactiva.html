<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEBUG ANIMACIÓN AVATAR</title>

<style>
body{margin:0;overflow:hidden;background:#000;}
#debug{
    position:absolute;
    top:10px;
    left:10px;
    color:#0f0;
    font-family:monospace;
    z-index:10;
}
#exit{
    position:fixed;
    top:10px;
    right:10px;
    z-index:999;
    padding:10px;
    border:2px solid red;
    color:red;
    background:transparent;
}
</style>

</head>
<body>

<div id="debug">INIT</div>
<button id="exit" onclick="location.href='index.html'">SALIR</button>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

<script>

let scene, camera, renderer;
let avatar, mixer;
let clock = new THREE.Clock();

function log(t){
    document.getElementById("debug").innerText = t;
}

init();
animate();

function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0,2,5);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 2));

    const draco = new THREE.DRACOLoader();
    draco.setDecoderPath("https://www.gstatic.com/draco/v1/decoders/");

    const loader = new THREE.GLTFLoader();
    loader.setDRACOLoader(draco);

    log("Cargando avatar...");

    loader.load("luis_avatar.glb", (gltf)=>{

        avatar = gltf.scene;
        avatar.scale.set(1,1,1);
        avatar.position.set(0,0,0);

        scene.add(avatar);

        log("Animaciones: " + (gltf.animations.length || 0));

        /* =========================
           🔥 FIX CRÍTICO ANIMACIÓN
        ========================= */
        mixer = new THREE.AnimationMixer(avatar);

        if(gltf.animations && gltf.animations.length > 0){

            gltf.animations.forEach((clip)=>{
                mixer.clipAction(clip).play();
            });

            log("ANIMACIÓN ACTIVA");
        } else {
            log("❌ SIN ANIMACIONES EN EL MODELO");
        }

    });

}

function animate(){

    requestAnimationFrame(animate);

    let delta = clock.getDelta();

    if(mixer) mixer.update(delta);

    renderer.render(scene,camera);
}

</script>

</body>
</html>
