<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luis 4K - Pro Walking Engine</title>
    <style>
        :root { --matrix: #00ff41; }
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        #hud { position: absolute; top: 10px; left: 10px; color: var(--matrix); z-index: 10; font-size: 12px; background: rgba(0,0,0,0.7); padding: 5px; border: 1px solid var(--matrix); }
        .joy { position: absolute; bottom: 30px; width: 100px; height: 100px; border: 2px solid var(--matrix); border-radius: 50%; z-index: 20; touch-action: none; }
        #joy-l { left: 20px; } #joy-r { right: 20px; }
        .stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: var(--matrix); border-radius: 50%; transform: translate(-50%, -50%); }
        #zoom { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; border-radius: 50%; background: #000; color: var(--matrix); border: 2px solid var(--matrix); font-weight: bold; z-index: 30; }
    </style>
</head>
<body>

<div id="hud">CORE: V4_FORCE_ANIM<br>GRID: ENABLED<br>USER: LUIS</div>
<div id="joy-l" class="joy"><div id="stick-l" class="stick"></div></div>
<button id="zoom">ZOOM</button>
<div id="joy-r" class="joy"><div id="stick-r" class="stick"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
class LuisEngine {
    constructor() {
        this.move = { x: 0, y: 0 };
        this.look = { x: 0, y: 0 };
        this.isZoom = false;
        this.init();
        this.setupWorld();
        this.loadModels();
        this.controls();
        this.animate();
    }

    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.01, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domElement);
        this.clock = new THREE.Clock();
        
        const light = new THREE.AmbientLight(0xffffff, 2);
        this.scene.add(light);
        
        this.rig = new THREE.Group();
        this.scene.add(this.rig);
        this.rig.add(this.camera);
    }

    setupWorld() {
        // Suelo Matrix (Grid)
        const grid = new THREE.GridHelper(200, 100, 0x00ff41, 0x002200);
        this.scene.add(grid);
    }

    loadModels() {
        const loader = new THREE.GLTFLoader();

        // 1. Ciudad Fija
        loader.load('ciudad_quantum.glb', (g) => {
            this.city = g.scene;
            this.city.position.set(0, -0.05, 0); 
            this.scene.add(this.city);
        });

        // 2. Avatar con Escaneo de Animaciones
        loader.load('luis-avatar2.glb', (g) => {
            this.avatar = g.scene;
            this.avatar.scale.setScalar(0.2); // Escala para que no sea gigante
            this.scene.add(this.avatar);

            this.mixer = new THREE.AnimationMixer(this.avatar);
            this.clips = g.animations;
            
            // Si hay animaciones, preparamos la de "caminar" (suele ser la última o la [1])
            if(this.clips.length > 0) {
                this.idle = this.mixer.clipAction(this.clips[0]);
                this.walk = this.mixer.clipAction(this.clips.length > 1 ? this.clips[1] : this.clips[0]);
                this.idle.play();
            }
        });
    }

    controls() {
        const handleJoy = (id, stickId, type) => {
            const el = document.getElementById(id), st = document.getElementById(stickId);
            let active = false;
            el.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchmove', (e) => {
                if(!active) return;
                const p = e.touches[0], r = el.getBoundingClientRect();
                const x = (p.clientX - (r.left + 50)) / 50, y = (p.clientY - (r.top + 50)) / 50;
                st.style.transform = `translate(calc(-50% + ${x*30}px), calc(-50% + ${y*30}px))`;
                this[type] = { x, y };
            });
            window.addEventListener('touchend', () => {
                active = false; st.style.transform = 'translate(-50%, -50%)';
                this[type] = { x: 0, y: 0 };
            });
        };
        handleJoy('joy-l', 'stick-l', 'move');
        handleJoy('joy-r', 'stick-r', 'look');
        document.getElementById('zoom').onclick = () => this.isZoom = !this.isZoom;
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const dt = this.clock.getDelta();
        if(this.mixer) this.mixer.update(dt);

        if(this.avatar) {
            // Movimiento real del avatar
            const speed = 0.1;
            this.avatar.position.x += this.move.x * speed;
            this.avatar.position.z += this.move.y * speed;

            // Rotación
            if(Math.abs(this.move.x) > 0.1 || Math.abs(this.move.y) > 0.1) {
                this.avatar.rotation.y = Math.atan2(this.move.x, this.move.y);
                if(this.walk && !this.walk.isRunning()) {
                    this.idle.stop();
                    this.walk.play();
                }
            } else {
                if(this.idle && !this.idle.isRunning()) {
                    this.walk.stop();
                    this.idle.play();
                }
            }

            // Cámara sigue al avatar escalado
            this.rig.position.lerp(this.avatar.position, 0.1);
            this.rig.rotation.y -= this.look.x * 0.05;

            const camPos = this.isZoom ? new THREE.Vector3(0, 0.35, 0.25) : new THREE.Vector3(0, 0.25, 1);
            this.camera.position.lerp(camPos, 0.1);
            this.camera.lookAt(new THREE.Vector3(0, this.isZoom ? 0.35 : 0.2, 0).add(this.avatar.position));
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new LuisEngine();
</script>
</body>
</html>
