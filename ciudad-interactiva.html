<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITY WALK - ENGINE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="ui">
    STATUS: ENGINE OK<br>
    CONTROLS: W, A, S, D
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer, loader;
let avatar, city;
let keys = { w: false, a: false, s: false, d: false };
const speed = 0.15;
const rotationSpeed = 0.1;

init();
animate();

function init() {
    // Escena y Cámara
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 5, 10);

    // Renderizador
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Luces
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);
    const sunLight = new THREE.DirectionalLight(0xffffff, 1);
    sunLight.position.set(5, 10, 7);
    scene.add(sunLight);

    loader = new THREE.GLTFLoader();

    // Cargar Ciudad
    loader.load("ciudad_quantum.glb", (gltf) => {
        city = gltf.scene;
        scene.add(city);
        // Opcional: Centrar si el modelo viene desplazado
        const box = new THREE.Box3().setFromObject(city);
        const center = box.getCenter(new THREE.Vector3());
        city.position.sub(center);
    }, undefined, (error) => console.error("Error cargando ciudad:", error));

    // Cargar Avatar
    loader.load("luis-avatar2.glb", (gltf) => {
        avatar = gltf.scene;
        scene.add(avatar);
        avatar.position.set(0, 0, 0);
    }, undefined, (error) => console.error("Error cargando avatar:", error));

    // Listeners de teclado
    window.addEventListener("keydown", (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
    window.addEventListener("keyup", (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
    
    window.addEventListener('resize', onWindowResize, false);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function updateMovement() {
    if (!avatar) return;

    let moveX = 0;
    let moveZ = 0;

    // Calcular dirección basada en teclas
    if (keys.w) moveZ -= 1;
    if (keys.s) moveZ += 1;
    if (keys.a) moveX -= 1;
    if (keys.d) moveX += 1;

    if (moveX !== 0 || moveZ !== 0) {
        // Calcular ángulo de rotación
        const targetAngle = Math.atan2(moveX, moveZ);
        
        // Rotación suave del avatar (Interpolación)
        const currentRotation = avatar.rotation.y;
        avatar.rotation.y = THREE.MathUtils.lerp(currentRotation, targetAngle, rotationSpeed);

        // Mover avatar hacia adelante (basado en su rotación actual para que sea más natural)
        avatar.position.x += Math.sin(avatar.rotation.y) * speed;
        avatar.position.z += Math.cos(avatar.rotation.y) * speed;
    }
}

function animate() {
    requestAnimationFrame(animate);

    updateMovement();

    if (avatar) {
        // La cámara sigue al avatar con un suavizado (lerp)
        const offset = new THREE.Vector3(0, 6, 12); // Posición relativa detrás del avatar
        offset.applyQuaternion(avatar.quaternion); // Opcional: La cámara gira con el avatar
        
        const targetCameraPos = avatar.position.clone().add(new THREE.Vector3(0, 5, 10)); 
        camera.position.lerp(targetCameraPos, 0.1);
        camera.lookAt(avatar.position.x, avatar.position.y + 2, avatar.position.z);
    }

    renderer.render(scene, camera);
}
</script>
</body>
</html>
