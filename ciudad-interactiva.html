<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QUANTUM CITY - FINAL</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; position: fixed; width: 100%; height: 100%; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .controls { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; pointer-events: auto; }
        .btn { width: 70px; height: 70px; border: 3px solid #0ff; display: flex; align-items: center; justify-content: center; color: #0ff; background: rgba(0,255,255,0.1); border-radius: 15px; font-weight: bold; font-size: 24px; -webkit-user-select: none; }
        .btn:active { background: rgba(0,255,255,0.5); }
        .actions { display: flex; flex-direction: column; gap: 12px; pointer-events: auto; }
        .btn-action { width: 110px; height: 50px; background: rgba(255,0,255,0.2); border: 2px solid #f0f; color: #fff; border-radius: 10px; font-size: 14px; font-weight: bold; }
        #loading { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: #0ff; }
    </style>
</head>
<body>

<div id="loading"><h1>CONECTANDO LUIS_QUANTUM...</h1></div>

<div id="ui">
    <div style="display:flex; justify-content: space-between; pointer-events: auto;">
        <a href="index.html" style="color:white; background:red; padding:12px 20px; text-decoration:none; border-radius:8px; font-weight:bold;">SALIR</a>
        <div style="color:cyan; font-family:monospace; border:1px solid cyan; padding:5px;">SISTEMA ONLINE</div>
    </div>

    <div style="display:flex; justify-content: space-between; align-items: flex-end;">
        <div class="controls">
            <div></div><div class="btn" id="w">↑</div><div></div>
            <div class="btn" id="a">←</div><div class="btn" id="s">↓</div><div class="btn" id="d">→</div>
        </div>
        <div class="actions">
            <div class="btn-action" id="run">CORRER</div>
            <div class="btn-action" id="jump">SALTAR</div>
            <div class="btn-action" onclick="location.reload()">REINICIAR</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    let scene, camera, renderer, luis, mixer, clock = new THREE.Clock();
    let player = new THREE.Group();
    let move = { w: false, a: false, s: false, d: false, run: false };
    let velocityY = 0, isJumping = false;

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);

        camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 10000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // ILUMINACIÓN GLOBAL (Si la ciudad está, se verá)
        scene.add(new THREE.AmbientLight(0xffffff, 2));
        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(10, 50, 10);
        scene.add(light);

        scene.add(player);

        const loader = new THREE.GLTFLoader();

        // 🌆 CARGAR CIUDAD
        loader.load('ciudad_quantum.glb', (gltf) => {
            scene.add(gltf.scene);
        }, undefined, (err) => {
            // Cuadrícula solo si falla el archivo
            scene.add(new THREE.GridHelper(500, 50, 0x00ffff, 0x004444));
        });

        // 🧍 CARGAR AVATAR
        loader.load('luis_avatar.glb', (gltf) => {
            luis = gltf.scene;
            
            // FIX: Mirar de frente y ajustar escala
            luis.rotation.y = Math.PI; 
            const box = new THREE.Box3().setFromObject(luis);
            const size = box.getSize(new THREE.Vector3());
            luis.scale.setScalar(1.8 / size.y);

            player.add(luis);
            
            // ANIMACIONES: Forzamos el mixer
            if(gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(luis);
                // Reproducimos TODAS las animaciones detectadas para romper la Pose en T
                gltf.animations.forEach(clip => {
                    mixer.clipAction(clip).play();
                });
            }
            
            document.getElementById('loading').style.display = 'none';
        });

        setupInput();
        animate();
    }

    function setupInput() {
        const events = ['w','a','s','d','run'];
        events.forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); move[id] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); move[id] = false; });
        });

        document.getElementById('jump').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(!isJumping) { velocityY = 0.35; isJumping = true; }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        
        if (mixer) mixer.update(delta);

        if (luis) {
            const speed = (move.run ? 15 : 6) * delta;
            const rotSpeed = 3 * delta;

            // Movimiento
            if (move.w) player.translateZ(speed);
            if (move.s) player.translateZ(-speed);
            if (move.a) player.rotation.y += rotSpeed;
            if (move.d) player.rotation.y -= rotSpeed;

            // Salto (Física corregida)
            if (isJumping) {
                player.position.y += velocityY;
                velocityY -= 0.015; // Gravedad
                if (player.position.y <= 0) {
                    player.position.y = 0;
                    isJumping = false;
                    velocityY = 0;
                }
            }

            // Cámara (GTA Dinámica)
            const camOffset = new THREE.Vector3(0, 3.5, -7);
            camOffset.applyQuaternion(player.quaternion);
            camera.position.lerp(player.position.clone().add(camOffset), 0.1);
            camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
