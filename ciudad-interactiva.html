<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUIS QUANTUM - DUAL WORLD 4K</title>
    <style>
        :root {
            --neon: #00ff41;
            --cyber: #00f6ff;
            --exit: #ff0055;
        }

        /* SEGURIDAD: PROHIBIDO COPIAR */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; outline: none; }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }

        /* EFECTO MATRIX FONDO RENDERIZADO */
        #matrix-bg { position: fixed; inset: 0; z-index: 0; opacity: 0.25; pointer-events: none; }

        /* MENSAJE ARRIBA: RGB RESALTANTE CON RELIEVE */
        #ui-header {
            position: absolute; top: 0; left: 0; width: 100%;
            z-index: 1000; display: flex; justify-content: center;
        }
        #msg-box {
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 3px solid var(--neon);
            width: 100%; padding: 12px;
            box-shadow: 0 5px 20px rgba(0, 255, 65, 0.6);
            transition: opacity 1s;
        }
        #text-render {
            color: var(--neon); font-size: 18px; font-weight: 900;
            text-align: center; margin: 0;
            text-transform: uppercase;
            /* RELIEVE NEGRO RESALTANTE RGB */
            text-shadow: 2px 2px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000, 0 0 10px var(--neon);
        }

        /* BOTÓN SALIR ARRIBA */
        #exit-btn {
            position: absolute; top: 15px; right: 15px; z-index: 1100;
            padding: 10px 20px; border: 2px solid var(--exit);
            background: #000; color: var(--exit); font-weight: bold;
            text-decoration: none; font-size: 12px; box-shadow: 0 0 15px var(--exit);
        }

        /* CONTROLES */
        #ui-bottom {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .joystick { 
            width: 110px; height: 110px; border: 3px solid var(--neon); 
            border-radius: 50%; background: rgba(0, 255, 65, 0.1); 
            position: relative; pointer-events: auto; box-shadow: 0 0 20px var(--neon);
        }
        .knob { width: 45px; height: 45px; background: #fff; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #fff; }
        
        #zoom-btn { 
            width: 80px; height: 80px; border: 3px solid var(--cyber); 
            background: #000; color: var(--cyber); border-radius: 50%; 
            font-weight: bold; font-size: 11px; cursor: pointer;
            box-shadow: 0 0 20px var(--cyber);
        }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>
<audio id="musica-dual" loop><source src="este-loco-mundo-dual.mp3" type="audio/mpeg"></audio>

<a href="index.html" id="exit-btn">SALIR</a>

<div id="ui-header"><div id="msg-box"><p id="text-render"></p></div></div>

<div id="ui-bottom">
    <div id="joy-l" class="joystick"><div id="knob-l" class="knob"></div></div>
    <button id="zoom-btn">ZOOM 4K<br>ROSTRO</button>
    <div id="joy-r" class="joystick"><div id="knob-r" class="knob"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
// MATRIX BACKGROUND
const canvas = document.getElementById('matrix-bg'), ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const drops = Array(Math.floor(canvas.width/16)).fill(1);
function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.08)"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#0F0"; ctx.font = "16px monospace";
    drops.forEach((y,i)=>{
        ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
        if(y*16 > canvas.height && Math.random()>0.975) drops[i]=0; drops[i]++;
    });
}
setInterval(drawMatrix, 35);

// TYPING RGB
const msg = "SISTEMA DUAL ACTIVO. METACOGNICIÓN DIGITAL 4K. SIN RASTRO DE HACKEO. CIUDAD BLOQUEADA EN EL HORIZONTE.";
let charIdx = 0;
function type() {
    const el = document.getElementById('text-render');
    if(charIdx < msg.length) { el.innerHTML += msg.charAt(charIdx); charIdx++; setTimeout(type, 40); }
    else { setTimeout(()=> document.getElementById('msg-box').style.opacity="0", 7000); }
}

// 3D ENGINE
class QuantumApp {
    constructor() {
        this.input = { mv:{x:0,y:0}, lk:{x:0,y:0} }; this.isZoom = false; this.time = 0;
        this.init(); this.load(); this.events(); this.render();
    }
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 5000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domElement);
        
        this.scene.add(new THREE.AmbientLight(0xffffff, 2.5));
        
        // SUELO TIPO MATRIX (Líneas verdes en vez de negro)
        const grid = new THREE.GridHelper(1000, 100, 0x00ff41, 0x002200);
        this.scene.add(grid);

        this.rig = new THREE.Group(); this.scene.add(this.rig); this.rig.add(this.camera);
    }
    load() {
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);

        // CIUDAD: 0.33 MÁS LEJOS Y DETRÁS
        loader.load('ciudad_quantum.glb', (g) => {
            this.city = g.scene;
            this.city.position.set(0, 5, -65); // Bloqueada al fondo
            this.city.scale.setScalar(6);
            this.scene.add(this.city);
        });

        loader.load('luis-avatar2.glb', (g) => {
            this.avatar = g.scene; 
            this.avatar.scale.setScalar(0.28);
            this.avatar.position.set(0, 0, 0); // Inicio en el centro
            this.scene.add(this.avatar);
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(g.animations.length>0) this.mixer.clipAction(g.animations[0]).play();
            type();
        });
    }
    events() {
        const audio = document.getElementById('musica-dual');
        const setup = (id, kId, type) => {
            const el = document.getElementById(id), kn = document.getElementById(kId);
            let active = false;
            const h = (e) => {
                if(!active) return; audio.play().catch(()=>{});
                const p = e.touches ? e.touches[0] : e; const r = el.getBoundingClientRect();
                const x = (p.clientX-(r.left+55))/55, y = (p.clientY-(r.top+55))/55;
                const m = Math.min(Math.sqrt(x*x+y*y), 1), a = Math.atan2(y,x);
                kn.style.transform = `translate(calc(-50% + ${Math.cos(a)*m*35}px), calc(-50% + ${Math.sin(a)*m*35}px))`;
                this.input[type] = {x: Math.cos(a)*m, y: Math.sin(a)*m};
            };
            el.addEventListener('touchstart', ()=> active=true);
            window.addEventListener('touchmove', h);
            window.addEventListener('touchend', ()=>{ active=false; kn.style.transform='translate(-50%,-50%)'; this.input[type]={x:0,y:0}; });
        };
        setup('joy-l','knob-l','mv'); setup('joy-r','knob-r','lk');
        document.getElementById('zoom-btn').onclick = () => { audio.play(); this.isZoom = !this.isZoom; };
    }
    render() {
        requestAnimationFrame(()=>this.render()); this.time += 0.025;
        if(this.mixer) this.mixer.update(0.016);
        
        // EFECTO INCEPTION CIUDAD
        if(this.city) {
            this.city.rotation.y += 0.001; 
            this.city.rotation.x = Math.sin(this.time * 0.5) * 0.05;
        }

        if(this.avatar) {
            // FÍSICA SÓLIDA: NO ATRAVIESA LA CIUDAD
            const speed = 0.18;
            const nextX = this.avatar.position.x + this.input.mv.x * speed;
            const nextZ = this.avatar.position.z + this.input.mv.y * speed;

            // Límite de seguridad: el avatar no puede pasar de Z = -35 (donde empieza la ciudad)
            if(nextZ > -35) {
                this.avatar.position.x = nextX;
                this.avatar.position.z = nextZ;
            }

            this.avatar.position.y = 0.1 + Math.sin(this.time*2.5)*0.04;
            if(Math.abs(this.input.mv.x)>0.05) this.avatar.rotation.y = Math.atan2(this.input.mv.x, this.input.mv.y);

            this.rig.position.lerp(this.avatar.position, 0.1);
            this.rig.rotation.y -= this.input.lk.x * 0.05;

            // ZOOM 4K AL ROSTRO
            const tZ = this.isZoom ? 0.35 : 1.5;
            const tY = this.isZoom ? 0.45 : 0.35;
            this.camera.position.lerp(new THREE.Vector3(0, tY, tZ), 0.1);
            this.camera.lookAt(new THREE.Vector3(0, tY, 0).add(this.avatar.position));
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new QuantumApp();
</script>
</body>
</html>
