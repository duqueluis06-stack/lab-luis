<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>QUANTUM CITY GAME</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
touch-action:none;
}

body{
overflow:hidden;
background:#000;
font-family:monospace;
}

#debug{
position:absolute;
top:10px;
left:10px;
z-index:10;
color:#0f0;
background:rgba(0,0,0,0.6);
padding:6px;
font-size:12px;
}

#loader{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
color:#0ff;
z-index:9999;
}

#exit{
position:fixed;
top:10px;
right:10px;
z-index:20;
padding:10px 14px;
border:1px solid #f55;
color:#f55;
background:rgba(0,0,0,0.4);
}

/* JOYSTICK IZQUIERDO */
.leftPad{
position:fixed;
bottom:20px;
left:20px;
display:grid;
grid-template-columns:60px 60px 60px;
grid-template-rows:60px 60px 60px;
gap:5px;
z-index:50;
}

.leftPad button{
background:#000;
border:2px solid #0ff;
color:#0ff;
border-radius:10px;
font-size:14px;
}

.leftPad button:active{
background:#0ff;
color:#000;
}

/* ACCIONES DERECHA */
.rightPad{
position:fixed;
bottom:20px;
right:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:50;
}

.rightPad button{
width:60px;
height:60px;
background:#000;
border:2px solid #0ff;
color:#0ff;
border-radius:10px;
}
</style>
</head>

<body>

<div id="loader">CARGANDO SISTEMA...</div>
<div id="debug">INIT</div>

<button id="exit" onclick="location.href='index.html'">SALIR</button>

<!-- IZQUIERDA MOVIMIENTO -->
<div class="leftPad">
<div></div>
<button ontouchstart="move(0,1)" ontouchend="move(0,0)">▲</button>
<div></div>

<button ontouchstart="move(-1,0)" ontouchend="move(0,0)">◀</button>
<div></div>
<button ontouchstart="move(1,0)" ontouchend="move(0,0)">▶</button>

<div></div>
<button ontouchstart="move(0,-1)" ontouchend="move(0,0)">▼</button>
<div></div>
</div>

<!-- DERECHA ACCIONES -->
<div class="rightPad">
<button onclick="mode='walk'">🚶</button>
<button onclick="mode='run'">🏃</button>
<button onclick="jump()">⬆</button>
<button onclick="climb()">🧗</button>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

/* =========================
   CORE
========================= */

let scene,camera,renderer;
let avatar=null;
let mixer=null;
let clock=new THREE.Clock();

let vx=0,vz=0;
let speed=0.05;
let mode="walk";

/* ========================= */
function log(t){
document.getElementById("debug").innerText=t;
}

/* ========================= */
function move(x,z){
vx=x;
vz=z;
}

/* ========================= */
function jump(){
if(avatar) avatar.position.y += 0.5;
}

/* ========================= */
function climb(){
if(avatar) avatar.position.y += 0.2;
}

/* ========================= */
init();
animate();

/* =========================
   INIT SAFE
========================= */
function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x000010);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,3,6);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,2));

const loader=new THREE.GLTFLoader();

/* =========================
   CIUDAD (NO BLOQUEANTE)
========================= */
loader.load("ciudad_quantum.glb",
g=>{
scene.add(g.scene);
log("CIUDAD OK");
},
undefined,
e=>{
log("CIUDAD FALLBACK");
});

/* =========================
   AVATAR (NO BLOQUEANTE)
========================= */
loader.load("luis-avatar2.glb",
a=>{

avatar=a.scene;
avatar.scale.set(1,1,1);
avatar.position.set(0,1,0);
scene.add(avatar);

mixer=new THREE.AnimationMixer(avatar);

if(a.animations && a.animations.length>0){
let action=mixer.clipAction(a.animations[0]);
action.play();
log("AVATAR OK");
}else{
log("SIN ANIM");
}

document.getElementById("loader").style.display="none";
},
undefined,
e=>{
log("AVATAR FALLBACK");
document.getElementById("loader").style.display="none";
});

}

/* =========================
   LOOP
========================= */
function animate(){

requestAnimationFrame(animate);

let dt=clock.getDelta();

if(mixer) mixer.update(dt);

if(avatar){

/* MOVIMIENTO */
if(vx||vz){
let sp = mode==="run"? speed*2 : speed;

avatar.position.x += vx * sp;
avatar.position.z += vz * sp;

/* orientación */
avatar.rotation.y = Math.atan2(vx,vz);
}

/* CÁMARA FOLLOW */
camera.position.lerp(
new THREE.Vector3(
avatar.position.x,
avatar.position.y+3,
avatar.position.z+6
),0.08);

camera.lookAt(avatar.position);

}

renderer.render(scene,camera);

}

</script>

</body>
</html>
