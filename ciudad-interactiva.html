<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Lite - Fast Load</title>
    <style>
        :root { --neon: #00f6ff; --magenta: #ff00ff; }
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* UI */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .btn { pointer-events: auto; background: rgba(0,0,0,0.7); border: 2px solid var(--neon); color: var(--neon); padding: 10px 20px; cursor: pointer; font-weight: bold; box-shadow: 0 0 10px var(--neon); text-decoration: none; }
        #exit { border-color: var(--magenta); color: var(--magenta); align-self: flex-end; }
        
        #controls { display: flex; justify-content: space-between; align-items: flex-end; }
        #joy { width: 120px; height: 120px; border-radius: 50%; border: 1px solid var(--neon); position: relative; display: flex; align-items: center; justify-content: center; }
        #knob { width: 50px; height: 50px; background: var(--neon); border-radius: 50%; position: absolute; box-shadow: 0 0 15px var(--neon); }
        #zoom { width: 80px; height: 80px; border-radius: 50%; border-color: #fff; color: #fff; }
        #zoom.active { background: #fff; color: #000; }

        /* Loader Simple */
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: var(--neon); }
    </style>
</head>
<body>

<div id="loader"><h2>CARGANDO...</h2></div>

<div id="ui">
    <a href="index.html" id="exit" class="btn">SALIR</a>
    <div id="controls">
        <div id="joy"><div id="knob"></div></div>
        <button id="zoom" class="btn">ZOOM</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
class QuantumLite {
    constructor() {
        this.init();
        this.lights();
        this.load();
        this.controls();
        this.animate();
    }

    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.camera.position.set(0, 1.2, 3.5);

        this.renderer = new THREE.WebGLRenderer({ antialias: false }); // Antialias off para velocidad
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domElement);
    }

    lights() {
        this.scene.add(new THREE.AmbientLight(0xffffff, 1.0)); // Luz global fuerte para que todo se vea
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(2, 5, 5);
        this.scene.add(sun);
    }

    load() {
        const loader = new THREE.GLTFLoader();
        
        // Ciudad
        loader.load('ciudad_quantum.glb', (glb) => {
            this.city = glb.scene;
            this.city.position.set(0, 0, -5);
            this.scene.add(this.city);
        });

        // Avatar
        loader.load('luis-avatar2.glb', (glb) => {
            this.avatar = glb.scene;
            this.scene.add(this.avatar);
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(glb.animations.length > 0) this.mixer.clipAction(glb.animations[0]).play();
            document.getElementById('loader').style.display = 'none';
        });
    }

    controls() {
        this.rotY = 0; this.isZoom = false; this.active = false;
        const knob = document.getElementById('knob');
        const joy = document.getElementById('joy');

        const move = (e) => {
            if(!this.active) return;
            const t = e.touches ? e.touches[0] : e;
            const r = joy.getBoundingClientRect();
            const dx = t.clientX - (r.left + r.width/2);
            const dist = Math.min(Math.abs(dx), 50);
            knob.style.left = `calc(50% + ${Math.sign(dx)*dist}px - 25px)`;
            this.rotY = Math.sign(dx) * (dist/50) * 0.06;
        };

        joy.ontouchstart = () => this.active = true;
        window.ontouchmove = move;
        window.ontouchend = () => { this.active = false; knob.style.left = 'calc(50% - 25px)'; this.rotY = 0; };

        const zBtn = document.getElementById('zoom');
        zBtn.ontouchstart = (e) => { e.preventDefault(); this.isZoom = true; zBtn.classList.add('active'); };
        zBtn.ontouchend = () => { this.isZoom = false; zBtn.classList.remove('active'); };
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        if(this.mixer) this.mixer.update(0.016);
        if(this.avatar) {
            this.avatar.rotation.y += this.rotY;
            const tPos = this.isZoom ? new THREE.Vector3(0, 1.6, 0.8) : new THREE.Vector3(0, 1.1, 3.5);
            this.camera.position.lerp(tPos, 0.1);
            this.camera.lookAt(0, this.isZoom ? 1.6 : 1, 0);
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new QuantumLite();
</script>
</body>
</html>
