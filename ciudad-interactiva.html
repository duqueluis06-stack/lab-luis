<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUIS QUANTUM - INCEPTION FINAL</title>
    <style>
        :root {
            --m-green: #00ff41;
            --n-cyan: #00f6ff;
            --n-pink: #ff00ff;
        }

        /* SEGURIDAD: NO COPIAR */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }

        #matrix-bg { position: fixed; inset: 0; z-index: 1; opacity: 0.2; pointer-events: none; }

        /* MENSAJE ANGOSTO ARRIBA */
        #ui-header {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; z-index: 1000; pointer-events: none;
        }
        #msg-box {
            background: rgba(0, 10, 0, 0.9); border: 1px solid var(--m-green);
            padding: 8px 15px; border-radius: 4px; transition: opacity 1s;
        }
        #text-render {
            color: #fff; font-size: 16px; text-align: center; margin: 0;
            text-shadow: 0 0 5px var(--m-green);
        }

        #exit-btn {
            position: absolute; top: 15px; right: 15px; z-index: 1100;
            padding: 8px 15px; border: 1px solid var(--n-pink);
            color: var(--n-pink); text-decoration: none; font-size: 10px;
        }

        #ui-controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .joystick { width: 90px; height: 90px; border: 2px solid var(--m-green); border-radius: 50%; position: relative; pointer-events: auto; }
        .knob { width: 35px; height: 35px; background: #fff; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #zoom-btn { width: 65px; height: 65px; border: 2px solid var(--n-cyan); background: #000; color: var(--n-cyan); border-radius: 50%; font-size: 9px; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>
<audio id="musica-dual" loop><source src="este-loco-mundo-dual.mp3" type="audio/mpeg"></audio>
<a href="index.html" id="exit-btn">EXIT</a>

<div id="ui-header"><div id="msg-box"><p id="text-render"></p></div></div>

<div id="ui-controls">
    <div id="joy-l" class="joystick"><div id="knob-l" class="knob"></div></div>
    <button id="zoom-btn">ZOOM 4K</button>
    <div id="joy-r" class="joystick"><div id="knob-r" class="knob"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/DRACOLoader.js"></script>

<script>
// MATRIX EFFECT
const canvas = document.getElementById('matrix-bg'), ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const letters = "010101010110101"; const fontSize = 16;
const drops = Array(Math.floor(canvas.width/fontSize)).fill(1);
function drawM() {
    ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#0F0"; ctx.font = fontSize+"px monospace";
    drops.forEach((y,i)=>{
        ctx.fillText(letters[Math.floor(Math.random()*letters.length)], i*fontSize, y*fontSize);
        if(y*fontSize > canvas.height && Math.random()>0.975) drops[i]=0; drops[i]++;
    });
}
setInterval(drawM, 35);

// TYPING
const msg = "Metacognición digital activa. Mundo real y avatar fusionados. Seguridad 4K. Bienvenido al mundo dual.";
let charIdx = 0;
function type() {
    const el = document.getElementById('text-render');
    if(charIdx < msg.length) { el.innerHTML += msg.charAt(charIdx); charIdx++; setTimeout(type, 40); }
    else { setTimeout(()=> document.getElementById('msg-box').style.opacity="0", 5000); }
}

// THREE.JS
class World {
    constructor() {
        this.input = { mv:{x:0,y:0}, lk:{x:0,y:0} }; this.isZoom = false; this.time = 0;
        this.init(); this.load(); this.events(); this.render();
    }
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 3000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domElement);
        this.scene.add(new THREE.AmbientLight(0xffffff, 2));
        this.scene.add(new THREE.GridHelper(500, 100, 0x00ff41, 0x001100));
        this.rig = new THREE.Group(); this.scene.add(this.rig); this.rig.add(this.camera);
    }
    load() {
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(draco);

        // CARGA CIUDAD - Nombre exacto
        loader.load('ciudad_quantum.glb', (g) => {
            this.city = g.scene;
            this.city.position.set(0, 0, -50); // Forzada atrás
            this.city.scale.setScalar(5);
            this.scene.add(this.city);
        }, undefined, (e) => console.error("Error ciudad:", e));

        loader.load('luis-avatar2.glb', (g) => {
            this.avatar = g.scene; this.avatar.scale.setScalar(0.28);
            this.scene.add(this.avatar);
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(g.animations.length>0) this.mixer.clipAction(g.animations[0]).play();
            type();
        });
    }
    events() {
        const audio = document.getElementById('musica-dual');
        const setup = (id, kId, type) => {
            const el = document.getElementById(id), kn = document.getElementById(kId);
            let active = false;
            const h = (e) => {
                if(!active) return; audio.play().catch(()=>{});
                const p = e.touches ? e.touches[0] : e; const r = el.getBoundingClientRect();
                const x = (p.clientX-(r.left+45))/45, y = (p.clientY-(r.top+45))/45;
                const m = Math.min(Math.sqrt(x*x+y*y), 1), a = Math.atan2(y,x);
                kn.style.transform = `translate(calc(-50% + ${Math.cos(a)*m*25}px), calc(-50% + ${Math.sin(a)*m*25}px))`;
                this.input[type] = {x: Math.cos(a)*m, y: Math.sin(a)*m};
            };
            el.addEventListener('touchstart', ()=> active=true);
            window.addEventListener('touchmove', h);
            window.addEventListener('touchend', ()=>{ active=false; kn.style.transform='translate(-50%,-50%)'; this.input[type]={x:0,y:0}; });
        };
        setup('joy-l','knob-l','mv'); setup('joy-r','knob-r','lk');
        document.getElementById('zoom-btn').onclick = () => this.isZoom = !this.isZoom;
    }
    render() {
        requestAnimationFrame(()=>this.render()); this.time += 0.02;
        if(this.mixer) this.mixer.update(0.016);
        if(this.city) { 
            this.city.rotation.y += 0.002; 
            this.city.rotation.x = Math.sin(this.time)*0.05; // Efecto Inception
        }
        if(this.avatar) {
            this.avatar.position.x += this.input.mv.x * 0.16;
            this.avatar.position.z += this.input.mv.y * 0.16;
            this.avatar.position.y = 0.1 + Math.sin(this.time*2)*0.04;
            if(Math.abs(this.input.mv.x)>0.05) this.avatar.rotation.y = Math.atan2(this.input.mv.x, this.input.mv.y);
            this.rig.position.lerp(this.avatar.position, 0.1);
            this.rig.rotation.y -= this.input.lk.x * 0.04;
            const tZ = this.isZoom ? 0.38 : 1.35;
            this.camera.position.lerp(new THREE.Vector3(0, 0.4, tZ), 0.1);
            this.camera.lookAt(new THREE.Vector3(0, 0.3, 0).add(this.avatar.position));
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new World();
</script>
</body>
</html>
