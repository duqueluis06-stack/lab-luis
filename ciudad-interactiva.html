<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SISTEMA DE RECUPERACIÓN QUANTUM</title>

<style>
*{
    margin:0;
    padding:0;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
    touch-action:none;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:monospace;
}

#debug{
    position:absolute;
    top:10px;
    left:10px;
    color:#0f0;
    background:rgba(0,0,0,0.6);
    padding:6px;
    font-size:12px;
    z-index:10;
}

#loader{
    position:fixed;
    inset:0;
    background:#000;
    color:#0ff;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

#exit{
    position:fixed;
    top:10px;
    right:10px;
    z-index:9999;
    padding:10px;
    border:2px solid red;
    color:red;
    background:transparent;
}

.left{
    position:fixed;
    bottom:20px;
    left:20px;
    display:grid;
    grid-template-columns:60px 60px 60px;
    grid-template-rows:60px 60px 60px;
    gap:6px;
    z-index:999;
}

.right{
    position:fixed;
    bottom:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:8px;
    z-index:999;
}

button{
    width:60px;
    height:60px;
    border-radius:12px;
    background:rgba(0,0,0,0.6);
    border:2px solid #0ff;
    color:#0ff;
    font-size:12px;
}

button:active{
    background:#0ff;
    color:#000;
}
</style>
</head>

<body>

<div id="loader">CARGANDO SISTEMA...</div>
<div id="debug">INIT</div>

<button id="exit" onclick="location.href='index.html'">SALIR</button>

<div class="left">
    <div></div>
    <button ontouchstart="move(0,-1)" ontouchend="move(0,0)">▲</button>
    <div></div>

    <button ontouchstart="move(-1,0)" ontouchend="move(0,0)">◀</button>
    <div></div>
    <button ontouchstart="move(1,0)" ontouchend="move(0,0)">▶</button>

    <div></div>
    <button ontouchstart="move(0,1)" ontouchend="move(0,0)">▼</button>
    <div></div>
</div>

<div class="right">
    <button onclick="setSpeed(0.05)">🚶</button>
    <button onclick="setSpeed(0.12)">🏃</button>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

let scene,camera,renderer;
let city,avatar;
let mixer,cityMixer;
let clock=new THREE.Clock();

let vx=0, vz=0;
let speed=0.06;

let controls;

function log(t){
    document.getElementById("debug").innerText=t;
}

function move(x,z){
    vx=x;
    vz=z;
}

function setSpeed(s){
    speed=s;
}

function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x000010);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,3,6);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,2));

controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

const draco=new THREE.DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/v1/decoders/");

const loader=new THREE.GLTFLoader();
loader.setDRACOLoader(draco);

log("Cargando ciudad...");

loader.load("ciudad_quantum.glb",(gltf)=>{

scene.add(gltf.scene);

if(gltf.animations.length){
    cityMixer=new THREE.AnimationMixer(gltf.scene);
    gltf.animations.forEach(c=>cityMixer.clipAction(c).play());
}

log("Ciudad OK → avatar");

loader.load("luis_avatar.glb",(av)=>{

avatar=av.scene;

/* 👤 ESCALA SEGURA */
avatar.scale.set(1,1,1);
avatar.position.set(0,1,0);

scene.add(avatar);

/* 🎬 MIXER ROBUSTO */
mixer=new THREE.AnimationMixer(avatar);

/* 🔥 FALLBACK: no depende de nombres */
if(av.animations && av.animations.length>0){

    let action=mixer.clipAction(av.animations[0]);
    action.play();

    log("ANIM OK");
}else{
    log("SIN ANIMACIONES");
}

/* FIX SKIN */
avatar.traverse(o=>{
    if(o.isSkinnedMesh){
        o.frustumCulled=false;
    }
});

document.getElementById("loader").style.display="none";

});

});

}

function animate(){

requestAnimationFrame(animate);

let delta=clock.getDelta();

if(mixer)mixer.update(delta);
if(cityMixer)cityMixer.update(delta);

if(avatar){

let moving = (vx!==0 || vz!==0);

/* MOVIMIENTO */
if(moving){
    avatar.position.x += vx*speed;
    avatar.position.z += vz*speed;
}

/* CAMARA FOLLOW */
camera.position.lerp(
    new THREE.Vector3(
        avatar.position.x,
        avatar.position.y+3,
        avatar.position.z+6
    ),
    0.05
);

camera.lookAt(avatar.position);

}

if(controls)controls.update();

renderer.render(scene,camera);

}

init();
animate();

</script>

</body>
</html>
