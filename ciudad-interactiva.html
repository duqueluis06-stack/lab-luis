<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>QUANTUM CITY - RECONSTRUCCIÓN TOTAL</title>

<style>
    /* RESET TOTAL PARA iPHONE */
    * { margin:0; padding:0; box-sizing:border-box; }
    body{ margin:0; overflow:hidden; background:#000; position:fixed; width:100%; height:100%; font-family:sans-serif; touch-action:none; }
    canvas{ display:block; touch-action:none; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }

    /* UI PRINCIPAL */
    #ui{
        position:absolute; inset:0;
        display:flex; flex-direction:column;
        justify-content:space-between;
        padding:20px;
        pointer-events:none; /* Deja pasar los toques al canvas si no es un botón */
        z-index:100;
    }

    /* HEADER */
    .header{
        display:flex; justify-content:space-between; align-items:center;
        pointer-events:auto;
    }
    .btn-exit{
        background:rgba(255,0,0,0.5); border:2px solid #ff4444; color:white;
        padding:10px 18px; border-radius:8px; text-decoration:none;
        font-weight:bold; font-size:14px; -webkit-user-select:none;
    }

    /* CONTROLES INFERIORES */
    .bottom-ui{
        display:flex; justify-content:space-between; align-items:flex-end;
        pointer-events:none;
    }

    /* JOYSTICK (IZQUIERDA) */
    .controls{
        display:grid;
        grid-template-columns:repeat(3,70px);
        gap:8px;
        pointer-events:auto;
    }

    /* ACCIONES (DERECHA) */
    .actions{
        display:flex; flex-direction:column; gap:12px;
        pointer-events:auto;
    }

    /* BOTONES GENERALES */
    .btn{
        width:70px; height:70px;
        background:rgba(0,255,255,0.15);
        border:2px solid cyan;
        display:flex; align-items:center; justify-content:center;
        color:#0ff; border-radius:15px;
        font-size:24px; font-weight:bold;
        user-select:none; -webkit-user-select:none;
        touch-action:manipulation;
    }
    /* Efecto de pulsación para saber que funciona */
    .btn:active { background: rgba(0,255,255,0.5); transform: scale(0.95); }

    .btn-action{
        width:90px; height:48px;
        background:rgba(255,0,255,0.2); border-color:magenta;
        border-radius:10px; font-size:12px;
    }
    .btn-action:active { background:magenta; }

    /* PANTALLA DE CARGA */
    #loading{
        position:fixed; inset:0; background:#000;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        color:cyan; z-index:1000;
    }
    .spinner {
        width: 40px; height: 40px; border: 4px solid #0ff;
        border-top-color: transparent; border-radius: 50%;
        animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<div id="loading">
    <div class="spinner"></div>
    <div id="load-status">INICIALIZANDO MATRIZ...</div>
</div>

<div id="ui">
    <div class="header">
        <a href="index.html" class="btn-exit">SALIR</a>
        <div style="color:cyan; font-family:monospace; font-size:12px;">LUIS_ENGINE v6.0</div>
    </div>

    <div class="bottom-ui">
        <div class="controls">
            <div></div><div class="btn" id="w">↑</div><div></div>
            <div class="btn" id="a">←</div><div class="btn" id="s">↓</div><div class="btn" id="d">→</div>
        </div>

        <div class="actions">
            <div class="btn btn-action" id="run">CORRER 🏃‍♂️</div>
            <div class="btn btn-action" id="jump">SALTAR ⚡</div>
            <div class="btn btn-action" onclick="resetLuis()">RESCATE 🆘</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene, camera, renderer;
let player = new THREE.Object3D(); // Pivote del jugador
let luis, mixer, clock = new THREE.Clock();
let keys = { w:false, a:false, s:false, d:false, run:false };

// Física de salto
let velocityY = 0;
let isJumping = false;
const gravity = -0.015;

// Estado de carga
let cityLoaded = false;
let avatarLoaded = false;

init();

function init() {
    scene = new THREE.Scene();
    // Cielo oscuro pero visible
    scene.background = new THREE.Color(0x05050a);

    // Cámara ajustada para iPhone (FOV 75)
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    // Crucial para la nitidez en iPhone sin matar el rendimiento
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    // --- ILUMINACIÓN POTENTE (Solución Ciudad Negra) ---
    // Luz ambiental fuerte
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    // Luz direccional ("sol")
    const sun = new THREE.DirectionalLight(0xffffff, 2);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    // Añadimos el pivote del jugador a la escena
    scene.add(player);

    const loader = new THREE.GLTFLoader();
    const statusEl = document.getElementById('load-status');

    // 🌆 CARGAR CIUDAD
    statusEl.innerText = "DESCARGANDO CIUDAD (4MB)...";
    loader.load("ciudad_quantum.glb", (gltf) => {
        scene.add(gltf.scene);
        cityLoaded = true;
        checkAllLoaded();
    }, undefined, (err) => {
        console.error("Error ciudad:", err);
        statusEl.innerText = "ERROR CARGANDO CIUDAD";
        // Suelo de emergencia si falla la ciudad
        scene.add(new THREE.GridHelper(100, 100, 0x00ffff, 0x004444));
        cityLoaded = true; // Permitimos continuar
        checkAllLoaded();
    });

    // 🧍 CARGAR AVATAR
    loader.load("luis_avatar.glb", (gltf) => {
        luis = gltf.scene;
        
        // --- FIX DEFINITIVO: ROTACIÓN Y POSTURA ---
        // Rotación 0 para que mire al frente del player
        luis.rotation.y = 0; 
        
        // Escalar dinámicamente a altura humana (1.75m aprox)
        const box = new THREE.Box3().setFromObject(luis);
        const size = box.getSize(new THREE.Vector3());
        const scale = 1.75 / size.y;
        luis.scale.setScalar(scale);

        // Añadimos Luis al pivote
        player.add(luis);
        
        // Animaciones
        if(gltf.animations.length){
            mixer = new THREE.AnimationMixer(luis);
            // Reproducimos la primera animación (normalmente walk o idle)
            mixer.clipAction(gltf.animations[0]).play();
        }
        avatarLoaded = true;
        checkAllLoaded();
    });

    setupControls();
    animate();
}

function checkAllLoaded() {
    if(cityLoaded && avatarLoaded) {
        document.getElementById('loading').style.display = 'none';
        resetLuis(); // Posición inicial
    }
}

function setupControls() {
    const ids = ["w", "a", "s", "d", "run"];
    ids.forEach(id => {
        const btn = document.getElementById(id);
        
        // --- BLINDAJE iPHONE (touchstart) ---
        // passive:false es necesario para usar preventDefault()
        btn.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            keys[id] = true; 
        }, {passive: false});
        
        btn.addEventListener('touchend', (e) => { 
            e.preventDefault(); 
            keys[id] = false; 
        }, {passive: false});
        
        // Fallback para PC
        btn.addEventListener('mousedown', () => keys[id] = true);
        btn.addEventListener('mouseup', () => keys[id] = false);
    });

    // Botón Saltar
    const jumpBtn = document.getElementById('jump');
    jumpBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(!isJumping) {
            velocityY = 0.4; // Fuerza de salto
            isJumping = true;
        }
    }, {passive: false});
}

function resetLuis() {
    if(!luis) return;
    // Teletransporte al origen
    player.position.set(0, 0, 0);
    player.rotation.set(0, 0, 0);
    velocityY = 0;
}

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();

    // Actualizar animaciones
    if (mixer) mixer.update(dt);

    if (luis) {
        // Velocidades (dependientes del delta time para fluidez)
        const currentSpeed = keys.run ? 10 : 5;
        const speed = currentSpeed * dt;
        const rotSpeed = 2.5 * dt;

        // Movimiento Lógico Relativo (W avanza hacia donde mira el player)
        if (keys.w) player.translateZ(speed);
        if (keys.s) player.translateZ(-speed);
        if (keys.a) player.rotation.y += rotSpeed;
        if (keys.d) player.rotation.y -= rotSpeed;

        // --- FÍSICA DE SALTO ---
        player.position.y += velocityY;
        if(player.position.y > 0) {
            // Está en el aire, aplicar gravedad
            velocityY += gravity;
        } else {
            // Tocó el suelo
            player.position.y = 0;
            velocityY = 0;
            isJumping = false;
        }

        // --- CÁMARA GTA III / V (Seguimiento Dinámico) ---
        // Calculamos la posición ideal: 3 unidades arriba, 7 unidades atrás
        const idealOffset = new THREE.Vector3(0, 3, -7); 
        idealOffset.applyQuaternion(player.quaternion); // Rotamos el offset según el player
        idealOffset.add(player.position); // Sumamos la posición del player

        // Punto al que mirar: 1.5 unidades arriba del player (la cabeza)
        const idealLookAt = player.position.clone();
        idealLookAt.y += 1.5;

        // Interpolación (lerp) para suavizado de cámara (0.1 = 10% por frame)
        camera.position.lerp(idealOffset, 0.1);
        camera.lookAt(idealLookAt);
    }

    renderer.render(scene, camera);
}

// Corregir tamaño al girar el iPhone
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
