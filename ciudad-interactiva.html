<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LAB-LUIS QUANTUM</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; position: fixed; width: 100%; height: 100%; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .controls { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; pointer-events: auto; }
        .btn { width: 70px; height: 70px; border: 2px solid #0ff; display: flex; align-items: center; justify-content: center; color: #0ff; background: rgba(0,255,255,0.1); border-radius: 15px; font-weight: bold; font-size: 24px; -webkit-user-select: none; }
        .btn:active { background: rgba(0,255,255,0.5); }
        .actions { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .btn-action { width: 100px; height: 50px; background: rgba(255,0,255,0.2); border: 2px solid #f0f; color: #fff; border-radius: 10px; font-size: 12px; font-weight: bold; }
        #loading { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: #0ff; }
    </style>
</head>
<body>

<div id="loading"><h1>CARGANDO CIUDAD Y AVATAR...</h1></div>

<div id="ui">
    <div style="display:flex; justify-content: space-between; pointer-events: auto;">
        <a href="index.html" style="color:white; background:red; padding:10px; text-decoration:none; border-radius:5px; font-weight:bold;">SALIR</a>
        <div id="status" style="color:#0ff; font-family:monospace;">STBY</div>
    </div>

    <div style="display:flex; justify-content: space-between; align-items: flex-end;">
        <div class="controls">
            <div></div><div class="btn" id="w">↑</div><div></div>
            <div class="btn" id="a">←</div><div class="btn" id="s">↓</div><div class="btn" id="d">→</div>
        </div>
        <div class="actions">
            <div class="btn-action" id="run">CORRER</div>
            <div class="btn-action" id="jump">SALTAR</div>
            <div class="btn-action" onclick="location.reload()">RECARGAR</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    let scene, camera, renderer, luis, mixer, clock = new THREE.Clock();
    let player = new THREE.Group();
    let move = { w: false, a: false, s: false, d: false, run: false };
    let velocityY = 0, isJumping = false;

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // LUZ MASIVA (Para evitar oscuridad)
        scene.add(new THREE.AmbientLight(0xffffff, 2));
        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        scene.add(player);

        const loader = new THREE.GLTFLoader();

        // 1. CARGAR CIUDAD
        loader.load('ciudad_quantum.glb', (gltf) => {
            scene.add(gltf.scene);
            document.getElementById('status').innerText = "CITY: OK";
        }, undefined, (err) => {
            console.error(err);
            // Si falla la ciudad, ponemos la cuadrícula para no estar en el vacío
            scene.add(new THREE.GridHelper(200, 50, 0x00ff00, 0x004400));
            document.getElementById('status').innerText = "CITY: ERR";
        });

        // 2. CARGAR AVATAR
        loader.load('luis_avatar.glb', (gltf) => {
            luis = gltf.scene;
            
            // --- EL FIX QUE PEDISTE: DE FRENTE ---
            // Rotamos el modelo 180 grados (Math.PI) sobre su propio eje para que mire a cámara
            luis.rotation.y = Math.PI; 
            
            // Escala para que no sea un gigante
            const box = new THREE.Box3().setFromObject(luis);
            const size = box.getSize(new THREE.Vector3());
            luis.scale.setScalar(1.8 / size.y);

            player.add(luis);
            
            // ACTIVAR ANIMACIONES (Si el archivo las tiene)
            if(gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(luis);
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
            }
            
            document.getElementById('loading').style.display = 'none';
        });

        setupInput();
        animate();
    }

    function setupInput() {
        const bind = (id) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); move[id] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); move[id] = false; });
            el.onpointerdown = () => move[id] = true;
            el.onpointerup = () => move[id] = false;
        };
        ['w','a','s','d','run'].forEach(bind);

        document.getElementById('jump').onclick = () => {
            if(!isJumping) { velocityY = 0.3; isJumping = true; }
        };
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);

        if (luis) {
            const speed = (move.run ? 12 : 5) * delta;
            const rotSpeed = 3 * delta;

            if (move.w) player.translateZ(speed);
            if (move.s) player.translateZ(-speed);
            if (move.a) player.rotation.y += rotSpeed;
            if (move.d) player.rotation.y -= rotSpeed;

            // Salto físico
            player.position.y += velocityY;
            if(player.position.y > 0) velocityY -= 0.015;
            else { player.position.y = 0; velocityY = 0; isJumping = false; }

            // Cámara en 3ª Persona (GTA)
            const camPos = new THREE.Vector3(0, 3, -6); // 3 arriba, 6 atrás
            camPos.applyQuaternion(player.quaternion);
            camera.position.lerp(player.position.clone().add(camPos), 0.1);
            camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
