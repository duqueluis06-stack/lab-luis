<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANTUM CITY ENGINE - PRO</title>
    <style>
        :root { --neon: #00ffff; --rgb: #ff00ff; --glass: rgba(0, 0, 0, 0.7); }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Consolas', monospace; touch-action: none; }

        /* UI de Pantalla */
        #hud { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .overlay { position: absolute; padding: 20px; color: white; pointer-events: auto; }
        
        /* Controles Táctiles */
        .joystick-zone { position: absolute; bottom: 40px; left: 40px; display: grid; grid-template-columns: repeat(3, 65px); gap: 10px; }
        .action-zone { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 15px; }
        
        .btn {
            width: 65px; height: 65px; background: var(--glass); border: 2px solid var(--neon);
            color: var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; user-select: none; transition: 0.2s;
        }
        .btn:active { background: var(--neon); color: black; transform: scale(0.9); }
        .btn-rect { width: 100px; height: 50px; border-radius: 10px; font-size: 14px; border-color: var(--rgb); color: var(--rgb); }

        /* Pantalla de Carga */
        #loading { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon); }
        .bar-container { width: 300px; height: 4px; background: #111; margin-top: 20px; border-radius: 10px; }
        #bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body>

<div id="loading">
    <h1>ENGINE QUANTUM v2.0</h1>
    <div class="bar-container"><div id="bar"></div></div>
    <p id="load-status">Sincronizando modelos...</p>
</div>

<div id="hud">
    <div class="overlay" style="top:0; right:0;">
        <a href="index.html" style="background:red; color:white; padding:10px; text-decoration:none; border-radius:5px;">SALIR DEL JUEGO</a>
    </div>

    <div class="joystick-zone">
        <div></div><div class="btn" id="btn-w">↑</div><div></div>
        <div class="btn" id="btn-a">←</div><div class="btn" id="btn-s">↓</div><div class="btn" id="btn-d">→</div>
    </div>

    <div class="action-zone">
        <div class="btn btn-rect" id="btn-run">CORRER</div>
        <div class="btn btn-rect" id="btn-jump">SALTAR</div>
        <div class="btn btn-rect" onclick="game.resetPlayer()">REESTABLECER</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

<script>
/** * CLASE PRINCIPAL DEL JUEGO
 * Maneja el renderizado, el mundo y los personajes.
 */
class QuantumEngine {
    constructor() {
        this.init();
        this.assets = { city: null, player: null };
        this.mixers = [];
        this.input = { w: false, a: false, s: false, d: false, run: false };
        this.clock = new THREE.Clock();
        this.playerVelocity = new THREE.Vector3();
    }

    init() {
        // Escena y Cámara
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x020205);
        this.camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 5000);

        // Renderer Pro
        this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(this.renderer.domElement);

        // Iluminación
        const amb = new THREE.AmbientLight(0xffffff, 0.7);
        this.scene.add(amb);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(100, 100, 50);
        this.scene.add(sun);

        this.loadAssets();
        this.bindEvents();
        this.render();
    }

    loadAssets() {
        const loader = new THREE.GLTFLoader();
        const draco = new THREE.DRACOLoader();
        draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
        loader.setDRACOLoader(draco);

        // Carga de Ciudad
        loader.load('ciudad_quantum.glb', (gltf) => {
            this.assets.city = gltf.scene;
            this.scene.add(gltf.scene);
            this.handleAnimations(gltf);

            // Carga de Luis
            loader.load('luis_avatar.glb', (av) => {
                this.assets.player = av.scene;
                this.normalizePlayer();
                this.scene.add(av.scene);
                this.handleAnimations(av);
                
                document.getElementById('loading').style.display = 'none';
                this.resetPlayer();
            }, (xhr) => {
                const p = (xhr.loaded / xhr.total) * 100;
                document.getElementById('bar').style.width = p + '%';
            });
        });
    }

    normalizePlayer() {
        const player = this.assets.player;
        const box = new THREE.Box3().setFromObject(player);
        const size = box.getSize(new THREE.Vector3()).y;
        const s = 1.75 / size; // Altura humana estándar
        player.scale.set(s, s, s);
    }

    handleAnimations(gltf) {
        if (gltf.animations.length) {
            const mixer = new THREE.AnimationMixer(gltf.scene);
            const action = mixer.clipAction(gltf.animations[0]);
            action.play();
            this.mixers.push(mixer);
        }
    }

    bindEvents() {
        const setKey = (id, key, val) => {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', () => this.input[key] = val);
            el.addEventListener('pointerup', () => this.input[key] = !val);
            el.addEventListener('pointerleave', () => this.input[key] = !val);
        };

        setKey('btn-w', 'w', true);
        setKey('btn-s', 's', true);
        setKey('btn-a', 'a', true);
        setKey('btn-d', 'd', true);
        setKey('btn-run', 'run', true);

        window.addEventListener('resize', () => {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    resetPlayer() {
        if (!this.assets.player) return;
        this.assets.player.position.set(0, 0, 0); 
        this.assets.player.rotation.set(0, 0, 0);
    }

    update() {
        const delta = this.clock.getDelta();
        this.mixers.forEach(m => m.update(delta));

        if (this.assets.player) {
            const p = this.assets.player;
            const speed = this.input.run ? 0.3 : 0.1;
            const rotSpeed = 0.05;

            // Movimiento
            if (this.input.w) p.translateZ(speed);
            if (this.input.s) p.translateZ(-speed);
            if (this.input.a) p.rotation.y += rotSpeed;
            if (this.input.d) p.rotation.y -= rotSpeed;

            // LÓGICA DE CÁMARA TERCERA PERSONA (Tipo GTA)
            const relativeCameraOffset = new THREE.Vector3(0, 5, -12);
            const cameraOffset = relativeCameraOffset.applyMatrix4(p.matrixWorld);
            
            this.camera.position.lerp(cameraOffset, 0.1);
            this.camera.lookAt(p.position.x, p.position.y + 2, p.position.z);
        }
    }

    render() {
        requestAnimationFrame(() => this.render());
        this.update();
        this.renderer.render(this.scene, this.camera);
    }
}

// Iniciar el juego
const game = new QuantumEngine();
</script>
</body>
</html>
