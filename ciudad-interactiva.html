<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum City 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Estilo Neón */
        .neon-border {
            border: 2px solid #0ff;
            box-shadow: 0 0 10px #0ff, inset 0 0 5px #0ff;
            color: #0ff;
            background: rgba(0,0,0,0.7);
            text-shadow: 0 0 5px #0ff;
            pointer-events: auto;
            font-weight: bold;
        }

        #btn-exit { position: absolute; top: 20px; right: 20px; padding: 10px 20px; border-color: #f0f; color: #f0f; box-shadow: 0 0 10px #f0f; }

        /* Controles */
        #dpad { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; border-radius: 50%; }
        #stick { 
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; 
            background: #0ff; border-radius: 50%; transform: translate(-50%, -50%); 
        }

        #actions { position: absolute; bottom: 40px; right: 30px; display: flex; gap: 10px; }
        .btn-act { width: 70px; height: 70px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <button id="btn-exit" class="neon-border" onclick="window.location.href='index.html'">SALIR</button>
    
    <div id="dpad" class="neon-border">
        <div id="stick"></div>
    </div>

    <div id="actions">
        <div id="walk" class="neon-border btn-act">WALK</div>
        <div id="run" class="neon-border btn-act" style="border-color:#f0f; color:#f0f; box-shadow: 0 0 10px #f0f;">RUN</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
    let scene, camera, renderer, clock, mixer;
    let avatar, city;
    let moveDir = { forward: 0, side: 0 };
    let speed = 0.1;

    init();

    function init() {
        scene = new THREE.Scene();
        clock = new THREE.Clock();

        // Cámara
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 5, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // Iluminación potente para ver la ciudad
        const ambient = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0x00ffff, 1);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        const loader = new THREE.GLTFLoader();

        // Cargar Ciudad
        loader.load('ciudad_quantum.glb', (gltf) => {
            city = gltf.scene;
            scene.add(city);
            // Asegurar que la ciudad no tape al avatar si el origen está mal
            city.position.y = -0.1; 
        }, undefined, (error) => console.error('Error ciudad:', error));

        // Cargar Avatar
        loader.load('luis-avatar2.glb', (gltf) => {
            avatar = gltf.scene;
            scene.add(avatar);
            
            mixer = new THREE.AnimationMixer(avatar);
            if(gltf.animations.length > 0) {
                mixer.clipAction(gltf.animations[0]).play();
            }
        });

        setupMobileControls();
        animate();
    }

    function setupMobileControls() {
        const dpad = document.getElementById('dpad');
        const stick = document.getElementById('stick');

        const handleTouch = (e) => {
            const rect = dpad.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - (rect.left + rect.width/2);
            const y = touch.clientY - (rect.top + rect.height/2);
            
            const dist = Math.min(Math.sqrt(x*x + y*y), 50);
            const angle = Math.atan2(y, x);
            
            stick.style.left = `calc(50% + ${Math.cos(angle) * dist}px)`;
            stick.style.top = `calc(50% + ${Math.sin(angle) * dist}px)`;

            moveDir.forward = -Math.sin(angle) * (dist / 50);
            moveDir.side = -Math.cos(angle) * (dist / 50);
        };

        dpad.addEventListener('touchstart', handleTouch);
        dpad.addEventListener('touchmove', (e) => { e.preventDefault(); handleTouch(e); });
        dpad.addEventListener('touchend', () => {
            stick.style.left = '50%'; stick.style.top = '50%';
            moveDir.forward = 0; moveDir.side = 0;
        });

        document.getElementById('walk').ontouchstart = () => speed = 0.05;
        document.getElementById('run').ontouchstart = () => speed = 0.15;
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (avatar && (Math.abs(moveDir.forward) > 0.1 || Math.abs(moveDir.side) > 0.1)) {
            // Mover
            avatar.position.z += moveDir.forward * speed * 60 * delta;
            avatar.position.x += moveDir.side * speed * 60 * delta;

            // Rotar hacia donde camina
            const angle = Math.atan2(moveDir.side, moveDir.forward);
            avatar.rotation.y = angle;

            if (mixer) mixer.update(delta);
        }

        // Cámara Tercera Persona
        if (avatar) {
            const camOffset = new THREE.Vector3(0, 3, 6);
            camOffset.applyQuaternion(avatar.quaternion);
            camera.position.lerp(avatar.position.clone().add(camOffset), 0.1);
            camera.lookAt(avatar.position.x, avatar.position.y + 1.5, avatar.position.z);
        }

        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
