<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LUIS QUANTUM - ANIMACIÓN REAL</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        .hud { position: absolute; top: 0; width: 100%; padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .btn { pointer-events: auto; padding: 10px 20px; background: rgba(0,255,255,0.2); border: 2px solid #0ff; color: #0ff; cursor: pointer; text-decoration: none; font-weight: bold; }
        .controls-move { position: absolute; bottom: 30px; left: 30px; z-index: 100; display: flex; gap: 10px; }
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: #0ff; }
    </style>
</head>
<body>

    <div id="loader">SINCRONIZANDO ADN DIGITAL...</div>

    <div class="hud">
        <div style="color: #0ff; text-shadow: 0 0 10px #0ff;">● LUIS_STATUS: ANIMATED</div>
        <a href="index.html" class="btn">SALIR</a>
    </div>

    <div class="controls-move">
        <button class="btn" onclick="focusLuis()">🎯 CENTRAR CÁMARA</button>
    </div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, luis;
        let mixers = []; // Lista de motores de animación
        const clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding; // Mejora los colores
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const spot = new THREE.SpotLight(0xffffff, 1);
            spot.position.set(0, 10, 10);
            scene.add(spot);

            const draco = new THREE.DRACOLoader();
            draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
            const loader = new THREE.GLTFLoader();
            loader.setDRACOLoader(draco);

            // 1. CARGAR CIUDAD
            loader.load('ciudad_quantum.glb', (gltf) => {
                scene.add(gltf.scene);
                // Si la ciudad tiene animaciones (autos), las activamos todas
                if(gltf.animations.length) {
                    const mCity = new THREE.AnimationMixer(gltf.scene);
                    gltf.animations.forEach(clip => mCity.clipAction(clip).play());
                    mixers.push(mCity);
                }

                // 2. CARGAR LUIS (Con sus micromovimientos)
                loader.load('luis_avatar.glb', (avGltf) => {
                    luis = avGltf.scene;
                    luis.scale.set(1.5, 1.5, 1.5); 
                    luis.position.set(0, 0, 0);
                    scene.add(luis);

                    // MOTOR DE ANIMACIÓN PARA LUIS
                    if(avGltf.animations.length) {
                        const mLuis = new THREE.AnimationMixer(luis);
                        // Esto busca la animación "Idle" o natural y la pone en marcha
                        avGltf.animations.forEach(clip => {
                            const action = mLuis.clipAction(clip);
                            action.play();
                        });
                        mixers.push(mLuis);
                    }

                    document.getElementById('loader').style.display = 'none';
                    focusLuis();
                });
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
        }

        function focusLuis() {
            if(luis) {
                controls.target.set(luis.position.x, luis.position.y + 1, luis.position.z);
                camera.position.set(luis.position.x, luis.position.y + 2, luis.position.z + 5);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            // ACTUALIZACIÓN DE TODOS LOS MOTORES (Esencial para el movimiento)
            mixers.forEach(mixer => mixer.update(delta));
            
            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
