<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luis 4K - Calibración Final</title>
    <style>
        :root { --matrix: #00ff41; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #hud { position: absolute; top: 10px; left: 10px; z-index: 100; color: var(--matrix); font-size: 11px; background: rgba(0,20,0,0.8); padding: 8px; border: 1px solid var(--matrix); }
        .joy { position: absolute; bottom: 30px; width: 100px; height: 100px; border: 2px solid var(--matrix); border-radius: 50%; z-index: 110; touch-action: none; }
        #joy-l { left: 20px; } #joy-r { right: 20px; }
        .stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: var(--matrix); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--matrix); }
        #zoom { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; border-radius: 50%; border: 2px solid #fff; background: #000; color: #fff; z-index: 120; font-weight: bold; cursor: pointer; }
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; color: var(--matrix); }
    </style>
</head>
<body>

<div id="loader"><h2>SINCRONIZANDO PLANETA...</h2></div>
<div id="hud">SISTEMA: V6_AUTO_GROUND<br>ALTURA: AUTO-DETECT<br>PIERNAS: SCAN_ACTIVE</div>

<div id="ui">
    <div id="joy-l" class="joy"><div id="stick-l" class="stick"></div></div>
    <button id="zoom">ZOOM</button>
    <div id="joy-r" class="joy"><div id="stick-r" class="stick"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
class FinalRescueEngine {
    constructor() {
        this.input = { m: {x:0, y:0}, l: {x:0, y:0} };
        this.isZoom = false;
        this.init();
        this.load();
        this.events();
        this.render();
    }

    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.05, 2000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domElement);
        this.clock = new THREE.Clock();

        this.scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const d = new THREE.DirectionalLight(0xffffff, 1);
        d.position.set(5, 10, 5);
        this.scene.add(d);

        // Suelo de referencia Matrix
        const grid = new THREE.GridHelper(500, 100, 0x00ff41, 0x002200);
        this.scene.add(grid);

        this.rig = new THREE.Group();
        this.scene.add(this.rig);
        this.rig.add(this.camera);
    }

    load() {
        const gl = new THREE.GLTFLoader();

        // 1. Ciudad al punto Cero
        gl.load('ciudad_quantum.glb', (g) => {
            this.city = g.scene;
            this.city.position.set(0, 0, 0); 
            this.scene.add(this.city);
        });

        // 2. Avatar con auto-posicionamiento
        gl.load('luis-avatar2.glb', (g) => {
            this.avatar = g.scene;
            this.avatar.scale.setScalar(0.2); 
            // Reset de altura: Lo ponemos en 0. Si la ciudad está arriba o abajo, el Grid nos dirá dónde.
            this.avatar.position.set(0, 0, 0);
            this.scene.add(this.avatar);
            
            this.mixer = new THREE.AnimationMixer(this.avatar);
            if(g.animations.length > 0) {
                // Forzamos TODAS las animaciones a estar disponibles
                this.actions = g.animations.map(anim => this.mixer.clipAction(anim));
                this.actions[0].play(); // Idle
            }
            document.getElementById('loader').style.display = 'none';
        });
    }

    events() {
        const setup = (id, st, move) => {
            const el = document.getElementById(id), s = document.getElementById(st);
            let active = false;
            const h = (e) => {
                if(!active) return;
                const p = e.touches ? e.touches[0] : e;
                const r = el.getBoundingClientRect();
                const x = (p.clientX - (r.left + 50)) / 50, y = (p.clientY - (r.top + 50)) / 50;
                s.style.transform = `translate(calc(-50% + ${x*30}px), calc(-50% + ${y*30}px))`;
                if(move) this.input.m = {x, y}; else this.input.l = {x, y};
            };
            el.addEventListener('touchstart', () => active = true);
            window.addEventListener('touchmove', h);
            window.addEventListener('touchend', () => { 
                active = false; s.style.transform = 'translate(-50%, -50%)';
                if(move) this.input.m = {x:0, y:0}; else this.input.l = {x:0, y:0};
            });
        };
        setup('joy-l', 'stick-l', true); setup('joy-r', 'stick-r', false);
        document.getElementById('zoom').onclick = () => this.isZoom = !this.isZoom;
    }

    render() {
        requestAnimationFrame(() => this.render());
        const dt = this.clock.getDelta();
        if(this.mixer) this.mixer.update(dt);

        if(this.avatar) {
            const speed = 0.12;
            this.avatar.position.x += this.input.m.x * speed;
            this.avatar.position.z += this.input.m.y * speed;

            const moving = Math.abs(this.input.m.x) > 0.1 || Math.abs(this.input.m.y) > 0.1;
            if(moving) {
                this.avatar.rotation.y = Math.atan2(this.input.m.x, this.input.m.y);
                // Si hay más de una animación, forzamos la segunda (Caminar)
                if(this.actions && this.actions.length > 1) {
                    this.actions[0].stop();
                    this.actions[1].play();
                }
            } else {
                if(this.actions) {
                    if(this.actions[1]) this.actions[1].stop();
                    this.actions[0].play();
                }
            }

            this.rig.position.lerp(this.avatar.position, 0.1);
            this.rig.rotation.y -= this.input.l.x * 0.05;

            const tP = this.isZoom ? new THREE.Vector3(0, 0.35, 0.25) : new THREE.Vector3(0, 0.3, 1.2);
            this.camera.position.lerp(tP, 0.1);
            this.camera.lookAt(new THREE.Vector3(0, this.isZoom ? 0.35 : 0.2, 0).add(this.avatar.position));
        }
        this.renderer.render(this.scene, this.camera);
    }
}
window.onload = () => new FinalRescueEngine();
</script>
</body>
</html>
