<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUIS QUANTUM PRO</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .controls { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; pointer-events: auto; }
        .btn { width: 70px; height: 70px; border: 2px solid #0ff; display: flex; align-items: center; justify-content: center; color: #0ff; background: rgba(0,255,255,0.1); border-radius: 15px; font-weight: bold; font-size: 24px; -webkit-user-select: none; }
        .btn:active { background: rgba(0,255,255,0.5); }
        .btn-exit { pointer-events: auto; background: red; color: white; padding: 10px; border-radius: 5px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <div style="display:flex; justify-content: space-between; pointer-events: auto;">
        <a href="index.html" class="btn-exit">SALIR</a>
        <div id="status" style="color:#0ff; font-family: monospace;">CARGANDO...</div>
    </div>
    <div class="controls">
        <div></div><div class="btn" id="w">↑</div><div></div>
        <div class="btn" id="a">←</div><div class="btn" id="s">↓</div><div class="btn" id="d">→</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    let scene, camera, renderer, luis, mixer, clock = new THREE.Clock();
    let player = new THREE.Group();
    let move = { w: false, a: false, s: false, d: false };

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 5000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputEncoding = THREE.sRGBEncoding; 
        document.body.appendChild(renderer.domElement);

        // ILUMINACIÓN BRUTAL PARA IPHONE
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 2.5);
        scene.add(light);

        scene.add(player);

        const loader = new THREE.GLTFLoader();

        // CIUDAD
        loader.load('ciudad_quantum.glb', (gltf) => {
            scene.add(gltf.scene);
            document.getElementById('status').innerText = "CIUDAD OK";
        });

        // AVATAR REALISTA
        loader.load('luis_avatar.glb', (gltf) => {
            luis = gltf.scene;
            luis.rotation.y = Math.PI; // MIRAR DE FRENTE
            
            // Ajuste de tamaño automático
            const box = new THREE.Box3().setFromObject(luis);
            const size = box.getSize(new THREE.Vector3());
            luis.scale.setScalar(1.8 / size.y);

            player.add(luis);
            
            // --- EL FIX DE LAS ANIMACIONES ---
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(luis);
                // Buscamos cualquier animación que NO sea la pose estática
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
                document.getElementById('status').innerText = "ANIMACIÓN ACTIVA";
            } else {
                document.getElementById('status').innerText = "SIN ANIMACIÓN EN GLB";
            }
        });

        setupControls();
        animate();
    }

    function setupControls() {
        const bind = (id) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); move[id] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); move[id] = false; });
        };
        ['w','a','s','d'].forEach(bind);
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);

        if (luis) {
            const speed = 7 * delta;
            if (move.w) player.translateZ(speed);
            if (move.s) player.translateZ(-speed);
            if (move.a) player.rotation.y += 3 * delta;
            if (move.d) player.rotation.y -= 3 * delta;

            // Cámara pegada al hombro
            const offset = new THREE.Vector3(0, 3, -6);
            offset.applyQuaternion(player.quaternion);
            camera.position.copy(player.position).add(offset);
            camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
