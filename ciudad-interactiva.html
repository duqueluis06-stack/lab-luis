<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CITY + AVATAR STABLE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
touch-action:none;
}

body{
overflow:hidden;
background:#000;
font-family:monospace;
}

/* DEBUG */
#debug{
position:absolute;
top:10px;
left:10px;
color:#0f0;
background:rgba(0,0,0,0.6);
padding:6px;
font-size:12px;
z-index:10;
}

/* EXIT */
#exit{
position:fixed;
top:10px;
right:10px;
z-index:20;
padding:10px 14px;
border:1px solid red;
color:red;
background:rgba(0,0,0,0.5);
}

/* LEFT PAD */
#pad{
position:fixed;
bottom:20px;
left:20px;
display:grid;
grid-template-columns:60px 60px 60px;
grid-template-rows:60px 60px 60px;
gap:5px;
z-index:50;
}

#pad button{
background:#000;
border:2px solid #0ff;
color:#0ff;
border-radius:10px;
}

/* ACTIONS */
#actions{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:50;
}

#actions button{
width:60px;
height:60px;
background:#000;
border:2px solid #0ff;
color:#0ff;
border-radius:10px;
}
</style>
</head>

<body>

<div id="debug">INIT</div>

<button id="exit" onclick="location.href='index.html'">SALIR</button>

<!-- PAD MOVIMIENTO -->
<div id="pad">
<div></div>
<button ontouchstart="move(0,1)" ontouchend="move(0,0)">▲</button>
<div></div>

<button ontouchstart="move(-1,0)" ontouchend="move(0,0)">◀</button>
<div></div>
<button ontouchstart="move(1,0)" ontouchend="move(0,0)">▶</button>

<div></div>
<button ontouchstart="move(0,-1)" ontouchend="move(0,0)">▼</button>
<div></div>
</div>

<!-- ACTIONS -->
<div id="actions">
<button onclick="speed=0.03">🚶</button>
<button onclick="speed=0.08">🏃</button>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

/* ================= VARIABLES ================= */
let scene,camera,renderer;
let avatar,city;
let mixer=null;
let clock=new THREE.Clock();

let mx=0,mz=0;
let speed=0.05;

/* ================= INPUT ================= */
function move(x,z){
mx=x;
mz=z;
}

/* ================= DEBUG ================= */
function log(t){
document.getElementById("debug").innerText=t;
}

/* ================= INIT ================= */
init();
animate();

function init(){

scene=new THREE.Scene();
scene.background=new THREE.Color(0x000010);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,3000);
camera.position.set(0,5,10);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,2));

const loader=new THREE.GLTFLoader();

/* ================= CITY ================= */
loader.load("ciudad_quantum.glb",(g)=>{

city=g.scene;
scene.add(city);

/* NO tocar demasiado el mundo */
log("CITY LOADED");

});

/* ================= AVATAR ================= */
loader.load("luis-avatar2.glb",(a)=>{

avatar=a.scene;
scene.add(avatar);

/* 🔴 IMPORTANTE: no forzar poses */
avatar.position.set(0,0,0);
avatar.scale.set(1,1,1);

/* animación si existe */
if(a.animations && a.animations.length>0){

mixer=new THREE.AnimationMixer(avatar);
mixer.clipAction(a.animations[0]).play();

log("ANIMATION PLAYING");

}else{

log("NO ANIMATION FOUND");

}

});

}

/* ================= LOOP ================= */
function animate(){

requestAnimationFrame(animate);

let dt=clock.getDelta();

/* animaciones */
if(mixer) mixer.update(dt);

/* movimiento */
if(avatar){

avatar.position.x += mx*speed;
avatar.position.z += mz*speed;

/* rotación */
if(mx||mz){
avatar.rotation.y=Math.atan2(mx,mz);
}

}

/* cámara seguimiento */
if(avatar){

camera.position.lerp(
new THREE.Vector3(
avatar.position.x,
avatar.position.y+5,
avatar.position.z+10
),0.05);

camera.lookAt(avatar.position);

}

renderer.render(scene,camera);

}

</script>

</body>
</html>
