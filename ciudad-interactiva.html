<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANTUM CITY | LUIS CONTROL</title>
    <style>
        :root { --neon: #00ffff; --magenta: #ff00ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }

        /* HEADER RGB */
        header {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0, 0, 0, 0.9); display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 100;
            border-bottom: 2px solid; border-image: linear-gradient(90deg, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00) 1;
            animation: rgb-cycle 4s linear infinite;
        }

        @keyframes rgb-cycle { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* CONTROLES HUD */
        .hud-controls { position: absolute; bottom: 20px; left: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }

        .btn-action {
            background: rgba(0, 255, 255, 0.1); border: 1px solid var(--neon); color: var(--neon);
            padding: 10px; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s;
        }
        .btn-action:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        /* BOTÓN HEXAGONAL */
        .hexa-btn {
            width: 60px; height: 35px; background: var(--magenta); position: relative;
            margin: 20px auto; color: #fff; display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            box-shadow: 0 0 20px var(--magenta);
        }

        .nav-btn { text-decoration: none; padding: 10px 15px; font-weight: bold; font-size: 12px; border-radius: 4px; border: 1px solid #fff; color: #fff; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .bar { width: 200px; height: 4px; background: #222; margin-top: 10px; }
        #progress { width: 0%; height: 100%; background: var(--neon); }
    </style>
</head>
<body>

    <div id="loader">
        <div id="status">SINCRONIZANDO AVATAR...</div>
        <div class="bar"><div id="progress"></div></div>
    </div>

    <header>
        <div style="color: #fff; font-size: 11px;">USER: LUIS_PRO <br> <span style="color: var(--neon);">MOV: FLECHAS / WASD</span></div>
        <div style="display: flex; gap: 10px;">
            <a href="index.html" class="nav-btn">🏠 INICIO</a>
            <a href="experimentos.html" class="nav-btn" style="border-color: var(--magenta); color: var(--magenta);">🌀 SALIR</a>
        </div>
    </header>

    <div class="hud-controls">
        <button class="btn-action" onclick="focusLuis()">🎯 LOCALIZAR LUIS</button>
        <div class="hexa-btn" onclick="toggleMove()">MOVE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, luis, mixer;
        const mixers = [];
        const keys = { w: false, s: false, a: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0x00ffff, 1);
            sun.position.set(10, 50, 10);
            scene.add(sun);

            const draco = new THREE.DRACOLoader();
            draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
            const loader = new THREE.GLTFLoader();
            loader.setDRACOLoader(draco);

            // 1. CIUDAD
            loader.load('ciudad_quantum.glb', (gltf) => {
                scene.add(gltf.scene);
                if (gltf.animations.length) {
                    const m = new THREE.AnimationMixer(gltf.scene);
                    gltf.animations.forEach(c => m.clipAction(c).play());
                    mixers.push(m);
                }

                // 2. LUIS (Avatar)
                loader.load('luis_avatar.glb', (avGltf) => {
                    luis = avGltf.scene;
                    // --- CORRECCIÓN DE TAMAÑO Y POSICIÓN ---
                    luis.scale.set(0.05, 0.05, 0.05); // Lo hacemos mucho más pequeño
                    luis.position.set(10, 0, 10);    // Lo movemos fuera del centro para que no se encastre
                    scene.add(luis);

                    mixer = new THREE.AnimationMixer(luis);
                    if(avGltf.animations.length) mixer.clipAction(avGltf.animations[0]).play();
                    mixers.push(mixer);
                    
                    document.getElementById('loader').style.display = 'none';
                    focusLuis();
                });
            }, (xhr) => {
                document.getElementById('progress').style.width = (xhr.loaded / xhr.total * 100) + '%';
            });

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            camera.position.set(20, 20, 40);
        }

        function focusLuis() {
            if (luis) {
                const targetPos = new THREE.Vector3().copy(luis.position);
                camera.position.set(targetPos.x, targetPos.y + 5, targetPos.z + 10);
                controls.target.copy(targetPos);
            }
        }

        // CONTROL DE MOVIMIENTO
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        function updateMovement() {
            if (!luis) return;
            const speed = 0.2;
            if (keys.w || keys.ArrowUp) luis.position.z -= speed;
            if (keys.s || keys.ArrowDown) luis.position.z += speed;
            if (keys.a || keys.ArrowLeft) luis.position.x -= speed;
            if (keys.d || keys.ArrowRight) luis.position.x += speed;
            
            // Hacer que la cámara siga a Luis suavemente
            controls.target.lerp(luis.position, 0.1);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = new THREE.Clock().getDelta();
            mixers.forEach(m => m.update(0.016)); // Update fijo para estabilidad
            updateMovement();
            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
