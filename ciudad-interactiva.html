<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUANTUM CITY - GTA STABLE</title>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; }
canvas { display:block; touch-action:none; }

#ui{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    justify-content:space-between;
    padding:15px;
    pointer-events:none;
}

.btn{
    pointer-events:auto;
    width:65px; height:65px;
    background:rgba(0,255,255,0.25);
    border:2px solid cyan;
    color:white;
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    user-select:none;
}

.controls{
    display:grid;
    grid-template-columns:repeat(3,70px);
    gap:5px;
}

#loading{
    position:fixed; inset:0;
    background:#000;
    color:#0ff;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}
</style>
</head>

<body>

<div id="loading">CARGANDO CIUDAD...</div>

<div id="ui">
    <div style="color:#0ff;">LUIS QUANTUM ONLINE</div>

    <div class="controls">
        <div></div><div class="btn" id="w">↑</div><div></div>
        <div class="btn" id="a">←</div><div class="btn" id="s">↓</div><div class="btn" id="d">→</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer, luis, mixer;
let clock = new THREE.Clock();
let keys = {w:false,a:false,s:false,d:false};

init();

function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.Fog(0x000000, 10, 400);

    camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 5000);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    document.body.appendChild(renderer.domElement);

    // 🔥 luz fuerte (evita ciudad negra)
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const sun = new THREE.DirectionalLight(0xffffff, 2);
    sun.position.set(100,200,100);
    scene.add(sun);

    const loader = new THREE.GLTFLoader();

    // 🌆 CIUDAD
    loader.load("ciudad_quantum.glb", (gltf)=>{

        const city = gltf.scene;

        // 🔥 centrar ciudad
        const box = new THREE.Box3().setFromObject(city);
        const center = box.getCenter(new THREE.Vector3());

        city.position.x -= center.x;
        city.position.z -= center.z;
        city.position.y -= box.min.y;

        scene.add(city);

    });

    // 🧍 AVATAR
    loader.load("luis_avatar.glb", (gltf)=>{

        luis = gltf.scene;

        // 🔥 escala humana fija
        const box = new THREE.Box3().setFromObject(luis);
        const size = box.getSize(new THREE.Vector3()).y;

        const scale = 1.75 / size;
        luis.scale.setScalar(scale);

        // 🔥 poner en suelo
        const box2 = new THREE.Box3().setFromObject(luis);
        luis.position.y -= box2.min.y;

        scene.add(luis);

        if(gltf.animations.length){
            mixer = new THREE.AnimationMixer(luis);
            mixer.clipAction(gltf.animations[0]).play();
        }

        document.getElementById("loading").style.display="none";

        camera.position.set(0,4,8);
    });

    setupControls();
    animate();
}

function setupControls(){
    ["w","a","s","d"].forEach(k=>{
        const el = document.getElementById(k);

        el.addEventListener("pointerdown", ()=>keys[k]=true);
        el.addEventListener("pointerup", ()=>keys[k]=false);
        el.addEventListener("pointerleave", ()=>keys[k]=false);
    });
}

function animate(){
    requestAnimationFrame(animate);

    const dt = clock.getDelta();

    if(mixer) mixer.update(dt);

    if(luis){

        const speed = 5 * dt;
        const rot = 2 * dt;

        if(keys.w) luis.translateZ(speed);
        if(keys.s) luis.translateZ(-speed);
        if(keys.a) luis.rotation.y += rot;
        if(keys.d) luis.rotation.y -= rot;

        // 🎥 cámara GTA suave
        const offset = new THREE.Vector3(0,4,-8);
        offset.applyQuaternion(luis.quaternion);

        const target = luis.position.clone().add(offset);

        camera.position.lerp(target, 0.1);
        camera.lookAt(luis.position);
    }

    renderer.render(scene,camera);
}

window.addEventListener("resize", ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
