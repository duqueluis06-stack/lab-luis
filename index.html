/* ================= BODY ================= */
body {
    background: url('fondo_inicio.JPG') no-repeat center center fixed;
    background-size: cover;
    color:#00ffcc;

/* ================= HEADER ================= */
header {
    padding:20px;
    font-size:38px;
    font-weight:bold;
    text-shadow:0 0 10px #00ffff,0 0 20px #ff00ff;
    background: rgba(0,0,0,0.5);
}

/* ================= BOTONES ================= */
.main-buttons {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin:20px 0;
}

.main-buttons a {
    background:none;
    color:#00ff00;
    border:2px solid #00ff00;
    border-radius:8px;
    padding:12px 20px;
    font-weight:bold;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}

.main-buttons a:hover {
    color:#ff66ff;
    border-color:#ff66ff;
    text-shadow:0 0 5px #00ffff,0 0 15px #ff00ff;
}

/* ================= FORO FLOAT ================= */
.foro-float{
    position: fixed;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 75px;
    height: 75px;
    border-radius: 50%;
    background: conic-gradient(#ff00ff,#00ffff,#ffcc00,#ff00ff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:11px;
    color:#000;
    text-decoration:none;

    box-shadow:
        0 0 10px #ff00ff,
        0 0 25px #00ffff,
        0 0 40px #ff00ff;

    animation: foroPulse 2s infinite;
    z-index: 9999;
}

@keyframes foroPulse{
    0%{transform:translateY(-50%) scale(1);}
    50%{transform:translateY(-50%) scale(1.12);}
    100%{transform:translateY(-50%) scale(1);}
}

/* ================= CARITA ================= */
.carita {
    position: fixed;
    top:20px;
    right:20px;
    width:60px;
    height:60px;
    background:#ff66cc;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.ojo {
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    margin:2px;
    position:relative;
}

.pupila {
    width:5px;
    height:5px;
    background:black;
    border-radius:50%;
    position:absolute;
    top:2px;
    left:2px;
}

.boca {
    width:20px;
    height:6px;
    border-bottom:3px solid black;
}

/* ================= CIENTÍFICO ================= */
.cientifico-caminando {
    position: fixed;
    bottom: 10px;
    width: 120px;
    z-index: 998;
    animation: caminar 12s linear infinite;
    filter: drop-shadow(0 0 8px #00ffcc)
            drop-shadow(0 0 18px #00ffff)
            drop-shadow(0 0 30px #ff00ff);
}

.cientifico-caminando img {
    transform: scaleX(-1);
}

@keyframes caminar {
    0% { left:-130px; }
    100% { left:100%; }
}

/* ================= NEUROLUIS ================= */
.neuroluis-mini{
    position: fixed;
    top: 20px;
    left: 20px;
    width: 85px;
    height: 85px;
    border-radius: 12px;
    overflow: hidden;
    background: black;
    border: 2px solid #00ffff;
    box-shadow: 0 0 20px #00ffff, 0 0 40px #ff00ff;
    z-index: 9999;
}

.neuroluis-mini img{
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ================= WHATSAPP ================= */
.whatsapp {
    position: fixed;
    bottom: 95px;
    right: 18px;
    background: #00ffcc;
    color: #000;
    padding: 14px;
    border-radius: 50%;
    font-size: 28px;
    z-index: 2000;
    box-shadow: 0 0 25px #00ffff;
}

/* ================= FOOTER ================= */
footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.65);
    text-align:center;
    z-index:999;
    backdrop-filter: blur(10px);
    padding: 8px 5px;
}

footer .social-btn {
    display:inline-block;
    margin:5px;
    padding:10px 15px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    font-size:16px;
    color:#00fff2;
    border:2px solid #00fff2;
    box-shadow:0 0 10px #00ffff, 0 0 20px #00aaff;
