    left:-30px;
    width:25px;

    border-radius:50%;
    animation:mover 6s linear infinite;

@keyframes mover {
    0% { left:-30px; }
    50% { left:95%; }
    100% { left:-30px; }

.carita {

    top:20px;
    right:20px;

.ojo {

    height:10px;

}
.pupila {
    width:5px;
    height:5px;
    background:black;
    border-radius:50%;
    position:absolute;
    top:2px;
    left:2px;
}
.boca {
    width:20px;
    height:6px;
    border-bottom:3px solid black;
    border-radius:3px;
    transition:0.3s;

<script>
// CARITA SIGUE EL CURSOR Y BOCA PARPADEO
document.addEventListener('mousemove', e => {
  document.querySelectorAll('.pupila').forEach(p => {
    const r = p.parentElement.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width/2);
    const dy = e.clientY - (r.top + r.height/2);
    const ang = Math.atan2(dy, dx);
    p.style.transform = `translate(${Math.cos(ang)*3}px, ${Math.sin(ang)*3}px)`;
  });

  const boca = document.querySelector('.boca');
