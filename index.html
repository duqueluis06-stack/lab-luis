<style>
body {
    background: url('fondo_inicio.JPG') no-repeat center center fixed;
    background-size: cover;
    color:#00ffcc;
    font-family: Arial, sans-serif;
    text-align:center;
    margin:0;
}

/* HEADER */
header {
    padding:20px;
    font-size:38px;
    font-weight:bold;
    text-shadow:0 0 10px #00ffff,0 0 20px #ff00ff;
    background: rgba(0,0,0,0.5);
}

/* BOTONES PRINCIPALES ARRIBA */
.main-buttons {
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin:20px 0;
}
.main-buttons a {
    background:none;
    color:#00ff00;
    border:2px solid #00ff00;
    border-radius:8px;
    padding:12px 20px;
    font-weight:bold;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
    position:relative;
}
.main-buttons a:hover {
    color:#ff66ff;
    border-color:#ff66ff;
    text-shadow:0 0 5px #00ffff,0 0 15px #ff00ff;
    background: rgba(0,0,0,0.2);
}

/* BOTON RECOMENDACIONES */
.recommend-btn {
    background:#00ff00;
    color:#000;
    border:2px solid #0011ff;
    padding:12px 20px;
    font-weight:bold;
    border-radius:8px;
    margin-left:15px;
    text-decoration:none;
    transition:0.3s;
}

/* PELOTA ANIMADA */
.circulo {
    position:absolute;
    bottom:-10px;
    left:-30px;
    width:25px;
    height:25px;
    background:#ff00ff;
    border-radius:50%;
    animation:mover 6s linear infinite;
}
@keyframes mover {
    0% { left:-30px; }
    50% { left:95%; }
    100% { left:-30px; }
}

/* CARITA */
.carita {
    position: fixed;
    top:20px;
    right:20px;
    width:60px;
    height:60px;
    background:#ff66cc;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:1000;
}
.ojo {
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    margin:2px;
    position:relative;
}
.pupila {
    width:5px;
    height:5px;
    background:black;
    border-radius:50%;
    position:absolute;
    top:2px;
    left:2px;
}
.boca {
    width:20px;
    height:6px;
    border-bottom:3px solid black;
    border-radius:3px;
}

/* FOOTER REDES */
footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 15px 0;
    background: rgba(0,0,0,0.5);
    text-align: center;
    z-index: 999;
}
footer .social-btn {
    display: inline-block;
    margin: 5px;
    padding: 10px 15px;
    color: #00ffcc;
    border: 2px solid #00ffcc;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom:60px;
    right:20px;
    background:#00ffcc;
    padding:15px;
    border-radius:50%;
    font-size:28px;
    text-align:center;
    box-shadow:0 0 15px #00ffff;
}

/* 🔥 CIENTÍFICO 2 (AÑADIDO SIN TOCAR NADA MÁS) */
.cientifico2 {
    position: fixed;
    bottom: 10px;
    left: 0;
    width: 120px;
    z-index: 998;
    pointer-events: none;
}

.cientifico2 img {
    width: 100%;
    display: block;
    animation: caminar2 12s linear infinite;
}

@keyframes caminar2 {
    0% { transform: translateX(0); }
    100% { transform: translateX(120vw); }
}
</style>
