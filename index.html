<script>

/* ===== CARITA ESTABLE ===== */
const carita = document.getElementById("carita");

let mx=0,my=0,cx=0,cy=0;

document.addEventListener("mousemove",(e)=>{
    mx=e.clientX+15;
    my=e.clientY+15;
});

function loop(){
    cx+=(mx-cx)*0.15;
    cy+=(my-cy)*0.15;
    carita.style.transform=`translate(${cx}px,${cy}px)`;
    requestAnimationFrame(loop);
}

loop();

</script>
