<script>
document.addEventListener('mousemove', e => {
  document.querySelectorAll('.pupila').forEach(p => {
    const r = p.parentElement.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width/2);
    const dy = e.clientY - (r.top + r.height/2);
    const ang = Math.atan2(dy, dx);
    p.style.transform = `translate(${Math.cos(ang)*3}px, ${Math.sin(ang)*3}px)`;
  });

  const boca = document.querySelector('.boca');
  const t = Date.now();
  boca.style.borderBottomColor = (Math.floor(t/500)%2) ? "#000" : "#ff00ff";
  boca.style.transform = (Math.floor(t/700)%2) ? "scaleX(1)" : "scaleX(1.3)";
});
</script>
