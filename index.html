<style>
body {
    background: url('fondo_inicio.JPG') no-repeat center center fixed;
    background-size: cover;
    color:#00ffcc;
    font-family: Arial, sans-serif;
    text-align:center;
    margin:0;
}

/* HEADER */
header {
    padding:20px;
    font-size:38px;
    font-weight:bold;
    text-shadow:0 0 10px #00ffff,0 0 20px #ff00ff;
    background: rgba(0,0,0,0.5);
}

/* BOTONES */
.main-buttons {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin:20px 0;
}

.main-buttons a {
    background:none;
    color:#00ff00;
    border:2px solid #00ff00;
    border-radius:8px;
    padding:12px 20px;
    font-weight:bold;
    text-decoration:none;
    font-size:18px;
}

/* PELOTA */
.circulo {
    position:absolute;
    bottom:-10px;
    left:-30px;
    width:25px;
    height:25px;
    background:#ff00ff;
    border-radius:50%;
    animation:mover 6s linear infinite;
}

@keyframes mover {
    0% { left:-30px; }
    50% { left:95%; }
    100% { left:-30px; }
}

/* CARITA (NO TOCADA) */
.carita {
    position: fixed;
    top:20px;
    right:20px;
    width:60px;
    height:60px;
    background:#ff66cc;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:1000;
}
.ojo {
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    margin:2px;
}
.pupila {
    width:5px;
    height:5px;
    background:black;
    border-radius:50%;
}
.boca {
    width:20px;
    height:6px;
    border-bottom:3px solid black;
}

/* FOOTER */
footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.5);
}

/* WHATSAPP (NO TOCADO) */
.whatsapp {
    position: fixed;
    bottom:60px;
    right:20px;
    background:#00ffcc;
    padding:15px;
    border-radius:50%;
}

/* 🔥 CIENTIFICO 2 */
.cientifico2 {
    position: fixed;
    bottom: 10px;
    width: 120px;
    z-index: 998;
    animation: caminar2 12s linear infinite;
}

.cientifico2 img {
    width: 100%;
    display:block;
}

@keyframes caminar2 {
    0% { left: 100%; }
    100% { left: -130px; }
}
</style>
</head>

<header>⚡ LAB LUIS – Experimental Physics & Energy</header>

<div class="main-buttons">
  <a href="sobre-mi.html">👨‍🔬 Perfil</a>

  <a href="experimentos.html">🔬 Experimentos</a>
  <a href="libros.html">📚 Libros KDP</a>
</div>

<div class="circulo"></div>

<!-- CARITA (SIN CAMBIOS) -->
<div class="carita">
  <div style="display:flex;">
    <div class="ojo"><div class="pupila"></div></div>
    <div class="ojo"><div class="pupila"></div></div>
  </div>
  <div class="boca"></div>
</div>

<footer></footer>

<a href="https://wa.me/33610342894" class="whatsapp">
