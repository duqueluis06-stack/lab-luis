/* ================= NEUROLUIS (RESTORED) ================= */
.neuroluis-mini{
    position:fixed;
    top:20px;
    left:20px;
    width:85px;
    height:85px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid #00ffff;
    box-shadow:0 0 20px #ff00ff;
    z-index:9999;
}

.neuroluis-mini img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ================= CIENTÍFICO ================= */
.cientifico-caminando{
    position:fixed;
    bottom:10px;
    width:120px;
    z-index:998;
    animation:caminar 12s linear infinite;
    filter:drop-shadow(0 0 10px #00ffff);
}

@keyframes caminar{
    0%{left:-130px;}
    100%{left:100%;}
}

/* ================= CARITA ================= */
.carita{
    position:fixed;
    top:20px;
    right:20px;
    width:60px;
    height:60px;
    background:#ff66cc;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.ojo{
    width:10px;height:10px;
    background:white;
    border-radius:50%;
    margin:2px;
    position:relative;
}

.pupila{
    width:5px;height:5px;
    background:black;
    border-radius:50%;
    position:absolute;
    top:2px;left:2px;
}

.boca{
    width:20px;
    height:6px;
    border-bottom:3px solid black;
}

/* ================= FORO ================= */
.foro-float{
    position:fixed;
    right:18px;
    top:50%;
    transform:translateY(-50%);
    width:72px;
    height:72px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    font-weight:bold;
    color:#fff;
    background:conic-gradient(#ff00ff,#00ffff,#ffcc00,#8a2be2);
    border:3px solid #00ff66;
    animation:pulseForo 2.2s infinite;
}

@keyframes pulseForo{
    0%{transform:translateY(-50%) scale(1);}
    50%{transform:translateY(-50%) scale(1.12);}
    100%{transform:translateY(-50%) scale(1);}
}

/* ================= WHATSAPP FIX ================= */
