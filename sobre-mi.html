<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Luis ⚡ Control System</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
    color:#00ffee;
}

/* ⭐ ESTRELLAS */
#stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
}

/* RADAR TEXTO */
.radar{
    position:fixed;
    top:10px;
    width:100%;
    white-space:nowrap;
    overflow:hidden;
    z-index:3;
}

.radar span{
    display:inline-block;
    padding-left:100%;
    animation:move 18s linear infinite;
    font-size:18px;
    text-shadow:0 0 10px #00ffee;
}

@keyframes move{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
}

/* LAYOUT */
.container{
    position:relative;
    z-index:2;
    display:flex;
    height:100vh;
}

/* IZQUIERDA */
.left{
    width:45%;
    padding:20px;
    background:rgba(0,0,0,0.6);
    overflow:auto;
}

/* DERECHA */
.right{
    width:55%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BOX */
.box{
    width:80%;
    max-width:450px;
    border:1px solid #00ffee;
    padding:20px;
    box-shadow:0 0 25px #00ffee;
}

/* INPUTS */
input,textarea{
    width:100%;
    margin:10px 0;
    padding:10px;
    background:#111;
    border:1px solid #00ffee;
    color:#00ffee;
}

/* BOTÓN */
button{
    width:100%;
    padding:12px;
    background:#00ffee;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* CARA SUAVE */
.face{
    position:fixed;
    font-size:35px;
    z-index:5;
    pointer-events:none;
    opacity:0.5;
    transition:transform 0.3s ease;
}

/* IMAGEN */
img{
    width:100%;
    margin-top:10px;
    border:1px solid #00ffee;
}

.card{
    border:1px solid #00ffee;
    padding:10px;
    margin:10px 0;
}

</style>
</head>

<body>

<!-- ⭐ ESTRELLAS -->
<canvas id="stars"></canvas>

<!-- 🛰️ RADAR -->
<div class="radar">
<span>✈️ LAB LUIS SYSTEM ACTIVE — ELECTRONICS • ULTRASONIC • LASER • ENERGY RESEARCH — MARSEILLE NODE ONLINE ✈️</span>
</div>

<!-- CARA -->
<div class="face" id="face">🙂</div>

<div class="container">

<!-- IZQUIERDA INFO -->
<div class="left">

<h2>⚡ Luis - Laboratorio Experimental</h2>

<div class="card">
Investigación en electrónica avanzada, ultrasonido, láseres y sistemas energéticos.
</div>

<div class="card">
📍 Marseille<br>
🕒 Hora: <span id="time"></span>
</div>

<div class="card">
🌦️ Clima:<br>
<span id="weather">Cargando...</span>
</div>

<div class="card">
🖼️ Marseille:
<img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=900&q=80">
</div>

</div>

<!-- FORM -->
<div class="right">

<div class="box">

<h3>Contacto ⚡</h3>

<form id="form">

<input id="nombre" placeholder="Nombre" required>
<input id="email" placeholder="Email" required>
<textarea id="mensaje" placeholder="Mensaje" required></textarea>

<button type="submit">ENVIAR ✈️</button>

</form>

</div>

</div>

</div>

<script>

/* EMAILJS */
emailjs.init("0hJj5qmLOryoOTSSu");

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    emailjs.send("service_fhmkfwq","template_u09xkgh",{
        nombre: document.getElementById("nombre").value,
        email: document.getElementById("email").value,
        mensaje: document.getElementById("mensaje").value
    }).then(()=> {
        alert("Mensaje enviado ⚡");
    });
});

/* HORA */
function clock(){
    document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}
setInterval(clock,1000);
clock();

/* CLIMA REAL */
fetch("https://api.openweathermap.org/data/2.5/weather?q=Marseille,FR&appid=d291d59abfadcc988dd4026c2f63d6f3&units=metric")
.then(r => r.json())
.then(data => {
    document.getElementById("weather").innerHTML =
    `🌡️ ${data.main.temp}°C<br>
     🌬️ ${data.wind.speed} m/s<br>
     ☁️ ${data.weather[0].description}`;
})
.catch(()=>{
    document.getElementById("weather").innerHTML="⚠️ error clima";
});

/* CARA SUAVE */
const face = document.getElementById("face");
document.addEventListener("mousemove",(e)=>{
    face.style.left = e.clientX + "px";
    face.style.top = e.clientY + "px";
});

/* ESTRELLAS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*1.2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";

    stars.forEach(s=>{
        s.y += 0.3;
        if(s.y>canvas.height) s.y=0;

        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
