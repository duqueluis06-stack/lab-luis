<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luis Lab ⚡ Edición Limpia</title>
    <style>
        body {
            background-color: #02060c;
            color: #00ff66;
            font-family: monospace;
            padding: 40px;
        }
        .panel {
            border: 1px solid #00ff66;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.5);
        }
        .btn {
            background: transparent;
            border: 1px solid #ff00ff;
            color: #ff00ff;
            padding: 15px 30px;
            cursor: pointer;
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .btn:hover {
            background: #ff00ff;
            color: #000;
        }
    </style>
</head>
<body>

    <h1>LAB LUIS // CANAL AUDIO LIMPIO</h1>
    
    <div class="panel">
        <h3>📡 TELEMETRÍA METEOROLÓGICA REAL (MARSEILLE)</h3>
        <div id="weather-data">Cargando satélite...</div>
    </div>

    <div class="panel">
        <h3>🎵 REPRODUCCIÓN DE AUDIO</h3>
        <p>Haz un clic en cualquier parte de la pantalla primero, y luego presiona el botón:</p>
        <!-- Cambia "Brisa.mp3" aquí abajo si descubres en la prueba que se escribe diferente -->
        <button id="btn-audio" class="btn">REPRODUCIR BRISA.MP3 🌊</button>
    </div>

    <!-- ELEMENTO DE AUDIO PURO -->
    <audio id="brisa" loop src="Brisa.mp3"></audio>

<script>
    // Reprodutor de audio simplificado al máximo
    const audio = document.getElementById("brisa");
    const btn = document.getElementById("btn-audio");

    btn.addEventListener("click", () => {
        if (audio.paused) {
            audio.play()
                .then(() => {
                    btn.innerText = "🛑 PAUSAR MÚSICA";
                    btn.style.borderColor = "#00ff66";
                    btn.style.color = "#00ff66";
                })
                .catch(err => {
                    alert("ERROR DE RUTA: El navegador no encuentra 'Brisa.mp3'. Revisa mayúsculas/minúsculas en tu GitHub.");
                    console.error(err);
                });
        } else {
            audio.pause();
            btn.innerText = "REPRODUCIR BRISA.MP3 🌊";
            btn.style.borderColor = "#ff00ff";
            btn.style.color = "#ff00ff";
        }
    });

    // Clima satelital real de Marseille sin adornos
    fetch('https://api.open-meteo.com/v1/forecast?latitude=43.2965&longitude=5.3698&current=temperature_2m,wind_speed_10m')
        .then(res => res.json())
        .then(data => {
            document.getElementById("weather-data").innerHTML = 
                `• UBICACIÓN: MARSEILLE DISTRITO COSTERO<br>` +
                `• TEMP SATELITAL: ${data.current.temperature_2m} °C<br>` +
                `• VELOCIDAD VIENTO: ${data.current.wind_speed_10m} KM/H`;
        })
        .catch(() => {
            document.getElementById("weather-data").innerText = "Error leyendo satélite.";
        });
</script>
</body>
</html>
