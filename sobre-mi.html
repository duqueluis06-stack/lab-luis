<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Luis ⚡ Contacto</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

/* RESET */
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    color:#00ffee;
    background:#000;
}

/* ⭐ ESTRELLAS */
#stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
}

/* CONTENEDOR PRINCIPAL */
.container{
    position:relative;
    z-index:2;
    display:flex;
    height:100vh;
}

/* MITAD IMAGEN */
.left{
    width:50%;
    background:url('luis.JPG') center center;
    background-size:cover;
    filter:contrast(1.1) brightness(0.8);
}

/* PANEL DERECHO */
.right{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(10px);
}

/* CAJA */
.box{
    width:80%;
    max-width:420px;
    padding:20px;
    border:1px solid #00ffee;
    border-radius:15px;
    box-shadow:0 0 25px #00ffee;
}

/* INPUTS */
input,textarea{
    width:100%;
    margin:10px 0;
    padding:10px;
    background:#111;
    border:1px solid #00ffee;
    color:#00ffee;
}

/* BOTÓN */
button{
    width:100%;
    padding:12px;
    background:#00ffee;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* 🛰️ TEXTO RADAR */
.radar{
    position:fixed;
    top:10px;
    width:100%;
    white-space:nowrap;
    overflow:hidden;
    z-index:3;
    color:#00ffee;
    font-size:14px;
    opacity:0.8;
}

.radar span{
    display:inline-block;
    padding-left:100%;
    animation:move 12s linear infinite;
}

@keyframes move{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
}

/* 🌌 LUCES */
.glow{
    text-shadow:0 0 10px #00ffee;
}

</style>
</head>

<body>

<!-- ⭐ ESTRELLAS -->
<canvas id="stars"></canvas>

<!-- 🛰️ TEXTO AEROPUERTO / RADAR -->
<div class="radar">
    <span>⚡ SISTEMA LAB LUIS ACTIVO — TRANSMISIÓN DE MENSAJES EN CURSO — ESTADO: OPERATIVO — ENLACE SEGURO ⚡</span>
</div>

<div class="container">

<!-- IMAGEN MITAD -->
<div class="left"></div>

<!-- FORM -->
<div class="right">

<div class="box">

<h2 class="glow">⚡ CONTACTO</h2>

<form id="form">

<input id="nombre" placeholder="Nombre" required>
<input id="email" placeholder="Email" required>
<textarea id="mensaje" placeholder="Mensaje" required></textarea>

<button type="submit">ENVIAR ⚡</button>

</form>

</div>

</div>

</div>

<script>
/* EMAILJS */
emailjs.init("0hJj5qmLOryoOTSSu");

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    emailjs.send("service_fhmkfwq","template_u09xkgh",{
        nombre: document.getElementById("nombre").value,
        email: document.getElementById("email").value,
        mensaje: document.getElementById("mensaje").value
    }).then(() => {
        alert("Mensaje enviado ⚡");
    }, (error) => {
        alert("Error al enviar");
        console.log(error);
    });
});

/* ⭐ ESTRELLAS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*1.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";

    stars.forEach(s=>{
        s.y += 0.3;
        if(s.y>canvas.height){
            s.y=0;
        }

        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
