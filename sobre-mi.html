<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Luis ⚡ Meteo System v2.1</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
:root {
    --neon-cyan: #00ffee;
    --neon-pulse: #ff0077;
    --bg-dark: #02080e;
    --panel-bg: rgba(2, 12, 22, 0.75);
}

body {
    margin: 0;
    font-family: 'Courier New', Courier, monospace;
    background: var(--bg-dark);
    color: var(--neon-cyan);
    overflow: hidden;
    height: 100vh;
}

/* 🌊 FONDO Y ATMÓSFERA */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
    background-position: center;
    filter: brightness(0.3) contrast(1.2) hue-rotate(15deg);
    z-index: 0;
}

/* ONDAS */
.wave-container {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 150px;
    z-index: 1;
    opacity: 0.4;
    overflow: hidden;
}

.wave {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 100%;
    background: repeating-linear-gradient(90deg, transparent, transparent 20px, var(--neon-cyan) 21px, transparent 22px);
    clip-path: ellipse(100% 50% at 50% 100%);
    animation: waveShift 12s linear infinite;
}

@keyframes waveShift {
    0% { transform: translateX(0) scaleY(1); }
    50% { transform: translateX(-25%) scaleY(1.2); }
    100% { transform: translateX(-50%) scaleY(1); }
}

/* CONTENIDO EN MALLA DE CONTROL */
.container {
    position: relative;
    z-index: 2;
    display: flex;
    height: 100vh;
    box-sizing: border-box;
}

/* PANEL IZQ: TELEMETRÍA */
.left {
    width: 50%;
    padding: 40px;
    background: linear-gradient(90deg, rgba(0,5,10,0.85) 80%, transparent);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* PANEL DER: INTERFAZ */
.right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(3px);
}

/* TECH BOX / TERMINAL */
.box {
    width: 85%;
    max-width: 440px;
    padding: 30px;
    border: 2px solid var(--neon-cyan);
    border-radius: 0 20px 0 20px;
    box-shadow: 0 0 20px rgba(0, 255, 238, 0.2), inset 0 0 15px rgba(0, 255, 238, 0.1);
    background: var(--panel-bg);
    position: relative;
}

.box::before {
    content: 'SYS-READY';
    position: absolute;
    top: -12px;
    right: 20px;
    background: var(--neon-cyan);
    color: #000;
    font-size: 10px;
    font-weight: bold;
    padding: 2px 6px;
}

/* PANEL DE AUDIO GLOBAL */
.audio-control-panel {
    background: rgba(0, 20, 35, 0.8);
    border: 1px solid var(--neon-cyan);
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 5px;
}

.btn-audio {
    background: transparent;
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
    font-family: monospace;
    font-size: 0.8rem;
    transition: all 0.2s;
}

.btn-audio:hover {
    background: rgba(0, 255, 238, 0.2);
    box-shadow: 0 0 10px var(--neon-cyan);
}

/* CAMPOS DE DATOS */
input, textarea {
    width: 100%;
    margin: 12px 0;
    padding: 12px;
    background: rgba(0, 15, 25, 0.8);
    border: 1px solid rgba(0, 255, 238, 0.4);
    color: #fff;
    font-family: monospace;
    box-sizing: border-box;
}

input:focus, textarea:focus {
    outline: none;
    border-color: var(--neon-cyan);
    box-shadow: 0 0 10px rgba(0, 255, 238, 0.5);
}

/* BOTÓN DE TRANSMISIÓN */
.btn-submit {
    width: 100%;
    padding: 15px;
    background: transparent;
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    cursor: pointer;
    font-weight: bold;
    font-family: monospace;
    letter-spacing: 2px;
    transition: all 0.3s ease;
}

.btn-submit:hover {
    background: var(--neon-cyan);
    color: #000;
    box-shadow: 0 0 25px var(--neon-cyan);
}

/* METEO PANELS */
.meteo {
    border-left: 4px solid var(--neon-cyan);
    padding: 15px 20px;
    margin: 20px 0;
    background: rgba(0, 20, 35, 0.4);
    border-radius: 0 10px 10px 0;
}

h2 {
    font-size: 1.8rem;
    text-shadow: 0 0 10px var(--neon-cyan);
    margin-bottom: 5px;
    animation: flicker 4s infinite;
}

h3 {
    margin-top: 0;
    color: #fff;
    text-transform: uppercase;
}

@keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
    20%, 24%, 55% { opacity: 0.7; text-shadow: none; }
}

@media (max-width: 768px) {
    .container { flex-direction: column; overflow-y: auto; }
    .left, .right { width: 100%; height: auto; padding: 20px; }
    body { overflow: auto; }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="wave-container">
    <div class="wave"></div>
</div>

<div class="container">

    <!-- SECCIÓN TELEMETRÍA (IZQUIERDA) -->
    <div class="left">
        <h2>⚡ LAB LUIS // METEO SYSTEM</h2>
        
        <!-- 🔊 NUEVO PANEL DE AUDIO INTERACTIVO -->
        <div class="audio-control-panel">
            <span style="font-size:0.8rem; display:block; margin-bottom:5px; color:#fff;">🎛️ CONTROL DE AUDIO DEL LAB:</span>
            <button class="btn-audio" id="btn-toggle-ocean">🌊 INICIAR ENTORNO MARINO</button>
            <button class="btn-audio" id="btn-test-sonar">🔊 SONAR (ULTRASONIDO)</button>
        </div>

        <div class="meteo">
            <h3>🌦️ DATOS EN TIEMPO REAL</h3>
            <div id="weather">Sincronizando con satélite...</div>
        </div>

        <div class="meteo">
            <h3>📡 ESTADO DEL SISTEMA</h3>
            <span style="color: #55ff55;">● CORE: ACTIVO</span><br>
            <span>⚡ MONITOREO DE OXIDACIÓN ATMOSFÉRICA</span><br>
            <span>🌊 FRECUENCIA MARINA: 42kHz SHIELD ON</span>
        </div>
    </div>

    <!-- SECCIÓN INTERFAZ (DERECHA) -->
    <div class="right">
        <div class="box">
            <h3>TRANSMISIÓN DE DATOS</h3>
            <form id="form">
                <input id="nombre" placeholder="> IDENTIFICACIÓN" required>
                <input id="email" placeholder="> COMUNICACIÓN DIRECTA (EMAIL)" required>
                <textarea id="mensaje" rows="4" placeholder="> INSERTE MENSAJE / PARÁMETROS..." required></textarea>
                <button type="submit" class="btn-submit">INICIAR TRANSMISIÓN ⚡</button>
            </form>
        </div>
    </div>

</div>

<!-- AUDIO AMBIENTE MAR -->
<audio id="ocean" loop preload="auto">
    <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b8d5b2.mp3" type="audio/mp3">
</audio>

<script>
/* INICIALIZACIÓN EMAILJS */
emailjs.init("0hJj5qmLOryoOTSSu");

// Generador de audio de laboratorio (Sintetizador por código)
function playBeep(freq, type, duration) {
    try {
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let oscillator = audioCtx.createOscillator();
        let gainNode = audioCtx.createGain();
        
        oscillator.type = type; // 'sine', 'square', 'sawtooth', 'triangle'
        oscillator.frequency.value = freq;
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
    } catch(e) { console.log("Audio contextual bloqueado o no soportado"); }
}

/* BOTÓN 1: ACTIVAR/DESACTIVAR MAR */
const oceanAudio = document.getElementById("ocean");
const btnOcean = document.getElementById("btn-toggle-ocean");

btnOcean.addEventListener("click", () => {
    if (oceanAudio.paused) {
        oceanAudio.play().then(() => {
            btnOcean.style.background = "var(--neon-cyan)";
            btnOcean.style.color = "#000";
            btnOcean.innerText = "⏸️ DETENER ENTORNO MARINO";
            playBeep(523.25, "sine", 0.15); // Feedback de encendido
        }).catch(err => {
            alert("Haz clic primero en la pantalla para permitir el audio.");
        });
    } else {
        oceanAudio.pause();
        btnOcean.style.background = "transparent";
        btnOcean.style.color = "var(--neon-cyan)";
        btnOcean.innerText = "🌊 INICIAR ENTORNO MARINO";
        playBeep(392, "sine", 0.15); // Feedback de apagado
    }
});

/* BOTÓN 2: SONAR DE PRUEBA (ULTRASONIDO SIMULADO) */
document.getElementById("btn-test-sonar").addEventListener("click", () => {
    // Genera un pulso doble tipo radar futurista
    playBeep(1200, "triangle", 0.3);
    setTimeout(() => playBeep(1500, "sine", 0.2), 150);
});

/* ENVÍO DE FORMULARIO CON SONIDO */
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();
    
    // Alerta sonora de transmisión
    playBeep(880, "square", 0.4);

    emailjs.send("service_fhmkfwq","template_u09xkgh",{
        nombre: document.getElementById("nombre").value,
        email: document.getElementById("email").value,
        mensaje: document.getElementById("mensaje").value
    }).then(()=> {
        alert("Transmisión completada con éxito. Datos enviados al nodo central. ⚡");
    });
});

/* CAPTURA METEOROLÓGICA OPTIMIZADA */
fetch("https://api.openweathermap.org/data/2.5/weather?q=Marseille,FR&appid=d291d59abfadcc988dd4026c2f63d6f3&units=metric&lang=es")
.then(r=>r.json())
.then(data=>{
    document.getElementById("weather").innerHTML = `
        <span style="color:#fff;">📍 NODO:</span> ${data.name}<br>
        <span style="color:#fff;">🌡️ TEMP:</span> ${data.main.temp} °C<br>
        <span style="color:#fff;">🌬️ VIENTO:</span> ${data.wind.speed} m/s<br>
        <span style="color:#fff;">☁️ RÁDAR:</span> ${data.weather[0].description.toUpperCase()}<br>
        <span style="color:#fff;">💧 HUMEDAD:</span> ${data.main.humidity}%
    `;
})
.catch(()=>{
    document.getElementById("weather").innerHTML="⚠️ ERROR DE ENLACE: Cargando simulación local...";
});
</script>

</body>
</html>
