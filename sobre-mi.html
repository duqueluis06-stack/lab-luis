<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Luis ⚡ Meteo System</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#00ffee;
    overflow:hidden;
}

/* 🌊 FONDO MAR */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url("https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    filter:brightness(0.5) contrast(1.1);
    z-index:0;
}

/* ONDAS */
.wave{
    position:fixed;
    bottom:0;
    width:200%;
    height:120px;
    background:rgba(0,255,255,0.08);
    animation:wave 8s linear infinite;
    z-index:1;
}

@keyframes wave{
    0%{transform:translateX(0);}
    100%{transform:translateX(-50%);}
}

/* CONTENIDO */
.container{
    position:relative;
    z-index:2;
    display:flex;
    height:100vh;
}

/* PANEL IZQ */
.left{
    width:50%;
    padding:20px;
    background:rgba(0,0,0,0.55);
    overflow:auto;
}

/* PANEL DER */
.right{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BOX */
.box{
    width:80%;
    max-width:420px;
    padding:20px;
    border:1px solid #00ffee;
    box-shadow:0 0 25px #00ffee;
    background:rgba(0,0,0,0.6);
}

/* INPUT */
input,textarea{
    width:100%;
    margin:10px 0;
    padding:10px;
    background:#111;
    border:1px solid #00ffee;
    color:#00ffee;
}

/* BOTÓN */
button{
    width:100%;
    padding:12px;
    background:#00ffee;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* METEO PANEL */
.meteo{
    border:1px solid #00ffee;
    padding:15px;
    margin-top:10px;
    background:rgba(0,0,0,0.5);
}

/* TITULO */
h2{
    text-shadow:0 0 10px #00ffee;
}

</style>
</head>

<body>

<!-- 🌊 FONDO -->
<div class="bg"></div>
<div class="wave"></div>

<div class="container">

<!-- IZQUIERDA -->
<div class="left">

<h2>⚡ LAB LUIS METEO SYSTEM</h2>

<p>
Investigación en electrónica, energía, ultrasonido y sistemas ambientales en zona mediterránea (Marseille / Calanques).
</p>

<div class="meteo">
<h3>🌦️ Estación Meteorológica</h3>
<div id="weather">Cargando datos...</div>
</div>

<div class="meteo">
<h3>📡 Estado del sistema</h3>
🌐 Nodo activo<br>
⚡ Sensores simulados + API real<br>
🌊 entorno costero Calanques
</div>

</div>

<!-- DERECHA -->
<div class="right">

<div class="box">

<h3>Contacto ⚡</h3>

<form id="form">

<input id="nombre" placeholder="Nombre" required>
<input id="email" placeholder="Email" required>
<textarea id="mensaje" placeholder="Mensaje" required></textarea>

<button type="submit">ENVIAR 🌊</button>

</form>

</div>

</div>

</div>

<!-- SONIDO MAR -->
<audio id="ocean" loop>
<source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b8d5b2.mp3">
</audio>

<script>

/* EMAILJS */
emailjs.init("0hJj5qmLOryoOTSSu");

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    emailjs.send("service_fhmkfwq","template_u09xkgh",{
        nombre: document.getElementById("nombre").value,
        email: document.getElementById("email").value,
        mensaje: document.getElementById("mensaje").value
    }).then(()=> alert("Mensaje enviado ⚡"));
});

/* METEO REAL */
fetch("https://api.openweathermap.org/data/2.5/weather?q=Marseille,FR&appid=d291d59abfadcc988dd4026c2f63d6f3&units=metric")
.then(r=>r.json())
.then(data=>{
    document.getElementById("weather").innerHTML = `
    🌡️ Temperatura: ${data.main.temp}°C<br>
    🌬️ Viento: ${data.wind.speed} m/s<br>
    ☁️ Estado: ${data.weather[0].description}<br>
    💧 Humedad: ${data.main.humidity}%
    `;
})
.catch(()=>{
    document.getElementById("weather").innerHTML="⚠️ Sin datos meteorológicos";
});

/* AUDIO ACTIVACIÓN (móvil seguro) */
document.body.addEventListener("click", ()=>{
    document.getElementById("ocean").play();
}, {once:true});

</script>

</body>
</html>
