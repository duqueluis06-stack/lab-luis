<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contacto Lab Luis ⚡</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#00ffee;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    width:90%;
    max-width:600px;
    padding:25px;
    border:1px solid #00ffee;
    border-radius:15px;
    box-shadow:0 0 25px #00ffee;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input,textarea{
    width:100%;
    margin:10px 0;
    padding:12px;
    background:#111;
    border:1px solid #00ffee;
    color:#00ffee;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    background:linear-gradient(90deg,#00ffee,#00aaff);
    border:none;
    font-weight:bold;
    cursor:pointer;
    border-radius:30px;
}

button:hover{
    box-shadow:0 0 20px #00ffee;
}
</style>

</head>

<body>

<div class="box">

<h2>⚡ Contacto Lab Luis</h2>

<form id="form">

<input type="text" id="nombre" placeholder="Nombre" required>

<input type="email" id="email" placeholder="Email" required>

<textarea id="mensaje" placeholder="Mensaje" required></textarea>

<button type="submit">Enviar ⚡</button>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("0hJj5qmLOryoOTSSu");

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    emailjs.send("service_fhmkfwq", "template_u09xkgh", {
        nombre: document.getElementById("nombre").value,
        email: document.getElementById("email").value,
        mensaje: document.getElementById("mensaje").value
    }).then(() => {
        alert("Mensaje enviado correctamente ⚡");
    }, (error) => {
        alert("Error al enviar mensaje");
        console.log(error);
    });
});
</script>

</body>
</html>
