<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛰️ Lab Luis - NeuroLuiyi 3D Pro</title>

<style>
:root {
    --neon-cyan: #00ffff;
    --neon-pink: #ff00ff;
    --neon-purple: #bc13fe;
    --glass: rgba(10, 10, 25, 0.85);
    --bg-dark: #010103;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, 'Orbitron', sans-serif;
    background: var(--bg-dark);
    color: white;
    height: 100vh;
    overflow: hidden;
    display: flex;
    perspective: 1000px; /* Necesario para efectos 3D globales */
}

/* RESPONSIVE: Adaptación para teléfonos */
@media (max-width: 768px) {
    body { flex-direction: column; overflow-y: auto; height: auto; }
    .sidebar { width: 100% !important; height: auto !important; border-right: none !important; border-bottom: 3px solid var(--neon-cyan); position: relative !important; top: 0 !important; }
    #main { height: auto !important; overflow: visible !important; width: 100% !important; padding: 20px 10px !important; margin-top: 0 !important; }
    .space-scene { opacity: 0.5; } /* Suavizar fondo en móvil */
}

/* --- ESCENA GALÁCTICA 3D (FONDO) --- */
.space-scene {
    position: fixed;
    inset: 0;
    z-index: -2;
    background: radial-gradient(circle at center, #0a111a 0%, #000 100%);
    overflow: hidden;
}

/* Estrellas Warp */
.star { position: absolute; background: white; border-radius: 50%; animation: warpSpeed linear infinite; opacity: 0; }
@keyframes warpSpeed {
    0% { transform: translateY(-100px) translateZ(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { transform: translateY(100vh) translateZ(500px); opacity: 0; }
}

/* Nebulosas de Neón */
.nebula {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: nebulaPulse 15s infinite alternate;
}
@keyframes nebulaPulse { 0% { transform: scale(1); opacity: 0.1; } 100% { transform: scale(1.2); opacity: 0.2; } }

/* Planetas 3D CSS */
.planet {
    position: absolute;
    border-radius: 50%;
    box-shadow: inset -20px -20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255,255,255,0.1);
    animation: planetRotation 20s linear infinite;
}
@keyframes planetRotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* --- ASTRONAUTA DE NEÓN PROGRAMADO (SIN IMAGEN) --- */
.astro-neon {
    position: fixed;
    width: 150px;
    height: 220px;
    bottom: 10%;
    right: 5%;
    z-index: -1;
    animation: astroFloat 10s ease-in-out infinite;
    pointer-events: none;
    opacity: 0.7;
}

/* Cuerpo del astronauta hecho con CSS y sombras neón */
.astro-body {
    width: 80px; height: 120px;
    border: 4px solid var(--neon-cyan);
    border-radius: 40px;
    box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 10px var(--neon-cyan);
    position: absolute; left: 35px; top: 60px;
}
.astro-head {
    width: 60px; height: 60px;
    border: 4px solid var(--neon-purple);
    border-radius: 50%;
    box-shadow: 0 0 25px var(--neon-purple);
    position: absolute; left: 45px; top: 0;
    background: rgba(0,0,0,0.5);
}
.astro-head::after { /* Visor */
    content: ''; position: absolute; width: 40px; height: 30px;
    background: var(--neon-cyan); border-radius: 15px;
    top: 10px; left: 10px; opacity: 0.3; filter: blur(2px);
}
.astro-backpack {
    width: 50px; height: 90px;
    border: 4px solid var(--neon-pink);
    border-radius: 10px;
    box-shadow: 0 0 20px var(--neon-pink);
    position: absolute; left: 15px; top: 70px;
}

@keyframes astroFloat { 0%, 100% { transform: translate(0, 0) rotate(5deg); } 50% { transform: translate(-20px, -40px) rotate(-5deg); } }

/* --- SIDEBAR 3D GLASS --- */
.sidebar {
    width: 350px;
    height: 100vh;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border-right: 3px solid var(--neon-cyan);
    padding: 30px;
    display: flex;
    flex-direction: column;
    z-index: 100;
    box-sizing: border-box;
    flex-shrink: 0;
    box-shadow: 10px 0 50px rgba(0, 255, 255, 0.1);
    transform: translateZ(20px); /* Efecto 3D de elevación */
}

.sidebar h2 {
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan);
    text-align: center;
    margin-top: 0;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 2px;
}

/* AVATARES LINDOS & 3D */
.avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
.av-item {
    font-size: 26px; cursor: pointer; text-align: center; padding: 8px;
    border-radius: 12px; border: 2px solid transparent;
    transition: 0.3s; background: rgba(255,255,255,0.03);
    box-shadow: inset 0 0 5px rgba(255,255,255,0.05);
}
.av-item:hover { background: rgba(0, 255, 255, 0.15); transform: translateY(-3px); }
.av-item.selected {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 10px var(--neon-cyan);
    background: rgba(0, 255, 255, 0.2);
    transform: scale(1.1) translateZ(10px);
}

/* INPUTS ESPECTACULARES */
input, textarea {
    width: 100%; padding: 15px; margin-top: 15px; border-radius: 12px;
    border: 2px solid #222; background: rgba(0,0,0,0.7);
    color: white; box-sizing: border-box; font-size: 16px;
    transition: 0.3s;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}
input:focus, textarea:focus {
    border-color: var(--neon-purple);
    box-shadow: 0 0 15px var(--neon-purple), inset 0 0 5px var(--neon-purple);
    outline: none;
}

.btn-pub {
    width: 100%; margin-top: 20px; padding: 16px; border: none; border-radius: 12px;
    background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
    background-size: 200% 200%;
    color: white; font-weight: bold; cursor: pointer;
    text-transform: uppercase; letter-spacing: 2px;
    animation: gradientFlow 5s ease infinite;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    transition: 0.3s;
}
.btn-pub:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 0 30px var(--neon-cyan); }
@keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

/* --- FEED CENTRAL (PLACAS 3D) --- */
#main {
    flex: 1;
    overflow-y: auto;
    padding: 60px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    scrollbar-width: none;
    transform-style: preserve-3d; /* Para que las placas se eleven */
}
#main::-webkit-scrollbar { display: none; }

.post {
    width: 100%;
    max-width: 650px;
    background: rgba(15, 15, 30, 0.85);
    border: 2px solid var(--neon-cyan);
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 35px;
    backdrop-filter: blur(15px);
    
    /* EFECTO 3D DE PLACA */
    transform: rotateX(5deg) translateZ(0px);
    transition: 0.5s ease;
    box-shadow: 0 15px 35px rgba(0,0,0,0.7);
    position: relative;
    overflow: hidden;
}

/* Brillo Neón Pulsante en el borde */
.post::before {
    content: ''; position: absolute; inset: 0;
    border-radius: 20px; padding: 2px;
    background: linear-gradient(45deg, var(--neon-cyan), transparent, var(--neon-cyan));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: neonPulse 3s infinite;
    pointer-events: none;
}
@keyframes neonPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.post:hover {
    transform: rotateX(0deg) translateZ(30px); /* Elevación 3D al pasar el mouse */
    border-color: var(--neon-pink);
    box-shadow: 0 25px 50px rgba(255, 0, 255, 0.2);
}

.post-user {
    color: var(--neon-cyan);
    font-weight: bold;
    font-size: 1.2rem;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-shadow: 0 0 10px var(--neon-cyan);
}
.post-user span { font-size: 1.5rem; }

.post-msg {
    line-height: 1.7;
    color: #f0f0f0;
    font-size: 1rem;
    background: rgba(0,0,0,0.3);
    padding: 15px;
    border-radius: 10px;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
}

.post-actions {
    margin-top: 20px;
    display: flex;
    gap: 25px;
    font-size: 0.9rem;
    color: #888;
}
.btn-action { cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
.btn-action:hover { color: white; text-shadow: 0 0 10px white; }
.btn-action.like:hover { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
</style>
</head>

<body>

<div class="space-scene" id="space-bg">
    <div class="nebula" style="width: 500px; height: 500px; background: var(--neon-purple); top: -100px; left: -100px;"></div>
    <div class="nebula" style="width: 400px; height: 400px; background: var(--neon-cyan); bottom: -100px; right: -100px;"></div>
    
    <div class="planet" style="width: 100px; height: 100px; background: #3a1c71; top: 15%; left: 10%; border: 2px solid var(--neon-purple);"></div>
    <div class="planet" style="width: 60px; height: 60px; background: #e94e77; bottom: 20%; right: 15%; border: 2px solid var(--neon-pink);"></div>
</div>

<div class="astro-neon">
    <div class="astro-head"></div>
    <div class="astro-backpack"></div>
    <div class="astro-body"></div>
</div>

<div class="sidebar">
    <h2>LAB LUIS</h2>
    <p style="font-size:11px; color:var(--neon-cyan); text-align:center; text-transform:uppercase; letter-spacing:1px;">Selecciona tu identidad:</p>
    
    <div class="avatar-grid" id="avs">
        <div class="av-item selected" onclick="setAvatar('👽',this)">👽</div>
        <div class="av-item" onclick="setAvatar('🛸',this)">🛸</div>
        <div class="av-item" onclick="setAvatar('👨‍🚀',this)">👨‍🚀</div>
        <div class="av-item" onclick="setAvatar('👾',this)">👾</div>
        <div class="av-item" onclick="setAvatar('🧠',this)">🧠</div>
        <div class="av-item" onclick="setAvatar('⚡',this)">⚡</div>
        <div class="av-item" onclick="setAvatar('🤖',this)">🤖</div>
        <div class="av-item" onclick="setAvatar('🚀',this)">🚀</div>
        <div class="av-item" onclick="setAvatar('🧬',this)">🧬</div>
        <div class="av-item" onclick="setAvatar('🔭',this)">🔭</div>
    </div>

    <input id="name" placeholder="Tu apodo galáctico...">
    <textarea id="msg" rows="5" placeholder="¿Qué experimento lanzamos hoy?"></textarea>
    <button class="btn-pub" onclick="send()">PUBLICAR WARP</button>

    <a href="index.html" style="text-align:center; color:#555; text-decoration:none; font-size:12px; margin-top:auto; padding-top:20px;">⬅ SALIR AL SISTEMA</a>
</div>

<div id="main">
    <div id="feed" style="width: 100%; display: flex; flex-direction: column; align-items: center; transform-style: preserve-3d;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
  authDomain: "foro-luiyi.firebaseapp.com",
  databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "foro-luiyi",
  storageBucket: "foro-luiyi.firebasestorage.app",
  messagingSenderId: "410471993147",
  appId: "1:410471993147:web:d672952aa8a4364d48f11e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* GENERADOR DE ESTRELLAS WARP */
const bg = document.getElementById('space-bg');
for(let i=0; i<100; i++){
    let star = document.createElement('div');
    star.className = 'star';
    star.style.width = Math.random()*3+'px';
    star.style.height = star.style.width;
    star.style.left = Math.random()*100+'vw';
    star.style.top = Math.random()*100+'vh';
    star.style.animationDuration = (Math.random()*3 + 1.5)+'s'; // Más rápido
    star.style.animationDelay = Math.random()*2+'s';
    bg.appendChild(star);
}

/* LÓGICA UI */
let avatar = "👽";
window.setAvatar = (a,el) => {
    document.querySelectorAll(".av-item").forEach(x=>x.classList.remove("selected"));
    el.classList.add("selected");
    avatar = a;
};

/* ENVIAR (Intacto) */
window.send = () => {
    const name = document.getElementById("name").value.trim();
    const msg = document.getElementById("msg").value.trim();

    if(!name || !msg) return alert("¡Capitán, complete los registros!");

    push(ref(db, "posts"), {
        name,
        avatar,
        msg,
        likes: 0,
        time: Date.now()
    }).then(() => {
        document.getElementById("msg").value = "";
    });
};

/* CARGAR POSTS (Diseño 3D de lujo) */
onChildAdded(ref(db, "posts"), snap => {
    const p = snap.val();
    const id = snap.key;

    const div = document.createElement("div");
    div.className = "post";
    // Efecto 3D aleatorio al cargar
    const rotX = (Math.random() * 10 - 5).toFixed(2);
    const rotY = (Math.random() * 10 - 5).toFixed(2);
    div.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(0px)`;

    div.innerHTML = `
        <div class="post-user"><span>${p.avatar || '👤'}</span> @${p.name}</div>
        <div class="post-msg">${p.msg}</div>
        <div class="post-actions">
            <div class="btn-action like" onclick="like('${id}')">❤️ Energía: <span id="l-${id}">${p.likes || 0}</span></div>
            <div class="btn-action">💬 Responder</div>
        </div>
    `;

    // Efecto interactivo 3D al mover el mouse sobre la placa
    div.addEventListener('mousemove', (e) => {
        const rect = div.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const xc = rect.width / 2;
        const yc = rect.height / 2;
        const dx = (x - xc) / xc;
        const dy = (y - yc) / yc;
        
        div.style.transform = `rotateX(${-dy * 10}deg) rotateY(${dx * 10}deg) translateZ(30px)`;
    });
    
    div.addEventListener('mouseleave', () => {
        div.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(0px)`;
    });

    document.getElementById("feed").prepend(div);
});

/* LIKES (Intacto) */
window.like = (id) => {
    const likesRef = ref(db, `posts/${id}/likes`);
    runTransaction(likesRef, (currentLikes) => {
        return (currentLikes || 0) + 1;
    }).then(() => {
        const span = document.getElementById(`l-${id}`);
        if(span) span.innerText = parseInt(span.innerText) + 1;
    });
};

</script>

</body>
</html>
