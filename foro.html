<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🚀 NEURO-LUIYI: DEEP SPACE FORUM</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --space-bg: #000008; /* Negro azulado muy profundo */
            --glass-card: rgba(10, 15, 30, 0.8);
        }

        /* --- RESETEO Y ESTRUCTURA BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--space-bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column;
            color: white;
        }

        /* --- EL UNIVERSO VISUAL (SVG INCRUSTADO) --- */
        #visual-universe {
            position: fixed; inset: 0; z-index: -1;
            overflow: hidden;
        }

        /* Fondo de Estrellas SVG (Infalible, no se pone negro) */
        #visual-universe::before {
            content: ""; position: absolute; inset: -50%;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300"><circle cx="20" cy="30" r="1.2" fill="white" opacity="0.8"/><circle cx="150" cy="60" r="1" fill="white" opacity="0.6"/><circle cx="280" cy="120" r="1.5" fill="white"/><circle cx="50" cy="200" r="1" fill="white" opacity="0.7"/><circle cx="110" cy="250" r="1.2" fill="white" opacity="0.9"/><circle cx="210" cy="280" r="1" fill="white"/><circle cx="40" cy="80" r="1.5" fill="white" opacity="0.5"/><circle cx="180" cy="180" r="1" fill="white"/><circle cx="250" cy="40" r="1.2" fill="white" opacity="0.8"/></svg>');
            background-size: 250px 250px;
            animation: spaceDrift 150s linear infinite;
        }

        @keyframes spaceDrift { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* PLANETAS CSS */
        .planet { position: absolute; border-radius: 50%; z-index: 1; }

        /* Saturno Mejorado */
        .saturn {
            top: 15%; right: 10%; width: 70px; height: 70px;
            background: radial-gradient(circle at 30% 30%, #f9e2b0, #a17f4a);
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.7), 0 0 20px rgba(249, 226, 176, 0.2);
            animation: float 10s ease-in-out infinite alternate;
        }
        .saturn-rings {
            position: absolute; top: 35px; left: -45px; width: 160px; height: 40px;
            border: 8px solid rgba(225, 180, 107, 0.4); border-radius: 50%;
            transform: rotateX(75deg) rotateY(10deg); z-index: -1;
        }

        /* Planeta Rojo (Tarde) */
        .mars {
            top: 60%; left: 15%; width: 40px; height: 40px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #8e2e2e);
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.7), 0 0 15px rgba(255, 107, 107, 0.1);
        }

        /* Planeta Gaseoso Distante */
        .neptune {
            bottom: 20%; right: 20%; width: 25px; height: 25px;
            background: radial-gradient(circle at 30% 30%, #4facfe, #0061ff);
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.7); opacity: 0.8;
        }

        /* NAVE ESPACIAL RARA (SVG) */
        .rare-ship {
            position: absolute; top: 40%; left: 50%; width: 80px; height: 80px;
            transform: translate(-50%, -50%); z-index: 2;
            animation: shipFloat 12s ease-in-out infinite, shipRotate 20s linear infinite;
        }

        @keyframes float { from { transform: translateY(0); } to { transform: translateY(20px); } }
        @keyframes shipFloat { 0%, 100% { transform: translate(-50%, -50%) translateY(0); } 50% { transform: translate(-50%, -50%) translateY(-30px); } }
        @keyframes shipRotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* --- INTERFAZ DE USUARIO (UI) --- */
        .header {
            height: 70px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.2); flex-shrink: 0;
        }
        .header h1 { font-size: 18px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }
        .pfp-head { width: 45px; height: 45px; border: 2px solid var(--cyan); border-radius: 8px; }

        /* FEED SCROLLABLE */
        #main-feed { flex: 1; overflow-y: auto; padding: 20px 15px; -webkit-overflow-scrolling: touch; z-index: 10; }
        #posts-container { max-width: 600px; margin: 0 auto; }

        /* CARTAS DE POST (Efecto Cristal) */
        .post-card {
            background: var(--glass-card); border-left: 4px solid var(--cyan);
            border-radius: 0 12px 12px 0; padding: 18px; margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border-top: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
        }

        .card-user-line { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border-bottom: 1px solid rgba(0,255,255,0.1); padding-bottom: 8px; }
        .card-avatar { font-size: 20px; }
        .card-id { color: var(--cyan); font-weight: bold; font-size: 14px; }
        .card-msg { font-size: 15px; line-height: 1.5; color: #fff; margin-bottom: 12px; }

        .card-actions { display: flex; gap: 20px; }
        .action-btn { background: none; border: none; color: #aaa; font-size: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .action-btn:hover { color: var(--cyan); }

        /* HILOS DE RESPUESTA */
        .replies-box { margin-top: 12px; padding-left: 15px; border-left: 1px dashed var(--pink); display: flex; flex-direction: column; gap: 8px; }
        .reply-card { font-size: 13px; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 6px; color: #ddd; }
        .reply-card b { color: var(--cyan); }

        .reply-form { display: none; margin-top: 12px; gap: 8px; }
        .reply-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: white; padding: 10px; border-radius: 8px; outline: none; font-size: 14px; }

        /* --- CONSOLA DE ENTRADA (SEGURIDAD) --- */
        .input-console {
            background: #000; border-top: 2px solid var(--cyan);
            padding: 12px 12px calc(25px + env(safe-area-inset-bottom));
            z-index: 1000; flex-shrink: 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }

        .avatar-bar { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #1a1a1a; }
        .av-opt { font-size: 28px; opacity: 0.3; cursor: pointer; transition: 0.2s; }
        .av-opt.active { opacity: 1; transform: scale(1.15); filter: drop-shadow(0 0 8px var(--cyan)); }

        .input-row { display: flex; gap: 10px; align-items: center; }
        .field-group { flex: 1; background: #05050a; border: 1px solid #222; border-radius: 12px; padding: 10px; border-left: 3px solid var(--pink); }
        #pilot-id { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 12px; width: 100%; margin-bottom: 4px; outline: none; border-bottom: 1px solid #111; }
        #post-text { background: none; border: none; color: #fff; font-size: 14px; width: 100%; outline: none; }
        
        .send-btn { 
            width: 55px; height: 55px; border-radius: 15px; border: none; 
            background: linear-gradient(135deg, var(--cyan), #00aaff); color: #000; 
            font-size: 24px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="visual-universe">
        <div class="planet saturn"><div class="saturn-rings"></div></div>
        <div class="planet mars"></div>
        <div class="planet neptune"></div>
        
        <svg class="rare-ship" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 10 L70 40 L50 70 L30 40 Z" fill="%2300ffff" opacity="0.8"/>
            <circle cx="50" cy="40" r="8" fill="%23fff" opacity="0.9"/>
            <path d="M50 70 L60 90 L50 85 L40 90 Z" fill="%23ff00ff"/>
            <rect x="20" y="35" width="10" height="10" rx="2" fill="%2300ffff"/>
            <rect x="70" y="35" width="10" height="10" rx="2" fill="%2300ffff"/>
        </svg>
    </div>

    <header class="header">
        <h1>NEURO-LUIYI DEEP SPACE</h1>
        <img src="NeuroLuis.gif" class="pfp-head" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="main-feed">
        <div id="posts-container"></div>
    </main>

    <footer class="input-console">
        <div id="avatar-list" class="avatar-bar"></div>
        <div class="input-row">
            <div class="field-group">
                <input id="pilot-id" placeholder="ID PILOTO (REQUERIDO)..." maxlength="15">
                <input id="post-text" placeholder="TRANSMITIR AL ESPACIO PROFUNDO...">
            </div>
            <button class="send-btn" onclick="publishPost()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        // --- CONFIGURACIÓN FIREBASE (ESTABLE) ---
        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GESTIÓN DE AVATARES ---
        const avs = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🪐'];
        let selectedAvatar = null;
        const avBar = document.getElementById('avatar-list');
        
        avs.forEach(av => {
            const span = document.createElement('span'); span.className = 'av-opt'; span.innerText = av;
            span.onclick = () => { document.querySelectorAll('.av-opt').forEach(el => el.classList.remove('active')); span.classList.add('active'); selectedAvatar = av; };
            avBar.appendChild(span);
        });

        // --- SEGURIDAD Y VALIDACIÓN ---
        const getIdentity = (idField) => {
            const id = document.getElementById(idField).value.trim();
            if (!selectedAvatar || !id) { alert("⚠️ SISTEMA: Selecciona Avatar e ID de Piloto."); return null; }
            return { id, avatar: selectedAvatar };
        };

        // --- FUNCIONES DE ENVÍO (FIREBASE) ---
        window.publishPost = () => {
            const user = getIdentity('pilot-id'); const text = document.getElementById('post-text').value.trim();
            if (!user || !text) return;
            push(ref(db, "posts"), { name: user.id, avatar: user.avatar, msg: text, likes: 0, time: Date.now() });
            document.getElementById('post-text').value = "";
        };

        // --- RENDERIZADO Y ESCUCHA (onChildAdded) ---
        onChildAdded(ref(db, "posts"), snap => {
            const data = snap.val(); const key = snap.key;
            renderCard(key, data);
        });

        function renderCard(id, data) {
            const container = document.getElementById('posts-container');
            const card = document.createElement('div'); card.className = 'post-card';
            card.innerHTML = `
                <div class="card-user-line"><span class="card-avatar">${data.avatar}</span><span class="card-id">@${data.name}</span></div>
                <div class="card-msg">${data.msg}</div>
                <div class="card-actions">
                    <button class="action-btn" onclick="like('${id}')">🔋 <span id="l-${id}">${data.likes || 0}</span></button>
                    <button class="action-btn" onclick="toggleReply('${id}')">💬 COMENTAR</button>
                </div>
                <div id="replies-${id}" class="replies-box"></div>
                <div id="form-${id}" class="reply-form">
                    <input id="in-${id}" placeholder="Responder...">
                    <button onclick="sendReply('${id}')" style="background:var(--cyan); border:none; padding:8px 12px; border-radius:8px; font-weight:bold; color:%23000;">OK</button>
                </div>
            `;
            container.prepend(card);

            // Escuchar respuestas de este post específico
            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const rDiv = document.createElement('div'); rDiv.className = 'reply-card';
                rDiv.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`replies-${id}`).appendChild(rDiv);
            });
        }

        // --- FUNCIONES INTERACTIVAS ---
        window.like = (key) => runTransaction(ref(db, `posts/${key}/likes`), c => (c || 0) + 1);
        window.toggleReply = (key) => { const f = document.getElementById(`form-${key}`); f.style.display = f.style.display === 'flex' ? 'none' : 'flex'; };
        
        window.sendReply = (key) => {
            const user = getIdentity('pilot-id'); const input = document.getElementById(`in-${key}`);
            if(!user || !input.value.trim()) return;
            push(ref(db, `posts/${key}/replies`), { name: user.id, avatar: user.avatar, msg: input.value.trim() });
            input.value = ""; document.getElementById(`form-${key}`).style.display = 'none';
        };
    </script>
</body>
</html>
