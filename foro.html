<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🚀 FORO NASA: NEURO-LUIYI ELITE</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --space-dark: #010105;
            --glass: rgba(10, 15, 30, 0.85);
        }

        /* --- RECEPTÁCULO DEL UNIVERSO --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--space-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column;
            color: white;
        }

        /* --- MOTOR GRÁFICO NASA --- */
        #deep-space {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #0a0a20 0%, #000 100%);
            overflow: hidden;
        }

        .nebula {
            position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.08) 0%, transparent 40%);
            filter: blur(60px);
            animation: nebulaDrift 30s ease-in-out infinite alternate;
        }

        /* Saturno Realista */
        .saturn-container {
            position: absolute; top: 15%; right: 15%; transform: rotate(-15deg);
        }
        .saturn-planet {
            width: 60px; height: 60px; background: radial-gradient(circle at 30% 30%, #f9e2b0, #a17f4a);
            border-radius: 50%; position: relative; z-index: 2;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.6), 0 0 20px rgba(249, 226, 176, 0.2);
        }
        .saturn-rings {
            position: absolute; width: 140px; height: 40px;
            border: 10px solid rgba(225, 180, 107, 0.4);
            border-radius: 50%; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotateX(75deg);
            z-index: 1; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Luna con Cráteres */
        .moon {
            position: absolute; bottom: 10%; left: 10%; width: 100px; height: 100px;
            background: radial-gradient(circle at 70% 30%, #ddd, #444);
            border-radius: 50%; opacity: 0.6;
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.8), 0 0 30px rgba(255,255,255,0.1);
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }

        @keyframes nebulaDrift { from { transform: rotate(0deg) scale(1); } to { transform: rotate(5deg) scale(1.1); } }
        @keyframes twinkle { from { opacity: 0.2; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

        /* --- INTERFAZ DE USUARIO --- */
        .header {
            height: 75px; background: rgba(0, 0, 10, 0.85); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; z-index: 100; flex-shrink: 0;
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.2);
        }
        .header h1 { font-size: 18px; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); letter-spacing: 3px; font-weight: 800; }
        .pfp { width: 50px; height: 50px; border: 2px solid var(--cyan); border-radius: 12px; object-fit: cover; }

        #main-feed { flex: 1; overflow-y: auto; padding: 20px 15px; -webkit-overflow-scrolling: touch; }
        #posts-container { max-width: 600px; margin: 0 auto; }

        .card {
            background: var(--glass); border-left: 5px solid var(--cyan);
            border-radius: 0 15px 15px 0; padding: 20px; margin-bottom: 25px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; border-bottom: 1px solid rgba(0,255,255,0.1); padding-bottom: 10px; }
        .user-id { color: var(--cyan); font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        .content { font-size: 16px; line-height: 1.6; color: #eee; margin-bottom: 15px; }

        .meta { display: flex; gap: 25px; }
        .meta-btn { background: none; border: none; color: #999; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .meta-btn:hover { color: var(--cyan); }

        /* --- RESPUESTAS --- */
        .replies-box { margin-top: 15px; padding-left: 20px; border-left: 1px dashed var(--pink); display: flex; flex-direction: column; gap: 10px; }
        .reply-item { font-size: 14px; background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 8px; }
        .reply-input-area { display: none; margin-top: 15px; gap: 10px; }
        .reply-input-area input { flex: 1; background: #000; border: 1px solid var(--cyan); color: white; padding: 10px; border-radius: 8px; outline: none; }

        /* --- CONSOLA DE COMANDO (SEGURIDAD) --- */
        .console-panel {
            background: #00000a; border-top: 3px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom));
            z-index: 1000; box-shadow: 0 -10px 40px rgba(0,0,0,0.9);
        }

        .avatar-bar { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid #1a1a1a; }
        .av-opt { font-size: 32px; opacity: 0.2; cursor: pointer; transition: 0.3s; filter: grayscale(1); }
        .av-opt.selected { opacity: 1; filter: grayscale(0) drop-shadow(0 0 10px var(--cyan)); transform: scale(1.2); }

        .input-group { display: flex; gap: 12px; align-items: center; }
        .text-fields { flex: 1; background: #080810; border: 1px solid #222; border-radius: 15px; padding: 12px; border-left: 4px solid var(--pink); }
        #pilot-id { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 13px; width: 100%; margin-bottom: 6px; outline: none; border-bottom: 1px solid #111; }
        #post-text { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; }
        
        .send-trigger { 
            width: 60px; height: 60px; border-radius: 20px; border: none; 
            background: linear-gradient(135deg, var(--cyan), #0088ff); color: #000; 
            font-size: 28px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="deep-space">
        <div class="nebula"></div>
        <div class="saturn-container">
            <div class="saturn-rings"></div>
            <div class="saturn-planet"></div>
        </div>
        <div class="moon"></div>
    </div>

    <header class="header">
        <h1>NEURO LUIYI LAB</h1>
        <img src="NeuroLuis.gif" class="pfp" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="main-feed">
        <div id="posts-container"></div>
    </main>

    <footer class="console-panel">
        <div id="av-picker" class="avatar-bar"></div>
        <div class="input-group">
            <div class="text-fields">
                <input id="pilot-id" placeholder="ID DE PILOTO (OBLIGATORIO)..." maxlength="15">
                <input id="post-text" placeholder="INICIAR TRANSMISIÓN AL FORO...">
            </div>
            <button class="send-trigger" onclick="publishPost()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        // --- CONFIGURACIÓN FIREBASE ESTABLE ---
        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GENERADOR DE ESTRELLAS DINÁMICAS ---
        const space = document.getElementById('deep-space');
        for(let i=0; i<120; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 3;
            s.style.width = s.style.height = size + 'px';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            space.appendChild(s);
        }

        // --- GESTIÓN DE AVATARES ---
        const avatars = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐','💎'];
        let activeAvatar = null;
        const picker = document.getElementById('av-picker');
        
        avatars.forEach(av => {
            const span = document.createElement('span');
            span.className = 'av-opt';
            span.innerText = av;
            span.onclick = () => {
                document.querySelectorAll('.av-opt').forEach(el => el.classList.remove('selected'));
                span.classList.add('selected');
                activeAvatar = av;
            };
            picker.appendChild(span);
        });

        // --- SEGURIDAD Y VALIDACIÓN ---
        const validateIdentity = (nameId) => {
            const name = document.getElementById(nameId).value.trim();
            if (!activeAvatar) { alert("⚠️ PROTOCOLO NASA: Selecciona un Avatar."); return null; }
            if (!name) { alert("⚠️ PROTOCOLO NASA: Introduce tu ID de Piloto."); return null; }
            return { name, avatar: activeAvatar };
        };

        // --- FUNCIONES DE FIREBASE ---
        window.publishPost = () => {
            const user = validateIdentity('pilot-id');
            const text = document.getElementById('post-text').value.trim();
            if (!user || !text) return;

            push(ref(db, "posts"), {
                name: user.name,
                avatar: user.avatar,
                msg: text,
                likes: 0,
                timestamp: Date.now()
            });
            document.getElementById('post-text').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const data = snap.val();
            const key = snap.key;
            renderPost(key, data);
        });

        function renderPost(id, data) {
            const container = document.getElementById('posts-container');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="user-info">
                    <span style="font-size:24px">${data.avatar}</span>
                    <span class="user-id">@${data.name}</span>
                </div>
                <div class="content">${data.msg}</div>
                <div class="meta">
                    <button class="meta-btn" onclick="addLike('${id}')">🔋 <span id="l-${id}">${data.likes || 0}</span></button>
                    <button class="meta-btn" onclick="showReplyInput('${id}')">💬 RESPONDER</button>
                </div>
                <div id="replies-${id}" class="replies-box"></div>
                <div id="input-box-${id}" class="reply-input-area">
                    <input id="reply-field-${id}" placeholder="Escribe una respuesta oficial...">
                    <button class="send-trigger" style="width:40px; height:40px; font-size:18px;" onclick="sendReply('${id}')">OK</button>
                </div>
            `;
            container.prepend(card);

            // Escuchar respuestas de este post
            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const rData = rSnap.val();
                const rDiv = document.createElement('div');
                rDiv.className = 'reply-item';
                rDiv.innerHTML = `<b style="color:var(--cyan)">${rData.avatar} ${rData.name}:</b> ${rData.msg}`;
                document.getElementById(`replies-${id}`).appendChild(rDiv);
            });
        }

        window.addLike = (id) => {
            runTransaction(ref(db, `posts/${id}/likes`), (current) => (current || 0) + 1);
        };

        window.showReplyInput = (id) => {
            const box = document.getElementById(`input-box-${id}`);
            box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        };

        window.sendReply = (id) => {
            const user = validateIdentity('pilot-id');
            const input = document.getElementById(`reply-field-${id}`);
            if (!user || !input.value.trim()) return;

            push(ref(db, `posts/${id}/replies`), {
                name: user.name,
                avatar: user.avatar,
                msg: input.value.trim()
            });
            input.value = "";
            document.getElementById(`input-box-${id}`).style.display = 'none';
        };

        // Mantener el contador de likes actualizado
        onChildAdded(ref(db, "posts"), snap => {
            const id = snap.key;
            const likeRef = ref(db, `posts/${id}/likes`);
            onChildAdded(ref(db, `posts/${id}`), () => { /* trigger */ }); // listener simple
        });
    </script>
</body>
</html>
