<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🪐 NEURO-LUIYI: NASA SATURN EDITION</title>
    <style>
        :root {
            --cyan: #00ffff; --pink: #ff00ff; --dark: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--dark);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- FONDO NASA REAL (SATURNO Y PLANETAS) --- */
        #nasa-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #000; overflow: hidden;
        }
        
        /* Nebulosa de Fondo */
        #nasa-background::before {
            content: ""; position: absolute; inset: 0;
            background: 
                radial-gradient(circle at 10% 10%, rgba(0, 255, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(157, 0, 255, 0.1) 0%, transparent 40%);
            filter: blur(40px);
        }

        /* Saturno Ilustrado */
        .saturn {
            position: absolute; top: 15%; right: 10%; width: 120px; height: 120px;
            background: radial-gradient(circle at 30% 30%, #f9e2b0 0%, #e1b46b 60%, #a17f4a 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(249, 226, 176, 0.3);
            animation: float 15s ease-in-out infinite alternate;
        }
        /* Anillos de Saturno */
        .saturn::after {
            content: ""; position: absolute; top: 50%; left: 50%;
            width: 220px; height: 50px;
            margin-left: -110px; margin-top: -25px;
            border: 15px solid rgba(225, 180, 107, 0.7);
            border-radius: 50%;
            transform: rotateX(70deg) rotateY(10deg);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Luna Gigante */
        .moon {
            position: absolute; bottom: -50px; left: -50px; width: 200px; height: 200px;
            background: radial-gradient(circle at 70% 30%, #ccc 0%, #999 60%, #666 100%);
            border-radius: 50%; opacity: 0.6;
            box-shadow: inset -20px -20px 30px rgba(0,0,0,0.5), 0 0 40px rgba(200,200,200,0.2);
        }

        /* Planeta Distante */
        .planet-far {
            position: absolute; top: 60%; left: 15%; width: 40px; height: 40px;
            background: radial-gradient(circle at 30% 30%, #4b6cb7 0%, #182848 100%);
            border-radius: 50%; opacity: 0.8;
            box-shadow: 0 0 15px rgba(75, 108, 183, 0.3);
        }

        /* Estrellas NASA */
        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: blink var(--d) infinite alternate;
        }
        @keyframes blink { from { opacity: 0.2; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(15px); } }

        /* --- INTERFAZ ELITE --- */
        .header {
            height: 75px; background: rgba(0, 0, 10, 0.85); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; z-index: 100; flex-shrink: 0;
            box-shadow: 0 0 15px var(--cyan);
        }
        .logo h1 { font-size: 18px; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); letter-spacing: 2px; }
        .profile-gif { width: 50px; height: 50px; border: 2px solid var(--cyan); border-radius: 12px; object-fit: cover; }

        #stream { flex: 1; overflow-y: auto; padding: 20px 15px; -webkit-overflow-scrolling: touch; }
        .post {
            max-width: 550px; margin: 0 auto 20px; background: rgba(10, 15, 30, 0.8);
            border-left: 5px solid var(--cyan); border-radius: 0 15px 15px 0; padding: 18px; 
            box-shadow: 10px 10px 30px rgba(0,0,0,0.9); backdrop-filter: blur(4px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .user-row { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(0,255,255,0.2); padding-bottom: 10px; margin-bottom: 12px; }
        .id-tag { color: var(--cyan); font-weight: bold; font-size: 14px; text-transform: uppercase; }
        
        .msg-text { font-size: 16px; color: #fff; line-height: 1.6; padding-bottom: 12px; border-bottom: 1px solid rgba(255,0,255,0.15); }

        .actions { display: flex; gap: 20px; margin-top: 12px; }
        .btn-act { background: none; border: none; color: #888; font-size: 12px; cursor: pointer; font-weight: bold; }

        /* --- CONSOLA CONTROL (SEGURIDAD TOTAL) --- */
        .console {
            background: #05050a; border-top: 2px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom)); z-index: 2000; flex-shrink: 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.9);
        }
        .av-selector { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid #1a1a1a; }
        .av-icon { font-size: 30px; opacity: 0.2; cursor: pointer; transition: 0.3s; }
        .av-icon.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 10px var(--cyan)); }

        .input-box { display: flex; gap: 12px; align-items: center; }
        .field-wrap { flex: 1; background: #000; border: 1px solid #222; border-radius: 15px; padding: 10px; border-left: 3px solid var(--pink); }
        #p-name { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 13px; width: 100%; margin-bottom: 5px; outline: none; }
        #m-text { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; }
        
        .btn-send { 
            width: 55px; height: 55px; border-radius: 18px; border: none; 
            background: var(--cyan); color: #000; font-size: 24px; cursor: pointer;
            box-shadow: 0 0 15px var(--cyan);
        }

        .rep-form { display: none; margin-top: 12px; gap: 10px; }
        .rep-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="nasa-background">
        <div class="saturn"></div>
        <div class="moon"></div>
        <div class="planet-far"></div>
    </div>

    <header class="header">
        <div class="logo"><h1>NEURO LUIYI</h1></div>
        <img src="NeuroLuis.gif" class="profile-gif" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="stream"><div id="container"></div></main>

    <footer class="console">
        <div id="av-list" class="av-selector"></div>
        <div class="input-box">
            <div class="field-wrap">
                <input id="p-name" placeholder="REGISTRA TU ID..." maxlength="12">
                <input id="m-text" placeholder="TU MENSAJE TRANSMISIÓN...">
            </div>
            <button class="btn-send" onclick="enviar()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- MOTOR DE ESTRELLAS NASA ---
        const voidBox = document.getElementById('nasa-background');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div'); s.className = 'star';
            const size = Math.random() * 3 + 'px';
            s.style.width = s.style.height = size;
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
            s.style.opacity = Math.random();
            voidBox.appendChild(s);
        }

        // --- SELECTOR CONTROL ---
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-icon'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-list').appendChild(el);
        });

        // --- VALIDACIÓN DE SEGURIDAD ELITE (OBLIGATORIA) ---
        const validar = (idIn) => {
            const id = document.getElementById(idIn).value.trim();
            if (!selAv || !id) { alert("SISTEMA NASA: Selecciona Avatar e ID de Piloto en la consola inferior."); return false; }
            return { id, avatar: selAv };
        };

        window.enviar = () => {
            const u = validar('p-name'); const m = document.getElementById('m-text').value.trim();
            if(!u || !m) return;
            push(ref(db, "posts"), { name: u.id, avatar: u.avatar, msg: m, likes: 0 });
            document.getElementById('m-text').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const id = snap.key;
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div class="user-row"><span style="font-size:22px;">${d.avatar}</span> <span class="id-tag">@${d.name}</span></div>
                <div class="msg-text">${d.msg}</div>
                <div class="actions">
                    <button class="btn-act" onclick="like('${id}')">🔋 <span id="l-${id}">${d.likes || 0}</span></button>
                    <button class="btn-act" onclick="toggleR('${id}')">💬 RESPONDER</button>
                </div>
                <div id="thread-${id}" style="margin-top:10px; padding-left:15px; border-left:1px dashed var(--cyan); font-size:14px; color:#ccc;"></div>
                <div id="box-${id}" class="rep-form">
                    <input id="in-${id}" placeholder="Respuesta de Piloto Identificado...">
                    <button onclick="sendR('${id}')" style="background:var(--cyan); border:none; padding:10px 15px; border-radius:8px; font-weight:bold; color:#000;">ENVIAR</button>
                </div>
            `;
            document.getElementById('container').prepend(div);
            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.style.marginBottom = '6px';
                node.innerHTML = `<b style="color:var(--cyan)">${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleR = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        
        window.sendR = (id) => {
            const u = validar('p-name'); const i = document.getElementById(`in-${id}`);
            if(!u || !i.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name: u.id, avatar: u.avatar, msg: i.value.trim() });
            i.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
