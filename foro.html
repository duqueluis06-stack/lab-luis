<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🛰️ NEURO-LUIYI LAB: WARP PHASE</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --purple: #9d00ff;
            --dark: #010103;
            --glass: rgba(10, 15, 30, 0.75);
            --neon-border: 1px solid rgba(0, 255, 255, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: #fff;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- FONDO ESTRELLADO CINEMÁTICO --- */
        #space-core { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at center, #0a1128 0%, #000 100%); }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; animation: warpSpeed linear infinite; }
        @keyframes warpSpeed {
            from { transform: translateY(-100vh) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            to { transform: translateY(100vh) scale(1.2); opacity: 0; }
        }

        /* --- CABECERA FUTURISTA --- */
        .nav-station {
            height: 80px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000; box-shadow: 0 5px 20px rgba(0, 255, 255, 0.2);
        }
        .exit-link { text-decoration: none; color: var(--pink); border: 1px solid var(--pink); padding: 6px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }

        /* --- FEED DE DATOS --- */
        #data-stream { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 180px; scroll-behavior: smooth; }
        .post-frame {
            max-width: 650px; margin: 0 auto 30px auto; background: var(--glass);
            border: var(--neon-border); border-left: 4px solid var(--cyan); border-radius: 0 15px 15px 0;
            padding: 20px; backdrop-filter: blur(15px); position: relative; transition: 0.4s;
        }
        .post-frame.ai-frame { border-left: 4px solid var(--pink); border-right: 1px solid var(--pink); }

        .user-tag { font-size: 0.85rem; font-weight: 800; color: var(--cyan); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .ai-tag { color: var(--pink); text-shadow: 0 0 8px var(--pink); }
        .message-body { font-size: 1rem; line-height: 1.6; color: #e0e0ff; margin-bottom: 15px; }

        /* HILOS DE RESPUESTA (AQUÍ ESTÁ EL TRUCO) */
        .thread-container { margin-top: 15px; padding-left: 15px; border-left: 1px dashed rgba(255,255,255,0.2); }
        .reply-node { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.05); }

        /* --- CONTROL DE MANDOS (ABAJO) --- */
        .command-center {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95);
            border-top: 2px solid var(--cyan); padding: 20px; z-index: 2000;
        }
        .av-icon { font-size: 28px; cursor: pointer; padding: 10px; transition: 0.3s; opacity: 0.4; }
        .av-icon.active { opacity: 1; transform: scale(1.3); filter: drop-shadow(0 0 5px var(--cyan)); }

        .input-grid { display: flex; gap: 15px; align-items: flex-end; }
        #main-input { flex: 1; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 12px; padding: 15px; font-size: 1rem; resize: none; }
        .warp-btn { width: 60px; height: 60px; border-radius: 15px; border: none; background: linear-gradient(135deg, var(--cyan), var(--purple)); color: #fff; font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); }
    </style>
</head>
<body>

    <div id="space-core"></div>

    <header class="nav-station">
        <a href="index.html" class="exit-link">Abort Mission</a>
        <div style="text-align:center">
            <h1 style="margin:0; font-size:0.9rem; letter-spacing:4px; color:var(--cyan); text-shadow:0 0 10px var(--cyan)">NEURO-LUIYI</h1>
            <span style="font-size:0.6rem; color:var(--pink)">LABORATORY PHASE 4.0</span>
        </div>
        <img src="NeuroLuis.gif" width="50" height="50" style="border:2px solid var(--cyan); border-radius:12px;" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="data-stream">
        <div id="flow-container" style="max-width:650px; margin:auto;"></div>
    </main>

    <footer class="command-center">
        <div id="av-strip" style="display:flex; gap:15px; overflow-x:auto; padding-bottom:15px;"></div>
        <div class="input-grid">
            <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
                <input id="pilot-name" placeholder="PILOT_ID" maxlength="12" style="background:transparent; border:none; border-bottom:1px solid #444; color:var(--cyan); font-weight:bold; font-size:0.8rem;">
                <textarea id="main-input" placeholder="Enter transmission..." rows="1"></textarea>
            </div>
            <button class="warp-btn" onclick="transmit()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- ESTRELLAS ---
        const space = document.getElementById('space-core');
        for(let i=0; i<100; i++) {
            const s = document.createElement('div'); s.className = 'star';
            const size = Math.random()*3+'px'; s.style.width = size; s.style.height = size;
            s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
            s.style.animationDuration = (Math.random()*3+2)+'s'; space.appendChild(s);
        }

        // --- AVATARES ---
        const icons = ['👽','🤖','👨‍🚀','👾','🧠','⚡','🚀','🛸','🧬','🛰️'];
        let activeAv = icons[0];
        icons.forEach(icon => {
            const el = document.createElement('span'); el.className = 'av-icon' + (icon===activeAv?' active':''); el.innerText = icon;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(i=>i.classList.remove('active')); el.classList.add('active'); activeAv = icon; };
            document.getElementById('av-strip').appendChild(el);
        });

        // --- IA ALQUIMISTA (RESPUESTA EN HILO) ---
        const aiBrain = (msg, parentId) => {
            const t = msg.toLowerCase();
            let res = "";
            if(t.includes("hola")) res = "¡Enlace establecido! Detecto una mente curiosa en el sistema.";
            else if(t.includes("luis") || t.includes("luiyi")) res = "El Ingeniero Luis ha optimizado mis núcleos. ¿Todo en orden?";
            else if(t.includes("futuro")) res = "El futuro está hecho de líneas de código y polvo de estrellas.";
            
            if(res) {
                setTimeout(() => {
                    // SE PUBLICA EN EL HILO DEL MENSAJE (replies)
                    push(ref(db, `posts/${parentId}/replies`), { name: "NEURO-BOT", avatar: "🤖", msg: res, isAI: true });
                }, 1500);
            }
        };

        window.transmit = () => {
            const n = document.getElementById('pilot-name').value.trim();
            const m = document.getElementById('main-input').value.trim();
            if(!n || !m) return;
            push(ref(db, "posts"), { name: n, avatar: activeAv, msg: m, likes: 0, timestamp: Date.now() });
            document.getElementById('main-input').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const data = snap.val(); const id = snap.key;
            const frame = document.createElement('div'); frame.className = 'post-frame';
            frame.innerHTML = `
                <div class="user-tag">${data.avatar} @${data.name}</div>
                <div class="message-body">${data.msg}</div>
                <div style="display:flex; gap:20px; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px;">
                    <button class="action-btn" style="background:none; border:none; color:#888; cursor:pointer;" onclick="likePost('${id}')">🔋 <span id="l-${id}">${data.likes || 0}</span></button>
                    <button class="action-btn" style="background:none; border:none; color:#888; cursor:pointer;" onclick="toggleReply('${id}')">💬 RESPONDER</button>
                </div>
                <div class="thread-container" id="thread-${id}"></div>
                <div id="box-${id}" style="display:none; margin-top:10px; gap:5px;">
                    <input id="in-${id}" placeholder="Type encrypted reply..." style="flex:1; background:#000; border:1px solid #333; color:#fff; padding:8px; border-radius:8px;">
                    <button onclick="sendReply('${id}')" style="background:var(--cyan); border:none; border-radius:8px; padding:0 10px;">OK</button>
                </div>
            `;
            document.getElementById('flow-container').prepend(frame);

            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.className = 'reply-node';
                node.innerHTML = `<b style="color:var(--cyan)">${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });

            if(!data.isAI) aiBrain(data.msg, id);
        });

        window.likePost = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleReply = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display === 'flex' ? 'none' : 'flex'; };
        window.sendReply = (id) => {
            const input = document.getElementById(`in-${id}`); const name = document.getElementById('pilot-name').value.trim() || "PILOT";
            if(!input.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name, avatar: activeAv, msg: input.value.trim() });
            input.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
