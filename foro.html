<style>
body{
    margin:0;
    font-family: Arial;
    color:white;
    background:url("fondo-foro.jpg") no-repeat center center fixed;
    background-size:cover;
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:-1;
}
.header{
    text-align:center;
    padding:20px;
    font-size:30px;
    font-weight:bold;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff, 0 0 20px #ff00ff;
}
.avatar{
    position:fixed;
    top:10px;
    right:10px;
    width:120px;
    height:120px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid #00ffff;
    box-shadow:0 0 20px #00ffff;
}
.avatar img{ width:100%; height:100%; }

.box{ max-width:600px; margin:auto; padding:20px; }

input, textarea{
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00ffff,#ff00ff);
    font-weight:bold;
    cursor:pointer;
}

#feed{ max-width:600px; margin:auto; }

.post{
    background:rgba(255,255,255,0.05);
    margin:10px auto;
    padding:15px;
    border-radius:15px;
}

.user{ font-weight:bold; color:#00ffff; }

.like{ margin-top:10px; cursor:pointer; color:#ff4d6d; }

.replyBtn{ margin-top:10px; cursor:pointer; color:#00ffff; }

.replyBox{ display:none; margin-top:10px; }

.reply{
    margin-left:20px;
    margin-top:8px;
    padding:8px;
    border-left:2px solid #00ffff;
    background:rgba(255,255,255,0.03);
}
</style>
</head>

<body>

<div class="header">☎️ NeuroLuiyi Forum</div>

<div class="avatar">
    <img src="NeuroLuis.gif">
</div>

<div class="box">
    <input id="name" placeholder="Tu nombre">
    <textarea id="msg" placeholder="Escribe tu mensaje..."></textarea>
    <button onclick="send()">Publicar</button>
</div>

<div id="feed"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
  databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = firebase.database();
const feed = document.getElementById("feed");

let avatar = "🐸";

function setAvatar(a){
    avatar = a;
}

function send(){
    let name = document.getElementById("name").value.trim();
    let msg = document.getElementById("msg").value.trim();

    if(!name || !msg) return;

    db.ref("posts").push({
        name,
        avatar,
        msg,
        likes:0,
        time:Date.now()
    });

    document.getElementById("msg").value="";
}

db.ref("posts").on("child_added", snap=>{
    let p = snap.val();
    let id = snap.key;

    let div = document.createElement("div");
    div.className="post";

    // ✅ FIX CRÍTICO AQUÍ
    div.innerHTML = `
        <div class="user">${p.avatar||"🐸"} ${p.name}</div>
        <div class="msg"></div>

        <div class="like" onclick="like('${id}', this)">
            ❤️ Like <span>${p.likes||0}</span>
        </div>

        <div class="replyBtn" onclick="toggleReply('${id}')">
            💬 Responder
        </div>

        <div class="replyBox" id="box-${id}">
            <input id="input-${id}" placeholder="Responder y ENTER">
        </div>

        <div id="replies-${id}"></div>
    `;

    div.querySelector(".msg").innerText = p.msg;
    feed.prepend(div);
});

function like(id, el){
    db.ref("posts/"+id+"/likes").transaction(v => (v||0)+1);
    let span = el.querySelector("span");
    span.innerText = parseInt(span.innerText)+1;
}

function toggleReply(id){
    let box = document.getElementById("box-"+id);
    box.style.display = box.style.display==="block"?"none":"block";
}

</script>

</body>
</html>
