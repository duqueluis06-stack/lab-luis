<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeuroLuis Forum Pro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#05050a;
    color:white;
}

/* 🔥 TITULO NEON */
.title{
    text-align:center;
    font-size:32px;
    margin-top:20px;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff,0 0 20px #00ffff;
}

/* 🖼️ GIF GRANDE */
.gif{
    display:block;
    margin:10px auto;
    width:220px;
    border-radius:15px;
    box-shadow:0 0 20px #00ffff;
}

/* 💬 CONTADOR */
.users{
    text-align:center;
    margin:10px;
    color:#aaa;
}

/* 📦 POSTS */
#posts{
    width:60%;
    margin:auto;
}

.post{
    background:rgba(255,255,255,0.05);
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,255,255,0.2);
}

.post b{
    color:#00ffff;
}

/* ✍️ INPUT */
textarea{
    width:60%;
    display:block;
    margin:10px auto;
    height:80px;
    border-radius:10px;
    border:none;
    padding:10px;
    outline:none;
}

/* 🔘 BOTÓN */
button{
    display:block;
    margin:auto;
    padding:10px 20px;
    background:#00ffff;
    border:none;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 10px #00ffff;
}

/* 🏠 INICIO */
.homeBtn{
    position:fixed;
    top:15px;
    left:15px;
    padding:10px 14px;
    background:rgba(0,255,255,0.15);
    color:#00ffff;
    text-decoration:none;
    border-radius:10px;
    box-shadow:0 0 10px #00ffff;
    z-index:999;
}

/* ⚙️ MENU LATERAL */
.sideMenu{
    position:fixed;
    right:10px;
    top:40%;
    display:flex;
    flex-direction:column;
    gap:12px;
    z-index:999;
}

.sideMenu a{
    width:45px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    color:white;
    text-decoration:none;
    font-size:18px;
    box-shadow:0 0 10px rgba(0,255,255,0.4);
    animation:spin 8s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- 🏠 HOME -->
<a class="homeBtn" href="index.html">🏠 Inicio</a>

<!-- ⚙️ MENU -->
<div class="sideMenu">
<a href="recomendaciones.html">⚡</a>
<a href="pioneros.html">🧠</a>
<a href="kdp.html">📚</a>
</div>

<h1 class="title">NeuroLuis Forum Pro</h1>

<img class="gif" src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif">

<!-- 💬 CONTADOR REAL -->
<div class="users">
💬 Mensajes publicados: <span id="postCount">0</span>
</div>

<!-- ✍️ INPUT -->
<textarea id="msg" placeholder="Escribe tu mensaje..."></textarea>
<button onclick="send()">Publicar</button>

<!-- 📦 POSTS -->
<div id="posts"></div>

<script>
/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_APP.firebaseapp.com",
  databaseURL: "https://TU_DB.firebaseio.com",
  projectId: "TU_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🚀 EVITAR DOBLE ENTER */
let sending = false;

/* 📤 ENVIAR POST */
function send(){
    if(sending) return;
    sending = true;

    let text = document.getElementById("msg").value;
    if(text.trim() === ""){
        sending = false;
        return;
    }

    db.ref("posts").push({
        name:"Luis",
        text:text,
        time:Date.now()
    });

    document.getElementById("msg").value = "";

    setTimeout(()=>sending=false, 500);
}

/* ⌨️ ENTER FIX */
document.getElementById("msg").addEventListener("keydown", function(e){
    if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        send();
    }
});

/* 📡 LEER POSTS */
db.ref("posts").on("value", snap=>{
    let html = "";
    let count = 0;

    snap.forEach(child=>{
        count++;
        let data = child.val();

        html += `
        <div class="post">
            <b>${data.name}</b><br>
            ${data.text}
        </div>`;
    });

    document.getElementById("posts").innerHTML = html;
    document.getElementById("postCount").innerText = count;
});
</script>

</body>
</html>
