<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🪐 NASA ELITE: FIX FINAL</title>
    <style>
        :root { --cyan: #00ffff; --pink: #ff00ff; --black: #000000; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--black);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- FONDO NASA MATEMÁTICO (No puede fallar) --- */
        #space-canvas {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #050510 0%, #000 100%);
        }

        /* Estrellas generadas por patrón repetitivo */
        .star-field {
            position: absolute; inset: -100%;
            background-image: 
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><circle cx="20" cy="30" r="1" fill="white" opacity="0.8"/><circle cx="150" cy="10" r="1.2" fill="white" opacity="0.6"/><circle cx="80" cy="160" r="1" fill="white"/><circle cx="180" cy="130" r="0.8" fill="white" opacity="0.9"/><circle cx="40" cy="190" r="1.5" fill="white" opacity="0.4"/></svg>');
            background-size: 250px 250px;
            animation: drift 60s linear infinite;
        }

        @keyframes drift {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(5deg) scale(1.2); }
        }

        /* SATURNO BLINDADO (Dibujado con CSS sólido) */
        .saturn-box {
            position: absolute; top: 15%; right: 10%; width: 120px; height: 100px;
            z-index: 5; animation: hover 8s ease-in-out infinite alternate;
        }
        .saturn-planet {
            width: 60px; height: 60px; background: radial-gradient(circle at 30% 30%, #f9e2b0, #a17f4a);
            border-radius: 50%; margin: 20px auto; position: relative; z-index: 10;
            box-shadow: inset -5px -5px 15px #000, 0 0 30px rgba(249, 226, 176, 0.4);
        }
        .saturn-rings {
            position: absolute; top: 45px; left: -15px; width: 150px; height: 35px;
            border: 8px solid rgba(225, 180, 107, 0.5); border-radius: 50%;
            transform: rotateX(75deg); z-index: 1;
        }

        @keyframes hover { from { transform: translateY(0); } to { transform: translateY(15px); } }

        /* --- INTERFAZ --- */
        .header {
            height: 70px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--cyan);
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; z-index: 100; backdrop-filter: blur(10px);
        }
        .header h1 { color: var(--cyan); font-size: 18px; text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }

        #feed { flex: 1; overflow-y: auto; padding: 20px 15px; z-index: 20; }
        .post {
            max-width: 500px; margin: 0 auto 20px; background: rgba(15, 20, 40, 0.9);
            border-left: 5px solid var(--cyan); border-radius: 0 15px 15px 0; padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .u-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border-bottom: 1px solid rgba(0,255,255,0.1); padding-bottom: 5px; }
        .u-id { color: var(--cyan); font-weight: bold; font-size: 14px; }
        .u-msg { color: #fff; font-size: 15px; line-height: 1.4; }

        /* --- CONSOLA DE CONTROL --- */
        .console {
            background: #000; border-top: 2px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom)); z-index: 200;
        }
        .av-row { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #222; }
        .av-btn { font-size: 30px; opacity: 0.3; cursor: pointer; }
        .av-btn.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 10px var(--cyan)); }

        .input-box { display: flex; gap: 10px; align-items: center; }
        .input-fields { flex: 1; background: #08080f; border: 1px solid #333; border-radius: 12px; padding: 10px; border-left: 4px solid var(--pink); }
        #user-id { background: none; border: none; color: var(--pink); font-weight: bold; width: 100%; outline: none; margin-bottom: 5px; font-size: 13px; }
        #user-msg { background: none; border: none; color: #fff; width: 100%; outline: none; font-size: 15px; }
        
        .send-btn { width: 55px; height: 55px; border-radius: 15px; border: none; background: var(--cyan); color: #000; font-size: 24px; cursor: pointer; }

        .replies { margin-top: 10px; padding-left: 15px; border-left: 1px dashed var(--pink); display: flex; flex-direction: column; gap: 5px; font-size: 13px; }
        .reply-form { display: none; margin-top: 10px; gap: 5px; }
        .reply-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="space-canvas">
        <div class="star-field"></div>
        <div class="saturn-box">
            <div class="saturn-rings"></div>
            <div class="saturn-planet"></div>
        </div>
    </div>

    <header class="header">
        <h1>NEURO LUIYI NASA</h1>
        <img src="NeuroLuis.gif" style="width:40px; border-radius:8px; border:1px solid var(--cyan)" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="feed"><div id="post-mount"></div></main>

    <footer class="console">
        <div id="av-list" class="av-row"></div>
        <div class="input-box">
            <div class="input-fields">
                <input id="user-id" placeholder="REGISTRA TU ID..." maxlength="15">
                <input id="user-msg" placeholder="MENSAJE AL ESPACIO...">
            </div>
            <button class="send-btn" onclick="postear()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- AVATARES ---
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-btn'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-btn').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-list').appendChild(el);
        });

        const check = () => {
            const id = document.getElementById('user-id').value.trim();
            if (!selAv || !id) { alert("⚠️ IDENTIFICACIÓN NECESARIA"); return null; }
            return { id, av: selAv };
        };

        window.postear = () => {
            const u = check(); const m = document.getElementById('user-msg').value.trim();
            if(!u || !m) return;
            push(ref(db, "posts"), { name: u.id, avatar: u.av, msg: m, likes: 0 });
            document.getElementById('user-msg').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const key = snap.key;
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div class="u-info"><span>${d.avatar}</span> <span class="u-id">@${d.name}</span></div>
                <div class="u-msg">${d.msg}</div>
                <div style="margin-top:10px; display:flex; gap:20px">
                    <button style="background:none; border:none; color:#888; font-weight:bold;" onclick="like('${key}')">🔋 <span id="l-${key}">${d.likes || 0}</span></button>
                    <button style="background:none; border:none; color:#888; font-weight:bold;" onclick="toggleR('${key}')">💬 COMENTAR</button>
                </div>
                <div id="r-box-${key}" class="replies"></div>
                <div id="f-box-${key}" class="reply-form">
                    <input id="in-${key}" placeholder="Respuesta...">
                    <button onclick="responder('${key}')" style="background:var(--cyan); border:none; padding:5px 10px; border-radius:5px;">OK</button>
                </div>
            `;
            document.getElementById('post-mount').prepend(div);
            onChildAdded(ref(db, `posts/${key}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div');
                node.innerHTML = `<b style="color:var(--cyan)">${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`r-box-${key}`).appendChild(node);
            });
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleR = (id) => { const f = document.getElementById(`f-box-${id}`); f.style.display = f.style.display==='flex'?'none':'flex'; };
        window.responder = (id) => {
            const u = check(); const i = document.getElementById(`in-${id}`);
            if(!u || !i.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name: u.id, avatar: u.av, msg: i.value.trim() });
            i.value = ""; document.getElementById(`f-box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
