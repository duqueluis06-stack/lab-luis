<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🪐 NEURO-LUIYI: NASA ELITE FINAL</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --dark: #000005;
            --glass: rgba(15, 20, 35, 0.92);
        }

        /* --- ARQUITECTURA BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--dark);
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column;
            color: white;
        }

        /* --- UNIVERSO VISUAL --- */
        #space-canvas {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #0a0a25 0%, #000 100%);
        }
        #space-canvas::after {
            content: ""; position: absolute; inset: -100%;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><circle cx="50" cy="50" r="1.2" fill="white" opacity="0.8"/><circle cx="150" cy="120" r="1" fill="white" opacity="0.5"/><circle cx="300" cy="80" r="1.5" fill="white"/><circle cx="220" cy="350" r="1.1" fill="white" opacity="0.7"/><circle cx="80" cy="280" r="1" fill="white" opacity="0.9"/><circle cx="350" cy="220" r="1.3" fill="white"/></svg>');
            background-size: 300px 300px;
            animation: rotateStars 180s linear infinite;
        }
        @keyframes rotateStars { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* PLANETAS Y OBJETOS */
        .obj { position: absolute; border-radius: 50%; z-index: 1; }
        .saturn {
            top: 12%; right: 10%; width: 85px; height: 85px;
            background: radial-gradient(circle at 30% 30%, #f9e2b0, #a17f4a);
            box-shadow: inset -10px -10px 25px #000, 0 0 30px rgba(249, 226, 176, 0.2);
            animation: float 7s ease-in-out infinite alternate;
        }
        .saturn::before {
            content: ""; position: absolute; top: 50%; left: -50%; width: 200%; height: 18px;
            border: 6px solid rgba(225, 180, 107, 0.3); border-radius: 50%;
            transform: translateY(-50%) rotateX(75deg);
        }
        .mars { top: 65%; left: 12%; width: 45px; height: 45px; background: radial-gradient(circle at 30% 30%, #ff5f5f, #7a1a1a); box-shadow: 0 0 15px rgba(255,95,95,0.2); }
        
        .spaceship {
            position: absolute; top: 35%; left: -100px; width: 70px; z-index: 2;
            filter: drop-shadow(0 0 15px var(--cyan));
            animation: moveShip 25s linear infinite;
        }
        @keyframes moveShip { 
            0% { left: -100px; transform: scale(1) rotate(15deg); } 
            100% { left: 120%; transform: scale(1.3) rotate(-15deg); } 
        }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(25px); } }

        /* --- CABECERA --- */
        header {
            height: 75px; background: rgba(0,0,0,0.92); border-bottom: 2px solid var(--cyan);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            backdrop-filter: blur(12px); z-index: 100;
        }
        header h1 { font-size: 19px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }
        
        /* BOTÓN INICIO REAL */
        .home-link {
            background: var(--cyan); color: #000; border: none; padding: 10px 18px;
            border-radius: 10px; font-weight: 800; text-decoration: none;
            font-size: 13px; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 10px rgba(0,255,255,0.3);
        }
        .home-link:hover { background: #fff; box-shadow: 0 0 20px var(--cyan); transform: scale(1.05); }

        /* --- FEED --- */
        #feed { flex: 1; overflow-y: auto; padding: 25px 15px; z-index: 10; }
        .card {
            max-width: 650px; margin: 0 auto 25px; background: var(--glass);
            border-left: 5px solid var(--cyan); border-radius: 0 18px 18px 0;
            padding: 22px; box-shadow: 12px 12px 35px rgba(0,0,0,0.6);
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .username { color: var(--cyan); font-weight: bold; font-size: 15px; }
        .message { font-size: 16px; line-height: 1.6; margin-bottom: 18px; color: #f0f0f0; }

        .btn-group { display: flex; gap: 25px; }
        .action { background: none; border: none; color: #999; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .action:hover { color: var(--cyan); }

        /* HILOS */
        .replies { margin-top: 15px; padding-left: 20px; border-left: 2px solid var(--pink); display: flex; flex-direction: column; gap: 12px; }
        .reply-item { background: rgba(255,255,255,0.06); padding: 12px; border-radius: 12px; font-size: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .reply-item b { color: var(--pink); }

        .reply-form { display: none; margin-top: 18px; gap: 12px; }
        .reply-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 12px; border-radius: 10px; outline: none; }

        /* --- CONSOLA DE TRANSMISIÓN --- */
        footer {
            background: #000; border-top: 3px solid var(--cyan);
            padding: 18px 18px calc(35px + env(safe-area-inset-bottom));
            z-index: 1000; box-shadow: 0 -15px 40px rgba(0,0,0,0.9);
        }
        .av-bar { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px solid #222; }
        .av-icon { font-size: 34px; opacity: 0.25; cursor: pointer; transition: 0.3s; }
        .av-icon.active { opacity: 1; transform: scale(1.25); filter: drop-shadow(0 0 12px var(--cyan)); }

        .input-row { display: flex; gap: 14px; align-items: center; }
        .field-group { flex: 1; background: #05050a; border: 1px solid #333; border-radius: 18px; padding: 14px; border-left: 5px solid var(--pink); }
        #in-id { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 13px; width: 100%; outline: none; margin-bottom: 6px; }
        #in-msg { background: none; border: none; color: #fff; font-size: 16px; width: 100%; outline: none; }
        
        .send-btn { 
            width: 65px; height: 65px; border-radius: 22px; border: none; 
            background: linear-gradient(135deg, var(--cyan), #00aaff); color: #000; 
            font-size: 28px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div id="space-canvas">
        <div class="obj saturn"></div>
        <div class="obj mars"></div>
        <svg class="spaceship" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 25 L40 10 L80 10 L90 25 L80 40 L40 40 Z" fill="cyan" opacity="0.8"/>
            <circle cx="50" cy="25" r="5" fill="white"/>
            <rect x="20" y="20" width="10" height="10" fill="magenta"/>
            <path d="M90 25 L100 20 L100 30 Z" fill="cyan"/>
        </svg>
    </div>

    <header>
        <h1>NEURO LUIYI 🪐 NASA</h1>
        <a href="index.html" class="home-link">Inicio 🏠</a>
    </header>

    <main id="feed"><div id="mount"></div></main>

    <footer>
        <div id="av-list" class="av-bar"></div>
        <div class="input-row">
            <div class="field-group">
                <input id="in-id" placeholder="ID PILOTO..." maxlength="15">
                <input id="in-msg" placeholder="TRANSMITIR MENSAJE AL ESPACIO...">
            </div>
            <button class="send-btn" onclick="postear()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // -- SISTEMA DE IDENTIDAD --
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛰️','🛸','🪐'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-icon'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-list').appendChild(el);
        });

        const checkID = () => {
            const id = document.getElementById('in-id').value.trim();
            if(!selAv || !id) { alert("⚠️ SE REQUIERE AVATAR E ID"); return null; }
            return { id, av: selAv };
        }

        // -- ACCIONES FIREBASE --
        window.postear = () => {
            const u = checkID(); const m = document.getElementById('in-msg').value.trim();
            if(!u || !m) return;
            push(ref(db, "posts"), { name: u.id, avatar: u.av, msg: m, likes: 0 });
            document.getElementById('in-msg').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const k = snap.key;
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `
                <div class="card-header"><span>${d.avatar}</span> <span class="username">@${d.name}</span></div>
                <div class="message">${d.msg}</div>
                <div class="btn-group">
                    <button class="action" onclick="like('${k}')">🔋 <span id="l-${k}">${d.likes || 0}</span></button>
                    <button class="action" onclick="showRep('${k}')">💬 COMENTAR</button>
                </div>
                <div id="thread-${k}" class="replies"></div>
                <div id="form-${k}" class="reply-form">
                    <input id="in-${k}" placeholder="Responder...">
                    <button onclick="responder('${k}')" style="background:var(--cyan);border:none;padding:10px;border-radius:10px;font-weight:bold;">OK</button>
                </div>
            `;
            document.getElementById('mount').prepend(card);

            onChildAdded(ref(db, `posts/${k}/replies`), rSnap => {
                const r = rSnap.val();
                const div = document.createElement('div'); div.className = 'reply-item';
                div.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${k}`).appendChild(div);
            });
        });

        window.like = (k) => runTransaction(ref(db, `posts/${k}/likes`), c => (c || 0) + 1);
        window.showRep = (k) => { const f = document.getElementById(`form-${k}`); f.style.display = f.style.display === 'flex' ? 'none' : 'flex'; };
        window.responder = (k) => {
            const u = checkID(); const txt = document.getElementById(`in-${k}`).value.trim();
            if(!u || !txt) return;
            push(ref(db, `posts/${k}/replies`), { name: u.id, avatar: u.av, msg: txt });
            document.getElementById(`in-${k}`).value = "";
            document.getElementById(`form-${k}`).style.display = 'none';
        };
    </script>
</body>
</html>
