<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Face-Luiyi</title>

<style>

/* ================= BODY ================= */
body {
    margin:0;
    font-family: Arial;
    background: url('fondo-foro.jpg') no-repeat center center fixed;
    background-size: cover;
    color:#00ffe0;
}

/* ================= OVERLAY ================= */
.overlay {
    background: rgba(0,0,0,0.45);
    min-height:100vh;
    padding:20px;
}

/* ================= TOP BAR ================= */
.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.top-bar a {
    color:#00ffcc;
    text-decoration:none;
    border:2px solid #00ffcc;
    padding:8px 15px;
    border-radius:6px;
    transition:0.3s;
}

.top-bar a:hover {
    color:#ff00ff;
    border-color:#ff00ff;
}

/* ================= AVATAR NEUROLUIS ================= */
.avatar-glitch {
    position: fixed;
    top: 10px;
    right: 120px;
    width: 120px;
    height: 120px;
    border: 2px solid #00ffff;
    box-shadow: 0 0 15px #00ffff, 0 0 40px #ff00ff;
    overflow: hidden;
    border-radius: 12px;
    background: black;
}

.pantalla {
    width:100%;
    height:100%;
    object-fit: cover;
    animation: pulseGlow 2s infinite;
    filter: contrast(1.2) saturate(1.3);
}

/* glow dinámico */
@keyframes pulseGlow {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.4); }
    100% { filter: brightness(1); }
}

/* glitch leve */
@keyframes glitch {
    0% { transform: translate(0px, 0px); }
    25% { transform: translate(1px, -1px); }
    50% { transform: translate(-1px, 1px); }
    75% { transform: translate(2px, 0px); }
    100% { transform: translate(0px, 1px); }
}

/* ================= TITULO ================= */
h1 {
    text-align:center;
    font-size:2.5em;
    text-shadow:0 0 10px #00ffff, 0 0 20px #ff00ff;
}

/* ================= CONTENEDOR ================= */
.container {
    max-width:700px;
    margin:auto;
}

/* ================= FORM ================= */
.form-box {
    background:rgba(0,0,0,0.65);
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 15px #00ffff;
}

input, textarea {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background:#00ffff;
    border:none;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    background:#00bfff;
}

/* ================= COMENTARIOS ================= */
.comment-box {
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    box-shadow:0 0 10px #00ffff;
}

</style>
</head>

<body>

<div class="overlay">

    <!-- TOP BAR -->
    <div class="top-bar">
        <a href="index.html">⬅ Volver</a>
        <a href="index.html">✖ Salir</a>
    </div>

    <!-- 🧠 AVATAR NEUROLUIS -->
    <div class="avatar-glitch">
        <img src="NeuroLuis.gif" class="pantalla" alt="NeuroLuis">
    </div>

    <!-- TITULO -->
    <h1>⚡ Face-Luiyi</h1>

    <div class="container">

        <!-- FORMULARIO -->
        <div class="form-box">
            <input type="text" id="nombre" placeholder="Tu nombre">
            <textarea id="mensaje" rows="4" placeholder="Escribe tu mensaje..."></textarea>
            <button onclick="agregarComentario()">Enviar</button>
        </div>

        <!-- COMENTARIOS -->
        <div id="comentarios"></div>

    </div>

</div>

<script>

/* COMENTARIOS */
function agregarComentario(){

    let nombre = document.getElementById("nombre").value;
    let mensaje = document.getElementById("mensaje").value;

    if(nombre === "" || mensaje === ""){
        alert("Completa los campos");
        return;
    }

    let contenedor = document.getElementById("comentarios");

    let nuevo = document.createElement("div");
    nuevo.className = "comment-box";

    nuevo.innerHTML = "<strong>" + nombre + ":</strong><br>" + mensaje;

    contenedor.prepend(nuevo);

    document.getElementById("nombre").value = "";
    document.getElementById("mensaje").value = "";
}

</script>

</body>
</html>
