<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 NeuroLuiyi - Estación Espacial Pro</title>

<style>
:root {
    --neon-cyan: #00ffff;
    --neon-pink: #ff00ff;
    --glass: rgba(10, 10, 20, 0.9);
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background: #020205;
    color: white;
    height: 100vh;
    overflow: hidden;
    display: flex;
}

/* FONDO ESPACIAL */
#space-bg {
    position: fixed;
    inset: 0;
    z-index: -2;
    background: radial-gradient(circle at center, #1b2735 0%, #000 100%);
}

.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: warp linear infinite;
}

@keyframes warp {
    from { transform: translateY(-10px); opacity: 0; }
    to { transform: translateY(100vh); opacity: 1; }
}

/* SIDEBAR IZQUIERDA */
.sidebar {
    width: 320px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border-right: 2px solid var(--neon-cyan);
    padding: 25px;
    display: flex;
    flex-direction: column;
    z-index: 100;
}

.sidebar h2 {
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
    text-align: center;
    margin-top: 0;
}

/* AVATARES LINDOS */
.avatar-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin: 15px 0;
}

.av-item {
    font-size: 26px;
    cursor: pointer;
    text-align: center;
    padding: 5px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: 0.3s;
}

.av-item:hover { background: rgba(0, 255, 255, 0.1); }
.av-item.selected {
    border-color: var(--neon-cyan);
    background: rgba(0, 255, 255, 0.2);
    transform: scale(1.1);
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #333;
    background: rgba(0,0,0,0.6);
    color: white;
    box-sizing: border-box;
}

input:focus, textarea:focus { border-color: var(--neon-cyan); outline: none; }

button.btn-pub {
    width: 100%;
    margin-top: 15px;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink));
    color: white;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    text-transform: uppercase;
}

/* ELEMENTOS DE LUJO */
.neuro-gif {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 110px;
    height: 110px;
    border: 2px solid var(--neon-cyan);
    border-radius: 15px;
    box-shadow: 0 0 20px var(--neon-cyan);
    z-index: 10;
}

.astronaut {
    position: fixed;
    width: 280px;
    bottom: 5%;
    right: 5%;
    z-index: -1;
    animation: float 10s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translate(0,0) rotate(0deg); }
    50% { transform: translate(-30px, -50px) rotate(10deg); }
}

/* ÁREA DE MENSAJES */
#main {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    scrollbar-width: none;
}
#main::-webkit-scrollbar { display: none; }

.post {
    background: rgba(20, 20, 30, 0.85);
    border: 1px solid var(--neon-cyan);
    padding: 20px;
    margin-bottom: 25px;
    border-radius: 20px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
}

.post-user {
    color: var(--neon-cyan);
    font-weight: bold;
    font-size: 1.1rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.post-msg { line-height: 1.6; color: #f0f0f0; margin-bottom: 15px; }

.btn-like {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--neon-pink);
    color: var(--neon-pink);
    padding: 5px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.9rem;
}

.back-link {
    margin-top: auto;
    text-align: center;
    color: #666;
    text-decoration: none;
    font-size: 13px;
}
</style>
</head>

<body>

<div id="space-bg"></div>

<img src="NeuroLuis.gif" class="neuro-gif">
<img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Astronaut.png" class="astronaut">

<div class="sidebar">
    <h2>ESTACIÓN LUIYI</h2>

    <div class="avatar-grid">
        <div class="av-item selected" onclick="setAvatar('🐸',this)">🐸</div>
        <div class="av-item" onclick="setAvatar('🚀',this)">🚀</div>
        <div class="av-item" onclick="setAvatar('⚡',this)">⚡</div>
        <div class="av-item" onclick="setAvatar('🧠',this)">🧠</div>
        <div class="av-item" onclick="setAvatar('👽',this)">👽</div>
        <div class="av-item" onclick="setAvatar('🤖',this)">🤖</div>
        <div class="av-item" onclick="setAvatar('🛸',this)">🛸</div>
        <div class="av-item" onclick="setAvatar('🧬',this)">🧬</div>
    </div>

    <input id="name" placeholder="Tu nombre o Nick">
    <textarea id="msg" rows="5" placeholder="¿Qué experimento lanzamos hoy?"></textarea>
    <button class="btn-pub" onclick="send()">ACTIVAR WARP</button>

    <a href="index.html" class="back-link">⬅ SALIR AL SISTEMA</a>
</div>

<div id="main">
    <div id="feed" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<script type="module">
/* ================= FIREBASE v9 ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    runTransaction
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
  authDomain: "foro-luiyi.firebaseapp.com",
  databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "foro-luiyi",
  storageBucket: "foro-luiyi.firebasestorage.app",
  messagingSenderId: "410471993147",
  appId: "1:410471993147:web:d672952aa8a4364d48f11e",
  measurementId: "G-2KKHGJYYN7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= LÓGICA DE ESTRELLAS ================= */
const bg = document.getElementById('space-bg');
for(let i=0; i<100; i++){
    let star = document.createElement('div');
    star.className = 'star';
    star.style.width = Math.random()*3+'px';
    star.style.height = star.style.width;
    star.style.left = Math.random()*100+'vw';
    star.style.top = Math.random()*100+'vh';
    star.style.animationDuration = (Math.random()*3 + 2)+'s';
    bg.appendChild(star);
}

/* ================= FUNCIONES GLOBALES ================= */
let avatar = "🐸";

window.setAvatar = (a, el) => {
    document.querySelectorAll(".av-item").forEach(x => x.classList.remove("selected"));
    el.classList.add("selected");
    avatar = a;
};

window.send = () => {
    const name = document.getElementById("name").value.trim();
    const msg = document.getElementById("msg").value.trim();

    if(!name || !msg) return alert("¡Capitán, rellene los datos!");

    push(ref(db, "posts"), {
        name,
        avatar,
        msg,
        likes: 0,
        time: Date.now()
    });

    document.getElementById("msg").value = "";
};

/* ================= CARGAR MENSAJES ================= */
onChildAdded(ref(db, "posts"), snap => {
    const p = snap.val();
    const id = snap.key;

    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = `
        <div class="post-user">${p.avatar} ${p.name}</div>
        <div class="post-msg">${p.msg}</div>
        <button class="btn-like" onclick="like('${id}')">❤️ Energía: <span id="l-${id}">${p.likes || 0}</span></button>
    `;

    document.getElementById("feed").prepend(div);
});

/* ================= LIKES (TRANSACTION) ================= */
window.like = (id) => {
    const likesRef = ref(db, `posts/${id}/likes`);
    runTransaction(likesRef, (currentLikes) => {
        return (currentLikes || 0) + 1;
    }).then(() => {
        const span = document.getElementById(`l-${id}`);
        if(span) span.innerText = parseInt(span.innerText) + 1;
    });
};

</script>

</body>
</html>
