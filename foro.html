<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroLuiyi Feed</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f0f1a,#1a0025,#000);
    color:white;
}

.header {
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    background: linear-gradient(90deg,#ff00ff,#00ffff,#ff8800);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.avatar {
    position:fixed;
    top:10px;
    right:10px;
    width:90px;
    height:90px;
    border-radius:12px;
    border:2px solid #00ffff;
    box-shadow:0 0 15px #00ffff;
    overflow:hidden;
    background:black;
}

.avatar img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.box {
    max-width:600px;
    margin:auto;
    padding:20px;
}

input, textarea {
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:none;
    outline:none;
}

button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#ff00ff,#00ffff);
    font-weight:bold;
    cursor:pointer;
}

.post {
    background:rgba(255,255,255,0.05);
    margin:10px auto;
    padding:15px;
    border-radius:15px;
    max-width:600px;
    box-shadow:0 0 10px rgba(0,255,255,0.3);
}

.user {
    font-weight:bold;
    color:#00ffff;
    display:flex;
    align-items:center;
    gap:8px;
}

.like {
    margin-top:10px;
    cursor:pointer;
    color:#ff4d6d;
    user-select:none;
}

.like:hover {
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="header">⚡ NeuroLuiyi Feed</div>

<div class="avatar">
    <img src="NeuroLuis.gif" onerror="this.src='https://via.placeholder.com/90'">
</div>

<div class="box">
    <input id="name" placeholder="Tu nombre">
    <textarea id="msg" placeholder="Escribe tu post..."></textarea>
    <button onclick="send()">Publicar</button>
</div>

<div id="feed"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
    databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = firebase.database();

function avatar(name){
    return "https://api.dicebear.com/7.x/pixel-art/svg?seed="+name;
}

function send(){

    let name = document.getElementById("name").value;
    let msg = document.getElementById("msg").value;

    if(!name || !msg) return;

    db.ref("posts").push({
        name,
        msg,
        likes:0,
        time:Date.now()
    });

    document.getElementById("msg").value="";
}

const feed = document.getElementById("feed");

db.ref("posts").on("child_added", snap=>{

    let p = snap.val();
    let id = snap.key;

    let div = document.createElement("div");
    div.className="post";

    div.innerHTML=`
        <div class="user">
            <img src="${avatar(p.name)}" width="25" style="border-radius:50%">
            ${p.name}
        </div>

        <div>${p.msg}</div>

        <div class="like" onclick="like('${id}')">
            ❤️ Like <span>${p.likes}</span>
        </div>
    `;

    feed.prepend(div);
});

function like(id){

    let ref = db.ref("posts/"+id+"/likes");

    ref.transaction(likes=>{
        return (likes||0)+1;
    });
}

</script>

</body>
</html>
