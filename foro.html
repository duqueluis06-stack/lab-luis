<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💎 NEURO-LUIYI LAB: LUXURY EDITION</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --purple: #9d00ff;
            --dark: #020205;
            --glass-light: rgba(255, 255, 255, 0.05);
            --glass-dark: rgba(10, 15, 30, 0.85);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--dark); color: #fff;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- FONDO ESTRELLADO --- */
        #space-core { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 30% 30%, #0d1b2a, #000); }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; animation: warpSpeed linear infinite; }
        @keyframes warpSpeed { from { transform: translateY(-100vh); } to { transform: translateY(100vh); } }

        /* --- CABECERA DE LUJO (CORREGIDA) --- */
        .nav-station {
            height: 85px; background: var(--glass-dark); backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000; box-shadow: 0 10px 30px rgba(0, 255, 255, 0.15);
            flex-shrink: 0; /* Evita que se encoja */
        }
        .exit-link { text-decoration: none; color: #ff4444; border: 1px solid #ff4444; padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; letter-spacing: 1px; transition: 0.3s; }
        .exit-link:hover { background: #ff4444; color: white; box-shadow: 0 0 15px #ff4444; }

        .logo-section h1 { margin: 0; font-size: 1.1rem; letter-spacing: 3px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); text-align: center; }
        .logo-section span { display: block; font-size: 0.6rem; color: var(--pink); text-align: center; letter-spacing: 2px; }

        .profile-gif { width: 55px; height: 55px; border: 2px solid var(--cyan); border-radius: 12px; box-shadow: 0 0 15px var(--cyan); object-fit: cover; }

        /* --- FEED CON RELIEVE --- */
        #data-stream { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 200px; -webkit-overflow-scrolling: touch; }
        .post-frame {
            max-width: 600px; margin: 0 auto 25px auto; background: var(--glass-light);
            border: 1px solid rgba(255, 255, 255, 0.1); border-left: 5px solid var(--cyan);
            border-radius: 10px 20px 20px 10px; padding: 20px; backdrop-filter: blur(12px);
            box-shadow: 6px 6px 20px rgba(0,0,0,0.5), inset 2px 2px 5px rgba(255,255,255,0.05);
            position: relative;
        }

        .user-info { font-size: 0.9rem; font-weight: bold; color: var(--cyan); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .message-text { font-size: 1.05rem; line-height: 1.6; color: #e0e0ff; text-shadow: 1px 1px 2px black; }

        /* ACCIONES E HILOS */
        .btn-row { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; }
        .act-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        .act-btn:hover { color: var(--cyan); transform: scale(1.1); }
        
        .thread { margin-top: 12px; padding-left: 15px; border-left: 2px solid rgba(0,255,255,0.1); }
        .reply { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.05); box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }

        /* --- CONTROL DE MANDOS --- */
        .footer-control {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass-dark);
            border-top: 2px solid var(--cyan); padding: 15px 15px 30px 15px; z-index: 2000; box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }

        .av-strip { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 10px; scrollbar-width: none; }
        .av-strip::-webkit-scrollbar { display: none; }
        .av-btn { font-size: 30px; cursor: pointer; opacity: 0.3; transition: 0.4s; filter: grayscale(1); }
        .av-btn.active { opacity: 1; filter: grayscale(0); transform: scale(1.25); text-shadow: 0 0 10px var(--cyan); }

        .input-box { display: flex; gap: 12px; align-items: flex-end; }
        .input-group { flex: 1; background: rgba(0,0,0,0.5); border-radius: 15px; padding: 10px; border: 1px solid #333; }
        #pilot-id { background: none; border: none; border-bottom: 1px solid #444; color: var(--cyan); width: 100%; font-weight: bold; margin-bottom: 8px; font-size: 0.8rem; outline: none; }
        #msg-input { background: none; border: none; color: white; width: 100%; resize: none; font-size: 1rem; outline: none; padding: 5px; }

        .send-warp {
            width: 55px; height: 55px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: white; font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            transition: 0.3s;
        }
        .send-warp:active { transform: scale(0.9); }

        /* AJUSTES MÓVIL */
        @media (max-width: 600px) {
            .nav-station { height: 80px; padding: 0 15px; }
            .logo-section h1 { font-size: 0.9rem; }
            .post-frame { border-radius: 0 15px 15px 0; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

    <div id="space-core"></div>

    <header class="nav-station">
        <a href="index.html" class="exit-link">SALIR</a>
        <div class="logo-section">
            <h1>NEURO-LUIYI</h1>
            <span>LABORATORIO ALPHA</span>
        </div>
        <img src="NeuroLuis.gif" class="profile-gif" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="data-stream">
        <div id="flow-container" style="max-width:600px; margin:auto;"></div>
    </main>

    <footer class="footer-control">
        <div id="av-strip" class="av-strip"></div>
        <div class="input-box">
            <div class="input-group">
                <input id="pilot-id" placeholder="ID DEL PILOTO..." maxlength="15">
                <textarea id="msg-input" placeholder="Transmitir mensaje..." rows="1"></textarea>
            </div>
            <button class="send-warp" onclick="transmitir()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Estrellas
        const space = document.getElementById('space-core');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div'); s.className = 'star';
            const size = Math.random()*3+'px'; s.style.width = size; s.style.height = size;
            s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
            s.style.animationDuration = (Math.random()*4+2)+'s'; space.appendChild(s);
        }

        // Avatares
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🧬','🛰️','💎','🌌'];
        let activeAv = icons[0];
        const strip = document.getElementById('av-strip');
        icons.forEach(icon => {
            const el = document.createElement('span'); el.className = 'av-btn' + (icon===activeAv?' active':''); el.innerText = icon;
            el.onclick = () => { document.querySelectorAll('.av-btn').forEach(i=>i.classList.remove('active')); el.classList.add('active'); activeAv = icon; };
            strip.appendChild(el);
        });

        window.transmitir = () => {
            const n = document.getElementById('pilot-id').value.trim();
            const m = document.getElementById('msg-input').value.trim();
            if(!n || !m) return;
            push(ref(db, "posts"), { name: n, avatar: activeAv, msg: m, likes: 0, time: Date.now() });
            document.getElementById('msg-input').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const data = snap.val(); const id = snap.key;
            const frame = document.createElement('div'); frame.className = 'post-frame';
            frame.innerHTML = `
                <div class="user-info">${data.avatar} @${data.name}</div>
                <div class="message-text">${data.msg}</div>
                <div class="btn-row">
                    <button class="act-btn" onclick="like('${id}')">🔋 <span id="l-${id}">${data.likes || 0}</span></button>
                    <button class="act-btn" onclick="openRep('${id}')">💬 RESPONDER</button>
                </div>
                <div class="thread" id="thread-${id}"></div>
                <div id="box-${id}" style="display:none; margin-top:10px; gap:8px;">
                    <input id="in-${id}" placeholder="Escribir respuesta..." style="flex:1; background:black; border:1px solid var(--cyan); color:white; padding:8px; border-radius:10px;">
                    <button onclick="sendRep('${id}')" style="background:var(--cyan); border:none; border-radius:10px; padding:0 12px; font-weight:bold; cursor:pointer;">OK</button>
                </div>
            `;
            document.getElementById('flow-container').prepend(frame);

            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.className = 'reply';
                node.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.openRep = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display === 'flex' ? 'none' : 'flex'; };
        window.sendRep = (id) => {
            const input = document.getElementById(`in-${id}`); const name = document.getElementById('pilot-id').value.trim() || "ANÓNIMO";
            if(!input.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name, avatar: activeAv, msg: input.value.trim() });
            input.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
