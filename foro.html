<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroLuis Forum</title>

<style>

/* =========================
   BASE
========================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;

    /* 🔥 FONDO CORRECTO SEGÚN TU REPO */
    background-image: url("fondo-foro");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* overlay oscuro */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: -1;
}

/* =========================
   HEADER
========================= */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    background: rgba(10,10,10,0.85);
    border-bottom: 1px solid #00ffcc;
}

.title {
    color: #00ffcc;
    font-weight: bold;
}

/* =========================
   BOTONES
========================= */
button {
    padding: 6px 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #1a1a1a;
    color: white;
}

button:hover {
    background: #00ffcc;
    color: black;
}

/* =========================
   GIF
========================= */
.gif-box {
    text-align: center;
    padding: 12px;
}

.gif-box img {
    width: 100px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,255,204,0.4);
}

.gif-box p {
    color: #00ffcc;
    font-size: 12px;
}

/* =========================
   LOGIN
========================= */
.login {
    text-align: center;
    padding: 10px;
}

input, select {
    padding: 8px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

/* =========================
   POST
========================= */
textarea {
    width: 90%;
    max-width: 520px;
    height: 80px;
    border-radius: 10px;
    border: none;
    padding: 10px;
}

.post {
    width: 90%;
    max-width: 520px;
    margin: 10px auto;
    padding: 12px;
    background: rgba(25,25,25,0.85);
    border-radius: 12px;
    box-shadow: 0 0 12px rgba(0,255,204,0.15);
}

.post b {
    color: #00ffcc;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="title">⚡ NeuroLuis Forum</div>

    <div>
        <button onclick="window.location.href='index.html'">🏠 Inicio</button>
        <button onclick="logout()">🚪 Salir</button>
    </div>
</div>

<!-- GIF -->
<div class="gif-box">
    <img src="NeuroLuis" alt="NeuroLuis">
    <p>Laboratorio de ideas en tiempo real</p>
</div>

<!-- LOGIN -->
<div class="login">
    <input id="username" placeholder="Tu nombre">

    <select id="avatar">
        <option value="👤">👤 Humano</option>
        <option value="🧠">🧠 Cerebro</option>
        <option value="⚡">⚡ Energía</option>
        <option value="🤖">🤖 Robot</option>
        <option value="🔬">🔬 Ciencia</option>
    </select>

    <button onclick="setUser()">Entrar</button>
</div>

<!-- POST -->
<div style="text-align:center">
    <textarea id="text" placeholder="Escribe algo..."></textarea><br>
    <button onclick="sendPost()">Publicar</button>
</div>

<!-- POSTS -->
<div id="posts"></div>

<script>

let currentUser = localStorage.getItem("user");
let currentAvatar = localStorage.getItem("avatar") || "👤";

/* LOGIN */
function setUser() {
    const name = document.getElementById("username").value;
    const avatar = document.getElementById("avatar").value;

    if (!name) return;

    currentUser = name;
    currentAvatar = avatar;

    localStorage.setItem("user", currentUser);
    localStorage.setItem("avatar", currentAvatar);

    alert("Activo: " + currentAvatar + " " + currentUser);
}

/* POST */
function sendPost() {
    const text = document.getElementById("text").value;

    if (!text || !currentUser) return;

    const post = {
        user: currentUser,
        avatar: currentAvatar,
        text: text,
        time: Date.now()
    };

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts.unshift(post);
    localStorage.setItem("posts", JSON.stringify(posts));

    renderPosts();
    document.getElementById("text").value = "";
}

/* RENDER */
function renderPosts() {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts.forEach(p => {
        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <b>${p.avatar} ${p.user}</b>
            <p>${p.text}</p>
        `;

        container.appendChild(div);
    });
}

/* LOGOUT */
function logout() {
    localStorage.clear();
    location.reload();
}

/* INIT */
window.onload = () => {
    if (currentUser) {
        document.getElementById("username").value = currentUser;
    }
    renderPosts();
};

</script>

</body>
</html>
