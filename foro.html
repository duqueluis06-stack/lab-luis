<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💬 NeuroLuigi Forum</title>

<!-- 📊 GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LE6LX7FC2Q"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-LE6LX7FC2Q');
</script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b10;
    color:white;
}

.header{
    text-align:center;
    padding:18px;
    font-size:26px;
    color:#00ffff;
    font-weight:bold;
}

.box{
    max-width:600px;
    margin:auto;
    padding:10px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00ffff;
    font-weight:bold;
    cursor:pointer;
}

#feed{
    max-width:600px;
    margin:auto;
}

.post{
    background:rgba(255,255,255,0.06);
    margin:10px;
    padding:12px;
    border-radius:12px;
}

.user{
    color:#00ffff;
    font-weight:bold;
}

.msg{
    margin-top:8px;
}

.like{
    margin-top:10px;
    color:#ff4d6d;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">⚡ NeuroLuigi Forum</div>

<div class="box">
    <input id="name" placeholder="Tu nombre">
    <textarea id="msg" placeholder="Escribe tu mensaje"></textarea>
    <button onclick="send()">Publicar</button>
</div>

<div id="feed"></div>

<!-- 🔥 FIREBASE v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
  authDomain: "foro-luiyi.firebaseapp.com",
  databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "foro-luiyi",
  storageBucket: "foro-luiyi.appspot.com",
  messagingSenderId: "410471993147",
  appId: "1:410471993147:web:d672952aa8a4364d48f11e"
});

const db = firebase.database();
const feed = document.getElementById("feed");

/* ENVIAR */
function send(){

    let name = document.getElementById("name").value.trim();
    let msg = document.getElementById("msg").value.trim();

    if(!name || !msg) return;

    db.ref("posts").push({
        name,
        msg,
        likes:0,
        time:Date.now()
    });

    document.getElementById("msg").value="";
}

/* MOSTRAR POSTS */
db.ref("posts").on("child_added", snap=>{

    let p = snap.val();
    let id = snap.key;

    let div = document.createElement("div");
    div.className="post";

    div.innerHTML=`
        <div class="user">🧠 ${p.name}</div>
        <div class="msg">${p.msg}</div>

        <div class="like" onclick="like('${id}', this)">
            ❤️ <span>${p.likes || 0}</span>
        </div>
    `;

    feed.prepend(div);
});

/* LIKE */
function like(id, el){

    db.ref("posts/"+id+"/likes").transaction(v => (v||0)+1);

    let span = el.querySelector("span");
    span.innerText = parseInt(span.innerText||0)+1;
}

</script>

</body>
</html>
