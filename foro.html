<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 NeuroLuiyi - Foro Galáctico</title>

<style>
    :root {
        --neon-cyan: #00ffff;
        --neon-purple: #bc13fe;
        --luxury-black: #050508;
    }

    body {
        margin: 0;
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        background: var(--luxury-black);
        color: white;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    /* --- FONDO ESPACIAL ANIMADO --- */
    #space-bg {
        position: fixed;
        inset: 0;
        z-index: -2;
        background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        overflow: hidden;
    }

    /* Estrellas con movimiento Warp */
    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.5;
        animation: warp 3s linear infinite;
    }

    @keyframes warp {
        from { transform: translateZ(0) translateY(0); opacity: 0.1; }
        to { transform: translateZ(1000px) translateY(100vh); opacity: 1; }
    }

    .astronaut {
        position: fixed;
        width: 180px;
        top: 15%;
        right: 5%;
        z-index: -1;
        filter: drop-shadow(0 0 20px var(--neon-cyan));
        animation: floatAstronaut 8s ease-in-out infinite;
    }

    @keyframes floatAstronaut {
        0%, 100% { transform: translate(0, 0) rotate(-5deg); }
        50% { transform: translate(-40px, 50px) rotate(10deg); }
    }

    /* --- BOTÓN SALIR --- */
    .exit-btn {
        position: fixed;
        top: 20px; left: 20px;
        padding: 10px 25px;
        border: 2px solid var(--neon-purple);
        background: rgba(0,0,0,0.6);
        color: white;
        border-radius: 30px;
        text-decoration: none;
        font-weight: bold;
        box-shadow: 0 0 15px var(--neon-purple);
        z-index: 1000;
        transition: 0.3s;
    }
    .exit-btn:hover { background: var(--neon-purple); transform: scale(1.1); }

    /* --- CONTENEDOR DE PLACAS --- */
    #feed {
        flex-grow: 1;
        overflow-y: auto;
        padding: 100px 20px 180px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 25px;
        scrollbar-width: thin;
        scrollbar-color: var(--neon-cyan) transparent;
    }

    /* PLACA DE LUJO */
    .post-card {
        background: rgba(10, 10, 15, 0.85);
        border: 2px solid var(--neon-cyan);
        border-radius: 20px;
        width: 100%;
        max-width: 550px;
        padding: 20px;
        position: relative;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 10px rgba(0, 255, 255, 0.1);
        backdrop-filter: blur(10px);
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 10px;
    }
    .user-info img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--neon-purple); }
    .user-info b { color: var(--neon-cyan); font-size: 1.1rem; text-shadow: 0 0 5px var(--neon-cyan); }

    .post-text { font-size: 1.05rem; line-height: 1.6; color: #f0f0f0; margin-bottom: 15px; }

    /* SECCIÓN DE RESPUESTAS */
    .replies-container {
        background: rgba(255,255,255,0.03);
        border-radius: 10px;
        padding: 10px;
        margin-top: 10px;
    }
    .reply-item {
        font-size: 0.9rem;
        padding: 8px;
        border-left: 2px solid var(--neon-purple);
        margin-bottom: 5px;
        background: rgba(0,0,0,0.2);
    }

    .reply-input-box {
        display: flex;
        gap: 8px;
        margin-top: 15px;
    }
    .reply-input-box input {
        flex-grow: 1;
        background: rgba(0,0,0,0.5);
        border: 1px solid var(--neon-purple);
        border-radius: 8px;
        color: white;
        padding: 8px;
    }

    /* --- PANEL DE CONTROL INFERIOR --- */
    .control-center {
        position: fixed;
        bottom: 0; width: 100%;
        background: linear-gradient(transparent, #000 30%);
        padding: 20px 0;
        z-index: 1000;
    }
    .glass-panel {
        max-width: 700px;
        margin: auto;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 30px;
        padding: 15px;
        box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
    }

    .av-list {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-bottom: 12px;
        justify-content: center;
    }
    .av-list img {
        width: 50px; height: 50px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.3s;
        filter: grayscale(0.5);
    }
    .av-list img.selected {
        filter: grayscale(0);
        border-color: var(--neon-cyan);
        transform: scale(1.2);
        box-shadow: 0 0 15px var(--neon-cyan);
    }

    .input-group {
        display: flex;
        gap: 15px;
        align-items: center;
    }
    .input-group input { width: 120px; }
    .input-group textarea { flex-grow: 1; height: 45px; resize: none; }
    .input-group input, .input-group textarea {
        background: rgba(0,0,0,0.7);
        border: 1px solid var(--neon-cyan);
        border-radius: 12px;
        color: white;
        padding: 10px;
    }

    .warp-btn {
        background: transparent;
        color: var(--neon-cyan);
        border: 2px solid var(--neon-cyan);
        padding: 12px 25px;
        border-radius: 15px;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        transition: 0.3s;
        box-shadow: 0 0 10px var(--neon-cyan);
    }
    .warp-btn:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 30px var(--neon-cyan); }

</style>
</head>
<body>

<div id="space-bg"></div>
<img src="https://cdni.iconscout.com/illustration/premium/thumb/astronaut-floating-in-space-5630045-4690333.png" class="astronaut">

<a href="index.html" class="exit-btn">SALIR DEL SISTEMA</a>

<div id="feed"></div>

<div class="control-center">
    <div class="glass-panel">
        <div class="av-list" id="avatars">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=1" class="selected" onclick="pick(this)">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=2" onclick="pick(this)">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Space" onclick="pick(this)">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Hero" onclick="pick(this)">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Luis" onclick="pick(this)">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Robot2" onclick="pick(this)">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Star" onclick="pick(this)">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=A" onclick="pick(this)">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=B" onclick="pick(this)">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=C" onclick="pick(this)">
        </div>
        
        <div class="input-group">
            <input id="userName" placeholder="Apodo...">
            <textarea id="userMsg" placeholder="Lanza tu mensaje al espacio..."></textarea>
            <button class="warp-btn" onclick="lanzar()">WARP</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// CREAR ESTRELLAS
const bg = document.getElementById('space-bg');
for(let i=0; i<100; i++){
    let star = document.createElement('div');
    star.className = 'star';
    star.style.width = Math.random()*3+'px';
    star.style.height = star.style.width;
    star.style.left = Math.random()*100+'vw';
    star.style.top = Math.random()*100+'vh';
    star.style.animationDuration = (Math.random()*3 + 2)+'s';
    bg.appendChild(star);
}

// FIREBASE
firebase.initializeApp({
  databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});
const db = firebase.database();
let avatarActual = "https://api.dicebear.com/7.x/bottts/svg?seed=1";

function pick(el) {
    document.querySelectorAll('.av-list img').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    avatarActual = el.src;
}

function lanzar() {
    const n = document.getElementById("userName").value.trim();
    const m = document.getElementById("userMsg").value.trim();
    if(!n || !m) return alert("¡Identifícate y escribe un mensaje!");

    db.ref("posts").push({
        name: n,
        msg: m,
        avatar: avatarActual,
        likes: 0,
        time: Date.now()
    });
    document.getElementById("userMsg").value = "";
}

db.ref("posts").on("child_added", snap => {
    const p = snap.val();
    const id = snap.key;
    const div = document.createElement("div");
    div.className = "post-card";
    div.innerHTML = `
        <div class="user-info">
            <img src="${p.avatar}">
            <b>@${p.name}</b>
        </div>
        <div class="post-text">${p.msg}</div>
        <div style="display:flex; gap:20px; font-size:13px; color:var(--neon-cyan)">
            <span style="cursor:pointer" onclick="like('${id}')">❤️ Energía: <span id="l-${id}">${p.likes||0}</span></span>
            <span>💬 Respuestas</span>
        </div>
        
        <div class="replies-container" id="r-list-${id}"></div>
        
        <div class="reply-input-box">
            <input id="in-${id}" placeholder="Responder a este mensaje...">
            <button class="warp-btn" style="padding:5px 10px; font-size:10px" onclick="responder('${id}')">OK</button>
        </div>
    `;
    document.getElementById("feed").prepend(div);
    
    // Escuchar respuestas de esta placa
    db.ref("posts/"+id+"/replies").on("child_added", s => {
        const r = s.val();
        const rDiv = document.createElement("div");
        rDiv.className = "reply-item";
        rDiv.innerHTML = `<b style="color:var(--neon-cyan)">${r.name}:</b> ${r.msg}`;
        document.getElementById("r-list-"+id).appendChild(rDiv);
    });
});

function like(id) {
    db.ref("posts/"+id+"/likes").transaction(v => (v||0)+1);
}

db.ref("posts").on("child_changed", snap => {
    const el = document.getElementById("l-"+snap.key);
    if(el) el.innerText = snap.val().likes || 0;
});

function responder(postId) {
    const input = document.getElementById("in-"+postId);
    const nombre = document.getElementById("userName").value || "Viajero";
    if(!input.value.trim()) return;

    db.ref("posts/"+postId+"/replies").push({
        name: nombre,
        msg: input.value.trim(),
        time: Date.now()
    });
    input.value = "";
}
</script>

</body>
</html>
