<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 NeuroLuiyi - Estación Galáctica</title>

<style>
    :root {
        --neon-cyan: #00ffff;
        --neon-purple: #bc13fe;
        --glass: rgba(10, 10, 20, 0.8);
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: #020205;
        color: white;
        height: 100vh;
        overflow: hidden;
        display: flex;
    }

    /* --- FONDO DE ESTRELLAS EN MOVIMIENTO --- */
    #space {
        position: fixed;
        inset: 0;
        z-index: -2;
        background: radial-gradient(circle at center, #1b2735 0%, #000 100%);
    }
    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        animation: moveStar linear infinite;
    }
    @keyframes moveStar {
        from { transform: translateY(0); opacity: 0.5; }
        to { transform: translateY(100vh); opacity: 0; }
    }

    /* --- ASTRONAUTA Y GIF --- */
    .astro {
        position: fixed;
        width: 200px;
        bottom: 10%;
        right: 5%;
        z-index: -1;
        animation: float 6s ease-in-out infinite;
        filter: drop-shadow(0 0 15px var(--neon-cyan));
    }
    .neuro-gif {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 100px;
        height: 100px;
        border-radius: 15px;
        border: 2px solid var(--neon-cyan);
        box-shadow: 0 0 20px var(--neon-cyan);
        z-index: 100;
    }

    @keyframes float {
        0%, 100% { transform: translate(0,0) rotate(0deg); }
        50% { transform: translate(-20px, -30px) rotate(5deg); }
    }

    /* --- PANEL LATERAL IZQUIERDO (CONTROL) --- */
    .side-panel {
        width: 320px;
        height: 100vh;
        background: var(--glass);
        backdrop-filter: blur(20px);
        border-right: 2px solid var(--neon-cyan);
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-sizing: border-box;
        z-index: 1000;
        box-shadow: 10px 0 30px rgba(0, 255, 255, 0.1);
    }

    .exit-btn {
        display: inline-block;
        padding: 8px 15px;
        border: 1px solid var(--neon-purple);
        color: var(--neon-purple);
        text-decoration: none;
        border-radius: 5px;
        font-size: 12px;
        margin-bottom: 20px;
        text-align: center;
    }

    h2 { color: var(--neon-cyan); font-size: 1.2rem; margin-bottom: 10px; }

    .av-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 20px;
    }
    .av-grid img {
        width: 100%;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.3s;
    }
    .av-grid img.selected { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); transform: scale(1.1); }

    input, textarea {
        width: 100%;
        background: rgba(0,0,0,0.5);
        border: 1px solid #444;
        color: white;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 10px;
        box-sizing: border-box;
    }
    input:focus, textarea:focus { border-color: var(--neon-cyan); outline: none; }

    .warp-btn {
        background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
        border: none;
        padding: 15px;
        color: white;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        text-transform: uppercase;
    }

    /* --- ÁREA CENTRAL DE MENSAJES --- */
    #main-content {
        flex-grow: 1;
        height: 100vh;
        overflow-y: auto;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        scrollbar-width: none;
    }
    #main-content::-webkit-scrollbar { display: none; }

    .post-card {
        width: 100%;
        max-width: 600px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(0, 255, 255, 0.3);
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 30px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
    .post-header img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--neon-purple); }
    .post-header b { color: var(--neon-cyan); }

    .post-body { line-height: 1.6; color: #e0e0e0; margin-bottom: 15px; }

    .reply-box {
        border-top: 1px solid #333;
        padding-top: 15px;
        margin-top: 10px;
    }
    .reply-item {
        background: rgba(0,0,0,0.3);
        padding: 8px 12px;
        border-radius: 10px;
        margin-bottom: 8px;
        font-size: 0.9rem;
        border-left: 3px solid var(--neon-purple);
    }
</style>
</head>
<body>

<div id="space"></div>
<a href="index.html" class="exit-btn">← SALIR DEL FORO</a>

<img src="NeuroLuis.gif" class="neuro-gif" alt="NeuroLuis">

<img src="https://i.postimg.cc/85M6XmRW/astronaut.png" class="astro">

<div class="side-panel">
    <h2>🚀 Panel de Control</h2>
    <a href="index.html" class="exit-btn">VOLVER AL INICIO</a>
    
    <p style="font-size: 12px; color: #aaa;">ELIGE TU AVATAR:</p>
    <div class="av-grid" id="av-selector">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=1" class="selected" onclick="sel(this)">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=8" onclick="sel(this)">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=12" onclick="sel(this)">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" onclick="sel(this)">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" onclick="sel(this)">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=X" onclick="sel(this)">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Luis" onclick="sel(this)">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Cool" onclick="sel(this)">
    </div>

    <input id="uName" placeholder="Tu nombre...">
    <textarea id="uMsg" rows="4" placeholder="Lanza el mensaje al espacio..."></textarea>
    <button class="warp-btn" onclick="enviarAlEspacio()">ACTIVAR WARP</button>
</div>

<div id="main-content">
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// ESTRELLAS DINÁMICAS
const space = document.getElementById('space');
for(let i=0; i<150; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.width = Math.random()*3+'px';
    star.style.height = star.style.width;
    star.style.left = Math.random()*100+'vw';
    star.style.top = Math.random()*100+'vh';
    star.style.animationDuration = (Math.random()*5 + 3)+'s';
    space.appendChild(star);
}

// CONFIGURACIÓN FIREBASE
const firebaseConfig = {
  databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentAv = "https://api.dicebear.com/7.x/bottts/svg?seed=1";

function sel(el) {
    document.querySelectorAll('.av-grid img').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    currentAv = el.src;
}

// CORRECCIÓN FIREBASE: Función de envío
function enviarAlEspacio() {
    const name = document.getElementById("uName").value.trim();
    const msg = document.getElementById("uMsg").value.trim();

    if(!name || !msg) {
        alert("¡Campos incompletos, capitán!");
        return;
    }

    // Estructura de datos corregida
    db.ref("posts").push({
        name: name,
        msg: msg,
        avatar: currentAv,
        likes: 0,
        time: Date.now()
    }).then(() => {
        document.getElementById("uMsg").value = "";
        console.log("Mensaje enviado a Firebase con éxito");
    }).catch(err => console.error("Error en Firebase:", err));
}

// RENDERIZADO DE POSTS
db.ref("posts").on("child_added", snap => {
    const data = snap.val();
    const id = snap.key;
    
    const card = document.createElement("div");
    card.className = "post-card";
    card.innerHTML = `
        <div class="post-header">
            <img src="${data.avatar || currentAv}">
            <b>@${data.name}</b>
        </div>
        <div class="post-body">${data.msg}</div>
        <div style="font-size:12px; color:var(--neon-cyan); display:flex; gap:20px;">
            <span style="cursor:pointer" onclick="darLike('${id}')">❤️ Energía: <span id="l-${id}">${data.likes || 0}</span></span>
            <span>💬 Canal de respuesta</span>
        </div>
        <div class="reply-box">
            <div id="reps-${id}"></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input id="in-${id}" placeholder="Escribe respuesta..." style="margin:0; font-size:12px; padding:8px;">
                <button onclick="responder('${id}')" style="background:var(--neon-purple); border:none; color:white; border-radius:5px; padding:0 10px; cursor:pointer;">OK</button>
            </div>
        </div>
    `;
    document.getElementById("main-content").prepend(card);

    // Cargar respuestas en tiempo real
    db.ref("posts/"+id+"/replies").on("child_added", s => {
        const r = s.val();
        const rDiv = document.createElement("div");
        rDiv.className = "reply-item";
        rDiv.innerHTML = `<b>${r.user}:</b> ${r.text}`;
        document.getElementById("reps-"+id).appendChild(rDiv);
    });
});

function darLike(id) {
    db.ref("posts/"+id+"/likes").transaction(v => (v||0)+1);
}

db.ref("posts").on("child_changed", snap => {
    const el = document.getElementById("l-"+snap.key);
    if(el) el.innerText = snap.val().likes || 0;
});

function responder(id) {
    const inp = document.getElementById("in-"+id);
    const user = document.getElementById("uName").value || "Astronauta";
    if(!inp.value.trim()) return;

    db.ref("posts/"+id+"/replies").push({
        user: user,
        text: inp.value.trim(),
        time: Date.now()
    });
    inp.value = "";
}
</script>

</body>
</html>
