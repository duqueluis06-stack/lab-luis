<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ NEURO-PRO LAB</title>
    <style>
        :root {
            --cyan: #00ffff; --pink: #ff00ff; --dark: #050508;
            --glass: rgba(15, 20, 35, 0.85);
            --neon-glow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--dark);
            color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- FONDO ESTRELLADO --- */
        #space { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 50% 50%, #101525, #000); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.4; animation: move 10s linear infinite; }
        @keyframes move { from { transform: translateY(-100vh); } to { transform: translateY(100vh); } }

        /* --- HEADER COMPACTO PRO --- */
        .header-pro {
            height: 60px; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000; box-shadow: var(--neon-glow);
        }
        .exit-pill { text-decoration: none; color: #ff4444; font-size: 11px; font-weight: bold; border: 1px solid #ff4444; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }
        .logo-text { font-size: 14px; letter-spacing: 2px; color: var(--cyan); text-shadow: 0 0 8px var(--cyan); margin: 0; font-weight: 900; }
        .gif-pro { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--cyan); object-fit: cover; box-shadow: 0 0 10px var(--cyan); }

        /* --- FEED DE DATOS --- */
        #stream { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; scroll-behavior: smooth; }
        .card {
            max-width: 550px; margin: 0 auto 15px auto; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1); border-left: 3px solid var(--cyan);
            border-radius: 4px 12px 12px 4px; padding: 12px; position: relative;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.4);
        }
        .card-user { font-size: 12px; color: var(--cyan); font-weight: bold; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .card-msg { font-size: 15px; line-height: 1.4; color: #eef; }

        /* --- ACCIONES --- */
        .card-actions { display: flex; gap: 15px; margin-top: 10px; opacity: 0.7; }
        .act-btn { background: none; border: none; color: #ccc; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .reply-box { margin-top: 10px; border-left: 1px solid #333; padding-left: 10px; font-size: 13px; color: #bbb; }

        /* --- CONSOLA DE MANDOS INFERIOR (ULTRA-COMPACTA) --- */
        .console {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(5, 5, 10, 0.95); border-top: 1px solid var(--cyan);
            padding: 10px 15px 25px 15px; z-index: 2000;
        }
        
        /* Selector de avatares ocultable */
        #av-drawer { 
            display: none; grid-template-columns: repeat(6, 1fr); gap: 10px; 
            padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 10px;
        }
        .av-opt { font-size: 24px; cursor: pointer; text-align: center; transition: 0.2s; opacity: 0.4; }
        .av-opt.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 5px var(--cyan)); }

        .input-row { display: flex; align-items: center; gap: 10px; }
        .btn-toggle-av { background: #1a1a25; border: 1px solid #333; border-radius: 50%; width: 35px; height: 35px; color: var(--cyan); cursor: pointer; font-size: 18px; }
        
        .main-input-wrap { 
            flex: 1; background: #111; border: 1px solid #333; border-radius: 20px; 
            display: flex; align-items: center; padding: 0 15px;
        }
        #pilot { background: none; border: none; color: var(--cyan); width: 60px; font-size: 11px; font-weight: bold; border-right: 1px solid #333; margin-right: 10px; padding: 5px 0; }
        #msg { background: none; border: none; color: white; flex: 1; padding: 10px 0; font-size: 14px; }

        .send-btn { 
            background: var(--cyan); color: #000; border: none; 
            width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px var(--cyan); font-weight: bold;
        }

        @media (max-width: 600px) {
            .header-pro { height: 55px; }
            #stream { padding-bottom: 120px; }
        }
    </style>
</head>
<body>

<div id="space"></div>

<header class="header-pro">
    <a href="index.html" class="exit-pill">Exit</a>
    <h1 class="logo-text">NEURO LAB</h1>
    <img src="NeuroLuis.gif" class="gif-pro" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
</header>

<main id="stream">
    <div id="content-wrap" style="max-width: 550px; margin: auto;"></div>
</main>

<footer class="console">
    <div id="av-drawer"></div>
    <div class="input-row">
        <button class="btn-toggle-av" onclick="toggleAv()">👤</button>
        <div class="main-input-wrap">
            <input id="pilot" placeholder="USER" maxlength="10">
            <input id="msg" placeholder="Mensaje...">
        </div>
        <button class="send-btn" onclick="send()">🚀</button>
    </div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
        authDomain: "foro-luiyi.firebaseapp.com",
        databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "foro-luiyi",
        storageBucket: "foro-luiyi.firebasestorage.app",
        messagingSenderId: "410471993147",
        appId: "1:410471993147:web:d672952aa8a4364d48f11e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Fondo
    const space = document.getElementById('space');
    for(let i=0; i<60; i++) {
        const s = document.createElement('div'); s.className = 'star';
        const size = Math.random()*3+'px'; s.style.width=size; s.style.height=size;
        s.style.left=Math.random()*100+'vw'; s.style.top=Math.random()*100+'vh';
        s.style.animationDuration=(Math.random()*5+5)+'s'; space.appendChild(s);
    }

    // Avatares
    const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🧬','🛰️','💎','🌌'];
    let currentAv = icons[0];
    const drawer = document.getElementById('av-drawer');
    icons.forEach(i => {
        const span = document.createElement('span'); span.className = 'av-opt' + (i===currentAv?' active':'');
        span.innerText = i; span.onclick = () => {
            document.querySelectorAll('.av-opt').forEach(a => a.classList.remove('active'));
            span.classList.add('active'); currentAv = i; toggleAv();
        };
        drawer.appendChild(span);
    });

    window.toggleAv = () => {
        const d = document.getElementById('av-drawer');
        d.style.display = d.style.display === 'grid' ? 'none' : 'grid';
    };

    window.send = () => {
        const p = document.getElementById('pilot').value.trim();
        const m = document.getElementById('msg').value.trim();
        if(!p || !m) return;
        push(ref(db, "posts"), { name: p, avatar: currentAv, msg: m, likes: 0 });
        document.getElementById('msg').value = "";
    };

    onChildAdded(ref(db, "posts"), snap => {
        const d = snap.val(); const id = snap.key;
        const div = document.createElement('div'); div.className = 'card';
        div.innerHTML = `
            <div class="card-user">${d.avatar} ${d.name}</div>
            <div class="card-msg">${d.msg}</div>
            <div class="card-actions">
                <button class="act-btn" onclick="like('${id}')">🔋 <span id="l-${id}">${d.likes||0}</span></button>
                <button class="act-btn" onclick="openR('${id}')">💬 Resp.</button>
            </div>
            <div id="t-${id}" class="reply-box"></div>
            <div id="r-${id}" style="display:none; margin-top:10px; gap:5px;">
                <input id="i-${id}" placeholder="..." style="flex:1; background:#000; border:1px solid #333; color:white; padding:5px; border-radius:10px;">
                <button onclick="sendR('${id}')" style="background:var(--cyan); border:none; padding:5px 10px; border-radius:10px;">OK</button>
            </div>
        `;
        document.getElementById('content-wrap').prepend(div);
        onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
            const r = rSnap.val();
            const n = document.createElement('div'); n.style.marginBottom = '4px';
            n.innerHTML = `<b>${r.avatar}</b> ${r.msg}`;
            document.getElementById(`t-${id}`).appendChild(n);
        });
    });

    window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
    window.openR = (id) => { const b = document.getElementById(`r-${id}`); b.style.display = b.style.display === 'flex' ? 'none' : 'flex'; };
    window.sendR = (id) => {
        const inp = document.getElementById(`i-${id}`); const p = document.getElementById('pilot').value || 'User';
        if(!inp.value.trim()) return;
        push(ref(db, `posts/${id}/replies`), { name: p, avatar: currentAv, msg: inp.value.trim() });
        inp.value = ""; document.getElementById(`r-${id}`).style.display = 'none';
    };
</script>
</body>
</html>
