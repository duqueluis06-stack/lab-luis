<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🪐 NEURO-LUIYI: NASA ELITE COMPLETE</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --dark: #000005;
            --glass: rgba(15, 20, 35, 0.9);
        }

        /* --- RESET Y BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--dark);
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column;
            color: white;
        }

        /* --- FONDO ESPACIAL INMORTAL (SVG) --- */
        #space-background {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #0a0a20 0%, #000 100%);
        }
        #space-background::after {
            content: ""; position: absolute; inset: -100%;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><circle cx="50" cy="50" r="1.2" fill="white" opacity="0.8"/><circle cx="150" cy="120" r="1" fill="white" opacity="0.5"/><circle cx="300" cy="80" r="1.5" fill="white"/><circle cx="220" cy="350" r="1.1" fill="white" opacity="0.7"/><circle cx="80" cy="280" r="1" fill="white" opacity="0.9"/><circle cx="350" cy="220" r="1.3" fill="white"/></svg>');
            background-size: 300px 300px;
            animation: rotateStars 200s linear infinite;
        }
        @keyframes rotateStars { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- PLANETAS Y NAVE --- */
        .obj { position: absolute; border-radius: 50%; z-index: 1; }
        .saturn {
            top: 10%; right: 10%; width: 80px; height: 80px;
            background: radial-gradient(circle at 30% 30%, #f9e2b0, #a17f4a);
            box-shadow: inset -10px -10px 20px #000, 0 0 30px rgba(249, 226, 176, 0.2);
            animation: float 8s ease-in-out infinite alternate;
        }
        .saturn::before {
            content: ""; position: absolute; top: 50%; left: -50%; width: 200%; height: 15px;
            border: 6px solid rgba(225, 180, 107, 0.3); border-radius: 50%;
            transform: translateY(-50%) rotateX(75deg);
        }
        .mars { top: 70%; left: 10%; width: 40px; height: 40px; background: radial-gradient(circle at 30% 30%, #ff5f5f, #7a1a1a); }
        
        .spaceship {
            position: absolute; top: 40%; left: 20%; width: 60px; z-index: 2;
            filter: drop-shadow(0 0 15px var(--cyan));
            animation: moveShip 20s linear infinite;
        }
        @keyframes moveShip { 
            0% { left: -100px; transform: scale(1) rotate(20deg); } 
            100% { left: 120%; transform: scale(1.2) rotate(-20deg); } 
        }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(20px); } }

        /* --- CABECERA --- */
        header {
            height: 70px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--cyan);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            backdrop-filter: blur(10px); z-index: 100;
        }
        header h1 { font-size: 18px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }
        
        /* BOTÓN INICIO */
        .home-btn {
            background: var(--cyan); color: #000; border: none; padding: 8px 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase;
            font-size: 12px; transition: 0.3s;
        }
        .home-btn:hover { box-shadow: 0 0 15px var(--cyan); transform: scale(1.05); }

        /* --- CONTENIDO --- */
        #feed { flex: 1; overflow-y: auto; padding: 20px 15px; z-index: 10; }
        .card {
            max-width: 600px; margin: 0 auto 20px; background: var(--glass);
            border-left: 5px solid var(--cyan); border-radius: 0 15px 15px 0;
            padding: 20px; box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .username { color: var(--cyan); font-weight: bold; font-size: 14px; }
        .message { font-size: 16px; line-height: 1.5; margin-bottom: 15px; }

        .btn-group { display: flex; gap: 20px; }
        .action { background: none; border: none; color: #888; font-size: 13px; font-weight: bold; cursor: pointer; }
        .action:hover { color: var(--cyan); }

        /* --- RESPUESTAS --- */
        .replies { margin-top: 15px; padding-left: 20px; border-left: 2px solid var(--pink); display: flex; flex-direction: column; gap: 10px; }
        .reply-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; font-size: 14px; }
        .reply-item b { color: var(--pink); }

        .reply-form { display: none; margin-top: 15px; gap: 10px; }
        .reply-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 10px; border-radius: 8px; outline: none; }

        /* --- CONSOLA DE COMANDOS --- */
        footer {
            background: #000; border-top: 2px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom));
            z-index: 1000;
        }
        .av-bar { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px solid #222; }
        .av-icon { font-size: 32px; opacity: 0.2; cursor: pointer; transition: 0.3s; }
        .av-icon.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 10px var(--cyan)); }

        .input-row { display: flex; gap: 12px; align-items: center; }
        .input-fields { flex: 1; background: #05050a; border: 1px solid #333; border-radius: 15px; padding: 12px; border-left: 4px solid var(--pink); }
        #in-id { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 13px; width: 100%; outline: none; margin-bottom: 5px; }
        #in-msg { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; }
        
        .send-btn { 
            width: 60px; height: 60px; border-radius: 20px; border: none; 
            background: linear-gradient(135deg, var(--cyan), #00aaff); color: #000; 
            font-size: 26px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="space-background">
        <div class="obj saturn"></div>
        <div class="obj mars"></div>
        <svg class="spaceship" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 25 L40 10 L80 10 L90 25 L80 40 L40 40 Z" fill="%2300ffff" opacity="0.8"/>
            <circle cx="50" cy="25" r="5" fill="white"/>
            <rect x="20" y="20" width="10" height="10" fill="%23ff00ff"/>
        </svg>
    </div>

    <header>
        <h1>NEURO LUIYI NASA</h1>
        <button class="home-btn" onclick="location.reload()">Inicio 🏠</button>
    </header>

    <main id="feed">
        <div id="mount-point"></div>
    </main>

    <footer>
        <div id="av-container" class="av-bar"></div>
        <div class="input-row">
            <div class="input-fields">
                <input id="in-id" placeholder="ID PILOTO..." maxlength="15">
                <input id="in-msg" placeholder="TRANSMITIR MENSAJE...">
            </div>
            <button class="send-btn" onclick="postear()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // -- AVATARES --
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛰️','🛸','🪐'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-icon'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-container').appendChild(el);
        });

        // -- PUBLICAR --
        window.postear = () => {
            const id = document.getElementById('in-id').value.trim();
            const msg = document.getElementById('in-msg').value.trim();
            if(!selAv || !id || !msg) return alert("Selecciona Avatar, ID y escribe algo.");
            push(ref(db, "posts"), { name: id, avatar: selAv, msg, likes: 0 });
            document.getElementById('in-msg').value = "";
        };

        // -- CARGAR POSTS --
        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const key = snap.key;
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `
                <div class="card-header"><span>${d.avatar}</span> <span class="username">@${d.name}</span></div>
                <div class="message">${d.msg}</div>
                <div class="btn-group">
                    <button class="action" onclick="darLike('${key}')">🔋 <span id="l-${key}">${d.likes || 0}</span></button>
                    <button class="action" onclick="abrirResp('${key}')">💬 COMENTAR</button>
                </div>
                <div id="thread-${key}" class="replies"></div>
                <div id="form-${key}" class="reply-form">
                    <input id="input-${key}" placeholder="Escribe...">
                    <button onclick="responder('${key}')" style="background:var(--cyan);border:none;padding:8px;border-radius:8px;">OK</button>
                </div>
            `;
            document.getElementById('mount-point').prepend(card);

            onChildAdded(ref(db, `posts/${key}/replies`), rSnap => {
                const r = rSnap.val();
                const div = document.createElement('div'); div.className = 'reply-item';
                div.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${key}`).appendChild(div);
            });
        });

        window.darLike = (k) => runTransaction(ref(db, `posts/${k}/likes`), c => (c || 0) + 1);
        window.abrirResp = (k) => { const f = document.getElementById(`form-${k}`); f.style.display = f.style.display === 'flex' ? 'none' : 'flex'; };
        window.responder = (k) => {
            const id = document.getElementById('in-id').value.trim();
            const txt = document.getElementById(`input-${k}`).value.trim();
            if(!selAv || !id || !txt) return alert("Avatar + ID requerido");
            push(ref(db, `posts/${k}/replies`), { name: id, avatar: selAv, msg: txt });
            document.getElementById(`input-${k}`).value = "";
            document.getElementById(`form-${k}`).style.display = 'none';
        };
    </script>
</body>
</html>
