<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 Foro de Experimentos – Lab Luis</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
        background: url("fondo-foro.jpg") no-repeat center center fixed;
        background-size: cover;
        background-color: #1a1a1a; /* Fallback */
    }
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: -1;
    }
    .header {
        text-align: center;
        padding: 30px;
        font-size: 35px;
        font-weight: bold;
        color: #00ffff;
        text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff;
    }
    .avatar-main {
        position: fixed;
        top: 10px;
        right: 10px;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid #00ffff;
        box-shadow: 0 0 15px #00ffff;
        z-index: 100;
    }
    .avatar-main img { width: 100%; height: 100%; object-fit: cover; }

    .box { max-width: 600px; margin: auto; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 15px; backdrop-filter: blur(5px); }
    
    /* Selector de Avatares */
    .avatar-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
    .av-opt { 
        font-size: 24px; cursor: pointer; padding: 5px; border-radius: 50%; 
        transition: 0.3s; border: 2px solid transparent; 
    }
    .av-opt:hover { transform: scale(1.2); }
    .av-opt.selected { border-color: #00ffff; background: rgba(0,255,255,0.2); }

    input, textarea {
        width: 100%; margin: 5px 0; padding: 12px; border-radius: 10px;
        border: none; box-sizing: border-box; background: rgba(255,255,255,0.9);
    }

    button {
        width: 100%; padding: 12px; border: none; border-radius: 10px;
        background: linear-gradient(90deg,#00ffff,#ff00ff);
        font-weight: bold; cursor: pointer; color: white; text-transform: uppercase;
    }

    #feed { max-width: 600px; margin: 20px auto; }
    .post {
        background: rgba(0, 0, 0, 0.7);
        margin: 15px 0; padding: 20px;
        border-radius: 15px; border-left: 4px solid #ff00ff;
        animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .user { font-weight: bold; color: #00ffff; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .msg { line-height: 1.5; color: #eee; }

    .actions { display: flex; gap: 15px; margin-top: 15px; font-size: 0.9em; }
    .like, .replyBtn { cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 4px; }
    .like:hover { color: #ff4d6d; }
    .replyBtn:hover { color: #00ffff; }

    .replyBox { display: none; margin-top: 15px; }
    .reply-list {
        margin-left: 20px; margin-top: 10px;
        border-left: 2px solid rgba(0, 255, 255, 0.3);
        padding-left: 15px;
    }
    .reply-item { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 0.9em; }
</style>
</head>

<body>

<div class="avatar-main"><img src="NeuroLuis.gif" alt="Admin"></div>
<div class="header">☎️ NeuroLuiyi Forum</div>

<div class="box">
    <div class="avatar-selector" id="selector">
        <span class="av-opt selected" onclick="selectAvatar('🐸', this)">🐸</span>
        <span class="av-opt" onclick="selectAvatar('🤖', this)">🤖</span>
        <span class="av-opt" onclick="selectAvatar('🚀', this)">🚀</span>
        <span class="av-opt" onclick="selectAvatar('🧬', this)">🧬</span>
        <span class="av-opt" onclick="selectAvatar('⚡', this)">⚡</span>
        <span class="av-opt" onclick="selectAvatar('🧠', this)">🧠</span>
    </div>
    <input id="name" placeholder="Tu apodo...">
    <textarea id="msg" rows="3" placeholder="Comparte tu experimento o duda..."></textarea>
    <button onclick="send()">Publicar en el Foro</button>
</div>

<div id="feed"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// Tu configuración se mantiene igual
firebase.initializeApp({
  databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = firebase.database();
const feed = document.getElementById("feed");
let selectedAvatar = "🐸";

function selectAvatar(emoji, el) {
    document.querySelectorAll('.av-opt').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
    selectedAvatar = emoji;
}

function send() {
    let name = document.getElementById("name").value.trim();
    let msg = document.getElementById("msg").value.trim();

    if(!name || !msg) return alert("Escribe tu nombre y mensaje");

    db.ref("posts").push({
        name: name,
        avatar: selectedAvatar,
        msg: msg,
        likes: 0,
        time: Date.now()
    });

    document.getElementById("msg").value = "";
}

// Escuchar posts
db.ref("posts").on("child_added", snap => {
    let p = snap.val();
    let id = snap.key;
    renderPost(id, p);
});

function renderPost(id, p) {
    let div = document.createElement("div");
    div.className = "post";
    div.id = "post-" + id;

    div.innerHTML = `
        <div class="user"><span>${p.avatar || "👤"}</span> ${p.name}</div>
        <div class="msg" id="text-${id}"></div>
        
        <div class="actions">
            <div class="like" onclick="like('${id}')">❤️ <span>${p.likes || 0}</span></div>
            <div class="replyBtn" onclick="toggleReply('${id}')">💬 Responder</div>
        </div>

        <div class="replyBox" id="box-${id}">
            <input id="input-${id}" placeholder="Escribe una respuesta y pulsa Enter..." 
                   onkeydown="if(event.key==='Enter') sendReply('${id}')">
        </div>

        <div class="reply-list" id="replies-${id}"></div>
    `;

    // Evitar inyección de código
    div.querySelector(`#text-${id}`).innerText = p.msg;
    feed.prepend(div);

    // Cargar respuestas existentes para este post
    loadReplies(id);
}

function like(id) {
    const postRef = db.ref("posts/" + id + "/likes");
    postRef.transaction(current => (current || 0) + 1);
}

// Actualizar likes en tiempo real
db.ref("posts").on("child_changed", snap => {
    const postDiv = document.getElementById("post-" + snap.key);
    if(postDiv) {
        postDiv.querySelector(".like span").innerText = snap.val().likes || 0;
    }
});

function toggleReply(id) {
    let box = document.getElementById("box-" + id);
    box.style.display = box.style.display === "block" ? "none" : "block";
    if(box.style.display === "block") box.querySelector('input').focus();
}

function sendReply(postId) {
    let input = document.getElementById("input-" + postId);
    let replyText = input.value.trim();
    let userName = document.getElementById("name").value.trim() || "Anónimo";

    if(!replyText) return;

    db.ref("posts/" + postId + "/replies").push({
        name: userName,
        avatar: selectedAvatar,
        msg: replyText,
        time: Date.now()
    });

    input.value = "";
}

function loadReplies(postId) {
    const replyList = document.getElementById("replies-" + postId);
    // Escuchar nuevas respuestas para este post específico
    db.ref("posts/" + postId + "/replies").on("child_added", snap => {
        let r = snap.val();
        let rDiv = document.createElement("div");
        rDiv.className = "reply-item";
        rDiv.innerHTML = `<strong>${r.avatar} ${r.name}:</strong> <span class="r-text"></span>`;
        rDiv.querySelector(".r-text").innerText = r.msg;
        replyList.appendChild(rDiv);
    });
}
</script>

</body>
</html>
