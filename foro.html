<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🪐 NEURO-LUIYI: NASA EDITION</title>
    <style>
        :root {
            --cyan: #00ffff; --pink: #ff00ff; --dark: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--dark);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- FONDO NASA INFALIBLE --- */
        .nasa-bg {
            position: fixed; inset: 0; z-index: -1;
            /* Estrellas NASA Reales mediante SVG */
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><circle cx="10" cy="10" r="1" fill="white" opacity="0.8"/><circle cx="150" cy="80" r="1.5" fill="white" opacity="0.6"/><circle cx="300" cy="200" r="1" fill="white"/><circle cx="50" cy="350" r="1.2" fill="white" opacity="0.7"/><circle cx="380" cy="380" r="1" fill="white" opacity="0.9"/><circle cx="200" cy="50" r="0.8" fill="white"/><circle cx="100" cy="250" r="1.5" fill="white" opacity="0.5"/></svg>'),
                radial-gradient(circle at center, #0a0a20 0%, #000 100%);
            background-size: 250px 250px, cover;
        }

        /* Saturno con Anillos CSS */
        .saturno {
            position: absolute; top: 12%; right: 10%; width: 100px; height: 100px;
        }
        .anillo {
            position: absolute; width: 140px; height: 40px; border: 8px solid rgba(225, 180, 107, 0.5);
            border-radius: 50%; top: 30px; left: -20px; transform: rotateX(75deg); z-index: 1;
        }
        .planeta-bola {
            position: absolute; width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f9e2b0, #a17f4a);
            top: 20px; left: 20px; z-index: 2; box-shadow: 0 0 20px rgba(249, 226, 176, 0.3);
        }

        /* Luna */
        .luna {
            position: absolute; bottom: -50px; left: -50px; width: 180px; height: 180px;
            background: radial-gradient(circle at 70% 30%, #666, #111);
            border-radius: 50%; opacity: 0.6;
        }

        /* --- INTERFAZ --- */
        .header {
            height: 70px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; z-index: 100;
        }
        .logo h1 { font-size: 16px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }
        .profile-gif { width: 45px; height: 45px; border: 2px solid var(--cyan); border-radius: 8px; }

        #stream { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .post {
            max-width: 500px; margin: 0 auto 15px; background: rgba(15, 15, 35, 0.85);
            border-left: 4px solid var(--cyan); border-radius: 0 12px 12px 0; padding: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .user-row { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(0,255,255,0.2); padding-bottom: 8px; margin-bottom: 10px; }
        .id-tag { color: var(--cyan); font-weight: bold; font-size: 13px; }
        .msg-text { font-size: 15px; color: #fff; line-height: 1.5; padding-bottom: 8px; border-bottom: 1px solid rgba(255,0,255,0.1); }

        /* --- CONSOLA --- */
        .console {
            background: #000; border-top: 2px solid var(--cyan);
            padding: 10px 15px calc(25px + env(safe-area-inset-bottom)); z-index: 2000;
        }
        .av-selector { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #222; }
        .av-icon { font-size: 28px; opacity: 0.3; cursor: pointer; transition: 0.3s; }
        .av-icon.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 8px var(--cyan)); }

        .input-box { display: flex; gap: 10px; align-items: center; }
        .field-wrap { flex: 1; background: #05050a; border: 1px solid #333; border-radius: 12px; padding: 8px; border-left: 3px solid var(--pink); }
        #p-name { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 12px; width: 100%; margin-bottom: 4px; outline: none; }
        #m-text { background: none; border: none; color: #fff; font-size: 14px; width: 100%; outline: none; }
        
        .btn-send { width: 50px; height: 50px; border-radius: 12px; border: none; background: var(--cyan); color: #000; font-size: 22px; cursor: pointer; box-shadow: 0 0 10px var(--cyan); }
        .rep-form { display: none; margin-top: 10px; gap: 8px; }
        .rep-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="nasa-bg">
        <div class="saturno">
            <div class="anillo"></div>
            <div class="planeta-bola"></div>
        </div>
        <div class="luna"></div>
    </div>

    <header class="header">
        <div class="logo"><h1>NEURO LUIYI</h1></div>
        <img src="NeuroLuis.gif" class="profile-gif" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="stream"><div id="container"></div></main>

    <footer class="console">
        <div id="av-list" class="av-selector"></div>
        <div class="input-box">
            <div class="field-wrap">
                <input id="p-name" placeholder="ID PILOTO..." maxlength="12">
                <input id="m-text" placeholder="TRANSMISIÓN...">
            </div>
            <button class="btn-send" onclick="enviar()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Selector Avatares
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-icon'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-list').appendChild(el);
        });

        // VALIDACIÓN OBLIGATORIA
        const validar = (idInput) => {
            const id = document.getElementById(idInput).value.trim();
            if (!selAv || !id) { alert("¡ACCESO DENEGADO! Primero selecciona tu AVATAR e ingresa tu ID de Piloto abajo."); return false; }
            return { id, avatar: selAv };
        };

        window.enviar = () => {
            const user = validar('p-name');
            const m = document.getElementById('m-text').value.trim();
            if(!user || !m) return;
            push(ref(db, "posts"), { name: user.id, avatar: user.avatar, msg: m, likes: 0 });
            document.getElementById('m-text').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const id = snap.key;
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div class="user-row"><span>${d.avatar}</span> <span class="id-tag">@${d.name}</span></div>
                <div class="msg-text">${d.msg}</div>
                <div class="actions">
                    <button style="color:#888; background:none; border:none;" onclick="like('${id}')">🔋 <span id="l-${id}">${d.likes || 0}</span></button>
                    <button style="color:#888; background:none; border:none;" onclick="toggleR('${id}')">💬 RESPONDER</button>
                </div>
                <div id="thread-${id}" style="margin-top:10px; padding-left:12px; border-left:1px dashed var(--pink); font-size:13px; color:#ccc;"></div>
                <div id="box-${id}" class="rep-form">
                    <input id="in-${id}" placeholder="Escribe tu respuesta...">
                    <button onclick="sendR('${id}')" style="background:var(--cyan); border:none; padding:5px 10px; border-radius:8px; font-weight:bold;">OK</button>
                </div>
            `;
            document.getElementById('container').prepend(div);
            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleR = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        
        window.sendR = (id) => {
            const user = validar('p-name');
            const i = document.getElementById(`in-${id}`);
            if(!user || !i.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name: user.id, avatar: user.avatar, msg: i.value.trim() });
            i.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
