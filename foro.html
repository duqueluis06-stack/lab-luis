<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neurus-Luiyi Forum</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    background: #111;
}

/* GIF */
.gif-box {
    text-align: center;
    padding: 10px;
}

.gif-box img {
    width: 90px;
    border-radius: 10px;
}

.gif-box p {
    margin: 5px 0 0 0;
    color: #00ffcc;
    font-size: 12px;
}

/* LOGIN */
.login {
    text-align: center;
    padding: 10px;
}

input, select {
    padding: 8px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

/* POST INPUT */
textarea {
    width: 90%;
    max-width: 500px;
    height: 80px;
    border-radius: 10px;
    border: none;
    padding: 10px;
}

/* POSTS */
.post {
    width: 90%;
    max-width: 500px;
    margin: 10px auto;
    padding: 10px;
    background: #1a1a1a;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,255,255,0.15);
}

/* BUTTONS */
button {
    padding: 6px 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #222;
    color: white;
}

button:hover {
    background: #00ffcc;
    color: black;
}

/* TITLE */
.title {
    color: #00ffcc;
    font-weight: bold;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="title">⚡ Neurus-Luiyi Forum</div>

    <div>
        <button onclick="location.reload()">⬅ Inicio</button>
        <button onclick="logout()">🚪 Salir</button>
    </div>
</div>

<!-- GIF -->
<div class="gif-box">
    <img src="NeuroLuis.gif" alt="gif">
    <p>Laboratorio de ideas en tiempo real</p>
</div>

<!-- LOGIN -->
<div class="login">
    <input id="username" placeholder="Tu nombre">

    <select id="avatar">
        <option value="👤">👤 Humano</option>
        <option value="🧠">🧠 Cerebro</option>
        <option value="⚡">⚡ Energía</option>
        <option value="🤖">🤖 Robot</option>
        <option value="🔬">🔬 Ciencia</option>
    </select>

    <button onclick="setUser()">Entrar</button>
</div>

<!-- POST INPUT -->
<div style="text-align:center">
    <textarea id="text" placeholder="Escribe algo..."></textarea>
    <br>
    <button onclick="sendPost()">Publicar</button>
</div>

<!-- POSTS -->
<div id="posts"></div>

<script>

let currentUser = localStorage.getItem("user");
let currentAvatar = localStorage.getItem("avatar") || "👤";

/* SET USER */
function setUser() {
    const name = document.getElementById("username").value;
    const avatar = document.getElementById("avatar").value;

    if(!name) return;

    currentUser = name;
    currentAvatar = avatar;

    localStorage.setItem("user", currentUser);
    localStorage.setItem("avatar", currentAvatar);

    alert("Activo: " + currentAvatar + " " + currentUser);
}

/* SEND POST */
function sendPost() {
    const text = document.getElementById("text").value;

    if(!text || !currentUser) return;

    const post = {
        user: currentUser,
        avatar: currentAvatar,
        text: text,
        time: Date.now()
    };

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts.unshift(post);
    localStorage.setItem("posts", JSON.stringify(posts));

    renderPosts();

    document.getElementById("text").value = "";
}

/* RENDER POSTS */
function renderPosts(){
    const container = document.getElementById("posts");
    container.innerHTML = "";

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts.forEach(p => {
        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <b>${p.avatar} ${p.user}</b>
            <p>${p.text}</p>
        `;

        container.appendChild(div);
    });
}

/* LOGOUT */
function logout() {
    localStorage.clear();
    location.reload();
}

/* INIT */
window.onload = () => {
    if(currentUser){
        document.getElementById("username").value = currentUser;
    }
    renderPosts();
};

</script>

</body>
</html>
