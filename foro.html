<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🚀 NEURO-LUIYI: NASA VERTIGO EDITION</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --dark: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--dark);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- MOTOR DE UNIVERSO VERTIGINOSO --- */
        #nasa-engine {
            position: fixed; inset: 0; z-index: -1;
            background: url('https://www.nasa.gov/wp-content/uploads/2023/03/main_image_star-forming_region_carina_nebula_ngc_3324_final-1280.jpg') center/cover no-repeat;
            overflow: hidden;
        }

        /* Capas de Estrellas (Inmersión) */
        .stars-layer {
            position: absolute; inset: -100%;
            background-image: 
                radial-gradient(1px 1px at 25% 35%, #fff, transparent),
                radial-gradient(2px 2px at 50% 50%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 75% 85%, #fff, transparent),
                radial-gradient(2px 2px at 15% 70%, #fff, transparent);
            background-size: 300px 300px;
            opacity: 0.8;
        }

        .layer-1 { animation: vertigo 120s linear infinite; }
        .layer-2 { animation: vertigo 80s linear infinite reverse; opacity: 0.5; background-size: 400px 400px; }
        .layer-3 { animation: vertigo 40s linear infinite; opacity: 0.3; background-size: 200px 200px; }

        @keyframes vertigo {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(10deg) scale(1.5); }
        }

        /* Saturno con Anillos Mejorado */
        .saturn-box {
            position: absolute; top: 15%; right: 8%; width: 100px; height: 100px;
            animation: float 6s ease-in-out infinite alternate;
            z-index: 5;
        }
        .saturn-body {
            width: 50px; height: 50px; background: radial-gradient(circle at 30% 30%, #f9e2b0, #a17f4a);
            border-radius: 50%; box-shadow: inset -10px -10px 20px #000, 0 0 30px rgba(249, 226, 176, 0.4);
            position: relative; z-index: 2;
        }
        .saturn-rings {
            position: absolute; width: 120px; height: 30px; border: 6px solid rgba(225, 180, 107, 0.5);
            border-radius: 50%; top: 15px; left: -35px; transform: rotateX(75deg); z-index: 1;
        }

        @keyframes float { from { transform: translate(0,0) rotate(-10deg); } to { transform: translate(10px, 20px) rotate(-5deg); } }

        /* --- INTERFAZ ELITE --- */
        .header {
            height: 70px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; z-index: 100;
        }
        .header h1 { font-size: 18px; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); letter-spacing: 2px; }

        #feed { flex: 1; overflow-y: auto; padding: 20px 15px; z-index: 10; }
        .post {
            max-width: 550px; margin: 0 auto 20px; background: rgba(10, 15, 30, 0.9);
            border-left: 5px solid var(--cyan); border-radius: 0 15px 15px 0; padding: 20px; 
            box-shadow: 10px 10px 30px rgba(0,0,0,0.8);
        }
        
        .u-line { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border-bottom: 1px solid rgba(0,255,255,0.2); padding-bottom: 8px; }
        .u-id { color: var(--cyan); font-weight: bold; font-size: 14px; }
        .u-msg { font-size: 16px; color: #fff; line-height: 1.5; }

        /* --- CONSOLA --- */
        .console {
            background: #000; border-top: 2px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom)); z-index: 200;
        }
        .av-bar { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid #222; }
        .av-item { font-size: 30px; opacity: 0.2; cursor: pointer; }
        .av-item.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 10px var(--cyan)); }

        .in-wrap { display: flex; gap: 12px; align-items: center; }
        .text-group { flex: 1; background: #05050a; border: 1px solid #333; border-radius: 15px; padding: 10px; border-left: 4px solid var(--pink); }
        #in-id { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 13px; width: 100%; outline: none; }
        #in-msg { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; margin-top: 5px; }
        
        .btn-send { width: 60px; height: 60px; border-radius: 18px; border: none; background: var(--cyan); color: #000; font-size: 26px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="nasa-engine">
        <div class="stars-layer layer-1"></div>
        <div class="stars-layer layer-2"></div>
        <div class="stars-layer layer-3"></div>
        <div class="saturn-box">
            <div class="saturn-rings"></div>
            <div class="saturn-body"></div>
        </div>
    </div>

    <header class="header">
        <h1>NEURO LUIYI NASA</h1>
        <img src="NeuroLuis.gif" style="width:45px; border-radius:8px; border:2px solid var(--cyan)" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="feed"><div id="mount"></div></main>

    <footer class="console">
        <div id="av-list" class="av-bar"></div>
        <div class="in-wrap">
            <div class="text-group">
                <input id="in-id" placeholder="ID PILOTO..." maxlength="15">
                <input id="in-msg" placeholder="ENVIAR TRANSMISIÓN...">
            </div>
            <button class="btn-send" onclick="enviar()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- AVATARES ---
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-item'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-item').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-list').appendChild(el);
        });

        const check = () => {
            const id = document.getElementById('in-id').value.trim();
            if (!selAv || !id) { alert("⚠️ IDENTIFICACIÓN NECESARIA"); return null; }
            return { id, av: selAv };
        };

        window.enviar = () => {
            const u = check(); const m = document.getElementById('in-msg').value.trim();
            if(!u || !m) return;
            push(ref(db, "posts"), { name: u.id, avatar: u.av, msg: m, likes: 0 });
            document.getElementById('in-msg').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const key = snap.key;
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div class="u-line"><span>${d.avatar}</span> <span class="u-id">@${d.name}</span></div>
                <div class="u-msg">${d.msg}</div>
                <div style="margin-top:10px; display:flex; gap:20px">
                    <button style="background:none; border:none; color:#888; font-weight:bold;" onclick="like('${key}')">🔋 <span id="l-${key}">${d.likes || 0}</span></button>
                </div>
            `;
            document.getElementById('mount').prepend(div);
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
    </script>
</body>
</html>
