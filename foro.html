<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Foro - Lab Luis</title>

<style>

body {
    margin:0;
    font-family: Arial;
    background: url('fondo-foro.jpg') no-repeat center center fixed;
    background-size: cover;
    color:#00ffe0;
}

/* Overlay */
.overlay {
    background: rgba(0,0,0,0.75);
    min-height:100vh;
    padding:20px;
}

/* HEADER SUPERIOR */
.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.top-bar a {
    color:#00ffcc;
    text-decoration:none;
    border:2px solid #00ffcc;
    padding:8px 15px;
    border-radius:6px;
    transition:0.3s;
}

.top-bar a:hover {
    color:#ff00ff;
    border-color:#ff00ff;
}

/* CARITA */
.carita {
    position:fixed;
    top:15px;
    right:15px;
    width:70px;
    height:70px;
    background:#ff00ff;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 15px #ff00ff,0 0 30px #00ffff;
}

.ojo {
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    margin:2px;
    position:relative;
}

.pupila {
    width:6px;
    height:6px;
    background:black;
    border-radius:50%;
    position:absolute;
    top:3px;
    left:3px;
}

.boca {
    width:25px;
    height:8px;
    border-bottom:3px solid black;
}

/* TITULO */
h1 {
    text-align:center;
    text-shadow:0 0 10px #00ffff;
}

/* CONTENEDOR */
.container {
    max-width:700px;
    margin:auto;
}

/* FORMULARIO */
.form-box {
    background:rgba(0,0,0,0.8);
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 15px #00ffff;
}

input, textarea {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background:#00ffff;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    background:#00bfff;
}

/* COMENTARIOS */
.comment-box {
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="overlay">

    <!-- BARRA SUPERIOR -->
    <div class="top-bar">
        <a href="index.html">⬅ Volver</a>
        <a href="index.html">✖ Salir</a>
    </div>

    <!-- CARITA -->
    <div class="carita">
        <div style="display:flex;">
            <div class="ojo"><div class="pupila"></div></div>
            <div class="ojo"><div class="pupila"></div></div>
        </div>
        <div class="boca"></div>
    </div>

    <h1>💬 Foro Experimental</h1>

    <div class="container">

        <div class="form-box">
            <input type="text" id="nombre" placeholder="Tu nombre">
            <textarea id="mensaje" rows="4" placeholder="Mensaje..."></textarea>
            <button onclick="agregarComentario()">Enviar</button>
        </div>

        <div id="comentarios"></div>

    </div>

</div>

<script>

/* CARITA ANIMADA */
document.addEventListener('mousemove', e => {
  document.querySelectorAll('.pupila').forEach(p => {
    const r = p.parentElement.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width/2);
    const dy = e.clientY - (r.top + r.height/2);
    const ang = Math.atan2(dy, dx);
    p.style.transform = `translate(${Math.cos(ang)*4}px, ${Math.sin(ang)*4}px)`;
  });

  const boca = document.querySelector('.boca');
  const t = Date.now();
  boca.style.borderBottomColor = (Math.floor(t/500)%2) ? "#000" : "#00ffff";
});

/* COMENTARIOS */
function agregarComentario(){

    let nombre = document.getElementById("nombre").value;
    let mensaje = document.getElementById("mensaje").value;

    if(nombre==="" || mensaje===""){
        alert("Completa los campos");
        return;
    }

    let contenedor = document.getElementById("comentarios");

    let nuevo = document.createElement("div");
    nuevo.className="comment-box";

    nuevo.innerHTML = "<strong>"+nombre+":</strong><br>"+mensaje;

    contenedor.prepend(nuevo);

    document.getElementById("nombre").value="";
    document.getElementById("mensaje").value="";
}

</script>

</body>
</html>
