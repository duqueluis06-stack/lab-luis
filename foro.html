<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🚀 NEURO-LUIYI LAB: NASA FINAL</title>
    <style>
        :root {
            --cyan: #00ffff; --pink: #ff00ff; --dark: #000002;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--dark);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- FONDO NASA DEEP SPACE (NUEVO) --- */
        #nasa-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a0b1e 0%, #000 100%);
        }
        /* Nebulosa animada */
        #nasa-bg::before {
            content: ""; position: absolute; inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.05) 0%, transparent 50%);
            filter: blur(50px);
            animation: nebulaPulse 10s ease-in-out infinite alternate;
        }
        @keyframes nebulaPulse { from { opacity: 0.4; } to { opacity: 0.8; } }

        .star-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,0) 2px),
                radial-gradient(white, rgba(255,255,255,0) 1px);
            background-size: 250px 250px, 150px 150px;
            background-position: 0 0, 40px 60px;
            animation: starScroll 100s linear infinite;
            opacity: 0.4;
        }
        @keyframes starScroll { from { background-position: 0 0; } to { background-position: 0 1000px; } }

        /* --- RESTO DEL DISEÑO (PARÁMETROS ESTABLES) --- */
        .header {
            height: 75px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; z-index: 100; flex-shrink: 0;
        }
        .logo h1 { font-size: 16px; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); letter-spacing: 2px; }
        .profile-gif { width: 50px; height: 50px; border: 2px solid var(--cyan); border-radius: 10px; object-fit: cover; }

        #stream { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .post {
            max-width: 550px; margin: 0 auto 15px; background: rgba(255, 255, 255, 0.05);
            border-left: 5px solid var(--cyan); border-radius: 0 15px 15px 0; padding: 15px; 
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            border-top: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1);
        }
        
        .user-row { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(0,255,255,0.2); padding-bottom: 8px; margin-bottom: 10px; }
        .id-tag { color: var(--cyan); font-weight: bold; font-size: 14px; }
        .msg-text { font-size: 16px; color: #fff; line-height: 1.5; padding-bottom: 8px; border-bottom: 1px solid rgba(255,0,255,0.2); }

        .console {
            background: #000; border-top: 2px solid var(--cyan);
            padding: 10px 15px calc(25px + env(safe-area-inset-bottom)); z-index: 2000; flex-shrink: 0;
        }
        .av-selector { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .av-icon { font-size: 28px; opacity: 0.2; cursor: pointer; transition: 0.3s; }
        .av-icon.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 10px var(--cyan)); }

        .input-box { display: flex; gap: 10px; align-items: center; }
        .field-wrap { flex: 1; background: #0a0a0f; border: 1px solid #333; border-radius: 12px; padding: 8px; border-left: 3px solid var(--pink); }
        #p-name { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 12px; width: 100%; margin-bottom: 4px; outline: none; }
        #m-text { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; }
        
        .btn-send { width: 50px; height: 50px; border-radius: 12px; border: none; background: var(--cyan); color: #000; font-size: 22px; cursor: pointer; }
        .rep-form { display: none; margin-top: 10px; gap: 8px; }
        .rep-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="nasa-bg"><div class="star-layer"></div></div>

    <header class="header">
        <div class="logo"><h1>NEURO LUIYI</h1></div>
        <img src="NeuroLuis.gif" class="profile-gif" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="stream"><div id="container"></div></main>

    <footer class="console">
        <div id="av-list" class="av-selector"></div>
        <div class="input-box">
            <div class="field-wrap">
                <input id="p-name" placeholder="ID PILOTO..." maxlength="12">
                <input id="m-text" placeholder="TRANSMISIÓN...">
            </div>
            <button class="btn-send" onclick="enviar()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Selector Avatares
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-icon'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-list').appendChild(el);
        });

        const validar = (idIn) => {
            const id = document.getElementById(idIn).value.trim();
            if (!selAv || !id) { alert("ERROR: Selecciona Avatar e ingresa ID de Piloto."); return false; }
            return { id, avatar: selAv };
        };

        window.enviar = () => {
            const u = validar('p-name');
            const m = document.getElementById('m-text').value.trim();
            if(!u || !m) return;
            push(ref(db, "posts"), { name: u.id, avatar: u.avatar, msg: m, likes: 0 });
            document.getElementById('m-text').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const id = snap.key;
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div class="user-row"><span>${d.avatar}</span> <span class="id-tag">@${d.name}</span></div>
                <div class="msg-text">${d.msg}</div>
                <div class="actions">
                    <button class="btn-act" onclick="like('${id}')">🔋 <span id="l-${id}">${d.likes || 0}</span></button>
                    <button class="btn-act" onclick="toggleR('${id}')">💬 RESPONDER</button>
                </div>
                <div id="thread-${id}" style="margin-top:10px; padding-left:12px; border-left:1px dashed var(--pink); font-size:13px; color:#ccc;"></div>
                <div id="box-${id}" class="rep-form">
                    <input id="in-${id}" placeholder="Tu respuesta...">
                    <button onclick="sendR('${id}')" style="background:var(--cyan); border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">OK</button>
                </div>
            `;
            document.getElementById('container').prepend(div);
            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleR = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        window.sendR = (id) => {
            const u = validar('p-name');
            const i = document.getElementById(`in-${id}`);
            if(!u || !i.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name: u.id, avatar: u.avatar, msg: i.value.trim() });
            i.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
