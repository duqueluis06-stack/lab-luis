<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ NEURO-PRO LAB V2</title>
    <style>
        :root {
            --cyan: #00ffff; --pink: #ff00ff; --dark: #050508;
            --glass: rgba(10, 12, 20, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--dark);
            color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- FONDO --- */
        #space { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 50% 50%, #0a0a15, #000); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: move 15s linear infinite; }
        @keyframes move { from { transform: translateY(-100vh); } to { transform: translateY(100vh); } }

        /* --- HEADER --- */
        .header-pro {
            height: 65px; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; z-index: 1000; flex-shrink: 0;
        }
        .logo-text { font-size: 16px; letter-spacing: 2px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); font-weight: 900; margin: 0; }
        .gif-pro { width: 45px; height: 45px; border-radius: 8px; border: 1px solid var(--cyan); box-shadow: 0 0 10px var(--cyan); }
        .exit-btn { text-decoration: none; color: #ff4444; font-size: 10px; border: 1px solid #ff4444; padding: 4px 8px; border-radius: 4px; font-weight: bold; }

        /* --- FEED --- */
        #stream { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 160px; }
        .card {
            max-width: 550px; margin: 0 auto 15px auto; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2); border-left: 4px solid var(--cyan);
            border-radius: 4px 12px 12px 4px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .card-user { font-size: 13px; color: var(--cyan); font-weight: bold; margin-bottom: 5px; }
        .card-msg { font-size: 15px; color: #eef; line-height: 1.4; }

        .card-actions { display: flex; gap: 15px; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }
        .act-btn { background: none; border: none; color: #888; font-size: 11px; cursor: pointer; }
        .reply-box { margin-top: 8px; padding-left: 10px; border-left: 1px solid var(--pink); font-size: 13px; color: #bbb; }

        /* --- CONSOLA DE COMANDOS (REESTRUCTURADA) --- */
        .console {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #08080a; border-top: 2px solid var(--cyan);
            padding: 10px 15px 30px 15px; z-index: 2000;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.9);
        }

        /* Selector de avatares */
        .av-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; scrollbar-width: none; }
        .av-row::-webkit-scrollbar { display: none; }
        .av-item { font-size: 24px; cursor: pointer; opacity: 0.3; transition: 0.3s; flex-shrink: 0; }
        .av-item.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 5px var(--cyan)); }

        /* Contenedor de Input */
        .input-master { background: #121218; border: 1px solid #333; border-radius: 12px; padding: 8px 12px; border-left: 3px solid var(--pink); }
        .pilot-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #pilot-id { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 12px; width: 60%; }
        
        .msg-row { display: flex; gap: 10px; align-items: center; }
        #msg-input { background: none; border: none; color: #fff; flex: 1; font-size: 15px; padding: 5px 0; }
        
        .send-warp { 
            background: var(--cyan); color: #000; border: none; 
            width: 40px; height: 40px; border-radius: 10px; 
            cursor: pointer; font-size: 18px; font-weight: bold;
            box-shadow: 0 0 10px var(--cyan); flex-shrink: 0;
        }
        .send-warp:active { transform: scale(0.9); }

        /* Respuestas */
        .rep-form { display: none; margin-top: 10px; gap: 5px; }
        .rep-form input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 6px; }

        @media (max-width: 600px) {
            .card { width: 95%; }
            .console { padding-bottom: 20px; }
        }
    </style>
</head>
<body>

<div id="space"></div>

<header class="header-pro">
    <a href="index.html" class="exit-btn">SALIR</a>
    <h1 class="logo-text">NEURO-LUIYI LAB</h1>
    <img src="NeuroLuis.gif" class="gif-pro" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
</header>

<main id="stream">
    <div id="flow" style="max-width: 550px; margin: auto;"></div>
</main>

<footer class="console">
    <div id="av-list" class="av-row"></div>
    
    <div class="input-master">
        <div class="pilot-row">
            <input id="pilot-id" placeholder="TU ID PILOTO..." maxlength="12">
            <span style="font-size: 9px; color: #555;">SYSTEM: ACTIVE</span>
        </div>
        <div class="msg-row">
            <input id="msg-input" placeholder="Escribir transmisión...">
            <button class="send-warp" onclick="transmitir()">🚀</button>
        </div>
    </div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
        authDomain: "foro-luiyi.firebaseapp.com",
        databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "foro-luiyi",
        storageBucket: "foro-luiyi.firebasestorage.app",
        messagingSenderId: "410471993147",
        appId: "1:410471993147:web:d672952aa8a4364d48f11e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Fondo Estrellas
    const space = document.getElementById('space');
    for(let i=0; i<50; i++){
        const s = document.createElement('div'); s.className = 'star';
        const size = Math.random()*3+'px'; s.style.width=size; s.style.height=size;
        s.style.left=Math.random()*100+'vw'; s.style.top=Math.random()*100+'vh';
        s.style.animationDuration=(Math.random()*10+5)+'s'; space.appendChild(s);
    }

    // Gestión de Avatares
    const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','💎','🌌'];
    let selAv = icons[0];
    const avList = document.getElementById('av-list');
    icons.forEach(i => {
        const span = document.createElement('span'); span.className = 'av-item' + (i===selAv?' active':'');
        span.innerText = i; span.onclick = () => {
            document.querySelectorAll('.av-item').forEach(item => item.classList.remove('active'));
            span.classList.add('active'); selAv = i;
        };
        avList.appendChild(span);
    });

    window.transmitir = () => {
        const p = document.getElementById('pilot-id').value.trim();
        const m = document.getElementById('msg-input').value.trim();
        if(!p || !m) return;
        push(ref(db, "posts"), { name: p, avatar: selAv, msg: m, likes: 0 });
        document.getElementById('msg-input').value = "";
    };

    onChildAdded(ref(db, "posts"), snap => {
        const d = snap.val(); const id = snap.key;
        const div = document.createElement('div'); div.className = 'card';
        div.innerHTML = `
            <div class="card-user">${d.avatar} @${d.name}</div>
            <div class="card-msg">${d.msg}</div>
            <div class="card-actions">
                <button class="act-btn" onclick="like('${id}')">🔋 <span id="l-${id}">${d.likes||0}</span></button>
                <button class="act-btn" onclick="toggleR('${id}')">💬 RESPONDER</button>
            </div>
            <div id="t-${id}" class="reply-box"></div>
            <div id="f-${id}" class="rep-form">
                <input id="i-${id}" placeholder="Tu respuesta...">
                <button onclick="sendR('${id}')" style="background:var(--cyan); border:none; border-radius:5px; padding:0 10px; font-weight:bold;">OK</button>
            </div>
        `;
        document.getElementById('flow').prepend(div);
        onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
            const r = rSnap.val();
            const n = document.createElement('div'); n.style.marginBottom = '5px';
            n.innerHTML = `<b style="color:var(--cyan)">${r.avatar}</b> ${r.msg}`;
            document.getElementById(`t-${id}`).appendChild(n);
        });
    });

    window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
    window.toggleR = (id) => { const f = document.getElementById(`f-${id}`); f.style.display = f.style.display === 'flex' ? 'none' : 'flex'; };
    window.sendR = (id) => {
        const inp = document.getElementById(`i-${id}`); const p = document.getElementById('pilot-id').value || 'PILOT';
        if(!inp.value.trim()) return;
        push(ref(db, `posts/${id}/replies`), { name: p, avatar: selAv, msg: inp.value.trim() });
        inp.value = ""; document.getElementById(`f-${id}`).style.display = 'none';
    };
</script>
</body>
</html>
