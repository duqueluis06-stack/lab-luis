<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💎 NEURO-LUIYI LAB: FINAL EDITION</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --dark: #020205;
            --line: rgba(0, 255, 255, 0.2);
        }

        /* RESET TOTAL */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- FONDO ESTRELLADO ANIMADO --- */
        #star-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%);
        }
        .star {
            position: absolute; background: white; border-radius: 50%; opacity: 0.5;
            animation: moveStar linear infinite;
        }
        @keyframes moveStar {
            from { transform: translateY(-100vh); }
            to { transform: translateY(100vh); }
        }

        /* --- HEADER BLINDADO --- */
        .header {
            height: 75px; background: rgba(5, 5, 10, 0.9); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; z-index: 100; flex-shrink: 0;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }
        .exit { color: #ff3333; text-decoration: none; font-size: 11px; border: 1px solid #ff3333; padding: 4px 10px; border-radius: 4px; font-weight: bold; }
        .logo h1 { font-size: 15px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; margin: 0; }
        .profile-gif { width: 48px; height: 48px; border: 2px solid var(--cyan); border-radius: 8px; box-shadow: 0 0 10px var(--cyan); object-fit: cover; }

        /* --- FEED DE COMENTARIOS --- */
        #stream { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .post {
            max-width: 550px; margin: 0 auto 20px; background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 255, 255, 0.15); border-left: 4px solid var(--cyan);
            border-radius: 0 15px 15px 0; padding: 18px; box-shadow: 8px 8px 20px rgba(0,0,0,0.6);
        }
        
        /* SEPARACIONES NEÓN INTERNAS */
        .user-row { 
            display: flex; align-items: center; gap: 10px; 
            border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 10px; 
        }
        .av-tag { font-size: 20px; }
        .id-tag { color: var(--cyan); font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .msg-text { 
            font-size: 16px; color: #f0f0f0; line-height: 1.5; 
            padding-bottom: 10px; border-bottom: 1px solid rgba(255, 0, 255, 0.15);
        }

        .actions { display: flex; gap: 20px; margin-top: 12px; }
        .btn-act { background: none; border: none; color: #888; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .btn-act:hover { color: var(--cyan); }

        /* --- CONSOLA DE MANDOS (SAFARI OPTIMIZED) --- */
        .console {
            background: rgba(5, 5, 8, 0.98); border-top: 2px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom)); 
            z-index: 2000; flex-shrink: 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.9);
        }
        .av-selector { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 12px; border-bottom: 1px solid #222; margin-bottom: 12px; scrollbar-width: none; }
        .av-selector::-webkit-scrollbar { display: none; }
        .av-icon { font-size: 28px; opacity: 0.3; transition: 0.3s; cursor: pointer; flex-shrink: 0; }
        .av-icon.active { opacity: 1; transform: scale(1.25); filter: drop-shadow(0 0 10px var(--cyan)); }

        .input-box { display: flex; gap: 12px; align-items: center; }
        .field-wrap { flex: 1; background: #0a0a0f; border: 1px solid #333; border-radius: 18px; padding: 10px 15px; border-left: 3px solid var(--pink); }
        #p-name { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 12px; width: 100%; border-bottom: 1px solid #1a1a1a; margin-bottom: 6px; outline: none; letter-spacing: 1px; }
        #m-text { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; }
        
        .btn-send { 
            width: 50px; height: 50px; border-radius: 15px; border: none; 
            background: linear-gradient(45deg, var(--cyan), #0088ff); 
            color: #000; font-size: 22px; box-shadow: 0 0 15px var(--cyan);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .rep-form { display: none; margin-top: 10px; gap: 8px; }
        .rep-form input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; }

        @media (max-width: 600px) {
            .post { width: 95%; border-radius: 0 15px 15px 0; }
        }
    </style>
</head>
<body>

    <div id="star-canvas"></div>

    <header class="header">
        <a href="index.html" class="exit">SALIR</a>
        <div class="logo"><h1>NEURO LUIYI</h1></div>
        <img src="NeuroLuis.gif" class="profile-gif" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="stream">
        <div id="container"></div>
    </main>

    <footer class="console">
        <div id="av-list" class="av-selector"></div>
        <div class="input-box">
            <div class="field-wrap">
                <input id="p-name" placeholder="ID PILOTO..." maxlength="12">
                <input id="m-text" placeholder="Transmisión de mensaje...">
            </div>
            <button class="btn-send" onclick="enviar()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Generar Estrellas (Fondo de lujo)
        const canvas = document.getElementById('star-canvas');
        for(let i=0; i<60; i++) {
            const s = document.createElement('div'); s.className = 'star';
            const size = Math.random()*3+'px';
            s.style.width = s.style.height = size;
            s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
            s.style.animationDuration = (Math.random()*12+6)+'s'; canvas.appendChild(s);
        }

        // Selector Avatares
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','💎','🪐'];
        let selAv = null;
        const avList = document.getElementById('av-list');
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-icon'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            avList.appendChild(el);
        });

        window.enviar = () => {
            const n = document.getElementById('p-name').value.trim();
            const m = document.getElementById('m-text').value.trim();
            if(!selAv) { alert("Selecciona tu Avatar."); return; }
            if(!n) { alert("Escribe tu ID."); return; }
            if(!m) return;
            push(ref(db, "posts"), { name: n, avatar: selAv, msg: m, likes: 0 });
            document.getElementById('m-text').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const id = snap.key;
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div class="user-row"><span class="av-tag">${d.avatar}</span> <span class="id-tag">@${d.name}</span></div>
                <div class="msg-text">${d.msg}</div>
                <div class="actions">
                    <button class="btn-act" onclick="like('${id}')">🔋 <span id="l-${id}">${d.likes || 0}</span></button>
                    <button class="btn-act" onclick="toggleR('${id}')">💬 RESPONDER</button>
                </div>
                <div id="thread-${id}" style="margin-top:10px; padding-left:12px; border-left:1px dashed var(--pink); font-size:13px; color:#ccc;"></div>
                <div id="box-${id}" class="rep-form" style="display:none; margin-top:10px; gap:8px;">
                    <input id="in-${id}" placeholder="Tu respuesta...">
                    <button onclick="sendR('${id}')" style="background:var(--cyan); border:none; padding:8px 15px; border-radius:8px; font-weight:bold; color:#000;">OK</button>
                </div>
            `;
            document.getElementById('container').prepend(div);

            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.style.marginBottom = '6px';
                node.innerHTML = `<b style="color:var(--cyan)">${r.avatar}</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleR = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        window.sendR = (id) => {
            const i = document.getElementById(`in-${id}`); if(!i.value.trim()) return;
            const pilot = document.getElementById('p-name').value || 'User';
            push(ref(db, `posts/${id}/replies`), { name: pilot, avatar: selAv||'👤', msg: i.value.trim() });
            i.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
