<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroLuiyi Feed Cyber</title>

<style>

body {
    margin:0;
    font-family: Arial;
    color:white;

    background-image: url("./fondo-foro.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

/* 🌫 overlay para contraste */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    z-index:-1;
}

/* HEADER */
.header {
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    background: linear-gradient(90deg,#ff00ff,#00ffff,#ff8800);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* AVATAR */
.avatar {
    position:fixed;
    top:10px;
    right:10px;
    width:90px;
    height:90px;
    border-radius:12px;
    border:2px solid #00ffff;
    box-shadow:0 0 15px #00ffff;
    overflow:hidden;
    background:black;
}

.avatar img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* INPUT */
.box {
    max-width:600px;
    margin:auto;
    padding:20px;
}

input, textarea {
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:none;
    outline:none;
}

/* BOTÓN */
button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#ff00ff,#00ffff);
    font-weight:bold;
    cursor:pointer;
}

/* 🌐 PANEL SOCIAL */
.social-panel{
    max-width:600px;
    margin:20px auto;
    padding:15px;
    background:rgba(255,255,255,0.06);
    border-radius:15px;
    backdrop-filter: blur(10px);
    box-shadow:0 0 15px rgba(0,255,255,0.15);
}

.tag{
    text-align:center;
    margin-bottom:10px;
    color:#00ffff;
    font-weight:bold;
}

.actions{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

.btn{
    padding:8px 12px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    cursor:pointer;
    transition:0.2s;
    user-select:none;
}

.btn:hover{
    background:rgba(0,255,255,0.2);
    transform:scale(1.05);
}

/* POST */
.post {
    background:rgba(255,255,255,0.05);
    margin:10px auto;
    padding:15px;
    border-radius:15px;
    max-width:600px;
    box-shadow:0 0 10px rgba(0,255,255,0.25);
}

/* USER */
.user {
    font-weight:bold;
    color:#00ffff;
    display:flex;
    align-items:center;
    gap:8px;
}

/* LIKE */
.like {
    margin-top:10px;
    cursor:pointer;
    color:#ff4d6d;
    user-select:none;
}

/* BACK */
.back {
    display:block;
    text-align:center;
    margin:20px auto;
    width:220px;
    padding:10px;
    background:rgba(255,255,255,0.08);
    border-radius:10px;
    text-decoration:none;
    color:white;
}

.back:hover {
    background:rgba(255,255,255,0.15);
}

</style>
</head>

<body>

<div class="header">⚡ NeuroLuiyi Feed CYBER</div>

<!-- 🧠 GIF PROTEGIDO -->
<div class="avatar">
    <img src="NeuroLuis.gif" onerror="this.src='https://via.placeholder.com/90'">
</div>

<div class="box">
    <input id="name" placeholder="Tu nombre">
    <textarea id="msg" placeholder="Escribe tu post..."></textarea>
    <button onclick="send()">Publicar</button>
</div>

<!-- 🌐 PANEL SOCIAL -->
<div class="social-panel">
    <div class="tag">😍 Deja tu like • Comparte ideas • Filosofía • Cultura</div>

    <div class="actions">
        <div class="btn">❤️ Like</div>
        <div class="btn">📤 Compartir</div>
        <div class="btn">💡 Ideas</div>
        <div class="btn">🧠 Filosofía</div>
        <div class="btn">🌍 Cultura</div>
    </div>
</div>

<a class="back" href="index.html">⬅ Volver al inicio</a>

<div id="feed"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
    databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = firebase.database();
const feed = document.getElementById("feed");

function avatar(name){
    return "https://api.dicebear.com/7.x/pixel-art/svg?seed=" + encodeURIComponent(name);
}

function send(){

    const name = document.getElementById("name").value.trim();
    const msg = document.getElementById("msg").value.trim();

    if(!name || !msg) return;

    db.ref("posts").push({
        name,
        msg,
        likes:0,
        time:Date.now()
    });

    document.getElementById("msg").value="";
}

const rendered = new Set();

db.ref("posts").on("child_added", snap=>{

    const p = snap.val();
    const id = snap.key;

    if(rendered.has(id)) return;
    rendered.add(id);

    const div = document.createElement("div");
    div.className="post";

    div.innerHTML=`
        <div class="user">
            <img src="${avatar(p.name)}" width="25" style="border-radius:50%">
            ${p.name}
        </div>

        <div>${p.msg}</div>

        <div class="like" onclick="like('${id}', this)">
            ❤️ Like <span>${p.likes || 0}</span>
        </div>
    `;

    feed.prepend(div);
});

function like(id, el){

    const ref = db.ref("posts/"+id+"/likes");

    ref.transaction(v => (v || 0) + 1);

    const span = el.querySelector("span");
    span.innerText = parseInt(span.innerText) + 1;
}

</script>

</body>
</html>
