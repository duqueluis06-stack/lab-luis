<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 NeuroLuiyi Forum - Premium</title>

<style>
    :root {
        --cyan: #00ffff;
        --pink: #ff00ff;
        --glass: rgba(255, 255, 255, 0.1);
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Roboto, sans-serif;
        background: #050505 url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070') no-repeat center center fixed;
        background-size: cover;
        color: white;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    /* --- BOTÓN SALIR --- */
    .exit-bar {
        padding: 15px;
        display: flex;
        justify-content: flex-start;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        position: fixed;
        top: 0; width: 100%; z-index: 100;
    }
    .btn-exit {
        background: var(--glass);
        border: 1px solid var(--cyan);
        color: var(--cyan);
        padding: 8px 20px;
        border-radius: 20px;
        text-decoration: none;
        font-weight: bold;
        backdrop-filter: blur(10px);
    }

    /* --- CONTENEDOR TIKTOK COMPACTO --- */
    #feed {
        margin-top: 70px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        overflow-y: auto;
        flex-grow: 1;
    }

    .post-card {
        background: rgba(0, 0, 0, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        width: 95%;
        max-width: 450px;
        border-radius: 20px;
        padding: 15px;
        position: relative;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* --- AVATARES LINDOS --- */
    .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
    }
    .avatar-img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 2px solid var(--cyan);
        object-fit: cover;
    }
    .username {
        font-weight: bold;
        color: var(--cyan);
        font-size: 1.1rem;
    }

    .post-text {
        font-size: 1rem;
        line-height: 1.5;
        margin-bottom: 40px;
    }

    /* --- BOTONES LATERALES DENTRO DE LA CARD --- */
    .actions-right {
        position: absolute;
        right: 15px;
        bottom: 15px;
        display: flex;
        gap: 15px;
    }
    .action-item {
        text-align: center;
        cursor: pointer;
    }
    .action-icon {
        font-size: 22px;
        display: block;
    }
    .action-count {
        font-size: 12px;
        color: #aaa;
    }

    /* --- SELECTOR DE AVATARES --- */
    .avatar-picker {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 10px 0;
    }
    .pick-img {
        width: 60px; height: 60px;
        border-radius: 50%;
        cursor: pointer;
        border: 3px solid transparent;
        transition: 0.3s;
    }
    .pick-img.selected { border-color: var(--pink); transform: scale(1.1); }

    /* --- INPUT FLOTANTE --- */
    .input-area {
        background: #111;
        padding: 15px;
        border-top: 1px solid #333;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    input, textarea {
        background: #222;
        border: 1px solid #444;
        color: white;
        padding: 12px;
        border-radius: 10px;
    }
    .btn-send {
        background: linear-gradient(45deg, var(--cyan), var(--pink));
        border: none; padding: 12px; border-radius: 10px;
        font-weight: bold; color: white; cursor: pointer;
    }

    /* --- COMENTARIOS --- */
    .comments-section {
        margin-top: 10px;
        border-top: 1px solid #333;
        padding-top: 10px;
        font-size: 0.9rem;
        max-height: 150px;
        overflow-y: auto;
    }
</style>
</head>
<body>

<div class="exit-bar">
    <a href="index.html" class="btn-exit">⬅ SALIR</a>
</div>

<div id="feed">
    </div>

<div class="input-area">
    <div class="avatar-picker" id="picker">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=1" class="pick-img selected" onclick="setAv(this.src, this)">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Luis" class="pick-img" onclick="setAv(this.src, this)">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Tech" class="pick-img" onclick="setAv(this.src, this)">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Anita" class="pick-img" onclick="setAv(this.src, this)">
        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Luiyi" class="pick-img" onclick="setAv(this.src, this)">
    </div>
    <input id="name" placeholder="Tu nombre...">
    <textarea id="msg" placeholder="¿Qué estás experimentando hoy?" rows="2"></textarea>
    <button class="btn-send" onclick="send()">PUBLICAR AHORA</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
  databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});
const db = firebase.database();
let selectedAvatar = "https://api.dicebear.com/7.x/bottts/svg?seed=1";

function setAv(url, el) {
    document.querySelectorAll('.pick-img').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    selectedAvatar = url;
}

function send() {
    let n = document.getElementById("name").value.trim();
    let m = document.getElementById("msg").value.trim();
    if(!n || !m) return alert("Llena los campos");

    db.ref("posts").push({
        name: n,
        msg: m,
        avatar: selectedAvatar,
        likes: 0,
        time: Date.now()
    });
    document.getElementById("msg").value = "";
}

db.ref("posts").on("child_added", snap => {
    let p = snap.val();
    let id = snap.key;
    let card = document.createElement("div");
    card.className = "post-card";
    card.innerHTML = `
        <div class="user-info">
            <img src="${p.avatar || selectedAvatar}" class="avatar-img">
            <span class="username">${p.name}</span>
        </div>
        <div class="post-text">${p.msg}</div>
        <div class="actions-right">
            <div class="action-item" onclick="like('${id}')">
                <span class="action-icon">❤️</span>
                <span class="action-count" id="l-${id}">${p.likes || 0}</span>
            </div>
            <div class="action-item" onclick="toggleReplies('${id}')">
                <span class="action-icon">💬</span>
                <span class="action-count">Chat</span>
            </div>
        </div>
        <div id="replies-${id}" class="comments-section" style="display:none">
            <div id="list-${id}"></div>
            <input id="in-${id}" placeholder="Responde..." style="width:70%; font-size:12px; padding:5px; margin-top:5px;" onkeydown="if(event.key==='Enter') reply('${id}')">
        </div>
    `;
    document.getElementById("feed").prepend(card);
    loadReplies(id);
});

function like(id) {
    db.ref("posts/"+id+"/likes").transaction(v => (v||0)+1);
}

db.ref("posts").on("child_changed", snap => {
    let el = document.getElementById("l-"+snap.key);
    if(el) el.innerText = snap.val().likes || 0;
});

function toggleReplies(id) {
    let r = document.getElementById("replies-"+id);
    r.style.display = r.style.display === "none" ? "block" : "none";
}

function reply(id) {
    let inp = document.getElementById("in-"+id);
    let name = document.getElementById("name").value || "Anónimo";
    if(!inp.value) return;
    db.ref("posts/"+id+"/replies").push({ name: name, msg: inp.value, avatar: selectedAvatar });
    inp.value = "";
}

function loadReplies(id) {
    db.ref("posts/"+id+"/replies").on("child_added", snap => {
        let r = snap.val();
        let div = document.createElement("div");
        div.style.marginBottom = "5px";
        div.innerHTML = `<small style="color:var(--pink)">${r.name}:</small> ${r.msg}`;
        document.getElementById("list-"+id).appendChild(div);
    });
}
</script>

</body>
</html>
