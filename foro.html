<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Foro - Lab Luis</title>

<style>

/* Fondo general */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('fondo-foro.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* Capa oscura encima del fondo */
.overlay {
    background: rgba(0, 0, 0, 0.7);
    min-height: 100vh;
    padding: 20px;
}

/* Título */
h1 {
    text-align: center;
    font-size: 2.5em;
    color: #00ffe0;
    text-shadow: 0 0 10px #00ffe0;
}

/* Contenedor principal */
.container {
    max-width: 700px;
    margin: auto;
}

/* Caja del formulario */
.form-box {
    background: rgba(0, 0, 0, 0.8);
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 15px #00ffe0;
    margin-bottom: 30px;
}

/* Inputs */
input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
}

/* Botón */
button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    background: #00ffe0;
    border: none;
    color: black;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #00bfa5;
}

/* Comentarios */
.comment-box {
    background: rgba(255, 255, 255, 0.1);
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}

</style>
</head>

<body>

<div class="overlay">

    <h1>💬 Foro de Comentarios</h1>

    <div class="container">

        <!-- FORMULARIO -->
        <div class="form-box">
            <h2>Deja tu mensaje</h2>

            <input type="text" id="nombre" placeholder="Tu nombre">

            <textarea id="mensaje" rows="4" placeholder="Escribe tu comentario..."></textarea>

            <button onclick="agregarComentario()">Enviar</button>
        </div>

        <!-- ZONA DE COMENTARIOS -->
        <div id="comentarios"></div>

    </div>

</div>

<script>

function agregarComentario() {

    let nombre = document.getElementById("nombre").value;
    let mensaje = document.getElementById("mensaje").value;

    if(nombre === "" || mensaje === "") {
        alert("Completa todos los campos");
        return;
    }

    let contenedor = document.getElementById("comentarios");

    let nuevoComentario = document.createElement("div");
    nuevoComentario.className = "comment-box";

    nuevoComentario.innerHTML = "<strong>" + nombre + ":</strong><br>" + mensaje;

    contenedor.prepend(nuevoComentario);

    // limpiar campos
    document.getElementById("nombre").value = "";
    document.getElementById("mensaje").value = "";
}

</script>

</body>
</html>
