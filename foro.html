<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🚀 NeuroLuiyi Station - Final Edition</title>

<style>
:root {
    --cyan: #00ffff;
    --pink: #ff00ff;
    --dark: #020205;
    /* Efecto traslúcido para las ventanas */
    --glass: rgba(15, 20, 35, 0.65); 
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--dark);
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* --- FONDO ESTRELLADO CON MOVIMIENTO --- */
#space {
    position: fixed; inset: 0; z-index: -2;
    background: radial-gradient(circle at center, #0d1b2a 0%, #000 100%);
}

.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: moveStar linear infinite;
}

@keyframes moveStar {
    from { transform: translateY(-100vh) rotate(0deg); }
    to { transform: translateY(100vh) rotate(360deg); }
}

/* --- CABECERA --- */
.header {
    height: 75px;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--cyan);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    z-index: 1000;
}

.exit-btn {
    background: rgba(255, 0, 0, 0.2);
    border: 1px solid #ff4444;
    color: #ff4444;
    padding: 5px 12px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: bold;
    transition: 0.3s;
}
.exit-btn:hover { background: #ff4444; color: white; }

.neuro-logo {
    width: 50px; height: 50px;
    border: 1px solid var(--cyan);
    border-radius: 10px;
    box-shadow: 0 0 15px var(--cyan);
}

/* --- MENSAJES TRASLÚCIDOS (CRISTAL) --- */
#feed-container {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    padding-bottom: 150px;
    -webkit-overflow-scrolling: touch;
}

.post-card {
    background: var(--glass); /* Transparencia */
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 25px;
    /* El truco del cristal es este desenfoque: */
    backdrop-filter: blur(12px); 
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
}

.post-user { color: var(--cyan); font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 5px var(--cyan); }
.post-content { line-height: 1.5; font-size: 1rem; color: #ffffff; }

/* BOTONES LIKES/RESPUESTAS */
.actions { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
.btn-act { background: none; border: none; color: #aaa; cursor: pointer; font-size: 0.85rem; }
.btn-act:hover { color: var(--cyan); }

/* --- ÁREA DE CONTROL INFERIOR --- */
.input-area {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--cyan);
    padding: 15px;
    z-index: 2000;
}

.av-bar { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; }
.av-item { font-size: 26px; cursor: pointer; padding: 5px; transition: 0.3s; filter: grayscale(0.5); }
.av-item.active { filter: grayscale(0); transform: scale(1.3); border-bottom: 2px solid var(--cyan); }

#userName {
    background: none; border: none; border-bottom: 1px solid #444;
    color: var(--cyan); width: 100%; margin-bottom: 10px; font-size: 0.9rem;
}

.input-row { display: flex; gap: 10px; }
textarea {
    flex: 1; background: #111; border: 1px solid #333; color: white;
    padding: 12px; border-radius: 12px; font-size: 16px; resize: none;
}

.btn-send {
    background: linear-gradient(45deg, var(--cyan), var(--pink));
    border: none; width: 50px; height: 50px; border-radius: 12px; cursor: pointer;
    box-shadow: 0 0 10px var(--cyan);
}
</style>
</head>

<body>

<div id="space"></div>

<div class="header">
    <a href="index.html" class="exit-btn">SALIR ✖</a>
    <div style="text-align: center;">
        <h2 style="margin:0; font-size:1rem; color:var(--cyan); letter-spacing: 1px;">LAB LUIYI</h2>
    </div>
    <img src="NeuroLuis.gif" class="neuro-logo" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
</div>

<div id="feed-container">
    <div id="chat-flow" style="max-width: 600px; margin: auto;"></div>
</div>

<div class="input-area">
    <div class="av-bar" id="av-list"></div>
    <input id="userName" placeholder="Identificación del Piloto..." maxlength="15">
    <div class="input-row">
        <textarea id="userMsg" placeholder="Comunicación Warp..." rows="1"></textarea>
        <button class="btn-send" onclick="sendMain()">🚀</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
    authDomain: "foro-luiyi.firebaseapp.com",
    databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "foro-luiyi",
    storageBucket: "foro-luiyi.firebasestorage.app",
    messagingSenderId: "410471993147",
    appId: "1:410471993147:web:d672952aa8a4364d48f11e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* --- ANIMACIÓN DE ESTRELLAS --- */
const space = document.getElementById('space');
for(let i=0; i<100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 'px';
    s.style.width = size; s.style.height = size;
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    // Velocidades variadas para dar profundidad
    s.style.animationDuration = (Math.random() * 5 + 5) + 's';
    s.style.animationDelay = (Math.random() * 5) + 's';
    space.appendChild(s);
}

/* --- AVATARES --- */
const emos = ['👽','🤖','👨‍🚀','👾','🧠','⚡','🚀','🛸','🧬','🔭'];
let currentAv = emos[0];
const avList = document.getElementById('av-list');

emos.forEach(e => {
    const s = document.createElement('span');
    s.className = 'av-item' + (e === currentAv ? ' active' : '');
    s.innerText = e;
    s.onclick = () => {
        document.querySelectorAll('.av-item').forEach(b => b.classList.remove('active'));
        s.classList.add('active');
        currentAv = e;
    };
    avList.appendChild(s);
});

/* --- LÓGICA FIREBASE --- */
window.sendMain = () => {
    const name = document.getElementById('userName').value.trim();
    const msg = document.getElementById('userMsg').value.trim();
    if(!name || !msg) return;

    push(ref(db, "posts"), {
        name,
        avatar: currentAv,
        msg,
        likes: 0,
        time: Date.now()
    });
    document.getElementById('userMsg').value = "";
};

onChildAdded(ref(db, "posts"), snap => {
    const p = snap.val();
    const id = snap.key;
    const div = document.createElement('div');
    div.className = 'post-card';
    div.innerHTML = `
        <div class="post-user">${p.avatar} ${p.name}</div>
        <div class="post-content">${p.msg}</div>
        <div class="actions">
            <button class="btn-act" onclick="like('${id}')">❤️ <span id="l-${id}">${p.likes || 0}</span></button>
            <button class="btn-act" onclick="toggleReply('${id}')">💬 Responder</button>
        </div>
        <div id="reps-${id}" style="margin-left:15px; border-left:1px solid #333; margin-top:10px;"></div>
        <div id="box-${id}" style="display:none; margin-top:10px; display:flex; gap:5px;">
            <input id="in-${id}" placeholder="Tu respuesta..." style="flex:1; background:#000; border:1px solid #444; color:white; padding:8px; border-radius:10px;">
            <button onclick="sendReply('${id}')" style="background:var(--cyan); border:none; border-radius:10px; padding:0 10px;">OK</button>
        </div>
    `;
    document.getElementById('chat-flow').prepend(div);

    onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
        const r = rSnap.val();
        const rDiv = document.createElement('div');
        rDiv.style = "font-size:0.85rem; background:rgba(0,0,0,0.2); padding:8px; border-radius:10px; margin-bottom:5px;";
        rDiv.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
        document.getElementById(`reps-${id}`).appendChild(rDiv);
    });
});

window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
window.toggleReply = (id) => {
    const b = document.getElementById(`box-${id}`);
    b.style.display = b.style.display === 'none' ? 'flex' : 'none';
};

window.sendReply = (postId) => {
    const inp = document.getElementById(`in-${postId}`);
    const name = document.getElementById('userName').value.trim() || "Piloto";
    if(!inp.value.trim()) return;
    push(ref(db, `posts/${postId}/replies`), { name, avatar: currentAv, msg: inp.value.trim() });
    inp.value = "";
    document.getElementById(`box-${postId}`).style.display = 'none';
};
</script>

</body>
</html>
