<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NeuroLuiyi Forum Pro</title>

<style>

body{
    margin:0;
    font-family: Arial;
    color:white;

    background-image:url("fondo-foro.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* HEADER */
.header{
    text-align:center;
    padding:18px;
    font-size:24px;
    color:#00ffff;
    font-weight:bold;
}

/* GIF */
.avatar{
    position:fixed;
    top:10px;
    right:10px;
    width:85px;
    height:85px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid #00ffff;
    box-shadow:0 0 12px #00ffff;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* INPUT */
.box{
    max-width:600px;
    margin:20px auto;
    padding:15px;
}

input, textarea{
    width:100%;
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00ffff,#ff00ff);
    font-weight:bold;
    cursor:pointer;
}

/* POST */
.post{
    max-width:600px;
    margin:10px auto;
    padding:12px;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
}

/* USER */
.user{
    color:#00ffff;
    font-weight:bold;
    display:flex;
    align-items:center;
    gap:8px;
}

/* LIKE */
.like{
    margin-top:10px;
    color:#ff4d6d;
    cursor:pointer;
}

/* REPLY BOX */
.replyBox{
    margin-top:10px;
}

.replyInput{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:8px;
    border:none;
}

/* reply */
.reply{
    margin-left:20px;
    margin-top:8px;
    padding:8px;
    border-left:2px solid #00ffff;
    background:rgba(255,255,255,0.03);
}

/* BACK */
.back{
    display:block;
    text-align:center;
    margin:20px auto;
    width:200px;
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    text-decoration:none;
    color:white;
}

</style>
</head>

<body>

<div class="header">⚡ NeuroLuiyi Forum Pro</div>

<!-- GIF PROTEGIDO -->
<div class="avatar">
    <img src="NeuroLuis.gif">
</div>

<div class="box">
    <input id="name" placeholder="Tu nombre">
    <textarea id="msg" placeholder="Escribe tu post..."></textarea>
    <button onclick="send()">Publicar</button>
</div>

<a class="back" href="index.html">⬅ Volver al inicio</a>

<div id="feed"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
    databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = firebase.database();
const feed = document.getElementById("feed");

function avatar(name){
    return "https://api.dicebear.com/7.x/pixel-art/svg?seed="+name;
}

/* SEND POST */
function send(){

    const name = document.getElementById("name").value.trim();
    const msg = document.getElementById("msg").value.trim();

    if(!name || !msg) return;

    db.ref("posts").push({
        name,
        msg,
        likes:0,
        time:Date.now()
    });

    document.getElementById("msg").value="";
}

/* LOAD POSTS */
db.ref("posts").on("child_added", snap=>{

    const p = snap.val();
    const id = snap.key;

    const div = document.createElement("div");
    div.className="post";

    div.innerHTML=`
        <div class="user">
            <img src="${avatar(p.name)}" width="22" style="border-radius:50%">
            ${p.name}
        </div>

        <div>${p.msg}</div>

        <div class="like" onclick="like('${id}',this)">
            ❤️ Like <span>${p.likes || 0}</span>
        </div>

        <div class="replyBox">
            <input class="replyInput" placeholder="Responder..." 
            onkeydown="if(event.key==='Enter'){reply('${id}',this)}">
        </div>

        <div id="replies-${id}"></div>
    `;

    feed.prepend(div);

    loadReplies(id);
});

/* LIKE */
function like(id, el){

    const ref = db.ref("posts/"+id+"/likes");

    ref.transaction(v => (v||0)+1);

    const span = el.querySelector("span");
    span.innerText = parseInt(span.innerText)+1;
}

/* REPLY */
function reply(postID, input){

    const text = input.value.trim();
    const name = document.getElementById("name").value.trim();

    if(!text || !name) return;

    db.ref("posts/"+postID+"/replies").push({
        name,
        msg:text,
        time:Date.now()
    });

    input.value="";
}

/* LOAD REPLIES */
function loadReplies(postID){

    db.ref("posts/"+postID+"/replies").on("child_added", snap=>{

        const r = snap.val();

        const container = document.getElementById("replies-"+postID);

        const div = document.createElement("div");
        div.className="reply";

        div.innerHTML=`
            <b style="color:#00ffff">${r.name}</b>: ${r.msg}
        `;

        container.appendChild(div);
    });
}

</script>

</body>
</html>
