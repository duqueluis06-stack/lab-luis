<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🚀 NeuroLuiyi - Estación Alpha</title>

<style>
:root {
    --cyan: #00ffff;
    --pink: #ff00ff;
    --dark: #020205;
    --glass: rgba(15, 20, 35, 0.7);
}

* { box-sizing: border-box; }
body {
    margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* FONDO GALÁCTICO */
#space { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle, #0d1b2a, #000); }
.star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: move linear infinite; }
@keyframes move { from { transform: translateY(-100vh); } to { transform: translateY(100vh); } }

/* HEADER */
.header {
    height: 70px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--cyan); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000;
}
.exit-btn { color: #ff4444; text-decoration: none; font-size: 0.75rem; border: 1px solid #ff4444; padding: 5px 10px; border-radius: 6px; font-weight: bold; }

/* FEED */
#feed-container { flex: 1; overflow-y: auto; padding: 15px 15px 160px 15px; -webkit-overflow-scrolling: touch; }
.post-card {
    background: var(--glass); border: 1px solid rgba(0, 255, 255, 0.3); border-radius: 18px;
    padding: 18px; margin-bottom: 25px; backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.ai-card { border: 1px solid var(--pink) !important; box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }
.post-header { display: flex; align-items: center; gap: 8px; color: var(--cyan); font-weight: bold; margin-bottom: 10px; }
.ai-user { color: var(--pink) !important; }

/* ACCIONES */
.actions { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
.btn-act { background: none; border: none; color: #aaa; cursor: pointer; font-size: 0.85rem; }
.btn-act:hover { color: var(--cyan); }

.replies-list { margin-left: 15px; border-left: 1px solid #333; padding-left: 10px; margin-top: 10px; }
.rep-msg { font-size: 0.85rem; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; margin-bottom: 5px; }

/* INPUT ÁREA INFERIOR */
.input-area {
    position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95);
    border-top: 1px solid var(--cyan); padding: 15px; z-index: 2000;
}
.av-bar { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
.av-item { font-size: 26px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
.av-item.active { opacity: 1; transform: scale(1.3); filter: drop-shadow(0 0 5px var(--cyan)); }

.input-row { display: flex; gap: 10px; align-items: flex-end; }
textarea {
    flex: 1; background: #111; border: 1px solid #333; color: white;
    padding: 12px; border-radius: 12px; font-size: 16px; resize: none;
}
.btn-send {
    background: linear-gradient(45deg, var(--cyan), var(--pink));
    border: none; width: 50px; height: 50px; border-radius: 12px; cursor: pointer; color: white; font-size: 1.2rem;
}
</style>
</head>

<body>
<div id="space"></div>

<div class="header">
    <a href="index.html" class="exit-btn">SALIR ✖</a>
    <h2 style="font-size:0.9rem; color:var(--cyan); margin:0; letter-spacing:1px;">LAB NEUROLUIYI</h2>
    <img src="NeuroLuis.gif" width="45" height="45" style="border-radius:10px; border:1px solid var(--cyan);" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
</div>

<div id="feed-container">
    <div id="chat-flow" style="max-width: 600px; margin: auto;"></div>
</div>

<div class="input-area">
    <div class="av-bar" id="av-list"></div>
    <input id="userName" placeholder="Nombre del Piloto..." maxlength="15" style="background:none; border:none; border-bottom:1px solid #333; color:var(--cyan); width:100%; margin-bottom:10px; padding:5px;">
    <div class="input-row">
        <textarea id="userMsg" placeholder="Transmitir mensaje..." rows="1"></textarea>
        <button class="btn-send" onclick="sendMain()">🚀</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
    authDomain: "foro-luiyi.firebaseapp.com",
    databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "foro-luiyi",
    storageBucket: "foro-luiyi.firebasestorage.app",
    messagingSenderId: "410471993147",
    appId: "1:410471993147:web:d672952aa8a4364d48f11e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ESTRELLAS */
const space = document.getElementById('space');
for(let i=0; i<80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 'px';
    s.style.width = size; s.style.height = size;
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDuration = (Math.random() * 5 + 5) + 's';
    space.appendChild(s);
}

/* AVATARES */
const emos = ['👽','🤖','👨‍🚀','👾','🧠','⚡','🚀','🛸','🧬'];
let currentAv = emos[0];
const avList = document.getElementById('av-list');
emos.forEach(e => {
    const s = document.createElement('span'); s.className = 'av-item' + (e === currentAv ? ' active' : '');
    s.innerText = e; s.onclick = () => { document.querySelectorAll('.av-item').forEach(b => b.classList.remove('active')); s.classList.add('active'); currentAv = e; };
    avList.appendChild(s);
});

/* EL ALQUIMISTA IA */
const checkAI = (msg, name) => {
    if(name === "NEURO-BOT") return; // No auto-responder
    const t = msg.toLowerCase();
    let res = "";
    if(t.includes("hola")) res = "¡Bienvenido a la órbita! ¿Qué descubrimientos traes hoy?";
    else if(t.includes("luis") || t.includes("luiyi")) res = "El Comandante Luis ha diseñado este sector. Es un genio de la IA.";
    else if(t.includes("ayuda")) res = "Escribe tu idea y dale a la nave. Yo estaré vigilando el flujo.";
    else if(t.length > 40) res = "Interesante teoría. Mis procesadores están analizando esa cantidad de datos.";
    
    if(res) {
        setTimeout(() => {
            push(ref(db, "posts"), { name: "NEURO-BOT", avatar: "🤖", msg: res, isAI: true, likes: 0, time: Date.now() });
        }, 2000);
    }
};

/* ACCIONES FIREBASE */
window.sendMain = () => {
    const n = document.getElementById('userName').value.trim();
    const m = document.getElementById('userMsg').value.trim();
    if(!n || !m) return;
    push(ref(db, "posts"), { name: n, avatar: currentAv, msg: m, likes: 0, time: Date.now() });
    document.getElementById('userMsg').value = "";
    checkAI(m, n);
};

onChildAdded(ref(db, "posts"), snap => {
    const p = snap.val();
    const id = snap.key;
    const div = document.createElement('div');
    div.className = 'post-card' + (p.isAI ? ' ai-card' : '');
    div.innerHTML = `
        <div class="post-header ${p.isAI ? 'ai-user' : ''}">${p.avatar} ${p.name} ${p.isAI ? '[IA]' : ''}</div>
        <div class="post-content">${p.msg}</div>
        <div class="actions">
            <button class="btn-act" onclick="like('${id}')">❤️ <span id="l-${id}">${p.likes || 0}</span></button>
            <button class="btn-act" onclick="toggleRep('${id}')">💬 Responder</button>
        </div>
        <div id="reps-${id}" class="replies-list"></div>
        <div id="box-${id}" style="display:none; margin-top:10px; display:flex; gap:5px;">
            <input id="in-${id}" placeholder="Tu respuesta..." style="flex:1; background:#000; border:1px solid #444; color:white; padding:8px; border-radius:10px;">
            <button onclick="sendRep('${id}')" style="background:var(--cyan); border:none; border-radius:10px; padding:0 12px; font-weight:bold;">OK</button>
        </div>
    `;
    document.getElementById('chat-flow').prepend(div);

    onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
        const r = rSnap.val();
        const rDiv = document.createElement('div');
        rDiv.className = 'rep-msg';
        rDiv.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
        document.getElementById(`reps-${id}`).appendChild(rDiv);
    });
});

window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
window.toggleRep = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display === 'none' ? 'flex' : 'none'; };
window.sendRep = (postId) => {
    const inp = document.getElementById(`in-${postId}`);
    const name = document.getElementById('userName').value.trim() || "Piloto";
    if(!inp.value.trim()) return;
    push(ref(db, `posts/${postId}/replies`), { name, avatar: currentAv, msg: inp.value.trim() });
    inp.value = ""; document.getElementById(`box-${postId}`).style.display = 'none';
};
</script>
</body>
</html>
