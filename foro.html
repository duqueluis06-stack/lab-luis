<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>🪐 NASA ELITE: FINAL ESTRUCTURE</title>

    <!-- AQUÍ -->
    <link rel="canonical" href="https://duquemartini.com/foro.html">

    <!-- AQUÍ -->
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LE6LX7FC2Q"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LE6LX7FC2Q');
    </script>

    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --dark: #000005;
            --glass: rgba(12, 18, 30, 0.94);
        }

        /* --- BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--dark);
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column;
            color: white;
        }

        /* --- UNIVERSO VISUAL --- */
        #space-canvas {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #08081a 0%, #000 100%);
        }
        #space-canvas::after {
            content: ""; position: absolute; inset: -100%;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><circle cx="50" cy="50" r="1.1" fill="white" opacity="0.8"/><circle cx="150" cy="120" r="1" fill="white" opacity="0.5"/><circle cx="300" cy="80" r="1.4" fill="white"/><circle cx="220" cy="350" r="1" fill="white" opacity="0.7"/><circle cx="80" cy="280" r="0.9" fill="white" opacity="0.9"/><circle cx="350" cy="220" r="1.2" fill="white"/></svg>');
            background-size: 300px 300px;
            animation: rotateStars 200s linear infinite;
        }
        @keyframes rotateStars { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* PLANETAS */
        .obj { position: absolute; border-radius: 50%; z-index: 1; }
        .saturn {
            top: 10%; right: 10%; width: 90px; height: 90px;
            background: radial-gradient(circle at 35% 35%, #fceabb, #f8b500);
            box-shadow: inset -12px -12px 30px #000, 0 0 40px rgba(248, 181, 0, 0.2);
            animation: floatSaturn 10s ease-in-out infinite alternate;
        }
        .saturn::before {
            content: ""; position: absolute; top: 50%; left: -55%; width: 210%; height: 20px;
            border: 7px solid rgba(255, 255, 255, 0.2); border-radius: 50%;
            transform: translateY(-50%) rotateX(78deg);
        }
        .mars { top: 75%; left: 15%; width: 50px; height: 50px; background: radial-gradient(circle at 30% 30%, #ff4b2b, #a83232); box-shadow: 0 0 20px rgba(255,75,43,0.2); }

        /* NAVE REALISTA (ESTACIÓN ESPACIAL) */
        .tech-ship {
            position: absolute; top: 45%; left: -150px; width: 120px; z-index: 2;
            animation: moveTech 35s linear infinite;
        }

        @keyframes moveTech {
            0% { left: -150px; transform: rotate(10deg) scale(0.8); }
            50% { transform: rotate(-5deg) scale(1); }
            100% { left: 110%; transform: rotate(10deg) scale(0.8); }
        }
        @keyframes floatSaturn { from { transform: translateY(0) rotate(0deg); } to { transform: translateY(30px) rotate(5deg); } }

        /* --- HEADER --- */
        header {
            height: 75px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--cyan);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            backdrop-filter: blur(15px); z-index: 100;
        }
        header h1 { font-size: 19px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }
        .home-link {
            background: var(--cyan); color: #000; border: none; padding: 10px 18px;
            border-radius: 10px; font-weight: 800; text-decoration: none;
            font-size: 12px; text-transform: uppercase; transition: 0.3s;
        }

        /* --- CHAT FEED --- */
        #feed { flex: 1; overflow-y: auto; padding: 20px 15px; -webkit-overflow-scrolling: touch; z-index: 10; }
        .card {
            max-width: 650px; margin: 0 auto 25px; background: var(--glass);
            border-left: 5px solid var(--cyan); border-radius: 0 18px 18px 0;
            padding: 20px; box-shadow: 15px 15px 40px rgba(0,0,0,0.7);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .user-line { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .u-name { color: var(--cyan); font-weight: bold; font-size: 15px; }
        .u-text { font-size: 16px; line-height: 1.6; color: #fff; margin-bottom: 15px; }

        .actions { display: flex; gap: 25px; }
        .act-btn { background: none; border: none; color: #888; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .act-btn:hover { color: var(--cyan); }

        .replies { margin-top: 15px; padding-left: 20px; border-left: 2px solid var(--pink); display: flex; flex-direction: column; gap: 10px; }
        .r-item { background: rgba(255,255,255,0.04); padding: 10px; border-radius: 10px; font-size: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .r-item b { color: var(--pink); }

        .r-form { display: none; margin-top: 15px; gap: 10px; }
        .r-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 10px; border-radius: 10px; outline: none; }

        /* --- FOOTER CONSOLE --- */
        footer {
            background: #000; border-top: 2px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom)); z-index: 1000;
        }
        .av-row { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #222; }
        .av-btn { font-size: 32px; opacity: 0.3; cursor: pointer; transition: 0.2s; }
        .av-btn.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 10px var(--cyan)); }

        .in-row { display: flex; gap: 12px; align-items: center; }
        .fields { flex: 1; background: #05050a; border: 1px solid #222; border-radius: 15px; padding: 12px; border-left: 4px solid var(--pink); }
        #p-id { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 13px; width: 100%; outline: none; margin-bottom: 4px; }
        #p-msg { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; }
        
        .send { 
            width: 60px; height: 60px; border-radius: 18px; border: none; 
            background: linear-gradient(135deg, var(--cyan), #0088ff); color: #000; font-size: 26px;
        }
    </style>
</head>
<body>

    <div id="space-canvas">
        <div class="obj saturn"></div>
        <div class="obj mars"></div>
        <svg class="tech-ship" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="20" width="20" height="20" fill="#555" /> <rect x="90" y="20" width="20" height="20" fill="#555" /> <rect x="30" y="15" width="60" height="30" rx="5" fill="#ccc" /> <circle cx="60" cy="30" r="8" fill="#444" /> <path d="M60 15 L60 5" stroke="cyan" stroke-width="2" /> <circle cx="60" cy="5" r="2" fill="cyan" />
        </svg>
    </div>

    <header>
        <h1>NEURO LUIYI 🪐 NASA</h1>
        <a href="index.html" class="home-link">Inicio 🏠</a>
    </header>

    <main id="feed"><div id="post-mount"></div></main>

    <footer>
        <div id="av-list" class="av-row"></div>
        <div class="in-row">
            <div class="fields">
                <input id="p-id" placeholder="ID PILOTO..." maxlength="15">
                <input id="p-msg" placeholder="MENSAJE AL ESPACIO...">
            </div>
            <button class="send" onclick="lanzar()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

     // -- AVATARES --
const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛰️','🛸','🪐'];
let selAv = null;

// crear selector de avatares
icons.forEach(i => {
    const el = document.createElement('span');
    el.className = 'av-btn';
    el.innerText = i;

    el.onclick = () => {
        document.querySelectorAll('.av-btn')
            .forEach(x => x.classList.remove('active'));

        el.classList.add('active');
        selAv = i;
    };

    document.getElementById('av-list').appendChild(el);
});

// generar clave única de usuario (IMPORTANTE para likes únicos)
const getUserKey = () => {
    const id = document.getElementById('p-id').value.trim();
    if(!selAv || !id) return null;
    return `${id}_${selAv}`;
};

// validación de identidad
const checkID = () => {
    const id = document.getElementById('p-id').value.trim();

    if(!selAv || !id) {
        alert("SISTEMA: Elige Avatar e ID de Piloto.");
        return null;
    }

    return { id, av: selAv };
};

 // -- FIREBASE OPS --
 window.lanzar = () => {
     const u = checkID();
     const m = document.getElementById('p-msg').value.trim();

     if(!u || !m) return;

     push(ref(db, "posts"), { 
         name: u.id, 
         avatar: u.av, 
         msg: m, 
         likes: 0 
     });

     document.getElementById('p-msg').value = "";
 };

        // -- FIX LIKE FUNCTION --
        window.sumarLike = (key) => {
    const userKey = getUserKey();

    if(!userKey){
        alert("Primero elige avatar e ID");
        return;
    }

    const likeRef = ref(db, `posts/${key}/likedBy/${userKey}`);

    runTransaction(likeRef, (current) => {
        if(current){
            alert("Ya diste like aquí");
            return; // bloquea doble like
        }
        return true;
    }).then((res) => {
        if(res.committed){
            const countRef = ref(db, `posts/${key}/likes`);
            runTransaction(countRef, (v) => (v || 0) + 1);
        }
    });
};

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const k = snap.key;
            const div = document.createElement('div'); div.className = 'card';
            div.innerHTML = `
                <div class="user-line"><span>${d.avatar}</span> <span class="u-name">@${d.name}</span></div>
                <div class="u-text">${d.msg}</div>
                <div class="actions">
                    <button class="act-btn" onclick="sumarLike('${k}')">🔋 <span id="l-${k}">${d.likes || 0}</span></button>
                    <button class="act-btn" onclick="showR('${k}')">💬 COMENTAR</button>
                </div>
                <div id="thr-${k}" class="replies"></div>
                <div id="f-${k}" class="r-form">
                    <input id="in-${k}" placeholder="Responder...">
                    <button onclick="resp('${k}')" style="background:var(--cyan);border:none;padding:10px;border-radius:10px;font-weight:bold;">OK</button>
                </div>
            `;
            document.getElementById('post-mount').prepend(div);

            // Escuchar likes en tiempo real para actualizar el número
            onChildAdded(ref(db, `posts/${k}/likes`), () => {}); // Solo para activar el listener
            
            // Listener específico para el contador de likes de este post
            const lRef = ref(db, `posts/${k}/likes`);
            import('https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js').then(fb => {
                fb.onValue(lRef, (s) => {
                    const el = document.getElementById(`l-${k}`);
                    if(el) el.innerText = s.val() || 0;
                });
            });

            onChildAdded(ref(db, `posts/${k}/replies`), rSnap => {
                const r = rSnap.val();
                const rDiv = document.createElement('div'); rDiv.className = 'r-item';
                rDiv.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thr-${k}`).appendChild(rDiv);
            });
        });

        window.showR = (k) => { const f = document.getElementById(`f-${k}`); f.style.display = f.style.display === 'flex' ? 'none' : 'flex'; };
        window.resp = (k) => {
            const u = checkID(); const txt = document.getElementById(`in-${k}`).value.trim();
            if(!u || !txt) return;
            push(ref(db, `posts/${k}/replies`), { name: u.id, avatar: u.av, msg: txt });
            document.getElementById(`in-${k}`).value = "";
            document.getElementById(`f-${k}`).style.display = 'none';
        };
    </script>
</body>
</html>
