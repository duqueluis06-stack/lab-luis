<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Face-Luiyi</title>

<style>

/* ================= BODY ================= */
body {
    margin:0;
    font-family: Arial;
    background: url('fondo-foro.jpg') no-repeat center center fixed;
    background-size: cover;
    color:#00ffe0;
}

/* ================= OVERLAY (más claro) ================= */
.overlay {
    background: rgba(0,0,0,0.45); /* 👈 menos oscuro */
    min-height:100vh;
    padding:20px;
}

/* ================= TOP BAR ================= */
.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.top-bar a {
    color:#00ffcc;
    text-decoration:none;
    border:2px solid #00ffcc;
    padding:8px 15px;
    border-radius:6px;
    transition:0.3s;
}

.top-bar a:hover {
    color:#ff00ff;
    border-color:#ff00ff;
}

/* ================= AVATAR GLITCH ================= */
.avatar-glitch {
    position: fixed;
    top: 10px;
    right: 120px;
    width: 110px;
    height: 80px;
    background: black;
    border: 2px solid #00ffff;
    box-shadow: 0 0 15px #00ffff, 0 0 25px #00ffff;
    overflow: hidden;
}

.pantalla {
    width:100%;
    height:100%;
    animation: glitch 0.25s infinite alternate;
}

.ojos {
    display:flex;
    justify-content:center;
    margin-top:15px;
}

.ojo {
    width:12px;
    height:12px;
    background:#00ffff;
    margin:5px;
    position:relative;
}

.pupila {
    width:6px;
    height:6px;
    background:black;
    position:absolute;
    top:3px;
    left:3px;
}

.boca {
    width:40px;
    height:4px;
    background:#00ffff;
    margin:10px auto;
}

/* glitch animación */
@keyframes glitch {
    0% { transform: translate(0px, 0px); }
    25% { transform: translate(1px, -1px); }
    50% { transform: translate(-1px, 1px); }
    75% { transform: translate(2px, 0px); }
    100% { transform: translate(0px, 1px); }
}

/* ================= TITULO ================= */
h1 {
    text-align:center;
    font-size:2.5em;
    text-shadow:0 0 10px #00ffff, 0 0 20px #ff00ff;
}

/* ================= CONTENEDOR ================= */
.container {
    max-width:700px;
    margin:auto;
}

/* ================= FORMULARIO ================= */
.form-box {
    background:rgba(0,0,0,0.65);
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 15px #00ffff;
}

input, textarea {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
}

/* BOTÓN */
button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background:#00ffff;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    background:#00bfff;
}

/* ================= COMENTARIOS ================= */
.comment-box {
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    box-shadow:0 0 10px #00ffff;
}

</style>
</head>

<body>

<div class="overlay">

    <!-- BARRA -->
    <div class="top-bar">
        <a href="index.html">⬅ Volver</a>
        <a href="index.html">✖ Salir</a>
    </div>

    <!-- AVATAR -->
    <div class="avatar-glitch">
        <div class="pantalla">
            <div class="ojos">
                <div class="ojo"><div class="pupila"></div></div>
                <div class="ojo"><div class="pupila"></div></div>
            </div>
            <div class="boca"></div>
        </div>
    </div>

    <h1>⚡ Face-Luiyi</h1>

    <div class="container">

        <!-- FORM -->
        <div class="form-box">
            <input type="text" id="nombre" placeholder="Tu nombre">
            <textarea id="mensaje" rows="4" placeholder="Escribe tu mensaje..."></textarea>
            <button onclick="agregarComentario()">Enviar</button>
        </div>

        <!-- COMENTARIOS -->
        <div id="comentarios"></div>

    </div>

</div>

<script>

/* OJOS SIGUEN EL MOUSE */
document.addEventListener('mousemove', e => {
  document.querySelectorAll('.pupila').forEach(p => {
    const r = p.parentElement.getBoundingClientRect();
    const dx = e.clientX - (r.left + r.width/2);
    const dy = e.clientY - (r.top + r.height/2);
    const ang = Math.atan2(dy, dx);
    p.style.transform = `translate(${Math.cos(ang)*4}px, ${Math.sin(ang)*4}px)`;
  });
});

/* COMENTARIOS */
function agregarComentario(){

    let nombre = document.getElementById("nombre").value;
    let mensaje = document.getElementById("mensaje").value;

    if(nombre==="" || mensaje===""){
        alert("Completa los campos");
        return;
    }

    let contenedor = document.getElementById("comentarios");

    let nuevo = document.createElement("div");
    nuevo.className="comment-box";

    nuevo.innerHTML = "<strong>"+nombre+":</strong><br>"+mensaje;

    contenedor.prepend(nuevo);

    document.getElementById("nombre").value="";
    document.getElementById("mensaje").value="";
}

</script>

</body>
</html>
