<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💎 NEURO-LUIYI LAB: ELITE V3</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --purple: #9d00ff;
            --dark: #010103;
            --glass: rgba(10, 15, 30, 0.95);
        }

        /* RESET Y BLOQUEO DE PANTALLA */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background: var(--dark); 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* FONDO WARP */
        #space-core { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a1128 0%, #000 100%); }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.6; animation: warpSpeed linear infinite; }
        @keyframes warpSpeed { from { transform: translateY(-100vh); } to { transform: translateY(100vh); } }

        /* CABECERA (FIJA) */
        .nav-station {
            height: 80px; 
            background: var(--glass); 
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--cyan); 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0 20px; 
            z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0, 255, 255, 0.2);
            flex-shrink: 0;
        }
        .exit-link { text-decoration: none; color: #ff3333; border: 1px solid #ff3333; padding: 5px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .logo-box h1 { font-size: 1rem; color: var(--cyan); letter-spacing: 2px; text-shadow: 0 0 10px var(--cyan); }
        .profile-gif { width: 50px; height: 50px; border: 2px solid var(--cyan); border-radius: 10px; object-fit: cover; }

        /* FEED DE MENSAJES */
        #data-stream { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            -webkit-overflow-scrolling: touch;
        }
        .post-frame {
            max-width: 600px; margin: 0 auto 20px auto; 
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-left: 5px solid var(--cyan);
            border-radius: 5px 15px 15px 5px; padding: 18px; 
            box-shadow: 8px 8px 20px rgba(0,0,0,0.5);
        }
        .user-tag { color: var(--cyan); font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; }
        .message-body { font-size: 1.05rem; color: #f0f0f0; }

        .action-row { display: flex; gap: 20px; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .action-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 0.8rem; }
        .thread-container { margin-top: 10px; padding-left: 15px; border-left: 1px dashed var(--cyan); }
        .reply-node { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; margin-bottom: 6px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.05); }

        /* CONSOLA DE MANDOS (REFORZADA PARA SAFARI) */
        .command-center {
            background: #08080a; 
            border-top: 2px solid var(--cyan); 
            padding: 15px 15px calc(35px + env(safe-area-inset-bottom)) 15px; /* ESPACIO PARA SAFARI */
            flex-shrink: 0;
            z-index: 2000;
        }

        .av-label { font-size: 0.7rem; color: var(--pink); letter-spacing: 1px; margin-bottom: 8px; display: block; font-weight: bold; }
        .av-strip { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 12px; }
        .av-item { font-size: 28px; cursor: pointer; opacity: 0.2; transition: 0.3s; transform: scale(0.9); }
        .av-item.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 8px var(--cyan)); }

        .input-grid { display: flex; gap: 10px; align-items: flex-end; }
        .input-wrap { 
            flex: 1; background: #000; border: 1px solid #333; border-radius: 12px; 
            padding: 10px; border-left: 3px solid var(--pink); 
            box-shadow: inset 0 0 10px rgba(255, 0, 255, 0.1);
        }
        #pilot-name { background: transparent; border: none; color: var(--cyan); font-weight: bold; width: 100%; font-size: 0.9rem; margin-bottom: 5px; outline: none; }
        #main-input { background: transparent; border: none; color: #fff; width: 100%; font-size: 1rem; outline: none; resize: none; min-height: 24px; }
        
        .warp-btn { 
            width: 55px; height: 55px; border-radius: 15px; border: none; 
            background: linear-gradient(135deg, var(--cyan), var(--purple)); 
            color: #fff; font-size: 1.6rem; cursor: pointer; 
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            display: flex; align-items: center; justify-content: center;
        }
        .warp-btn:active { transform: scale(0.9); }

        /* FORMULARIO RESPUESTA */
        .rep-form { display: none; margin-top: 10px; gap: 8px; }
        .rep-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 10px; border-radius: 8px; }

        @media (max-width: 600px) {
            .nav-station { height: 75px; padding: 0 15px; }
            .post-frame { border-radius: 0 15px 15px 0; width: 95%; }
        }
    </style>
</head>
<body>

    <div id="space-core"></div>

    <header class="nav-station">
        <a href="index.html" class="exit-link">EXIT</a>
        <div class="logo-box">
            <h1>NEURO-LUIYI</h1>
        </div>
        <img src="NeuroLuis.gif" class="profile-gif" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="data-stream">
        <div id="flow-container" style="max-width:600px; margin:auto;"></div>
    </main>

    <footer class="command-center">
        <span class="av-label">1. SELECCIONA AVATAR Y TU ID:</span>
        <div id="av-strip" class="av-strip"></div>
        <div class="input-grid">
            <div class="input-wrap">
                <input id="pilot-name" placeholder="Escribe tu ID aquí..." maxlength="12">
                <textarea id="main-input" placeholder="Tu mensaje..." rows="1"></textarea>
            </div>
            <button class="warp-btn" onclick="transmitir()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Fondo Estrellas
        const space = document.getElementById('space-core');
        for(let i=0; i<60; i++) {
            const s = document.createElement('div'); s.className = 'star';
            const size = Math.random()*3+'px'; s.style.width = size; s.style.height = size;
            s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
            s.style.animationDuration = (Math.random()*5+3)+'s'; space.appendChild(s);
        }

        // Selección de Avatar
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','💎','🌌'];
        let activeAv = null; 
        icons.forEach(icon => {
            const el = document.createElement('span'); 
            el.className = 'av-item'; 
            el.innerText = icon;
            el.onclick = () => {
                document.querySelectorAll('.av-item').forEach(i=>i.classList.remove('active'));
                el.classList.add('active'); 
                activeAv = icon;
            };
            document.getElementById('av-strip').appendChild(el);
        });

        window.transmitir = () => {
            const n = document.getElementById('pilot-name').value.trim();
            const m = document.getElementById('main-input').value.trim();
            
            if(!activeAv) { alert("¡Selecciona un avatar primero!"); return; }
            if(!n) { alert("¡Escribe tu nombre de Piloto!"); return; }
            if(!m) return;

            push(ref(db, "posts"), { name: n, avatar: activeAv, msg: m, likes: 0 });
            document.getElementById('main-input').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const data = snap.val(); const id = snap.key;
            const frame = document.createElement('div'); frame.className = 'post-frame';
            frame.innerHTML = `
                <div class="user-tag">${data.avatar} @${data.name}</div>
                <div class="message-body">${data.msg}</div>
                <div class="action-row">
                    <button class="action-btn" onclick="likePost('${id}')">🔋 <span id="l-${id}">${data.likes || 0}</span></button>
                    <button class="action-btn" onclick="toggleReply('${id}')">💬 RESPONDER</button>
                </div>
                <div class="thread-container" id="thread-${id}"></div>
                <div id="box-${id}" class="rep-form">
                    <input id="in-${id}" placeholder="Escribe respuesta...">
                    <button onclick="sendReply('${id}')" style="background:var(--cyan); border:none; border-radius:8px; padding:0 15px; font-weight:bold; cursor:pointer;">OK</button>
                </div>
            `;
            document.getElementById('flow-container').prepend(frame);

            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.className = 'reply-node';
                node.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.likePost = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleReply = (id) => { 
            const b = document.getElementById(`box-${id}`); 
            b.style.display = b.style.display === 'flex' ? 'none' : 'flex'; 
        };
        window.sendReply = (id) => {
            const input = document.getElementById(`in-${id}`); 
            const name = document.getElementById('pilot-name').value.trim() || "PILOTO";
            const avatar = activeAv || "👨‍🚀";
            if(!input.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name, avatar, msg: input.value.trim() });
            input.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
