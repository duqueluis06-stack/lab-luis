<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 NeuroLuiyi - Estación Espacial</title>

<style>
    :root {
        --neon-cyan: #00ffff;
        --neon-pink: #ff00ff;
        --glass: rgba(10, 10, 20, 0.9);
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #020205;
        color: white;
        height: 100vh;
        overflow: hidden;
        display: flex;
    }

    /* --- FONDO ESPACIAL DINÁMICO --- */
    #space-bg {
        position: fixed;
        inset: 0;
        z-index: -2;
        background: radial-gradient(circle at center, #1b2735 0%, #000 100%);
    }
    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.8;
        animation: warpDrive linear infinite;
    }
    @keyframes warpDrive {
        from { transform: translateY(-10px); opacity: 0; }
        to { transform: translateY(100vh); opacity: 1; }
    }

    /* --- IMÁGENES FIJAS --- */
    .neuro-gif {
        position: fixed;
        top: 15px;
        right: 15px;
        width: 110px;
        height: 110px;
        border: 2px solid var(--neon-cyan);
        border-radius: 15px;
        box-shadow: 0 0 20px var(--neon-cyan);
        z-index: 100;
        background: black;
    }
    .astronaut {
        position: fixed;
        width: 250px;
        bottom: 10%;
        right: 5%;
        z-index: -1;
        animation: float 8s ease-in-out infinite;
    }
    @keyframes float {
        0%, 100% { transform: translate(0,0) rotate(0deg); }
        50% { transform: translate(-20px, -40px) rotate(10deg); }
    }

    /* --- PANEL DE CONTROL LATERAL --- */
    .sidebar {
        width: 320px;
        background: var(--glass);
        backdrop-filter: blur(20px);
        border-right: 2px solid var(--neon-cyan);
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-sizing: border-box;
        z-index: 1000;
    }

    .sidebar h2 {
        color: var(--neon-cyan);
        text-align: center;
        text-shadow: 0 0 10px var(--neon-cyan);
        margin-top: 0;
    }

    /* AVATARES MIXTOS */
    .avatar-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 20px;
        padding: 10px;
        background: rgba(255,255,255,0.05);
        border-radius: 10px;
    }
    .av-item {
        font-size: 24px;
        cursor: pointer;
        text-align: center;
        padding: 5px;
        border-radius: 50%;
        border: 2px solid transparent;
        transition: 0.3s;
    }
    .av-item.selected {
        border-color: var(--neon-cyan);
        background: rgba(0, 255, 255, 0.2);
        transform: scale(1.1);
    }

    input, textarea {
        width: 100%;
        background: rgba(0,0,0,0.7);
        border: 1px solid #333;
        color: white;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        box-sizing: border-box;
    }
    input:focus { border-color: var(--neon-cyan); outline: none; }

    .btn-send {
        background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink));
        border: none;
        padding: 15px;
        color: white;
        font-weight: bold;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    }

    /* --- FEED CENTRAL --- */
    #main-scroll {
        flex-grow: 1;
        overflow-y: auto;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .post {
        width: 100%;
        max-width: 550px;
        background: rgba(20, 20, 30, 0.8);
        border: 1px solid var(--neon-cyan);
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .post-user {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--neon-cyan);
        font-weight: bold;
        margin-bottom: 10px;
    }

    .post-msg { line-height: 1.6; color: #eee; }

    .reply-area {
        margin-top: 15px;
        padding-top: 10px;
        border-top: 1px solid #333;
    }
    .reply-msg {
        font-size: 13px;
        background: rgba(255,255,255,0.05);
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 5px;
        border-left: 2px solid var(--neon-pink);
    }
</style>
</head>
<body>

<div id="space-bg"></div>

<img src="NeuroLuis.gif" class="neuro-gif" onerror="this.style.display='none'">

<img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Astronaut.png" class="astronaut">

<div class="sidebar">
    <h2>ESTACIÓN LUIYI</h2>
    
    <div class="avatar-grid" id="av-picker">
        <div class="av-item selected" onclick="setAvatar('🐸', this)">🐸</div>
        <div class="av-item" onclick="setAvatar('🚀', this)">🚀</div>
        <div class="av-item" onclick="setAvatar('⚡', this)">⚡</div>
        <div class="av-item" onclick="setAvatar('🧠', this)">🧠</div>
        <div class="av-item" onclick="setAvatar('👽', this)">👽</div>
        <div class="av-item" onclick="setAvatar('🤖', this)">🤖</div>
        <div class="av-item" onclick="setAvatar('🛸', this)">🛸</div>
        <div class="av-item" onclick="setAvatar('🧬', this)">🧬</div>
    </div>

    <input id="name" placeholder="Tu Nombre">
    <textarea id="msg" rows="5" placeholder="Escribe tu experimento..."></textarea>
    <button class="btn-send" onclick="send()">PUBLICAR WARP</button>

    <br>
    <a href="index.html" style="color: #666; text-decoration: none; font-size: 12px; text-align: center;">⬅ SALIR DEL FORO</a>
</div>

<div id="main-scroll">
    <div id="feed" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// --- ESTRELLAS ---
const bg = document.getElementById('space-bg');
for(let i=0; i<100; i++){
    let star = document.createElement('div');
    star.className = 'star';
    star.style.width = Math.random()*3+'px';
    star.style.height = star.style.width;
    star.style.left = Math.random()*100+'vw';
    star.style.top = Math.random()*100+'vh';
    star.style.animationDuration = (Math.random()*3 + 2)+'s';
    bg.appendChild(star);
}

// --- CONFIGURACIÓN FIREBASE (IGUAL A TU ORIGINAL) ---
const firebaseConfig = {
    databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentAvatar = "🐸";

function setAvatar(a, el) {
    document.querySelectorAll('.av-item').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    currentAvatar = a;
}

// --- FUNCIÓN ENVIAR (LÓGICA ORIGINAL) ---
function send() {
    let name = document.getElementById("name").value.trim();
    let msg = document.getElementById("msg").value.trim();

    if(!name || !msg) return alert("Escribe nombre y mensaje");

    db.ref("posts").push({
        name: name,
        avatar: currentAvatar,
        msg: msg,
        likes: 0,
        time: Date.now()
    }).then(() => {
        document.getElementById("msg").value = "";
    });
}

// --- CARGAR POSTS ---
db.ref("posts").on("child_added", snap => {
    let p = snap.val();
    let id = snap.key;
    
    let card = document.createElement("div");
    card.className = "post";
    card.innerHTML = `
        <div class="post-user">${p.avatar || '👤'} ${p.name}</div>
        <div class="post-msg">${p.msg}</div>
        <div style="margin-top:15px; font-size:13px;">
            <span style="cursor:pointer; color:var(--neon-pink)" onclick="like('${id}')">❤️ <span id="l-${id}">${p.likes || 0}</span></span>
            <span style="margin-left:20px; cursor:pointer; color:var(--neon-cyan)" onclick="toggleReply('${id}')">💬 Responder</span>
        </div>
        <div id="replies-${id}" class="reply-area"></div>
        <div id="box-${id}" style="display:none; margin-top:10px;">
            <input id="input-${id}" placeholder="Escribe y presiona Enter..." style="font-size:12px;">
        </div>
    `;
    document.getElementById("feed").prepend(card);

    // Evento Enter para responder
    let inp = card.querySelector(`#input-${id}`);
    inp.addEventListener("keydown", e => {
        if(e.key === "Enter") reply(id, inp);
    });

    loadReplies(id);
});

function like(id) {
    db.ref("posts/"+id+"/likes").transaction(v => (v || 0) + 1);
}

db.ref("posts").on("child_changed", snap => {
    let el = document.getElementById("l-"+snap.key);
    if(el) el.innerText = snap.val().likes || 0;
});

function toggleReply(id) {
    let box = document.getElementById("box-"+id);
    box.style.display = box.style.display === "none" ? "block" : "none";
}

function reply(postId, input) {
    let name = document.getElementById("name").value.trim() || "Anónimo";
    let txt = input.value.trim();
    if(!txt) return;

    db.ref("posts/"+postId+"/replies").push({
        name: name,
        avatar: currentAvatar,
        msg: txt
    });
    input.value = "";
}

function loadReplies(postId) {
    db.ref("posts/"+postId+"/replies").on("child_added", snap => {
        let r = snap.val();
        let rDiv = document.createElement("div");
        rDiv.className = "reply-msg";
        rDiv.innerHTML = `<b>${r.avatar || '👤'} ${r.name}:</b> ${r.msg}`;
        document.getElementById("replies-"+postId).appendChild(rDiv);
    });
}
</script>

</body>
</html>
