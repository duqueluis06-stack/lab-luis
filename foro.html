<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 NeuroLuiyi - Estación de Control</title>

<style>
:root {
    --cyan: #00ffff;
    --pink: #ff00ff;
    --glass: rgba(5, 5, 15, 0.95);
    --border: rgba(0, 255, 255, 0.3);
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #000;
    color: white;
    height: 100vh;
    display: flex;
    overflow: hidden; /* Evita que toda la pantalla haga scroll */
}

/* FONDO ESTRELLADO ANIMADO */
#bg-stars {
    position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(circle at center, #0a111a, #000);
}
.star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle 3s infinite; }
@keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

/* --- COLUMNA IZQUIERDA (SUSCRIPCIÓN) --- */
.side-panel {
    width: 280px;
    background: var(--glass);
    border-right: 1px solid var(--border);
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 10;
}

.sub-card {
    background: linear-gradient(145deg, rgba(255,0,255,0.1), rgba(0,255,255,0.1));
    border: 1px solid var(--cyan);
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
}

/* --- COLUMNA CENTRAL (FEED) --- */
#main-feed {
    flex: 1;
    overflow-y: auto;
    padding: 40px 20px 120px 20px; /* Espacio abajo para los avatares */
    display: flex;
    flex-direction: column;
    align-items: center;
    scrollbar-width: thin;
    scrollbar-color: var(--cyan) transparent;
}

.post-box {
    width: 100%;
    max-width: 650px;
    background: rgba(20, 20, 35, 0.8);
    border: 1px solid var(--border);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 25px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}
.post-box:hover { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0, 255, 255, 0.1); }

.post-header { display: flex; align-items: center; gap: 10px; color: var(--cyan); font-weight: bold; margin-bottom: 12px; }
.post-text { line-height: 1.6; color: #e0e0e0; margin-bottom: 15px; }

/* RESPUESTAS */
.replies-container { border-left: 2px solid #333; margin-left: 10px; padding-left: 15px; }
.reply-item { font-size: 13px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; margin-top: 5px; }
.reply-input-box { display: flex; gap: 8px; margin-top: 15px; }
.reply-input-box input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; }

/* --- NEUROLUIGI (DERECHA ARRIBA) --- */
.neuro-container {
    position: fixed; top: 20px; right: 20px;
    text-align: center; z-index: 100;
}
.neuro-container img {
    width: 120px; height: 120px;
    border: 2px solid var(--cyan);
    border-radius: 20px;
    box-shadow: 0 0 25px var(--cyan);
    background: black;
}

/* --- BARRA INFERIOR (AVATARES) --- */
.bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--glass);
    border-top: 2px solid var(--cyan);
    padding: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    z-index: 1000;
}

.av-selector { display: flex; gap: 12px; }
.av-btn { 
    font-size: 28px; cursor: pointer; padding: 5px; border-radius: 50%; 
    border: 2px solid transparent; transition: 0.2s; 
}
.av-btn.active { border-color: var(--cyan); background: rgba(0, 255, 255, 0.2); transform: scale(1.2); }

input, textarea { width: 100%; border-radius: 8px; padding: 12px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
.btn-send { background: var(--cyan); color: black; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

@media (max-width: 768px) {
    body { flex-direction: column; }
    .side-panel { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .neuro-container img { width: 70px; height: 70px; }
    .bottom-bar { flex-direction: column; gap: 10px; height: auto; }
}
</style>
</head>

<body>

<div id="bg-stars"></div>

<div class="side-panel">
    <h3 style="color:var(--cyan); text-align:center;">🛰️ TERMINAL</h3>
    
    <div class="sub-card">
        <small>ESTADO:</small><br>
        <strong>USUARIO ALPHA</strong>
    </div>

    <input id="userName" placeholder="Tu Nombre de Piloto">
    <textarea id="userMsg" placeholder="Mensaje para la estación..." rows="4"></textarea>
    <button class="btn-send" onclick="sendMain()">PUBLICAR</button>
</div>

<div id="main-feed">
    <div id="chat-container" style="width:100%; max-width:650px;"></div>
</div>

<div class="neuro-container">
    <img src="NeuroLuis.gif" alt="NeuroLuis" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    <div style="font-size:12px; color:var(--cyan); margin-top:5px; font-weight:bold;">SISTEMA ACTIVO</div>
</div>

<div class="bottom-bar">
    <span style="font-size:12px; color:var(--cyan);">ELIGE TU AVATAR:</span>
    <div class="av-selector" id="av-list">
        </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
    authDomain: "foro-luiyi.firebaseapp.com",
    databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "foro-luiyi",
    storageBucket: "foro-luiyi.firebasestorage.app",
    messagingSenderId: "410471993147",
    appId: "1:410471993147:web:d672952aa8a4364d48f11e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* --- GESTIÓN DE AVATARES --- */
const emos = ['👽','🤖','👨‍🚀','🚀','🧠','⚡','👾','🛸','🧬','🔭'];
let currentAv = emos[0];
const list = document.getElementById('av-list');

emos.forEach(e => {
    const s = document.createElement('span');
    s.className = 'av-btn' + (e === currentAv ? ' active' : '');
    s.innerText = e;
    s.onclick = () => {
        document.querySelectorAll('.av-btn').forEach(b => b.classList.remove('active'));
        s.classList.add('active');
        currentAv = e;
    };
    list.appendChild(s);
});

/* --- GENERAR ESTRELLAS --- */
const bg = document.getElementById('bg-stars');
for(let i=0; i<60; i++){
    const star = document.createElement('div');
    star.className = 'star';
    star.style.width = Math.random()*3+'px'; star.style.height = star.style.width;
    star.style.left = Math.random()*100+'vw'; star.style.top = Math.random()*100+'vh';
    star.style.animationDelay = Math.random()*5+'s';
    bg.appendChild(star);
}

/* --- FIREBASE: ACCIONES --- */
window.sendMain = () => {
    const name = document.getElementById('userName').value.trim();
    const msg = document.getElementById('userMsg').value.trim();
    if(!name || !msg) return alert("Identifíquese, piloto.");

    push(ref(db, "posts"), {
        name,
        avatar: currentAv,
        msg,
        likes: 0,
        time: Date.now()
    });
    document.getElementById('userMsg').value = "";
};

onChildAdded(ref(db, "posts"), snap => {
    const p = snap.val();
    const id = snap.key;
    const div = document.createElement('div');
    div.className = 'post-box';
    div.innerHTML = `
        <div class="post-header"><span>${p.avatar}</span> @${p.name}</div>
        <div class="post-text">${p.msg}</div>
        <div style="display:flex; gap:15px; font-size:12px;">
            <span style="cursor:pointer; color:var(--pink)" onclick="like('${id}')">❤️ Energía: <span id="l-${id}">${p.likes || 0}</span></span>
            <span style="color:#666;">ID: ${id.substring(1,6)}</span>
        </div>
        <div class="replies-container" id="reps-${id}"></div>
        <div class="reply-input-box">
            <input id="in-${id}" placeholder="Escribe una respuesta...">
            <button class="btn-send" style="padding:5px 15px;" onclick="sendReply('${id}')">OK</button>
        </div>
    `;
    document.getElementById('chat-container').prepend(div);

    // Escuchar respuestas
    onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
        const r = rSnap.val();
        const rDiv = document.createElement('div');
        rDiv.className = 'reply-item';
        rDiv.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
        document.getElementById(`reps-${id}`).appendChild(rDiv);
    });
});

window.like = (id) => {
    runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
};

window.sendReply = (postId) => {
    const inp = document.getElementById(`in-${postId}`);
    const name = document.getElementById('userName').value.trim() || "Anónimo";
    if(!inp.value.trim()) return;
    push(ref(db, `posts/${postId}/replies`), {
        name,
        avatar: currentAv,
        msg: inp.value.trim()
    });
    inp.value = "";
};
</script>

</body>
</html>
