<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 NeuroLuiyi - Forum Mobile Ready</title>

<style>
:root {
    --neon-cyan: #00ffff;
    --neon-pink: #ff00ff;
    --glass: rgba(5, 5, 10, 0.92);
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #010103;
    color: white;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: row; /* Desktop por defecto */
}

/* RESPONSIVE: En móviles el flujo es vertical */
@media (max-width: 768px) {
    body { flex-direction: column; overflow-y: auto; height: auto; }
    .sidebar { width: 100% !important; height: auto !important; border-right: none !important; border-bottom: 2px solid var(--neon-cyan); position: relative !important; }
    #main { height: auto !important; overflow: visible !important; width: 100% !important; padding: 20px 10px !important; }
    .astronaut { width: 150px !important; opacity: 0.4; }
    .neuro-gif { width: 70px !important; height: 70px !important; }
}

/* FONDO ESTRELLADO */
#space-bg { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at center, #0a111a 0%, #000 100%); }
.star { position: absolute; background: white; border-radius: 50%; animation: warp linear infinite; }
@keyframes warp { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(100vh); opacity: 1; } }

/* SIDEBAR (Panel de Control) */
.sidebar {
    width: 340px;
    background: var(--glass);
    backdrop-filter: blur(25px);
    border-right: 2px solid var(--neon-cyan);
    padding: 25px;
    display: flex;
    flex-direction: column;
    z-index: 100;
    box-sizing: border-box;
    flex-shrink: 0;
}

.sidebar h2 { color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); text-align: center; margin-bottom: 20px; font-size: 1.4rem; }

/* AVATARES REALISTAS */
.avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
.av-item { 
    font-size: 24px; cursor: pointer; text-align: center; padding: 5px; border-radius: 10px; 
    border: 2px solid transparent; transition: 0.3s; background: rgba(255,255,255,0.05);
}
.av-item:hover { background: rgba(0, 255, 255, 0.2); }
.av-item.selected { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); background: rgba(0, 255, 255, 0.3); }

input, textarea {
    width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #333;
    background: rgba(0,0,0,0.8); color: white; box-sizing: border-box; font-size: 16px; /* Evita zoom en iOS */
}

.btn-pub {
    width: 100%; margin-top: 15px; padding: 14px; border: none; border-radius: 8px;
    background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink));
    color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
}

/* IMÁGENES DE CINE */
.neuro-gif { position: fixed; top: 15px; right: 15px; width: 100px; height: 100px; border: 2px solid var(--neon-cyan); border-radius: 12px; z-index: 10; }
.astronaut { 
    position: fixed; width: 300px; bottom: 5%; right: 2%; z-index: -1; 
    animation: cinematicFloat 12s ease-in-out infinite; pointer-events: none;
}
@keyframes cinematicFloat { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-40px) rotate(5deg); } }

/* FEED DE MENSAJES */
#main { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; }
.post {
    background: rgba(15, 15, 25, 0.9); border: 1px solid rgba(0, 255, 255, 0.4);
    padding: 18px; margin-bottom: 20px; border-radius: 12px; width: 100%; max-width: 580px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.8);
}
.post-user { color: var(--neon-cyan); font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.post-msg { line-height: 1.5; color: #d1d1d1; font-size: 0.95rem; }
.btn-like { background: none; border: 1px solid var(--neon-pink); color: var(--neon-pink); padding: 4px 12px; border-radius: 15px; cursor: pointer; margin-top: 12px; font-size: 0.8rem; }
</style>
</head>

<body>

<div id="space-bg"></div>
<img src="NeuroLuis.gif" class="neuro-gif" onerror="this.style.display='none'">
<img src="https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png" class="astronaut">

<div class="sidebar">
    <h2>LAB LUIS</h2>
    <div class="avatar-grid">
        <div class="av-item selected" onclick="setAvatar('👽',this)">👽</div>
        <div class="av-item" onclick="setAvatar('🛸',this)">🛸</div>
        <div class="av-item" onclick="setAvatar('👨‍🚀',this)">👨‍🚀</div>
        <div class="av-item" onclick="setAvatar('👾',this)">👾</div>
        <div class="av-item" onclick="setAvatar('🧠',this)">🧠</div>
        <div class="av-item" onclick="setAvatar('⚡',this)">⚡</div>
        <div class="av-item" onclick="setAvatar('🤖',this)">🤖</div>
        <div class="av-item" onclick="setAvatar('🚀',this)">🚀</div>
        <div class="av-item" onclick="setAvatar('🧬',this)">🧬</div>
        <div class="av-item" onclick="setAvatar('🔭',this)">🔭</div>
    </div>
    <input id="name" placeholder="Nombre de usuario">
    <textarea id="msg" rows="4" placeholder="Escribe tu experimento..."></textarea>
    <button class="btn-pub" onclick="send()">PUBLICAR WARP</button>
    <a href="index.html" style="text-align:center; color:#555; text-decoration:none; font-size:12px; margin-top:15px;">⬅ SALIR DEL SISTEMA</a>
</div>

<div id="main">
    <div id="feed" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
  authDomain: "foro-luiyi.firebaseapp.com",
  databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "foro-luiyi",
  storageBucket: "foro-luiyi.firebasestorage.app",
  messagingSenderId: "410471993147",
  appId: "1:410471993147:web:d672952aa8a4364d48f11e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ESTRELLAS */
const bg = document.getElementById('space-bg');
for(let i=0; i<80; i++){
    let star = document.createElement('div');
    star.className = 'star';
    star.style.width = Math.random()*2+'px';
    star.style.height = star.style.width;
    star.style.left = Math.random()*100+'vw';
    star.style.top = Math.random()*100+'vh';
    star.style.animationDuration = (Math.random()*4+2)+'s';
    bg.appendChild(star);
}

let avatar = "👽";
window.setAvatar = (a,el) => {
    document.querySelectorAll(".av-item").forEach(x=>x.classList.remove("selected"));
    el.classList.add("selected");
    avatar = a;
};

window.send = () => {
    const n = document.getElementById("name").value.trim();
    const m = document.getElementById("msg").value.trim();
    if(!n || !m) return alert("Completa los campos");
    push(ref(db, "posts"), { name: n, avatar, msg: m, likes: 0, time: Date.now() });
    document.getElementById("msg").value = "";
};

onChildAdded(ref(db, "posts"), snap => {
    const p = snap.val();
    const id = snap.key;
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = `
        <div class="post-user">${p.avatar} @${p.name}</div>
        <div class="post-msg">${p.msg}</div>
        <button class="btn-like" onclick="like('${id}')">❤️ Energía: <span id="l-${id}">${p.likes || 0}</span></button>
    `;
    document.getElementById("feed").prepend(div);
});

window.like = (id) => {
    runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1)
    .then(() => {
        const s = document.getElementById(`l-${id}`);
        if(s) s.innerText = parseInt(s.innerText)+1;
    });
};
</script>
</body>
</html>
