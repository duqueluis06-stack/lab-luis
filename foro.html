<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💎 NEURO-LUIYI LAB V3.2</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --dark: #020205;
        }

        /* RESET PARA SAFARI */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- FONDO ESTRELLADO OPTIMIZADO (CSS PURO) --- */
        .space-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
        }
        /* Estrellas fijas ligeras */
        .space-bg::after {
            content: ""; position: absolute; top: 0; left: 0; width: 200%; height: 200%;
            background-image: radial-gradient(#fff 1px, transparent 1.2px);
            background-size: 100px 100px;
            opacity: 0.3;
            animation: starsMove 100s linear infinite;
        }
        @keyframes starsMove {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        /* --- CABECERA --- */
        .nav-station {
            height: 75px; background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; z-index: 100; flex-shrink: 0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        .exit-link { text-decoration: none; color: #ff3333; border: 1px solid #ff3333; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .logo h1 { font-size: 16px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 1px; }
        .profile-gif { width: 48px; height: 48px; border: 2px solid var(--cyan); border-radius: 8px; object-fit: cover; }

        /* --- FEED (SCROLL) --- */
        #data-stream { 
            flex: 1; overflow-y: auto; padding: 15px; 
            -webkit-overflow-scrolling: touch; /* Scroll suave en iOS */
        }
        .post-frame {
            max-width: 550px; margin: 0 auto 15px; background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--cyan); border-radius: 0 12px 12px 0; padding: 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5); transform: translateZ(0);
        }
        .user-tag { color: var(--cyan); font-weight: bold; font-size: 13px; margin-bottom: 5px; }
        .message-body { font-size: 15px; color: #f0f0f0; line-height: 1.4; }

        .action-btn { background: none; border: none; color: #777; font-size: 11px; cursor: pointer; margin-top: 10px; margin-right: 15px; }
        .reply-node { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; margin-top: 8px; font-size: 13px; border-left: 1px solid var(--pink); }

        /* --- CONSOLA DE MANDOS (OPTIMIZADA SAFARI) --- */
        .command-center {
            background: #08080c; border-top: 1px solid var(--cyan);
            padding: 10px 15px calc(25px + env(safe-area-inset-bottom)); 
            z-index: 100; flex-shrink: 0;
        }
        .av-strip { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 5px; }
        .av-item { font-size: 26px; cursor: pointer; opacity: 0.3; transition: 0.2s; }
        .av-item.active { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 5px var(--cyan)); }

        .input-grid { display: flex; gap: 10px; align-items: center; }
        .input-wrap { flex: 1; background: #121218; border: 1px solid #333; border-radius: 20px; padding: 8px 15px; display: flex; flex-direction: column; }
        #pilot-name { background: none; border: none; color: var(--cyan); font-weight: bold; font-size: 12px; outline: none; margin-bottom: 2px; }
        #main-input { background: none; border: none; color: #fff; font-size: 14px; outline: none; resize: none; }
        
        .warp-btn { 
            width: 45px; height: 45px; border-radius: 50%; border: none; 
            background: var(--cyan); color: #000; font-size: 20px; cursor: pointer; 
            box-shadow: 0 0 10px var(--cyan); display: flex; align-items: center; justify-content: center;
        }

        .rep-form { display: none; margin-top: 8px; gap: 5px; }
        .rep-form input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="space-bg"></div>

    <header class="nav-station">
        <a href="index.html" class="exit-link">SALIR</a>
        <div class="logo"><h1>NEURO-LUIYI</h1></div>
        <img src="NeuroLuis.gif" class="profile-gif" onerror="this.src='https://via.placeholder.com/50'">
    </header>

    <main id="data-stream">
        <div id="flow-container"></div>
    </main>

    <footer class="command-center">
        <div id="av-strip" class="av-strip"></div>
        <div class="input-grid">
            <div class="input-wrap">
                <input id="pilot-name" placeholder="Tu ID..." maxlength="12">
                <input id="main-input" placeholder="Mensaje...">
            </div>
            <button class="warp-btn" onclick="transmitir()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Avatares
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','💎','🌌'];
        let activeAv = null; 
        icons.forEach(icon => {
            const el = document.createElement('span'); el.className = 'av-item'; el.innerText = icon;
            el.onclick = () => {
                document.querySelectorAll('.av-item').forEach(i=>i.classList.remove('active'));
                el.classList.add('active'); activeAv = icon;
            };
            document.getElementById('av-strip').appendChild(el);
        });

        window.transmitir = () => {
            const n = document.getElementById('pilot-name').value.trim();
            const m = document.getElementById('main-input').value.trim();
            if(!activeAv || !n || !m) { alert("Completa ID, Avatar y Mensaje"); return; }
            push(ref(db, "posts"), { name: n, avatar: activeAv, msg: m, likes: 0 });
            document.getElementById('main-input').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const data = snap.val(); const id = snap.key;
            const frame = document.createElement('div'); frame.className = 'post-frame';
            frame.innerHTML = `
                <div class="user-tag">${data.avatar} @${data.name}</div>
                <div class="message-body">${data.msg}</div>
                <div class="action-row">
                    <button class="action-btn" onclick="likePost('${id}')">🔋 <span id="l-${id}">${data.likes || 0}</span></button>
                    <button class="action-btn" onclick="toggleReply('${id}')">💬 RESPONDER</button>
                </div>
                <div id="thread-${id}"></div>
                <div id="box-${id}" class="rep-form">
                    <input id="in-${id}" placeholder="Respuesta...">
                    <button onclick="sendReply('${id}')" style="background:var(--cyan); border:none; border-radius:5px; padding:5px 10px; font-weight:bold;">OK</button>
                </div>
            `;
            document.getElementById('flow-container').prepend(frame);

            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.className = 'reply-node';
                node.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.likePost = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleReply = (id) => { 
            const b = document.getElementById(`box-${id}`); 
            b.style.display = (b.style.display === 'flex') ? 'none' : 'flex'; 
        };
        window.sendReply = (id) => {
            const inp = document.getElementById(`in-${id}`);
            const name = document.getElementById('pilot-name').value || "Piloto";
            if(!inp.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name, avatar: activeAv || "👨‍🚀", msg: inp.value.trim() });
            inp.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
