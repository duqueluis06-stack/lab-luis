<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🪐 NEURO-LUIYI: NASA SATURN FINAL</title>
    <style>
        :root {
            --cyan: #00ffff; --pink: #ff00ff; --dark: #000005;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--dark);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- FONSO NASA TOTAL (Garantizado) --- */
        .nasa-space {
            position: fixed; inset: 0; z-index: -1;
            background-color: #000;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px),
                radial-gradient(rgba(0,255,255,0.1), transparent 50%);
            background-size: 550px 550px, 350px 350px, 250px 250px, 100% 100%;
            background-position: 0 0, 40px 60px, 130px 270px, center;
        }

        /* Saturno con Anillos */
        .saturn-box {
            position: absolute; top: 10%; right: 10%; width: 150px; height: 100px;
            display: flex; align-items: center; justify-content: center;
        }
        .saturn-body {
            width: 50px; height: 50px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f9e2b0, #a17f4a);
            box-shadow: 0 0 20px rgba(249, 226, 176, 0.4);
            z-index: 2;
        }
        .saturn-rings {
            position: absolute; width: 110px; height: 35px;
            border: 8px solid rgba(225, 180, 107, 0.6);
            border-radius: 50%; transform: rotateX(75deg);
            z-index: 1;
        }

        /* Luna */
        .moon-giant {
            position: absolute; bottom: -40px; left: -40px; width: 180px; height: 180px;
            background: radial-gradient(circle at 70% 30%, #999, #333);
            border-radius: 50%; opacity: 0.5;
        }

        /* --- INTERFAZ --- */
        .header {
            height: 70px; background: rgba(0, 0, 10, 0.8); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; z-index: 100;
        }
        .logo h1 { font-size: 16px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }
        .profile-gif { width: 45px; height: 45px; border: 2px solid var(--cyan); border-radius: 8px; }

        #stream { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .post {
            max-width: 500px; margin: 0 auto 15px; background: rgba(10, 15, 30, 0.8);
            border-left: 4px solid var(--cyan); border-radius: 0 12px 12px 0; padding: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }
        
        .user-row { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(0,255,255,0.2); padding-bottom: 8px; margin-bottom: 10px; }
        .id-tag { color: var(--cyan); font-weight: bold; font-size: 13px; }
        .msg-text { font-size: 15px; color: #fff; padding-bottom: 10px; border-bottom: 1px solid rgba(255,0,255,0.15); }

        /* --- CONSOLA --- */
        .console {
            background: #000; border-top: 2px solid var(--cyan);
            padding: 10px 15px calc(25px + env(safe-area-inset-bottom)); z-index: 2000;
        }
        .av-selector { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #222; }
        .av-icon { font-size: 26px; opacity: 0.3; cursor: pointer; transition: 0.3s; }
        .av-icon.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 8px var(--cyan)); }

        .input-box { display: flex; gap: 10px; align-items: center; }
        .field-wrap { flex: 1; background: #0a0a0f; border: 1px solid #333; border-radius: 12px; padding: 8px; border-left: 3px solid var(--pink); }
        #p-name { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 12px; width: 100%; margin-bottom: 4px; outline: none; }
        #m-text { background: none; border: none; color: #fff; font-size: 14px; width: 100%; outline: none; }
        
        .btn-send { width: 50px; height: 50px; border-radius: 12px; border: none; background: var(--cyan); color: #000; font-size: 22px; cursor: pointer; }
        .rep-form { display: none; margin-top: 10px; gap: 8px; }
        .rep-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="nasa-space">
        <div class="saturn-box">
            <div class="saturn-rings"></div>
            <div class="saturn-body"></div>
        </div>
        <div class="moon-giant"></div>
    </div>

    <header class="header">
        <div class="logo"><h1>NEURO LUIYI</h1></div>
        <img src="NeuroLuis.gif" class="profile-gif" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="stream"><div id="container"></div></main>

    <footer class="console">
        <div id="av-list" class="av-selector"></div>
        <div class="input-box">
            <div class="field-wrap">
                <input id="p-name" placeholder="TU ID PILOTO..." maxlength="12">
                <input id="m-text" placeholder="TU MENSAJE...">
            </div>
            <button class="btn-send" onclick="enviar()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Selector Avatares
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-icon'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-list').appendChild(el);
        });

        const validar = (idIn) => {
            const id = document.getElementById(idIn).value.trim();
            if (!selAv || !id) { alert("ERROR: Selecciona Avatar e ID Piloto."); return false; }
            return { id, avatar: selAv };
        };

        window.enviar = () => {
            const u = validar('p-name');
            const m = document.getElementById('m-text').value.trim();
            if(!u || !m) return;
            push(ref(db, "posts"), { name: u.id, avatar: u.avatar, msg: m, likes: 0 });
            document.getElementById('m-text').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const id = snap.key;
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div class="user-row"><span>${d.avatar}</span> <span class="id-tag">@${d.name}</span></div>
                <div class="msg-text">${d.msg}</div>
                <div class="actions">
                    <button style="color:#888; background:none; border:none;" onclick="like('${id}')">🔋 <span id="l-${id}">${d.likes || 0}</span></button>
                    <button style="color:#888; background:none; border:none;" onclick="toggleR('${id}')">💬 RESPONDER</button>
                </div>
                <div id="thread-${id}" style="margin-top:10px; padding-left:12px; border-left:1px dashed var(--pink); font-size:13px; color:#ccc;"></div>
                <div id="box-${id}" class="rep-form">
                    <input id="in-${id}" placeholder="Respuesta...">
                    <button onclick="sendR('${id}')" style="background:var(--cyan); border:none; padding:5px 10px; border-radius:5px;">OK</button>
                </div>
            `;
            document.getElementById('container').prepend(div);
            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleR = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        window.sendR = (id) => {
            const u = validar('p-name');
            const i = document.getElementById(`in-${id}`);
            if(!u || !i.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name: u.id, avatar: u.avatar, msg: i.value.trim() });
            i.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
