<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🚀 NeuroLuiyi Station</title>

<style>
:root {
    --cyan: #00ffff;
    --pink: #ff00ff;
    --dark: #05050a;
    --glass: rgba(15, 15, 25, 0.95);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--dark);
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* FONDO GALÁCTICO */
#space {
    position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(circle at center, #101820, #000);
}
.star { position: absolute; background: white; border-radius: 50%; opacity: 0.6; }

/* CABECERA FIJA */
.header {
    height: 70px;
    background: var(--glass);
    border-bottom: 1px solid var(--cyan);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    z-index: 1000;
}

.neuro-logo {
    width: 50px; height: 50px;
    border: 1px solid var(--cyan);
    border-radius: 10px;
    box-shadow: 0 0 10px var(--cyan);
}

/* ÁREA DE MENSAJES (SCROLL LIBRE) */
#feed-container {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    padding-bottom: 100px; /* Espacio para que el último mensaje no quede tras el input */
    -webkit-overflow-scrolling: touch;
}

.post-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0, 255, 255, 0.2);
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 20px;
    backdrop-filter: blur(5px);
}

.post-user { color: var(--cyan); font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
.post-content { line-height: 1.4; font-size: 1rem; color: #f0f0f0; }

.actions { display: flex; gap: 20px; margin-top: 12px; border-top: 1px solid #222; padding-top: 10px; }
.btn-act { background: none; border: none; color: #888; cursor: pointer; font-size: 0.85rem; padding: 5px; }
.btn-act.like:active { color: var(--pink); }

.replies { margin-left: 15px; border-left: 1px solid #333; padding-left: 10px; margin-top: 10px; }
.rep-msg { font-size: 0.85rem; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 5px; margin-bottom: 4px; }

/* PANEL DE ENTRADA INFERIOR (ESTILO WHATSAPP/TELEGRAM) */
.input-area {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--glass);
    border-top: 1px solid var(--cyan);
    padding: 10px;
    z-index: 2000;
}

.input-row { display: flex; gap: 8px; align-items: flex-end; }
.input-row textarea {
    flex: 1; background: #000; border: 1px solid #333; color: white;
    padding: 10px; border-radius: 10px; font-size: 16px; resize: none;
    max-height: 100px;
}

.btn-send {
    background: var(--cyan); border: none; width: 45px; height: 45px;
    border-radius: 10px; font-weight: bold; cursor: pointer;
}

/* SELECTOR DE AVATARES HORIZONTAL */
.av-bar {
    display: flex; gap: 10px; overflow-x: auto; 
    padding: 5px 0 10px 0; scrollbar-width: none;
}
.av-bar::-webkit-scrollbar { display: none; }
.av-item { 
    font-size: 24px; padding: 5px; border-radius: 50%; border: 2px solid transparent; 
    flex-shrink: 0; cursor: pointer;
}
.av-item.active { border-color: var(--cyan); background: rgba(0,255,255,0.2); }

#name-input {
    background: none; border: none; border-bottom: 1px solid #333;
    color: var(--cyan); margin-bottom: 8px; width: 100%; font-size: 0.8rem;
}
</style>
</head>

<body>

<div id="space"></div>

<div class="header">
    <div>
        <h2 style="margin:0; font-size:1.2rem; color:var(--cyan);">ESTACIÓN LUIYI</h2>
        <span style="font-size:0.7rem; color:var(--pink);">Suscripción: ALPHA PILOT</span>
    </div>
    <img src="NeuroLuis.gif" class="neuro-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
</div>

<div id="feed-container">
    <div id="chat-flow"></div>
</div>

<div class="input-area">
    <div class="av-bar" id="av-list"></div>
    
    <input id="userName" placeholder="Tu nombre..." maxlength="15">
    
    <div class="input-row">
        <textarea id="userMsg" placeholder="Mensaje galáctico..." rows="1"></textarea>
        <button class="btn-send" onclick="sendMain()">🚀</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
    authDomain: "foro-luiyi.firebaseapp.com",
    databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "foro-luiyi",
    storageBucket: "foro-luiyi.firebasestorage.app",
    messagingSenderId: "410471993147",
    appId: "1:410471993147:web:d672952aa8a4364d48f11e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* --- ESTRELLAS --- */
const space = document.getElementById('space');
for(let i=0; i<50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.width = Math.random()*2+'px'; s.style.height = s.style.width;
    s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
    space.appendChild(s);
}

/* --- AVATARES --- */
const emos = ['👽','🤖','👨‍🚀','🚀','🧠','⚡','👾','🛸','🧬','🔭'];
let currentAv = emos[0];
const avList = document.getElementById('av-list');

emos.forEach(e => {
    const s = document.createElement('span');
    s.className = 'av-item' + (e === currentAv ? ' active' : '');
    s.innerText = e;
    s.onclick = () => {
        document.querySelectorAll('.av-item').forEach(b => b.classList.remove('active'));
        s.classList.add('active');
        currentAv = e;
    };
    avList.appendChild(s);
});

/* --- ACCIONES FIREBASE --- */
window.sendMain = () => {
    const name = document.getElementById('userName').value.trim();
    const msg = document.getElementById('userMsg').value.trim();
    if(!name || !msg) return;

    push(ref(db, "posts"), {
        name,
        avatar: currentAv,
        msg,
        likes: 0,
        time: Date.now()
    });
    document.getElementById('userMsg').value = "";
};

onChildAdded(ref(db, "posts"), snap => {
    const p = snap.val();
    const id = snap.key;
    const div = document.createElement('div');
    div.className = 'post-card';
    div.innerHTML = `
        <div class="post-user">${p.avatar} ${p.name}</div>
        <div class="post-content">${p.msg}</div>
        <div class="actions">
            <button class="btn-act like" onclick="like('${id}')">❤️ <span id="l-${id}">${p.likes || 0}</span></button>
            <button class="btn-act" onclick="showReplyBox('${id}')">💬 Responder</button>
        </div>
        <div class="replies" id="reps-${id}"></div>
        <div id="reply-box-${id}" style="display:none; margin-top:10px;">
            <input id="in-${id}" placeholder="Tu respuesta..." style="width:70%; background:#000; border:1px solid #333; color:white; padding:5px; border-radius:5px;">
            <button onclick="sendReply('${id}')" style="background:var(--cyan); border:none; padding:5px 10px; border-radius:5px;">OK</button>
        </div>
    `;
    document.getElementById('chat-flow').prepend(div);

    onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
        const r = rSnap.val();
        const rDiv = document.createElement('div');
        rDiv.className = 'rep-msg';
        rDiv.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
        document.getElementById(`reps-${id}`).appendChild(rDiv);
    });
});

window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
window.showReplyBox = (id) => {
    const box = document.getElementById(`reply-box-${id}`);
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
};

window.sendReply = (postId) => {
    const inp = document.getElementById(`in-${postId}`);
    const name = document.getElementById('userName').value.trim() || "Piloto";
    if(!inp.value.trim()) return;
    push(ref(db, `posts/${postId}/replies`), { name, avatar: currentAv, msg: inp.value.trim() });
    inp.value = "";
    document.getElementById(`reply-box-${postId}`).style.display = 'none';
};
</script>

</body>
</html>
