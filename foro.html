<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚡ FaceLuiyi Forum PRO</title>

<style>

/* FONDO REAL */
body{
    margin:0;
    font-family:Arial;
    color:white;

    background:url("fondo-foro.jpg") center/cover no-repeat fixed;
}

/* capa ligera (NO matar fondo) */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.25);
    z-index:-1;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    padding:12px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    font-weight:bold;
}

/* BOTONES */
.btn-top{
    padding:6px 10px;
    border-radius:8px;
    border:1px solid #00ffff;
    background:transparent;
    color:#00ffff;
    cursor:pointer;
    box-shadow:0 0 8px #00ffff;
}

.btn-top:hover{
    color:#ff00ff;
    border-color:#ff00ff;
}

/* GIF */
.gif-box{
    text-align:center;
    margin-top:10px;
}

.gif-box img{
    width:90px;
    border-radius:10px;
    box-shadow:0 0 10px #00ffff;
}

.gif-box p{
    font-size:12px;
    color:#00ffff;
}

/* LOGIN */
.login{
    text-align:center;
    margin:10px;
}

input,select{
    padding:8px;
    border-radius:8px;
    border:none;
}

/* POST BOX */
textarea{
    width:90%;
    max-width:500px;
    height:80px;
    border-radius:10px;
    border:none;
    padding:10px;
}

/* BOTÓN */
.main-btn{
    margin-top:5px;
    padding:8px 15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00ffff,#ff00ff);
    font-weight:bold;
    cursor:pointer;
}

/* POSTS */
.post{
    width:90%;
    max-width:500px;
    margin:10px auto;
    padding:10px;
    background:rgba(0,0,0,0.6);
    border-radius:10px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 10px #00ffff;
}

.user{
    font-weight:bold;
    color:#00ffff;
}

.cat{
    font-size:12px;
    color:#aaa;
}

.like{
    margin-top:5px;
    cursor:pointer;
    color:#ff4d6d;
}

</style>
</head>

<body>

<div class="header">
    ⚡ FaceLuiyi Forum
    <div>
        <button class="btn-top" onclick="goHome()">⬅ Inicio</button>
        <button class="btn-top" onclick="logout()">🚪 Salir</button>
    </div>
</div>

<div class="gif-box">
    <img src="NeuroLuis.gif">
    <p>Laboratorio de ideas en tiempo real</p>
</div>

<div class="login">
    <input id="name" placeholder="Tu nombre">

    <select id="avatar">
        <option>👤</option>
        <option>🧠</option>
        <option>⚡</option>
        <option>🤖</option>
        <option>🔬</option>
    </select>

    <button class="main-btn" onclick="saveUser()">Entrar</button>
</div>

<div style="text-align:center">
    <textarea id="msg" placeholder="Escribe algo..."></textarea><br>
    <button class="main-btn" onclick="send()">Publicar</button>
</div>

<div id="feed"></div>

<!-- FIREBASE V8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
    databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = firebase.database();

let user = localStorage.getItem("user") || "";
let avatar = localStorage.getItem("avatar") || "👤";

function saveUser(){
    user = document.getElementById("name").value;
    avatar = document.getElementById("avatar").value;

    if(!user) return;

    localStorage.setItem("user", user);
    localStorage.setItem("avatar", avatar);
}

function send(){
    const msg = document.getElementById("msg").value;

    if(!msg || !user) return;

    db.ref("posts").push({
        name:user,
        avatar:avatar,
        msg:msg,
        time:Date.now(),
        likes:0
    });

    document.getElementById("msg").value="";
}

const feed = document.getElementById("feed");

db.ref("posts").on("child_added", snap=>{

    const p = snap.val();

    const div = document.createElement("div");
    div.className="post";

    div.innerHTML=`
        <div class="user">${p.avatar} ${p.name}</div>
        <div class="cat">📡 mensaje</div>
        <div>${p.msg}</div>
        <div class="like" onclick="like('${snap.key}',this)">
            ❤️ <span>${p.likes||0}</span>
        </div>
    `;

    feed.prepend(div);
});

function like(id, el){
    const ref = db.ref("posts/"+id+"/likes");
    ref.transaction(v=>(v||0)+1);

    el.querySelector("span").innerText++;
}

function logout(){
    localStorage.clear();
    location.reload();
}

function goHome(){
    window.location.href="index.html";
}

</script>

</body>
</html>
