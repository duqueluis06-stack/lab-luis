<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 NeuroLuiyi Forum - LUXE</title>

<style>
    :root {
        --neon-cyan: #00ffff;
        --neon-pink: #ff00ff;
        --glass: rgba(10, 10, 15, 0.9);
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #020205;
        color: white;
        height: 100vh;
        overflow: hidden;
        display: flex;
    }

    /* --- FONDO ESPACIAL WARP --- */
    #warp-container {
        position: fixed;
        inset: 0;
        z-index: -2;
        background: radial-gradient(circle at center, #1b2735 0%, #000 100%);
    }
    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.6;
        animation: warpDrive linear infinite;
    }
    @keyframes warpDrive {
        from { transform: translateY(-100px) scale(0.5); opacity: 0; }
        to { transform: translateY(100vh) scale(1.2); opacity: 1; }
    }

    /* --- IMÁGENES: NEUROLUIS Y ASTRONAUTA --- */
    .neuro-gif {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 100px;
        height: 100px;
        border: 2px solid var(--neon-cyan);
        border-radius: 15px;
        box-shadow: 0 0 20px var(--neon-cyan);
        z-index: 100;
    }
    .astronaut {
        position: fixed;
        width: 180px;
        bottom: 5%;
        right: 5%;
        z-index: -1;
        animation: floating 6s ease-in-out infinite;
        filter: drop-shadow(0 0 15px var(--neon-cyan));
    }
    @keyframes floating {
        0%, 100% { transform: translate(0,0) rotate(0deg); }
        50% { transform: translate(-15px, -25px) rotate(5deg); }
    }

    /* --- PANEL LATERAL IZQUIERDO --- */
    .sidebar {
        width: 320px;
        background: var(--glass);
        backdrop-filter: blur(15px);
        border-right: 2px solid var(--neon-cyan);
        display: flex;
        flex-direction: column;
        padding: 25px;
        box-sizing: border-box;
        z-index: 1000;
        box-shadow: 10px 0 30px rgba(0, 255, 255, 0.1);
    }

    .header-title {
        color: var(--neon-cyan);
        font-size: 22px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
        text-shadow: 0 0 10px var(--neon-cyan);
    }

    /* AVATARES MEJORADOS */
    .avatar-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        margin-bottom: 20px;
    }
    .avatar-grid span {
        font-size: 24px;
        cursor: pointer;
        background: rgba(255,255,255,0.05);
        padding: 5px;
        border-radius: 8px;
        text-align: center;
        transition: 0.3s;
        border: 1px solid transparent;
    }
    .avatar-grid span:hover { background: rgba(0, 255, 255, 0.2); }
    .avatar-grid span.active { border-color: var(--neon-cyan); background: rgba(0, 255, 255, 0.3); transform: scale(1.1); }

    input, textarea {
        width: 100%;
        background: rgba(0,0,0,0.6);
        border: 1px solid #333;
        color: white;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 12px;
        box-sizing: border-box;
    }
    input:focus, textarea:focus { border-color: var(--neon-cyan); outline: none; }

    .btn-pub {
        background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
        border: none; padding: 15px; color: white; font-weight: bold;
        border-radius: 10px; cursor: pointer; text-transform: uppercase;
        box-shadow: 0 0 15px var(--neon-cyan);
    }

    /* --- FEED DE MENSAJES (CENTRO) --- */
    #main-scroll {
        flex-grow: 1;
        overflow-y: auto;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        scrollbar-width: none;
    }
    #main-scroll::-webkit-scrollbar { display: none; }

    .post {
        width: 100%;
        max-width: 550px;
        background: rgba(15, 15, 25, 0.85);
        border-left: 4px solid var(--neon-cyan);
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 25px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .user-line { color: var(--neon-cyan); font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .msg-content { line-height: 1.5; color: #eee; margin-bottom: 15px; }

    .actions { display: flex; gap: 20px; font-size: 13px; color: #888; }
    .btn-act { cursor: pointer; transition: 0.2s; }
    .btn-act:hover { color: var(--neon-cyan); }

    /* RESPUESTAS */
    .reply-list { margin-top: 15px; padding-left: 15px; border-left: 1px solid #444; }
    .reply-item { font-size: 13px; margin-bottom: 8px; background: rgba(255,255,255,0.03); padding: 5px 10px; border-radius: 5px; }
    
    .reply-input-box { display: none; margin-top: 10px; gap: 5px; }
    .reply-input-box input { margin-bottom: 0; padding: 6px; font-size: 12px; }

    .back-home { margin-top: auto; text-align: center; color: #555; text-decoration: none; font-size: 12px; }
</style>
</head>

<body>

<div id="warp-container"></div>
<img src="NeuroLuis.gif" class="neuro-gif">
<img src="https://i.ibb.co/3pX686y/astro.png" class="astronaut" onerror="this.src='https://cdni.iconscout.com/illustration/premium/thumb/astronaut-floating-in-space-5630045-4690333.png'">

<div class="sidebar">
    <div class="header-title">☎️ NEURO LUIYI</div>
    
    <p style="font-size:11px; color:var(--neon-cyan)">SELECCIONA TU AVATAR:</p>
    <div class="avatar-grid" id="avs">
        <span onclick="setAv('🐸', this)" class="active">🐸</span>
        <span onclick="setAv('🚀', this)">🚀</span>
        <span onclick="setAv('⚡', this)">⚡</span>
        <span onclick="setAv('👽', this)">👽</span>
        <span onclick="setAv('🧠', this)">🧠</span>
        <span onclick="setAv('🤖', this)">🤖</span>
        <span onclick="setAv('🧬', this)">🧬</span>
        <span onclick="setAv('🔭', this)">🔭</span>
        <span onclick="setAv('🛸', this)">🛸</span>
        <span onclick="setAv('💎', this)">💎</span>
    </div>

    <input id="name" placeholder="Tu Nombre">
    <textarea id="msg" rows="4" placeholder="Lanza un mensaje al espacio..."></textarea>
    <button class="btn-pub" onclick="send()">PUBLICAR WARP</button>

    <a href="index.html" class="back-home">⬅ VOLVER AL INICIO</a>
</div>

<div id="main-scroll">
    <div id="feed" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// --- EFECTO ESTRELLAS ---
const warp = document.getElementById('warp-container');
for(let i=0; i<100; i++){
    let s = document.createElement('div');
    s.className = 'star';
    s.style.width = Math.random()*3+'px';
    s.style.height = s.style.width;
    s.style.left = Math.random()*100+'vw';
    s.style.top = Math.random()*100+'vh';
    s.style.animationDuration = (Math.random()*3 + 2)+'s';
    warp.appendChild(s);
}

// --- CONEXIÓN FIREBASE (TU CONFIGURACIÓN ORIGINAL) ---
firebase.initializeApp({
    databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});
const db = firebase.database();
let avatar = "🐸";

function setAv(a, el){
    document.querySelectorAll('.avatar-grid span').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    avatar = a;
}

// --- FUNCIÓN SEND (TUS REGLAS ORIGINALES) ---
function send(){
    let name = document.getElementById("name").value.trim();
    let msg = document.getElementById("msg").value.trim();

    if(!name || !msg) return;
    if(name.length > 20 || msg.length > 300) return;

    db.ref("posts").push({
        name,
        avatar,
        msg,
        likes:0,
        time:Date.now()
    });
    document.getElementById("msg").value="";
}

// --- ESCUCHAR POSTS ---
db.ref("posts").on("child_added", snap=>{
    let p = snap.val();
    let id = snap.key;
    let div = document.createElement("div");
    div.className="post";
    div.innerHTML=`
        <div class="user-line"><span>${p.avatar||"🐸"}</span> ${p.name}</div>
        <div class="msg-content" id="m-${id}"></div>
        <div class="actions">
            <span class="btn-act" onclick="like('${id}', this)">❤️ <span id="l-${id}">${p.likes||0}</span></span>
            <span class="btn-act" onclick="toggleReply('${id}')">💬 Responder</span>
        </div>
        <div class="reply-input-box" id="box-${id}">
            <input id="input-${id}" placeholder="Escribe y pulsa Enter...">
        </div>
        <div class="reply-list" id="replies-${id}"></div>
    `;
    div.querySelector(`#m-${id}`).innerText = p.msg;
    document.getElementById("feed").prepend(div);

    // Evento Enter para respuestas
    let inp = div.querySelector(`#input-${id}`);
    inp.addEventListener("keydown", e => {
        if(e.key === "Enter") reply(id, inp);
    });

    loadReplies(id);
});

function like(id, el){
    if(el.style.color === "rgb(0, 255, 255)") return;
    el.style.color = "var(--neon-cyan)";
    db.ref("posts/"+id+"/likes").transaction(v => (v||0)+1);
}

db.ref("posts").on("child_changed", snap => {
    let l = document.getElementById("l-"+snap.key);
    if(l) l.innerText = snap.val().likes || 0;
});

function toggleReply(id){
    let b = document.getElementById("box-"+id);
    b.style.display = (b.style.display === "flex") ? "none" : "flex";
}

function reply(postID, input){
    let text = input.value.trim();
    let name = document.getElementById("name").value.trim() || "Anónimo";
    if(!text) return;

    db.ref("posts/"+postID+"/replies").push({
        name,
        avatar,
        msg: text
    });
    input.value="";
}

function loadReplies(postID){
    db.ref("posts/"+postID+"/replies").on("child_added", snap=>{
        let r = snap.val();
        let div = document.createElement("div");
        div.className="reply-item";
        div.innerHTML=`<b>${r.avatar||"🐸"} ${r.name}:</b> <span class="rm"></span>`;
        div.querySelector(".rm").innerText = r.msg;
        document.getElementById("replies-"+postID).appendChild(div);
    });
}
</script>

</body>
</html>
