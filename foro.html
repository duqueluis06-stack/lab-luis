<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛰️ Lab Luis - Sistema de Comunicaciones 3.0</title>

<style>
:root {
    --cyan: #00ffff;
    --pink: #ff00ff;
    --glass: rgba(10, 10, 25, 0.9);
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #000;
    color: white;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* RESPONSIVE */
@media (max-width: 800px) {
    body { flex-direction: column; overflow-y: auto; height: auto; }
    .sidebar { width: 100% !important; height: auto !important; position: sticky; top: 0; border-right: none !important; border-bottom: 2px solid var(--cyan); }
    #main { padding: 15px !important; }
    .astronaut { display: none; }
}

/* FONDO GALÁCTICO */
#stars-container { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle, #0d1b2a, #000); }
.star { position: absolute; background: white; border-radius: 50%; animation: move 3s linear infinite; }
@keyframes move { from { transform: translateY(-10px); } to { transform: translateY(100vh); } }

/* SIDEBAR */
.sidebar {
    width: 350px; background: var(--glass); backdrop-filter: blur(15px);
    border-right: 2px solid var(--cyan); padding: 25px; z-index: 100;
    display: flex; flex-direction: column; box-sizing: border-box;
}

.header-logo { text-align: center; margin-bottom: 20px; }
.header-logo img { width: 80px; height: 80px; border-radius: 15px; border: 2px solid var(--cyan); box-shadow: 0 0 15px var(--cyan); }

.av-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
.av-box { 
    font-size: 22px; cursor: pointer; text-align: center; padding: 5px; 
    border-radius: 8px; border: 2px solid transparent; transition: 0.3s; 
}
.av-box.selected { border-color: var(--cyan); background: rgba(0,255,255,0.2); transform: scale(1.1); }

input, textarea {
    width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #333;
    background: #000; color: white; box-sizing: border-box;
}

.btn-warp {
    width: 100%; margin-top: 15px; padding: 15px; border: none; border-radius: 8px;
    background: linear-gradient(45deg, var(--cyan), var(--pink)); color: white;
    font-weight: bold; cursor: pointer; text-transform: uppercase;
}

/* FEED DE MENSAJES */
#main { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; }

.post-card {
    width: 100%; max-width: 600px; background: rgba(20,20,40,0.8);
    border: 1px solid var(--cyan); border-radius: 15px; padding: 20px;
    margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: 0.3s;
}
.post-card:hover { transform: translateY(-5px); border-color: var(--pink); }

.post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; color: var(--cyan); font-weight: bold; }
.post-av { font-size: 24px; }
.post-content { line-height: 1.6; color: #eee; margin-bottom: 15px; }

/* RESPUESTAS */
.reply-section { border-top: 1px solid #333; padding-top: 10px; }
.reply-item { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 14px; border-left: 2px solid var(--pink); }
.reply-input-group { display: flex; gap: 5px; margin-top: 10px; }
.reply-input-group input { margin: 0; padding: 8px; font-size: 13px; }
.btn-ok { background: var(--cyan); border: none; padding: 0 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

/* ASTRONAUTA RESPALDO */
.astronaut {
    position: fixed; bottom: 20px; right: 20px; width: 200px; z-index: -1;
    filter: drop-shadow(0 0 20px var(--cyan)); pointer-events: none;
}
</style>
</head>

<body>

<div id="stars-container"></div>

<div class="sidebar">
    <div class="header-logo">
        <img src="NeuroLuis.gif" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        <h2 style="color:var(--cyan); margin-top:10px;">NEURO LUIYI</h2>
    </div>

    <div class="av-grid" id="av-picker">
        </div>

    <input id="uName" placeholder="Tu nombre...">
    <textarea id="uMsg" rows="4" placeholder="Escribe tu experimento..."></textarea>
    <button class="btn-warp" onclick="enviarMensaje()">PUBLICAR EN ÓRBITA</button>

    <a href="index.html" style="color:#444; text-decoration:none; text-align:center; margin-top:auto; font-size:12px;">⬅ SALIR</a>
</div>

<div id="main">
    <div id="feed" style="width:100%; max-width:600px;"></div>
</div>

<img src="https://i.ibb.co/Xz9N8N5/astronaut-realistic.png" class="astronaut" onerror="this.src='https://i.postimg.cc/85M6XmRW/astronaut.png'">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
    authDomain: "foro-luiyi.firebaseapp.com",
    databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "foro-luiyi",
    storageBucket: "foro-luiyi.firebasestorage.app",
    messagingSenderId: "410471993147",
    appId: "1:410471993147:web:d672952aa8a4364d48f11e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* UI: AVATARES */
const emojis = ['👽', '🚀', '👨‍🚀', '👾', '🧠', '⚡', '🤖', '🛸', '🧬', '🔭'];
let avatarSeleccionado = emojis[0];
const avPicker = document.getElementById('av-picker');

emojis.forEach(e => {
    const div = document.createElement('div');
    div.className = 'av-box' + (e === avatarSeleccionado ? ' selected' : '');
    div.innerText = e;
    div.onclick = () => {
        document.querySelectorAll('.av-box').forEach(b => b.classList.remove('selected'));
        div.classList.add('selected');
        avatarSeleccionado = e;
    };
    avPicker.appendChild(div);
});

/* ESTRELLAS */
const container = document.getElementById('stars-container');
for(let i=0; i<80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.width = Math.random()*3+'px'; s.style.height = s.style.width;
    s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
    s.style.animationDuration = (Math.random()*3 + 2)+'s';
    container.appendChild(s);
}

/* FIREBASE: ENVIAR */
window.enviarMensaje = () => {
    const name = document.getElementById('uName').value.trim();
    const msg = document.getElementById('uMsg').value.trim();
    if(!name || !msg) return alert("Completa los datos, Capitán.");

    push(ref(db, "posts"), {
        name,
        avatar: avatarSeleccionado,
        msg,
        likes: 0,
        time: Date.now()
    });
    document.getElementById('uMsg').value = "";
};

/* FIREBASE: CARGAR MENSAJES */
onChildAdded(ref(db, "posts"), snap => {
    const p = snap.val();
    const id = snap.key;

    const card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML = `
        <div class="post-header">
            <span class="post-av">${p.avatar}</span> @${p.name}
        </div>
        <div class="post-content">${p.msg}</div>
        <div style="display:flex; gap:20px; font-size:12px; margin-bottom:15px;">
            <span style="cursor:pointer; color:var(--pink)" onclick="like('${id}')">❤️ Energía: <span id="l-${id}">${p.likes || 0}</span></span>
            <span style="color:var(--cyan)">💬 Canal Abierto</span>
        </div>
        <div class="reply-section">
            <div id="reps-${id}"></div>
            <div class="reply-input-group">
                <input id="in-${id}" placeholder="Responder...">
                <button class="btn-ok" onclick="responder('${id}')">OK</button>
            </div>
        </div>
    `;
    document.getElementById('feed').prepend(card);

    // Cargar respuestas de este post
    const replyRef = ref(db, `posts/${id}/replies`);
    onChildAdded(replyRef, rSnap => {
        const r = rSnap.val();
        const rDiv = document.createElement('div');
        rDiv.className = 'reply-item';
        rDiv.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
        document.getElementById(`reps-${id}`).appendChild(rDiv);
    });
});

/* FIREBASE: LIKES */
window.like = (id) => {
    runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
};

/* FIREBASE: RESPONDER */
window.responder = (postId) => {
    const input = document.getElementById(`in-${postId}`);
    const rName = document.getElementById('uName').value.trim() || "Astronauta";
    const rMsg = input.value.trim();
    if(!rMsg) return;

    push(ref(db, `posts/${postId}/replies`), {
        name: rName,
        avatar: avatarSeleccionado,
        msg: rMsg
    });
    input.value = "";
};
</script>

</body>
</html>
