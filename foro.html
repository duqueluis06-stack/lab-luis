<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🚀 FORO NASA: NEURO-LUIYI ELITE</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --space-dark: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--space-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- MOTOR GRÁFICO NASA (ANIMADO) --- */
        #nasa-universe {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
        }

        /* Estrellas con Movimiento */
        .stars-container {
            position: absolute; width: 200%; height: 200%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90% 90%, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 20% 10%, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 10% 80%, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            animation: moveStars 100s linear infinite;
            opacity: 0.5;
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(-500px); }
        }

        /* Saturno Animado */
        .saturn-nasa {
            position: absolute; top: 15%; right: 10%; width: 150px; height: 150px;
            animation: float 8s ease-in-out infinite alternate;
            z-index: 1;
        }
        .saturn-planet {
            width: 70px; height: 70px; background: radial-gradient(circle at 30% 30%, #f9e2b0, #a17f4a);
            border-radius: 50%; position: absolute; top: 40px; left: 40px; z-index: 3;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.8), 0 0 20px rgba(249,226,176,0.3);
        }
        .saturn-rings {
            position: absolute; width: 160px; height: 50px;
            border: 10px solid rgba(225, 180, 107, 0.4);
            border-radius: 50%; top: 50px; left: -5px;
            transform: rotateX(75deg) rotateY(10deg);
            z-index: 2;
        }

        /* Luna Gigante */
        .moon-nasa {
            position: absolute; bottom: -60px; left: -60px; width: 250px; height: 250px;
            background: radial-gradient(circle at 70% 30%, #555, #111);
            border-radius: 50%; opacity: 0.8; z-index: 1;
            box-shadow: inset -20px -20px 40px rgba(0,0,0,0.9), 0 0 30px rgba(255,255,255,0.05);
        }

        @keyframes float { from { transform: translateY(0); } to { transform: translateY(20px); } }

        /* --- INTERFAZ --- */
        .header {
            height: 75px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; z-index: 100;
        }
        .header h1 { font-size: 18px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }
        .pfp { width: 50px; height: 50px; border: 2px solid var(--cyan); border-radius: 12px; }

        #stream { flex: 1; overflow-y: auto; padding: 20px 15px; z-index: 50; }
        .post-card {
            max-width: 550px; margin: 0 auto 20px; background: rgba(15, 20, 35, 0.9);
            border-left: 5px solid var(--cyan); border-radius: 0 15px 15px 0; padding: 18px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(5px);
        }
        
        .u-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid rgba(0,255,255,0.2); padding-bottom: 10px; }
        .u-id { color: var(--cyan); font-weight: bold; }
        .u-msg { font-size: 16px; color: #fff; line-height: 1.6; margin-bottom: 12px; }

        .u-actions { display: flex; gap: 20px; }
        .btn-action { background: none; border: none; color: #888; font-size: 13px; font-weight: bold; cursor: pointer; }

        /* --- CONSOLA DE SEGURIDAD --- */
        .console {
            background: #000; border-top: 2px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom)); z-index: 1000;
        }
        .av-list { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #222; }
        .av-item { font-size: 30px; opacity: 0.2; cursor: pointer; }
        .av-item.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 10px var(--cyan)); }

        .input-row { display: flex; gap: 12px; align-items: center; }
        .fields { flex: 1; background: #0a0a0f; border: 1px solid #333; border-radius: 15px; padding: 10px; border-left: 4px solid var(--pink); }
        #p-id { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 13px; width: 100%; margin-bottom: 5px; outline: none; }
        #p-msg { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; }
        
        .send-btn { 
            width: 60px; height: 60px; border-radius: 18px; border: none; 
            background: var(--cyan); color: #000; font-size: 26px; cursor: pointer;
            box-shadow: 0 0 15px var(--cyan);
        }

        .replies { margin-top: 15px; padding-left: 15px; border-left: 1px dashed var(--pink); display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
        .reply-form { display: none; margin-top: 10px; gap: 10px; }
        .reply-form input { flex: 1; background: #111; border: 1px solid var(--cyan); color: #fff; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="nasa-universe">
        <div class="stars-container"></div>
        <div class="saturn-nasa">
            <div class="saturn-rings"></div>
            <div class="saturn-planet"></div>
        </div>
        <div class="moon-nasa"></div>
    </div>

    <header class="header">
        <h1>NEURO LUIYI FORO</h1>
        <img src="NeuroLuis.gif" class="pfp" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="stream">
        <div id="container-posts"></div>
    </main>

    <footer class="console">
        <div id="av-selector" class="av-list"></div>
        <div class="input-row">
            <div class="fields">
                <input id="p-id" placeholder="REGISTRA TU ID..." maxlength="15">
                <input id="p-msg" placeholder="ENVIAR MENSAJE AL ESPACIO...">
            </div>
            <button class="send-btn" onclick="postear()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- AVATARES ---
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-item'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-item').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-selector').appendChild(el);
        });

        // --- SEGURIDAD ---
        const check = (idIn) => {
            const val = document.getElementById(idIn).value.trim();
            if (!selAv || !val) { alert("⚠️ SISTEMA: Selecciona Avatar e ID."); return null; }
            return { val, av: selAv };
        };

        // --- FIREBASE LOGIC ---
        window.postear = () => {
            const u = check('p-id'); const m = document.getElementById('p-msg').value.trim();
            if(!u || !m) return;
            push(ref(db, "posts"), { name: u.val, avatar: u.av, msg: m, likes: 0 });
            document.getElementById('p-msg').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const id = snap.key;
            const card = document.createElement('div'); card.className = 'post-card';
            card.innerHTML = `
                <div class="u-info"><span>${d.avatar}</span> <span class="u-id">@${d.name}</span></div>
                <div class="u-msg">${d.msg}</div>
                <div class="u-actions">
                    <button class="btn-action" onclick="like('${id}')">🔋 <span id="l-${id}">${d.likes || 0}</span></button>
                    <button class="btn-action" onclick="toggleR('${id}')">💬 RESPONDER</button>
                </div>
                <div id="r-box-${id}" class="replies"></div>
                <div id="form-${id}" class="reply-form">
                    <input id="in-${id}" placeholder="Tu respuesta...">
                    <button onclick="responder('${id}')" style="background:var(--cyan); border:none; padding:8px 12px; border-radius:8px; font-weight:bold;">OK</button>
                </div>
            `;
            document.getElementById('container-posts').prepend(card);
            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const div = document.createElement('div');
                div.innerHTML = `<b style="color:var(--cyan)">${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`r-box-${id}`).appendChild(div);
            });
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleR = (id) => { const f = document.getElementById(`form-${id}`); f.style.display = f.style.display==='flex'?'none':'flex'; };
        
        window.responder = (id) => {
            const u = check('p-id'); const i = document.getElementById(`in-${id}`);
            if(!u || !i.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name: u.val, avatar: u.av, msg: i.value.trim() });
            i.value = ""; document.getElementById(`form-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
