<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💬 NeuroLuigi Forum</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b10;
    color:white;
}

.header{
    text-align:center;
    padding:18px;
    font-size:26px;
    color:#00ffff;
    font-weight:bold;
}

.avatar{
    position:fixed;
    top:10px;
    right:10px;
    width:110px;
    height:110px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid #00ffff;
}

.avatar img{
    width:100%;
    height:100%;
}

.info{
    max-width:600px;
    margin:auto;
    padding:10px;
    font-size:14px;
    color:#aaa;
    text-align:center;
}

.box{
    max-width:600px;
    margin:auto;
    padding:10px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00ffff;
    font-weight:bold;
    cursor:pointer;
}

#feed{
    max-width:600px;
    margin:auto;
}

.post{
    background:rgba(255,255,255,0.06);
    margin:10px;
    padding:12px;
    border-radius:12px;
}

.user{
    color:#00ffff;
    font-weight:bold;
}

.msg{
    margin-top:8px;
}

.like{
    margin-top:10px;
    color:#ff4d6d;
    cursor:pointer;
}

.replyBtn{
    margin-top:8px;
    color:#00ffff;
    cursor:pointer;
}

.replyBox{
    display:none;
    margin-top:8px;
}

.reply{
    margin-left:15px;
    margin-top:6px;
    padding:6px;
    border-left:2px solid #00ffff;
}
</style>
</head>

<body>

<div class="header">☎ NeuroLuigi Forum</div>

<div class="avatar">
    <img src="NeuroLuis.gif">
</div>

<div class="info">
Escribe, publica y responde. Sistema en tiempo real.
</div>

<div class="box">
    <input id="name" placeholder="Tu nombre">
    <textarea id="msg" placeholder="Mensaje..."></textarea>
    <button onclick="send()">Publicar</button>
</div>

<div id="feed"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
  authDomain: "foro-luiyi.firebaseapp.com",
  databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "foro-luiyi",
  storageBucket: "foro-luiyi.appspot.com",
  messagingSenderId: "410471993147",
  appId: "1:410471993147:web:d672952aa8a4364d48f11e"
});

const db = firebase.database();
const feed = document.getElementById("feed");

function send(){
    let name = document.getElementById("name").value.trim();
    let msg = document.getElementById("msg").value.trim();

    if(!name || !msg) return;

    db.ref("posts").push({
        name,
        msg,
        likes:0,
        time:Date.now()
    });

    document.getElementById("msg").value="";
}

db.ref("posts").on("child_added", snap=>{

    let p = snap.val();
    let id = snap.key;

    let div = document.createElement("div");
    div.className="post";

    div.innerHTML=`
        <div class="user">🧠 ${p.name}</div>
        <div class="msg">${p.msg}</div>

        <div class="like" onclick="like('${id}', this)">
            ❤️ <span>${p.likes||0}</span>
        </div>

        <div class="replyBtn" onclick="toggleReply('${id}')">
            💬 Responder
        </div>

        <div class="replyBox" id="box-${id}">
            <input id="input-${id}" placeholder="Responder ENTER">
        </div>

        <div id="replies-${id}"></div>
    `;

    feed.prepend(div);

    loadReplies(id);
});

function like(id, el){
    db.ref("posts/"+id+"/likes").transaction(v => (v||0)+1);
}

function toggleReply(id){
    let box = document.getElementById("box-"+id);
    box.style.display = box.style.display==="block"?"none":"block";
}

function loadReplies(postID){

    db.ref("posts/"+postID+"/replies").on("child_added", snap=>{

        let r = snap.val();

        let div = document.createElement("div");
        div.className="reply";

        div.innerText = r.name + ": " + r.msg;

        document.getElementById("replies-"+postID).appendChild(div);
    });
}

</script>

</body>
</html>
