<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🪐 NEURO-LUIYI: NASA ELITE FINAL</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --dark: #000000;
        }

        /* --- RESET Y FONDO NASA REAL --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--dark);
            /* USAMOS UNA IMAGEN REAL DE ALTA CALIDAD PARA EVITAR FALLOS DE RENDERIZADO */
            background-image: url('https://www.nasa.gov/wp-content/uploads/2023/03/main_image_star-forming_region_carina_nebula_ngc_3324_final-1280.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex; flex-direction: column;
        }

        /* Capa de oscuridad para que se lea el texto */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.5); z-index: 0;
        }

        /* --- ELEMENTOS ESPACIALES ADICIONALES --- */
        .saturn-final {
            position: fixed; top: 15%; right: 5%; width: 120px; z-index: 1;
            filter: drop-shadow(0 0 20px rgba(0,255,255,0.3));
            animation: float 10s ease-in-out infinite alternate;
        }

        @keyframes float { from { transform: translateY(0px) rotate(0deg); } to { transform: translateY(20px) rotate(5deg); } }

        /* --- INTERFAZ --- */
        .header {
            height: 75px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .header h1 { font-size: 20px; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); letter-spacing: 2px; }
        .pfp-main { width: 50px; height: 50px; border: 2px solid var(--cyan); border-radius: 12px; }

        /* --- FEED DE POSTS --- */
        #stream-scroll { 
            flex: 1; overflow-y: auto; padding: 20px 15px; z-index: 10; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        #stream-scroll::-webkit-scrollbar { display: none; }

        .card-nasa {
            max-width: 600px; margin: 0 auto 20px; background: rgba(10, 15, 30, 0.85);
            border-left: 5px solid var(--cyan); border-radius: 0 20px 20px 0; padding: 20px; 
            box-shadow: 10px 15px 35px rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; border-bottom: 1px solid rgba(0,255,255,0.2); padding-bottom: 10px; }
        .card-user { color: var(--cyan); font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .card-msg { font-size: 16px; color: #ffffff; line-height: 1.6; margin-bottom: 15px; }

        .card-footer { display: flex; gap: 25px; }
        .action-btn { background: none; border: none; color: #aaa; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { color: var(--cyan); }

        /* --- RESPUESTAS --- */
        .replies-container { margin-top: 15px; padding-left: 20px; border-left: 2px solid var(--pink); display: flex; flex-direction: column; gap: 10px; }
        .reply-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; font-size: 14px; color: #ddd; }
        .reply-card b { color: var(--cyan); }

        .reply-input-box { display: none; margin-top: 15px; gap: 10px; }
        .reply-input-box input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 12px; border-radius: 12px; outline: none; }

        /* --- PANEL DE CONTROL --- */
        .bottom-console {
            background: #000000; border-top: 2px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom)); z-index: 200;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.9);
        }
        .avatar-scroll { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px solid #222; }
        .avatar-item { font-size: 35px; opacity: 0.2; cursor: pointer; transition: 0.4s; }
        .avatar-item.active { opacity: 1; transform: scale(1.3); filter: drop-shadow(0 0 15px var(--cyan)); }

        .input-wrap { display: flex; gap: 15px; align-items: center; }
        .text-inputs { flex: 1; background: #0a0a0f; border: 1px solid #333; border-radius: 18px; padding: 12px; border-left: 5px solid var(--pink); }
        #pilot-id { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 14px; width: 100%; margin-bottom: 5px; outline: none; }
        #pilot-msg { background: none; border: none; color: #fff; font-size: 16px; width: 100%; outline: none; }
        
        .send-btn { 
            width: 65px; height: 65px; border-radius: 22px; border: none; 
            background: linear-gradient(135deg, var(--cyan), #00aaff); color: #000; 
            font-size: 30px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <img src="https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png" class="saturn-final" style="display:none">
    <div class="saturn-final" style="background: radial-gradient(circle, #f9e2b0, #a17f4a); width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 0 40px gold;">
        <div style="width: 120px; height: 20px; border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; position: absolute; top: 20px; left: -30px; transform: rotateX(70deg);"></div>
    </div>

    <header class="header">
        <h1>NEURO LUIYI SPACE</h1>
        <img src="NeuroLuis.gif" class="pfp-main" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="stream-scroll">
        <div id="posts-mount"></div>
    </main>

    <footer class="bottom-console">
        <div id="av-container" class="avatar-scroll"></div>
        <div class="input-wrap">
            <div class="text-inputs">
                <input id="pilot-id" placeholder="ID PILOTO OBLIGATORIO..." maxlength="15">
                <input id="pilot-msg" placeholder="TRANSMITIR MENSAJE AL FORO...">
            </div>
            <button class="send-btn" onclick="lanzar()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- AVATARES ---
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐'];
        let selectedAv = null;
        const avBox = document.getElementById('av-container');
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'avatar-item'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.avatar-item').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selectedAv = i; };
            avBox.appendChild(el);
        });

        // --- SEGURIDAD ---
        const identityCheck = () => {
            const id = document.getElementById('pilot-id').value.trim();
            if (!selectedAv || !id) { alert("⚠️ SISTEMA NASA: Identificación requerida. Elige un avatar y un ID de piloto abajo."); return null; }
            return { id, avatar: selectedAv };
        };

        // --- LOGICA POSTS ---
        window.lanzar = () => {
            const user = identityCheck(); 
            const msg = document.getElementById('pilot-msg').value.trim();
            if(!user || !msg) return;
            push(ref(db, "posts"), { name: user.id, avatar: user.avatar, msg, likes: 0 });
            document.getElementById('pilot-msg').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const key = snap.key;
            const card = document.createElement('div'); card.className = 'card-nasa';
            card.innerHTML = `
                <div class="card-header"><span>${d.avatar}</span> <span class="card-user">@${d.name}</span></div>
                <div class="card-msg">${d.msg}</div>
                <div class="card-footer">
                    <button class="action-btn" onclick="darLike('${key}')">🔋 <span id="like-${key}">${d.likes || 0}</span></button>
                    <button class="action-btn" onclick="verRespuesta('${key}')">💬 COMENTAR</button>
                </div>
                <div id="thread-${key}" class="replies-container"></div>
                <div id="input-${key}" class="reply-input-box">
                    <input id="field-${key}" placeholder="Escribe al piloto...">
                    <button onclick="enviarRespuesta('${key}')" style="background:var(--cyan); border:none; padding:10px; border-radius:10px; font-weight:bold;">OK</button>
                </div>
            `;
            document.getElementById('posts-mount').prepend(card);

            onChildAdded(ref(db, `posts/${key}/replies`), rSnap => {
                const r = rSnap.val();
                const div = document.createElement('div'); div.className = 'reply-card';
                div.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${key}`).appendChild(div);
            });
        });

        window.darLike = (key) => runTransaction(ref(db, `posts/${key}/likes`), c => (c || 0) + 1);
        window.verRespuesta = (key) => { const b = document.getElementById(`input-${key}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        
        window.enviarRespuesta = (key) => {
            const user = identityCheck(); const field = document.getElementById(`field-${key}`);
            if(!user || !field.value.trim()) return;
            push(ref(db, `posts/${key}/replies`), { name: user.id, avatar: user.avatar, msg: field.value.trim() });
            field.value = ""; document.getElementById(`input-${key}`).style.display = 'none';
        };
    </script>
</body>
</html>
