<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🛰️ NEURO-LUIYI LAB: HUMAN ONLY</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --purple: #9d00ff;
            --dark: #010103;
            --glass: rgba(10, 15, 30, 0.8);
            --neon-border: 1px solid rgba(0, 255, 255, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: #fff;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- FONDO WARP DRIVE --- */
        #space-core { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at center, #0a1128 0%, #000 100%); }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.6; animation: warpSpeed linear infinite; }
        @keyframes warpSpeed {
            from { transform: translateY(-100vh); }
            to { transform: translateY(100vh); }
        }

        /* --- CABECERA --- */
        .nav-station {
            height: 75px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        .exit-link { text-decoration: none; color: var(--pink); border: 1px solid var(--pink); padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }

        /* --- FEED --- */
        #data-stream { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 180px; }
        .post-frame {
            max-width: 600px; margin: 0 auto 25px auto; background: var(--glass);
            border: var(--neon-border); border-left: 4px solid var(--cyan); border-radius: 4px 15px 15px 4px;
            padding: 20px; backdrop-filter: blur(10px);
        }

        .user-tag { font-size: 0.85rem; font-weight: bold; color: var(--cyan); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .message-body { font-size: 1rem; line-height: 1.5; color: #f0f0f0; }

        /* ACCIONES Y HILOS */
        .action-row { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .action-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 0.8rem; }
        .thread-container { margin-top: 10px; padding-left: 15px; border-left: 1px dashed var(--cyan); }
        .reply-node { background: rgba(0,0,0,0.4); padding: 8px; border-radius: 8px; margin-bottom: 6px; font-size: 0.85rem; border: 1px solid rgba(0,255,255,0.1); }

        /* --- CONTROLES --- */
        .command-center {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95);
            border-top: 2px solid var(--cyan); padding: 15px; z-index: 2000;
        }
        .av-icon { font-size: 26px; cursor: pointer; opacity: 0.4; transition: 0.3s; padding: 5px; }
        .av-icon.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 5px var(--cyan)); }

        .input-grid { display: flex; gap: 10px; align-items: flex-end; }
        #main-input { flex: 1; background: #050505; border: 1px solid #333; color: #fff; border-radius: 10px; padding: 12px; font-size: 1rem; resize: none; }
        .warp-btn { width: 55px; height: 55px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--cyan), var(--purple)); color: #fff; font-size: 1.3rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="space-core"></div>

    <header class="nav-station">
        <a href="index.html" class="exit-link">EXIT</a>
        <div style="text-align:center">
            <h1 style="margin:0; font-size:0.9rem; letter-spacing:3px; color:var(--cyan);">NEURO-LUIYI LAB</h1>
            <span style="font-size:0.6rem; color:var(--pink); letter-spacing:1px;">SECURE HUMAN FEED</span>
        </div>
        <img src="NeuroLuis.gif" width="45" height="45" style="border:1px solid var(--cyan); border-radius:8px;" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="data-stream">
        <div id="flow-container" style="max-width:600px; margin:auto;"></div>
    </main>

    <footer class="command-center">
        <div id="av-strip" style="display:flex; gap:12px; overflow-x:auto; padding-bottom:10px; margin-bottom:5px;"></div>
        <div class="input-grid">
            <div style="flex:1; display:flex; flex-direction:column; gap:5px;">
                <input id="pilot-name" placeholder="PILOT_NAME" maxlength="12" style="background:transparent; border:none; border-bottom:1px solid #333; color:var(--cyan); font-weight:bold; font-size:0.8rem; padding:4px;">
                <textarea id="main-input" placeholder="Escribir mensaje..." rows="1"></textarea>
            </div>
            <button class="warp-btn" onclick="transmit()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ESTRELLAS
        const space = document.getElementById('space-core');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div'); s.className = 'star';
            const size = Math.random()*3+'px'; s.style.width = size; s.style.height = size;
            s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
            s.style.animationDuration = (Math.random()*4+2)+'s'; space.appendChild(s);
        }

        // AVATARES
        const icons = ['👽','🤖','👨‍🚀','👾','🧠','⚡','🚀','🛸','🧬','🛰️'];
        let activeAv = icons[0];
        icons.forEach(icon => {
            const el = document.createElement('span'); el.className = 'av-icon' + (icon===activeAv?' active':''); el.innerText = icon;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(i=>i.classList.remove('active')); el.classList.add('active'); activeAv = icon; };
            document.getElementById('av-strip').appendChild(el);
        });

        window.transmit = () => {
            const n = document.getElementById('pilot-name').value.trim();
            const m = document.getElementById('main-input').value.trim();
            if(!n || !m) return;
            push(ref(db, "posts"), { name: n, avatar: activeAv, msg: m, likes: 0 });
            document.getElementById('main-input').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const data = snap.val(); const id = snap.key;
            const frame = document.createElement('div'); frame.className = 'post-frame';
            frame.innerHTML = `
                <div class="user-tag">${data.avatar} @${data.name}</div>
                <div class="message-body">${data.msg}</div>
                <div class="action-row">
                    <button class="action-btn" onclick="likePost('${id}')">🔋 <span id="l-${id}">${data.likes || 0}</span></button>
                    <button class="action-btn" onclick="toggleReply('${id}')">💬 RESPONDER</button>
                </div>
                <div class="thread-container" id="thread-${id}"></div>
                <div id="box-${id}" style="display:none; margin-top:10px; gap:5px;">
                    <input id="in-${id}" placeholder="Escribe tu respuesta..." style="flex:1; background:#000; border:1px solid #333; color:#fff; padding:8px; border-radius:8px;">
                    <button onclick="sendReply('${id}')" style="background:var(--cyan); border:none; border-radius:8px; padding:0 10px; font-weight:bold;">OK</button>
                </div>
            `;
            document.getElementById('flow-container').prepend(frame);

            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.className = 'reply-node';
                node.innerHTML = `<b>${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.likePost = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleReply = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display === 'flex' ? 'none' : 'flex'; };
        window.sendReply = (id) => {
            const input = document.getElementById(`in-${id}`); const name = document.getElementById('pilot-name').value.trim() || "PILOT";
            if(!input.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name, avatar: activeAv, msg: input.value.trim() });
            input.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
