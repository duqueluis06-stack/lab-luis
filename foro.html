<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🚀 NEURO-LUIYI LAB: NASA EDITION</title>
    <style>
        :root {
            --cyan: #00ffff; --pink: #ff00ff; --dark: #02020a;
            --line: rgba(0, 255, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--dark);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- FONDO VERSIÓN NASA --- */
        #nasa-void {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(70, 0, 150, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 50, 120, 0.15) 0%, transparent 40%),
                var(--dark);
        }
        .stardust {
            position: absolute; background: white; border-radius: 50%;
            filter: drop-shadow(0 0 2px white);
            animation: travel linear infinite;
        }
        @keyframes travel {
            from { transform: translateY(-10vh) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            to { transform: translateY(110vh) scale(1.2); opacity: 0; }
        }

        /* --- HEADER --- */
        .header {
            height: 75px; background: rgba(5, 5, 15, 0.85); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; z-index: 100; flex-shrink: 0;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        .logo h1 { font-size: 16px; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); letter-spacing: 3px; }
        .profile-gif { width: 50px; height: 50px; border: 2px solid var(--cyan); border-radius: 10px; object-fit: cover; }

        /* --- FEED --- */
        #stream { flex: 1; overflow-y: auto; padding: 20px 15px; -webkit-overflow-scrolling: touch; }
        .post {
            max-width: 550px; margin: 0 auto 20px; background: rgba(10, 15, 30, 0.7);
            border: 1px solid rgba(0, 255, 255, 0.2); border-left: 5px solid var(--cyan);
            border-radius: 0 15px 15px 0; padding: 18px; 
            box-shadow: 10px 10px 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(0, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }
        
        .user-row { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 12px; }
        .id-tag { color: var(--cyan); font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .msg-text { font-size: 16px; color: #fff; line-height: 1.6; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 0, 255, 0.15); }

        .actions { display: flex; gap: 20px; margin-top: 12px; }
        .btn-act { background: none; border: none; color: #aaa; font-size: 12px; cursor: pointer; font-weight: bold; }

        /* --- CONSOLA --- */
        .console {
            background: rgba(5, 5, 12, 0.98); border-top: 2px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom)); z-index: 2000; flex-shrink: 0;
        }
        .av-selector { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 15px; border-bottom: 1px solid #222; }
        .av-icon { font-size: 30px; opacity: 0.2; transition: 0.4s; cursor: pointer; }
        .av-icon.active { opacity: 1; transform: scale(1.3); filter: drop-shadow(0 0 10px var(--cyan)); }

        .input-box { display: flex; gap: 12px; align-items: center; }
        .field-wrap { flex: 1; background: #000; border: 1px solid #333; border-radius: 15px; padding: 10px; border-left: 3px solid var(--pink); }
        #p-name { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 12px; width: 100%; border-bottom: 1px solid #1a1a1a; margin-bottom: 5px; outline: none; }
        #m-text { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; }
        
        .btn-send { 
            width: 55px; height: 55px; border-radius: 18px; border: none; 
            background: linear-gradient(135deg, var(--cyan), #0077ff); color: #000; 
            font-size: 24px; box-shadow: 0 0 15px var(--cyan); cursor: pointer;
        }

        .rep-form { display: none; margin-top: 12px; gap: 10px; }
        .rep-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="nasa-void"></div>

    <header class="header">
        <div class="logo"><h1>NEURO LUIYI</h1></div>
        <img src="NeuroLuis.gif" class="profile-gif" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="stream">
        <div id="container"></div>
    </main>

    <footer class="console">
        <div id="av-list" class="av-selector"></div>
        <div class="input-box">
            <div class="field-wrap">
                <input id="p-name" placeholder="ID PILOTO REQUERIDO..." maxlength="12">
                <input id="m-text" placeholder="MENSAJE DE TRANSMISIÓN...">
            </div>
            <button class="btn-send" onclick="enviar()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- MOTOR DE FONDO NASA ---
        const voidContainer = document.getElementById('nasa-void');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div'); s.className = 'stardust';
            const size = Math.random() * 3 + 'px';
            s.style.width = s.style.height = size;
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.animationDuration = (Math.random() * 20 + 10) + 's';
            s.style.opacity = Math.random();
            voidContainer.appendChild(s);
        }

        // --- SELECTOR AVATAR ---
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐','💎'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-icon'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-list').appendChild(el);
        });

        // --- SEGURIDAD OBLIGATORIA ---
        const validar = (idInput) => {
            const id = document.getElementById(idInput).value.trim();
            if (!selAv) { alert("SISTEMA: Selecciona un Avatar NASA."); return false; }
            if (!id) { alert("SISTEMA: ID de Piloto Requerido."); return false; }
            return { id, avatar: selAv };
        };

        window.enviar = () => {
            const user = validar('p-name');
            const m = document.getElementById('m-text').value.trim();
            if(!user || !m) return;
            push(ref(db, "posts"), { name: user.id, avatar: user.avatar, msg: m, likes: 0 });
            document.getElementById('m-text').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const id = snap.key;
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div class="user-row"><span style="font-size:22px;">${d.avatar}</span> <span class="id-tag">@${d.name}</span></div>
                <div class="msg-text">${d.msg}</div>
                <div class="actions">
                    <button class="btn-act" onclick="like('${id}')">🔋 ${d.likes || 0}</button>
                    <button class="btn-act" onclick="toggleR('${id}')">💬 RESPONDER</button>
                </div>
                <div id="thread-${id}" style="margin-top:12px; padding-left:15px; border-left:1px dashed var(--cyan); font-size:14px; color:#ddd;"></div>
                <div id="box-${id}" class="rep-form">
                    <input id="in-${id}" placeholder="Respuesta de Piloto Identificado...">
                    <button onclick="sendR('${id}')" style="background:var(--cyan); border:none; padding:10px 15px; border-radius:10px; font-weight:bold;">OK</button>
                </div>
            `;
            document.getElementById('container').prepend(div);
            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.style.marginBottom = '8px';
                node.innerHTML = `<b style="color:var(--cyan)">${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleR = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        
        window.sendR = (id) => {
            const user = validar('p-name');
            const i = document.getElementById(`in-${id}`);
            if(!user || !i.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name: user.id, avatar: user.avatar, msg: i.value.trim() });
            i.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
