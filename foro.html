<meta property="og:title" content="Foro de Experimentos – Lab Luis">
<meta property="og:description" content="Comunidad en tiempo real sobre física, electrónica y experimentos tecnológicos.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://duquemartini.com/foro.html">

gtag('js', new Date());

<style>
body{
    margin:0;
    font-family: Arial;
    color:white;
    background:url("fondo-foro.jpg") no-repeat center center fixed;
    background-size:cover;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:-1;
}

/* HEADER */
.header{
    text-align:center;
    padding:20px;
    font-size:30px;
    font-weight:bold;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff, 0 0 20px #ff00ff;
}

/* AVATAR */
.avatar{
    position:fixed;
    top:10px;
    right:10px;
    width:120px;
    height:120px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid #00ffff;
    box-shadow:0 0 20px #00ffff;
}

.avatar img{
    width:100%;
    height:100%;
}

/* INFO */
.info{
    max-width:600px;
    margin:10px auto;
    padding:10px;
    background:rgba(0,255,255,0.1);
    border-radius:10px;
    text-align:center;
    font-size:14px;
}

/* USERS */
.users{
    text-align:center;
    margin:10px;
    font-size:14px;
    color:#00ffff;
}

/* AVATAR SELECT */
.avatarSelect{
    text-align:center;
    margin-bottom:10px;
}

.avatarSelect span{
    font-size:22px;
    margin:5px;
    cursor:pointer;
}

/* INPUT BOX */
.box{
    max-width:600px;
    margin:auto;
    padding:20px;
}

input, textarea{
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00ffff,#ff00ff);
    font-weight:bold;
    cursor:pointer;
}

/* POSTS */
#feed{
    max-width:600px;
    margin:auto;
}

.post{
    background:rgba(255,255,255,0.05);
    margin:10px auto;
    padding:15px;
    border-radius:15px;
}

.user{
    font-weight:bold;
    color:#00ffff;
}

.like{
    margin-top:10px;
    cursor:pointer;
    color:#ff4d6d;
}

.replyBtn{
    margin-top:10px;
    cursor:pointer;
    color:#00ffff;
}

.reply{
    margin-left:20px;
    margin-top:8px;
    padding:8px;
    border-left:2px solid #00ffff;
    background:rgba(255,255,255,0.03);
}

.replyBox{
    display:none;
    margin-top:10px;
}

/* BACK */
.back{
    display:block;
    text-align:center;
    margin:20px auto;
    width:220px;
    padding:10px;
    border-radius:10px;
    background:rgba(0,255,255,0.1);
    color:white;
    text-decoration:none;
    box-shadow:0 0 10px #00ffff;
}
</style>
</head>

<body>

<main>

<div class="header">☎️ NeuroLuiyi Forum</div>

<div class="avatar">
    <img src="NeuroLuis.gif">
</div>

<div class="info">
👋 Escribe tu nombre, elige un avatar y publica.<br>
💬 Puedes responder a cualquier usuario.<br>
🔁 Mantén tu identidad para reconocimiento.
</div>

<div class="users">
👥 Usuarios conectados: <span id="userCount">0</span>
</div>

<div class="avatarSelect">
<span onclick="setAvatar('🐸')">🐸</span>
<span onclick="setAvatar('🚀')">🚀</span>
<span onclick="setAvatar('⚡')">⚡</span>
<span onclick="setAvatar('👽')">👽</span>
<span onclick="setAvatar('🧠')">🧠</span>
</div>

<div class="box">
    <input id="name" placeholder="Tu nombre">
    <textarea id="msg" placeholder="Escribe tu mensaje..."></textarea>
    <button onclick="send()">Publicar</button>
</div>

<div id="feed"></div>

<a class="back" href="index.html">⬅ Volver al inicio</a>

</main>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
    databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = firebase.database();
const feed = document.getElementById("feed");

let avatar = "🐸";

function setAvatar(a){
    avatar = a;
}

function send(){

    let name = document.getElementById("name").value.trim();
    let msg = document.getElementById("msg").value.trim();

    if(!name || !msg) return;
    if(name.length > 20) return;
    if(msg.length > 300) return;
    if(msg.includes("http")) return;

    db.ref("posts").push({
        name,
        avatar,
        msg,
        likes:0,
        time:Date.now()
    });

    document.getElementById("msg").value="";
}

db.ref("posts").on("child_added", snap=>{

    let p = snap.val();
    let id = snap.key;

    let div = document.createElement("div");
    div.className="post";

    div.innerHTML=`
        <div class="user">${p.avatar||"🐸"} ${p.name}</div>
        <div class="msg"></div>

        <div class="like" onclick="like('${id}', this)">
            ❤️ Like <span>${p.likes||0}</span>
        </div>

        <div class="replyBtn" onclick="toggleReply('${id}')">
            💬 Responder
        </div>

        <div class="replyBox" id="box-${id}">
            <input id="input-${id}" placeholder="Responder y ENTER">
        </div>

        <div id="replies-${id}"></div>
    `;

    div.querySelector(".msg").innerText = p.msg;
    feed.prepend(div);

    setTimeout(()=>{
        let input = document.getElementById("input-"+id);
        input.addEventListener("keydown", e=>{
            if(e.key==="Enter"){
                reply(id, input);
            }
        });
    },100);

    loadReplies(id);
});

function like(id, el){
    if(el.classList.contains("used")) return;

    el.classList.add("used");

    let ref = db.ref("posts/"+id+"/likes");
    ref.transaction(v => (v||0)+1);

    let span = el.querySelector("span");
    span.innerText = parseInt(span.innerText)+1;
}

function toggleReply(id){
    let box = document.getElementById("box-"+id);
    box.style.display = box.style.display==="block"?"none":"block";
}

function reply(postID, input){

    let text = input.value.trim();
    let name = document.getElementById("name").value.trim();

    if(!text || !name) return;

    db.ref("posts/"+postID+"/replies").push({
        name,
        avatar,
        msg:text
    });

    input.value="";
}

function loadReplies(postID){

    db.ref("posts/"+postID+"/replies").on("child_added", snap=>{

        let r = snap.val();

        let div = document.createElement("div");
        div.className="reply";

        div.innerHTML=`<b>${r.avatar||"🐸"} ${r.name}:</b> <span class="rmsg"></span>`;
        div.querySelector(".rmsg").innerText = r.msg;

        document.getElementById("replies-"+postID).appendChild(div);
    });
}

db.ref("posts").on("value", snap=>{
    document.getElementById("userCount").innerText = snap.numChildren();
});

</script>

</body>
</html>
