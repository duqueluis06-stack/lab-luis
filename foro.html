<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💎 NEURO-LUIYI LAB: FINAL EDITION</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --dark: #020205;
            --line: rgba(0, 255, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- FONDO ESTRELLADO ANIMADO --- */
        #star-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%);
        }
        .star {
            position: absolute; background: white; border-radius: 50%; opacity: 0.5;
            animation: moveStar linear infinite;
        }
        @keyframes moveStar {
            from { transform: translateY(0); }
            to { transform: translateY(100vh); }
        }

        /* --- HEADER --- */
        .header {
            height: 70px; background: rgba(5, 5, 10, 0.9); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; z-index: 100; flex-shrink: 0;
            box-shadow: 0 0 20px var(--cyan);
        }
        .exit { color: #ff3333; text-decoration: none; font-size: 10px; border: 1px solid #ff3333; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .logo h1 { font-size: 14px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }
        .profile-gif { width: 45px; height: 45px; border: 1px solid var(--cyan); border-radius: 8px; box-shadow: 0 0 10px var(--cyan); }

        /* --- FEED --- */
        #stream { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .post {
            max-width: 550px; margin: 0 auto 15px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.1); border-left: 4px solid var(--cyan);
            border-radius: 0 12px 12px 0; padding: 15px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }
        
        /* SEPARACIONES NEÓN */
        .user-row { 
            display: flex; align-items: center; gap: 8px; 
            border-bottom: 1px solid var(--line); padding-bottom: 6px; margin-bottom: 8px; 
        }
        .av-tag { font-size: 18px; }
        .id-tag { color: var(--cyan); font-weight: bold; font-size: 13px; text-transform: uppercase; }
        
        .msg-text { 
            font-size: 15px; color: #fff; line-height: 1.5; 
            padding-bottom: 8px; border-bottom: 1px solid rgba(255, 0, 255, 0.1);
        }

        .actions { display: flex; gap: 15px; margin-top: 10px; }
        .btn-act { background: none; border: none; color: #666; font-size: 11px; cursor: pointer; }

        /* --- CONSOLA --- */
        .console {
            background: #050508; border-top: 2px solid var(--cyan);
            padding: 10px 15px calc(25px + env(safe-area-inset-bottom)); z-index: 100; flex-shrink: 0;
        }
        .av-selector { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .av-icon { font-size: 26px; opacity: 0.3; transition: 0.3s; cursor: pointer; }
        .av-icon.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 8px var(--cyan)); }

        .input-box { display: flex; gap: 10px; align-items: center; }
        .field-wrap { flex: 1; background: #101015; border: 1px solid #333; border-radius: 15px; padding: 8px 12px; }
        #p-name { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 11px; width: 100%; border-bottom: 1px solid #222; margin-bottom: 4px; outline: none; }
        #m-text { background: none; border: none; color: #fff; font-size: 14px; width: 100%; outline: none; }
        
        .btn-send { 
            width: 45px; height: 45px; border-radius: 12px; border: none; 
            background: var(--cyan); color: #000; font-size: 20px; box-shadow: 0 0 15px var(--cyan);
        }
    </style>
</head>
<body>

    <div id="star-canvas"></div>

    <header class="header">
        <a href="index.html" class="exit">SALIR</a>
        <div class="logo"><h1>NEURO LUIYI</h1></div>
        <img src="NeuroLuis.gif" class="profile-gif" onerror="this.src='https://via.placeholder.com/50'">
    </header>

    <main id="stream">
        <div id="container"></div>
    </main>

    <footer class="console">
        <div id="av-list" class="av-selector"></div>
        <div class="input-box">
            <div class="field-wrap">
                <input id="p-name" placeholder="IDENTIFICACIÓN..." maxlength="12">
                <input id="m-text" placeholder="MENSAJE...">
            </div>
            <button class="btn-send" onclick="enviar()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Generar Estrellas
        const canvas = document.getElementById('star-canvas');
        for(let i=0; i<50; i++) {
            const s = document.createElement('div'); s.className = 'star';
            s.style.width = s.style.height = Math.random()*3+'px';
            s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
            s.style.animationDuration = (Math.random()*10+5)+'s'; canvas.appendChild(s);
        }

        // Selector Avatares
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-icon'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-list').appendChild(el);
        });

        window.enviar = () => {
            const n = document.getElementById('p-name').value.trim();
            const m = document.getElementById('m-text').value.trim();
            if(!selAv || !n || !m) { alert("¡Falta Avatar, ID o Mensaje!"); return; }
            push(ref(db, "posts"), { name: n, avatar: selAv, msg: m, likes: 0 });
            document.getElementById('m-text').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const id = snap.key;
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div class="user-row"><span class="av-tag">${d.avatar}</span> <span class="id-tag">@${d.name}</span></div>
                <div class="msg-text">${d.msg}</div>
                <div class="actions">
                    <button class="btn-act" onclick="like('${id}')">🔋 ${d.likes || 0}</button>
                    <button class="btn-act" onclick="toggleR('${id}')">💬 RESPONDER</button>
                </div>
                <div id="thread-${id}" style="margin-top:8px; padding-left:10px; border-left:1px dashed var(--pink); font-size:12px; color:#aaa;"></div>
                <div id="box-${id}" style="display:none; margin-top:8px; gap:5px;">
                    <input id="in-${id}" placeholder="..." style="flex:1; background:#000; border:1px solid #444; color:#fff; padding:5px; border-radius:5px;">
                    <button onclick="sendR('${id}')" style="background:var(--cyan); border:none; padding:5px; border-radius:5px; font-weight:bold;">OK</button>
                </div>
            `;
            document.getElementById('container').prepend(div);
            onChildAdded(ref(db, `posts/${id}/replies`), r => {
                const node = document.createElement('div'); node.style.marginBottom = '4px';
                node.innerHTML = `<b>${r.val().avatar}</b> ${r.val().msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleR = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        window.sendR = (id) => {
            const i = document.getElementById(`in-${id}`); if(!i.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name: 'Admin', avatar: selAv||'👤', msg: i.value.trim() });
            i.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
