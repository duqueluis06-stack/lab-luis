<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🛡️ NEURO-LUIYI LAB: ANTI-SPAM ELITE</title>
    <style>
        :root {
            --cyan: #00ffff; --pink: #ff00ff; --dark: #010103;
            --line: rgba(0, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--dark);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- FONDO ESTRELLADO REAL --- */
        #star-field {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%);
        }
        .star {
            position: absolute; background: white; border-radius: 50%; opacity: 0.6;
            animation: warp linear infinite;
        }
        @keyframes warp { from { transform: translateY(-100vh); } to { transform: translateY(100vh); } }

        /* --- CABECERA --- */
        .header {
            height: 75px; background: rgba(5, 5, 10, 0.9); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; z-index: 100; flex-shrink: 0;
        }
        .logo h1 { font-size: 16px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }
        .profile-gif { width: 48px; height: 48px; border: 2px solid var(--cyan); border-radius: 8px; object-fit: cover; }

        /* --- FEED --- */
        #stream { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .post {
            max-width: 550px; margin: 0 auto 20px; background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 255, 255, 0.1); border-left: 4px solid var(--cyan);
            border-radius: 0 15px 15px 0; padding: 18px; box-shadow: 8px 8px 25px rgba(0,0,0,0.7);
        }
        
        .user-row { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 10px; }
        .id-tag { color: var(--cyan); font-weight: bold; font-size: 13px; text-transform: uppercase; }
        
        .msg-text { font-size: 16px; color: #f0f0f0; line-height: 1.5; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 0, 255, 0.1); }

        .actions { display: flex; gap: 20px; margin-top: 12px; }
        .btn-act { background: none; border: none; color: #777; font-size: 12px; cursor: pointer; }

        /* --- CONSOLA --- */
        .console {
            background: #050508; border-top: 2px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom)); z-index: 2000; flex-shrink: 0;
        }
        .av-selector { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; border-bottom: 1px solid #222; margin-bottom: 12px; }
        .av-icon { font-size: 28px; opacity: 0.2; transition: 0.3s; cursor: pointer; }
        .av-icon.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 8px var(--cyan)); }

        .input-box { display: flex; gap: 10px; align-items: center; }
        .field-wrap { flex: 1; background: #0a0a0f; border: 1px solid #333; border-radius: 15px; padding: 10px; border-left: 3px solid var(--pink); }
        #p-name { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 12px; width: 100%; border-bottom: 1px solid #1a1a1a; margin-bottom: 5px; outline: none; }
        #m-text { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; }
        
        .btn-send { 
            width: 50px; height: 50px; border-radius: 15px; border: none; 
            background: var(--cyan); color: #000; font-size: 22px; box-shadow: 0 0 15px var(--cyan);
        }

        .rep-form { display: none; margin-top: 10px; gap: 8px; }
        .rep-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="star-field"></div>

    <header class="header">
        <div class="logo"><h1>NEURO LUIYI</h1></div>
        <img src="NeuroLuis.gif" class="profile-gif" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="stream">
        <div id="container"></div>
    </main>

    <footer class="console">
        <div id="av-list" class="av-selector"></div>
        <div class="input-box">
            <div class="field-wrap">
                <input id="p-name" placeholder="REGISTRA TU ID..." maxlength="12">
                <input id="m-text" placeholder="MENSAJE DE TRANSMISIÓN...">
            </div>
            <button class="btn-send" onclick="enviar()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- MOTOR DE ESTRELLAS ---
        const field = document.getElementById('star-field');
        for(let i=0; i<70; i++) {
            const s = document.createElement('div'); s.className = 'star';
            const size = Math.random()*3+'px';
            s.style.width = s.style.height = size;
            s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
            s.style.animationDuration = (Math.random()*15+5)+'s'; field.appendChild(s);
        }

        // --- SELECTOR AVATAR ---
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-icon'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-list').appendChild(el);
        });

        // --- VALIDACIÓN DE SEGURIDAD ---
        const validarUsuario = (idInput) => {
            const id = document.getElementById(idInput).value.trim();
            if (!selAv) { alert("ERROR: Selecciona un AVATAR para identificarte."); return false; }
            if (!id) { alert("ERROR: Debes ingresar un ID de Piloto."); return false; }
            return { id, avatar: selAv };
        };

        window.enviar = () => {
            const user = validarUsuario('p-name');
            const m = document.getElementById('m-text').value.trim();
            if(!user || !m) return;
            push(ref(db, "posts"), { name: user.id, avatar: user.avatar, msg: m, likes: 0 });
            document.getElementById('m-text').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const id = snap.key;
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div class="user-row"><span class="av-tag">${d.avatar}</span> <span class="id-tag">@${d.name}</span></div>
                <div class="msg-text">${d.msg}</div>
                <div class="actions">
                    <button class="btn-act" onclick="like('${id}')">🔋 <span id="l-${id}">${d.likes || 0}</span></button>
                    <button class="btn-act" onclick="toggleR('${id}')">💬 RESPONDER</button>
                </div>
                <div id="thread-${id}" style="margin-top:10px; padding-left:12px; border-left:1px dashed var(--pink); font-size:13px; color:#ccc;"></div>
                <div id="box-${id}" class="rep-form">
                    <input id="in-${id}" placeholder="Tu respuesta oficial...">
                    <button onclick="sendR('${id}')" style="background:var(--cyan); border:none; padding:8px 15px; border-radius:8px; font-weight:bold; color:#000;">ENVIAR</button>
                </div>
            `;
            document.getElementById('container').prepend(div);
            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.style.marginBottom = '6px';
                node.innerHTML = `<b style="color:var(--cyan)">${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleR = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        
        window.sendR = (id) => {
            const user = validarUsuario('p-name'); // Obliga a identificarse abajo para responder
            const i = document.getElementById(`in-${id}`);
            if(!user || !i.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name: user.id, avatar: user.avatar, msg: i.value.trim() });
            i.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
