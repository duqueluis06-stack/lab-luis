<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>☎️ Contacto – NeuroLuiyi</title>

<style>

body{
    margin:0;
    font-family: Arial;
    color:white;

    background:url("fondo-foro.jpg") no-repeat center center fixed;
    background-size:cover;
}

/* OSCURECER FONDO */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* 🔥 TÍTULO NEÓN */
.header{
    text-align:center;
    padding:20px;
    font-size:30px;
    font-weight:bold;
    color:#00ffff;

    text-shadow:
    0 0 5px #00ffff,
    0 0 10px #00ffff,
    0 0 20px #ff00ff,
    0 0 40px #ff00ff;
}

/* 🧠 GIF MÁS GRANDE */
.avatar{
    position:fixed;
    top:15px;
    right:15px;
    width:110px;
    height:110px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid #00ffff;
    box-shadow:0 0 20px #00ffff;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* INPUT */
.box{
    max-width:600px;
    margin:auto;
    padding:20px;
}

input, textarea{
    width:100%;
    margin:5px 0;
    padding:10px;
    border-radius:10px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00ffff,#ff00ff);
    font-weight:bold;
    cursor:pointer;
}

/* POST */
.post{
    background:rgba(255,255,255,0.05);
    margin:10px auto;
    padding:15px;
    border-radius:15px;
    max-width:600px;
}

/* USER */
.user{
    font-weight:bold;
    color:#00ffff;
}

/* LIKE */
.like{
    margin-top:10px;
    cursor:pointer;
    color:#ff4d6d;
}

/* BOTÓN RESPONDER */
.replyBtn{
    margin-top:10px;
    cursor:pointer;
    color:#00ffff;
}

/* RESPUESTA */
.reply{
    margin-left:20px;
    margin-top:8px;
    padding:8px;
    border-left:2px solid #00ffff;
    background:rgba(255,255,255,0.03);
}

/* CAJA RESPUESTA */
.replyBox{
    display:none;
    margin-top:10px;
}

/* BOTÓN VOLVER */
.back{
    display:block;
    text-align:center;
    margin:20px auto;
    width:220px;
    padding:10px;
    border-radius:10px;
    background:rgba(0,255,255,0.1);
    color:white;
    text-decoration:none;
    box-shadow:0 0 10px #00ffff;
}

</style>
</head>

<body>

<div class="header">☎️ NeuroLuiyi Forum</div>

<div class="avatar">
    <img src="NeuroLuis.gif">
</div>

<div class="box">
    <input id="name" placeholder="Tu nombre">
    <textarea id="msg" placeholder="Escribe tu mensaje..."></textarea>
    <button onclick="send()">Publicar</button>
</div>

<a class="back" href="index.html">⬅ Volver al inicio</a>

<div id="feed"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
    databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = firebase.database();
const feed = document.getElementById("feed");

/* PUBLICAR POST */
function send(){

    let name = document.getElementById("name").value.trim();
    let msg = document.getElementById("msg").value.trim();

    if(!name || !msg) return;

    db.ref("posts").push({
        name,
        msg,
        likes:0,
        time:Date.now()
    });

    document.getElementById("msg").value="";
}

/* CARGAR POSTS */
db.ref("posts").on("child_added", snap=>{

    let p = snap.val();
    let id = snap.key;

    let div = document.createElement("div");
    div.className="post";

    div.innerHTML=`
        <div class="user">${p.name}</div>
        <div>${p.msg}</div>

        <div class="like" onclick="like('${id}', this)">
            ❤️ Like <span>${p.likes||0}</span>
        </div>

        <div class="replyBtn" onclick="toggleReply('${id}')">
            💬 Responder
        </div>

        <div class="replyBox" id="box-${id}">
            <input id="input-${id}" placeholder="Escribe respuesta y ENTER">
        </div>

        <div id="replies-${id}"></div>
    `;

    feed.prepend(div);

    /* ENTER PARA RESPONDER */
    setTimeout(()=>{
        let input = document.getElementById("input-"+id);
        input.addEventListener("keydown", e=>{
            if(e.key==="Enter"){
                reply(id, input);
            }
        });
    },100);

    loadReplies(id);
});

/* LIKE */
function like(id, el){
    let ref = db.ref("posts/"+id+"/likes");

    ref.transaction(v => (v||0)+1);

    let span = el.querySelector("span");
    span.innerText = parseInt(span.innerText)+1;
}

/* MOSTRAR INPUT */
function toggleReply(id){
    let box = document.getElementById("box-"+id);
    box.style.display = box.style.display === "block" ? "none" : "block";
}

/* RESPONDER */
function reply(postID, input){

    let text = input.value.trim();
    let name = document.getElementById("name").value.trim();

    if(!text || !name) return;

    db.ref("posts/"+postID+"/replies").push({
        name,
        msg:text,
        time:Date.now()
    });

    input.value="";
}

/* CARGAR RESPUESTAS */
function loadReplies(postID){

    db.ref("posts/"+postID+"/replies").on("child_added", snap=>{

        let r = snap.val();

        let div = document.createElement("div");
        div.className="reply";

        div.innerHTML=`<b>${r.name}:</b> ${r.msg}`;

        document.getElementById("replies-"+postID).appendChild(div);
    });
}

</script>

</body>
</html>
