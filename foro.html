<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🪐 NEURO-LUIYI: NASA FINAL</title>
    <style>
        :root {
            --cyan: #00ffff; --pink: #ff00ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* --- FONDO NASA OBLIGATORIO --- */
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column;
            /* Estrellas y Nebulosa Directa */
            background: 
                radial-gradient(circle at 20% 20%, rgba(0, 255, 255, 0.15), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.1), transparent 40%),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><circle cx="20" cy="30" r="1" fill="white" opacity="0.8"/><circle cx="150" cy="10" r="1.2" fill="white" opacity="0.6"/><circle cx="80" cy="160" r="1" fill="white"/><circle cx="180" cy="130" r="0.8" fill="white" opacity="0.9"/></svg>'),
                #000008;
            background-size: cover, cover, 180px 180px, cover;
        }

        /* Saturno en el fondo */
        .saturno-nasa {
            position: fixed; top: 10%; right: 10%; width: 120px; height: 80px; z-index: -1;
            background: radial-gradient(circle at 30% 30%, #f9e2b0, #a17f4a);
            border-radius: 50%; box-shadow: 0 0 25px rgba(249, 226, 176, 0.4);
        }
        .saturno-nasa::after {
            content: ""; position: absolute; top: 50%; left: 50%; width: 160px; height: 40px;
            margin: -20px 0 0 -80px; border: 6px solid rgba(225, 180, 107, 0.6);
            border-radius: 50%; transform: rotateX(75deg);
        }

        /* --- ESTRUCTURA --- */
        .header {
            height: 70px; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; flex-shrink: 0;
        }
        .logo h1 { font-size: 18px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }

        #stream { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .post {
            max-width: 500px; margin: 0 auto 20px; background: rgba(15, 15, 30, 0.9);
            border-left: 5px solid var(--cyan); border-radius: 0 15px 15px 0; padding: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        
        .user-row { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(0,255,255,0.2); padding-bottom: 8px; margin-bottom: 10px; }
        .id-tag { color: var(--cyan); font-weight: bold; font-size: 14px; }
        .msg-text { font-size: 16px; color: #fff; line-height: 1.5; padding-bottom: 10px; border-bottom: 1px solid rgba(255,0,255,0.15); }

        /* --- CONSOLA SEGURIDAD --- */
        .console {
            background: #000; border-top: 2px solid var(--cyan);
            padding: 10px 15px calc(30px + env(safe-area-inset-bottom)); flex-shrink: 0;
        }
        .av-selector { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #222; }
        .av-icon { font-size: 28px; opacity: 0.3; cursor: pointer; }
        .av-icon.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 10px var(--cyan)); }

        .input-box { display: flex; gap: 10px; align-items: center; }
        .field-wrap { flex: 1; background: #05050a; border: 1px solid #333; border-radius: 12px; padding: 8px; border-left: 3px solid var(--pink); }
        #p-name { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 12px; width: 100%; margin-bottom: 5px; outline: none; }
        #m-text { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; }
        
        .btn-send { width: 50px; height: 50px; border-radius: 15px; border: none; background: var(--cyan); color: #000; font-size: 24px; cursor: pointer; box-shadow: 0 0 15px var(--cyan); }
        .rep-form { display: none; margin-top: 12px; gap: 10px; }
        .rep-form input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="saturno-nasa"></div>

    <header class="header">
        <div class="logo"><h1>NEURO LUIYI</h1></div>
        <img src="NeuroLuis.gif" class="profile-gif" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'" style="width:45px; border-radius:8px; border:2px solid var(--cyan)">
    </header>

    <main id="stream"><div id="container"></div></main>

    <footer class="console">
        <div id="av-list" class="av-selector"></div>
        <div class="input-box">
            <div class="field-wrap">
                <input id="p-name" placeholder="ID PILOTO..." maxlength="12">
                <input id="m-text" placeholder="TU TRANSMISIÓN...">
            </div>
            <button class="btn-send" onclick="enviar()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Selector Avatares
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐'];
        let selAv = null;
        icons.forEach(i => {
            const el = document.createElement('span'); el.className = 'av-icon'; el.innerText = i;
            el.onclick = () => { document.querySelectorAll('.av-icon').forEach(x=>x.classList.remove('active')); el.classList.add('active'); selAv = i; };
            document.getElementById('av-list').appendChild(el);
        });

        // VALIDACIÓN SEGURIDAD (OBLIGATORIO IDENTIFICARSE)
        const validar = (idInput) => {
            const id = document.getElementById(idInput).value.trim();
            if (!selAv || !id) { 
                alert("¡SISTEMA NASA BLOQUEADO!\n\nDebes elegir un AVATAR e ingresar tu ID de Piloto en la barra de abajo para poder participar."); 
                return false; 
            }
            return { id, avatar: selAv };
        };

        window.enviar = () => {
            const user = validar('p-name');
            const m = document.getElementById('m-text').value.trim();
            if(!user || !m) return;
            push(ref(db, "posts"), { name: user.id, avatar: user.avatar, msg: m, likes: 0 });
            document.getElementById('m-text').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const d = snap.val(); const id = snap.key;
            const div = document.createElement('div'); div.className = 'post';
            div.innerHTML = `
                <div class="user-row"><span>${d.avatar}</span> <span class="id-tag">@${d.name}</span></div>
                <div class="msg-text">${d.msg}</div>
                <div class="actions">
                    <button style="color:#888; background:none; border:none; cursor:pointer;" onclick="like('${id}')">🔋 <span id="l-${id}">${d.likes || 0}</span></button>
                    <button style="color:#888; background:none; border:none; cursor:pointer;" onclick="toggleR('${id}')">💬 RESPONDER</button>
                </div>
                <div id="thread-${id}" style="margin-top:10px; padding-left:12px; border-left:1px dashed var(--pink); font-size:14px; color:#ccc;"></div>
                <div id="box-${id}" class="rep-form">
                    <input id="in-${id}" placeholder="Tu respuesta oficial...">
                    <button onclick="sendR('${id}')" style="background:var(--cyan); border:none; padding:8px 12px; border-radius:5px; font-weight:bold;">ENVIAR</button>
                </div>
            `;
            document.getElementById('container').prepend(div);
            onChildAdded(ref(db, `posts/${id}/replies`), rSnap => {
                const r = rSnap.val();
                const node = document.createElement('div'); node.style.marginBottom = '5px';
                node.innerHTML = `<b style="color:var(--cyan)">${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`thread-${id}`).appendChild(node);
            });
        });

        window.like = (id) => runTransaction(ref(db, `posts/${id}/likes`), c => (c || 0) + 1);
        window.toggleR = (id) => { const b = document.getElementById(`box-${id}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        
        window.sendR = (id) => {
            const user = validar('p-name'); // Obliga a identificarse para responder
            const i = document.getElementById(`in-${id}`);
            if(!user || !i.value.trim()) return;
            push(ref(db, `posts/${id}/replies`), { name: user.id, avatar: user.avatar, msg: i.value.trim() });
            i.value = ""; document.getElementById(`box-${id}`).style.display = 'none';
        };
    </script>
</body>
</html>
