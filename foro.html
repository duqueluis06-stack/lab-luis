<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JetApp Foro Stable</title>

<style>

body {
    margin:0;
    font-family: Arial, sans-serif;
    color:white;

    background-image:url("fondo-foro.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* HEADER */
.header{
    text-align:center;
    padding:18px;
    font-size:24px;
    font-weight:bold;
    color:#00ffff;
}

/* GIF avatar */
.avatar{
    position:fixed;
    top:10px;
    right:10px;
    width:85px;
    height:85px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid #00ffff;
    box-shadow:0 0 12px #00ffff;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* BOX */
.box{
    max-width:600px;
    margin:20px auto;
    padding:15px;
}

input, textarea{
    width:100%;
    margin:6px 0;
    padding:10px;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00ffff,#ff00ff);
    font-weight:bold;
    cursor:pointer;
}

/* PANEL SOCIAL */
.social-panel{
    max-width:600px;
    margin:15px auto;
    padding:12px;
    background:rgba(255,255,255,0.06);
    border-radius:12px;
    backdrop-filter: blur(8px);
}

.actions{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
}

.tag{
    text-align:center;
    margin-bottom:10px;
    color:#00ffff;
    font-weight:bold;
}

.btn{
    padding:7px 10px;
    background:rgba(255,255,255,0.08);
    border-radius:10px;
    cursor:pointer;
}

/* POSTS */
.post{
    max-width:600px;
    margin:10px auto;
    padding:12px;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,255,255,0.2);
}

/* user */
.user{
    font-weight:bold;
    color:#00ffff;
    display:flex;
    align-items:center;
    gap:8px;
}

/* like */
.like{
    margin-top:10px;
    color:#ff4d6d;
    cursor:pointer;
}

/* category */
.cat{
    font-size:12px;
    color:#aaa;
}

/* back */
.back{
    display:block;
    text-align:center;
    margin:20px auto;
    width:200px;
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    text-decoration:none;
    color:white;
}

</style>
</head>

<body>

<div class="header">⚡ JetApp Forum Stable</div>

<!-- GIF PROTEGIDO -->
<div class="avatar">
    <img src="NeuroLuis.gif">
</div>

<div class="box">
    <input id="name" placeholder="Tu nombre">
    
    <input id="cat" placeholder="Categoría (fisica, cultura, ideas...)">
    
    <textarea id="msg" placeholder="Escribe tu post..."></textarea>

    <button onclick="send()">Publicar</button>
</div>

<!-- PANEL SOCIAL -->
<div class="social-panel">
    <div class="tag">😍 Like • Ideas • Filosofía • Cultura</div>

    <div class="actions">
        <div class="btn">❤️ Like</div>
        <div class="btn">📤 Compartir</div>
        <div class="btn">🧠 Filosofía</div>
        <div class="btn">⚡ Energía</div>
        <div class="btn">🌍 Cultura</div>
    </div>
</div>

<a class="back" href="index.html">⬅ Inicio</a>

<div id="feed"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
    databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = firebase.database();
const feed = document.getElementById("feed");

function avatar(name){
    return "https://api.dicebear.com/7.x/pixel-art/svg?seed="+name;
}

function send(){

    const name = document.getElementById("name").value.trim();
    const msg = document.getElementById("msg").value.trim();
    const cat = document.getElementById("cat").value.trim();

    if(!name || !msg) return;

    db.ref("posts").push({
        name,
        msg,
        cat: cat || "general",
        likes:0,
        time:Date.now()
    });

    document.getElementById("msg").value="";
}

const seen = new Set();

db.ref("posts").on("child_added", snap=>{

    const p = snap.val();
    const id = snap.key;

    if(seen.has(id)) return;
    seen.add(id);

    const div = document.createElement("div");
    div.className="post";

    div.innerHTML=`
        <div class="user">
            <img src="${avatar(p.name)}" width="24" style="border-radius:50%">
            ${p.name}
        </div>

        <div class="cat">📡 ${p.cat}</div>

        <div>${p.msg}</div>

        <div class="like" onclick="like('${id}',this)">
            ❤️ Like <span>${p.likes || 0}</span>
        </div>
    `;

    feed.prepend(div);
});

function like(id, el){

    const ref = db.ref("posts/"+id+"/likes");

    ref.transaction(v => (v||0)+1);

    const span = el.querySelector("span");
    span.innerText = parseInt(span.innerText)+1;
}

</script>

</body>
</html>
