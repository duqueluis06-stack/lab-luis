<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 NeuroLuiyi - TikTok Style</title>

<style>
    :root {
        --neon-blue: #00ffff;
        --neon-pink: #ff00ff;
        --bg-dark: #0a0a0a;
    }

    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: #000;
        color: white;
        overflow-x: hidden;
    }

    /* --- BOTÓN REGRESO --- */
    .back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid var(--neon-blue);
        color: white;
        padding: 10px 15px;
        border-radius: 50px;
        text-decoration: none;
        font-size: 14px;
        font-weight: bold;
        transition: 0.3s;
    }
    .back-btn:hover { background: var(--neon-blue); color: #000; }

    /* --- LAYOUT TIKTOK --- */
    #feed {
        height: 100vh;
        scroll-snap-type: y mandatory;
        overflow-y: scroll;
        scrollbar-width: none; /* Firefox */
    }
    #feed::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    .post {
        height: 100vh;
        width: 100vw;
        scroll-snap-align: start;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 80px 20px;
        box-sizing: border-box;
        background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 50%);
        border-bottom: 1px solid #222;
    }

    /* --- INFO DEL USUARIO (IZQUIERDA) --- */
    .post-content {
        max-width: 80%;
        margin-bottom: 20px;
    }
    .user-tag {
        font-size: 1.2rem;
        font-weight: bold;
        color: var(--neon-blue);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .user-avatar-circle {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: 2px solid var(--neon-pink);
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        font-size: 24px;
    }
    .post-text {
        font-size: 1rem;
        line-height: 1.4;
        color: #eee;
    }

    /* --- BOTONES DE ACCIÓN (DERECHA) --- */
    .side-bar {
        position: absolute;
        right: 15px;
        bottom: 100px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }
    .action-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        font-size: 0.8rem;
    }
    .btn-circle {
        width: 50px;
        height: 50px;
        background: rgba(255,255,255,0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        margin-bottom: 5px;
        transition: 0.3s;
    }
    .btn-circle:active { transform: scale(0.8); }

    /* --- PUBLICADOR FLOTANTE --- */
    .fab {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
        padding: 15px 30px;
        border-radius: 50px;
        font-weight: bold;
        box-shadow: 0 0 20px rgba(0,255,255,0.5);
        cursor: pointer;
        z-index: 1000;
    }

    /* --- MODAL DE COMENTARIOS --- */
    .modal {
        position: fixed;
        bottom: -100%;
        left: 0;
        width: 100%;
        height: 70%;
        background: #111;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
        transition: 0.4s;
        z-index: 2000;
        padding: 20px;
        box-sizing: border-box;
        overflow-y: auto;
    }
    .modal.active { bottom: 0; }
    .close-modal { float: right; font-size: 24px; color: var(--neon-pink); }
    
    .reply-item {
        padding: 10px;
        border-bottom: 1px solid #222;
        margin-bottom: 10px;
    }

</style>
</head>
<body>

<a href="index.html" class="back-btn">⬅ Regresar</a>

<div id="feed">
    </div>

<div class="fab" onclick="openPublish()">+ Publicar Experimento</div>

<div id="publishModal" class="modal">
    <span class="close-modal" onclick="closeModals()">×</span>
    <h3>Nuevo Post</h3>
    <div style="display:flex; gap:10px; margin-bottom:10px;" id="av-selector">
        <span onclick="selAv('🤖', this)" class="btn-circle" style="border:1px solid #fff">🤖</span>
        <span onclick="selAv('🧬', this)" class="btn-circle">🧬</span>
        <span onclick="selAv('🚀', this)" class="btn-circle">🚀</span>
        <span onclick="selAv('🧠', this)" class="btn-circle">🧠</span>
    </div>
    <input id="name" placeholder="Tu nombre" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:none;">
    <textarea id="msg" placeholder="¿Qué descubriste hoy?" style="width:100%; height:100px; padding:10px; border-radius:10px; border:none;"></textarea>
    <button onclick="send()" style="width:100%; padding:15px; background:var(--neon-blue); border:none; border-radius:10px; font-weight:bold; margin-top:10px;">POSTEAR</button>
</div>

<div id="commentModal" class="modal">
    <span class="close-modal" onclick="closeModals()">×</span>
    <h3>Comentarios</h3>
    <div id="replies-container"></div>
    <div style="position: sticky; bottom: 0; background: #111; padding-top: 10px;">
        <input id="reply-input" placeholder="Escribe tu respuesta..." style="width:80%; padding:10px; border-radius:10px; border:none;">
        <button id="reply-btn" style="width:15%; padding:10px; background:var(--neon-pink); border:none; border-radius:10px;">Go</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
  databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});
const db = firebase.database();
let myAvatar = "🤖";
let activePostId = null;

function selAv(av, el) {
    document.querySelectorAll('#av-selector span').forEach(s => s.style.borderColor="transparent");
    el.style.borderColor = "var(--neon-blue)";
    myAvatar = av;
}

function openPublish() { document.getElementById('publishModal').classList.add('active'); }
function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

function send() {
    let n = document.getElementById("name").value;
    let m = document.getElementById("msg").value;
    if(!n || !m) return;
    db.ref("posts").push({ name:n, msg:m, avatar:myAvatar, likes:0, time:Date.now() });
    closeModals();
}

db.ref("posts").on("child_added", snap => {
    let p = snap.val();
    let id = snap.key;
    let postDiv = document.createElement("div");
    postDiv.className = "post";
    postDiv.innerHTML = `
        <div class="side-bar">
            <div class="action-btn" onclick="like('${id}')">
                <div class="btn-circle">❤️</div>
                <span id="l-${id}">${p.likes || 0}</span>
            </div>
            <div class="action-btn" onclick="openComments('${id}')">
                <div class="btn-circle">💬</div>
                <span>Chat</span>
            </div>
        </div>
        <div class="post-content">
            <div class="user-tag">
                <div class="user-avatar-circle">${p.avatar || '👤'}</div>
                @${p.name}
            </div>
            <div class="post-text">${p.msg}</div>
        </div>
    `;
    document.getElementById("feed").prepend(postDiv);
});

function like(id) {
    db.ref("posts/"+id+"/likes").transaction(v => (v||0)+1);
}

db.ref("posts").on("child_changed", snap => {
    let countEl = document.getElementById("l-"+snap.key);
    if(countEl) countEl.innerText = snap.val().likes || 0;
});

function openComments(id) {
    activePostId = id;
    const container = document.getElementById("replies-container");
    container.innerHTML = "Cargando...";
    document.getElementById("commentModal").classList.add("active");
    
    db.ref("posts/"+id+"/replies").off();
    db.ref("posts/"+id+"/replies").on("value", snap => {
        container.innerHTML = "";
        snap.forEach(child => {
            let r = child.val();
            container.innerHTML += `<div class="reply-item"><strong>${r.avatar} ${r.name}:</strong> ${r.msg}</div>`;
        });
    });
}

document.getElementById("reply-btn").onclick = () => {
    let txt = document.getElementById("reply-input").value;
    let name = document.getElementById("name").value || "Anónimo";
    if(!txt || !activePostId) return;
    db.ref("posts/"+activePostId+"/replies").push({ name: name, msg: txt, avatar: myAvatar });
    document.getElementById("reply-input").value = "";
};
</script>

</body>
</html>
