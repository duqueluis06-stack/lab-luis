<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 NeuroLuiyi - Space Forum</title>

<style>
    :root {
        --cyan: #00ffff;
        --magenta: #ff00ff;
        --space-dark: #020205;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: var(--space-dark);
        color: white;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    /* --- FONDO ESPACIAL --- */
    .universe {
        position: fixed;
        inset: 0;
        background: url('https://www.transparenttextures.com/patterns/stardust.png'), 
                    radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        z-index: -2;
    }

    .astronaut {
        position: fixed;
        width: 150px;
        top: 20%;
        right: 10%;
        opacity: 0.7;
        animation: float 6s ease-in-out infinite;
        z-index: -1;
        filter: drop-shadow(0 0 15px var(--cyan));
    }

    @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-30px) rotate(10deg); }
    }

    /* --- BOTÓN SALIR RADAR --- */
    .exit-radar {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 50px;
        height: 50px;
        background: rgba(0, 255, 255, 0.1);
        border: 2px solid var(--cyan);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        color: var(--cyan);
        font-weight: bold;
        box-shadow: 0 0 15px var(--cyan);
        z-index: 1000;
        transition: 0.3s;
    }
    .exit-radar:hover { background: var(--cyan); color: black; }

    /* --- FEED DE MENSAJES --- */
    #feed {
        flex-grow: 1;
        overflow-y: auto;
        padding: 80px 20px 150px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        scrollbar-width: none;
    }
    #feed::-webkit-scrollbar { display: none; }

    .post-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 255, 255, 0.2);
        border-radius: 15px;
        width: 100%;
        max-width: 500px;
        padding: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .user-box { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .user-box img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--magenta); }
    .user-box b { color: var(--cyan); font-size: 0.9rem; }

    .post-text { font-size: 0.95rem; line-height: 1.4; color: #d1d1d1; }

    /* --- MINI PANEL DE CONTROL (INFERIOR) --- */
    .control-panel {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: rgba(0, 0, 0, 0.85);
        border-top: 1px solid var(--cyan);
        padding: 15px 0;
        backdrop-filter: blur(20px);
    }

    .panel-content {
        max-width: 600px;
        margin: auto;
        padding: 0 20px;
    }

    .av-gallery {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 10px;
        scrollbar-width: none;
    }
    .av-gallery img {
        width: 45px; height: 45px;
        border-radius: 50%;
        cursor: pointer;
        opacity: 0.5;
        transition: 0.3s;
        border: 2px solid transparent;
    }
    .av-gallery img.active { opacity: 1; border-color: var(--cyan); transform: scale(1.1); }

    .input-row { display: flex; gap: 10px; align-items: center; }
    input#name { width: 80px; background: #111; border: 1px solid #333; color: white; padding: 8px; border-radius: 5px; font-size: 12px; }
    textarea#msg { flex-grow: 1; background: #111; border: 1px solid #333; color: white; padding: 8px; border-radius: 5px; height: 35px; resize: none; }
    
    .btn-warp {
        background: var(--cyan);
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 10px var(--cyan);
    }

    /* --- RESPUESTAS --- */
    .reply-area {
        margin-top: 10px;
        font-size: 0.85rem;
        border-left: 1px solid var(--magenta);
        padding-left: 10px;
    }
</style>
</head>
<body>

<div class="universe"></div>
<img src="https://cdni.iconscout.com/illustration/premium/thumb/astronaut-floating-in-space-5630045-4690333.png" class="astronaut">

<a href="index.html" class="exit-radar">BYE</a>

<div id="feed"></div>

<div class="control-panel">
    <div class="panel-content">
        <div class="av-gallery" id="gallery">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=1" class="active" onclick="sel(this)">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=2" onclick="sel(this)">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Space1" onclick="sel(this)">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=4" onclick="sel(this)">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Robot" onclick="sel(this)">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Ali" onclick="sel(this)">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Science" onclick="sel(this)">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=9" onclick="sel(this)">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Luis" onclick="sel(this)">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Z" onclick="sel(this)">
        </div>
        
        <div class="input-row">
            <input id="name" placeholder="Nick">
            <textarea id="msg" placeholder="Lanza tu mensaje al espacio..."></textarea>
            <button class="btn-warp" onclick="send()">WARP</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
  databaseURL:"https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app/"
});
const db = firebase.database();
let myAvatar = "https://api.dicebear.com/7.x/bottts/svg?seed=1";

function sel(el) {
    document.querySelectorAll('.av-gallery img').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    myAvatar = el.src;
}

function send() {
    const n = document.getElementById("name").value.trim();
    const m = document.getElementById("msg").value.trim();
    if(!n || !m) return;
    db.ref("posts").push({ name:n, msg:m, avatar:myAvatar, likes:0, time:Date.now() });
    document.getElementById("msg").value = "";
}

db.ref("posts").on("child_added", snap => {
    const p = snap.val();
    const id = snap.key;
    const card = document.createElement("div");
    card.className = "post-card";
    card.innerHTML = `
        <div class="user-box">
            <img src="${p.avatar}">
            <b>@${p.name}</b>
        </div>
        <div class="post-text">${p.msg}</div>
        <div style="margin-top:10px; font-size:12px; color:var(--cyan); cursor:pointer" onclick="like('${id}')">
            ✨ Energía: <span id="l-${id}">${p.likes||0}</span>
        </div>
        <div class="reply-area" id="replies-${id}"></div>
        <input style="background:transparent; border:none; border-bottom:1px solid #333; color:white; width:100%; font-size:11px; margin-top:5px;" 
               placeholder="Responder..." onkeydown="if(event.key==='Enter') reply('${id}', this)">
    `;
    document.getElementById("feed").prepend(card);
    
    // Cargar respuestas
    db.ref("posts/"+id+"/replies").on("child_added", s => {
        const r = s.val();
        const rDiv = document.createElement("div");
        rDiv.innerHTML = `<b style="color:var(--magenta)">${r.name}:</b> ${r.msg}`;
        document.getElementById("replies-"+id).appendChild(rDiv);
    });
});

function like(id) {
    db.ref("posts/"+id+"/likes").transaction(v => (v||0)+1);
}

db.ref("posts").on("child_changed", snap => {
    const el = document.getElementById("l-"+snap.key);
    if(el) el.innerText = snap.val().likes || 0;
});

function reply(id, el) {
    const name = document.getElementById("name").value || "Astronauta";
    if(!el.value) return;
    db.ref("posts/"+id+"/replies").push({ name: name, msg: el.value });
    el.value = "";
}
</script>

</body>
</html>
