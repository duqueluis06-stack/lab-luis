<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🚀 NASA FORUM: NEURO-LUIYI ELITE</title>
    <style>
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --space: #010105;
            --glass: rgba(10, 15, 30, 0.85);
        }

        /* --- ARQUITECTURA BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--space);
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex; flex-direction: column;
            color: white;
        }

        /* --- MOTOR GRÁFICO (STARS & PLANETS) --- */
        #deep-space {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #0a0a25 0%, #000 100%);
            overflow: hidden;
        }

        /* Estrellas Parallax Capa 1 */
        .stars-1 {
            position: absolute; inset: -50%;
            background-image: 
                radial-gradient(1px 1px at 10% 10%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 50% 20%, #fff, transparent),
                radial-gradient(1px 1px at 80% 40%, #fff, transparent),
                radial-gradient(2px 2px at 30% 70%, #fff, transparent),
                radial-gradient(1px 1px at 70% 85%, #fff, transparent);
            background-size: 250px 250px;
            animation: drift 100s linear infinite;
            will-change: transform;
        }

        /* Estrellas Parallax Capa 2 */
        .stars-2 {
            position: absolute; inset: -50%;
            background-image: 
                radial-gradient(1px 1px at 15% 35%, #fff, transparent),
                radial-gradient(1px 1px at 85% 15%, #fff, transparent),
                radial-gradient(1px 1px at 45% 75%, #fff, transparent);
            background-size: 400px 400px;
            animation: drift 180s linear infinite reverse;
            opacity: 0.4;
        }

        @keyframes drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Saturno Visual FX */
        .saturn-container {
            position: absolute; top: 15%; right: 10%; 
            animation: hover 8s ease-in-out infinite alternate;
            z-index: 1;
        }
        .saturn-body {
            width: 70px; height: 70px; 
            background: radial-gradient(circle at 30% 30%, #f9e2b0, #a17f4a);
            border-radius: 50%; position: relative; z-index: 2;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.8), 0 0 25px rgba(249,226,176,0.3);
        }
        .saturn-rings {
            position: absolute; width: 160px; height: 45px;
            border: 8px solid rgba(225, 180, 107, 0.4);
            border-radius: 50%; top: 35px; left: -45px;
            transform: rotateX(75deg); z-index: 1;
        }

        @keyframes hover { from { transform: translateY(0) rotate(-5deg); } to { transform: translateY(20px) rotate(5deg); } }

        /* --- INTERFAZ --- */
        .header {
            height: 75px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; z-index: 100;
            box-shadow: 0 5px 20px rgba(0,255,255,0.2);
        }
        .header h1 { font-size: 18px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; font-weight: 800; }
        .pfp { width: 45px; height: 45px; border: 2px solid var(--cyan); border-radius: 10px; }

        #main-scroll { flex: 1; overflow-y: auto; padding: 20px 15px; -webkit-overflow-scrolling: touch; }
        #posts-container { max-width: 600px; margin: 0 auto; }

        .card {
            background: var(--glass); border-left: 5px solid var(--cyan);
            border-radius: 0 15px 15px 0; padding: 20px; margin-bottom: 25px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .user-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; border-bottom: 1px solid rgba(0,255,255,0.1); padding-bottom: 8px; }
        .user-id { color: var(--cyan); font-weight: bold; font-size: 14px; }
        .msg-text { font-size: 16px; line-height: 1.5; color: #eee; margin-bottom: 15px; }

        .actions { display: flex; gap: 20px; }
        .act-btn { background: none; border: none; color: #888; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .act-btn:hover { color: var(--cyan); }

        /* --- RESPUESTAS --- */
        .replies-box { margin-top: 15px; padding-left: 15px; border-left: 1px dashed var(--pink); display: flex; flex-direction: column; gap: 10px; }
        .reply-card { font-size: 14px; background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 8px; }
        .reply-input-row { display: none; margin-top: 15px; gap: 10px; }
        .reply-input-row input { flex: 1; background: #000; border: 1px solid var(--cyan); color: white; padding: 10px; border-radius: 8px; outline: none; }

        /* --- CONSOLA DE SEGURIDAD --- */
        .footer-console {
            background: #000; border-top: 3px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom));
            z-index: 1000; box-shadow: 0 -10px 40px rgba(0,0,0,0.9);
        }

        .av-picker { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid #1a1a1a; }
        .av-opt { font-size: 30px; opacity: 0.2; cursor: pointer; transition: 0.3s; }
        .av-opt.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 10px var(--cyan)); }

        .input-group { display: flex; gap: 12px; align-items: center; }
        .input-fields { flex: 1; background: #08080f; border: 1px solid #222; border-radius: 15px; padding: 12px; border-left: 4px solid var(--pink); }
        #pilot-id { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 13px; width: 100%; margin-bottom: 5px; outline: none; }
        #pilot-msg { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; }
        
        .send-btn { 
            width: 60px; height: 60px; border-radius: 20px; border: none; 
            background: var(--cyan); color: #000; 
            font-size: 26px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="deep-space">
        <div class="stars-1"></div>
        <div class="stars-2"></div>
        <div class="saturn-container">
            <div class="saturn-rings"></div>
            <div class="saturn-body"></div>
        </div>
    </div>

    <header class="header">
        <h1>NEURO LUIYI 🪐 FORUM</h1>
        <img src="NeuroLuis.gif" class="pfp" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="main-scroll">
        <div id="posts-container"></div>
    </main>

    <footer class="footer-console">
        <div id="av-list" class="av-picker"></div>
        <div class="input-group">
            <div class="input-fields">
                <input id="pilot-id" placeholder="ID PILOTO..." maxlength="15">
                <input id="pilot-msg" placeholder="ENVIAR TRANSMISIÓN AL ESPACIO...">
            </div>
            <button class="send-btn" onclick="publish()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- AVATARES ---
        const icons = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🪐'];
        let selectedAv = null;
        const list = document.getElementById('av-list');
        icons.forEach(i => {
            const span = document.createElement('span'); span.className = 'av-opt'; span.innerText = i;
            span.onclick = () => { document.querySelectorAll('.av-opt').forEach(x=>x.classList.remove('active')); span.classList.add('active'); selectedAv = i; };
            list.appendChild(span);
        });

        // --- LÓGICA DE ENVÍO ---
        const getIdentity = () => {
            const id = document.getElementById('pilot-id').value.trim();
            if (!selectedAv || !id) { alert("⚠️ Elige Avatar e ID"); return null; }
            return { id, av: selectedAv };
        };

        window.publish = () => {
            const user = getIdentity();
            const msg = document.getElementById('pilot-msg').value.trim();
            if (!user || !msg) return;
            push(ref(db, "posts"), { name: user.id, avatar: user.av, msg: msg, likes: 0 });
            document.getElementById('pilot-msg').value = "";
        };

        // --- RENDERIZADO DE POSTS ---
        onChildAdded(ref(db, "posts"), snap => {
            const data = snap.val(); const key = snap.key;
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `
                <div class="user-row"><span>${data.avatar}</span><span class="user-id">@${data.name}</span></div>
                <div class="msg-text">${data.msg}</div>
                <div class="actions">
                    <button class="act-btn" onclick="addLike('${key}')">🔋 <span id="l-${key}">${data.likes || 0}</span></button>
                    <button class="act-btn" onclick="toggleRep('${key}')">💬 COMENTAR</button>
                </div>
                <div id="replies-${key}" class="replies-box"></div>
                <div id="input-box-${key}" class="reply-input-row">
                    <input id="field-${key}" placeholder="Responder...">
                    <button onclick="sendReply('${key}')" style="background:var(--cyan); border:none; padding:10px; border-radius:8px; font-weight:bold;">OK</button>
                </div>
            `;
            document.getElementById('posts-container').prepend(card);

            onChildAdded(ref(db, `posts/${key}/replies`), rSnap => {
                const r = rSnap.val();
                const div = document.createElement('div'); div.className = 'reply-card';
                div.innerHTML = `<b style="color:var(--cyan)">${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`replies-${key}`).appendChild(div);
            });
        });

        window.addLike = (key) => runTransaction(ref(db, `posts/${key}/likes`), c => (c || 0) + 1);
        window.toggleRep = (key) => { const b = document.getElementById(`input-box-${key}`); b.style.display = b.style.display==='flex'?'none':'flex'; };
        
        window.sendReply = (key) => {
            const user = getIdentity(); const input = document.getElementById(`field-${key}`);
            if(!user || !input.value.trim()) return;
            push(ref(db, `posts/${key}/replies`), { name: user.id, avatar: user.av, msg: input.value.trim() });
            input.value = ""; document.getElementById(`input-box-${key}`).style.display = 'none';
        };
    </script>
</body>
</html>
