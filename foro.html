<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🪐 NEURO-LUIYI: NASA ULTIMATUM</title>
    <style>
        /* --- BLOQUE 1: BASE Y VARIABLES --- */
        :root {
            --cyan: #00ffff;
            --pink: #ff00ff;
            --space: #010103;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: var(--space);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column;
            color: white;
        }

        /* --- BLOQUE 2: EL MOTOR NASA (UNIVERSO DINÁMICO) --- */
        #universo-total {
            position: fixed; inset: 0; z-index: -1;
            /* Nebulosa generada por gradientes múltiples */
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.1) 0%, transparent 50%),
                var(--space);
        }

        /* Estrellas NASA Version (Capas con movimiento) */
        .estrellas {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 100px 150px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 250px 200px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 350px 80px, #fff, rgba(0,0,0,0));
            background-size: 400px 400px;
            animation: rotarEspacio 120s linear infinite;
            opacity: 0.8;
        }

        @keyframes rotarEspacio {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(360deg) scale(1.1); }
        }

        /* Saturno Realista CSS */
        .saturno-nasa {
            position: absolute; top: 15%; right: 12%; width: 150px; height: 100px;
            animation: flotar 6s ease-in-out infinite alternate;
        }
        .saturno-bola {
            width: 60px; height: 60px; background: radial-gradient(circle at 30% 30%, #f9e2b0, #a17f4a);
            border-radius: 50%; margin: 20px auto; position: relative; z-index: 2;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.8), 0 0 25px rgba(249,226,176,0.3);
        }
        .saturno-anillos {
            position: absolute; width: 140px; height: 40px; border: 8px solid rgba(225, 180, 107, 0.4);
            border-radius: 50%; top: 40px; left: 5px; transform: rotateX(75deg); z-index: 1;
        }

        @keyframes flotar { from { transform: translateY(0); } to { transform: translateY(15px); } }

        /* --- BLOQUE 3: INTERFAZ Y POSTS --- */
        .header {
            height: 75px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--cyan); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; z-index: 100;
        }
        .header h1 { font-size: 18px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); letter-spacing: 2px; }

        #feed-espacial { flex: 1; overflow-y: auto; padding: 20px 15px; z-index: 50; }
        .post-nasa {
            max-width: 550px; margin: 0 auto 20px; background: rgba(10, 15, 30, 0.9);
            border-left: 5px solid var(--cyan); border-radius: 0 15px 15px 0; padding: 18px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .u-data { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid rgba(0,255,255,0.1); padding-bottom: 8px; }
        .u-nombre { color: var(--cyan); font-weight: bold; font-size: 14px; }
        .u-texto { font-size: 16px; line-height: 1.5; color: #eee; }

        /* --- BLOQUE 4: CONSOLA DE SEGURIDAD --- */
        .consola-nasa {
            background: #000; border-top: 2px solid var(--cyan);
            padding: 15px 15px calc(30px + env(safe-area-inset-bottom)); z-index: 200;
        }
        .selector-avatares { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid #222; }
        .av-item { font-size: 32px; opacity: 0.2; cursor: pointer; transition: 0.3s; }
        .av-item.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 10px var(--cyan)); }

        .caja-entrada { display: flex; gap: 12px; align-items: center; }
        .inputs-texto { flex: 1; background: #05050a; border: 1px solid #333; border-radius: 15px; padding: 12px; border-left: 4px solid var(--pink); }
        #id-piloto { background: none; border: none; color: var(--pink); font-weight: bold; font-size: 13px; width: 100%; margin-bottom: 5px; outline: none; }
        #msg-piloto { background: none; border: none; color: #fff; font-size: 15px; width: 100%; outline: none; }
        
        .boton-lanzar { 
            width: 60px; height: 60px; border-radius: 18px; border: none; 
            background: var(--cyan); color: #000; font-size: 26px; cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        /* --- RESPUESTAS --- */
        .hilo-respuestas { margin-top: 15px; padding-left: 15px; border-left: 1px dashed var(--pink); display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
        .form-respuesta { display: none; margin-top: 10px; gap: 8px; }
        .form-respuesta input { flex: 1; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="universo-total">
        <div class="estrellas"></div>
        <div class="saturno-nasa">
            <div class="saturno-anillos"></div>
            <div class="saturno-bola"></div>
        </div>
    </div>

    <header class="header">
        <h1>NEURO LUIYI 🪐 NASA</h1>
        <img src="NeuroLuis.gif" style="width:45px; border-radius:10px; border:2px solid var(--cyan)" onerror="this.src='https://i.postimg.cc/8P6LpD3R/astronaut-cinematic.png'">
    </header>

    <main id="feed-espacial"><div id="contenedor-principal"></div></main>

    <footer class="consola-nasa">
        <div id="av-picker" class="selector-avatares"></div>
        <div class="caja-entrada">
            <div class="inputs-texto">
                <input id="id-piloto" placeholder="REGISTRA TU ID DE PILOTO..." maxlength="15">
                <input id="msg-piloto" placeholder="TRANSMITIR AL FORO...">
            </div>
            <button class="boton-lanzar" onclick="enviarMensaje()">🚀</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
            authDomain: "foro-luiyi.firebaseapp.com",
            databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "foro-luiyi",
            storageBucket: "foro-luiyi.firebasestorage.app",
            messagingSenderId: "410471993147",
            appId: "1:410471993147:web:d672952aa8a4364d48f11e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Selector Avatares
        const iconos = ['👨‍🚀','👽','🤖','👾','🧠','⚡','🚀','🛸','🛰️','🌌','🪐'];
        let avatarSeleccionado = null;
        icons.forEach(i => {
            const span = document.createElement('span'); span.className = 'av-item'; span.innerText = i;
            span.onclick = () => { document.querySelectorAll('.av-item').forEach(x=>x.classList.remove('active')); span.classList.add('active'); avatarSeleccionado = i; };
            document.getElementById('av-picker').appendChild(span);
        });

        // Seguridad NASA
        const validarPiloto = (idElemento) => {
            const id = document.getElementById(idElemento).value.trim();
            if (!avatarSeleccionado || !id) { alert("⚠️ SISTEMA NASA: Elige un Avatar e ID de Piloto abajo."); return null; }
            return { id, avatar: avatarSeleccionado };
        };

        window.enviarMensaje = () => {
            const user = validarPiloto('id-piloto');
            const msg = document.getElementById('msg-piloto').value.trim();
            if(!user || !msg) return;
            push(ref(db, "posts"), { name: user.id, avatar: user.avatar, msg: msg, likes: 0 });
            document.getElementById('msg-piloto').value = "";
        };

        onChildAdded(ref(db, "posts"), snap => {
            const data = snap.val(); const key = snap.key;
            const post = document.createElement('div'); post.className = 'post-nasa';
            post.innerHTML = `
                <div class="u-data"><span>${data.avatar}</span> <span class="u-nombre">@${data.name}</span></div>
                <div class="u-texto">${data.msg}</div>
                <div style="margin-top:15px; display:flex; gap:25px">
                    <button style="background:none; border:none; color:#777; font-weight:bold; cursor:pointer;" onclick="likePost('${key}')">🔋 <span id="l-${key}">${data.likes || 0}</span></button>
                    <button style="background:none; border:none; color:#777; font-weight:bold; cursor:pointer;" onclick="abrirRespuesta('${key}')">💬 COMENTAR</button>
                </div>
                <div id="hilo-${key}" class="hilo-respuestas"></div>
                <div id="form-r-${key}" class="form-respuesta">
                    <input id="in-r-${key}" placeholder="Responder al piloto...">
                    <button onclick="enviarRespuesta('${key}')" style="background:var(--cyan); border:none; padding:8px 12px; border-radius:8px; font-weight:bold;">OK</button>
                </div>
            `;
            document.getElementById('contenedor-principal').prepend(post);

            onChildAdded(ref(db, `posts/${key}/replies`), rSnap => {
                const r = rSnap.val();
                const div = document.createElement('div');
                div.innerHTML = `<b style="color:var(--cyan)">${r.avatar} ${r.name}:</b> ${r.msg}`;
                document.getElementById(`hilo-${key}`).appendChild(div);
            });
        });

        window.likePost = (key) => runTransaction(ref(db, `posts/${key}/likes`), c => (c || 0) + 1);
        window.abrirRespuesta = (key) => { const f = document.getElementById(`form-r-${key}`); f.style.display = f.style.display==='flex'?'none':'flex'; };
        
        window.enviarRespuesta = (key) => {
            const user = validarPiloto('id-piloto');
            const input = document.getElementById(`in-r-${key}`);
            if(!user || !input.value.trim()) return;
            push(ref(db, `posts/${key}/replies`), { name: user.id, avatar: user.avatar, msg: input.value.trim() });
            input.value = ""; document.getElementById(`form-r-${key}`).style.display = 'none';
        };
    </script>
</body>
</html>
