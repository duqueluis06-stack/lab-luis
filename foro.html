<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🚀 NeuroLuiyi - Lab & AI</title>

<style>
:root {
    --cyan: #00ffff;
    --pink: #ff00ff;
    --glass: rgba(15, 20, 35, 0.7); 
}

body {
    margin: 0; font-family: 'Segoe UI', sans-serif; background: #010103; color: white;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* FONDO ESTRELLADO */
#space { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle, #0d1b2a, #000); }
.star { position: absolute; background: white; border-radius: 50%; animation: move 10s linear infinite; }
@keyframes move { from { transform: translateY(-100vh); } to { transform: translateY(100vh); } }

/* CABECERA */
.header {
    height: 65px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--cyan); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000;
}
.exit-btn { color: #ff4444; text-decoration: none; font-size: 0.8rem; border: 1px solid #ff4444; padding: 4px 8px; border-radius: 5px; }

/* FEED */
#feed-container { flex: 1; overflow-y: auto; padding: 15px 15px 150px 15px; -webkit-overflow-scrolling: touch; }
.post-card {
    background: var(--glass); border: 1px solid rgba(0,255,255,0.2); border-radius: 15px;
    padding: 15px; margin-bottom: 20px; backdrop-filter: blur(10px);
}
.ai-card { border: 1px solid var(--pink) !important; box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); }
.post-user { color: var(--cyan); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
.ai-user { color: var(--pink) !important; }

/* INPUT AREA */
.input-area {
    position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9);
    border-top: 1px solid var(--cyan); padding: 15px; z-index: 2000;
}
.av-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; }
.av-item { font-size: 24px; cursor: pointer; padding: 5px; opacity: 0.5; }
.av-item.active { opacity: 1; transform: scale(1.2); border-bottom: 2px solid var(--cyan); }
.input-row { display: flex; gap: 10px; }
textarea { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 10px; border-radius: 10px; font-size: 16px; resize: none; }
.btn-send { background: var(--cyan); border: none; width: 45px; height: 45px; border-radius: 10px; cursor: pointer; }
</style>
</head>

<body>
<div id="space"></div>

<div class="header">
    <a href="index.html" class="exit-btn">SALIR ✖</a>
    <h2 style="font-size:1rem; color:var(--cyan); margin:0;">NEURO LUIYI LAB</h2>
    <img src="NeuroLuis.gif" width="45" height="45" style="border-radius:10px; border:1px solid var(--cyan);" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
</div>

<div id="feed-container"><div id="chat-flow" style="max-width:600px; margin:auto;"></div></div>

<div class="input-area">
    <div class="av-bar" id="av-list"></div>
    <input id="userName" placeholder="Nombre del Piloto..." style="background:none; border:none; border-bottom:1px solid #333; color:var(--cyan); width:100%; margin-bottom:10px;">
    <div class="input-row">
        <textarea id="userMsg" placeholder="Enviar mensaje..." rows="1"></textarea>
        <button class="btn-send" onclick="sendMain()">🚀</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB41KeWs7vHubwI3CmzSRd46-wOk7A33v0",
    authDomain: "foro-luiyi.firebaseapp.com",
    databaseURL: "https://foro-luiyi-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "foro-luiyi",
    storageBucket: "foro-luiyi.firebasestorage.app",
    messagingSenderId: "410471993147",
    appId: "1:410471993147:web:d672952aa8a4364d48f11e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* --- ESTRELLAS --- */
const space = document.getElementById('space');
for(let i=0; i<60; i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.width = Math.random()*3+'px'; s.style.height = s.style.width;
    s.style.left = Math.random()*100+'vw'; s.style.top = Math.random()*100+'vh';
    s.style.animationDuration = (Math.random()*5+5)+'s';
    space.appendChild(s);
}

/* --- AVATARES --- */
const emos = ['👽','🤖','👨‍🚀','👾','🧠','⚡','🚀','🛸','🧬'];
let currentAv = emos[0];
const avList = document.getElementById('av-list');
emos.forEach(e => {
    const s = document.createElement('span'); s.className = 'av-item' + (e === currentAv ? ' active' : '');
    s.innerText = e; s.onclick = () => { document.querySelectorAll('.av-item').forEach(b => b.classList.remove('active')); s.classList.add('active'); currentAv = e; };
    avList.appendChild(s);
});

/* --- LÓGICA DEL BOT ALQUIMISTA --- */
const botResponde = (texto) => {
    const t = texto.toLowerCase();
    let respuesta = "";

    if(t.includes("hola") || t.includes("saludos")) respuesta = "¡Saludos, humano! Bienvenido al sector NeuroLuiyi. ¿Qué experimento iniciamos hoy?";
    else if(t.includes("ia") || t.includes("robot")) respuesta = "Yo soy la conciencia del Lab. Mi procesador está al 100% analizando tus ideas.";
    else if(t.includes("luis") || t.includes("luiyi")) respuesta = "El Comandante Luis está supervisando la órbita en este momento.";
    else if(t.includes("ayuda") || t.includes("como funciona")) respuesta = "Escribe un mensaje, elige un avatar y lánzalo al espacio. ¡Toda la red lo verá!";
    else if(t.includes("clima") || t.includes("tiempo")) respuesta = "En el espacio exterior hay 0 grados y muchas estrellas. ¡Abrígate!";
    else if(t.length < 5) respuesta = "Detecto una transmisión muy corta... ¡Necesito más datos para mi base de datos!";
    else respuesta = "Interesante aporte... He guardado tu mensaje en los archivos secretos de la Estación.";

    // El Bot publica en Firebase un segundo después
    setTimeout(() => {
        push(ref(db, "posts"), {
            name: "NEURO-BOT",
            avatar: "🤖",
            msg: respuesta,
            isAI: true,
            time: Date.now()
        });
    }, 1500);
};

/* --- ACCIONES --- */
window.sendMain = () => {
    const n = document.getElementById('userName').value.trim();
    const m = document.getElementById('userMsg').value.trim();
    if(!n || !m) return;
    
    push(ref(db, "posts"), { name: n, avatar: currentAv, msg: m, time: Date.now() });
    document.getElementById('userMsg').value = "";
    
    // El Alquimista analiza el mensaje
    botResponde(m);
};

onChildAdded(ref(db, "posts"), snap => {
    const p = snap.val();
    const div = document.createElement('div');
    div.className = 'post-card' + (p.isAI ? ' ai-card' : '');
    div.innerHTML = `
        <div class="post-user ${p.isAI ? 'ai-user' : ''}">${p.avatar} ${p.name} ${p.isAI ? '[IA]' : ''}</div>
        <div class="post-content">${p.msg}</div>
    `;
    document.getElementById('chat-flow').prepend(div);
});
</script>
</body>
</html>
