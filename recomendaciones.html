<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recommandations Électroniques - Lab Luis</title>
<meta name="description" content="Meilleurs composants électroniques pour projets DIY">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: url('fondo_inicio.JPG') no-repeat center center fixed;
    background-size: cover;
    color:#00ffcc;
    font-family: Arial, sans-serif;
    text-align:center;
    margin:0;
}

/* HEADER */
header {
    padding:20px;
    font-size:36px;
    font-weight:900;
    color:#00ffcc;
    text-shadow: 0 0 5px #00ffff, 0 0 10px #ff00ff;
    border-bottom:2px solid #00ffcc;
    background: rgba(0,0,0,0.5);
}

/* NAV */
nav {
    margin:20px 0;
}

nav a {
    color:#ff9900;
    margin:0 12px;
    text-decoration:none;
    font-weight:bold;
    font-size:18px;
    text-shadow: 0 0 5px #00ffff, 0 0 10px #ff00ff;
}

nav a:hover {
    color:#00ffff;
}

/* FORO BUTTON */
.forum-btn {
    position: fixed;
    right: 20px;
    top: 18px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    text-decoration:none;
    color:white;
    background: linear-gradient(45deg, #ff00ff, #00ffff, #ff9900);
    box-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffff;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    0% { filter: brightness(1); transform: scale(1); }
    100% { filter: brightness(1.4); transform: scale(1.08); }
}

/* WINDY FRAME */
.weather-box{
    width:90%;
    max-width:900px;
    height:380px;
    margin:20px auto;
    border:3px solid #00ffcc;
    border-radius:12px;
    overflow:hidden;
    box-shadow: 0 0 20px #00ffff;
}

/* CARDS */
.section {
    margin:40px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.card {
    width:280px;
    margin:15px;
    padding:20px;
    border:2px solid #00ffcc;
    border-radius:10px;
    background: rgba(0,0,0,0.5);
    text-align:left;
}

.card h3 { font-size:18px; }
.card p { color:white; }

.neon-btn {
    display:inline-block;
    margin:5px;
    padding:10px 20px;
    color:#00ffcc;
    border:2px solid #00ffcc;
    border-radius:10px;
    text-decoration:none;
}

.neon-btn:hover {
    color:#ff00ff;
    border-color:#ff00ff;
}

/* LANG */
.lang-box{
    position:fixed;
    top:10px;
    left:10px;
    display:flex;
    gap:8px;
}

.lang-btn{
    padding:10px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    border:2px solid;
    background:rgba(0,0,0,0.4);
}

.es{ color:#00ffcc; border-color:#00ffcc; }
.fr{ color:#ff00ff; border-color:#ff00ff; }

</style>
</head>

<body>

<!-- LANG -->
<div class="lang-box">
    <a href="#" class="lang-btn es">ES</a>
    <a href="#" class="lang-btn fr">FR</a>
</div>

<!-- FORO -->
<a class="forum-btn" href="foro.html">FORO</a>

<header>⚡ Recommandations Électroniques - Lab Luis</header>

<nav>
<a href="#">Accueil</a> |
<a href="#">Images</a> |
<a href="#">Projets</a> |
<a href="#">Expériences</a> |
<a href="#">Livres KDP</a> |
<a href="#">Profil</a>
</nav>

<!-- WINDY -->
<div class="weather-box">
<iframe width="100%" height="100%" frameborder="0"
src="https://embed.windy.com/embed2.html?lat=43.3&lon=5.4&zoom=6&level=surface&overlay=rain&product=ecmwf&type=map">
</iframe>
</div>

<!-- PRODUCTOS (NO MODIFICADOS) -->
<div class="section">

<!-- (tus 6 cards intactos aquí, sin cambios) -->

</div>

</body>
</html>
