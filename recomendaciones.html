<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Luis</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:url("fondo_inicio.JPG") no-repeat center center fixed;
background-size:cover;
color:#00ffcc;
text-align:center;
}

/* TOP BAR */
.topbar{
position:fixed;
top:10px;
left:10px;
z-index:999;
}

.topbar button{
background:#000;
border:2px solid #00ffcc;
color:#00ffcc;
padding:6px 10px;
cursor:pointer;
margin-right:5px;
}

/* HEADER */
h1{
margin-top:80px;
font-size:34px;
}

/* WINDY */
.windy{
width:92%;
max-width:900px;
height:320px;
margin:20px auto;
border:2px solid #00ffcc;
border-radius:10px;
overflow:hidden;
}

/* CARD GRID (NEUTRAL, SIN TEXTO FIJO) */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.card{
width:260px;
background:rgba(0,0,0,0.65);
border:2px solid #00ffcc;
padding:12px;
text-align:left;
}

.card h3{
margin:0 0 8px 0;
}

.card p{
font-size:13px;
color:#ffffff;
}

.card a{
display:block;
margin-top:10px;
padding:8px;
text-align:center;
border:2px solid #00ffcc;
color:#00ffcc;
text-decoration:none;
}
</style>
</head>

<body>

<!-- 🔘 IDIOMA -->
<div class="topbar">
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('es')">ES</button>
</div>

<!-- 🧭 TITRE -->
<h1 data-fr="Lab Luis - Recommandations"
    data-es="Lab Luis - Recomendaciones">
Lab Luis - Recommandations
</h1>

<!-- 🌍 WINDY MARSEILLE -->
<div class="windy">
<iframe width="100%" height="100%"
src="https://embed.windy.com/embed2.html?lat=43.2965&lon=5.3698&zoom=7&level=surface&overlay=wind&product=ecmwf&menu=&message=true">
</iframe>
</div>

<!-- 📦 GRID (SIN PALABRAS FIJAS DE CATEGORÍA) -->
<div class="grid">

<div class="card">
<h3 data-fr="Module électronique"
    data-es="Módulo electrónico">Module électronique</h3>
<p data-fr="Composant pour systèmes embarqués"
   data-es="Componente para sistemas embebidos">
Composant pour systèmes embarqués
</p>
<a href="https://s.click.aliexpress.com/e/_c4NGyYMr" target="_blank">OPEN</a>
</div>

<div class="card">
<h3 data-fr="Capteur intelligent"
    data-es="Sensor inteligente">Capteur intelligent</h3>
<p data-fr="Détection et analyse de signaux"
   data-es="Detección y análisis de señales">
Détection et analyse de signaux
</p>
<a href="https://s.click.aliexpress.com/e/_c2JdxMsJ" target="_blank">OPEN</a>
</div>

<div class="card">
<h3 data-fr="Système embarqué"
    data-es="Sistema embebido">Système embarqué</h3>
<p data-fr="Architecture pour automatisation"
   data-es="Arquitectura para automatización">
Architecture pour automatisation
</p>
<a href="https://s.click.aliexpress.com/e/_c3ABcd12" target="_blank">OPEN</a>
</div>

</div>

<script>
let lang="fr";

function setLang(l){
lang=l;
document.querySelectorAll("[data-fr]").forEach(el=>{
el.innerText = el.getAttribute("data-"+lang);
});
}
</script>

</body>
</html>
