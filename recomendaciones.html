<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recommandations - Lab Luis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:url('fondo_inicio.JPG') no-repeat center center fixed;
background-size:cover;
color:#00ffcc;
}

/* LANG */
.lang-box{
position:fixed;
top:10px;
left:10px;
display:flex;
gap:10px;
z-index:9999;
}
.lang-box button{
padding:10px;
border:2px solid;
background:rgba(0,0,0,0.6);
cursor:pointer;
font-weight:bold;
border-radius:8px;
}
.es{color:#00ffcc;border-color:#00ffcc;}
.fr{color:#ff00ff;border-color:#ff00ff;}

/* HEADER */
header{
padding:20px;
font-size:32px;
font-weight:bold;
text-shadow:0 0 10px #00ffff;
background:rgba(0,0,0,0.4);
}

/* NAV */
nav{
margin:10px;
}
nav a{
color:#ffcc00;
margin:0 8px;
text-decoration:none;
font-weight:bold;
}

/* FORO */
.foro{
display:inline-block;
margin-left:15px;
padding:8px 16px;
border-radius:40px;
border:2px solid #ff00ff;
color:#ff00ff;
box-shadow:0 0 15px #ff00ff;
font-weight:bold;
}

/* WINDY */
.windy-box{
width:90%;
max-width:900px;
height:380px;
margin:20px auto;
border:2px solid #00ffcc;
box-shadow:0 0 20px #00ffcc;
border-radius:12px;
overflow:hidden;
}

/* CARDS */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}
.card{
width:260px;
padding:15px;
margin:10px;
border:2px solid #00ffcc;
background:rgba(0,0,0,0.5);
border-radius:10px;
}
.link{
display:inline-block;
padding:8px 12px;
border:2px solid #00ffcc;
color:#00ffcc;
text-decoration:none;
}
</style>
</head>

<body>

<!-- LANG -->
<div class="lang-box">
<button class="es" onclick="setLang('es')">ES</button>
<button class="fr" onclick="setLang('fr')">FR</button>
</div>

<header id="title">Recommandations - Lab Luis</header>

<nav>
<a href="#" data-es="Inicio" data-fr="Accueil">Accueil</a>
<a href="#" data-es="Imágenes" data-fr="Images">Images</a>
<a href="#" data-es="Proyectos" data-fr="Projets">Projets</a>
<a href="#" data-es="Experimentos" data-fr="Expériences">Expériences</a>
<a href="#" data-es="Libros KDP" data-fr="Livres KDP">Livres KDP</a>
<a href="#" data-es="Perfil" data-fr="Profil">Profil</a>

<span class="foro">FORUM</span>
</nav>

<!-- WINDY -->
<div class="windy-box">
<iframe width="100%" height="100%"
src="https://embed.windy.com/embed2.html?lat=43.3&lon=5.4&zoom=6&level=surface&overlay=rain"></iframe>
</div>

<h2 id="section">Recommandations</h2>

<div class="cards">

<div class="card">
<h3>ESP32 WROOM</h3>
<p>3.59€</p>
<a class="link" href="https://s.click.aliexpress.com/e/_c4NGyYMr">Accéder</a>
</div>

<div class="card">
<h3>ESP32-C3 MINI</h3>
<p>2.34€</p>
<a class="link" href="https://s.click.aliexpress.com/e/_c2JdxMsJ">Accéder</a>
</div>

<div class="card">
<h3>Raspberry Pi Pico</h3>
<p>2.36€</p>
<a class="link" href="https://s.click.aliexpress.com/e/_c3QA7Bd5">Accéder</a>
</div>

<div class="card">
<h3>Arduino UNO</h3>
<p>3.19€</p>
<a class="link" href="https://s.click.aliexpress.com/e/_c4K0vLPD">Accéder</a>
</div>

<div class="card">
<h3>ESP32 32D</h3>
<p>4.49€</p>
<a class="link" href="https://s.click.aliexpress.com/e/_c32U4Ord">Accéder</a>
</div>

<div class="card">
<h3>OLED 0.96</h3>
<p>1.84€</p>
<a class="link" href="https://s.click.aliexpress.com/e/_c3WUPDQR">Accéder</a>
</div>

</div>

<script>
const dict = {
es:{
title:"Recomendaciones - Lab Luis",
section:"Recomendaciones"
},
fr:{
title:"Recommandations - Lab Luis",
section:"Recommandations"
}
};

function setLang(l){
document.documentElement.lang = l;
document.getElementById("title").innerText = dict[l].title;
document.getElementById("section").innerText = dict[l].section;

document.querySelectorAll("nav a").forEach(a=>{
a.innerText = a.dataset[l];
});
}
</script>

</body>
</html>
