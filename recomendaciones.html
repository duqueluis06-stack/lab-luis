<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lab Luis - Recommandations</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#00ffcc;
}

header{
padding:16px;
font-size:28px;
text-align:center;
border-bottom:2px solid #00ffcc;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
border-bottom:1px solid #00ffcc;
}

.lang button{
background:black;
color:#00ffcc;
border:1px solid #00ffcc;
padding:6px 10px;
cursor:pointer;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:10px;
}

nav button{
background:black;
color:#ffcc00;
border:1px solid #ffcc00;
padding:6px 10px;
cursor:pointer;
}

.section{
display:none;
padding:20px;
text-align:center;
}

.active{
display:block;
}

/* WINDY */
#windyBox{
width:95%;
margin:20px auto;
}

iframe{
width:100%;
height:400px;
border:2px solid #00ffcc;
border-radius:10px;
}

/* CARDS */
.card{
display:inline-block;
margin:10px;
padding:15px;
border:1px solid #00ffcc;
width:250px;
}
a{
color:#00ffcc;
display:inline-block;
margin-top:10px;
}
</style>
</head>

<body>

<header>⚡ Recommandations Lab Luis</header>

<div class="topbar">
<div class="lang">
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('es')">ES</button>
</div>
<div id="status">MARSEILLE LIVE 📡</div>
</div>

<nav>
<button onclick="show('home')">Inicio</button>
<button onclick="show('images')">Imágenes</button>
<button onclick="show('projects')">Proyectos</button>
<button onclick="show('experiments')">Experimentos</button>
<button onclick="show('kdp')">KDP</button>
<button onclick="show('profile')">Perfil</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
<div id="windyBox">
<iframe src="https://embed.windy.com/embed2.html?lat=43.2965&lon=5.3698&zoom=8&overlay=wind"></iframe>
</div>

<div class="card">
<h3>ESP32</h3>
<a href="https://aliexpress.com" target="_blank">AliExpress</a>
</div>
</div>

<!-- IMAGES -->
<div id="images" class="section">
<h2>Images</h2>
</div>

<!-- PROJECTS -->
<div id="projects" class="section">
<h2>Projets</h2>
</div>

<!-- EXP -->
<div id="experiments" class="section">
<h2>Expériences</h2>
</div>

<!-- KDP -->
<div id="kdp" class="section">
<h2>Livres KDP</h2>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
<h2>Profil</h2>
</div>

<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function setLang(lang){
document.body.setAttribute("data-lang", lang);
}
</script>

</body>
</html>
