<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recommandations - Lab Luis</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#00ffcc;
text-align:center;
}

/* LANG SWITCH */
.lang{
position:fixed;
top:10px;
left:10px;
display:flex;
gap:10px;
z-index:9999;
}
.lang button{
padding:10px 14px;
border:2px solid #00ffcc;
background:rgba(0,0,0,0.6);
color:#00ffcc;
cursor:pointer;
border-radius:8px;
font-weight:bold;
}

/* HEADER */
header{
padding:20px;
font-size:28px;
text-shadow:0 0 10px #00ffff;
}

/* NAV */
nav{
margin:10px;
}
nav a{
margin:0 8px;
color:#ffcc00;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

/* FORUM */
#forum{
display:inline-block;
margin-left:15px;
padding:10px 18px;
border-radius:30px;
border:2px solid #ff00ff;
color:#ff00ff;
cursor:pointer;
box-shadow:0 0 15px #ff00ff;
font-weight:bold;
}

/* WINDY */
.windy{
width:92%;
max-width:900px;
height:380px;
margin:20px auto;
border:2px solid #00ffcc;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 20px #00ffcc;
}

/* PRODUCTS */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
}
.card{
width:260px;
padding:15px;
background:rgba(0,0,0,0.6);
border:2px solid #00ffcc;
border-radius:10px;
}
.card a{
display:inline-block;
margin-top:10px;
padding:8px 12px;
border:2px solid #00ffcc;
color:#00ffcc;
text-decoration:none;
}
</style>
</head>

<body>

<!-- LANG -->
<div class="lang">
<button onclick="setLang('es')">ES</button>
<button onclick="setLang('fr')">FR</button>
</div>

<header id="title">Recommandations - Lab Luis</header>

<nav>
<a data-es="Inicio" data-fr="Accueil">Accueil</a>
<a data-es="Imágenes" data-fr="Images">Images</a>
<a data-es="Proyectos" data-fr="Projets">Projets</a>
<a data-es="Experimentos" data-fr="Expériences">Expériences</a>
<a data-es="Libros KDP" data-fr="Livres KDP">Livres KDP</a>
<a data-es="Perfil" data-fr="Profil">Profil</a>

<span id="forum">FORUM</span>
</nav>

<!-- WINDY -->
<div class="windy">
<iframe width="100%" height="100%"
src="https://embed.windy.com/embed2.html?lat=43.3&lon=5.4&zoom=6&level=surface&overlay=rain"></iframe>
</div>

<h2 id="section">Recommandations</h2>

<!-- PRODUCTS -->
<div class="cards">

<div class="card">
<h3>ESP32 WROOM</h3>
<p>3.59€</p>
<a href="https://s.click.aliexpress.com/e/_c4NGyYMr" target="_blank">Accéder</a>
</div>

<div class="card">
<h3>ESP32-C3 MINI</h3>
<p>2.34€</p>
<a href="https://s.click.aliexpress.com/e/_c2JdxMsJ" target="_blank">Accéder</a>
</div>

<div class="card">
<h3>Raspberry Pi Pico</h3>
<p>2.36€</p>
<a href="https://s.click.aliexpress.com/e/_c3QA7Bd5" target="_blank">Accéder</a>
</div>

<div class="card">
<h3>Arduino UNO</h3>
<p>3.19€</p>
<a href="https://s.click.aliexpress.com/e/_c4K0vLPD" target="_blank">Accéder</a>
</div>

<div class="card">
<h3>ESP32 32D</h3>
<p>4.49€</p>
<a href="https://s.click.aliexpress.com/e/_c32U4Ord" target="_blank">Accéder</a>
</div>

<div class="card">
<h3>OLED 0.96</h3>
<p>1.84€</p>
<a href="https://s.click.aliexpress.com/e/_c3WUPDQR" target="_blank">Accéder</a>
</div>

</div>

<script>
const title = document.getElementById("title");
const section = document.getElementById("section");
const forum = document.getElementById("forum");
const links = document.querySelectorAll("nav a");

function setLang(lang){

document.documentElement.lang = lang;

title.textContent = (lang === "es")
? "Recomendaciones - Lab Luis"
: "Recommandations - Lab Luis";

section.textContent = (lang === "es")
? "Recomendaciones"
: "Recommandations";

links.forEach(a=>{
a.textContent = a.dataset[lang];
});

}

// FORUM ACTION
forum.addEventListener("click", ()=>{
window.open("https://example.com", "_blank");
});

// NAV CLICK FEEDBACK
links.forEach(a=>{
a.addEventListener("click", ()=>{
console.log("Sección:", a.textContent);
});
});
</script>

</body>
</html>
