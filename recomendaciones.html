<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Luis</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#00ffcc;
text-align:center;
}

/* fondo seguro (sin imagen externa para evitar fallo) */
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(135deg,#001a1a,#000000);
z-index:-1;
}

.lang{
position:fixed;
top:10px;
left:10px;
display:flex;
gap:10px;
}

.lang button{
padding:10px;
border:2px solid #00ffcc;
background:transparent;
color:#00ffcc;
cursor:pointer;
}

nav a{
margin:0 8px;
color:#ffcc00;
cursor:pointer;
text-decoration:none;
}

#forum{
display:inline-block;
margin-left:15px;
padding:10px;
border:2px solid #ff00ff;
color:#ff00ff;
cursor:pointer;
}

.windy{
width:90%;
height:350px;
margin:20px auto;
border:2px solid #00ffcc;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.card{
width:240px;
border:1px solid #00ffcc;
padding:10px;
}
</style>
</head>

<body>

<div class="lang">
<button onclick="setLang('es')">ES</button>
<button onclick="setLang('fr')">FR</button>
</div>

<h1 id="title">Recommandations - Lab Luis</h1>

<nav>
<a data-es="Inicio" data-fr="Accueil">Accueil</a>
<a data-es="Proyectos" data-fr="Projets">Projets</a>
<a data-es="Libros" data-fr="Livres">Livres</a>
<a data-es="Perfil" data-fr="Profil">Profil</a>

<span id="forum">FORUM</span>
</nav>

<div class="windy">
<iframe width="100%" height="100%"
src="https://embed.windy.com/embed2.html?lat=43.3&lon=5.4&zoom=6"></iframe>
</div>

<h2 id="section">Recommandations</h2>

<div class="cards">
<div class="card">
ESP32<br>3.5€<br>
<a href="https://s.click.aliexpress.com/" target="_blank">Link</a>
</div>
</div>

<script>
function setLang(lang){
document.documentElement.lang = lang;

document.getElementById("title").textContent =
lang === "es" ? "Recomendaciones - Lab Luis" : "Recommandations - Lab Luis";

document.getElementById("section").textContent =
lang === "es" ? "Recomendaciones" : "Recommandations";

document.querySelectorAll("nav a").forEach(a=>{
a.textContent = a.dataset[lang];
});
}

// FORO FIJO (SIN FALLAR)
document.getElementById("forum").addEventListener("click", ()=>{
window.location.href = "#forum";
});

// NAV CLICK DEBUG (VISIBLE)
document.querySelectorAll("nav a").forEach(a=>{
a.addEventListener("click", ()=>{
console.log("CLICK:", a.textContent);
});
});
</script>

</body>
</html>
