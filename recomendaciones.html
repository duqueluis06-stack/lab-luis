<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lab Luis - Control Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url('fondo_inicio.JPG') no-repeat center center fixed;
    background-size:cover;
    color:#00ff88;
}

/* 🌫️ overlay */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
    z-index:-1;
}

/* 🧭 HEADER */
header{
    text-align:center;
    padding:20px;
    font-size:34px;
    font-weight:bold;
    text-shadow:0 0 10px #00ff88, 0 0 20px #00ffff;
}

/* 🌐 NAV */
nav{
    text-align:center;
    margin:15px;
}

nav a{
    margin:8px;
    color:#00ff88;
    text-decoration:none;
    padding:8px 12px;
    border:1px solid #00ff88;
    border-radius:8px;
    box-shadow:0 0 8px #00ff88;
    transition:0.3s;
}

nav a:hover{
    background:#00ff88;
    color:#000;
}

/* 🌍 MAPA */
.europa{
    width:260px;
    position:fixed;
    left:20px;
    top:120px;
    filter:drop-shadow(0 0 10px #00ff88);
}

/* ⏱️ PANEL */
.panel{
    position:fixed;
    top:10px;
    right:10px;
    background:rgba(0,0,0,0.4);
    border:1px solid #00ff88;
    padding:10px;
    border-radius:10px;
    backdrop-filter:blur(6px);
}

/* 🌡️ ATMOS */
.atm{
    position:fixed;
    bottom:10px;
    right:10px;
    background:rgba(0,0,0,0.4);
    border:1px solid #00ff88;
    padding:10px;
    border-radius:10px;
}

/* 🟢 BOTONES */
.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 14px;
    border:1px solid #00ff88;
    color:#00ff88;
    text-decoration:none;
    border-radius:8px;
    box-shadow:0 0 10px #00ff88;
    transition:0.3s;
}

.btn:hover{
    background:#00ff88;
    color:#000;
    transform:scale(1.05);
}

/* 🧪 CARD */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-top:80px;
}

.card{
    width:260px;
    background:rgba(0,0,0,0.5);
    border:1px solid #00ff88;
    border-radius:10px;
    padding:15px;
    box-shadow:0 0 10px rgba(0,255,136,0.3);
}
</style>
</head>

<body>

<header>
⚡ LAB LUIS CONTROL CENTER
</header>

<nav>
<a href="index.html" data-es="Inicio" data-fr="Accueil">Inicio</a>
<a href="proyectos.html" data-es="Proyectos" data-fr="Projets">Proyectos</a>
<a href="libros.html" data-es="Libros" data-fr="Livres">Libros</a>
<a href="sobre-mi.html" data-es="Perfil" data-fr="Profil">Perfil</a>
</nav>

<!-- 🌍 MAPA EUROPA -->
<svg class="europa" viewBox="0 0 300 200">
    <circle cx="150" cy="100" r="80" stroke="#00ff88" fill="none"/>
    <circle cx="150" cy="100" r="50" stroke="#00ff88" fill="none"/>
    <circle cx="150" cy="100" r="20" stroke="#00ff88" fill="none"/>

    <!-- Francia -->
    <polygon points="150,80 165,95 155,115 140,105" fill="#00ff88"/>

    <!-- España -->
    <polygon points="120,120 140,135 130,155 110,140" fill="#00ffaa"/>

    <!-- Bélgica -->
    <circle cx="160" cy="75" r="5" fill="#00ffff"/>
</svg>

<!-- ⏱️ PANEL -->
<div class="panel">
<div id="hora"></div>
<div id="gmt"></div>
<div>📡 SAT LINK ACTIVE</div>
</div>

<!-- 🌡️ ATM -->
<div class="atm">
<div>🌡️ Temp: <span id="temp">--</span>°C</div>
<div>🌬️ CO₂: <span id="co2">--</span> ppm</div>
<div>🧭 Presión: <span id="press">--</span> hPa</div>
</div>

<!-- 🧪 CARDS -->
<div class="container">

<div class="card">
<h3 data-es="ESP32 IoT Module" data-fr="Module ESP32 IoT">ESP32</h3>
<p data-es="Placa WiFi + Bluetooth para automatización"
   data-fr="Carte WiFi + Bluetooth pour automatisation"></p>
<a class="btn" href="#">LINK</a>
</div>

<div class="card">
<h3 data-es="Raspberry Pi Pico W" data-fr="Raspberry Pi Pico W">Pico W</h3>
<p data-es="Microcontrolador con WiFi integrado"
   data-fr="Microcontrôleur avec WiFi intégré"></p>
<a class="btn" href="#">LINK</a>
</div>

</div>

<script>

/* ⏱️ reloj */
setInterval(()=>{
    const now = new Date();
    document.getElementById("hora").innerText =
        "Marseille: " + now.toLocaleTimeString();

    document.getElementById("gmt").innerText =
        "GMT: " + now.toUTCString().split(" ")[4];
},1000);

/* 🌡️ simulación atmósfera */
setInterval(()=>{
    document.getElementById("temp").innerText = (18 + Math.random()*5).toFixed(1);
    document.getElementById("co2").innerText = (420 + Math.random()*25).toFixed(0);
    document.getElementById("press").innerText = (1012 + Math.random()*6).toFixed(0);
},2000);

/* 🌍 idioma */
function setLang(lang){
    localStorage.setItem("lang", lang);

    document.querySelectorAll("[data-es]").forEach(el=>{
        el.innerText = el.dataset[lang];
    });
}

window.onload = () => {
    setLang(localStorage.getItem("lang") || "es");
};

</script>

</body>
</html>
