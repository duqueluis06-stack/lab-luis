<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recommandations Lab Luis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#000;
color:#00ffcc;
font-family:Arial;
text-align:center;
margin:0;
}

/* BOTONES */
.lang-box{
position:fixed;
top:10px;
left:10px;
z-index:999;
}

.lang-btn{
background:#111;
border:2px solid #00ffcc;
color:#00ffcc;
padding:6px 10px;
cursor:pointer;
}

/* HEADER FIJO */
header{
padding:20px;
font-size:32px;
border-bottom:2px solid #00ffcc;
}

/* CARDS */
.card{
display:inline-block;
width:260px;
margin:10px;
padding:15px;
border:2px solid #00ffcc;
background:#111;
text-align:left;
}

.card p{
font-size:14px;
color:#fff;
}

a.btn{
display:block;
margin-top:10px;
padding:10px;
border:2px solid #00ffcc;
color:#00ffcc;
text-decoration:none;
}

a.btn:hover{
border-color:#ff00ff;
}
</style>
</head>

<body>

<!-- 🌍 BOTONES -->
<div class="lang-box">
<button class="lang-btn" onclick="setLang('fr')">FR</button>
<button class="lang-btn" onclick="setLang('es')">ES</button>
</div>

<!-- HEADER FIJO (NO TRADUCIBLE) -->
<header>
Recommandations Lab Luis
</header>

<h2 data-fr="Produits électroniques" data-es="Productos electrónicos">
Produits électroniques
</h2>

<!-- WINDY SIMPLE -->
<iframe width="90%" height="300"
src="https://embed.windy.com/embed2.html?lat=43.2965&lon=5.3698&zoom=7">
</iframe>

<!-- CARDS -->
<div class="card">
<h3 data-fr="ESP32 WROOM-32" data-es="ESP32 WROOM-32">ESP32 WROOM-32</h3>
<p data-fr="Microcontrôleur WiFi et Bluetooth pour IoT"
   data-es="Microcontrolador WiFi y Bluetooth para IoT">
Microcontrôleur WiFi et Bluetooth pour IoT
</p>
<a class="btn" href="https://s.click.aliexpress.com/e/_c4NGyYMr" target="_blank">LINK</a>
</div>

<div class="card">
<h3 data-fr="ESP32-C3 Mini" data-es="ESP32-C3 Mini">ESP32-C3 Mini</h3>
<p data-fr="Version basse consommation"
   data-es="Versión de bajo consumo">
Version basse consommation
</p>
<a class="btn" href="https://s.click.aliexpress.com/e/_c2JdxMsJ" target="_blank">LINK</a>
</div>

<div class="card">
<h3 data-fr="Raspberry Pi Pico" data-es="Raspberry Pi Pico">Raspberry Pi Pico</h3>
<p data-fr="Microcontrôleur double cœur"
   data-es="Microcontrolador de doble núcleo">
Microcontrôleur double cœur
</p>
<a class="btn" href="https://s.click.aliexpress.com/e/_c3QA7Bd5" target="_blank">LINK</a>
</div>

<script>
function setLang(lang){
document.querySelectorAll("[data-fr]").forEach(el=>{
el.innerText = el.getAttribute("data-"+lang);
});
}
</script>

</body>
</html>
