<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Luis Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f14;
  color:#00ffcc;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#111827;
  border-bottom:1px solid #00ffcc;
}

.lang button{
  margin-left:8px;
  padding:6px 10px;
  border:1px solid #00ffcc;
  background:transparent;
  color:#00ffcc;
  cursor:pointer;
}

/* LAYOUT GENERAL */
.wrapper{
  display:grid;
  grid-template-columns: 220px 1fr;
  gap:20px;
  padding:20px;
}

/* MAPA */
.map{
  background:#111827;
  border:1px solid #00ffcc;
  padding:10px;
  height:260px;
}

/* GRID PRODUCTOS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#111827;
  border:1px solid #00ffcc;
  padding:12px;
}

.card p{
  color:#ccc;
  font-size:13px;
}

.card a{
  display:inline-block;
  margin-top:10px;
  padding:6px 10px;
  border:1px solid #00ffcc;
  color:#00ffcc;
  text-decoration:none;
}

/* PANEL */
.panel{
  position:fixed;
  bottom:10px;
  right:10px;
  background:#111827;
  border:1px solid #00ffcc;
  padding:10px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>⚡ Lab Luis</div>
  <div class="lang">
    <button onclick="setLang('es')">ES</button>
    <button onclick="setLang('fr')">FR</button>
  </div>
</div>

<div class="wrapper">

<!-- MAPA -->
<div class="map">
<svg viewBox="0 0 300 200" width="100%" height="100%">

<!-- CONTINENTE SIMPLIFICADO EUROPA -->
<path d="M20,120 L60,60 L120,50 L160,80 L140,140 L80,160 Z"
fill="none" stroke="#00ffcc" stroke-width="2"/>

<!-- FRANCIA -->
<circle cx="110" cy="110" r="8" fill="#00ffcc"/>

<!-- BÉLGICA -->
<circle cx="115" cy="90" r="6" fill="#00ffff"/>

<!-- ESPAÑA -->
<circle cx="95" cy="140" r="7" fill="#00ffaa"/>

</svg>
</div>

<!-- PRODUCTOS -->
<div class="products">

<div class="card">
<h3 data-es="ESP32 WiFi" data-fr="ESP32 WiFi">ESP32 WiFi</h3>
<p data-es="Módulo IoT de bajo consumo"
   data-fr="Module IoT basse consommation">Módulo IoT de bajo consumo</p>
<a target="_blank" href="https://s.click.aliexpress.com/e/_EX1">Ver</a>
</div>

<div class="card">
<h3 data-es="ESP32-C3" data-fr="ESP32-C3">ESP32-C3</h3>
<p data-es="Compacto BLE + WiFi"
   data-fr="Compact BLE + WiFi">Compacto BLE + WiFi</p>
<a target="_blank" href="https://s.click.aliexpress.com/e/_EX2">Ver</a>
</div>

<div class="card">
<h3>Raspberry Pi Pico</h3>
<p data-es="Microcontrolador eficiente"
   data-fr="Microcontrôleur efficace">Microcontrolador eficiente</p>
<a target="_blank" href="https://s.click.aliexpress.com/e/_EX3">Ver</a>
</div>

<div class="card">
<h3>Arduino UNO</h3>
<p data-es="Plataforma clásica"
   data-fr="Plateforme classique">Plataforma clásica</p>
<a target="_blank" href="https://s.click.aliexpress.com/e/_EX4">Ver</a>
</div>

<div class="card">
<h3>ESP32 DevKit</h3>
<p data-es="Alta potencia IoT"
   data-fr="Haute puissance IoT">Alta potencia IoT</p>
<a target="_blank" href="https://s.click.aliexpress.com/e/_EX5">Ver</a>
</div>

<div class="card">
<h3>OLED 0.96</h3>
<p data-es="Pantalla I2C compacta"
   data-fr="Écran I2C compact">Pantalla I2C compacta</p>
<a target="_blank" href="https://s.click.aliexpress.com/e/_EX6">Ver</a>
</div>

</div>
</div>

<!-- PANEL -->
<div class="panel">
<div id="time"></div>
<div>CO2 420 ppm</div>
<div>Marseille</div>
</div>

<script>
function setLang(lang){
  document.querySelectorAll("[data-es]").forEach(el=>{
    el.innerText = el.getAttribute("data-"+lang);
  });
}

setInterval(()=>{
  document.getElementById("time").innerText =
  new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
