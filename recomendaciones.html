<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recommandations Lab Luis</title>

<style>

/* ===== BODY ===== */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url('fondo_inicio.JPG') no-repeat center center fixed;
    background-size:cover;
    color:#fff;
}

body::before{
    content:"";
    position:fixed;
    width:100%;height:100%;
    background:rgba(0,0,0,0.25);
    z-index:-1;
}

/* ===== MAPA NEON ===== */
.mapa{
    position:fixed;
    top:120px;
    left:20px;
    width:220px;
    opacity:0.9;
    z-index:0;
    filter:
        drop-shadow(0 0 6px #00ff88)
        drop-shadow(0 0 15px #00ff88)
        drop-shadow(0 0 25px #00ff88);
}

/* ===== PANEL MARSella ===== */
.panel{
    position:fixed;
    top:10px;
    right:10px;
    text-align:right;
    padding:10px 14px;
    border-radius:10px;
    background:rgba(0,0,0,0.55);

    box-shadow:
        0 0 10px #00ffff,
        0 0 25px #00ffff;
}

.panel span{
    display:block;
    font-size:13px;
    color:#00ffff;
}

/* ===== LANG ===== */
.lang{
    position:fixed;
    top:10px;
    right:180px;
}

.lang a{
    padding:6px 10px;
    border:1px solid #00ffff;
    border-radius:6px;
    margin-left:5px;
    cursor:pointer;
    color:#00ffff;

    box-shadow:0 0 5px #00ffff;
}

/* ===== HEADER ===== */
header{
    text-align:center;
    padding:20px;
    font-size:34px;
    font-weight:bold;
    text-shadow:0 0 10px #00ffff,0 0 20px #ff00ff;
}

/* ===== NAV ===== */
nav{
    text-align:center;
    margin:20px 0;
}

nav a{
    display:inline-block;
    margin:6px;
    padding:12px 18px;
    border-radius:8px;
    color:#00ffff;
    text-decoration:none;
    font-weight:bold;

    border:1px solid #00ffff;

    box-shadow:
        0 0 5px #00ffff,
        0 0 10px #00ffff;

    transition:0.3s;
}

nav a:hover{
    background:linear-gradient(90deg,#ff00ff,#00ffff);
    color:#000;
}

/* ===== TITULO ===== */
.section-title{
    display:block;
    text-align:center;
    margin:60px auto;
    padding:15px 25px;
    font-size:22px;

    background:rgba(0,0,0,0.6);
    border-radius:10px;

    box-shadow:
        0 0 10px #00ffff,
        inset 0 0 10px rgba(255,255,255,0.1);
}

/* ===== CARDS ===== */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding-bottom:60px;
}

.card{
    width:270px;
    padding:18px;
    border-radius:12px;

    background:rgba(0,0,0,0.6);

    border:1px solid rgba(0,255,204,0.3);

    box-shadow:0 0 10px rgba(0,255,255,0.3);
}

.card h3{
    color:#00ffcc;
}

.card p{
    font-size:14px;
}

/* ===== BOTON ===== */
.btn{
    display:block;
    margin-top:12px;
    padding:10px;
    text-align:center;

    border-radius:8px;

    color:#00ffff;
    text-decoration:none;

    border:1px solid #00ffff;

    box-shadow:
        0 0 6px #00ffff,
        0 0 12px #00ffff;

    transition:0.3s;
}

.btn:hover{
    background:linear-gradient(90deg,#ff00ff,#00ffff);
    color:#000;
}

</style>
</head>

<body>

<script>
setInterval(()=>{
const now=new Date();
