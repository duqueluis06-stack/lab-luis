<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recommandations Bluey - Lab Luis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: url('fondo_inicio.JPG') no-repeat center center fixed;
    background-size: cover;
    color:#00ffcc;
    text-align:center;
}

/* HEADER */
header {
    padding:18px;
    font-size:32px;
    font-weight:bold;
    background: rgba(0,0,0,0.6);
    border-bottom:2px solid #00ffcc;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff;
}

/* TOPBAR FIX (CRÍTICO) */
.topbar {
    position: relative;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
    background: rgba(0,0,0,0.55);
    border-bottom:1px solid #00ffcc;
    z-index: 10;
}

/* CLOCK */
.clock {
    font-size:14px;
    color:#ffffff;
    z-index: 11;
}

/* LANGUAGE BUTTONS */
.lang {
    display:flex;
    gap:8px;
    z-index: 20;
}

.lang button {
    background:none;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:6px 10px;
    cursor:pointer;
    border-radius:6px;
}
.lang button:hover {
    color:#ff00ff;
    border-color:#ff00ff;
}

/* ICON FIXED (NO INTERFIERE) */
.right-icon {
    position:fixed;
    right:10px;
    top:160px;
    font-size:18px;
    color:#00ffff;
    z-index:1;
    pointer-events:none;
}

/* NAV */
nav {
    margin:15px;
    position:relative;
    z-index:5;
}
nav a {
    color:#ffcc00;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
}

/* CARDS */
.section {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin:25px;
}

.card {
    width:280px;
    background: rgba(0,0,0,0.6);
    border:2px solid #00ffcc;
    border-radius:10px;
    padding:15px;
}

/* BUTTON */
.btn {
    display:inline-block;
    margin-top:10px;
    padding:8px 12px;
    border:1px solid #00ffcc;
    color:#00ffcc;
    border-radius:8px;
    text-decoration:none;
}
.btn:hover {
    color:#ff00ff;
    border-color:#ff00ff;
}

/* WINDY */
#windy {
    width:90%;
    height:500px;
    margin:20px auto;
    border:2px solid #00ffcc;
    border-radius:12px;
}
</style>
</head>

<body>

<header>⚡ Recommandations Bluey</header>

<div class="topbar">
    <div class="clock" id="clock">--:--:-- Marseille</div>

    <div class="lang">
        <button onclick="setLang('fr')">FR</button>
        <button onclick="setLang('es')">ES</button>
    </div>
</div>

<nav>
<a href="#" data-fr="Accueil" data-es="Inicio">Accueil</a> |
<a href="#" data-fr="Images" data-es="Imágenes">Images</a> |
<a href="#" data-fr="Projets" data-es="Proyectos">Projets</a> |
<a href="#" data-fr="Expériences" data-es="Experimentos">Expériences</a> |
<a href="#" data-fr="Livres KDP" data-es="Libros KDP">Livres KDP</a> |
<a href="#" data-fr="Profil" data-es="Perfil">Profil</a>
</nav>

<div id="windy">
<iframe
src="https://embed.windy.com/embed2.html?lat=43.2965&lon=5.3698&zoom=7&overlay=wind"
width="100%" height="100%">
</iframe>
</div>

<div class="section">

<div class="card">
<h3>ESP32 WROOM</h3>
<p>EUR 3.59</p>
<a class="btn" href="#">Lien AliExpress</a>
</div>

<div class="card">
<h3>ESP32-C3</h3>
<p>EUR 2.34</p>
<a class="btn" href="#">Lien AliExpress</a>
</div>

</div>

<div class="right-icon">
📡 Marseille Live
</div>

<script>
function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerText =
    now.toLocaleTimeString() + " Marseille";
}
setInterval(updateClock,1000);
updateClock();

function setLang(lang){
    document.querySelectorAll("[data-fr]").forEach(el=>{
        el.innerText = el.getAttribute("data-"+lang);
    });
}
</script>

</body>
</html>
