<!DOCTYPE html>

<style>
body{
background:#000;
color:#00ffcc;
font-family:Arial;
margin:0;
text-align:center;
background:url('fondo_inicio.JPG') no-repeat center center fixed;
background-size:cover;
}

/* LANG */
.lang{
position:fixed;
top:10px;
left:10px;
display:flex;
gap:10px;
z-index:9999;
}
.lang button{
padding:10px;
border:2px solid;
background:rgba(0,0,0,0.5);
cursor:pointer;
font-weight:bold;
}
.es{color:#00ffcc;border-color:#00ffcc;}
.fr{color:#ff00ff;border-color:#ff00ff;}

/* HEADER */
header{

/* NAV */
nav a{

}

/* FORO */
.foro{

padding:10px 18px;
border-radius:40px;
border:2px solid #ff00ff;
color:#ff00ff;
box-shadow:0 0 15px #ff00ff;
margin-left:20px;
}

/* CARDS */
.card{
width:280px;
display:inline-block;
margin:10px;
padding:15px;
border:2px solid #00ffcc;
background:rgba(0,0,0,0.5);
}

a.link{
display:inline-block;
padding:8px 12px;
border:2px solid #00ffcc;
color:#00ffcc;
text-decoration:none;
}
</style>
</head>

<body>

<script>
const t = {
es:{
title:"Recomendaciones - Lab Luis",
sec:"Recomendaciones"
},
fr:{
title:"Recommandations - Lab Luis",
sec:"Recommandations"
}
};

function setLang(l){
document.documentElement.lang=l;
document.getElementById("title").innerText=t[l].title;
document.getElementById("sec").innerText=t[l].sec;

document.querySelectorAll("nav a").forEach(a=>{
a.innerText=a.dataset[l];
});
}
