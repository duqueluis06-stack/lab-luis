<!DOCTYPE html>
<html lang="fr">

<title>Recommandations Lab Luis</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url('fondo_inicio.JPG') no-repeat center center fixed;
    background-size:cover;
    color:#fff;
}

/* claridad fondo */
body::before{
    content:"";
    position:fixed;
    width:100%;height:100%;
    background:rgba(0,0,0,0.20);
    z-index:-1;
}

/* 🌍 MAPA SVG */
.mapa{
    position:fixed;
    top:80px;
    left:10px;
    width:180px;
    opacity:0.6;
    z-index:0;
}

/* 🟢 resaltado */
.francia{ fill:#00ff88; }
.belgica{ fill:#00ffcc; }

/* panel info */
.info{
    position:fixed;
    top:10px;
    right:10px;
    background:rgba(0,0,0,0.6);
    padding:10px;
    border-radius:8px;
    font-size:13px;
}

/* idioma */
.lang{
    position:fixed;
    top:10px;
    right:120px;
}

.lang a{
    margin:3px;
    cursor:pointer;
    color:#00ffff;
}

/* nav */
nav{
    text-align:center;
    margin:20px 0;
}

nav a{
    margin:6px;
    padding:10px;
    color:#00ffff;
    text-decoration:none;
    border:1px solid #00ffff;
}

/* titulo */
.section-title{
    text-align:center;
    margin:50px;
    font-size:22px;
}

/* cards */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.card{
    width:260px;
    background:rgba(0,0,0,0.5);
    padding:15px;
    border-radius:10px;
}

.btn{
    display:block;
    margin-top:10px;
    padding:8px;
    border:1px solid #00ffff;
    text-align:center;
    color:#00ffff;
    text-decoration:none;
}

</style>
</head>

<body>

<script>

/* hora */
setInterval(()=>{
const now=new Date();
document.getElementById("hora").innerText=
"Marseille "+now.toLocaleTimeString("fr-FR");
},1000);

/* idioma */
function setLang(lang){
document.getElementById("title").innerText=
lang==="fr"
?"Sélection technique de composants recommandés"
:"Selección técnica de componentes recomendados";

document.querySelectorAll("[data-es]").forEach(el=>{
el.innerText=el.getAttribute("data-"+lang);
});
}
