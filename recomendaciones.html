<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recommandations Lab Luis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#00ffcc;
text-align:center;
}

/* 🌍 BOTONES IDIOMA */
.lang-box{
position:fixed;
top:10px;
left:10px;
z-index:999;
}

.lang-btn{
background:#111;
border:2px solid #00ffcc;
color:#00ffcc;
padding:6px 10px;
margin:3px;
cursor:pointer;
}

/* HEADER */
header{
padding:20px;
font-size:30px;
border-bottom:2px solid #00ffcc;
}

/* WINDY PROTEGIDO */
.windy{
width:90%;
height:320px;
margin:20px auto;
border:2px solid #00ffcc;
border-radius:10px;
overflow:hidden;
}

/* CARDS */
.card{
display:inline-block;
width:260px;
margin:10px;
padding:15px;
border:2px solid #00ffcc;
background:#111;
text-align:left;
}

.card p{
font-size:14px;
color:#fff;
}

a.btn{
display:block;
margin-top:10px;
padding:10px;
border:2px solid #00ffcc;
color:#00ffcc;
text-decoration:none;
}
</style>
</head>

<body>

<!-- 🌍 CONTROLES -->
<div class="lang-box">
<button class="lang-btn" onclick="setLang('fr')">FR</button>
<button class="lang-btn" onclick="setLang('es')">ES</button>
</div>

<!-- HEADER FIJO (NO TRADUCIBLE) -->
<header>
Recommandations Lab Luis
</header>

<!-- 🌍 WINDY MARSELLA (PROTEGIDO) -->
<div class="windy">
<iframe width="100%" height="100%"
src="https://embed.windy.com/embed2.html?lat=43.2965&lon=5.3698&zoom=7&level=surface&overlay=wind&product=ecmwf&menu=&message=true">
</iframe>
</div>

<!-- TITULO -->
<h2 data-fr="Produits électroniques"
    data-es="Productos electrónicos">
Produits électroniques
</h2>

<!-- PRODUCTOS -->
<div class="card">
<h3 data-fr="ESP32 WROOM-32"
    data-es="ESP32 WROOM-32">ESP32 WROOM-32</h3>

<p data-fr="Microcontrôleur WiFi et Bluetooth pour IoT"
   data-es="Microcontrolador WiFi y Bluetooth para IoT">
Microcontrôleur WiFi et Bluetooth pour IoT
</p>

<a class="btn" href="https://s.click.aliexpress.com/e/_c4NGyYMr" target="_blank">
LINK
</a>
</div>

<div class="card">
<h3 data-fr="ESP32-C3 Mini"
    data-es="ESP32-C3 Mini">ESP32-C3 Mini</h3>

<p data-fr="Faible consommation et haute stabilité"
   data-es="Bajo consumo y alta estabilidad">
Faible consommation et haute stabilité
</p>

<a class="btn" href="https://s.click.aliexpress.com/e/_c2JdxMsJ" target="_blank">
LINK
</a>
</div>

<script>
let currentLang = "fr";

function setLang(lang){
currentLang = lang;

document.querySelectorAll("[data-fr]").forEach(el=>{
let txt = el.getAttribute("data-"+lang);
if(txt) el.innerText = txt;
});
}

/* 🔒 Protección de Windy (NO se toca nunca) */
window.addEventListener("load", ()=>{
console.log("Windy locked OK - Marseille");
});
</script>

</body>
</html>
