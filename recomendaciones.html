<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recommandations Lab Luis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url('fondo_inicio.JPG') no-repeat center center fixed;
    background-size:cover;
    color:#fff;
}

/* 🔆 ACLARADO GENERAL */
body::before{
    content:"";
    position:fixed;
    width:100%;height:100%;
    background:rgba(0,0,0,0.25);
    z-index:-1;
}

/* 🌍 MAPA EUROPA */
.mapa-europa{
    position:fixed;
    top:10px;
    left:10px;
    width:180px;
    opacity:0.25;
    z-index:0;
}

/* 🕒 PANEL DERECHO */
.info-panel{
    position:fixed;
    top:10px;
    right:10px;
    padding:12px;
    background:rgba(0,0,0,0.5);
    border-radius:10px;
    font-size:14px;
    text-align:right;

    box-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff;
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
    font-size:32px;
    font-weight:bold;
    color:#00ffcc;
    text-shadow:0 0 10px #00ffff,0 0 25px #ff00ff;
}

/* LANG */
.lang-switch{
    position:fixed;
    top:10px;
    right:120px;
}

.lang-switch a{
    margin-left:6px;
    padding:6px 10px;
    border:1px solid #00ffcc;
    border-radius:6px;
    color:#00ffcc;
    cursor:pointer;
}

/* NAV */
nav{
    text-align:center;
    margin:20px 0 40px 0;
}

nav a{
    margin:6px;
    padding:10px 14px;
    border-radius:8px;
    color:#00ffff;
    text-decoration:none;
    font-weight:bold;
    border:1px solid rgba(0,255,255,0.5);
    box-shadow:0 0 5px #00ffff;
}

nav a:hover{
    background:linear-gradient(90deg,#ff00ff,#00ffff);
    color:#000;
}

/* LOGO */
.logo{
    width:130px;
    display:block;
    margin:25px auto;
}

/* TITULO */
.section-title{
    display:inline-block;
    margin:40px auto 60px auto;
    padding:15px 30px;
    font-size:22px;
    font-weight:bold;
    background:rgba(0,0,0,0.6);
    border-radius:10px;
}

/* GRID */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding-bottom:60px;
}

/* CARD */
.card{
    width:260px;
    padding:18px;
    border-radius:12px;
    background:rgba(0,0,0,0.55);
    border:1px solid rgba(0,255,204,0.3);
}

.card h3{
    color:#00ffcc;
}

.btn{
    display:block;
    margin-top:12px;
    padding:10px;
    text-align:center;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    color:#00ffff;
    border:1px solid #00ffff;
}

.btn:hover{
    background:linear-gradient(90deg,#ff00ff,#00ffff);
    color:#000;
}

</style>
</head>

<body>

<!-- 🌍 MAPA -->
<img src="https://upload.wikimedia.org/wikipedia/commons/b/b4/Europe_blank_map.png" class="mapa-europa">

<!-- 🕒 INFO PANEL -->
<div class="info-panel">
<div id="hora"></div>
<div id="temp">Marseille ~ 18°C</div>
</div>

<!-- 🌐 LANG -->
<div class="lang-switch">
<a onclick="setLang('fr')">FR</a>
<a onclick="setLang('es')">ES</a>
</div>

<header id="title">⚡ Recommandations Lab Luis</header>

<img src="logo.jpg" class="logo">

<nav>
<a href="index.html">Accueil</a>
<a href="imagenes.html">Images</a>
<a href="proyectos.html">Projets</a>
<a href="experimentos.html">Liens YouTube</a>
<a href="libros.html">Livres KDP</a>
<a href="sobre-mi.html">Profil</a>
</nav>

<div style="text-align:center;">
<h2 class="section-title" id="section">
Sélection technique de composants recommandés
</h2>
</div>

<div class="container">

<div class="card">
<h3 data-es="ESP32 WROOM-32" data-fr="ESP32 WROOM-32">ESP32 WROOM-32</h3>
<p data-es="Módulo WiFi y Bluetooth"
data-fr="Module WiFi et Bluetooth">
Module WiFi et Bluetooth
</p>
<a class="btn" href="https://s.click.aliexpress.com/e/_c4NGyYMr" target="_blank"
data-es="Ver detalles" data-fr="Voir détails">Voir détails</a>
</div>

</div>

<script>

/* 🕒 HORA REAL */
function actualizarHora(){
const now = new Date();
const options = {
hour: '2-digit',
minute: '2-digit',
second: '2-digit',
timeZone: 'Europe/Paris'
};
document.getElementById("hora").innerText =
"Marseille : " + now.toLocaleTimeString('fr-FR', options);
}
setInterval(actualizarHora,1000);

/* 🌐 LANG */
function setLang(lang){

document.getElementById("title").innerText =
lang==="fr"?"⚡ Recommandations Lab Luis":"⚡ Recomendaciones Lab Luis";

document.getElementById("section").innerText =
lang==="fr"
?"Sélection technique de composants recommandés"
:"Selección técnica de componentes recomendados";

document.querySelectorAll("[data-es]").forEach(el=>{
el.innerText = el.getAttribute("data-"+lang);
});
}

</script>

</body>
</html>
