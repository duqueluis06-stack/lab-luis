<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lab Luis Control Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 BASE */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#05070c;
    color:#00ffe5;
}

/* 🧠 HEADER */
header{
    text-align:center;
    padding:18px;
    font-size:28px;
    font-weight:900;
    color:#00ffff;
    background:rgba(0,0,0,0.6);
    border-bottom:1px solid #00ffff;
}

/* 🌍 LANG PANEL */
.lang{
    position:fixed;
    top:10px;
    right:10px;
    z-index:999;
}

.lang button{
    background:rgba(0,0,0,0.6);
    border:1px solid #00ffff;
    color:#00ffff;
    padding:6px 10px;
    margin-left:5px;
    cursor:pointer;
    box-shadow:0 0 10px #00ffff;
}

/* 🛰️ PANEL */
.panel{
    position:fixed;
    top:60px;
    right:10px;
    padding:10px;
    background:rgba(0,0,0,0.6);
    border:1px solid #00ffff;
    box-shadow:0 0 20px #00ffff;
    width:200px;
}

.panel span{
    display:block;
    font-size:13px;
}

/* 🗺️ MAPA EUROPA */
.mapa{
    position:fixed;
    left:10px;
    top:80px;
    width:260px;
    filter:drop-shadow(0 0 15px #00ffff);
}

/* 📦 CARDS */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
    padding:20px;
    margin-top:120px;
}

.card{
    background:rgba(0,0,0,0.7);
    border:1px solid #00ffff;
    padding:15px;
    box-shadow:0 0 10px #00ffff;
}

/* 🔘 BOTÓN */
.btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    color:#00ffff;
    border:1px solid #00ffff;
    text-decoration:none;
    box-shadow:0 0 10px #00ffff;
}

.btn:hover{
    background:#00ffff;
    color:#000;
}

/* 🧭 NAV */
nav{
    text-align:center;
    margin-top:10px;
}

nav a{
    color:#00ffff;
    margin:8px;
    text-decoration:none;
}

</style>
</head>

<body>

<!-- 🌐 LANGUAGE FIXED -->
<div class="lang">
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('es')">ES</button>
</div>

<!-- 🧠 HEADER -->
<header id="title">Lab Luis Control Center</header>

<!-- 🧭 NAV -->
<nav>
<a data-es="Inicio" data-fr="Accueil">Accueil</a>
<a data-es="Proyectos" data-fr="Projets">Projets</a>
<a data-es="Libros KDP" data-fr="Livres KDP">Livres KDP</a>
<a data-es="Perfil" data-fr="Profil">Profil</a>
</nav>

<!-- 🛰️ PANEL -->
<div class="panel">
<span id="clock"></span>
<span data-es="Temperatura: 20°C" data-fr="Température: 20°C">Température: 20°C</span>
<span data-es="CO2: normal" data-fr="CO2: normal">CO2: normal</span>
<span data-es="Pression: stable" data-fr="Pression: stable">Pression: stable</span>
</div>

<!-- 🗺️ MAPA EUROPA (MEJORADO) -->
<svg class="mapa" viewBox="0 0 300 200">
<path d="M50,80 L120,60 L180,90 L140,140 Z" fill="none" stroke="#00ffff"/>
<circle cx="110" cy="90" r="5" fill="#00ffff"/> <!-- Francia -->
<circle cx="150" cy="85" r="4" fill="#00ffcc"/> <!-- Bélgica -->
<circle cx="90" cy="120" r="5" fill="#00ffaa"/> <!-- España -->
</svg>

<!-- 📦 PRODUCTOS -->
<div class="container">

<div class="card">
<h3 data-es="ESP32 WROOM" data-fr="ESP32 WROOM">ESP32 WROOM</h3>
<p data-es="Módulo IoT WiFi + Bluetooth" data-fr="Module IoT WiFi + Bluetooth"></p>
<a class="btn" href="#">AliExpress</a>
</div>

<div class="card">
<h3 data-es="ESP32-C3 Mini" data-fr="ESP32-C3 Mini"></h3>
<p data-es="Bajo consumo ultra compacto" data-fr="Ultra faible consommation"></p>
<a class="btn" href="#">AliExpress</a>
</div>

</div>

<!-- ⏱️ SCRIPT -->
<script>

function setLang(lang){
    document.querySelectorAll("[data-es]").forEach(el=>{
        el.innerText = el.dataset[lang];
    });
}

setInterval(()=>{
    document.getElementById("clock").innerText =
    "Marseille GMT " + new Date().toLocaleTimeString();
},1000);

</script>

</body>
</html>
