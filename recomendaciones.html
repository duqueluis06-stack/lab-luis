<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recommandations Bluey</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: url('fondo_inicio.JPG') no-repeat center center fixed;
    background-size: cover;
    color:#00ffcc;
    text-align:center;
}

header {
    padding:18px;
    font-size:32px;
    font-weight:bold;
    background: rgba(0,0,0,0.65);
    border-bottom:2px solid #00ffcc;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff;
}

.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
    background: rgba(0,0,0,0.55);
    border-bottom:1px solid #00ffcc;
}

.clock { font-size:14px; color:#fff; }

.lang {
    display:flex;
    gap:8px;
}

.lang button {
    background:none;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

nav {
    margin:15px;
}

nav a {
    color:#ffcc00;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
    cursor:pointer;
}

/* WINDY */
#wrapper-windy {
    width:90%;
    margin:60px auto 30px auto;
}

#windy {
    width:100%;
    height:420px;
    border:2px solid #00ffcc;
    border-radius:12px;
    pointer-events: none;
}

/* SECCIONES */
.section {
    display:none;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin:25px;
}

.section.active {
    display:flex;
}

/* CARDS */
.card {
    width:280px;
    background: rgba(0,0,0,0.65);
    border:2px solid #00ffcc;
    border-radius:10px;
    padding:15px;
}

.btn {
    display:inline-block;
    margin-top:10px;
    padding:8px 12px;
    border:1px solid #00ffcc;
    color:#00ffcc;
    text-decoration:none;
    border-radius:8px;
}
</style>
</head>

<body>

<header>⚡ Recommandations Bluey</header>

<div class="topbar">
    <div class="clock" id="clock">Marseille</div>

    <div class="lang">
        <button onclick="setLang('fr')">FR</button>
        <button onclick="setLang('es')">ES</button>
    </div>
</div>

<nav>
<a data-target="home">Accueil</a> |
<a data-target="images">Images</a> |
<a data-target="projects">Projets</a> |
<a data-target="experiments">Expériences</a> |
<a data-target="kdp">Livres KDP</a> |
<a data-target="profile">Profil</a>
</nav>

<div id="wrapper-windy">
<iframe id="windy"
src="https://embed.windy.com/embed2.html?lat=43.2965&lon=5.3698&zoom=7&overlay=wind"></iframe>
</div>

<!-- SECCIONES -->
<div id="home" class="section active">
<div class="card">HOME</div>
</div>

<div id="images" class="section">
<div class="card">IMAGES</div>
</div>

<div id="projects" class="section">
<div class="card">PROJECTS</div>
</div>

<div id="experiments" class="section">
<div class="card">EXPERIMENTS</div>
</div>

<div id="kdp" class="section">
<div class="card">KDP</div>
</div>

<div id="profile" class="section">
<div class="card">PROFILE</div>
</div>

<script>
const links = document.querySelectorAll("nav a");

links.forEach(link => {
    link.addEventListener("click", () => {

        const target = link.dataset.target;

        document.querySelectorAll(".section").forEach(sec => {
            sec.classList.remove("active");
        });

        document.getElementById(target).classList.add("active");
    });
});

function setLang(lang){
    document.querySelectorAll(".card").forEach(el=>{
        el.innerText = lang === "es"
        ? "Contenido en español"
        : "Contenu en français";
    });
}
</script>

</body>
</html>
