<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Lab</title>

<style>
body{
margin:0;
background:black;
font-family:Arial;
color:#00fff2;
overflow-x:hidden;
}

/* 🌌 ESTRELLAS */
.stars{
position:fixed;
inset:0;
z-index:0;
}
.star{
position:absolute;
bottom:-10px;
width:2px;
height:2px;
background:white;
animation:rise linear infinite;
opacity:0.6;
}
@keyframes rise{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

/* LAYOUT */
.wrapper{
position:relative;
z-index:2;
display:flex;
gap:12px;
padding:10px;
max-width:1200px;
margin:auto;
}

.tracks{
flex:1;
display:flex;
flex-direction:column;
gap:8px;
}

/* TRACK */
.track{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-radius:10px;
border:1px solid #00fff2;
background:rgba(0,0,0,0.5);
box-shadow:0 0 10px #00fff2;
}

.track.active{
border:1px solid #ff0033;
box-shadow:0 0 18px #ff0033;
}

/* TEXTO */
.name{
font-weight:bold;
letter-spacing:1px;
text-transform:capitalize;
}

small{
font-size:11px;
opacity:0.7;
display:block;
}

/* BOTONES */
button{
background:black;
border:1px solid #00fff2;
color:#00fff2;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
}

/* VU */
canvas{
width:55px;
height:55px;
border-radius:50%;
}

/* PROGRESS BAR */
.bar{
width:100%;
height:4px;
background:#111;
margin-top:6px;
border-radius:4px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#00fff2,#ff0033);
box-shadow:0 0 10px #00fff2;
}

/* SIDE */
.side{
width:220px;
display:flex;
flex-direction:column;
gap:10px;
max-height:90vh;
overflow:auto;
}

.side img, .side video{
width:100%;
border-radius:10px;
box-shadow:0 0 15px #00fff2;
}

/* VIDEO prioridad */
.side video{
height:140px;
object-fit:cover;
}

.backBtn{
position:fixed;
top:15px;
left:15px;
width:55px;
height:55px;
border-radius:50%;
border:2px solid #00fff2;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:#00fff2;
background:rgba(0,0,0,0.6);
box-shadow:0 0 15px #00fff2;
z-index:10;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 10px #00fff2;}
50%{box-shadow:0 0 25px #ff0033;}
100%{box-shadow:0 0 10px #00fff2;}
}

@media(max-width:800px){
.wrapper{flex-direction:column;}
.side{width:100%;flex-direction:row;}
.side img,.side video{width:48%;}
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<a class="backBtn" href="duqueluis-mp3.html">⏪</a>

<div class="wrapper">

<div class="tracks" id="tracks"></div>

<div class="side">

<!-- 🎬 VIDEO PRIMERO -->
<video autoplay loop muted playsinline>
  <source src="bh.mp4" type="video/mp4">
</video>

<img src="vortice-neon.PNG">
<img src="NeuroLuis.gif">

</div>

</div>

<script>

/* ⏱ */
function formatTime(s){
if(!s||isNaN(s)) return "--:--";
const m=Math.floor(s/60);
const sec=Math.floor(s%60);
return `${m}:${sec<10?"0"+sec:sec}`;
}

/* 🎧 tracks */
const tracks=[
"aum-de-acero.mp3",
"bajo-en-el-pecho.mp3",
"bajo-infinito.mp3",
"circuit-rain.mp3",
"himno-del-amanecer.mp3",
"luces-borrosas.mp3",
"luis-fuego-en-la-noche.mp3",
"nucleo-que-despierta.mp3"
];

/* AUDIO */
const audio=new Audio();
let ctx, analyser, source, dataArray;
let active=null;
let activeCanvas=null;
let index=0;

/* 🌌 stars */
const stars=document.getElementById("stars");
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(3+Math.random()*5)+"s";
stars.appendChild(s);
}

/* INIT */
function init(){
if(ctx) return;
ctx=new (window.AudioContext||window.webkitAudioContext)();
analyser=ctx.createAnalyser();
source=ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);
analyser.fftSize=64;
dataArray=new Uint8Array(analyser.frequencyBinCount);
draw();
}

/* NEXT */
audio.onended=()=>{next();};

function next(){
index++;
if(index>=tracks.length) index=0;
play(tracks[index]);
}

/* PLAY */
function play(file, el){
init();
ctx.resume();

active=file;
index=tracks.indexOf(file);

if(!audio.src.includes(file)){
audio.src=file;
}

audio.play();

document.querySelectorAll(".track").forEach(t=>t.classList.remove("active"));

if(el){
el.classList.add("active");
activeCanvas=el.querySelector("canvas"); // 🔊 SOLO ESTE
}
}

/* PAUSE */
function pause(){
audio.pause();
}

/* 🔊 VU SOLO ACTIVO */
function draw(){
requestAnimationFrame(draw);

if(!analyser || !activeCanvas) return;

analyser.getByteFrequencyData(dataArray);

const canvas=activeCanvas;
const c=canvas.getContext("2d");
const w=canvas.width=55;
const h=canvas.height=55;

c.clearRect(0,0,w,h);

let bars=dataArray.length;
let radius=18;

for(let i=0;i<bars;i++){
let val=dataArray[i]/255;
let angle=(i/bars)*Math.PI*2;

let x=w/2+Math.cos(angle)*(radius+val*12);
let y=h/2+Math.sin(angle)*(radius+val*12);

c.beginPath();
c.arc(x,y,2,0,Math.PI*2);
c.fillStyle="#00fff2";
c.fill();
}
}

/* PROGRESS */
function update(){
requestAnimationFrame(update);

if(!audio.duration) return;

const file=audio.src.split("/").pop();
const el=document.getElementById("time-"+file);
const bar=document.getElementById("bar-"+file);

if(el){
el.textContent=
formatTime(audio.currentTime)+" / "+formatTime(audio.duration);
}

if(bar){
bar.style.width=(audio.currentTime/audio.duration)*100+"%";
}
}

/* RENDER */
const container=document.getElementById("tracks");

tracks.forEach((file,i)=>{
const name=file
.replace(".mp3","")
.replace(/-/g," ")
.replace(/\b\w/g,l=>l.toUpperCase());

const div=document.createElement("div");
div.className="track";

div.innerHTML=`
<div style="flex:1">
<div class="name">${name}</div>
<small id="time-${file}">--:-- / --:--</small>
<div class="bar"><div class="fill" id="bar-${file}"></div></div>
</div>

<div>
<button onclick="play('${file}',this.closest('.track'))">▶</button>
<button onclick="pause()">⏸</button>
</div>

<canvas></canvas>
`;

container.appendChild(div);
});

update();

</script>

</body>
</html>
