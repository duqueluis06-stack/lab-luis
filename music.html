<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Library</title>

<style>
body{
margin:0;
background:black;
overflow-x:hidden;
font-family:Arial;
color:#00fff2;
}

/* 🌌 ESTRELLAS */
.stars{
position:fixed;
inset:0;
z-index:0;
overflow:hidden;
}
.star{
position:absolute;
bottom:-10px;
width:2px;
height:2px;
background:white;
animation:rise linear infinite;
opacity:0.6;
}
@keyframes rise{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

/* CONTENIDO */
.container{
position:relative;
z-index:2;
padding:10px;
}

h2{
text-align:center;
text-shadow:0 0 12px #00fff2;
}

img{
width:100%;
max-width:420px;
display:block;
margin:10px auto;
border-radius:10px;
box-shadow:0 0 18px #00fff2;
}

/* TRACK */
.track{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
margin:10px;
border:1px solid #00fff2;
border-radius:12px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 8px #00fff2;
}

.track.active{
border:1px solid #ff00ff;
box-shadow:0 0 25px #ff00ff;
}

.left{
display:flex;
flex-direction:column;
}

.name{font-size:14px;}
.time{font-size:11px;opacity:0.7;}

.controls button{
background:black;
border:1px solid #00fff2;
color:#00fff2;
padding:6px 8px;
margin-left:5px;
border-radius:6px;
cursor:pointer;
}

/* 🎧 VU CÍRCULO */
.vuWrap{
width:70px;
height:70px;
position:relative;
margin-left:10px;
}

canvas{
width:70px;
height:70px;
border-radius:50%;
}

/* BACK */
.back{
display:block;
text-align:center;
margin:20px;
color:#00fff2;
text-decoration:none;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

<h2>🎧 Music Library</h2>

<img src="vortice-neon.PNG">

<div id="tracks"></div>

<a class="back" href="duqueluis-mp3.html">⏪ Regresar</a>

</div>

<script>

const tracks = [
"aum-de-acero.mp3",
"bajo-en-el-pecho.mp3",
"bajo-infinito.mp3",
"circuit-rain.mp3",
"himno-del-amanecer.mp3",
"luces-borrosas.mp3",
"luis-fuego-en-la-noche.mp3",
"nucleo-que-despierta.mp3"
];

const audio = new Audio();
let ctx, analyser, source, dataArray;
let current = null;

/* 🌌 ESTRELLAS */
const stars=document.getElementById("stars");
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(3+Math.random()*5)+"s";
stars.appendChild(s);
}

/* 🎧 AUDIO INIT */
function initAudio(){
if(ctx) return;
ctx = new (window.AudioContext || window.webkitAudioContext)();
analyser = ctx.createAnalyser();
source = ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);
analyser.fftSize = 64;
dataArray = new Uint8Array(analyser.frequencyBinCount);
drawVU();
}

/* 🔵 VU CIRCULAR */
function drawVU(){
requestAnimationFrame(drawVU);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

document.querySelectorAll("canvas").forEach(canvas=>{
const ctx2 = canvas.getContext("2d");
const size = canvas.width = canvas.height = 70;

ctx2.clearRect(0,0,size,size);

const center = size/2;
const radius = 25;

for(let i=0;i<dataArray.length;i++){
let angle = (i / dataArray.length) * Math.PI * 2;
let value = dataArray[i];

let r = radius + value / 4;

let x1 = center + Math.cos(angle)*radius;
let y1 = center + Math.sin(angle)*radius;

let x2 = center + Math.cos(angle)*r;
let y2 = center + Math.sin(angle)*r;

ctx2.strokeStyle = `rgb(${value*2},${255-value},255)`;
ctx2.lineWidth = 2;

ctx2.beginPath();
ctx2.moveTo(x1,y1);
ctx2.lineTo(x2,y2);
ctx2.stroke();
}
});
}

/* ▶ PLAY */
function play(file, trackEl){
initAudio();

audio.src = file;
audio.play();
current = file;

document.querySelectorAll(".track").forEach(t=>t.classList.remove("active"));
trackEl.classList.add("active");
}

/* ⏸ PAUSE */
function pause(){
audio.pause();
}

/* 🧱 RENDER */
const container = document.getElementById("tracks");

tracks.forEach(file=>{
const div = document.createElement("div");
div.className="track";

div.innerHTML=`
<div class="left">
<div class="name">${file.replace(".mp3","")}</div>
<div class="time">--:--</div>
</div>

<div class="controls">
<button>▶</button>
<button>⏸</button>
</div>

<div class="vuWrap">
<canvas></canvas>
</div>
`;

const btnPlay = div.querySelectorAll("button")[0];
const btnPause = div.querySelectorAll("button")[1];
const time = div.querySelector(".time");

btnPlay.onclick=()=>{
play(file, div);

audio.onloadedmetadata=()=>{
let m=Math.floor(audio.duration/60);
let s=Math.floor(audio.duration%60);
time.textContent=`${m}:${s<10?"0"+s:s}`;
};
};

btnPause.onclick=()=>{
pause();
div.classList.remove("active");
};

container.appendChild(div);
});

</script>

</body>
</html>
