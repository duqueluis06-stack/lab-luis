<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Lab</title>

<style>
body{
margin:0;
background:black;
color:#00fff2;
font-family:Arial;
overflow-x:hidden;
}

/* 🌌 STARS */
.stars{position:fixed;inset:0;z-index:0;}
.star{
position:absolute;
width:2px;height:2px;
background:white;
opacity:.7;
animation:rise linear infinite;
}
@keyframes rise{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* 🔙 BACK */
.backBtn{
position:fixed;
top:15px;left:15px;
padding:10px 14px;
border-radius:30px;
display:flex;align-items:center;gap:5px;
font-size:14px;
color:#00fff2;
text-decoration:none;
background:rgba(0,0,0,0.6);
border:2px solid #00fff2;
box-shadow:0 0 15px #00fff2,0 0 40px #00fff2;
animation:pulse 1.5s infinite;
z-index:10;
}
.backBtn:hover{
transform:scale(1.05);
box-shadow:0 0 30px #ff0033;
}
@keyframes pulse{
0%{box-shadow:0 0 10px #00fff2;}
50%{box-shadow:0 0 30px #ff0033;}
100%{box-shadow:0 0 10px #00fff2;}
}

/* LAYOUT */
.wrapper{
position:relative;
z-index:2;
display:flex;
gap:12px;
padding:10px;
max-width:1400px;
margin:auto;
}
.column{flex:1;display:flex;flex-direction:column;gap:8px;}
.center{flex:1.2;display:flex;flex-direction:column;align-items:center;gap:12px;}

/* IMG */
.album-img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
box-shadow:0 0 15px #00fff2;
}

/* TRACK */
.track{
padding:10px;
border:1px solid #00fff2;
border-radius:10px;
background:rgba(0,0,0,0.5);
}
.track.active{
border-color:#ff0033;
box-shadow:0 0 20px #ff0033;
}

/* BAR */
.bar{height:4px;background:#111;margin-top:5px;border-radius:4px;overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,#00fff2,#ff0033)}

/* VIDEO */
.videoWrap{
width:100%;
height:240px;
overflow:hidden;
border-radius:10px;
box-shadow:0 0 20px #00fff2;
}
video{
width:100%;
height:100%;
object-fit:cover;
}

/* PIZZA */
canvas{width:180px;height:180px}

/* 🔥 PATREON */
.patreon{
display:inline-block;
padding:14px 20px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
color:white;
background:linear-gradient(90deg,#00fff2,#0077ff,#ff0033);
box-shadow:0 0 20px #00fff2,0 0 40px #ff0033;
animation:pulse 1.5s infinite;
text-align:center;
}
.patreon span{
display:block;
font-size:11px;
opacity:.9;
}

/* MOBILE */
@media(max-width:900px){
.wrapper{flex-direction:column;}
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<a class="backBtn" href="duqueluis-mp3.html">⏪ REGRESO</a>

<div class="wrapper">

<!-- IZQUIERDA -->
<div class="column">
<img src="el-despertar.jpg" class="album-img">
<div id="left"></div>
</div>

<!-- CENTRO -->
<div class="center">

<div class="videoWrap">
<video autoplay loop muted playsinline>
<source src="bh.mp4" type="video/mp4">
</video>
</div>

<canvas id="viz"></canvas>

<a class="patreon" href="https://www.patreon.com/posts/155590751" target="_blank">
💿 EL DESPERTAR DE LA CUMBIA
<span>Descarga completa en Patreon</span>
</a>

</div>

<!-- DERECHA -->
<div class="column">
<img src="vortice-neon.PNG" class="album-img">
<div id="right"></div>
</div>

</div>

<script>

/* 🌌 STARS */
const stars=document.getElementById("stars");
for(let i=0;i<70;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(3+Math.random()*6)+"s";
stars.appendChild(s);
}

/* AUDIO */
const audio=new Audio();
audio.preload="auto";

let ctx, analyser, dataArray;
let currentTrack="";

/* INIT */
function init(){
if(ctx) return;
ctx=new AudioContext();
analyser=ctx.createAnalyser();
let src=ctx.createMediaElementSource(audio);
src.connect(analyser);
analyser.connect(ctx.destination);
dataArray=new Uint8Array(analyser.frequencyBinCount);
draw();
}

/* PLAY FIX */
function play(file,el){
init();
ctx.resume();

/* SOLO cambia si es otro */
if(currentTrack!==file){
audio.src=file;
audio.load();
currentTrack=file;
}

audio.play().catch(()=>{});

document.querySelectorAll(".track").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}

/* PAUSE */
function pause(){
audio.pause();
}

/* TIME */
function format(s){
if(!s||isNaN(s)) return "0:00";
let m=Math.floor(s/60);
let sec=Math.floor(s%60);
return m+":"+(sec<10?"0":"")+sec;
}

/* UPDATE */
setInterval(()=>{
if(!audio.duration) return;

let t=document.getElementById("time-"+currentTrack);
let b=document.getElementById("bar-"+currentTrack);

if(t) t.textContent=format(audio.currentTime)+" / "+format(audio.duration);
if(b) b.style.width=(audio.currentTime/audio.duration)*100+"%";
},200);

/* 🍕 VISUAL */
function draw(){
requestAnimationFrame(draw);
if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

let c=document.getElementById("viz").getContext("2d");
c.canvas.width=180;
c.canvas.height=180;

c.clearRect(0,0,180,180);

for(let i=0;i<dataArray.length;i++){
let v=dataArray[i]/255;
let a=(i/dataArray.length)*Math.PI*2;
let r=40+v*50;

let x=90+Math.cos(a)*r;
let y=90+Math.sin(a)*r;

c.strokeStyle=`hsl(${i*4},100%,50%)`;
c.beginPath();
c.moveTo(90,90);
c.lineTo(x,y);
c.stroke();
}
}

/* VIDEO FIX */
const video=document.querySelector("video");
setInterval(()=>{
if(video.paused){
video.play().catch(()=>{});
}
},1000);

/* RENDER */
function render(list,id){
let d=document.getElementById(id);

list.forEach(f=>{
let name=f.replace(".mp3","").replace(/-/g," ");

let t=document.createElement("div");
t.className="track";

t.innerHTML=`
<div class="name">${name}</div>
<small id="time-${f}">0:00 / 0:00</small>
<div class="bar"><div class="fill" id="bar-${f}"></div></div>
<button onclick="play('${f}',this.parentElement)">▶</button>
<button onclick="pause()">⏸</button>
`;

d.appendChild(t);
});
}

/* DATA */
render([
"cumbia-de-luz-y-despedida.mp3",
"entre-lo-que-fui-y-lo-que-sere.mp3",
"entre-sombras-y-destellos.mp3",
"himno-del-ultimo-baile.mp3",
"latido-bajo-la-lluvia.mp3",
"lluvia-en-la-pista.mp3",
"peso-de-la-rutina.mp3",
"regreso-sin-fuego.mp3",
"sinfonía-en-la-pista.mp3",
"sombras-en-el-salon.mp3",
"sombras-que-se-mueven.mp3",
"tiembla-tu-mirada.mp3"
],"left");

render([
"aum-de-acero.mp3",
"bajo-en-el-pecho.mp3",
"bajo-infinito.mp3",
"circuit-rain.mp3",
"himno-del-amanecer.mp3",
"luces-borrosas.mp3",
"luis-fuego-en-la-noche.mp3",
"nucleo-que-despierta.mp3"
],"right");

</script>

</body>
</html>
