<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
body {
  margin: 0;
  background: black;
  overflow-x: hidden;
  font-family: Arial;
  color: #00fff2;
}

/* 🌌 ESTRELLAS */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 0;
}

.star {
  position: absolute;
  bottom: -10px;
  width: 2px;
  height: 2px;
  background: white;
  animation: rise 6s linear infinite;
  opacity: 0.6;
}

@keyframes rise {
  from { transform: translateY(0); }
  to { transform: translateY(-120vh); }
}

/* 🧠 CONTENIDO */
.container {
  position: relative;
  z-index: 2;
  padding: 10px;
}

h2 {
  text-align: center;
  text-shadow: 0 0 10px #00fff2;
}

/* 🖼 IMAGEN */
img {
  width: 100%;
  max-width: 420px;
  display: block;
  margin: 10px auto;
  border-radius: 10px;
  box-shadow: 0 0 20px #00fff2;
}

/* 🎵 TRACK */
.track {
  display: flex;
  flex-direction: column;
  margin: 10px;
  padding: 10px;
  border: 1px solid #00fff2;
  border-radius: 10px;
  box-shadow: 0 0 10px #00fff2;
  background: rgba(0,0,0,0.6);
}

.track.active {
  box-shadow: 0 0 25px #ff00ff;
}

/* BOTONES */
button {
  background: transparent;
  border: 1px solid #00fff2;
  color: #00fff2;
  padding: 5px;
  margin-top: 5px;
  cursor: pointer;
}

/* 🎚 VU CIRCULAR SIMPLE */
.vu {
  width: 40px;
  height: 40px;
  border: 2px solid #00fff2;
  border-radius: 50%;
  margin-top: 5px;
  box-shadow: 0 0 10px #00fff2;
}

/* 🔙 */
.back {
  display: block;
  text-align: center;
  margin: 20px;
  color: #00fff2;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- 🌌 ESTRELLAS -->
<div class="stars" id="stars"></div>

<div class="container">

<h2>🎧 Music Library</h2>

<img src="vortice-neon.PNG">

<!-- TRACKS -->
<div class="track">
  <span>aum-de-acero</span>
  <audio src="aum-de-acero.mp3"></audio>
  <button onclick="playTrack(this)">▶ Play</button>
  <div class="vu"></div>
</div>

<div class="track">
  <span>bajo-en-el-pecho</span>
  <audio src="bajo-en-el-pecho.mp3"></audio>
  <button onclick="playTrack(this)">▶ Play</button>
  <div class="vu"></div>
</div>

<div class="track">
  <span>bajo-infinito</span>
  <audio src="bajo-infinito.mp3"></audio>
  <button onclick="playTrack(this)">▶ Play</button>
  <div class="vu"></div>
</div>

<div class="track">
  <span>circuit-rain</span>
  <audio src="circuit-rain.mp3"></audio>
  <button onclick="playTrack(this)">▶ Play</button>
  <div class="vu"></div>
</div>

<div class="track">
  <span>himno-del-amanecer</span>
  <audio src="himno-del-amanecer.mp3"></audio>
  <button onclick="playTrack(this)">▶ Play</button>
  <div class="vu"></div>
</div>

<div class="track">
  <span>luces-borrosas</span>
  <audio src="luces-borrosas.mp3"></audio>
  <button onclick="playTrack(this)">▶ Play</button>
  <div class="vu"></div>
</div>

<div class="track">
  <span>luis-fuego-en-la-noche</span>
  <audio src="luis-fuego-en-la-noche.mp3"></audio>
  <button onclick="playTrack(this)">▶ Play</button>
  <div class="vu"></div>
</div>

<div class="track">
  <span>nucleo-que-despierta</span>
  <audio src="nucleo-que-despierta.mp3"></audio>
  <button onclick="playTrack(this)">▶ Play</button>
  <div class="vu"></div>
</div>

<a class="back" href="duqueluis-mp3.html">⏪ Regresar</a>

</div>

<script>

// 🌌 estrellas dinámicas
const stars = document.getElementById("stars");
for(let i=0;i<60;i++){
  let s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random()*100+"%";
  s.style.animationDuration = (3+Math.random()*5)+"s";
  stars.appendChild(s);
}

// 🎧 control único
let current = null;

function playTrack(btn){
  let track = btn.parentElement;
  let audio = track.querySelector("audio");

  if(current && current != audio){
    current.pause();
    current.parentElement.classList.remove("active");
  }

  if(audio.paused){
    audio.play();
    track.classList.add("active");
    btn.innerText = "⏸ Pause";
    current = audio;
  } else {
    audio.pause();
    track.classList.remove("active");
    btn.innerText = "▶ Play";
  }
}

</script>

</body>
</html>
