<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Lab</title>

<style>
body{
margin:0;
background:black;
font-family:Arial;
color:#00fff2;
overflow-x:hidden;
}

/* 🌌 ESTRELLAS */
.stars{
position:fixed;
inset:0;
z-index:0;
overflow:hidden;
}
.star{
position:absolute;
bottom:-10px;
width:2px;
height:2px;
background:white;
animation:rise linear infinite;
opacity:0.6;
}
@keyframes rise{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

/* 🔥 LAYOUT GENERAL */
.wrapper{
position:relative;
z-index:2;
display:flex;
gap:12px;
padding:10px;
max-width:1200px;
margin:auto;
}

/* 🎧 TRACKS CENTER */
.tracks{
flex:1;
display:flex;
flex-direction:column;
gap:8px;
}

/* 🎵 TRACK MINI */
.track{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 10px;
border-radius:10px;
border:1px solid #00fff2;
background:rgba(0,0,0,0.5);
box-shadow:0 0 8px #00fff2;
font-size:13px;
transition:0.2s;
}

.track.active{
border:1px solid #ff0033;
box-shadow:0 0 18px #ff0033;
}

/* botones */
button{
background:black;
border:1px solid #00fff2;
color:#00fff2;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
}

/* 🔵 VU pequeño */
canvas{
width:55px;
height:55px;
border-radius:50%;
}

/* 🖼 PANEL DERECHO */
.side{
width:220px;
display:flex;
flex-direction:column;
gap:10px;
}

.side img{
width:100%;
border-radius:10px;
box-shadow:0 0 15px #00fff2;
}

/* 🚪 BOTÓN */
.backBtn{
position:fixed;
top:15px;
left:15px;
width:55px;
height:55px;
border-radius:50%;
border:2px solid #00fff2;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:#00fff2;
background:rgba(0,0,0,0.6);
box-shadow:0 0 15px #00fff2;
z-index:10;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 10px #00fff2;}
50%{box-shadow:0 0 25px #ff0033;}
100%{box-shadow:0 0 10px #00fff2;}
}

/* 📱 MOBILE */
@media(max-width:800px){
.wrapper{
flex-direction:column;
}
.side{
width:100%;
flex-direction:row;
}
.side img{
width:48%;
}
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<a class="backBtn" href="duqueluis-mp3.html">⏪</a>

<div class="wrapper">

<div class="tracks" id="tracks"></div>

<div class="side">
<img src="vortice-neon.PNG">
<img src="NeuroLuis.gif">
</div>

</div>

<script>

const tracks=[
"aum-de-acero.mp3",
"bajo-en-el-pecho.mp3",
"bajo-infinito.mp3",
"circuit-rain.mp3",
"himno-del-amanecer.mp3",
"luces-borrosas.mp3",
"luis-fuego-en-la-noche.mp3",
"nucleo-que-despierta.mp3"
];

const audio=new Audio();
let ctx, analyser, source, dataArray;
let activeCanvas=null;
let current=null;

/* 🌌 estrellas */
const stars=document.getElementById("stars");
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(3+Math.random()*5)+"s";
stars.appendChild(s);
}

/* 🎧 INIT AUDIO */
function init(){
if(ctx) return;
ctx=new (window.AudioContext||window.webkitAudioContext)();
analyser=ctx.createAnalyser();
source=ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);
analyser.fftSize=64;
dataArray=new Uint8Array(analyser.frequencyBinCount);
draw();
}

/* 🔵 VU SOLO ACTIVO */
function draw(){
requestAnimationFrame(draw);
if(!analyser||!activeCanvas)return;

analyser.getByteFrequencyData(dataArray);

const c=activeCanvas.getContext("2d");
const size=activeCanvas.width=activeCanvas.height=55;

c.clearRect(0,0,size,size);

const center=size/2;
const radius=18;

for(let i=0;i<dataArray.length;i++){
let angle=(i/dataArray.length)*Math.PI*2;
let v=dataArray[i];

let r=radius+v/5;

let x1=center+Math.cos(angle)*radius;
let y1=center+Math.sin(angle)*radius;

let x2=center+Math.cos(angle)*r;
let y2=center+Math.sin(angle)*r;

c.strokeStyle=`rgb(${255-v},${v*1.5},255)`;
c.lineWidth=1.5;

c.beginPath();
c.moveTo(x1,y1);
c.lineTo(x2,y2);
c.stroke();
}
}

/* ▶ PLAY */
function play(file, el, canvas){
init();

audio.src=file;
audio.play();

current=file;
activeCanvas=canvas;

document.querySelectorAll(".track").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}

/* ⏸ */
function pause(){
audio.pause();
}

/* RENDER */
const container=document.getElementById("tracks");

tracks.forEach(file=>{
const div=document.createElement("div");
div.className="track";

div.innerHTML=`
<span>${file.replace(".mp3","")}</span>

<div>
<button>▶</button>
<button>⏸</button>
</div>

<canvas></canvas>
`;

const btnPlay=div.querySelectorAll("button")[0];
const btnPause=div.querySelectorAll("button")[1];
const canvas=div.querySelector("canvas");

btnPlay.onclick=()=>play(file,div,canvas);
btnPause.onclick=()=>pause();

container.appendChild(div);
});

</script>

</body>
</html>
