<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:black;color:#00fff2;font-family:Arial}

/* LAYOUT */
.wrapper{display:flex;gap:10px;padding:10px;max-width:1400px;margin:auto}
.column{flex:1;display:flex;flex-direction:column;gap:8px}
.center{flex:1.2;display:flex;flex-direction:column;align-items:center;gap:10px}

/* IMG */
.album-img{width:100%;border-radius:10px;box-shadow:0 0 15px #00fff2}

/* TRACK */
.track{padding:10px;border:1px solid #00fff2;border-radius:10px}
.track.active{border-color:#ff0033;box-shadow:0 0 20px #ff0033}
.name{font-size:12px;font-weight:bold}

/* BAR */
.bar{height:4px;background:#111;margin-top:5px}
.fill{height:100%;width:0;background:linear-gradient(90deg,#00fff2,#ff0033)}

/* VIDEO RECORTADO */
.videoWrap{
width:100%;
height:180px;
overflow:hidden;
border-radius:10px;
box-shadow:0 0 15px #00fff2;
}
video{
width:100%;
transform:translateY(-20px);
}

/* PIZZA */
canvas{width:180px;height:180px}

/* BOTÓN NEÓN */
.patreon{
display:inline-block;
padding:12px;
border:2px solid #00fff2;
border-radius:10px;
color:#00fff2;
text-decoration:none;
box-shadow:0 0 10px #00fff2;
animation:pulse 1.5s infinite;
text-align:center;
}
.patreon span{display:block;font-size:11px;opacity:.8}

@keyframes pulse{
0%{box-shadow:0 0 10px #00fff2}
50%{box-shadow:0 0 25px #ff0033}
100%{box-shadow:0 0 10px #00fff2}
}

/* MOBILE */
@media(max-width:900px){.wrapper{flex-direction:column}}
</style>
</head>

<body>

<a href="duqueluis-mp3.html">⏪</a>

<div class="wrapper">

<!-- IZQUIERDA -->
<div class="column">
<img src="el-despertar.jpg" class="album-img">
<div id="left"></div>
</div>

<!-- CENTRO -->
<div class="center">

<div class="videoWrap">
<video autoplay loop muted>
<source src="bh.mp4">
</video>
</div>

<canvas id="viz"></canvas>

<a class="patreon" href="https://www.patreon.com/posts/155590751" target="_blank">
💿 EL DESPERTAR DE LA CUMBIA
<span>Descargar álbum completo en Patreon</span>
</a>

</div>

<!-- DERECHA -->
<div class="column">
<img src="vortice-neon.PNG" class="album-img">
<div id="right"></div>
</div>

</div>

<script>
const audio=new Audio();
let ctx, analyser, dataArray;

/* INIT */
function init(){
if(ctx) return;
ctx=new AudioContext();
analyser=ctx.createAnalyser();
let src=ctx.createMediaElementSource(audio);
src.connect(analyser);
analyser.connect(ctx.destination);
dataArray=new Uint8Array(analyser.frequencyBinCount);
draw();
}

/* PLAY (FIX PAUSA) */
function play(file,el){
init();
ctx.resume();

/* SOLO cambia si es otro track */
if(!audio.src.endsWith(file)){
audio.src=file;
}

audio.play();

document.querySelectorAll(".track").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}

/* PAUSE */
function pause(){
audio.pause(); // 👈 NO resetea
}

/* TIME */
function format(s){
if(!s || isNaN(s)) return "0:00";
let m=Math.floor(s/60);
let sec=Math.floor(s%60);
return m+":"+(sec<10?"0":"")+sec;
}

/* UPDATE */
setInterval(()=>{
if(!audio.duration) return;

let file=audio.src.split("/").pop();
let time=document.getElementById("time-"+file);
let bar=document.getElementById("bar-"+file);

if(time){
time.textContent=format(audio.currentTime)+" / "+format(audio.duration);
}
if(bar){
bar.style.width=(audio.currentTime/audio.duration)*100+"%";
}
},200);

/* 🍕 PIZZA COLOR */
function draw(){
requestAnimationFrame(draw);
if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

let canvas=document.getElementById("viz");
let c=canvas.getContext("2d");

canvas.width=180;
canvas.height=180;

c.clearRect(0,0,180,180);

let bars=dataArray.length;

for(let i=0;i<bars;i++){
let val=dataArray[i]/255;
let angle=(i/bars)*Math.PI*2;

let radius=40+val*50;

let x=90+Math.cos(angle)*radius;
let y=90+Math.sin(angle)*radius;

/* COLOR dinámico */
let hue=i*4;
c.strokeStyle=`hsl(${hue},100%,50%)`;

c.beginPath();
c.moveTo(90,90);
c.lineTo(x,y);
c.stroke();
}
}

/* RENDER */
function render(list,container){
let div=document.getElementById(container);

list.forEach(f=>{
let name=f.replace(".mp3","").replace(/-/g," ");

let t=document.createElement("div");
t.className="track";

t.innerHTML=`
<div class="name">${name}</div>
<small id="time-${f}">0:00 / 0:00</small>
<div class="bar"><div class="fill" id="bar-${f}"></div></div>
<button onclick="play('${f}',this.parentElement)">▶</button>
<button onclick="pause()">⏸</button>
`;

div.appendChild(t);
});
}

/* DATA */
render([
"cumbia-de-luz-y-despedida.mp3",
"entre-lo-que-fui-y-lo-que-sere.mp3",
"entre-sombras-y-destellos.mp3",
"himno-del-ultimo-baile.mp3",
"latido-bajo-la-lluvia.mp3",
"lluvia-en-la-pista.mp3",
"peso-de-la-rutina.mp3",
"regreso-sin-fuego.mp3",
"sinfonia-en-la-pista.mp3",
"sombras-en-el-salon.mp3",
"sombras-que-se-mueven.mp3",
"tiembla-tu-mirada.mp3"
],"left");

render([
"aum-de-acero.mp3",
"bajo-en-el-pecho.mp3",
"bajo-infinito.mp3",
"circuit-rain.mp3",
"himno-del-amanecer.mp3",
"luces-borrosas.mp3",
"luis-fuego-en-la-noche.mp3",
"nucleo-que-despierta.mp3"
],"right");

</script>

</body>
</html>
