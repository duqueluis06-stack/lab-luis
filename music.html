<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Library</title>

<style>
body{
margin:0;
background:black;
font-family:Arial;
color:#00fff2;
overflow-x:hidden;
}

/* 🌌 ESTRELLAS */
.stars{
position:fixed;
inset:0;
z-index:0;
overflow:hidden;
}
.star{
position:absolute;
bottom:-10px;
width:2px;
height:2px;
background:white;
animation:rise linear infinite;
opacity:0.6;
}
@keyframes rise{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

/* CONTENIDO */
.container{
position:relative;
z-index:2;
padding:10px;
}

h2{
text-align:center;
text-shadow:0 0 12px #00fff2;
}

img{
width:100%;
max-width:380px;
display:block;
margin:10px auto;
border-radius:10px;
box-shadow:0 0 18px #00fff2;
}

/* 🚪 BOTÓN REGRESO NEÓN */
.backBtn{
position:fixed;
top:15px;
left:15px;
width:55px;
height:55px;
border-radius:50%;
border:2px solid #00fff2;
box-shadow:0 0 15px #00fff2;
display:flex;
align-items:center;
justify-content:center;
color:#00fff2;
text-decoration:none;
background:rgba(0,0,0,0.6);
z-index:10;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 10px #00fff2;}
50%{box-shadow:0 0 25px #ff00ff;}
100%{box-shadow:0 0 10px #00fff2;}
}

/* 🎧 TRACK */
.track{
display:flex;
flex-direction:column;
gap:6px;
padding:10px;
margin:10px 0;
border-radius:12px;
border:1px solid #00fff2;
background:rgba(0,0,0,0.6);
box-shadow:0 0 8px #00fff2;
transition:0.2s;
}

.track.active{
border:1px solid #ff00ff;
box-shadow:0 0 20px #ff00ff;
}

/* fila superior */
.top{
display:flex;
justify-content:space-between;
font-size:13px;
}

/* controles */
.controls{
display:flex;
gap:6px;
}

button{
background:black;
border:1px solid #00fff2;
color:#00fff2;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

/* 🎧 VU SOLO 1 */
.vuWrap{
width:80px;
height:80px;
margin-top:5px;
}

canvas{
width:80px;
height:80px;
border-radius:50%;
}

/* 📱 MOBILE FIX */
@media(max-width:600px){
.track{
flex-direction:column;
}
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<a class="backBtn" href="duqueluis-mp3.html">⏪</a>

<div class="container">

<h2>🎧 Music Library</h2>

<img src="vortice-neon.PNG">

<div id="tracks"></div>

</div>

<script>

const tracks=[
"aum-de-acero.mp3",
"bajo-en-el-pecho.mp3",
"bajo-infinito.mp3",
"circuit-rain.mp3",
"himno-del-amanecer.mp3",
"luces-borrosas.mp3",
"luis-fuego-en-la-noche.mp3",
"nucleo-que-despierta.mp3"
];

const audio=new Audio();
let ctx, analyser, source, dataArray;
let currentTrack=null;

/* 🌌 estrellas */
const stars=document.getElementById("stars");
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(3+Math.random()*5)+"s";
stars.appendChild(s);
}

/* 🎧 AUDIO INIT */
function init(){
if(ctx) return;
ctx=new (window.AudioContext||window.webkitAudioContext)();
analyser=ctx.createAnalyser();
source=ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);
analyser.fftSize=64;
dataArray=new Uint8Array(analyser.frequencyBinCount);
draw();
}

/* 🎧 SOLO VU ACTIVO */
let activeCanvas=null;

function draw(){
requestAnimationFrame(draw);

if(!analyser) return;
analyser.getByteFrequencyData(dataArray);

if(!activeCanvas) return;

const c=activeCanvas.getContext("2d");
const size=activeCanvas.width=activeCanvas.height=80;

c.clearRect(0,0,size,size);

const center=size/2;
const radius=28;

for(let i=0;i<dataArray.length;i++){
let angle=(i/dataArray.length)*Math.PI*2;
let v=dataArray[i];

let r=radius+v/4;

let x1=center+Math.cos(angle)*radius;
let y1=center+Math.sin(angle)*radius;

let x2=center+Math.cos(angle)*r;
let y2=center+Math.sin(angle)*r;

c.strokeStyle=`rgb(${v*2},${255-v},255)`;
c.lineWidth=2;

c.beginPath();
c.moveTo(x1,y1);
c.lineTo(x2,y2);
c.stroke();
}
}

/* ▶ PLAY */
function play(file, trackEl, canvas){
init();

audio.src=file;
audio.play();

currentTrack=file;
activeCanvas=canvas;

document.querySelectorAll(".track").forEach(t=>t.classList.remove("active"));
trackEl.classList.add("active");
}

/* ⏸ */
function pause(){
audio.pause();
}

/* RENDER */
const container=document.getElementById("tracks");

tracks.forEach(file=>{
const div=document.createElement("div");
div.className="track";

div.innerHTML=`
<div class="top">
<span>${file.replace(".mp3","")}</span>
</div>

<div class="controls">
<button>▶</button>
<button>⏸</button>
</div>

<div class="vuWrap">
<canvas></canvas>
</div>
`;

const btnPlay=div.querySelectorAll("button")[0];
const btnPause=div.querySelectorAll("button")[1];
const canvas=div.querySelector("canvas");

btnPlay.onclick=()=>play(file,div,canvas);
btnPause.onclick=()=>pause();

container.appendChild(div);
});

</script>

</body>
</html>
