<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Lab Stable</title>

<style>
body{
margin:0;
background:black;
font-family:Arial;
color:#00fff2;
overflow-x:hidden;
}

/* 🌌 ESTRELLAS */
.stars{
position:fixed;
inset:0;
z-index:0;
}
.star{
position:absolute;
bottom:-10px;
width:2px;
height:2px;
background:white;
animation:rise linear infinite;
opacity:0.6;
}
@keyframes rise{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

/* LAYOUT */
.wrapper{
position:relative;
z-index:2;
display:flex;
gap:12px;
padding:10px;
max-width:1200px;
margin:auto;
}

.tracks{
flex:1;
display:flex;
flex-direction:column;
gap:8px;
}

/* TRACK */
.track{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-radius:10px;
border:1px solid #00fff2;
background:rgba(0,0,0,0.5);
}

.track.active{
border:1px solid #ff0033;
box-shadow:0 0 12px #ff0033;
}

.name{
font-weight:bold;
text-transform:capitalize;
}

small{
font-size:11px;
opacity:0.7;
display:block;
}

/* BOTONES */
button{
background:black;
border:1px solid #00fff2;
color:#00fff2;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
}

/* VU */
canvas{
width:55px;
height:55px;
border-radius:50%;
margin-left:8px;
}

/* SIDE FIX MOBILE */
.side{
width:220px;
display:flex;
flex-direction:column;
gap:10px;
}

.side img{
width:100%;
max-width:220px;
border-radius:10px;
box-shadow:0 0 10px #00fff2;
}

/* BACK */
.backBtn{
position:fixed;
top:15px;
left:15px;
width:50px;
height:50px;
border-radius:50%;
border:2px solid #00fff2;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:#00fff2;
background:black;
z-index:10;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<a class="backBtn" href="duqueluis-mp3.html">⏪</a>

<div class="wrapper">

<div class="tracks" id="tracks"></div>

<div class="side">
<img src="vortice-neon.PNG">
<img src="NeuroLuis.gif">
</div>

</div>

<script>

/* 🎧 TRACKS */
const tracks=[
"aum-de-acero.mp3",
"bajo-en-el-pecho.mp3",
"bajo-infinito.mp3",
"circuit-rain.mp3",
"himno-del-amanecer.mp3",
"luces-borrosas.mp3",
"luis-fuego-en-la-noche.mp3",
"nucleo-que-despierta.mp3"
];

const audio=new Audio();
let ctx, analyser, source, data;
let activeCanvas=null;
let currentIndex=0;

/* 🌌 stars */
const stars=document.getElementById("stars");
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(3+Math.random()*5)+"s";
stars.appendChild(s);
}

/* INIT AUDIO */
function init(){
if(ctx) return;
ctx=new (window.AudioContext||window.webkitAudioContext)();
analyser=ctx.createAnalyser();
source=ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);
analyser.fftSize=64;
data=new Uint8Array(analyser.frequencyBinCount);
draw();
}

/* PLAY */
function play(file, el){
init();

currentIndex=tracks.indexOf(file);
audio.src=file;
audio.play();

document.querySelectorAll(".track").forEach(t=>t.classList.remove("active"));
if(el) el.classList.add("active");
}

/* NEXT AUTO */
audio.onended=()=>{
currentIndex++;
if(currentIndex>=tracks.length) currentIndex=0;
play(tracks[currentIndex]);
};

/* PAUSE */
function pause(){
audio.pause();
}

/* VU REAL */
function draw(){
requestAnimationFrame(draw);
if(!analyser) return;

analyser.getByteFrequencyData(data);

document.querySelectorAll("canvas").forEach((canvas, i)=>{
let c=canvas.getContext("2d");
let size=canvas.width=canvas.height=55;

c.clearRect(0,0,size,size);

let radius=18;
let center=27;

for(let j=0;j<data.length;j++){
let angle=(j/data.length)*Math.PI*2;
let v=data[j];

let r=radius+v/6;

let x1=center+Math.cos(angle)*radius;
let y1=center+Math.sin(angle)*radius;

let x2=center+Math.cos(angle)*r;
let y2=center+Math.sin(angle)*r;

c.strokeStyle=`rgb(0,255,200)`;
c.beginPath();
c.moveTo(x1,y1);
c.lineTo(x2,y2);
c.stroke();
}
});
}

/* RENDER */
const container=document.getElementById("tracks");

tracks.forEach(file=>{

const name=file.replace(".mp3","").replace(/-/g," ");

const div=document.createElement("div");
div.className="track";

div.innerHTML=`
<div style="flex:1">
<div class="name">${name}</div>
<small>⏱ --:-- / --:--</small>
</div>

<div>
<button onclick="play('${file}',this.closest('.track'))">▶</button>
<button onclick="pause()">⏸</button>
</div>

<canvas></canvas>
`;

container.appendChild(div);
});

</script>

</body>
</html>
