<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Lab DJ</title>

<style>
body{
margin:0;
background:black;
font-family:Arial;
color:#00fff2;
overflow-x:hidden;
}

/* 🌌 ESTRELLAS */
.stars{
position:fixed;
inset:0;
z-index:0;
}
.star{
position:absolute;
bottom:-10px;
width:2px;
height:2px;
background:white;
animation:rise linear infinite;
opacity:0.6;
}
@keyframes rise{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

/* LAYOUT */
.wrapper{
position:relative;
z-index:2;
display:flex;
gap:12px;
padding:10px;
max-width:1200px;
margin:auto;
}

.tracks{
flex:1;
display:flex;
flex-direction:column;
gap:8px;
}

/* TRACK */
.track{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-radius:10px;
border:1px solid #00fff2;
background:rgba(0,0,0,0.5);
box-shadow:0 0 10px #00fff2;
transition:0.2s;
}

.track.active{
border:1px solid #ff0033;
box-shadow:0 0 18px #ff0033;
}

/* NOMBRE */
.name{
font-weight:bold;
text-transform:capitalize;
}

/* TIEMPO */
small{
font-size:11px;
opacity:0.7;
display:block;
}

/* BOTONES */
button{
background:black;
border:1px solid #00fff2;
color:#00fff2;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
}

/* BAR */
.bar{
width:100%;
height:4px;
background:#111;
margin-top:6px;
overflow:hidden;
border-radius:4px;
}
.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#00fff2,#ff0033);
}

/* VUMETRO MINI (DERECHA) */
.vu{
width:60px;
height:60px;
border-radius:50%;
border:1px solid #00fff2;
margin-left:10px;
}

/* SIDE */
.side{
width:220px;
display:flex;
flex-direction:column;
gap:10px;
}

.side img{
width:100%;
border-radius:10px;
box-shadow:0 0 15px #00fff2;
}

/* DJ BUTTON */
.dj{
position:fixed;
top:15px;
right:15px;
padding:10px 14px;
border-radius:50px;
border:1px solid #00fff2;
color:#00fff2;
background:black;
cursor:pointer;
z-index:20;
box-shadow:0 0 15px #00fff2;
}

.backBtn{
position:fixed;
top:15px;
left:15px;
width:55px;
height:55px;
border-radius:50%;
border:2px solid #00fff2;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:#00fff2;
background:rgba(0,0,0,0.6);
box-shadow:0 0 15px #00fff2;
z-index:10;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<a class="backBtn" href="duqueluis-mp3.html">⏪</a>

<button class="dj" onclick="toggleDJ()">DJ MODE</button>

<div class="wrapper">

<div class="tracks" id="tracks"></div>

<div class="side">
<img src="vortice-neon.PNG">
<img src="NeuroLuis.gif">
</div>

</div>

<script>

/* 🎧 TRACKS */
const tracks=[
"aum-de-acero.mp3",
"bajo-en-el-pecho.mp3",
"bajo-infinito.mp3",
"circuit-rain.mp3",
"himno-del-amanecer.mp3",
"luces-borrosas.mp3",
"luis-fuego-en-la-noche.mp3",
"nucleo-que-despierta.mp3"
];

const audio=new Audio();

let index=0;
let dj=false;

/* VU */
const vuCanvas=document.createElement("canvas");
vuCanvas.className="vu";

let ctx, analyser, source, data;

/* INIT AUDIO */
function init(){
if(ctx) return;
ctx=new (window.AudioContext||window.webkitAudioContext)();
analyser=ctx.createAnalyser();
source=ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);
analyser.fftSize=64;
data=new Uint8Array(analyser.frequencyBinCount);
draw();
}

/* PLAY */
function play(file){
init();

index=tracks.indexOf(file);
audio.src=file;
audio.volume=1;
audio.play();
}

/* NEXT */
audio.onended=()=>{
if(dj){
next();
}
};

function next(){
index++;
if(index>=tracks.length) index=0;
crossfadePlay(tracks[index]);
}

/* CROSSFADE */
function crossfadePlay(file){
let fade=audio.volume;

let out=setInterval(()=>{
fade-=0.1;
audio.volume=fade;
if(fade<=0){
clearInterval(out);
audio.src=file;
audio.play();
fadeIn();
}
},60);
}

function fadeIn(){
let v=0;
let inr=setInterval(()=>{
v+=0.1;
audio.volume=v;
if(v>=1) clearInterval(inr);
},60);
}

/* DJ MODE */
function toggleDJ(){
dj=!dj;
alert("DJ MODE: "+(dj?"ON":"OFF"));
}

/* DRAW VU */
function draw(){
requestAnimationFrame(draw);

if(!analyser) return;

analyser.getByteFrequencyData(data);

/* simple beat pulse */
let sum=0;
for(let i=0;i<data.length;i++) sum+=data[i];
let beat=sum/data.length;

vuCanvas.style.boxShadow=`0 0 ${beat/10}px #00fff2`;
}

/* RENDER */
const container=document.getElementById("tracks");

tracks.forEach(file=>{

const name=file
.replace(".mp3","")
.replace(/-/g," ")
.replace(/\b\w/g,l=>l.toUpperCase());

const div=document.createElement("div");
div.className="track";

div.innerHTML=`
<div style="flex:1">
<div class="name">${name}</div>
<small id="t-${file}">--:-- / --:--</small>
<div class="bar"><div class="fill" id="b-${file}"></div></div>
</div>

<div>
<button onclick="play('${file}')">▶</button>
</div>

`;

container.appendChild(div);
});

</script>

</body>
</html>
