<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: #00fff2;
      font-family: Arial;
    }

    h2 {
      text-align: center;
      padding: 15px;
    }

    .track {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px;
      padding: 10px;
      border: 1px solid #00fff2;
      border-radius: 8px;
      box-shadow: 0 0 8px #00fff2;
    }

    audio {
      width: 65%;
    }

    .back {
      display: block;
      text-align: center;
      margin: 20px;
      color: #00fff2;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <h2>🎧 Music Library</h2>

  <!-- TRACKS AQUÍ -->

  <div class="track">
    <span>Track 01</span>
    <audio controls src="track1.mp3"></audio>
  </div>

  <div class="track">
    <span>Track 02</span>
    <audio controls src="track2.mp3"></audio>
  </div>

  <a class="back" href="index.html">🚪 Volver</a>

</body>
</html>
