<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Lab</title>

<style>
body{
margin:0;
background:black;
font-family:Arial;
color:#00fff2;
overflow-x:hidden;
}

/* 🌌 ESTRELLAS */
.stars{
position:fixed;
inset:0;
z-index:0;
}
.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:rise linear infinite;
opacity:0.6;
}
@keyframes rise{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

/* BACK BUTTON */
.backBtn{
position:fixed;
top:15px;
left:15px;
width:55px;
height:55px;
border-radius:50%;
border:2px solid #00fff2;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:#00fff2;
background:rgba(0,0,0,0.6);
box-shadow:0 0 15px #00fff2;
z-index:10;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 10px #00fff2;}
50%{box-shadow:0 0 25px #ff0033;}
100%{box-shadow:0 0 10px #00fff2;}
}

/* LAYOUT */
.wrapper{
position:relative;
z-index:2;
display:flex;
gap:10px;
padding:10px;
max-width:1400px;
margin:auto;
}

.column{
flex:1;
display:flex;
flex-direction:column;
gap:8px;
}

/* TRACK */
.track{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-radius:10px;
border:1px solid #00fff2;
background:rgba(0,0,0,0.5);
box-shadow:0 0 10px #00fff2;
}

.track.active{
box-shadow:0 0 20px #ff0033;
border-color:#ff0033;
}

.name{
font-weight:bold;
text-transform:uppercase;
font-size:12px;
}

small{
font-size:11px;
opacity:0.7;
display:block;
}

button{
background:black;
border:1px solid #00fff2;
color:#00fff2;
padding:5px 8px;
border-radius:6px;
cursor:pointer;
}

/* BAR */
.bar{
width:100%;
height:4px;
background:#111;
border-radius:4px;
overflow:hidden;
margin-top:5px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#00fff2,#ff0033);
}

/* CENTER */
.center{
flex:1.2;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

/* VIDEO */
video{
width:100%;
border-radius:10px;
box-shadow:0 0 15px #00fff2;
}

/* PIZZA VISUALIZER */
canvas{
width:160px;
height:160px;
border-radius:50%;
background:rgba(0,0,0,0.4);
box-shadow:0 0 20px #00fff2;
}

/* PATREON */
.patreon{
margin-top:10px;
padding:12px;
border:2px solid #00fff2;
border-radius:10px;
text-align:center;
text-decoration:none;
color:#00fff2;
box-shadow:0 0 15px #00fff2;
animation:pulse 2s infinite;
font-size:13px;
}

.patreon span{
display:block;
font-size:11px;
opacity:0.8;
margin-top:5px;
}

/* MOBILE */
@media(max-width:900px){
.wrapper{flex-direction:column;}
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<a class="backBtn" href="duqueluis-mp3.html">⏪</a>

<div class="wrapper">

<!-- IZQUIERDA -->
<div class="column" id="left"></div>

<!-- CENTRO -->
<div class="center">

<video autoplay loop muted playsinline>
<source src="bh.mp4" type="video/mp4">
</video>

<canvas id="pizza"></canvas>

<a class="patreon" href="https://www.patreon.com/posts/155590751" target="_blank">
💿 EL DESPERTAR DE LA CUMBIA
<span>Si te gusta esta música, descárgala en Patreon</span>
</a>

</div>

<!-- DERECHA -->
<div class="column" id="right"></div>

</div>

<script>

/* AUDIO ENGINE */
const audio = new Audio();
let ctx, analyser, source, dataArray;
let activeCanvas = null;

/* INIT AUDIO */
function init(){
if(ctx) return;

ctx = new (window.AudioContext || window.webkitAudioContext)();
analyser = ctx.createAnalyser();
analyser.fftSize = 64;

source = ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);

dataArray = new Uint8Array(analyser.frequencyBinCount);

draw();
}

/* PLAY */
function play(file, el){
init();
ctx.resume();

if(!audio.src.includes(file)){
audio.src = file;
}

audio.play();

document.querySelectorAll(".track").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}

/* PAUSE */
function pause(){
audio.pause();
}

/* PIZZA VISUALIZER */
function draw(){
requestAnimationFrame(draw);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

const canvas=document.getElementById("pizza");
const c=canvas.getContext("2d");

canvas.width=160;
canvas.height=160;

c.clearRect(0,0,160,160);

let bars=dataArray.length;
let r=50;

for(let i=0;i<bars;i++){
let val=dataArray[i]/255;
let a=(i/bars)*Math.PI*2;

let x=80+Math.cos(a)*(r+val*20);
let y=80+Math.sin(a)*(r+val*20);

c.beginPath();
c.arc(x,y,2,0,Math.PI*2);
c.fillStyle="#00fff2";
c.fill();
}
}

/* TRACKS */
const leftTracks = [
"cumbia-de-luz-y-despedida.mp3",
"entre-lo-que-fui-y-lo-que-sere.mp3",
"entre-sombras-y-destellos.mp3",
"himno-del-ultimo-baile.mp3",
"latido-bajo-la-lluvia.mp3",
"lluvia-en-la-pista.mp3",
"peso-de-la-rutina.mp3",
"regreso-sin-fuego.mp3",
"sinfonia-en-la-pista.mp3",
"sombras-en-el-salon.mp3",
"sombras-que-se-mueven.mp3",
"tiembla-tu-mirada.mp3"
];

const rightTracks = [
"aum-de-acero.mp3",
"bajo-en-el-pecho.mp3",
"bajo-infinito.mp3",
"circuit-rain.mp3",
"himno-del-amanecer.mp3",
"luces-borrosas.mp3",
"luis-fuego-en-la-noche.mp3",
"nucleo-que-despierta.mp3"
];

/* RENDER */
function render(list, containerId){
const container=document.getElementById(containerId);

list.forEach(file=>{

const name=file.replace(".mp3","").replace(/-/g," ");

const div=document.createElement("div");
div.className="track";

div.innerHTML=`
<div style="flex:1">
<div class="name">${name}</div>
<small>--:-- / --:--</small>
<div class="bar"><div class="fill"></div></div>
</div>
<div>
<button onclick="play('${file}',this.closest('.track'))">▶</button>
<button onclick="pause()">⏸</button>
</div>
`;

container.appendChild(div);
});
}

/* STARS */
const stars=document.getElementById("stars");
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(3+Math.random()*5)+"s";
stars.appendChild(s);
}

/* INIT */
render(leftTracks,"left");
render(rightTracks,"right");

</script>

</body>
</html>
