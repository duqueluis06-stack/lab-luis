<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Archivo de Investigación Científica</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("punkfondo.JPG") no-repeat center center fixed;
  background-size:cover;
  color:#fff;
}

.overlay{
  background:rgba(0,0,0,0.45);
  min-height:100vh;
  padding:20px;
}

header{
  text-align:center;
  padding:15px;
  font-size:22px;
  color:#ffd36a;
}

.nav{
  text-align:center;
  margin-bottom:20px;
}

.nav a{
  display:inline-block;
  margin:8px;
  padding:10px 14px;
  background:#1a1a1a;
  border:1px solid #444;
  border-radius:8px;
  text-decoration:none;
  color:#00ffcc;
}

.box{
  background:rgba(0,0,0,0.65);
  border:1px solid #555;
  border-radius:10px;
  margin:15px auto;
  max-width:900px;
  padding:15px;
}

.title{
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  padding:10px;
}

.content{
  display:none;
  margin-top:10px;
  line-height:1.6;
  max-height:450px;
  overflow-y:auto;
}

.subbtn{
  display:block;
  margin:10px 0;
  padding:8px;
  background:#222;
  border:1px solid #444;
  border-radius:6px;
  cursor:pointer;
  color:#ccc;
}

.subcontent{
  display:none;
  padding:10px;
  font-size:13px;
  color:#ddd;
  line-height:1.6;
}

.universo{border:1px solid #00ffff; box-shadow:0 0 15px #00ffff;}
.electro{border:1px solid #ff00ff; box-shadow:0 0 15px #ff00ff;}
.dino{border:1px solid #ffaa00; box-shadow:0 0 15px #ffaa00;}
.teorias{border:1px solid #00ffe5; box-shadow:0 0 15px #00ffe5;}
</style>
</head>

<body>

<div class="overlay">

<header>⚙️ Archivo de Investigación Científica</header>

<div class="nav">
<a href="index.html">⬅ Inicio</a>
</div>

<!-- UNIVERSO -->
<div class="box universo">
  <div class="title" onclick="toggle(this)">🌌 Universo</div>
  <div class="content">
    <!-- pegar contenido -->
  </div>
</div>

<!-- ELECTROMAGNETISMO -->
<div class="box electro">
  <div class="title" onclick="toggle(this)">⚡ Electromagnetismo</div>
  <div class="content">

    <!-- PIONERO TEMPLATE -->
    <div class="subbtn" onclick="subtoggle(this)">👤 Nombre del científico</div>
    <div class="subcontent">
      <!-- BIOGRAFÍA AQUÍ -->
    </div>

    <div class="subbtn" onclick="subtoggle(this)">👤 Otro científico</div>
    <div class="subcontent">
      <!-- BIOGRAFÍA AQUÍ -->
    </div>

  </div>
</div>

<!-- DINOSAURIOS -->
<div class="box dino">
  <div class="title" onclick="toggle(this)">🦖 Extinción de dinosaurios</div>
  <div class="content">
    <!-- contenido -->
  </div>
</div>

<!-- TEORÍAS -->
<div class="box teorias">
  <div class="title" onclick="toggle(this)">🧠 Teorías</div>
  <div class="content">

    <div class="subbtn" onclick="subtoggle(this)">🧬 Hipótesis 1</div>
    <div class="subcontent">
      <!-- contenido -->
    </div>

  </div>
</div>

</div>

<script>
function toggle(el){
  let c = el.nextElementSibling;
  c.style.display = (c.style.display === "block") ? "none" : "block";
}

function subtoggle(el){
  let c = el.nextElementSibling;
  c.style.display = (c.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
