<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratorio Luis</title>

<style>

/* ===== FONDO ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle, #0a0a0a, #000000);
    color: white;
}

/* ===== TITULO ===== */
h1 {
    text-align: center;
    padding: 20px;
    color: cyan;
}

/* ===== GRID ===== */
.grid {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    padding: 40px;
}

/* ===== ENGRANAJES ===== */
.gear {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, #222, #111);
    border: 3px solid cyan;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: 0.3s;

    /* 🔥 movimiento constante */
    animation: girar 10s linear infinite;
}

.gear::before {
    content: "";
    position: absolute;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: 4px dashed cyan;
}

.gear span {
    text-align: center;
    font-size: 14px;
}

/* hover */
.gear:hover {
    transform: scale(1.2);
    box-shadow: 0 0 20px cyan;
}

/* animación */
@keyframes girar {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* ===== MODAL ===== */
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
}

.modal-content {
    background: #111;
    margin: 5% auto;
    padding: 20px;
    width: 80%;
    border: 2px solid cyan;
    border-radius: 10px;
}

.close {
    float: right;
    font-size: 25px;
    cursor: pointer;
}

h2 {
    color: cyan;
}

</style>
</head>

<body>

<h1>⚙️ Laboratorio Interactivo</h1>

<div class="grid">

    <div class="gear" onclick="abrir('hertz')">
        <span>ONDAS</span>
    </div>

    <div class="gear" onclick="abrir('maxwell')">
        <span>ENERGÍA</span>
    </div>

    <div class="gear" onclick="abrir('vida')">
        <span>VIDA</span>
    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrar()">&times;</span>
        <div id="contenido"></div>
    </div>
</div>

<script>

function abrir(tipo){

    let contenido = document.getElementById("contenido");

    if(tipo === "hertz"){
        contenido.innerHTML = `
        <h2>📜 Historia</h2>
        <h3>Heinrich Hertz</h3>
        <p><b>Año:</b> 1887</p>
        <p>Físico alemán que demostró experimentalmente la existencia de ondas electromagnéticas, validando las teorías de Maxwell.</p>

        <h2>⚙️ Frecuencia y Ondas</h2>
        <p>La frecuencia es el número de repeticiones de una onda por segundo y se mide en Hertz (Hz).</p>
        <p>Las ondas transportan energía mediante vibraciones en el espacio.</p>
        <p>Esto explica fenómenos como el sonido, la luz y la transmisión de energía.</p>
        `;
    }

    if(tipo === "maxwell"){
        contenido.innerHTML = `
        <h2>📜 Historia</h2>
        <h3>James Clerk Maxwell</h3>
        <p><b>Año:</b> 1865</p>
        <p>Físico escocés que unificó la electricidad y el magnetismo en un solo modelo matemático.</p>

        <h2>⚙️ Energía Electromagnética</h2>
        <p>Maxwell predijo que la luz es una onda electromagnética.</p>
        <p>Sus ecuaciones describen cómo los campos eléctricos y magnéticos se propagan en el espacio.</p>
        <p>Esto permitió el desarrollo de tecnologías modernas como la radio y telecomunicaciones.</p>
        `;
    }

    if(tipo === "vida"){
        contenido.innerHTML = `
        <h2>📜 Origen de la vida</h2>
        <p>Existen múltiples teorías sobre el origen de la vida en la Tierra.</p>

        <h2>⚙️ Interpretación</h2>
        <p>La vida puede entenderse como una organización compleja de materia y energía.</p>
        <p>Desde una perspectiva vibracional, la materia podría organizarse mediante patrones de frecuencia.</p>
        <p>Aquí puedes integrar tu propia teoría personal.</p>
        `;
    }

    document.getElementById("modal").style.display = "block";
}

function cerrar(){
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
