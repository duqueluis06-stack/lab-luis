<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Laboratorio Interactivo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;
      background: url("punkfondo.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    /* Capa oscura steampunk */
    .overlay {
      background: rgba(0,0,0,0.65);
      min-height: 100vh;
      padding: 30px;
    }

    h1 {
      text-align: center;
      font-size: 40px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #ffcc00;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .btn {
      background: linear-gradient(145deg, #3a2a1f, #1a120d);
      border: 2px solid #c9a227;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(255,200,0,0.2);
      font-size: 18px;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #ffcc00;
    }

    /* BOTÓN SALIR */
    .exit {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #8b0000;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 10px red;
      transition: 0.3s;
    }

    .exit:hover {
      background: red;
      transform: scale(1.1);
    }

  </style>
</head>

<body>

  <!-- BOTÓN SALIR -->
  <a class="exit" href="index.html">🏠 Salir</a>

  <div class="overlay">

    <h1>⚙️ Laboratorio Steampunk</h1>

    <div class="grid">

      <div class="btn">⚡ Maxwell & Electromagnetismo</div>
      <div class="btn">🌍 Origen del Universo</div>
      <div class="btn">🦖 Extinción Dinosaurios</div>
      <div class="btn">🔬 Energía Alternativa</div>
      <div class="btn">📡 Sensores & Arduino</div>
      <div class="btn">🧠 Teorías Personales</div>

    </div>

  </div>

</body>
</html>
