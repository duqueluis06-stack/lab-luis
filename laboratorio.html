<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atlas de Frecuencias</title>

<style>

/* ===== FONDO STEAMPUNK ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("punkfondo.jpg") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* capa oscura + vidrio */
body::before {
    content: "";
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(2px);
    z-index: -1;
}

/* ===== TITULO ===== */
h1 {
    text-align: center;
    padding: 20px;
    color: #00ffff;
    letter-spacing: 3px;
}

/* ===== CONTENEDOR ===== */
.grid {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
    padding: 40px;
}

/* ===== ENGRANAJES ===== */
.gear {
    width: 85px;
    height: 85px;
    border-radius: 50%;
    background: radial-gradient(circle, #2b2b2b, #111);
    border: 2px solid #00ffff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: 0.3s;
    animation: spin 14s linear infinite;
}

/* dientes externos */
.gear::before {
    content: "";
    position: absolute;
    width: 115px;
    height: 115px;
    border-radius: 50%;
    border: 3px dotted #00ffff;
}

/* texto interno */
.gear span {
    font-size: 10px;
    text-align: center;
    letter-spacing: 1px;
}

/* hover */
.gear:hover {
    transform: scale(1.2);
    box-shadow: 0 0 18px #00ffff;
}

/* animación */
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* ===== MODAL ===== */
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
}

.modal-content {
    background: #111;
    margin: 5% auto;
    padding: 20px;
    width: 80%;
    border: 1px solid #00ffff;
    border-radius: 10px;
}

.close {
    float: right;
    font-size: 25px;
    cursor: pointer;
    color: white;
}

h2 {
    color: #00ffff;
}

</style>
</head>

<body>

<h1>⚙️ Atlas de Frecuencias</h1>

<div class="grid">

    <div class="gear" onclick="abrir('hertz')">
        <span>ONDAS</span>
    </div>

    <div class="gear" onclick="abrir('maxwell')">
        <span>ENERGÍA</span>
    </div>

    <div class="gear" onclick="abrir('vida')">
        <span>VIDA</span>
    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrar()">&times;</span>
        <div id="contenido"></div>
    </div>
</div>

<script>

function abrir(tipo){

    let contenido = document.getElementById("contenido");

    if(tipo === "hertz"){
        contenido.innerHTML = `
        <h2>Heinrich Hertz</h2>
        <p><b>1887</b></p>
        <p>Demostró experimentalmente las ondas electromagnéticas.</p>
        <p>La frecuencia (Hz) representa ciclos por segundo.</p>
        `;
    }

    if(tipo === "maxwell"){
        contenido.innerHTML = `
        <h2>James Clerk Maxwell</h2>
        <p><b>1865</b></p>
        <p>Unificó electricidad y magnetismo.</p>
        <p>Predijo que la luz es una onda electromagnética.</p>
        `;
    }

    if(tipo === "vida"){
        contenido.innerHTML = `
        <h2>Origen de la Vida</h2>
        <p>La vida puede entenderse como organización de energía y materia.</p>
        <p>Se exploran modelos basados en vibración y frecuencia.</p>
        `;
    }

    document.getElementById("modal").style.display = "block";
}

function cerrar(){
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
